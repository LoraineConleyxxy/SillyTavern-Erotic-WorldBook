<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>极品调教大世界书 v2</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #181a20;
      --panel-2: #20232b;
      --line: #313640;
      --text: #eceff3;
      --muted: #9da7b3;
      --gold: #d8b35c;
      --cyan: #70c7d8;
      --green: #84c28a;
      --red: #d36b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      letter-spacing: 0;
    }
    a { color: inherit; }
    .shell {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--line);
      background: #15171c;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    h1 {
      margin: 8px 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 64px;
    }
    .stat strong {
      display: block;
      font-size: 21px;
      line-height: 1.1;
    }
    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }
    .downloads {
      padding: 14px 22px;
      display: grid;
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }
    .download {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
    }
    .download span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .filters {
      padding: 14px 22px 12px;
      border-bottom: 1px solid var(--line);
    }
    input, select {
      width: 100%;
      background: #0f1115;
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 11px;
      outline: none;
      font-size: 13px;
    }
    input:focus, select:focus { border-color: var(--cyan); }
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .source-list {
      overflow: auto;
      padding: 12px;
      flex: 1;
    }
    .source-btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 10px;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      font-size: 13px;
    }
    .source-btn:hover { background: var(--panel); }
    .source-btn.active {
      background: var(--panel-2);
      border-color: var(--gold);
    }
    .source-btn small {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
      display: block;
    }
    .count-pill {
      color: #141414;
      background: var(--gold);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      height: 22px;
      min-width: 34px;
      text-align: center;
    }
    main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #121419;
    }
    .topbar h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }
    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .status {
      color: var(--green);
      font-size: 12px;
      white-space: nowrap;
    }
    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
    }
    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 13px;
    }
    .tab.active {
      border-color: var(--cyan);
      color: #071114;
      background: var(--cyan);
    }
    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(320px, 42%) minmax(0, 1fr);
    }
    .entry-list {
      border-right: 1px solid var(--line);
      overflow: auto;
      padding: 14px;
      background: #111318;
    }
    .entry-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      text-align: left;
      padding: 11px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .entry-btn:hover { border-color: var(--cyan); }
    .entry-btn.active {
      border-color: var(--gold);
      background: #24232a;
    }
    .entry-title {
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
    }
    .entry-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }
    .reader {
      min-width: 0;
      overflow: auto;
      padding: 24px;
    }
    .reader-card {
      max-width: 900px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
    }
    .reader h3 {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.35;
    }
    .reader .meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 18px;
    }
    .content {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.85;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.02);
    }
    .error {
      color: var(--red);
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      aside { min-height: 58vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .workspace { grid-template-columns: 1fr; }
      .entry-list { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <header>
        <div class="eyebrow">Source-driven v2</div>
        <h1>极品调教大世界书</h1>
        <p class="subtitle">按资料源重建的 v2 版世界书与快捷回复。</p>
      </header>
      <section class="stats" id="stats"></section>
      <section class="downloads">
        <a class="download" href="创意/成品/v2/极品调教大世界书_v2.json" download>主世界书 <span>JSON</span></a>
        <a class="download" href="创意/成品/v2/极品调教快捷回复_v2_来源无状态版.json" download>来源快捷回复 <span>JSON</span></a>
        <a class="download" href="创意/成品/v2/极品调教快捷回复_v2_十二卷无状态版.json" download>分类快捷回复 <span>JSON</span></a>
        <a class="download" href="创意/成品/v2/重建报告.md">重建报告 <span>MD</span></a>
      </section>
      <section class="filters">
        <input id="query" placeholder="搜索来源或条目">
        <div class="filter-row">
          <select id="typeFilter"></select>
          <select id="categoryFilter"></select>
        </div>
      </section>
      <nav class="source-list" id="sourceList"></nav>
    </aside>
    <main>
      <section class="topbar">
        <div>
          <h2 id="activeTitle">载入中</h2>
          <p id="activeMeta">正在读取 v2 发布文件</p>
        </div>
        <div class="status" id="status">loading</div>
      </section>
      <section class="category-tabs" id="categoryTabs"></section>
      <section class="workspace">
        <div class="entry-list" id="entryList"></div>
        <article class="reader" id="reader"></article>
      </section>
    </main>
  </div>
  <script>
    const manifestUrl = "创意/成品/v2/资料源索引_v2.json";
    const worldbookUrl = "创意/成品/v2/极品调教大世界书_v2.json";
    const state = {
      manifest: null,
      worldbook: null,
      entries: [],
      byUid: new Map(),
      activeSource: "",
      activeCategory: "全部",
      query: "",
      type: "全部",
      category: "全部",
      activeUid: null
    };

    const $ = (id) => document.getElementById(id);
    const cleanCategory = (value) => {
      const text = String(value || "");
      return text.includes("：") ? text.split("：").slice(1).join("：") : text;
    };
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    }[c]));

    async function loadData() {
      try {
        const [manifest, worldbook] = await Promise.all([
          fetch(manifestUrl).then((r) => {
            if (!r.ok) throw new Error("manifest " + r.status);
            return r.json();
          }),
          fetch(worldbookUrl).then((r) => {
            if (!r.ok) throw new Error("worldbook " + r.status);
            return r.json();
          })
        ]);
        state.manifest = manifest;
        state.worldbook = worldbook;
        state.entries = manifest.entries || [];
        Object.values(worldbook.entries || {}).forEach((entry) => state.byUid.set(Number(entry.uid), entry));
        state.activeSource = firstSource();
        renderAll();
        $("status").textContent = "ready";
      } catch (err) {
        $("status").textContent = "error";
        $("status").className = "status error";
        $("activeTitle").textContent = "读取失败";
        $("activeMeta").textContent = String(err.message || err);
        $("reader").innerHTML = '<div class="empty error">请通过 GitHub Pages 或本地 HTTP 服务打开此页面。</div>';
      }
    }

    function firstSource() {
      const source = state.entries.find((entry) => entry.source_label);
      return source ? source.source_label : "";
    }

    function renderAll() {
      renderStats();
      renderFilters();
      renderSources();
      renderTabs();
      renderEntries();
      renderReader();
    }

    function renderStats() {
      const m = state.manifest;
      const importedSources = (m.sources || []).filter((s) => (s.imported_entries || 0) > 0).length;
      $("stats").innerHTML = [
        ["版本", String(m.version || "").replace("-source-rebuild", "")],
        ["条目", m.total_entries || state.entries.length],
        ["来源", importedSources],
        ["快捷回复", "2 套"]
      ].map(([label, value]) => `<div class="stat"><strong>${esc(value)}</strong><span>${esc(label)}</span></div>`).join("");
    }

    function renderFilters() {
      const types = ["全部", ...new Set(state.entries.map((e) => e.source_type).filter(Boolean))];
      const cats = ["全部", ...new Set(state.entries.map((e) => e.category).filter(Boolean))];
      $("typeFilter").innerHTML = types.map((type) => `<option ${type === state.type ? "selected" : ""}>${esc(type)}</option>`).join("");
      $("categoryFilter").innerHTML = cats.map((cat) => `<option ${cat === state.category ? "selected" : ""}>${esc(cleanCategory(cat))}</option>`).join("");
    }

    function filteredEntries() {
      const q = state.query.trim().toLowerCase();
      return state.entries.filter((entry) => {
        if (state.type !== "全部" && entry.source_type !== state.type) return false;
        if (state.category !== "全部" && entry.category !== state.category) return false;
        if (!q) return true;
        return [entry.title, entry.source_label, entry.source_type, entry.category, entry.subcategory]
          .join("\n").toLowerCase().includes(q);
      });
    }

    function renderSources() {
      const groups = new Map();
      filteredEntries().forEach((entry) => {
        const key = entry.source_label || "未命名来源";
        if (!groups.has(key)) groups.set(key, { label: key, type: entry.source_type, count: 0 });
        groups.get(key).count += 1;
      });
      const sources = [...groups.values()].sort((a, b) => a.type.localeCompare(b.type, "zh-CN") || a.label.localeCompare(b.label, "zh-CN"));
      if (sources.length && !sources.some((source) => source.label === state.activeSource)) {
        state.activeSource = sources[0].label;
        state.activeCategory = "全部";
        state.activeUid = null;
      }
      $("sourceList").innerHTML = sources.map((source) => `
        <button class="source-btn ${source.label === state.activeSource ? "active" : ""}" data-source="${esc(source.label)}">
          <span>${esc(source.label)}<small>${esc(source.type || "未分类来源")}</small></span>
          <span class="count-pill">${source.count}</span>
        </button>
      `).join("") || '<div class="empty">没有匹配来源。</div>';
    }

    function sourceEntries() {
      return filteredEntries().filter((entry) => entry.source_label === state.activeSource);
    }

    function renderTabs() {
      const entries = sourceEntries();
      const counts = new Map();
      counts.set("全部", entries.length);
      entries.forEach((entry) => counts.set(entry.category, (counts.get(entry.category) || 0) + 1));
      if (!counts.has(state.activeCategory)) state.activeCategory = "全部";
      $("categoryTabs").innerHTML = [...counts.entries()].map(([cat, count]) => `
        <button class="tab ${cat === state.activeCategory ? "active" : ""}" data-category="${esc(cat)}">
          ${esc(cat === "全部" ? "全部" : cleanCategory(cat))} (${count})
        </button>
      `).join("");
      const first = entries[0];
      $("activeTitle").textContent = state.activeSource || "未选择来源";
      $("activeMeta").textContent = first ? `${first.source_type} · ${entries.length} 条` : "没有匹配条目";
    }

    function visibleEntries() {
      return sourceEntries().filter((entry) => state.activeCategory === "全部" || entry.category === state.activeCategory)
        .sort((a, b) => a.category.localeCompare(b.category, "zh-CN") || a.title.localeCompare(b.title, "zh-CN"));
    }

    function renderEntries() {
      const entries = visibleEntries();
      if (entries.length && !entries.some((entry) => entry.uid === state.activeUid)) {
        state.activeUid = entries[0].uid;
      }
      $("entryList").innerHTML = entries.map((entry) => `
        <button class="entry-btn ${entry.uid === state.activeUid ? "active" : ""}" data-uid="${entry.uid}">
          <div class="entry-title">${esc(entry.title)}</div>
          <div class="entry-meta">${esc(cleanCategory(entry.category))} · ${esc(entry.subcategory || "综合")}</div>
        </button>
      `).join("") || '<div class="empty">没有匹配条目。</div>';
    }

    function renderReader() {
      const meta = state.entries.find((entry) => entry.uid === state.activeUid);
      const entry = state.byUid.get(Number(state.activeUid));
      if (!meta || !entry) {
        $("reader").innerHTML = '<div class="empty">选择左侧条目。</div>';
        return;
      }
      $("reader").innerHTML = `
        <div class="reader-card">
          <h3>${esc(meta.title)}</h3>
          <div class="meta">UID ${esc(meta.uid)} · ${esc(meta.source_label)} · ${esc(cleanCategory(meta.category))} · ${esc(meta.subcategory || "综合")}</div>
          <div class="content">${esc(entry.content || "")}</div>
        </div>
      `;
    }

    $("query").addEventListener("input", (event) => {
      state.query = event.target.value;
      state.activeUid = null;
      renderSources();
      renderTabs();
      renderEntries();
      renderReader();
    });
    $("typeFilter").addEventListener("change", (event) => {
      state.type = event.target.value;
      state.activeUid = null;
      state.activeCategory = "全部";
      renderSources();
      renderTabs();
      renderEntries();
      renderReader();
    });
    $("categoryFilter").addEventListener("change", (event) => {
      const cats = ["全部", ...new Set(state.entries.map((e) => e.category).filter(Boolean))];
      state.category = cats[event.target.selectedIndex] || "全部";
      state.activeUid = null;
      state.activeCategory = "全部";
      renderSources();
      renderTabs();
      renderEntries();
      renderReader();
    });
    $("sourceList").addEventListener("click", (event) => {
      const btn = event.target.closest(".source-btn");
      if (!btn) return;
      state.activeSource = btn.dataset.source;
      state.activeCategory = "全部";
      state.activeUid = null;
      renderSources();
      renderTabs();
      renderEntries();
      renderReader();
    });
    $("categoryTabs").addEventListener("click", (event) => {
      const btn = event.target.closest(".tab");
      if (!btn) return;
      state.activeCategory = btn.dataset.category;
      state.activeUid = null;
      renderTabs();
      renderEntries();
      renderReader();
    });
    $("entryList").addEventListener("click", (event) => {
      const btn = event.target.closest(".entry-btn");
      if (!btn) return;
      state.activeUid = Number(btn.dataset.uid);
      renderEntries();
      renderReader();
    });
    loadData();
  </script>
</body>
</html>
