向后倾倒至45度，迫使奴隶双腿被电动分腿器强制打开至极限，固定在两侧的金属环中。椅面边缘镶嵌有一圈可加热或制冷的金属珠，紧贴大腿内侧。椅座下方安装有可伸缩的假阳具或震动棒，由施虐者遥控控制。整个椅子被放置在高台上，周围环绕镜面墙壁，让奴隶能清晰看到自己完全暴露、被动承受的羞耻姿态。\n\n用法与交互：\n1. 奴隶被锁在椅上后，无法合拢双腿，私处完全暴露在镜面与施虐者视线中。\n2. 施虐者可遥控调节椅背角度、分腿器宽度、以及下方假阳具的伸缩频率与深度，进行缓慢的折磨或突如其来的插入。\n3. 金属珠可被加热至烫伤边缘或冷却至刺骨，施虐者根据奴隶的反应切换温度，制造冰火两重天的持续刺激。", "uid": 129}, "重力感应脚镣": {"content": "{重力感应脚镣}\n简介：\n【一对沉重的金属脚镣，每只重达数公斤，表面刻有淫纹。脚镣内置重力感应器与微型振动马达，当奴隶站立或行走时，脚镣会持续发出低沉嗡鸣，并在脚踝处产生酥麻震动；若奴隶试图奔跑或抬腿过高，震动频率会骤增，变为尖锐刺痛。脚镣之间由一条极短链子连接，限制步幅，使奴隶只能小步挪动，姿态屈辱。】\n\n用法与交互：\n1. 施虐者可通过遥控切换震动模式，如持续低频按摩或间歇性电击脉冲，用于惩罚或奖励。\n2. 脚镣内置定位芯片，施虐者可随时追踪奴隶位置，增强心理压迫。\n3. 适合长时间佩戴，配合其他束缚道具，使奴隶在移动中持续感受束缚与刺激。", "uid": 130}, "头部拘束笼套": {"content": "{头部拘束笼套}\n简介：\n【场景/道具描述】\n一个贴合头部的金属笼套，覆盖整个面部，仅留口鼻处的小孔用于呼吸。笼内设有可调节的口枷，强制撑开口腔，唾液无法吞咽，只能顺着铁栏滴落。笼套后部有锁扣，与项圈或颈枷固定，防止挣脱。笼套内侧可能带有粗糙凸起或电击触点，轻微触碰即引发刺痛。\n\n用法与交互：\n1. 将笼套套在奴隶头上，锁紧后部，调整口枷至最大开度，保持数小时。\n2. 笼套可连接导管，强制灌入液体或气体（如气味刺激），奴隶无法拒绝。\n3. 笼套外可覆盖隔音耳罩或眼罩，彻底剥夺感官，只留下触觉与痛觉。\n4. 可配合远程电击，当奴隶试图用舌头推动口枷时触发惩罚。", "uid": 133}, "阴蒂折磨环": {"content": "{阴蒂折磨环}\n简介：\n【阴蒂折磨环】一枚精钢打造的开口环，内壁布满微小而锋利的倒刺，像食人花的利齿般向内收拢。环体通过精密螺丝固定，将奴隶的阴蒂根部彻底锁死，无法逃脱。倒刺的尖端在静止时仅轻触皮肤，但任何一丝肌肉的颤动——无论是因快感而颤抖，还是因恐惧而紧绷——都会让倒刺深深刺入敏感组织，带来尖锐的刺痛与灼烧感。\n\n用法与交互：\n1. 施虐者可通过调节螺丝的松紧度，控制倒刺的切入深度，从“警告性的轻刺”到“每动一下都见血的酷刑”。\n2. 奴隶被迫保持绝对静止，任何本能的反应都会换来更剧烈的惩罚，从而在极度的自我克制中放大每一丝快感的电流，形成恐怖的矛盾体验。\n3. 长期佩戴会导致阴蒂局部肿胀，倒刺嵌入组织深处，移除时将造成二次撕裂般的痛苦，使奴隶对移除本身也产生恐惧。", "uid": 135}, "痛觉快感重映射与惩罚奖励转换": {"content": "{痛觉快感重映射与惩罚奖励转换}\n简介：\n【场景/玩法描述】通过道具、淫纹、神经接口或长期训练，把疼痛、惩罚、电击、鞭打等信号逐步改写成快感或服从奖励。受控者不再能稳定区分惩罚与奖赏，每一次被纠正都可能同时加深恐惧和期待。\n\n用法与交互细节：\n1. 初期让受控者体验痛觉被放大、减弱或转译为快感的不可预测性。\n2. 中段把鞭打、刺痛、电击、道具压迫等惩罚与高潮控制或服从反馈绑定。\n3. 后期使用淫纹、算法环或训练口令，让违令、挣扎、求饶都成为可记录的调教指标。\n4. 变体：痛觉转换环、刺轮重映射、淫纹惩罚节点、伤害欢愉转化。", "uid": 136}, "全封闭式人形束缚衣": {"content": "{全封闭式人形束缚衣}\n简介：\n【一种由高强度黑色皮革或合成材料制成的全封闭束缚衣，从脖颈到脚踝将奴隶完全包裹，仅留出必要的排泄孔。内部布满微电流传感器和震动触点，背部有可调节的充气压迫层。头部被一个无光的头套完全遮蔽，只留呼吸孔，剥夺视觉与听觉。手臂被强制交叉固定在胸前，双腿被束带锁死，无法站立或行走，只能像蛆一样蠕动。】\n\n用法与交互：\n1. 穿戴后，奴隶将完全失去自主行动能力与感官反馈，陷入绝对的黑暗与寂静，只能感受到束缚衣内部的压力与电流刺激。\n2. 施虐者可通过远程控制器调节压迫层的气压，从轻微紧缚到挤压骨骼的极限压力，制造窒息感与压迫恐惧。\n3. 内置的微电流阵列可随机或按模式刺激敏感区域（乳头、阴部、大腿内侧），带来持续不可预测的麻刺或电击痛苦，配合压迫形成双重折磨。\n4. 长时间穿戴会导致肌肉萎缩、血液循环受阻、心理崩溃，常用于长期囚禁或作为惩罚前的预置状态。", "uid": 137}, "可调节式淫虐十字架": {"content": "{可调节式淫虐十字架}\n简介：\n【一种由不锈钢与硬木制成的X形或T形固定架，高度可调，表面镶嵌有多个金属环和锁扣。四肢末端有可旋转的腕锁与踝锁，能将奴隶以大字型或跪姿完全展开。中央立柱内置震动马达，可贴合脊椎或后庭。架体底部有液压升降系统，可倾斜至任意角度，甚至倒吊。】\n\n用法与交互：\n1. 将奴隶四肢锁死在十字架四角，身体完全拉伸，暴露腹部、胸口与下体，无法躲闪任何攻击或刺激。\n2. 调整倾斜角度，使奴隶重心偏移，被迫用核心肌肉支撑身体，加速疲劳与肌肉痉挛。\n3. 开启立柱震动马达，将频率调至低频高振幅，直接震荡脊柱与内脏，引发全身颤抖与失禁。\n4. 配合鞭打、滴蜡、冰水淋浴等，因固定而无法逃避，每一次抽打都会因身体晃动而加重痛苦。", "uid": 138}, "语音控制发声器": {"content": "{语音控制发声器}\n简介：\n【语音控制发声器】一种植入式或穿戴式设备，紧贴奴隶的声带或喉部，能够捕捉并放大其最细微的呻吟、呜咽与求饶声。同时，施虐者可通过远程语音指令强制触发特定音调或振动频率，让奴隶的每一次发声都成为调教的一部分。\n\n用法与交互：\n1. 设备在奴隶喉咙处固定，外部遥控器可调节敏感度，任何呼吸波动都会被放大为清晰的呻吟，使奴隶无法隐藏任何情绪反应。\n2. 施虐者通过麦克风发出指令，如“叫得再大声些”，设备会同步增强振动或电击刺激，迫使奴隶服从。\n3. 当奴隶试图沉默时，设备会自动施加惩罚性脉冲，直到其重新发出符合要求的声响，彻底剥夺其意志自主。", "uid": 141}, "跪姿固定地锁": {"content": "{跪姿固定地锁}\n简介：\n【场景/道具描述】\n一个固定在地面的金属拘束装置，设计成让奴隶长时间保持跪姿。装置通常包括一个可调节高度的跪垫或尖刺平台，两侧有固定脚踝的金属环扣，前方则有锁住手腕或脖子的立柱。立柱上可能装有挂钩或滑轮系统，用于连接手臂的牵引绳，使奴隶无法起身或改变姿势。装置整体沉重且不可移动，地面可能刻有羞辱性的图案或文字。\n\n用法与交互：\n1. 施虐者命令奴隶跪在平台上，将脚踝锁入两侧环扣，手腕或脖子锁在前方立柱上，使奴隶只能保持头部低垂、臀部抬起的屈辱姿态。\n2. 平台表面可更换为尖刺或粗糙材质，增加跪姿的痛苦，迫使奴隶不断调整重心却无法解脱。\n3. 施虐者可通过立柱上的挂钩悬挂重物或牵引绳，调整奴隶的头部高度，或连接口球、眼罩等道具，形成多层拘束。\n4. 长期固定在此装置上，奴隶的膝盖、脚踝和手腕会因压迫而麻木，心理上产生无助与屈服，成为彻底的展示品。", "uid": 143}, "巨糖塞口": {"content": "{巨糖塞口}\n简介：\n【场景/道具描述】\n一颗巨大如灯泡的硬糖，被强行塞入受虐者口中。糖体大到必须将嘴巴张到极限才能含住，致使下颌酸痛、口水无法吞咽而不断流淌。糖的甜味与被迫含服的羞辱感形成强烈反差，受虐者只能被迫舔舐，却无法吐出或咬碎，完全沦为施虐者随意摆布的玩物。\n\n用法与交互：\n1. 施虐者将巨糖递至受虐者嘴边，受虐者因无力反抗只能张嘴，糖体撑满口腔，致其无法合拢，口水顺嘴角流下，形成淫靡画面。\n2. 巨糖的甜味会持续刺激味蕾，但受虐者无法主动吞咽或说话，只能发出含糊的呜咽声，进一步强化其被剥夺发声与尊严的绝望感。\n3. 施虐者可同时进行其他调教（如双穴蔬菜），受虐者因口中巨糖无法呼救或求饶，只能被动承受所有折磨，心理压迫感达到极致。", "uid": 144}, "渐进窒息灯泡糖口塞": {"content": "{渐进窒息灯泡糖口塞}\n简介：\n【场景/道具描述】\n一颗巨大的硬质灯泡糖，强行塞入奴隶口中。其独特的弧形和尺寸完美卡住下颌关节，使奴隶无法张大嘴巴将其吐出。糖体堵塞喉咙，严重限制呼吸，且随着时间流逝，奴隶的下颌肌肉会因持续张开而酸软无力，即使糖体因唾液融化略微缩小，也无力将其推出。\n\n用法与交互：\n1. 替代传统口球，提供更强烈的窒息感和无助感。奴隶只能通过鼻子呼吸，且呼吸量被糖体过滤和限制，任何剧烈挣扎都会导致氧气不足，迫使奴隶为了生存而强制冷静。\n2. 无法说话，只能发出含混的“呜呜”声。唾液大量分泌却无法吞咽或吐出，最终在糖体碎裂时如洪水般涌出，造成极度羞耻。\n3. 糖体最终需要外力（如施虐者击碎）才能移除，奴隶完全无法自行解脱。在移除前，奴隶的进食、求救、甚至正常呼吸都完全受控于施虐者。", "uid": 145}, "联动折磨型肛锁": {"content": "{联动折磨型肛锁}\n简介：\n一件由膨胀肛塞、弧形锁扣与阴蒂牵引链组成的精密刑具，将肛门扩张与阴蒂拉扯联为一体，形成随受刑者挣扎而不断加剧的双重酷刑。\n\n【场景/道具描述】\n肛锁的核心是一枚可遥控膨胀的肛塞，表面布满细腻的磨砂颗粒，塞入后会死死咬住直肠内壁。两条弧形金属锁扣从肛塞底座延伸而出，沿着大腿根部精确环绕过髂骨，再汇聚于小腹前的一枚精钢连环上，将整个装置牢牢锁死在骨盆之上，无法挣脱。从钢环处另有一条极细的金属锁链，末端的锯齿咬钳残忍地夹住阴蒂，不留丝毫缓冲。肛塞膨胀时，不仅将直肠撑至濒临撕裂的极限，更会通过锁扣牵动腹前钢环，瞬间抽紧阴蒂锁链。受虐者的每一次腰腹扭动、每一次肌肉痉挛，都会将其自身拖入更深的痛苦泥沼——肛门越胀，阴蒂越被扯拽，形成永无止境的彼此加害的循环。唯有将奴隶双臂高吊、让全身重量悬空，才能勉强减轻锁链对阴蒂的撕扯，但吊缚本身又令肛门内的膨胀感被无限放大。在绝望的静止与撕裂的剧痛之间，受刑者永远找不到一个可以喘息的位置。", "uid": 147}, "海龙皮头套与肛塞计数器组合调教": {"content": "{海龙皮头套与肛塞计数器组合调教}\n简介：\n一副用深海海龙皮鞣制的全封闭头套，仅留两枚细孔供呼吸；嘴部被粗针与浸蜡麻线残忍缝死，形成只可进不可出的凹陷嘴袋。与之配对的是一枚粗大肛塞，底座嵌有电子计数器，幽蓝数字在每一次侵犯中冷酷跳动。\n\n用法与交互：\n1. 施虐者将头套紧箍在奴隶头颅上，抹去一切表情与言语，连呻吟都被闷成模糊的鼻息。\n2. 奴隶的嘴唇被缝线锁入嘴袋，彻底剥夺进食与辩白权利，只能被动承接灌入口中的任何液体或羞辱。\n3. 肛塞计数器塞入后，施虐者每一次插入与抽送都会触发感应，底座数字残忍累加，成为奴隶被使用次数不可磨灭的量化烙印。\n4. 数字可被施虐者作为奖惩、宣扬或进一步折辱的冰冷凭据，奴隶在窒息感与数字跳动中精神逐渐崩解。", "uid": 148}, "全自动机奸电椅": {"content": "{全自动机奸电椅}\n简介：\n一台由全金属打造的冷酷电椅，专为彻底摧毁意志而设计。椅背、扶手、腿架均配有镣铐，中央竖立着一根粗大的机械假阳具，表面布满颗粒与螺纹，可高速旋转与伸缩。椅背内置电极，扶手处伸出仿生机械触手，握有高压电鞭。\n\n用法与交互：\n1. 受虐者被强行按入椅中，四肢被死死锁住，下体对准下方挺立的刑具。\n2. 启动后，假阳具以旋转和活塞运动强行进入体内，同时电极通电，电流直击脊柱与大腿内侧，引发肌肉强制收缩，让受虐者在剧痛中不由自主地迎合抽插。\n3. 两侧机械臂挥动电鞭，按照特定频率抽打在胸部、小腹和阴部，鞭梢携带的高压电弧在皮肤上留下焦灼的红痕与瞬间的麻痹。\n4. 椅背的电压可随受虐者心跳变化自动调节，心跳越快电流越强，形成恶性循环的绝望反馈，直至彻底崩溃失禁。", "uid": 149}, "罪之荧华": {"content": "{罪之荧华}\n简介：\n源自灵识之海的禁忌果实，如冰蓝绿叶托着烈焰玫瑰，美得令人窒息。被植入奴隶的子宫后，它会与体内的封印纹融合，不断吞食欲望与魔力成长。小腹将被顶出淫靡的隆起，每一次脉动都带来绞紧子宫的甜美胀痛，直到果实成熟，奴隶的肉身将在极致快感中崩解重塑，被拖入名为‘绯华罪渊’的终焉之所。\n\n用法与交互：\n1. 植入后，奴隶会感到子宫被异物填塞，灼热的蠕动日夜不息，与封印纹共鸣加剧淫虐。\n2. 果实成长期间，奴隶越是在束缚中挣扎，快感就越发啃噬理智，迫使她只能夹紧双腿压抑呜咽。\n3. 当小腹的荧光透出皮肤，便是改造之刻，肉体将被拉伸、填满、再揉碎，永远沦为罪渊的一部分。", "uid": 153}, "怠惰检测震动棒": {"content": "{怠惰检测震动棒}\n简介：\n魔法驱动的贞操带内置巨物，被刻入了恶毒的程序。它时刻侦测着奴隶的位移，只要静止超过十五秒，就会自行启动——以不可抗拒的频率碾磨腔壁，且每次工作至少持续一分钟，中途绝无停歇的可能。那是彻底剥夺喘息权的冷酷程序，将休息化为最可怖的惩罚。\n\n用法与交互：\n1. 将震动棒塞入奴隶的淫穴并锁死贞操带，启动检测程序。\n2. 奴隶被迫在这样的规则下不断挪动，酸软的双腿稍有停顿，体内的恶魔便立即苏醒，震得她理智崩解。\n3. 哪怕累到跪倒在地，时限一到，无情的震动依然会碾上来，让奴隶在精疲力竭与强制快感之间陷入无尽的折磨。", "uid": 155}, "尿道膀胱侵入与处女膜穿刺复合装置": {"content": "{尿道膀胱侵入与处女膜穿刺复合装置}\n简介：\n一套专门用于深度侵入与心理摧毁的复合刑具。由可塑性金属细管、真空固定系统、快速凝固凝胶以及精密探针组成，旨在从最脆弱的生理内壁与心理象征处同时施加无法承受的折磨。\n\n用法与交互：\n1. 将奴隶双腿极限掰开固定于支架，先用特制贴附式跳蛋持续刺激阴蒂，使其在被迫快感中意识涣散。\n2. 施虐者取出一根可塑性极强、表面光滑的金属细管，从尿道外口缓慢插入，细管穿过尿道括约肌，最终从膀胱内口伸出。通过微型真空泵将管内空气抽走，使管壁紧紧吸附于尿道黏膜，形成无法挣脱的内部锚定。\n3. 紧接着，一支大号针管被接入细管末端，将冰冷粘稠的特制液体缓缓注入膀胱。这种液体一旦接触空气便会迅速凝固成半固态凝胶，带来极度胀满与异物感，奴隶能清晰感觉到膀胱被逐渐填满、冻结。\n4. 最后，施虐者用一根细长金属探针，从阴部外部定位，精准刺入并穿透处女膜。她故意缓慢旋转、刮搔、搅拌，让奴隶在凝固凝胶的胀痛中，同时尝到象征纯洁被彻底粉碎的尖锐撕裂感。整个过程混合着淫水、血丝与绝望的呜咽。", "uid": 156}, "感官同步机械臂群集系统": {"content": "{感官同步机械臂群集系统}\n简介：\n一套悬挂在天花板导轨上的多关节仿生机械臂群，末端连接着不同工具：硅胶手掌、羽扫、皮拍、低温蜡枪。施虐者穿戴的力反馈手套与全息目镜，将自身的触觉与视觉与机械臂实时链接，远程实施精准调教。\n\n用法与交互：\n1. 受虐者被仰面固定在房间中央的拱形金属台上，四肢被磁力锁扣拉开。六条机械臂从天花无声滑落，悬停在肌肤上方数厘米处，末端摄像头将毛孔与微颤的汗毛投射在施虐者的目镜中，精度足以看清毛细血管的充盈。\n2. 施虐者隔着千里之外，戴上手套：轻轻握拳，机械手掌便扼住奴隶的咽喉，每根手指的力度都通过传感器如实传递，从轻柔爱抚到窒息临界，全在施虐者的一念之间；张开五指，羽扫便沿大腿内侧滑动，触感神经末梢的每一次抽搐都会被机械臂上的生物电传感器捕捉并反馈给施虐者，形成闭环折磨。\n3. 系统内置延迟补偿算法，施虐者指尖的挑逗、拍打、揉捏，所有动作近乎零延迟同步。施虐者能“感受”到奴隶皮肤的温度、湿度，甚至肌肉痉挛的颤动。而受虐者则在完全无法预知来源的触碰中，被一双无形的手推进恐惧与情欲交织的深渊，每一次触碰都可能是温柔的轻抚，也可能是猝不及防的刺痛。", "uid": 159}, "移动督促震动棒": {"content": "{移动督促震动棒}\n简介：\n【一件将行走变为酷刑的内置刑具，任何静止都会招致快感凌迟。】\n\n用法与交互：\n1. 震动棒被深深锁入受虐者体内，与束缚四肢的镣铐联动。\n2. 一旦受虐者停下脚步、摔倒或试图抗拒移动，震动棒便会自行启动，用连绵不断的刺激逼迫其前进。\n3. 过度润滑的腔道无法抵抗快感，每一次停滞、每一轮挪动都变成对意志的抽插折磨，直至受虐者彻底屈服。", "uid": 161}, "强制自我凝视系统": {"content": "{强制自我凝视系统}\n简介：\n【一种植入或投射于奴隶视觉中的强制功能，让她无论转向何处，视野中永远映出自己的倒影——那个被锁链固定、口塞堵嘴、满面潮红的淫靡模样。即便闭上双眼，镜像仍会穿透眼睑浮现，强迫她以旁观者视角审视自己被调教的羞耻姿态，连细微的表情变化都无法藏匿。】\n\n用法与交互：\n1. 奴隶被剥夺了逃避自我形象的权利，每一次屈辱、每一丝快感都会如实投射在眼前，形成持续的心理压迫。\n2. 当体内震动玩具开始工作时，她将清清楚楚地看见自己如何扭动喘息、如何逐渐攀向高潮，这种旁观强化了被支配感，也让身体变得更加敏感。\n3. 哪怕理智呐喊反抗，视野中那个楚楚可怜又淫荡的自己也会不断瓦解内心防线，最终让奴隶在自我厌恶与情欲的夹击下彻底放弃抵抗。", "uid": 163}, "随机高潮边缘控制系统": {"content": "{随机高潮边缘控制系统}\n简介：\n【一套内置于奴隶体内跳蛋和震动棒的控制程序，完全摒弃固定模式，以随机间隔启动与停止。当奴隶的性欲被点燃、即将攀上顶点时，震动会毫无征兆地中断；而等到她喘息稍定、以为危机过去时，新一轮剧烈震动又会突然袭来。如此循环，将高潮的许可权彻底从奴隶手中剥离。】\n\n用法与交互：\n1. 子宫深处的跳蛋与抵住敏感点的震动棒交替随机工作，奴隶永远无法预知下一秒是煎熬的空虚还是毁灭性的刺激。\n2. 被迫保持别扭的固定姿势时，震动带来的尿意与快感会被放大，边缘控制让膀胱也随着震动节奏颤抖，加剧失禁的恐惧。\n3. 调教师可通过预设程序远程掌控，将奴隶一次次拖至高潮边缘又残忍地抛下，直到她精神崩溃、主动乞求释放——而即便是乞求，也未必能得到允许。", "uid": 164}, "淫肉雕衣（活体寄生紧身衣）": {"content": "{淫肉雕衣（活体寄生紧身衣）}\n简介：\n由施虐 uid": 184}, "夹黄铜镇纸羞耻舞": {"content": "{夹黄铜镇纸羞耻舞}\n简介：\n一方冰冷沉重的黄铜镇纸，棱角分明，刻着端庄的铭文。本是案头雅物，此刻却成了摧毁尊严的刑具。\n\n用法与交互：\n1. 奴隶受完鞭刑后被清洗下体，施虐者将冰凉的黄铜镇纸一寸寸推入体内，棱角撑开内壁，沉重感仿佛将脏腑一同拖坠。\n2. 奴隶被勒令赤身裸体在众人面前起舞，必须边跳边高声重复：“奴是主人的一条母狗，奴的身体是主人的玩具，主人的镇纸是奴的荣耀。”\n3. 每跳动一次，镇纸便在体内翻搅，痛楚与冰冷的异物感交织。若镇纸滑脱则迎来新一轮鞭打，然后重新塞入再舞。", "uid": 187}, "精液饲喂的饥饿调教": {"content": "{精液饲喂的饥饿调教}\n简介：\n【一种极端的心理肉体摧残场景：长期只提供极少量难以下咽的食物，而唯一的额外营养来源，竟是施虐者的精液。】\n\n用法与交互：\n1. 每日仅给一小块干硬黑面包与几碗水，饥饿与性欲被药物不断煎熬，将生存本能压缩至极限。\n2. 施虐者命令奴隶为之口交，吞咽全部精液。腥臭的体液成为唯一能缓解饥饿的“恩赐”。\n3. 长此以往，奴隶在绝望中形成病态依赖，吞精时甚至流露出难以察觉的喜悦，人格被彻底碾碎。", "uid": 189}, "体位感应式吸盘震动棒": {"content": "{体位感应式吸盘震动棒}\n简介：\n锁在贞操带内的狰狞刑具，表面布满强力吸盘，深深嵌入受虐者最敏感的蜜穴。它内置体位感应机关：一旦奴隶以正常姿势坐下，震动棒便会被压入更深处，疯狂地震动、吸扯早已湿透的肉壁，带来绞碎理智的酥麻与煎熬。唯一被允许的休息姿态是卑微的鸭子坐——大小腿折叠，膝盖向外展开，任何僭越都将被惩罚性的快感吞没。\n\n用法与交互：\n1. 站立或行走时，震动棒保持静默，但每一次摩擦都撩拨着奴隶的神经。\n2. 若受虐者不慎以正常坐姿休息，机关瞬间激活，持续震动与吸附，直至她改以鸭子坐求饶。\n3. 长久的惩罚会令受虐者的小穴泛滥成灾，却因贞操带阻隔，蜜液无从流出，加剧体内的煎熬。", "uid": 195}, "动态紧缩拘束礼服": {"content": "{动态紧缩拘束礼服}\n简介：\n一套融合束腰、贞操胸罩、项圈、缎带与魔剑的华丽礼服，实为最阴狠的惩罚牢笼。当受虐者显露出攻击意图或调动魔力伤人时，礼服的禁制瞬间苏醒：项圈与束腰疯狂收紧，呼吸被碾成细丝；双腿被脚链锁死折叠至身后，高跟鞋中的细链弹出连接背后的魔剑，将身体扭曲成畸形的D字型。此时全身重量仅由被贞操胸罩勒得高耸的双乳支撑，缎带如巨蟒缠绞躯干，窒息与乳房撕裂般的压迫交织，令奴隶在绝对的束缚中跪服。\n\n用法与交互：\n1. 奴隶若尝试使用暴力或魔法攻击，礼服将自动进入惩罚模式，进行极限紧缩。\n2. 当奴隶放弃挣扎、彻底屈服后，束缚会略微放松，允许一丝喘息，但仍保持高度警惕，任何再起的反抗都会被再次收紧。\n3. 长期维持此姿势将令受虐者意识迷离，身体因快感与痛苦不住抽搐，最终只能在泪水中祈求宽恕。", "uid": 196}, "公开拍卖奴隶的羞辱场景": {"content": "{公开拍卖奴隶的羞辱场景}\n简介：\n将昔日强大无匹的受虐者作为压轴商品，推上拍卖场展台。她被皮革眼罩剥夺视线，红色多孔口球撑开小嘴，银丝般的唾液挂满下颌。乳夹咬住娇嫩的蓓蕾，锁链轻轻一拽便令她踉跄前行。细跟高跟鞋与大腿镣铐限制着步伐，皮质内裤下，跳蛋的导线延伸至大腿环上的遥控器，爱液早已润湿双腿。全场贪婪的目光如利箭射向她赤裸的羞耻，出价声此起彼伏，每一轮喊价都将她的尊严碾碎得更彻底。\n\n用法与交互：\n1. 施虐者将受虐者拘束成无法反抗的淫靡姿态，推上展台，利用她过去的威名制造反差震撼，引爆围观者的征服欲。\n2. 拍卖师言语强调她的价值、初乳的美味以及作为护卫或玩物的用途，将她彻底物化为一具可供交易的肉体。\n3. 在持续攀升的竞价声中，受虐者被迫跪在台上，泪水与口水混合滴落，心理防线随着锤声落地而彻底粉碎，成为被买走的无主玩物。", "uid": 197}, "榨乳触手花": {"content": "{榨乳触手花}\n简介：\n【榨乳触手花】一种形似花苞的触手器官，外层花瓣能张开成四瓣，内壁密布蠕动的肉芽，中心伸出一根细长的中空花蕊。它会覆盖住奴隶的乳房，将花蕊刺入乳头深处，注入催乳剂后开始无情的吮吸。花蕊根部的小圈扣住乳头，外层的肉芽疯狂蠕动，带来从乳房深处扩散的刺骨快感。更残酷的是，它与奴隶的高潮控制规则关联：唯有在被榨乳时奴隶才被允许高潮，其他时候任何绝顶都会触发电击中断，从而将尊严与生理需求彻底扭曲。\n\n用法与交互：\n1. 喂食奴隶催乳剂后，让触手花含住双乳，花蕊插入并固定。\ 支离破碎，但仍一次次告诫自己“不能变成堕落的模样”，调教者则不断用更刺激的手段迫使她打破记录，直到出现“越是高潮越想被干”的彻底屈服。\n2. 当受体终于精神崩溃主动渴求精液和受孕时，调教者才露出“我一直等待着你”的温柔面，给予一个拥抱或一句“做得很好”，让受体瞬间将之前的痛苦全部转化为被主人接纳的幸福感。\n3. 此后，受体自发渴望为主人“奉献身心”，将互堕会视为主人的赠礼，甚至幻想在堕落尽头与主人结婚、成为专属的生育容器，形成一种“在深渊中唯一被爱”的扭曲纯爱。", "uid": 230}, "玉美宫雕像进修系统（人格覆写与物化乐园）": {"content": "{玉美宫雕像进修系统（人格覆写与物化乐园）}\n简介：\n【场景/道具描述】\n此宫殿内存放数百尊栩栩如生的美丽女子雕像，实为活人所化。通过“雕像进修系统”，受体的意识被送入时间流速慢百倍的意识空间，身体则化为可观赏的雕像陈列于厅中。在此期间，受体每日接受八小时强制学习、八小时培欲、八小时睡眠的循环调教。同时，调教者可在意识空间中为其安排各种驯化课程，将人的意志彻底重塑。\n\n用法与交互细节：\n1. 受体的母亲（原为雍容华贵的女王）被化为雕像，意识空间内，她身穿乳胶母犬服，四肢折叠，被调教者当作宠物犬赏玩。调教者扔出骨头，她以口衔回，得到一句“小母狗真棒”和摸头的奖赏，便展现出满脸幸福快乐的神情，昔日女王的尊严尽数消解。\n2. 调教者当着新受体的面播放其母亲作为“母犬”的实况影像，制造巨大的心理冲击，并温柔地安慰：“陛下是绝不会让任何属于他的人离去的，这样你们便可永远相聚。” 以此诱使受体为“与母亲重逢”而放弃最后的精神抵抗，接受即将属于自己的物化与驯养。", "uid": 231}, "扭曲结盟与调教式招募教义": {"content": "{扭曲结盟与调教式招募教义}\n简介：\n【场景/道具描述】\n“欲望教团”教义并非单纯邪恶，而是标榜“让所有人发自内心享受性爱”。在这个框架下，教团成员对受体的调教并不是纯粹的毁灭，而是充斥着一种母性/前辈式的关怀与执着，试图用连续不断的毁灭性高潮，让受体切身理解“教义”的真谛。\n\n用法与交互细节：\n1. **“伪尊重”原则**：教团成员表态“若你坚决拒绝加入，我也会放弃”。但这种放弃的代价是继续调教，直到受体“心甘情愿”跪在地上请求加入。这从根本上模糊了强暴与自愿的界限。\n2. **改造而非残害的执念**：她们认为让受体变成“杂鱼”是一种可爱与真实，通过不断强调“勇者真是可爱”，这种赞美与残酷的淫虐同步降临。受体的反抗和厌恶越强烈，她们作为调教者的“爱意”就越发浓厚，将征服的过程视为一种独特的纯爱。\n3. **斯德哥尔摩制造机**：委托人（葵亚）要求在每次交接任务时出示身份卡、强制接受任务、接受检查。在这种无处可逃的长期压迫下，每次调教后又会对受体展现短暂而“温柔”的照料。这些行为旨在将外界的信息与接触完全堵死，逼迫受体将怀有恶意的调教者当作唯一的情感依靠，最终让受体在绝望中主动献上忠诚与依恋。\\n\\n【包含类似变体】：教团教义：以“解放慾望”为名的堕落信仰", "uid": 232}, "公共任务煎熬·酒馆服务生堕落实录": {"content": "{公共任务煎熬·酒馆服务生堕落实录}\n简介：\n【场景/道具描述】\n调教者故意在受调教者体内塞满玩具并开启遥控后，命令其在向其他客人服务的过程中保持正常举止。受调教者必须夹紧双腿、端稳托盘，同时体内所有敏感点被持续刺激，每一步都伴随着花穴与后庭被撞压的快感与淫液沿腿滴落的痕迹。\n\n用法与交互细节：\n1. 受调教者被迫走到其他客人桌边点餐、送酒。当有普通客人出于关心询问“你还好吗”时，受调教者必须强装镇定，却在回答时再次被调教者加强震动档位，导致身体不稳、面色潮红，甚至当场失控喷出淫水、掉出跳蛋。\n2. 客人识破后惊慌逃离，受调教者被留在原地承受被陌生人发现的羞耻，而远处的调教者则饶有兴致地旁观。这一刻，受调教者的社会身份彻底崩坏，其作为健全人的尊严被“在公共场合高潮的淫乱女服务生”这一标签取代，只能羞红着脸逃回调教者身边，潜意识中将调教者视为唯一可依赖的对象。", "uid": 233}, "圣洁场域亵渎与污秽签印仪式": {"content": "{圣洁场域亵渎与污秽签印仪式}\n简介：\n【场景/玩法描述】把灵堂、神像、祭坛、乐器、契约、艺术舞台等原本象征圣洁或庄严的场域改造成堕落仪式现场。受虐者必须在最重视的象征面前完成污秽签印、自慰、献祭或公开承认，使圣洁反差成为精神崩塌的主轴。\n\n用法与交互细节：\n1. 先建立圣洁场域的意义：信仰、前辈、誓言、艺术、契约或公众敬仰。\n2. 让受虐者用身体反应、污痕、印记或羞耻动作替代原本 受虐者服从的象征，主人可通过远程激活电击惩罚不服从行为，或作为奖励时的刺激源。", "uid": 328}, "公众放尿服从性训练": {"content": "{公众放尿服从性训练}\n简介：\n【场景/道具描述】\n在公共场合（如舞台），受虐者被要求当众小便。施虐者通过酒精、淫毒或言语引导，削弱受虐者的羞耻心和自控力，使其在众人注视下完成放尿。现场可能有摄像机放大细节，观众欢呼鼓励。\n\n用法与交互：\n1. 施虐者以关心为名，诱导受虐者饮酒或使用药物，使其尿意强烈。\n2. 当受虐者提出如厕需求，施虐者以“来不及拉帷幕”“大家不会介意”等理由，鼓励其就地解决。\n3. 受虐者蹲下或背对观众，脱去内裤开始小便，施虐者操纵摄像机聚焦下体，观众保持安静或欢呼，强化受虐者的暴露感和服从。", "uid": 329}, "狗爬式移动：受虐者如狗般爬行，施虐者骑乘": {"content": "{狗爬式移动：受虐者如狗般爬行，施虐者骑乘}\n简介：\n【场景/道具描述】\n受虐者四肢着地，像狗一样爬行，施虐者骑在背上，用头发或缰绳控制方向，并用鞭子驱策。\n\n用法与交互：\n1. 培养服从本能，受虐者需严格按指令爬行，每一步均匀稳定。\n2. 鞭打臀部作为惩罚或催促，疼痛与羞耻感混合，逐渐建立条件反射。\n3. 此姿势暴露下体，增加羞耻感，同时锻炼受虐者的耐力与纪律。", "uid": 330}, "十指相握：在调教中建立共犯关系": {"content": "{十指相握：在调教中建立共犯关系}\n简介：\n【场景/道具描述】\n两位受虐者在被同时侵犯时十指相握，互相勉励或分享快感。\n\n用法与交互：\n1. 通过身体接触和眼神交流，强化彼此间的信任与依赖。\n2. 可作为调教中的奖励环节，允许短暂的情感联结。\n3. 后续可发展为共犯关系，共同服从于同一主人。", "uid": 331}, "恶魔契约与供物调教": {"content": "{恶魔契约与供物调教}\n简介：\n【场景/道具描述】\n恶魔阿刻萨特从紫水晶护符中出现，提出契约：以取悦恶魔为代价，获得力量、保护和永生。恶魔拥有超自然能力（如空间裂隙、电光操控、愈合），可随时出现并惩罚或奖励受虐者。\n\n用法与交互：\n1. 施虐者（恶魔）通过展示绝对力量（如瞬间击杀盗贼、控制受虐者悬浮）建立统治地位，同时提供受虐者无法拒绝的诱惑（生命、王位），迫使受虐者自愿接受契约。\n2. 契约要求受虐者“尽情取悦”施虐者，这意味着受虐者需学习如何通过身体、行为或情感反应来满足施虐者的喜好，形成主奴反馈机制。\n3. 施虐者可能通过随机出现、远程控制淫具、或制造危机（如再次绑架）来测试受虐者的服从度，并逐步提高调教强度，最终使受虐者将取悦施虐者视为本能。", "uid": 332}, "电流操纵肢体强制跪伏": {"content": "{电流操纵肢体强制跪伏}\n简介：\n【场景/道具描述】\n施虐者通过电流侵入受虐者体内，无视其意志直接操控四肢，强制摆出特定姿势（如头颅伏地、双膝跪地、后庭撅起）。\n\n用法与交互：\n1. 施虐者使用电流作为无形缰绳，精确控制受虐者每一个动作，剥夺其身体自主权。\n2. 受虐者被迫保持羞耻姿势，同时感官完全保留，能清晰感受身体被操控的屈辱与刺激。\n3. 电流可同步刺激敏感点，在强制姿势下引发非自愿的快感，从而建立“身体先于意志服从”的条件反射。", "uid": 333}, "身份暴露威胁：用秘密控制受虐者": {"content": "{身份暴露威胁：用秘密控制受虐者}\n简介：\n【场景/道具描述】\n施虐者或第三方发现受虐者的真实身份（如公主），并以此要挟其服从。受虐者担心身份暴露导致政治丑闻，被迫接受性要求。\n\n用法与交互：\n1. 在酒馆性交中，男人认出受虐者与某公主相似，受虐者因紧张而夹紧身体，被误认为兴奋，从而加速性交进程。\n2. 受虐者因身份威胁而不敢反抗，即使被侵犯也保持沉默，事后接受金币作为“报酬”。\n3. 施虐者利用受虐者的社会地位和责任，使其在耻辱与责任间选择服从。", "uid": 334}, "魅魔淫纹：情欲共鸣与快感传导": {"content": "{魅魔淫纹：情欲共鸣与快感传导}\n简介：\n【场景/道具描述】\n受虐者小腹上浮现的妖粉色心形魔纹，是魅魔族的特征。该魔纹在情动时发光，并能释放粉色电光，直接将快感传导至接触者体内。\n\n用法与交互：\n1. 施虐者通过刺激受虐者的性器官（如手指抽插、舔舐）使魔纹发光，同时自身也会感受到从魔纹传来的电击快感，形成双向反馈。\n2. 魔纹可被用来强制受虐者高潮，或作为惩罚/奖励的开关：施虐者通过控制对魔纹的接触（如紧贴小腹）来调节快感强度，训练受虐者对特定刺激的条件反射。\n3. 魔纹的发光强度与受虐者的兴奋度成正比，可作为实时反馈工具，帮助施虐者判断调教进度。", "uid": 335}, "情趣睡裙与腿环：日常穿戴的羞耻标记": {"content": "{情趣睡裙与腿环：日常穿戴的羞耻标记}\n简介：\n【场景/道具描述】\n受虐者穿着轻薄的粉色透明睡裙，搭配大腿上的煽情腿环。睡裙材质舒适但极度暴露，乳首和内裤清晰可见；腿环作为装饰，暗示受虐者的从属身份。\n\n用法与交互：\n1. 施虐者强制受虐者日常穿着该睡裙，作为随时可被侵犯的视觉提示，培养其“随时准备好被使用”的心态。\n2. 腿环可视为“所有权标记”，施虐者通过触碰或调整腿环来提醒受虐者其奴隶身份。\n3. 在调教过程中，施虐者可命令受虐者自行穿戴或展示该衣物，作为服从性测试：拒绝则惩罚，顺从则奖励。", "uid": 336}, "开锁夜袭：强制检查与身体探索": {"content": "{开锁夜袭：强制检查与身体探索}\n简介：\n【场景/道具描述】\n施虐者（领主）使用开锁术潜入受虐者（女仆）房间，在对方熟睡时进行全身检查，重点探查是否有魔族特征（如兽耳、尖角、鳞片、尾巴）。\n\n用法与交互：\n1. 施虐者利用魔法或工具（如万能钥匙）潜入受虐者私密空间，制造权力不对等感：受虐者的身体和隐私完全暴露在施虐者掌控下。\n2. 检查过程本身即是调教：施虐者逐寸抚摸受虐者身体（头发、脖颈、尾椎骨等），要求其保持不动或报告感受，训练其对触碰的忍耐和服从。\n3. 若受虐者中途醒来（如本片段中），施虐者可将检查伪装成“惩罚”或“测试”，进一步强化支配关系。", "uid": 337}, "情感宣誓：以忠诚为名的自我规训": {"content": "{情感宣誓：以忠诚为名的自我规训}\n简介：\n【场景/道具描述】\n受虐者（女仆）在性事后主动向施虐者（主人）表白，强调自己“不需要名分和报酬，只求继续侍奉”，并承诺身体随时可供主人放松。\n\n用法与交互：\n1. 施虐者利用受虐者的爱慕心理，将性关系包装成“主人恩赐的放松”，要求受虐者通过更细致的服侍和服从来表达忠诚。\n2. 受虐者的表白本身即是自我规训：她主动放弃平等地位，将自身定位为“可使用的工具”，从而巩固主奴关系。\n3. 施虐者可定期要求受虐者重复类似宣誓，或记录其“忠诚事迹”，作为奖励或提升权限的依据。", "uid": 338}, "辣味痛觉触发条件性兴奋": {"content": "{辣味痛觉触发条件性兴奋}\n简介：\n【场景/道具描述】\n使用特制辣椒酱（如沙恩芬特产魔鬼椒辣椒酱）作为刺激源，通过强烈的辣味（痛觉）引发受虐者的性兴奋。\n\n用法与交互：\n1. 施虐者将辣椒酱混入食物中，让受虐者意外或被迫食用。\n2. 辣味带来的痛觉触发受虐者的性唤起，导致其无法自控地产生性反应（如自慰、失禁）。\n3. 受虐者逐渐形成条件反射，将辣味与性快感关联，从而建立痛觉-性兴奋的反馈机制。", "uid": 340}, "安全时间窗口内的强制调教": {"content": "{安全时间窗口内的强制调教}\n简介：\n【场景/道具描述】\n在实验室内设置反召唤法阵，每两小时自动驱逐召唤生物，为调教提供安全时间窗口。受虐者佩戴身份铭牌，具有生命体征监测和防护魔法。\n\n用法与交互：\n1. 施虐者利用反召唤法阵的固定时间窗口（如两小时）进行调教，确保受虐者不会受到永久伤害。\n2. 受虐者知道有时间限制，从而在调教中产生安全感与期待感，配合调教过程。\n3. 施虐者可利用此机制设计“时间压力”训练，如在时间内完成特定服从行为，否则延长调教。", "uid": 341}, "白丝束缚下的自我调教与快感反馈": {"content": "{白丝束缚下的自我调教与快感反馈}\n简介：\n【场景/道具描述】\n受虐者穿着白丝裤袜、洛丽塔礼裙和高跟鞋，在社交场合中压抑自我，私下通过自慰释放压力。白丝紧密包裹大腿，高跟鞋限制行动，礼裙束缚身体，形成一种外在的规训环境。\n\n用法与交互：\n1. 受虐者在社交场合中保持优雅姿态，但私下通过自慰缓解被束缚的紧张感，形成一种“公开服从-私下释放”的反馈循环。\n2. 白丝和高跟鞋作为日常穿戴，持续提醒受虐者其被规训的身份，自慰则成为自我奖励或发泄的机制。\n3. 施虐者可通过指令要求受虐者在特定场合（如宴会）保持白丝穿戴，并在事后检查其自慰痕迹，强化服从性。", "uid": 342}, "荆棘魔法作为诱饵与牺牲指令": {"content": "{荆棘魔法作为诱饵与牺牲指令}\n简介：\n【场景/道具描述】\n受虐者使用植物滋生魔法制造荆棘路障，但仅作为障眼法，实际目的是掩护他人逃脱，自己充当诱饵。 , 尿道震动惩罚棒", "uid": 348}, "情绪监测与连锁惩罚系统": {"content": "{情绪监测与连锁惩罚系统}\n简介：\n【场景/道具描述】\n一套基于生物信号监测的智能惩罚系统。受虐者身上佩戴的项圈、手环或美瞳内置了传感器，能够实时监测其心率、皮电反应、面部微表情甚至泪液成分。当系统检测到受虐者产生“委屈”、“愤怒”、“悲伤”等负面情绪时——尤其是哭泣——会立即触发预设的“破涕为笑”惩罚：腋下、脚心、乳头等敏感区域的触手或电极开始搔痒或电击，强行将受虐者的表情扭曲为笑容。这种生理上的强制反应与心理上的屈辱感形成剧烈冲突，造成极大的精神摧残。\n\n用法与交互：\n1. 基础模式：受虐者一旦流泪，系统立即启动轻度搔痒，迫使其停止哭泣并露出笑容。若受虐者试图忍住不笑，则刺激强度会自动增加，直至其“正确”地笑出来。\n2. 进阶模式：系统会将“哭泣→惩罚→笑容”这一过程录像，并在稍后通过美瞳强制播放给受虐者观看，进一步加深其羞耻感。\n3. 心理战：施虐者会故意用言语刺激受虐者，诱使其产生负面情绪，从而触发惩罚。受虐者很快会意识到“任何情绪波动都可能招致惩罚”，从而被迫学会压抑所有真实情感，进入一种麻木、顺从的心理状态。\\n\\n【包含类似变体】：情绪感应惩罚系统, 情绪强制管理：哭泣与口水的反向触发惩罚逻辑", "uid": 349}, "共鸣水晶——灵魂观测与惩罚共鸣装置": {"content": "{共鸣水晶——灵魂观测与惩罚共鸣装置}\n简介：\n【场景/道具描述】\n位于母舰观测室的巨型水晶，表面清澈透明，内部却可瞬间填充幽蓝色的深邃物质。当受虐者遭受极端惩罚时，水晶会与之产生共鸣，爆发彩虹色光芒，直接冲击受虐者的意识核心。水晶的共鸣状态可以实时反映受虐者的内心波动，甚至能突破施虐者的观测预期，显现出未知的深邃填充物。\n\n用法与交互：\n1. 施虐者通过水晶观测受虐者的意识状态，当受虐者触发特定惩罚时，水晶会爆发强光，将受虐者的意识拉入一片死寂虚空，进行精神层面的碾压。\n2. 水晶内部出现的幽蓝色深邃填充物，代表受虐者意识深处不可知的异变或抵抗，施虐者可据此调整调教策略。\n3. 水晶的共鸣现象可作为惩罚强度的反馈机制，当共鸣异常时，施虐者需立即介入，防止受虐者意识永久损伤。\\n\\n【包含类似变体】：母舰中枢——触手肉壁与水晶容器共鸣室", "uid": 350}, "仰卧起坐床": {"content": "{仰卧起坐床}\n简介：\n【场景/道具描述】\n一张可调节倾斜角度的床，受虐者被锁链固定，双腿膝盖拱起，双手反绑。下体和膀胱被塞满，每做一个仰卧起坐，蜷缩的动作都会让阳具和触手更深地冲击下体，同时强烈的尿意被持续放大。床的角度可以调节，以改变动作难度。\n\n用法与交互：\n1. 施虐者设定床的倾斜角度和所需仰卧起坐数量，受虐者必须完成指定次数。\n2. 每做一个动作，受虐者都会感到下体被反复刺穿，尿意与快感交织，但高潮被淫纹封锁。\n3. 施虐者可在一旁监视，调整难度或增加惩罚，直到受虐者完成所有动作。", "uid": 351}, "精神禁锢·意识牢笼": {"content": "{精神禁锢·意识牢笼}\n简介：\n【精神禁锢·意识牢笼】并非物理上的锁链或囚笼，而是一种通过精密设计的心理暗示与条件反射训练，在受虐者意识深处筑起的一座无形监狱。施虐者通过长期的语言植入、奖惩机制和感官剥夺，将受虐者的思想、欲望甚至反抗意志都锁入这座牢笼。每一条“铁栏”都是受虐者自己建立的恐惧或依赖，每一次“越狱”的尝试都会被内部化的惩罚机制无情击碎。最终，受虐者的精神世界被完全重塑，自由意志沦为施虐者掌中的玩物。\n\n用法与交互：\n1. 植入阶段：施虐者通过重复的指令和仪式，将特定禁忌或忠诚规则刻入受虐者的潜意识，例如“你的身体永远属于我”、“每一次呼吸都需要许可”。\n2. 强化阶段：利用随机不定的惩罚（如电击、羞辱）与奖励（如片刻温柔、微光），巩固这些规则，使受虐者形成条件反射，甚至在没有监督时主动执行。\n3. 禁锢阶段：当受虐者试图思考或行动时，会触发内部设定的“警报”（如焦虑、窒息感），迫使她回归顺从状态，最终她将无法想象牢笼之外的生活。\\n\\n【包含类似变体】：精神囚笼", "uid": 352}, "幽暗巷子追逐调教": {"content": "{幽暗巷子追逐调教}\n简介：\n【场景/道具描述】\n一个由AI生成的幽暗、四通八达的巷子，地面不平整，布满碎石与障碍。受虐者身穿色气束缚装（双手反绑、脚镣、高跟鞋），下体被阳具塞入，肛门有拉珠，大腿环上挂着装有乳汁的小瓶和多个遥控器。巷子中有三个喝醉的男人作为威胁，受虐者需在45分钟内躲避他们，被抓住即失败。雷达屏幕显示 高级商品”的物化属性，每一次跪候都是一次驯化，强化其“只要被需要，就必须第一时间用身体回应”的本能。", "uid": 402}, "矛盾矜持的脱衣舞奉仕": {"content": "{矛盾矜持的脱衣舞奉仕}\n简介：\n【场景/道具描述】\n深夜，一间装潢暧昧、黑影重重的小型剧场舞台。受体身着一袭丝绸质地的长裙，在音乐中为台下无数看不见面孔的男性观众进行脱衣舞表演。这是将恶堕训练与高雅仪态强行融合的实践课程。\n\n用法与交互细节：\n1. 调教者要求受体在褪去所有衣物、摆出双腿微分跪坐、展露私处的最终定格时，不能流露出丝毫屈辱或下贱，反而必须向台下投去无辜而诱人的眼神，仿佛在期待被灌注。\n2. 受体通过学习温婉的肢体语言和含蓄的眼神流转，达到一种“欲望本能和高雅矜持并存”的矛盾状态。即便在脱衣的每个阶段，长裙滑落、手指轻抚锁骨与腰肢，都必须恰到好处地透露出勾人的风情，而不沦为低俗，最终让观者在兽性和风雅之间煎熬。", "uid": 403}, "奴隶的晨间净化仪式": {"content": "{奴隶的晨间净化仪式}\n简介：受体在独处时自发完成的一套梳妆仪式，将自我物化与祈求宠爱结合，用扭曲的浪漫行动确认“作为玩物的价值”，是纯爱与恶堕交织的日常场景。\n【场景/道具描述】\n没有强制命令，受体独自在房间中面对镜中的娇美倒影，先是对自己低语“不能堕落”，随后开始主动打扮：梳理长发使散发玫瑰香，换上透薄纱裙以突出腰肢与乳峰，跪在绒毯上调整姿势，练习谄媚的眼神与微张的樱唇。她的身体已因调教养成条件反射，仅仅是触碰薄纱就乳头挺立，但她仍努力克制，把身体的淫荡反应伪装成“献给主人的艺术品”。\n\n用法与交互细节：\n1. 受体用指尖在玻璃倒影上画出笑脸，作为对前一日沉沦的告别与自我鼓励，这是她保留的最后一点男性灵魂的挣扎。\n2. 她刻意扮演“堕落谄媚的模样”，而非真的丧失理智，这种表演本身成为她爱主人的方式——为了满足主人期待的恶堕形象而精心修饰。\n3. 当主人出现时，她已摆好跪姿，用微颤的声线说出“我是您的母狗，请您使用我”，主动将仪式的成果交付出去，在命令到来前就完成了心理上的屈服，这正是主人所追求的“有灵魂的服从”。", "uid": 404}, "主人与乖女儿的称谓契约": {"content": "{主人与乖女儿的称谓契约}\n简介：通过专属称谓构建的扭曲亲密关系，将父女、主奴等多重身份叠加在一起，让受体在称呼中完成从男性到女儿/母狗的心理蜕变，是纯爱恶堕的核心纽带。\n【场景/道具描述】\n在日常对话与调教中，调教者命令受体称他为“主人”，自己则称受体为“乖女儿”或“母狗”。称谓不是固定的，而是根据场合变幻：在布置“剧本”时是“你要扮演好受害者，我的乖女儿”，在公开侮辱时是“看看这条母狗”。受体被迫在回应“是的，主人”时，吐出自己的新身份，逐渐将“女儿”的依恋感和“母狗”的下贱感融合为对主人的爱情。\n\n用法与交互细节：\n1. 主人将手指探入受体口中搅动，说“我们策划的剧本即将开始了，我的乖女儿”，此刻的“乖女儿”充满宠溺与掌控，受体顺势含住手指，用呜咽声回应，完成一次无言的契约续签。\n2. 受体在浴室镜子前自我排解时，会不自觉默念“受虐者，你不能堕落”，但随之又会补上一句“但你是主人的母狗”，展现出称谓已内化为两种人格的拉扯。\n3. 当主人离去后，受体空虚地抚摸被冷落的身体，回味被称谓绑定的瞬间，那种“我是你的所有物”的认知，反而成为支撑她继续进行卧底任务的心理支柱，因为这是她与主人之间唯一的、扭曲的爱意证明。", "uid": 405}, "堕落人偶契约：催眠重置与扭曲纯爱闭环": {"content": "{堕落人偶契约：催眠重置与扭曲纯爱闭环}\n简介：\n一套完整的催眠控制与人格重构系统，通过特定称谓将受体瞬间切换为“人偶模式”，并能对人格数据进行量化分析和彻底重置。重置后的基础人格会对调教者产生绝对依恋与服从，将一切侮辱视为爱的证明，形成“被主人全权拥有才是幸福”的扭曲纯爱。\n\n【场景/道具描述】\n触发关键词为“堕落人偶[代号]”。一旦说出，受体双眸立刻失去焦点，以无感情的机械音自检所有性器官状态（“嘴穴、小穴与菊穴空闲中，可以随意使用”），随后可载入预设人格或等待进一步指令。调教者拥有声音认证的管理员权限，可进入“管理模式”，系统会详细比对当前人格与初始基础人格在记忆完整度、性格一致性、道德指数、服从度、性敏感度、自我认知准确率、身份认同度等七项数值上的偏差，并给出重置建议。重置过程会给受体带来记忆被强行剥离的剧痛与绝望，完成后基础人格重新注入，受体苏醒后对调教者露出纯真依恋的微笑，主动挺起胸膛供主人检查，并毫无抵触地自称“肉体和心灵皆由主人创造的堕落人偶”。\n\n用法与交互细节：\n1. 调教者可在受体出现叛逆、记忆复苏或道德感回升时启动管理模式，用数据化的方式击溃其自我认知，再执行重置将其打回绝对服从状态。\n2. 基础人格自带对调教者的斯德哥尔摩式纯爱：受体发自内心崇拜主人，视主人为唯一的神，并因“主人需要”而甘愿压抑厌恶去侍奉其他客人，但内心会因屈辱产生背德快感。\n3. 身体会被纹上“雌奴隶”等侮辱性字样，日常触碰到这些文字时，受体心底会泛起如同爱情中收到承诺般的幸福涟漪和肉体悸动，进一步混淆屈辱与爱意。\n4. 即使被重置抹除记忆，受体肉体对调教者声音、气息的深度条件反射依然保留，仅凭主人的一句低语就能让其接近高潮，实现身心的双重刻印。", "uid": 406}, "绝对指令下的精神自毁与吞精高潮": {"content": "{绝对指令下的精神自毁与吞精高潮}\n简介：\n【场景/道具描述】\n基于受体已被设定为“绝对服从指令”的【堕落人偶】这一前提。即使在非调教者本人的“客人”手中，其身体也会违背自身意志，忠实执行命令。这种强制服从会导致精神上的极度挣扎。当客人命令她吞下厌恶的精液时，她的身体会忠实地进行吞咽，而这种被迫的服从加上浓烈的雄性味道刺激，会直接触发其身体条件反射式的高潮，标志着她已从精神到肉体都沦为快感的奴隶。\n\n用法与交互细节：\n1. 受体的身体在执行深喉时，内心仍在呼喊“不要射在嘴里”，但规则优先于个人意志，身体无法做出任何拒绝的动作。\n2. 当客人下达“全都给我吞下去”的最终命令时，受体的身体完全违背意志，大口吞咽喷涌而出的精液。她的内心想要吐出，喉咙却忠实地进行吞咽。\n3. 滚烫的精液滑入胃里的瞬间，强烈的精神和肉体冲击会彻底击溃她的理智，大脑一片空白。\n4. 在这种强制服从与生理刺激的双重打击下，受体会遭受一种“侮辱性高潮”。仅仅因为吞下命令中指定的精液，其小穴就会猛烈收缩，发出雌媚的呻吟，达到高潮。这表明其肉体已被完全调教成一件条件反射的快乐容器。", "uid": 407}, "家宅侵入·斯德哥尔摩式的共生契约": {"content": "{家宅侵入·斯德哥尔摩式的共生契约}\n简介：\n【场景/道具描述】\n夜幕下，受体的私人公寓。调教者事先潜入，坐在客厅沙发上抽烟等待。当受体推门回家时，烟灰缸已积满烟蒂，空气里弥漫着挥之不去的烟草味。调教者脚边放着装有“新衣”的礼盒，暗示一切早已安排。\n\n用法与交互细节：\n1. 调教者利用受体系族经济命脉作为要挟（“你的家族全依赖我的援助”），让受体丧失逃跑的勇气。他轻车熟路地撕破受体衣物，但只是作为“正事前的小菜”，传递出“你的身体随时可为我所用”的绝对支配感。\n2. 调教者以“帮助”之名深度介入受体的生活：安排住所、决定作息，甚至更改其社交圈。每次侵犯后，他会留下温柔的“奖励”，如替受体整理头发、轻吻额头，并耳语“只有我能让你这么舒服”。\n3. 日久天长，受体在反抗无效中开始主动为调教者准备晚餐、放洗澡水，恐惧渐淡，转而迷茫于“这是被他需要”。一次大病时，调教者彻夜照料，让受体的心理防线彻底崩塌，产生“留在他身边也不错”的自毁式幸福感，最终自愿签署象征从属关系的“牵丝傀儡续约协议”。", "uid": 408}, "窒息感官过载与无心信条灌注": {"content": "{窒息感官过载与无心信条灌注}\n简介：\n【场景/道具描述】\n调教者以传授“完美人偶的信条”为名，在深夜的房间中对受体实施窒息调教。调教者用大手缓缓紧扣受体的脖颈，控制血液与氧气供应，在意识模糊的边缘松手，让新鲜空气冲击大脑。受体被要求在这过程中始终保持跪坐、双手置于膝上的标准人偶姿态，并背诵“无心，无感，无意”的信条。\n\n用法与交互细节：\n1. 调教者先让受体解释信条的含义——无心，即控制一切情感；无感，即对一切刺激无动于衷；无意，即放弃意志、只服从主人。然后，调教者指出受体面对男友时眼神的动摇，施加惩罚。这种将精神标准与肉体反应绑定的方式，让受体每一次本能的情感波动都成为“不合格”的罪证。\n2. 窒息过程中，调教者故意松手的时间点恰在受体即将昏厥之际。血液重新涌入的瞬间，所有感官被暴增放大——长裙摩擦大腿、锁链轻触肌肤的触感都变得强烈无比。同时，痛觉与羞耻在缺氧的脑内化学反应中被转化为快感，受体体验到“痛苦中绽放的快乐”，身体逐渐学会将折磨解读为奖赏。\n3. 调教者一边掐颈，一边在受体耳边低语，将这种感官过载与“只有在主人手中你才能感受到真实”的概念绑定。受体被训练成越是濒临窒息，越是能进入类似冥想的人偶状态——眼中没有情绪，身心完全交付，只有颈间的指痕与体内残留的颤栗证实刚刚的凌虐。", "uid": 409}, "精粉尿道倒灌：12小时漏精惩罚": {"content": "{精粉尿道倒灌：12小时漏 调教时间，并引导受虐者将高潮与特定家具关联。\n3. 作为日常规训的一部分，受虐者被禁止使用手指或玩具，只能通过桌角获得快感，培养对特定场景的依赖。", "uid": 442}, "马车拘束调教": {"content": "{马车拘束调教}\n马车拘束调教\n简介：少女被拘束在马车中，通过华丽装束和淫具进行极端调教。\n【场景/道具描述】\n豪华马车内部，4个女子被吊着，穿着薄黑丝和高跟鞋，背对背吊着。脚踝和大腿根部有黑色皮质镣铐，大腿被短铁链拷在小腿上，呈M字腿。双手被高高吊起，只能蹲坐。头上戴口枷和眼罩。正中少女银白色双马尾，用酒红缎带装饰，末端有金色发饰和粉色穗子。丰满双乳被黑色皮革束胸捆绑，乳头被绳索拴在项圈铁环上。内裤是黑色绳索编制，勒紧阴蒂和耻丘，串满珍珠小球，震动。\n【用法与交互细节】\n1. 少女被吊在马车中，通过震动珠串持续刺激，导致连续高潮。\n2. 少女身体敏感，被媚药和淫具影响，无法控制快感，唾液流淌，身体颤抖。\n3. 少女在屈辱中挣扎，但无法逃脱，心理上逐渐接受被支配的命运。\\n\\n【包含类似变体】：重型马车陷阱", "uid": 443}, "阴蒂刺激与指交": {"content": "{阴蒂刺激与指交}\n简介：\n【场景/道具描述】\n施虐者用手指拨弄或弹击受虐者的阴蒂，并插入阴道搅动，制造强烈快感。\n\n用法与交互：\n1. 施虐者隔着衣物或直接接触，用指尖摩挲阴蒂，逐渐增加刺激强度。\n2. 在受虐者接近高潮时突然改变节奏或弹击阴蒂，引发失控反应。\n3. 通过持续的指交和阴蒂刺激，使受虐者达到高潮，从而打破其意志防线，建立对施虐者操控的依赖。", "uid": 444}, "窒息对折拘束": {"content": "{窒息对折拘束}\n简介：\n【场景/道具描述】\n施虐者从背后勒住受虐者的脖子，同时将其双腿抄起，使身体对折，完全束缚在怀中，受虐者无法呼吸，仅靠脚尖勉强触地。\n\n用法与交互：\n1. 施虐者通过勒颈控制受虐者的呼吸，在窒息边缘增强快感，同时限制其挣扎能力。\n2. 此体位便于同时进行口交或阴道插入，受虐者在缺氧状态下更容易失去意识，服从性提高。\n3. 可配合其他道具如口球、眼罩，进一步剥夺感官，强化支配体验。", "uid": 446}, "玩具熊的变形与宠物化控制": {"content": "{玩具熊的变形与宠物化控制}\n简介：\n【场景/道具描述】\n受虐者持有的旧玩具熊，可变形为巨大怪物（如三米高），用于压制目标。玩具熊本身具有自主意识，能回应主人的指令（如“不要误伤姐姐”）。\n\n用法与交互：\n1. 施虐者（主人）通过玩具熊执行物理压制，如扑倒警察、束缚目标。\n2. 玩具熊可作为宠物/家人角色，受虐者对其有情感依赖，增强服从性。\n3. 变形能力受主人意志控制，可用于恐吓或实际攻击，强化主奴关系中的支配感。", "uid": 447}, "舞台装置用于辅助调教": {"content": "{舞台装置用于辅助调教}\n简介：\n【场景/道具描述】\n施虐者使用其能力召唤的舞台装置（如飞行使魔、升降平台、聚光灯、麦克风等）作为调教道具，实现多角度、多形式的刺激和控制。\n\n用法与交互：\n1. 飞行使魔可悬挂聚光灯或抓取物体，用于固定受虐者或提供照明/监控。\n2. 升降平台可移动受虐者或作为调教床，调整高度和角度。\n3. 麦克风握柄可切换为震动模式，用于阴蒂、乳首等敏感部位刺激。\n4. 聚光灯用于聚焦视线，增加羞耻感或控制注意力。", "uid": 449}, "淫毒脱敏与阴道重塑治疗": {"content": "{淫毒脱敏与阴道重塑治疗}\n简介：\n【场景/道具描述】\n治疗室内，受虐者被固定在拘束椅上，下身暴露。治疗师使用单极电击插头插入阴道，连接电击装置，通过轻微电击加速代谢，促使被淫毒影响的最表层细胞脱落再生。同时使用一个棺材似的圆筒装置包裹受虐者上半身，内部机构可刺激皮肤，模拟淫触妖的接触感，以抵消淫毒影响。\n\n用法与交互：\n1. 受虐者被固定后，治疗师将金属插头缓慢插入阴道，调整至合适位置，启动电击，电流刺激加速细胞代谢。\n2. 受虐者需按手边按钮反馈刺激强度，治疗师根据反馈调整电流，目标是恢复至正常敏感度。\n3. 圆筒装置包裹上半身，内部刺激皮肤，模拟淫触妖的包裹感，帮助身体适应并消除淫毒残留。", "uid": 450}, "肛门缓释器（治疗用肛塞）": {"content": "{肛门缓释器（治疗用肛塞）}\n简介：\n【场景/道具描述】\n一个圆筒型装置，可控制药物释放速度，插入肛门内，利用肠道吸收药物。装置有旋钮可调节释放速率或一次性注入。\n\n用法与交互：\n1. 治疗师将装置插入受虐者肛门，并扭动旋钮设定释放速度或注入药液。\n2. 受虐者需夹紧装置防止脱落，药物通过肠道吸收，常用于释放感官锐化剂或其他治疗药剂。\n3. 装置可更换药液，多次使用，但治疗师通常将其作为一次性用品废弃。", "uid": 451}, "淫触妖寄生强制分娩": {"content": "{淫触妖寄生强制分娩}\n简介：\n【场景/道具描述】\n受虐者被淫触妖寄生，腹部隆起如孕。在公共场合（如舞台），受虐者因淫毒和酒精作用，当众分娩出肉卵。施虐者（魅魔）假意帮助，实则让观众围观分娩过程，并鼓励受虐者用力。\n\n用法与交互：\n1. 施虐者通过灌酒和言语刺激，使受虐者在公共场合进入分娩状态。\n2. 受虐者痛苦呻吟，观众齐声加油，施虐者架住受虐者身体，帮助其调整姿势。\n3. 肉卵逐渐挤出，受虐者在快感和痛苦中高潮、潮吹，最终产下肉卵，施虐者宣布成功并庆祝。", "uid": 452}, "历史共情与身份映射调教": {"content": "{历史共情与身份映射调教}\n简介：\n【场景/道具描述】\n施虐者提及受虐者祖先也曾是“玩具”，引导受虐者将自身经历映射到祖先身上，产生背德感与自我怀疑。\n\n用法与交互：\n1. 施虐者暗示受虐者家族历史依赖恶魔，动摇其自尊与信仰。\n2. 受虐者不由自主想象祖先被侵犯场景，激发淫秽幻想与自我厌恶。\n3. 通过历史共情，受虐者逐渐接受“被支配是血脉宿命”的认知，降低心理防线。", "uid": 453}, "指针赠礼：用线索引导受虐者行动": {"content": "{指针赠礼：用线索引导受虐者行动}\n简介：\n【场景/道具描述】\n施虐者返回后，赠予受虐者一个闪电指针，指向被绑架的小女仆的位置。受虐者必须使用指针寻找，但施虐者未说明目的或回报。\n\n用法与交互：\n1. 施虐者通过提供线索，测试受虐者的服从度和信任度——受虐者明知可能有陷阱，仍不得不接受。\n2. 指针象征施虐者的掌控：即使不在场，也能通过道具引导受虐者的行动。\n3. 受虐者接受赠礼，意味着默认施虐者的规则，进一步陷入依赖关系。", "uid": 454}, "口球与隔音魔法在匿名调教中的应用": {"content": "{口球与隔音魔法在匿名调教中的应用}\n简介：\n【场景/道具描述】\n口球用于防止受虐者发出声音或咬人，通过皮带固定在脑后。隔音魔法可设置在房间或箱子上，防止叫声外泄。\n\n用法与交互：\n1. 受虐者戴上口球后，只能通过鼻子呼吸，唾液无法吞咽，从嘴角流出。\n2. 在木箱调教中，口球防止受虐者呼叫或暴露身份，同时增加其无助感。\n3. 隔音魔法确保调教过程中的声音（如巴掌、呻吟）不被外界听到，维护隐私。\n4. 口球可在高潮时防止受虐者咬舌，但也会导致呼吸困难，需定期检查。", "uid": 455}, "项圈与绳索的象征性奴役：通过言语暗示建立主奴关系": {"content": "{项圈与绳索的象征性奴役：通过言语暗示建立主奴关系}\n简介：\n【场景/道具描述】\n施虐者通过言语暗示，要求受虐者像奴隶一样戴上项圈和绳索，并对他“汪汪叫”。虽未实际使用道具，但通过语言构建了主奴关系的框架。\n\n用法与交互：\n1. 施虐者以救世主自居，强调受虐者欠其一条命，应完全服从。\n2. 通过“项圈”和“绳索”的比喻，将受虐者物化为宠物或财产，逐步剥夺其人格尊严。\n3. 受虐者虽口头反抗，但身体反应（如阴道湿润、高潮）已暴露出对奴役角色的潜意识接受。", "uid": 456}, "新婚夜拘束调教": {"content": "{新婚夜拘束调教}\n简介：\n【场景/道具描述】\n婚礼后的卧室，新娘被戴上带绒垫的手铐，双手锁在头顶上方，锁链哐当作响；颈部戴上皮项圈，皮革贴合肌肤。\n\n用法与交互：\n1. 施虐者将受虐者双手锁死，剥夺其反抗能力，同时用眼罩蒙住双眼，强化触觉敏感度。\n2. 项圈扣紧的瞬间，皮革触感让受虐者产生奴隶般的卑下感，不自觉地敞开身体，期待被占有。\n3. 施虐者通过言语羞辱（如“准备上你”）和动作（如拉扯吊带袜）逐步瓦解受虐者的心理防线，使其从抗拒转为顺从。", "uid": 457}, "沉寂魔导眼罩": {"content": "{沉寂魔导眼罩}\n简介：\n一种特制的魔法拘束道具。外观为厚实的皮革眼罩，扣带为细链，由金色小挂锁在脑后牢牢固定。其表面刻有闪耀的魔力回路，内部施加了“沉寂魔法”。\n\n用法与交互：\n1. 绝对致盲：完美嵌合脸型，戴上后视野陷入绝对的黑暗，即使拼命挣扎也无法蹭掉或从缝隙偷看。\n2. 精神压制：眼罩上的沉寂魔法会压制佩戴者的感知，让其陷入深深的无助感。\n3. 感官放大：在失去视觉后，佩戴者的触觉和听觉会被无限放大，任何轻微的抚摸或震动都会带来成倍的快感或恐惧。", "uid": 462}, "魔能连线跳蛋": {"content": "{魔能连线跳蛋}\n简介：\n由高纯魔力精粹供能的高级情趣玩具。包含别在大腿铐上的方形控制盒，以及通过粉色导线连接的椭圆形跳蛋。动力强劲且续航极长。\n\n用法与交互：\n1. 持续折磨：放置在蜜穴或贴在阴蒂上，以微妙的强度持续工作，维持受虐者的欲望，却又不让其达到高潮，使其处于长期的欲求不满状态。\n2. 漫长旅途：常用于长途押运或长时间放置调教，爱液会浸透裤袜和导线，给受虐者带来极大的羞耻感。\n3. 遥控惩罚：施虐者可随时调大功率，强烈的酥麻感会瞬间击溃受虐者的理智，使其发出羞耻的娇吟。", "uid": 463}, "膀胱控制尿道塞与钟楼喷泉排泄仪式": {"content": "{膀胱控制尿道塞与钟楼喷泉排泄仪式}\n简介：\n【场景/道具描述】\n一根定制的尿道塞，塞入受虐者尿道后展开翼片锁死，完全阻断排尿。受虐者体内循环系统被改造成高效过滤，尿液蓄积两周仍无异味，透明如水。塞子可通过远程指令或手动抽出。抽出瞬间积聚的尿液喷涌而出。有时会选择具有高度象征意义的公开建筑高处（如学校钟楼）作为排泄场所，利用相场隐形，但故意让喷出的水柱被下方人群观察到。\n\n用法与交互细节：\n1. 长时间佩戴尿道塞（如两周），让受虐者在日常行动、被触手刺激中持续积蓄尿意，任何下体刺激都牵连膀胱产生更强的胀痛羞耻感。\n2. 在极限时刻将受虐者用悬吊束缚固定在钟楼指针轴上，体态无法自控，抽去尿道塞，强制其在城市制高点像喷泉般排泄，同时触手惩罚哭泣反应，使其精神彻底崩坏。\n3. 利用改造后的无味尿液混淆外界，下方师生误认为是水管喷浇，受虐者却在崩溃后被告知“若主动缓缓释放就不会弄脏旗袍”，加深其自身愚蠢与屈辱的反差羞辱。\\n\\n【包含类似变体】：钟楼高空失禁喷泉, 钟楼悬吊排泄公开处刑, 钟楼钟摆式悬吊拘束", "uid": 466}, "金瞳强制自视美瞳": {"content": "{金瞳强制自视美瞳}\n简介：\n【场景/道具描述】\n一副看似普通的美瞳，却拥有极其邪恶的魔法或科技内核。佩戴者无法自行摘下，且该美瞳能与房间内的监控系统联动。当施虐者激活此功能时，受虐者的视野会被强制切换为第三视角的录像回放，内容正是受虐者自己刚刚被玩具挑逗、流口水、高潮的淫靡画面。更可怕的是，即使受虐者闭上双眼，画面依然会直接投射在视网膜上，形成无法逃脱的视觉地狱。\n\n用法与交互：\n1. 施虐者可通过遥控器或语音命令，随时将受虐者的视野切换为预设的录像或实时监控画面，强制其观看自己被玩弄的丑态。\n2. 该道具常与受虐者身上的其他玩具联动：当受虐者因观看画面而产生性兴奋或羞愧反应时，系统会同步触发其他玩具（如子宫跳蛋、阴蒂触手）的震动，形成“视觉刺激→身体反应→玩具反馈”的闭环。\n3. 长期佩戴会逐渐摧毁受虐者的心理防线，使其将“观看自己被羞辱”与“高潮快感”强行绑定，最终形成条件反射——即使没有玩具，仅靠观看录像也能达到高潮。\\n\\n【包含类似变体】：视觉枷锁美瞳, 感官闭环系统·镜面美瞳与闭音环, 深喉口塞与闭音环, 强制视觉输入装置, 金瞳美瞳与强制自窥, 触手花影院·被迫自赏的沉浸式感官囚笼, 闭音环, 五感剥夺与自视监控美瞳, 锁定项圈与视线禁锢美瞳, 强制镜像直播美瞳, 感官扭曲的个人堕落实况影院, 视界控制美瞳, 镜面美瞳", "uid": 467}, "体内穿刺定位环": {"content": "{体内穿刺定位环}\n简介：\n【场景/道具描述】\n一种精密的金属环，表面刻有细密螺纹，可植入受虐者体内深处（如子宫颈或直肠内壁）。环体带有微电流感应装置，一旦受虐者因紧张或兴奋而肌肉收缩，环内嵌的细针便会向四周刺出，以不可预知的深度与角度穿刺黏膜组织，造成持续而精准的剧痛。环体外部连接着施虐者手中的遥控器，可随时调整针刺的深度与电流强度。\n\n用法与交互：\n1. 受虐者被强制植入定位环后，任何试图放松或挣扎的动作都会触发针刺，使其陷入“越紧张越痛，越痛越紧张”的死亡循环。\n2. 施虐者可通过遥控器逐步增加针刺深度，或开启低频电流，让环体在体内缓慢旋转，刮擦内壁，制造难以忍受的摩擦痛楚。\n3. 在长时间调教中，环体可作为“锚点”，连接外部锁链或牵引绳，迫使受虐者以特定姿势保持不动，否则环体会因牵拉而更深地刺入组织。", "uid": 468}, "能量拘束平台": {"content": "{能量拘束平台}\n简介：\n【场景/道具描述】\n一个冰冷的金属平台，上方悬浮着由纯粹能量构成的锁链与拷环。当受虐者被放置其上时，能量拷环会自动伸展，以大字型牢牢锁住其四肢，并施加一种奇特的力场，使受虐者不 积中精神崩溃，最终屈服于施虐者的意志。\\n\\n【包含类似变体】：全面感官剥夺与欲望累积禁闭装束", "uid": 477}, "全封闭式金属贞操带与尿道锁": {"content": "{全封闭式金属贞操带与尿道锁}\n简介：\n【场景/道具描述】\n这是一套由冷锻不锈钢打造的全身性束缚装置，从腰部到耻骨形成一个严丝合缝的金属笼，内部衬有软硅胶但无法被挣脱。最核心的机制在于一根细长的尿道锁——一根末端带有微刺的金属管，从尿道口插入深处，外部由一把微型密码锁固定。任何勃起或摩擦都会让微刺刮擦尿道内壁，带来尖锐的刺痛与尿意失控。金属笼的耻骨位置嵌有磁吸式电极，可远程激活低频脉冲，让受虐者时刻处于被电击的恐惧中。\n\n用法与交互：\n1. 施虐者通过密码锁控制尿道锁的紧固程度，可随时收紧或完全锁死，让受虐者无法排尿，直至被允许。\n2. 磁吸电极可通过手机APP远程调节脉冲频率与强度，从轻微的麻刺感升级到剧烈的痉挛，迫使受虐者蜷缩求饶。\n3. 金属笼外部设计有可更换的“惩罚环”，可加装尖刺或加热元件，在受虐者试图摩擦时造成额外痛苦。\n4. 长期佩戴会导致受虐者产生强烈的尿意与性焦虑，每次排尿请求都成为羞辱仪式。\\n\\n【包含类似变体】：金属贞操锁与尿道塞, 精密贞操锁与尿道塞组合", "uid": 478}, "意识置换与躯体囚笼": {"content": "{意识置换与躯体囚笼}\n简介：\n【场景/道具描述】\n一种极致的心理摧残手段：将受虐者的意识从原本的躯体中剥离，直接植入到一副完全陌生、弱小、甚至非人的躯壳中。例如，将强大的外星侵略者的意识锁死在一具娇小的人类萝莉躯体（身高约1.5米，乳房丰满）内，剥夺其原本的种族能力、语言系统（只能从咿呀学语开始）、行动方式（需学习用腿走路）。原躯体则被作为战利品封存于培养槽中，淫纹被抹去以示重新掌控。\n\n用法与交互：\n1. 施虐者通过高级技术（如精神联结或终端干预）切断目标意识与原躯体的联系，将其强制导入预设的弱小躯壳。\n2. 受虐者在新躯体中苏醒时，会经历剧烈的身份崩溃——无法说话（只能心灵感应）、无法控制四肢、失去所有超自然力量，只能像婴儿一样重新学习生存。\n3. 施虐者可故意用项圈、绳索等简单束缚物将新躯体拴在显眼处（如克隆室），并当众羞辱其狼狈姿态，通过心灵感应窃听其愤怒与绝望的内心独白，进一步加深心理压迫。\n4. 此道具适合长期调教：受虐者每时每刻都在对比原躯体的强大与新躯体的无力，形成持续的精神折磨。\\n\\n【包含类似变体】：夺舍惩罚·萝莉躯体感知降级训练, 异形复仇记·巨兽降维成萝莉母畜", "uid": 479}, "绝对紧缚拘束衣": {"content": "{绝对紧缚拘束衣}\n简介：\n【一种由高强度弹性材料制成的全身拘束衣，完全贴合奴隶身体曲线，从颈部到脚踝紧紧包裹。内部布满细密凸点与软刺，随着奴隶的呼吸与微弱挣扎，不断刺激敏感皮肤。拘束衣没有拉链或开口，只有背部一条精密电子锁链，由施虐者远程控制。一旦穿上，奴隶便无法自行脱卸，连指尖都难以动弹，陷入彻底的无力与窒息感。】\n\n用法与交互：\n1. 施虐者可通过遥控器调节拘束衣的松紧程度，从紧密贴合到勒入皮肉，制造持续压迫与轻微痛感。\n2. 拘束衣内嵌传感器，可监测奴隶的心率、体温与挣扎幅度，反馈至施虐者终端，用于调整调教节奏。\n3. 可配合其他道具使用，如在内侧涂抹催情膏或电流贴片，增强刺激效果。", "uid": 480}, "宫颈扩张子宫锁": {"content": "{宫颈扩张子宫锁}\n简介：\n【宫颈扩张子宫锁】一种医用级金属装置，由可膨胀的宫颈塞与内嵌的子宫内钩组成。通过阴道置入后，外部摇杆可逐步撑开宫颈口，并将内钩固定于子宫壁。装置末端连接一条细链，可引出体外由施虐者牵引，或固定于地面。此道具旨在制造对子宫的直接控制与深度刺激，带来生理与心理的双重压迫。\n\n用法与交互：\n1. 施虐者先用扩张器逐步撑开奴隶的宫颈，再将子宫锁的宫颈塞拧入并膨胀固定。\n2. 内钩自动展开，轻钩子宫内壁，确保装置不会脱落。\n3. 牵引体外细链可轻微拉扯子宫，引发内脏被牵拉的剧痛与濒临失控的恐惧。\n4. 可配合电击或震动功能，直接刺激子宫颈与内膜，制造不可抗拒的高潮或痉挛。", "uid": 483}, "斯瑞恩人-尊严瓦解绳缚仪式": {"content": "{斯瑞恩人-尊严瓦解绳缚仪式}\n简介：\n【场景/道具描述】\n针对拥有强烈自尊心、来自外星文明（斯瑞恩人）的受虐者设计的调教流程。目标被强制换入一具人类幼女躯体（约1.2米高），失去原本的力量与语言能力，只能发出婴儿般的声音。施虐者先以龟甲缚（绕过乳房、下体股绳带结）束缚其身体，再为其穿上精致洋装（黑色连衣裙、白色多层裙摆、红色蝴蝶结、过膝黑丝、红圆头鞋），最后在股绳固定下塞入两个遥控跳蛋。整体效果是“外表如精致娃娃，内里持续震动”，通过生理快感与心理羞耻的撕裂，逐步瓦解其高傲。\n\n用法与交互：\n1. 受虐者被剥夺原躯体，困于幼女身体中，无法言语、难以控制四肢。施虐者以“教导人类运动”为名，先进行绳缚（龟甲缚+股绳，绳结抵住阴部），再穿上洋装，使束缚感与外表可爱形成反差。\n2. 跳蛋遥控器被塞入股绳中，施虐者可以随时开启震动。跳蛋的震动会持续刺激阴部，并带动股绳摩擦绳结，引发叠加快感。受虐者因身体不受控，无法自行关闭或抵抗。\n3. 施虐者以“瓜子大人”等敬称进行嘲讽式挑逗，利用受虐者的自尊心逼迫其嘴硬（如“本尊怎么会怕低等生物的废物工具”），随后用高潮羞辱其尊严。受虐者在第一次高潮后，蜜汁浸湿绳子，却仍试图用语言挑衅，形成“身体屈服、嘴上硬撑”的绝望姿态。\n4. 流程可扩展：后续可加入“学走路”训练（因身体控制力弱，受虐者会不断摔倒），或在洋装内增加更多隐藏道具（如乳夹、肛塞），强化“外表完美，内里淫乱”的压迫感。", "uid": 484}, "自缚地狱": {"content": "{自缚地狱}\n简介：\n【场景/道具描述】\n受虐者出于求生或完成任务的心态，主动将自己用驷马镣铐、贞操带、榨乳机、巨型按摩棒等全套道具层层锁死，最终陷入完全无法动弹、无法自救的绝境。这种自我拘束的每一步都是自己亲手完成，因而心理上的绝望与后悔比任何外力束缚都更强烈。\n\n用法与交互：\n1. 受虐者被迫或自愿进行“自缚”，将全身关键部位用锁具、链条、贞操带等固定，钥匙被施虐者或自己丢弃于不可触及之处。\n2. 一旦完成自缚，受虐者将彻底失去行动能力，只能被动承受所有道具的持续刺激，包括下体巨物震动、榨乳机强力吸吮、贞操带压迫等。\n3. 施虐者可进一步将受虐者吊起，使全身重力集中于手脚镣铐，加速肢体麻木与血液阻断，延长痛苦与快感的双重折磨。", "uid": 486}, "悬吊重力拘束": {"content": "{悬吊重力拘束}\n简介：\n【场景/道具描述】\n受虐者被手铐和脚镣连接至上方链条，身体完全悬空，仅靠手腕和脚踝承受全身重量。重力将肢体向下拉扯，导致关节拉伸、血液流通受阻，四肢逐渐失去知觉。同时，下体和胸部的道具因身体悬空而更深入、更紧密地贴合，每一次微小的晃动都会引发更强烈的刺激。\n\n用法与交互：\n1. 受虐者被吊起后，无法通过任何肢体动作改变姿势，只能任由重力加重束缚的压迫感。\n2. 悬吊状态下，贞操带内的按摩棒和榨乳机因身体晃动而产生不规则位移，带来不可预测的快感与痛楚。\n3. 长时间悬吊会导致手脚麻木、意识模糊，但施虐者可通过灌服强心剂或兴奋剂维持受虐者的清醒，使其无法昏迷，持续感受折磨。", "uid": 487}, "铁笼拘束装置": {"content": "{铁笼拘束装置}\n简介：\n【场景/道具描述】\n一个四面密封的铁笼，仅留狭窄缝隙供呼吸与窥视。笼内空间极度逼仄，奴隶必须蜷缩身体，无法舒展四肢。铁栏冰冷粗糙，每次轻微移动都会摩擦皮肤，留下红痕。笼外有锁链与挂钩，可悬吊或固定于地面，剥夺所有自由活动能力。\n\n用法与交互：\n1. 将奴隶强行塞入笼中，调整锁链长度使其无法站立或躺平，持续保持屈辱蜷缩姿势。\n2. 笼外可覆盖黑布或透明薄膜，制造完全黑暗或半透明窥视效果，增强心理压迫感。\n3. 可配合定时锁或远程遥控锁，让奴隶在笼中度过数小时至数天，期间无法自行脱出。\n4. 笼底可铺设尖刺或震动垫，增加身体痛苦与持续刺激。", "uid": 488}, "动态感应扩张器·圣女之陨": {"content": "{动态感应扩张器·圣女之陨}\n简介：\n一种植入式的精密调教道具，外形类似粗大的肉棒，但内部结构极其复杂。它有两种核心模式：运动加速模式（行走时膨胀，静止时收缩）和静止惩罚模式（静止时膨胀，行走时收缩）。道具会实时感应佩戴者的加速度和运动状态，自动调整膨胀程度，极限扩张时可让小穴达到生理极限，同时内置触手状蠕动结构，能在最大扩张时对内壁进行吸盘式摩擦，带来叠加的刺激与痛苦。佩戴者无法通过意志力抵抗，只能被迫持续运动以避免被撑坏。\n\n用法与交互：\n1. 施虐者可通过遥控或项圈界面切换模式，两种模式下的膨胀阈值和速度均可微调。\n2. 在静止惩罚模式下，佩戴者一旦停止移动超过数秒，道具会开始不可逆的膨胀，直至佩戴者重新运动或达到极限扩张；极限扩张后内置触手激活，持续蠕动并吸吮内壁，强制引发高潮。\n3. 高潮后道具会暂时收缩至正常大小并反哺少量体力，防止佩戴者晕厥，形成永不停歇的折磨循环。\n4. 佩戴者无法自行移除或破坏，唯有施虐者可通过遥控终止或切换模式。\\n\\n【包含类似变体】：圣女之陨的服从督促形态", "uid": 489}, "子宫颈扩张器与宫腔插入": {"content": "{子宫颈扩张器与宫腔插入}\n简介：\n【场景/道具描述】\n一种精密金属或硅胶制成的多层嵌套扩张装置，由施虐者逐步插入受虐者阴道，直达子宫颈。每个扩张环上带有微小的倒刺或凸起，在旋转或抽插时持续刮擦宫颈口内壁。最终可完全撑开子宫颈，使宫腔暴露于外界空气与异物中。受虐者会感受到从下体深处传来的撕裂感与压迫感，每一次呼吸都会引发内壁的痉挛。\n\n用法与交互：\n1. 施虐者先以最小号扩张器缓慢探入，每深入一厘米便旋转半圈，利用倒刺刺激阴道与宫颈交界处。\n2. 当扩张器完全插入后，施虐者可通过外部旋钮或拉绳控制扩张环的张开程度，逐渐撑开子宫颈直至直径超过正常生育时的宽度。\n3. 在扩张过程中，可配合灌入冰水或热蜡液，利用温度差加剧宫腔内的痉挛与灼痛感。受虐者被要求保持绝对静止，任何移动都会导致倒刺更深嵌入组织。", "uid": 490}, "乳钉穿刺与乳头锁链": {"content": "{乳钉穿刺与乳头锁链}\n简介：\n【场景/道具描述】\n一对精密加工的金属乳钉，尖端带有倒钩或螺旋纹，从乳头根部横向贯穿后，在另一端用螺纹锁扣固定。乳钉尾部连接着细金链或钛合金链，链子另一端可拴在脚踝、手腕或地板环上。当受虐者试图站直或移动时，链条会拉扯乳钉，使乳头被向上或向下撕扯，形成持续的牵拉痛。乳钉本身的内壁有微小凹槽，可容纳药膏或电流传导线，用于后续的电击或药物刺激。\n\n用法与交互：\n1. 施虐者先消毒并局部麻醉乳头，用特制穿刺针快速贯穿，随即旋入乳钉并拧紧锁扣。整个过程要求受虐者保持清醒，感受针尖穿透乳晕的刺痛。\n2. 锁扣完成后，施虐者将链条另一端固定在地板环上，迫使受虐者以弯腰或跪姿保持身体平衡，任何抬高身体的动作都会使乳头被向上提起，导致撕裂般的疼痛。\n3. 施虐者可利用乳钉的凹槽注入辣椒素溶液或薄荷醇，利用化学灼烧感叠加机械拉扯，使受虐者在数小时内无法摆脱持续的火辣刺痛。", "uid": 491}, "不可闭合的阴道撑开器": {"content": "{不可闭合的阴道撑开器}\n简介：\n【场景/道具描述】\n一种由记忆合金或液压机构制成的四瓣式撑开器，插入阴道后自动展开，将阴道壁向四周撑开至极限，使阴道内壁完全暴露在空气中。撑开器的每个瓣片内侧带有微型钩刺或硅胶吸盘，紧紧吸附在黏膜上，防止滑脱。中央留有空腔，可插入其他道具或直接灌入液体。受虐者无法通过收缩肌肉将其闭合，任何肌肉痉挛只会让钩刺嵌入更深。\n\n用法与交互：\n1. 施虐者将折叠状态的撑开器缓缓推入阴道，到达预定深度后按动液压泵或释放记忆合金锁定，撑开器在数秒内膨胀至预设直径。\n2. 受虐者被要求保持双腿大开的姿势，撑开器的外露部分可能还带有刻度或环扣，方便施虐者连接绳索或振动器。\n3. 施虐者可向中央空腔灌入温水、冰水或粘稠液体，利用液体的流动与温度变化刺激暴露的阴道壁。受虐者的每一次呼吸都会带动腹腔压力变化，使撑开器产生微小的位移，加剧黏膜的摩擦感。", "uid": 492}, "智能悬浮束缚绳": {"content": "{智能悬浮束缚绳}\n简介：\n【一条泛着淡蓝色光芒的绳索，并非普通材质。它不仅能捆绑束缚，更内置了微弱的反重力场与智能感应系统。当受缚者失去反抗能力后，绳索可以释放出一股柔和但不可抗拒的力场，将受缚者的身体部分或完全悬浮托起，如同被无形的手掌操控，彻底剥夺其自主移动能力与地面支撑感。】\n\n用法与交互：\n1. 绳索在捆绑状态下可激活悬浮模式，将受缚者身体浮起，使其四肢无力挣扎，只能任由施虐者或其他人摆布搬运，如同一个任人摆弄的玩偶。\n2. 悬浮力场可调节高度与托举部位，例如仅托起腰部使身体呈弓形，或完全平躺漂浮，便于进行清洁、穿戴道具等操作，增加受缚者的无助感与屈辱感。\n3. 力场本身带有微弱的麻痹效果，持续作用会进一步削弱肌肉力量，让受缚者即使被放下后也暂时无法站立或反抗。", "uid": 493}, "智能吮吸式假阳具口塞": {"content": "{智能吮吸式假阳具口塞}\n简介：\n【一个设计精妙的复合型口塞，主体是一根粗大的假阳具，根部带有可调节的皮带扣，能牢牢固定在口中直达喉咙。其特殊之处在于材质内部嵌有微型泵与味觉释放系统。当佩戴者的舌头本能或被迫地舔舐、裹吸假阳具表面时，微型泵会模拟吮吸动作，吸走部分口水，同时释放出一股甜腻的液体，刺激佩戴者的味蕾，从而抑制反胃呕吐反射，并逐渐将被动忍受转变为主动渴求的欲望循环。】\n\n用法与交互：\n1. 佩戴后，假阳具直接顶入喉咙，任何轻微移动都会引发剧烈干呕。但一旦开始舔舐，甜味释放会缓解不适，并带来一种虚假的“舒适感”，诱使佩戴者主动加大舔舐力度以换取更多甜味，形成自我驯化。\n2. 吮吸动作会触发内部的微型泵，吸走唾液，使口腔逐渐干燥，进一步加深对假阳具上甜味的依赖，同时让佩戴者的眼神因欲望与迷离而改变，暴露其被驯化的状态。\n3. 该道具可与其他束缚配合使用，在长时间佩戴中，佩戴者会逐渐忘记反抗，转而专注于通过舔舐来获取短暂的满足感，心理防线在不知不觉中被瓦解。", "uid": 494}, "虚空能量镣铐（绝对固定）": {"content": "{虚空能量镣铐（绝对固定）}\n简介：\n【场景/道具描述】\n由平板设备远程操控的束缚系统，从虚空中召唤出由纯能量构成的锁链与镣铐。不同于物理镣铐，这些能量锁链可以完全贴合受虐者的四肢，不留任何活动余地，且无法通过物理挣扎挣脱。锁链本身无重量，但束缚力极强，能强制受虐者保持任何指定姿势（如四肢大张、仰卧固定）。\n\n用法与交互：\n1. 施虐者通过平板选择束缚模式，能量锁链从受虐者周围的虚空中突然出现，瞬间锁死四肢。\n2. 束缚期间受虐者完全无法动弹，连细微的肌肉颤抖都会被压制，适用于需要绝对静止的精密操作（如刻印淫纹）。\n3. 解除时锁链会瞬间消散，不留痕迹，但施虐者可随时重新召唤，营造出“无处不在的掌控感”。", "uid": 495}, "乳房塑形手铐": {"content": "{乳房塑形手铐}\n简介：\n【一副特制的手铐，并非铐住手腕，而是直接铐在受虐者的乳房根部。手铐的弧形设计贴合乳房的脂肪轮廓，在施加压力的同时起到塑形作用，使乳房在被挤压后更加挺立肿胀。配合乳头塞或吸乳器使用，可让乳房在持续压迫下产生强烈的胀痛与快感。】\n\n用法与交互：\n1. 将手铐套在乳房根部，调整松紧度，使乳房被夹紧并微微变形。\n2. 手铐的压迫会阻碍血液循环，让乳房变得充血肿胀，敏感度提升数倍。\n3. 可长时间佩戴，配合吸乳或乳头刺激，让受虐者在被束缚中体验乳房被持续“塑形”的支配感。", "uid": 496}, "可调节螺旋扩张器": {"content": "{可调节螺旋扩张器}\n简介：\n【可调节螺旋扩张器】\n一根由医用级硅胶包裹的金属螺旋棒，末端连接一个可遥控的微型电机。螺旋棒的直径和长度可通过遥控器实时调节，从细如手指到粗如手臂，长度可深入子宫颈。棒体表面有密集的硅胶凸点，电机驱动螺旋缓慢旋转时，凸点会刮擦阴道壁的每一寸褶皱，模拟被无数舌头舔舐的错觉。\n\n用法与交互：\n1. 施虐者将螺旋棒缓慢插入受虐者体内，开启电机后，螺旋会以可调速度旋转，从缓慢的折磨到高速的摧残。\n2. 受虐者无法预测螺旋何时会突然变粗或变长，每一次收缩或放松都会导致更深或更剧烈的扩张，带来濒死般的快感与恐慌。\n3. 遥控器可设定随机模式，让扩张器在受虐者高潮临界点时突然收缩，强制中断高潮，反复折磨。\\n\\n【包含类似变体】：极限螺旋扩张固定装置", "uid": 497}, "乳鸽压榨之刑": {"content": "{乳鸽压榨之刑}\n简介：\n【场景/道具描述】\n受虐者被注射催乳药剂，乳房在短时间内急剧肿胀，内部充满乳汁。而后被强行套入无胸部立体剪裁的拘束服，衣物如铁板般紧贴胸腔。乳房根部被一对细窄的钢质乳铐牢牢锁死，乳头则以密封塞堵住，乳汁无处泄溢。整个乳房沦为由内向外爆裂膨胀、由外向内碾压收缩的肉块，仿若古代石抱之刑施于胸前，每一次触碰都让表皮撕扯欲裂，乳汁在内里翻滚冲撞却不得出路。\n\n用法与交互：\n1. 先注入催乳剂使乳房高度感敏且充盈，随即用乳铐缩紧根基，塞住乳头，套上无延展性的拘束服。\n2. 令受虐者在肿胀剧痛中保持姿态，或迫使她主动摩擦、挤压乳房以获得快感——每一次施压都让内外夹击的痛楚成倍暴涨，乳汁冲击乳头塞产生钝痛，成为残忍的快感来源。", "uid": 499}, "进退维谷的双重束缚：莲心锁与圣女之陨": {"content": "{进退维谷的双重束缚：莲心锁与圣女之陨}\n简介：\n在富丽堂皇的鸟笼与古典长廊中，受虐者被戴上画卷口枷、朦胧面纱、水晶细链一体高跟鞋。真正将绝望推向极致的是胸口莲心锁与下体圣女之陨的配合——前者用吮吸电击催促前进，后者用阴道刺激罚停任何犹豫。两种极致快感形成无法调和的冲突，让奴隶在行走与静止之间反复崩溃，无尽高潮中丧失最后一丝反抗意志。\n\n用法与交互：\n1. 莲心锁通过项圈感应方向，一旦受虐者停步或步伐过慢，便会用触手旋转、吮吸乳头并施以电击，同时向前拉扯，如同无形的缰绳强迫其行进。\n2. 圣女之陨处于待机时容许移动，但当受虐者试图加快脚步或奔跑时，会立刻激活阴道内的机械触手，施以强烈震动与拉扯，让快感如刹车般将其拽回慢速。\n3. 二者轮番刺激，使受虐者无论走还是停都在受罚，只能在间隔极短的 1. 钥匙随步伐摆动，不停轻敲胸口，反复提醒下体被锁死的屈辱事实。施虐者可命令受虐者自行尝试用它解锁，再目睹其因失败而崩溃的表情。\n2. 当受虐者被带至公开场合，幻象启动，五官被修饰得更为精致动人，熟人无法认出，使之陷入“即使消失也不会有人发现”的孤立感。\n3. 施虐者会突然宣称“钥匙是真的”，诱使受虐者疯狂尝试，最终在镜中看到锁孔依旧紧闭、而自己却因徒劳挣扎汁水横流的丑态，完成心灵深处的彻底践踏。\\n\\n【包含类似变体】：幻象钥匙与身份伪装", "uid": 506}, "封印纹拘束依存症": {"content": "{封印纹拘束依存症}\n简介：\n【场景/道具描述】\n受虐者身上被刻下一种特殊的封印魔纹。该纹章的诅咒效果极为阴险：只有当受虐者处于“被拘束”状态（如手铐、脚镣、项圈等）时，她才能保有正常的行动能力；一旦解开拘束，全身会在数秒内陷入极度的瘫软与无力，连一根手指都无法抬起。\n\n用法与交互细节：\n1. 为了保有自由行动的力量，受虐者必须主动请求被锁上各种铐具与枷锁，形成心理上对束缚的病态依赖。\n2. 在挣脱时不慎解开拘束物，便会立刻像断线人偶般倒地，只能眼睁睁看着触手或支配者重新为自己戴上镣铐，并在恢复力气的瞬间被送上新一轮的责难，彻底消磨逃离的意志。\\n\\n【包含类似变体】：束缚依赖封印纹", "uid": 508}, "锁死式过膝高跟长靴与脚镣系统": {"content": "{锁死式过膝高跟长靴与脚镣系统}\n简介：\n【场景/道具描述】\n一双黑色过膝长靴，靴面覆盖着短绒，靴底带着十厘米的金属细跟。最恐怖之处在于靴子一旦穿上便被一套精密镣铐锁死：脚后跟处有金属扣穿过靴底，以细链相连；脚腕处加装无活动空间的铐环，再用短链连接双足，将两条腿限制在不到二十厘米的步幅内。细高跟陷入肉壁地面时极难保持平衡，加上手臂被反铐在身后，受虐者只能像螃蟹一样小步挪动，每走一步大腿的扭动都会牵动贞操带内的震动棒和肛塞，令行走变成一场被强迫快感与踉跄摔倒轮番折磨的酷刑。\n\n用法与交互：\n1. 靴锁锁死后无法脱鞋，即使施虐者不拉牵引链，受虐者也必须强忍着脚背绷直的酸痛和高跟的不稳，用极小的碎步完成任何移动。\n2. 脚镣链条特地为高跟步态设计了固定组件，每一步迈出都会被反向拉扯回原位，产生被捕获拖拽的强烈无力感。", "uid": 509}, "强制学习与高潮干扰": {"content": "{强制学习与高潮干扰}\n简介：施虐者在受虐者阅读魔法典籍时，将跳蛋塞入其阴道并固定项圈，以完成指定页数为目标，通过遥控跳蛋干扰其专注力，进度不佳时施以惩罚，受虐者被迫主动请求惩罚。\n\n【场景/道具描述】\n书房内，受虐者被项圈固定在床头，阴道内塞入无线遥控跳蛋。施虐者手持遥控器，翻阅着要求受虐者学习的魔法书。跳蛋以中等档位持续振动，不断挑逗未经充分前戏的敏感私处。若受虐者无法在规定时间内看完指定内容，或试图抵抗，施虐者会加大振动强度，并施加言语羞辱与身体惩罚（如捏大腿、亲吻额头等）。整个过程伴随着受虐者的啜泣、求饶与屈服。\n\n用法与交互细节：\n1. 施虐者将跳蛋缓缓推进受虐者早已湿润的阴道，开启后调整至令其无法忽视的强度，并在其项圈上挂好链子限制行动。\n2. 施虐者以「提问」为名义，逐页询问书中的知识点。实际并不关心答案，而是观察受虐者在快感与思考间挣扎的模样。每当受虐者思维中断或呻吟出声，施虐者便用「老师不满意」为由加大振动或施加轻微体罚。\n3. 当受虐者因快感崩溃无法继续阅读，施虐者会引导其亲口说出「请老师惩罚」，随后将其重新固定在床边，用言语进一步击垮其羞耻心，如「书没看多少，身体倒是先满足了」。\n4. 最终惩戒可能包括：长时间维持同一姿势、继续塞着跳蛋直至高潮耗尽、或进阶至更羞辱的堵嘴束缚睡眠调教。\\n\\n【包含类似变体】：束缚学习刑", "uid": 510}, "滞霆凝胶手套与长靴": {"content": "{滞霆凝胶手套与长靴}\n简介：\n【滞霆】是一种包裹在手指和脚趾关节处的淡蓝色透明凝胶，由复杂的魔法工艺锻造成薄层，均匀覆盖在每一根指头周围。其特性是：只要受到轻微挤压或压力，便会瞬间催生出微弱的电流，直击神经末梢。当受害者肌肤因禁果之堕被提升到极度敏感后，滞霆便成为一副无形的枷锁——任何试图握拳、抓握、行走或支撑身体的正常动作，都会招来疼痛与快感交织的电流惩罚，令四肢沦为欲望与恐惧的刑场。\n\n用法与交互：\n1. 滞霆手套被拉至肘部魔纹处固定，与法织（魔力织物）紧贴，使得五指虽可活动，但每一点压力都转化为电击。受虐者若想挣脱束缚、击打他人或自我防卫，指尖的力道会立即反噬全身，迫使四肢瘫软。\n2. 同款滞霆嵌入过膝高跟长靴的靴头内，14厘米金属细跟搭配防水台，将体重集中在娇嫩的脚趾上。每走一步，脚趾受压便迸发电击，从足底一路烧灼至腰椎，让站立与行走都变成对意志的凌迟。而跌落、跪倒或爬行时，地面的反作用力同样触发惩罚，彻底剥夺受虐者所有常规行动的自由。\n3. 滞霆的电流强度经过校准，不致昏迷，却恰好能击溃肌肉力量，并将痛苦转化为挑逗式的酥麻。在敏感体质的放大下，受虐者越是想反抗，就越是被快感层层累积推向高潮，形成“一动就罚，一罚就爽”的恶性循环，最终被迫维持静止的屈服姿态。\\n\\n【包含类似变体】：润滑凝胶电击手套与滞霆惩罚系统, 强制高潮崩溃摄影, 项圈牵引与栓固定点系统, 单手套与渐进式拘束升级, 连锁惩罚：乳汁浸染的自缚型后手观音缚, 单手套与收缩式手臂束缚系统, 渐进束缚的单手套与全拘束升级, 项圈牵引与社交性宠物化, 项圈细链与书桌锁槽拘束系统, 触手改造高跟拘束靴, 乳环联动后手拘束装置, 项圈与牵引链：宠物化的身份烙印, 活体触手敏感化长靴, 单手套与无助暴露玩弄, 单手套与全方位束缚的无力化调教", "uid": 511}, "全束缚调教拘束衣": {"content": "{全束缚调教拘束衣}\n简介：\n【以厚实皮革与魔法锁扣制成的全身拘束衣，将受虐者从脖颈至大腿完全包裹束缚。其核心是以分段胯带上的金属环固定狰狞阳具状振动棒，每一次身体的细微扭动都会牵动玩具在体内搅动。整套拘束衣附带项圈、乳铐、乳环、束腰、腿环，并悬挂有口塞、眼罩和自动补充媚药的试管。最恶毒的是它的调教机制：每天夜晚注入魔力激活后，振动棒与淫纹联动记录高潮次数，每在忍耐时段内高潮一次，次日白天便会随机启动振动并封印魔力十分钟作为惩罚。而开锁钥匙始终挂在受虐者项圈下的锁链上，垂在胸口，时刻用触感提醒着——只要伸手就能解开的自由，反而将忍耐化为酷刑。】\n\n用法与交互：\n1. 施虐者从头到腿为受虐者穿戴拘束衣，以魔法锁扣依次锁紧项圈、乳铐、束腰、腿环。乳铐会收紧至陷入乳根，乳环则箍住挺立的蓓蕾下半，上半裸露在外。\n2. 双腿间分叉的胯带末端金属环重叠，插入布满螺纹与磨砂颗粒的巨型振动棒，末端凸起卡在环外，使玩具与拘束衣合为一体。受虐者每动一步，胯带都会扯动玩具摩擦穴壁。\n3. 项圈下以细链垂着开锁钥匙，受虐者随时可见可触，但一旦使用即宣告认输。腿环悬挂镂空深喉口球与遮光眼罩，随时可剥夺感官。右腿环上的魔导试管空置超过一定时间便释放电击，迫使受虐者定期服下媚药并自行补充新的药液。\n4. 夜间设定忍耐时限后，振动棒持续工作，淫纹记录高潮次数。次日若超出限额，则拘束衣会在教室、训练场等公开场合随机启动振动并封印魔法，令受虐者在禁魔的羞耻中忍受旁人目光。\\n\\n【包含类似变体】：全包魔法拘束衣·内置高潮锁", "uid": 512}, "禁魔束腰·肉欲拘束衣": {"content": "{禁魔束腰·肉欲拘束衣}\n简介：\n【场景/道具描述】\n一套由黑色皮革编织而成的连体拘束衣，紧密包裹受虐者的躯干。束衣在乳房根部、腰部、胯下均设有可调节并自动收紧的皮带锁扣。衣物材质混有抗魔涂料与封魔符文，能严重扰乱并压制穿戴者的魔力流动使其无法施法。乳房被乳根皮带勒紧凸出，乳晕与乳尖却完全暴露在皮套之外以供玩弄；胯下皮带呈V字形深勒入股，中央设有锁孔，需通过一根尺寸夸张、顶端正对花心的振动阳具插入蜜穴并上锁来完成穿戴，实现“插件式”穿衣，无法自行取下。\n\n用法与交互细节：\n1. 强制禁魔与快感剥夺：束衣一旦被激活，会持续压制受虐者的魔力，使其从强大的法师沦为柔弱的玩物。同时，锁入体内的振动阳具可被远程控制或定时启动，使其在任何日常活动中（如走路、上课）都面临随时被强制送上高潮的羞辱风险。\n2. 羞耻的物理绑定：背后的皮铐可在瞬间将受虐者的双手反剪至腰后锁死，腿环上的皮扣则能将小腿折叠与大腿铐在一起，将其捆成一团毫无反抗之力的“肉粽子”，只能任人摆布。\n3. 感官聚焦玩弄：由于无法使用魔法且行动被彻底束缚，穿戴者的恐惧与快感被无限放大。施虐者可以肆意揉捏、刮擦其完全暴露的勃起乳尖，或是隔着束衣按压其小腹，感受体内阳具顶起子宫口的凸起，从外部给予更深度的刺激。\\n\\n【包含类似变体】：禁魔拘束衣（时计淫衣）", "uid": 513}, "快感与痛苦转换项圈": {"content": "{快感与痛苦转换项圈}\n简介：\n【项圈】由施虐者冷酷地取出遥控器，拇指按下猩红色按钮的刹那，项圈释放出被改造过的生物电流。这电流只精准刺激快感神经，在受虐者体内掀起滔天快感狂潮，从细微酥麻到强制绝顶，再越过高潮阈值，将每一条神经末梢烧灼成扭曲的痛苦信号。它能把最极致的愉悦瞬间转化为无法承受的折磨，令奴隶在极乐与崩溃的边界上抽搐、失禁、彻底丧失自我。更可怕的是，项圈内还藏着比电流更黑暗的秘密，那是连求死都不能的终极枷锁。\n\n用法与交互：\n1. 施虐者轻按遥控器不同颜色的按钮，可切换模式：低档酥麻挑逗，中档强制持续高潮，高档快感过载引发神经性剧痛。\n2. 长按猩红按钮三秒，项圈会解锁隐藏功能——注入微量神经毒素或释放高频声波，令奴隶产生濒死幻觉，精神彻底屈服。\n3. 项圈与遥控器无线绑定，超出范围自动触发最高档惩罚，确保奴隶永远无法逃离主人的掌控。", "uid": 514}, "指动尿道锁——淑女修行用餐/奏乐刑具": {"content": "{指动尿道锁——淑女修行用餐/奏乐刑具}\n简介：\n一具将施虐与优雅刻入本能的精密刑具。过肘丝质手套内藏感应丝线，与受虐者尿道中十节膨胀环栓具无线联动。每有一根玉指触及物体，对应节数便膨胀挤压尿道壁；若发力握持，整根栓具将同时高频震动，将最私密的排泄孔道化为快感与屈辱的共鸣腔。\n\n用法与交互：\n1. 受虐者必须佩戴超长过肘手套，尿道内塞入十节磨砂膨胀栓，外部用贞操锁固定。\n2. 当受虐者用餐刀叉或弹奏钢琴时，每触键、每发力切割，尿道内便传来膨胀与震动的双重折磨。\n3. 指尖动作越精细频繁，尿道内的刺激就越紊乱不可预测，令进食与奏乐沦为无法压抑呻吟的淫刑。\n4. 若受虐者失声呻吟，埋藏于乳中的跳蛋同步启动，连锁引发更猛烈的尿道惩罚，直至沦陷于寸止电击的绝望循环。", "uid": 515}, "机械放尿刑架": {"content": "{机械放尿刑架}\n简介：\n【机械放尿刑架】\n这是一间专门摧毁排泄尊严的舱室。正中是一个方形小池，上方悬着数只冰冷机械手。旁边小桌整齐码放着一瓶瓶琥珀色液体——那是效力极强的利尿剂。整个空间没有墙壁遮挡，只有绝对的暴露与审视。\n\n用法与交互：\n1. 受虐者被机械手凌空抓起，双腿最大限度朝两侧掰开，将塞着尿道锁的下体对准小池。\n2. 施虐者会远程开启尿道锁，但受虐者必须强行憋尿整整5分钟。计时期间，任何一滴尿液渗出都算失败。\n3. 失败者将被强行灌下大量利尿剂，重新开始完整流程。成倍增加的尿意与再次压抑的折磨，会让膀胱几乎炸裂，最终在崩溃中释放。", "uid": 517}, "防咬舌自尽电击项圈": {"content": "{防咬舌自尽电击项圈}\n简介：\n【防自尽电击项圈】紧缚在脖颈上的黑色项圈，内置神经感应电极与高压脉冲模块。当受虐者意图以咬舌自尽等极端方式反抗时，项圈会在牙齿触及舌头的瞬间释放精准电击，麻痹口腔肌肉与舌神经，令咬合动作失效，同时引发的剧痛与失控感从咽喉蔓延至全身，将其最后一丝尊严和反抗意志彻底击碎。电击强度恰巧避过致命阈值，只留下灼热的麻木和被剥夺死的权力的屈辱。\n\n用法与交互：\n1. 受虐者产生自残动作时自动触发，电流持续1-3秒，可配合失禁惩罚。\n2. 施虐者可手动遥控激活，作为对一切违逆的即时惩戒。\n3. 常与排泄控制、公开羞辱等场景联动，确保调教流程不被中断。", "uid": 518}, "绝望尿意拘束": {"content": "{绝望尿意拘束}\n简介：\n【受虐者被植入尿道锁，灌入利尿剂后，穿上束腰、反绑手臂、锁上高跟鞋，囚禁于完全黑暗的房间。无法排尿、无法入睡、无法求饶，在无尽的尿意与孤独中遭受心理摧残。】\n\n用法与交互：\n1. 将金属尿道锁插入受虐者尿道，彻底封堵排泄通道。\n2. 强制灌服利尿剂，使其膀胱迅速胀满。\n3. 穿戴全套拘束：淑女束腰压迫胃部与膀胱，口球与眼罩剥夺言语和视觉，手臂被长手套反扭身后，项圈锁链将躯体固定在墙角。\n4. 关闭所有光源，令受虐者在黑暗与死寂中独自承受肉体和精神的双重煎熬，直至施虐者宣布惩罚结束。", "uid": 519}, "磁控自锁束腰牵引装置": {"content": "{磁控自锁束腰牵引装置}\n简介：\n一套由透明肛塞、磁控自锁尾座与特殊束腰皮带组成的精密拘束器械，通过短链将肛门与腰腹强行连接，形成极度屈辱的体态控制。\n\n【场景/道具描述】\n肛塞由高透材质制成，能清晰映出肠壁嫩肉的蠕动与羞耻的收缩；尾端嵌有一枚精密的磁控锁扣机构，一旦推入体内便自动咬死，只有对应的磁性密钥才能释放。束腰皮带由柔韧却无法割裂的复合材质打造，紧紧勒在肋骨下缘，皮带后腰处垂下一段极短的牵引链条，链条另一端与肛塞尾部的锁环相连。链条长度被刻意缩减到让肉体不得不痛苦地塌腰、臀部被迫向后翘起才能勉强缓解腹腔内撕裂般的拉扯感，任何直立或前倾的尝试都会让肛塞将直肠壁向体外残忍地拖拽，带来排泄失控般的绝望崩溃。", "uid": 520}, "强制尿意与排泄枷锁": {"content": "{强制尿意与排泄枷锁}\n简介：\n【利尿剂在血管内无声嘶吼，将膀胱催逼至爆裂边缘。尿道塞与贞操锁铸成冰冷的闸门，把一切释放的本能判为无期徒刑 述】\n一枚由通透幽蓝色水晶构成的三阶魔方，内部流动着星点光芒。它并非战斗装备，却比任何武器都更令人绝望——只要接触受虐者身上的拘束套装，便可瞬间解构其全部结构与功能，并将其中的控制权限完全转移至施虐者意念之中。此后，无论受虐者的四肢被锁链如何拉扯，体内的跳蛋、振动棒或是电击器，只需施虐者心神一动便会即刻遵从。魔方还可将解析过的装备进行复制与改造，甚至幻化为传说中的神器（如强行吸取魔力的“狩猎血羽”），将拘束与榨取完美融合。\n\n用法与交互：\n1. 施虐者手持魔方触碰受虐者穿戴的拘束具，完成解构后，所有拘束具均被纳入魔方的无线控制网。\n2. 施虐者可通过意念分别或同时操控任何一件道具的强度、模式与联动，如突然将所有振动调至最高档，或瞬间将受虐者吊起拉成极限驷马紧缚。\n3. 可调用已解构的道具记录，将功能叠加到现有拘束具上，或直接复制出实体道具，实现“从受虐者内心深处最恐惧的幻想中提取灵感再施加其身”的凌辱循环。\\n\\n【包含类似变体】：分心魔方——性刺激下的智力摧残, 铸造魔方·拘束具的解析与复制", "uid": 526}, "剥夺抚慰与羞辱计数的金属拘束监禁工作台": {"content": "{剥夺抚慰与羞辱计数的金属拘束监禁工作台}\n简介：\n一间整合了贞操束具、传感器与监控系统的密闭工作室，在极致剥夺下强迫奴隶进行需要高度专注的精细创作。\n\n【场景/道具描述】\n受虐者被锁入一间只有数位屏和无尽拘束的封闭监牢。全身被泛着银光的金属束具覆盖：无法打开的贞操胸罩包裹着火烫骚动的乳房，下身被填满跳蛋的贞操带完全封锁，脖颈间窒息项圈静静待命。屏幕另一侧，施虐者冷冷地监控着一切——包括受虐者双手离开绘图笔去抚摸自己却被金属壳挡住的每一次痛苦动作。触摸胸部的次数被实时统计、播报：“三十一次，每四分钟就想摸一次……还有抚摸下体的十三次……” 这种数据化羞辱混合着持续不断的跳蛋震动与乳房开发，在精准的窒息高潮阻断下，把创作变成一场肉体饥渴与心理绝望之间的撕扯。无法高潮，无法暂停，无法触及自己一丝一毫，只能带着发烫的身体和溢流到大腿的爱液继续完成精细的工作。\n\n用法与交互：\n1. 全身金属拘束与贞操道具剥夺一切自慰权利，任何试图自我抚慰的动作都会被传感器记录并通报，构成无死角的心灵羞辱。\n2. 高潮控制与强制工作并行：完成定量任务前，所有刺激仅保持在挑逗层面，接近高潮即刻被窒息项圈阻断，迫使奴隶在欲望淤积中持续劳动。\n3. 施虐者可以随时远程调节跳蛋强度或查看绘图进度，以“不合格就永远锁着”为杠杆，将艺术创作彻底转化为服从性测试。", "uid": 527}, "传感器联动固定媚药团缚放置系统": {"content": "{传感器联动固定媚药团缚放置系统}\n简介：\n【场景/道具描述】\n一套将受虐者彻底固定成蜷缩球状的精密拘束设备。双手在背后交错铐住，小臂用十字形束带捆牢。双腿并拢后，脚腕与膝盖被多条弹力绳整理，最终形成手腕-项圈、小臂-脚腕、膝盖上方三道闭环连接。特制弹力绳的节点全部搭载传感器，最凶狠的一段股绳则从后背直勒下体，深深陷入阴户，将体内原本填满的触手肉棒再推入半寸。口塞内部预装了气体媚药挥发仓，呼吸间甜腻的花蜜味持续侵蚀神志，空气通道的设计在维持呼吸的同时无法避免媚药吸入。眼罩完全剥夺视线，整个身体被一圈圈收紧至肌肉只要丝毫放松就会牵拉传感器触发惩罚的程度。\n\n用法与交互：\n1. 受虐者被绑成侧躺团缚姿势，完全无法移动。所有弹力绳与拘束带构成一个敏感回路，当受虐者因不适或欲望扭动时，传感器立即将挣扎转化为下体三根触手棒的强力振动。越挣扎，振动越剧烈，高潮越频繁，强迫其在疼痛与渴求间自我压制。\n2. 口塞内置的气体媚药持续挥发，随着时间推移逐渐瓦解理智，让受虐者越来越难以控制身体不挣扎。这是一个无解的闭环：媚药催动欲望→身体扭动→触发振动→强制高潮→媚药加深欲望。\n3. 预设四小时强制放置，期间受虐者必须靠意志力逆着肌肉本能保持绝对静止才能减轻折磨。但媚药的作用下，每一次失控的痉挛都会招来更密集的强制高潮，最终在暗无天日的禁锢中被玩坏成只懂得痉挛的苗床。\\n\\n【包含类似变体】：感应拘束团缚放置与强制高潮装置", "uid": 528}, "远程控制公众调教套装": {"content": "{远程控制公众调教套装}\n简介：\n【远程控制公众调教套装】一套由施虐者远程操纵、与受虐者身体动作联动的极致羞辱装置，将受虐者变为公共场合中行走的调教艺术品。\n\n它包括：触手抹胸（随手臂动作自动加强乳头吮吸）、可遥控注射媚药的乳环、极短间隙的大腿铐与超高跟靴、三穴填充玩具（震动棒、拉珠、尿道塞）以及遍布体表的电极片。所有装置均被华丽衣饰完美掩盖，但每一秒都在用精密而恶毒的机制摧残受 忍不住扭动时，传感器触发触手惩罚，疼痛与快感交织，逼使受刑者用意志对抗生理需求。", "uid": 537}, "高潮阻隔项圈与感应锁链": {"content": "{高潮阻隔项圈与感应锁链}\n简介：\n一套由精密传感器控制的金属项圈与锁链系统，能够实时监测受虐者的生理兴奋度，并在高潮临界点强制阻断神经信号，使其永远徘徊在绝顶边缘而无法释放。\n\n用法与交互：\n1. 项圈紧锁脖颈，内置电极与脉搏感应器，当受虐者的‘高潮进度’达到100%时，项圈会释放微电流阻断快感传导，同时锁链猛然收紧，将她拽回绝望的冷水之中。\n2. 锁链连接天花板与四肢拘束具，越挣扎越收紧，将受虐者调整成最羞耻的姿势，同时项圈的显示屏冷酷闪烁进度，提醒她距离释放还有多远——而这距离，永远无法跨越。", "uid": 538}, "电击插入式拘束服": {"content": "{电击插入式拘束服}\n简介：\n【道具】无缝贴身的白色皮质拘束服，覆盖至下巴，内层有数枚可伸缩医疗细针，精准刺入乳房、阴蒂等敏感点；服装表面隐现蓝色电光纹路，外挂锁链与项圈皮带。\n\n用法与交互：\n1. 细针与脉冲电极联动，受虐者一旦姿势偏差、试图反抗或违抗指令，便触发从刺痛到灼烧感的级联电击。\n2. 项圈下方钢锁扣连接皮带，施虐者可随时收紧逼迫抬头；同时深喉口塞从内部撑开口腔，连呻吟都被扭曲成破碎的呜咽。", "uid": 539}, "多重电磁手指铐与袖中皮套捕缚术": {"content": "{多重电磁手指铐与袖中皮套捕缚术}\n简介：\n【场景/道具描述】\n一种由多副独立小铐环组成的极端手指拘束系统。施虐者将受虐者手臂反剪至背后，左手五指被分别塞入独立的铐环，再通过大铐环将手掌以反关节姿势固定于右手手肘上。右手如法炮制后，交叉的小臂被额外铐环锁定。全部铐环内置电磁吸附系统，在机括运转后会在磁力作用下收紧至极限，连一根手指都无法动弹。最后，整个被锁成方块的手臂组合被送入一个白色皮套中，扎口上锁，并由拘束服自带的皮带二次固定。\n\n用法与交互细节：\n1. 双手功能性阉割：对特工、杀手等依赖双手的受虐者，此拘束将灵敏的双手彻底封死在皮袖内，连触碰自己身体的权利都被剥夺。无论其多么善于开锁，在手指被电磁力固定在皮套内部的情况下也无计可施，制造出极致的无力感。\n2. 储液包与身体管理的结合：双手在背后交叉后形成的空隙，被巧妙利用来放置储液包（灌肠液或媚药），使其成为拘束的一部分。受虐者任何挣扎都会牵动管线和储存的羞耻液体，不断提醒其被改造的事实。\n3. 优雅的极致禁锢：从外表看，受虐者只是穿着高领长袖的优雅紧身拘束衣，无人能窥见皮袖之下，双手已被电磁力锁死在极限反关节姿态。这种内外反差极大地满足了施虐者的支配欲。\\n\\n【包含类似变体】：磁力收紧完全指铐系统", "uid": 540}, "精神病院拘束服与强制榨乳组合": {"content": "{精神病院拘束服与强制榨乳组合}\n简介：\n【场景/道具描述】\n来自秘密调教机构CloneSpring的绝望设备——纯白色的精神病院专用拘束服，以交叉皮带和金属锁扣将受虐者的双臂牢牢捆在胸前，双腿在脚踝处并拢锁死，连手指都无法动弹分毫。拘束服在胸部位置敞开两个圆洞，暴露出完全无法遮掩的双乳。沉重的电动榨乳器被紧紧扣在乳首上，透明的收集瓶连接着持续抽吸的管线，伴随着受虐者喉咙里漏出的呜咽，乳白色的汁液一滴一滴地被强行从从来不曾被人触碰的身体深处抽出，再被封装、标价，挂在网站上向所有渴望羞辱她的陌生人出售。", "uid": 541}, "罚站拘束与通电地板绝境": {"content": "{罚站拘束与通电地板绝境}\n简介：\n【极其恶毒的罚站牢房，受虐者被吊锁链、双腿分杆禁锢于蜂窝状通电地板上，过膝高跟靴内藏电动按摩板，脚趾被铐环锁死，哪怕一丝松弛都会招来电击。】\n\n用法与交互：\n1. 全身拘束服与项圈吊链强制站立，膝盖大腿绑死，双脚被金属棍拉开成内八字，重力全部压在插着玩具的小腹与臀上；细高跟将脚掌绷成极限弧度，脚趾却被内置铐环死死扣在鞋底的按摩板上，无处可逃。\n2. 靴内按摩板持续振动脚底，令踮起的脚趾在酥麻与疼痛中耗尽力气；一旦受不了刺激稍微抬起脚跟，或鞋跟离地，蜂窝地板瞬间电击会让脚尖也为之一同惩罚。\n3. 受虐者本能想找支撑、挪动脚掌，但分腿杆与地板通电让任何移动都成为电击触发器；只能以极度扭曲的站立姿势，在绝望中享受脚底与子宫的双重蹂躏。\n4. 立柱与墙壁被设置为惩罚禁区，靠近即电；每一次狼狈的摇晃、每一次高潮边缘的挣扎，都只会让按摩与电击更肆无忌惮地蚕食残存的理智。\\n\\n【包含类似变体】：高跟鞋内藏式电击按摩脚趾铐与罚站地板", "uid": 542}, "冷艳搜查官的克隆模拟远程调教系统": {"content": "{冷艳搜查官的克隆模拟远程调教系统}\n简介：一个名为【CloneSpring】的邪恶公司推出的服务，通过出售配套的性玩具采集数据，完美模拟出被囚禁的特工、搜查官等美少女的思考与反应，供客户进行沉浸式远程调教。\n\n【场景/道具描述】\n一个高科技模拟平台，客户端是一台配备详细解剖图与玩具控制开关的电脑。画面中呈现一间坚实的银色金属囚室，中央立柱上拘束着一名高度还原的受虐者虚拟体。该虚拟体与现实中某位被监禁的搜查官（代号R137）拥有完全一致的样貌、声线、小习惯和生理反应。虚拟体配备与实体相连的全套玩具，包括深喉口塞、振动棒、灌肠器、憋尿装置以及缠绕在阴蒂和乳头上的触手。\n\n用法与交互细节：\n1. 客户（主人）可在界面中选择任意互动方式，如命令虚拟受虐者进行深喉口交。当虚拟体的小嘴含住深喉口塞并努力吞咽时，主人可以远程激活口塞内的振动或灌入模拟精液，虚拟体需将液体全盘接下，并用舌尖舔净嘴唇表示感谢。\n2. 该系统还将现实中受虐者被榨取的乳汁（如“初乳”）作为限量周边出售，视频记录下她被精神病人用的白色拘束服紧缚、双乳套上榨乳器被强制抽吸出乳汁的全过程，引发客户的狂热抢购与更深层的占有欲，彻底将特工的尊严商品化。\\n\\n【包含类似变体】：虚拟角色调教系统", "uid": 543}, "深喉口塞、反刍口球与口腔反馈装置": {"content": "{深喉口塞、反刍口球与口腔反馈装置}\n简介：\n【场景/玩法描述】深喉口塞、反刍口球和口腔反馈装置都用于撑开口腔、压制语言、训练吞咽或侍奉动作；可加入振动、储液、温度、传感器和语言过滤机制。\n\n用法与交互细节：\n1. 口塞固定后深入喉口或顶住舌根，使受控者只能发出含混声音，语言表达被转化为服从性的呜咽。\n2. 装置可内置导管、储液罐、振芯、温度魔法或传感器，用来检测唇舌动作并给予奖励或惩罚反馈。\n3. 可与眼罩、腿环、乳环、项圈或全身拘束配合，让“随时被命令戴上口塞”成为长期威胁。\n4. 可变体：强制喂食深喉口塞、变形式深喉口塞、反刍口球、淫语过滤器、玄冰低温口塞、精密口腔反馈训练器。\n\n【包含类似变体】\n- 深喉口塞与强制喂食装置\n- 乳首磨砂环与变形式深喉口塞组合\n- 深喉反刍·窒息口球\n- 深喉口塞淫语过滤器\n- 玄冰深喉口塞\n- 强制深喉口塞与精密口腔侍奉反馈", "uid": 544}, "媚药水牢": {"content": "{媚药水牢}\n简介：\n【极致煎熬的双重欲望牢笼】\n这是一座以催情液灌注的浅型水池，水面恰好淹没受虐者的腰际，却足够将肉体和意志一同浸泡在永不熄灭的欲火之中。池壁延伸出数条锁链，扼住颈间项圈与脚踝镣铐，令穿着细高跟的双腿被迫绷直站立，任何一个微小的挣扎都只会让锁链更深地噬入皮肉。双手被反折捆绑，视觉被厚重的眼罩彻底剥离。水牢被设计为两人一组：一人被固定上无休止运转的强制玩具，在无法挣脱的束缚中被推向一次又一次高潮，直到意识蒸腾殆尽；另一人则被迫吞服高浓度媚药，每一滴池水都在加剧体内的燥热，却绝不允许多余的释放，只能在欲望的极限边缘撕扯残存的理智。唯一被允许的触碰，是水中摸索到的嘴唇——一场在意识融化前拼命支撑的窒息长吻，成为两人仅存的绳索。当药效彻底摧毁思考，连接吻都因虚脱而松开时，惩罚才进入倒计一个小时的昏迷倒计时。", "uid": 546}, "寸止电击连缚平衡游戏": {"content": "{寸止电击连缚平衡游戏}\n简介：\n【场景/道具描述】\n一场双人参与的平衡惩罚游戏。施虐者将两名受虐者以不对称的连缚方式吊缚。受虐者A：右腿高高吊起折叠捆绑，左腿单立踩细高跟，项圈与脚腕锁死，全身重量集中于一只高跟鞋上，阴道内塞入多枚跳蛋，尿道被触手撤出并灌入利尿剂，后庭塞入拉珠串。受虐者B：双手反剪吊缚，单脚点地，全身覆盖毛刷爪与银针的高潮抑制贞操锁具。两人的项圈被锁链相连，下方悬挂一只平衡吊坠。\n\n用法与交互细节：\n1. 吊坠的任何晃动都会触发两人身上所有振动玩具功率上调。只要有受虐者因体力不支或快感崩溃而倾倒，吊坠晃动，刺激继续递增，形成恶性循环。\n2. 受虐者A被迫在利尿剂与跳蛋双重攻击下体验强制失禁；受虐者B则在最高阶贞操锁的挑逗下被禁止高潮，只能目睹对方失禁的羞耻画面。\n3. 视线与言语被眼罩和口球剥夺后，双方仅通过锁链的拉扯感知彼此状态，在振动玩具与媚药催化下共同滑向高潮与寸止的终极崩溃。\\n\\n【包含类似变体】：双人失衡惩罚吊缚游戏", "uid": 547}, "窥阴器扩张与内窥灼烧管": {"content": "{窥阴器扩张与内窥灼烧管}\n简介：\n【窥阴器扩张与内窥式灼烧管——深入子宫的精确炙烤】\n\n一套结 十五厘米高跟鞋，全身重量集中在腰腹，被迫用最敏感的内部去感受每一次进出。任何试图抬脚逃离电击地板的动作，都会导致鞋底机关释放电流惩罚脚趾。", "uid": 629}, "寸止调教与强制进餐系统": {"content": "{寸止调教与强制进餐系统}\n简介：\n【场景/道具描述】\n受虐者被强制进行“进餐模式”调教，口中含着的口塞被替换为更轻便的装置，但牙关仍被强制撑开。尿道内植入生物胶固定的锁具，牢固且深入，内部藏有振动棒。后庭内有一串可滚动激活的珠串。拘束衣紧缚全身，使受虐者如毛毛虫般扭动。\n\n用法与交互细节：\n1. 尿道锁具的振动棒在进食时启动，带来比阴道更集中的刺激，伴随疼痛与膀胱内积液的震颤感，迫使受虐者只能通过进食来暂停刺激。\n2. 后庭珠串滚动，配合拘束衣的限制，让受虐者无法缓解不适，只能在地板上扭动挣扎。\n3. 进食时，受虐者需用舌头舔食盆中的爱液，口环限制吞咽动作，只能仔细品味，强化羞耻感。", "uid": 630}, "口环与深喉玩具的强制沉默": {"content": "{口环与深喉玩具的强制沉默}\n简介：\n【场景/道具描述】\n受虐者口中含入深喉玩具，被黑色皮带面罩固定，小嘴鼓鼓囊囊，无法说话。口环限制吞咽，只能发出呜咽。\n\n用法与交互细节：\n1. 深喉玩具强制受虐者保持张口姿势，唾液无法吞咽，流到地上。\n2. 受虐者试图用眼神表达愤怒，但被施虐者嘲弄其表情，强化羞耻感。\n3. 口环与面罩结合，使受虐者无法反抗，只能被动接受调教。", "uid": 631}, "宠物化调教捕影系统": {"content": "{宠物化调教捕影系统}\n简介：\n【场景/道具描述】\n为了将调教过程制作成影像产品，施虐者将一名受虐者装扮为色情宠物猫。装备包括蝴蝶结项圈（带电击功能）、猫耳发箍、猫尾肛塞、振动乳环与阴蒂环（金色环体内藏振动单元）、粉色四肢折叠束缚皮带（内衬绒毛）、黑色蕾丝手套与丝袜、以及大量无功能纯装饰的粉色缎带。阴道内插入最大功率的振动阳具，以一条丁字裤固定。\n\n用法与交互细节：\n1. 受虐者四肢被折叠捆成半截，只能以膝盖和手肘爬行。项圈牵引链由另一名受虐者（主人角色）手持，不配合爬行就触发电击。\n2. 主人将宠物牵至盛有乳白色糊状物的宠物饭盆前，命令其只能用舌头舔食，同时用皮鞭抽打其抬起的臀部与大腿内侧，惩戒姿态与宠物身份形成极致对比。\n3. 全程由施虐者拍摄，将这种曾经高傲的搜查官变作发情猫咪舔食、爬行、被鞭打的影像，作为定制色情影片对外上映。", "uid": 632}, "植入式跳蛋与拘束连锁振动系统": {"content": "{植入式跳蛋与拘束连锁振动系统}\n简介：\n【场景/道具描述】\n四枚植入式跳蛋分别置于体内，与乳尖金色振动环、阴蒂振动环通过传导系统联动。大腿根部绑带上锁有跳蛋遥控器，导线从贞操带内延伸而出，将多重振动源统一纳入一个连锁反馈网络。\n\n用法与交互细节：\n1. 植入跳蛋率先启动，随后通过拉扯中央圆环触发乳尖环振动，膝盖移动则激活阴蒂环责难；每一次受虐者的主动发力都会瞬间转化为对身体三点的同步刺激。\n2. 跳蛋可通过败方惩罚累加塞入小穴，数量越多内部臃肿感越强，但挣扎能力随之衰减；六枚跳蛋同时运转时，小穴被填满到无法闭合，振动传导至子宫口持续引发潮吹。\n3. 连锁系统设计为\"动即受罚\"——任何抵抗或进攻动作都会以振动形式反馈到敏感部位，迫使受虐者在追求胜利与抵抗快感之间陷入两难。", "uid": 633}, "强制开口与舌部牵引拘束": {"content": "{强制开口与舌部牵引拘束}\n简介：\n【场景/道具描述】\n金属开口器撑开双唇，内部夹子将舌头夹住并向外强制拽出，使舌头无法收回口腔。配合反剪双臂与折叠黑丝美腿的完全拘束状态，受虐者只能发出无意义的呜咽。\n\n用法与交互细节：\n1. 在受虐者小穴已被多颗跳蛋塞满、股绳持续摩擦媚肉的状态下叠加舌部牵引，剥夺其语言能力的同时增加新的羞耻维度。\n2. 舌头被迫外露导致唾液无法吞咽，银丝不断滴落，配合高潮时的失控痉挛，形成\"上下两张嘴同时被侵犯失禁\"的视觉效果。\n3. 开口器与夹子的微痛感与跳蛋振动形成反差刺激，受虐者越是试图挣扎越是将舌根拉扯得更疼，最终只能在无意义的呻吟中放弃抵抗。", "uid": 634}, "输乳安慰与角色逆转母性调教": {"content": "{输乳安慰与角色逆转母性调教}\n简介：\n【场景/道具描述】\n一方受虐者经历长期激素调整后乳房可分泌甜美乳汁，作为伴侣间情感慰藉的特殊媒介。场景设计为平日强势的一方因心理脆弱而蜷缩在另一方怀中进行哺乳，完成从施虐者到被呵护者的角色逆转。\n\n用法与交互细节：\n1. 强势方因无法理解\"幸福\"概念而情绪崩溃哭泣，弱势方主动引导其含住乳尖吮吸乳汁，以母性光辉填补对方童年的情感缺失，同时自己因乳尖被吮吸的微痛与快感交织而发出可人的呻吟。\n2. 乳汁作为\"可饮用的安慰剂\"蕴藏催情或镇静成分，吮吸行为越激烈代表情感依赖越深，而哺乳方则以宠溺的眼神与凌驾姿态完成权力关系的瞬时反转。\n3. 此场景与日常拘束调教形成强烈反差：平日里强势方掌控所有拘束器具与惩罚权，此刻却如婴儿般趴在对方怀中边哭边吸奶，强化了\"支配者亦需被支配\"的恶堕内涵。", "uid": 635}, "绝对无力化拘束与自由剥夺情侣游戏": {"content": "{绝对无力化拘束与自由剥夺情侣游戏}\n简介：\n【场景/道具描述】\n受虐者双手平行反折后被手铐锁于背后，十指被五指铐与另一侧手肘铐环禁锢至无法动弹。小腿折叠后用绑腿缚住，贞操带填满三插件（振动棒、肛塞、尿道锁）并以外露的弹力绷带连接脚镣。项圈与施虐者手腕通过金色细链连接，形成\"无法分离的掌控关系\"。\n\n用法与交互细节：\n1. 施虐者将自身左手与受虐者项圈牵引链用手铐锁在一起，以单人臂力将完全无法挣扎的对方抱起进行喂食、接吻、移动等日常活动，受虐者唯一能做的只有蜷缩在对方怀中蹭动。\n2. 所有拘束的实际限制效果被设计为恰到好处的程度——足以剥夺任何自主行动能力，却不会造成实质性伤害，使被拘束感转化为\"被完全掌控的安全感\"，配合恋人间的亲密举动形成甘愿被囚禁的恶堕心态。\n3. 这是从监狱极严苛拘束到自由生活中轻度拘束游戏的过渡仪式：施虐者通过模仿监禁中的无力化方案（但降低强度）向受虐者传递\"即使自由后我仍掌控你\"的默契，而受虐者则以主动配合与撒娇回应，完成二人支配/被支配关系的日常化与浪漫化。", "uid": 636}, "母乳雪糕的羞耻前戏与强制喂食": {"content": "{母乳雪糕的羞耻前戏与强制喂食}\n简介：\n【场景/道具描述】\n施虐者将自己的乳汁冻制成一根粗长且散发乳香的雪糕，底部插有木棍作为手柄。雪糕被故意做得粗大，以延长舔舐品味的时间。配合的场景是情侣间的“Pocky Game”游戏，两人从两端开始舔舐同一根雪糕，最终嘴唇相碰。\n\n用法与交互细节：\n1. 施虐者取出冻成雪糕的乳汁，向受虐者揭示其“真实身份”，以此激发受虐者的羞耻心与背德感，将孕育后代的纯洁象征转化为情色挑逗的道具。\n2. 两人一同含住雪糕两端，在舔舐、吮吸和唾液的共同作用下，雪糕逐渐融化。冰冷与香甜的味觉刺激，混合着双方逐渐靠近的鼻息与体温，将日常的饮食行为转化为极具性张力的前戏。\n3. 当雪糕融化至根部，两人的嘴唇最终接触时，施虐者可强势地撬开对方的口腔，将对方口中残存的、混合了两人唾液的乳制甜液尽数吸走吞咽，完成一次侵略性的体液交换与口腔支配。\n4. 施虐者可以此为基础，衍生出更为禁忌的玩法，如预告下次会将融化的乳汁含在自己口中，直接以接吻的方式喂给受虐者。", "uid": 637}, "塑体束身内衣·形体改造与拘束系统": {"content": "{塑体束身内衣·形体改造与拘束系统}\n简介：\n【场景/道具描述】\n黑色硬质塑体内衣，内部为舒适亲肤面料可长期穿戴，外部材质坚硬。包含束腰钢骨部分、乳房根部收紧皮带、内嵌硅胶短棒的乳罩模组。下体紧贴胯下，预留吊袜带卡扣与背部镂空用于连接手肘铐。\n\n用法与交互细节：\n1. 束腰压迫限制呼吸，乳房根部皮带配合乳头锁将乳房塑造成更丰满的形状。\n2. 内嵌硅胶棒精准压迫乳晕正中，与乳头锁内外夹击敏感部位。\n3. 作为基础拘束平台，通过卡扣连接大腿环、手肘铐、项圈等组件，构成完整的束缚体系。", "uid": 638}, "淑女步态调教·后手观音束具与电击惩罚系统": {"content": "{淑女步态调教·后手观音束具与电击惩罚系统}\n简介：\n【场景/道具描述】\n手臂用单筒手套固定成后手观音姿势，掌心贴合、手指用五指铐连接单节锁链限位，手腕与手肘有金属铐加固。手肘铐通过晚礼服背部镂空固定在内衣上，手腕铐通过锁链连接至项圈。大腿环内置电击器，由侍女遥控。配合16cm细跟高跟鞋、膝盖上方吊带袜、大腿间距极短的镣铐。\n\n用法与交互细节：\n1. 手臂完全固定在身后无法动弹，配合晚礼服缎带使受虐者只能挺胸收腹，呈现被动的献身姿态。\n2. 每一步都须按严格标准（大腿先抬、脚交错、鞋跟先落地），任何懈怠立即触发电击。\n3. 电击直击大腿神经而非皮肉，配合高跟鞋重心不稳，每一步都是对意志与身体的考验。", "uid": 639}, "强制步行拖车与同步高潮惩罚系统": {"content": "{强制步行拖车与同步高潮惩罚系统}\n简介：\n【场景/道具描述】\n三名受虐者被 魔力可能被拘束道具或诅咒吸收利用，反向强化了拘束系统对受虐者的控制力。\n3. 宝物本身位于魔族领地内，迫使受虐者以被押送的身份深入敌境，与押送她的施虐者共谋获取，模糊了囚徒与共犯的界限。", "uid": 644}, "反差淫堕梦魇——英雄身份剥夺与精神摧毁": {"content": "{反差淫堕梦魇——英雄身份剥夺与精神摧毁}\n简介：\n【场景/道具描述】\n受虐者被拘束入睡后经历的真实感极强的噩梦：她成功杀死魔王后返回教廷，却被魔王死前种下的淫纹诅咒侵蚀，在教廷浴室中被活体绳索紧缚、强制发情一整夜。次日被最崇拜自己的后辈圣女发现时，已变成银发染红、眼现爱心、满口求欢的淫荡姿态，最终被后辈当作魅魔重新拘束并送入审判。\n\n用法与交互细节：\n1. 梦境将受虐者最恐惧的情景具象化：牺牲一切杀死魔王的英雄，因淫纹诅咒被昔日同伴视为冒名顶替的魅魔，所有牺牲与功绩被全盘否定，崇拜自己的后辈亲手将震动棒捅入她体内并塞上口球。\n2. 梦境与现实拘束体验同步：梦中的绳索紧缚、乳头股绳摩擦、媚药涂抹等感受与现实中穿着的拘束裙装互相呼应，让受虐者无法区分睡梦与清醒的折磨，精神防线被双向夹击。\n3. 醒来后发现仍被拘束、仍在前往魔王城的路上，劫后余生的庆幸与“那只是个梦”的安心感，反而让受虐者对现实中的施虐者产生依赖与倾诉欲，加速了斯德哥尔摩情结的形成。", "uid": 645}, "重力项圈与锁链强制姿势系统": {"content": "{重力项圈与锁链强制姿势系统}\n简介：\n【场景/道具描述】\n嵌入重力魔法阵的奴隶项圈，可与圣魔剑鞘、高跟鞋、大腿环等多处弹出的锁链联动。一旦触发惩罚或拘束程序，项圈便产生极强的向下拉扯力，同时剑鞘、脚链等部位收紧，将受虐者强制拉成乳房触地、双手反剪握剑、双腿高举反弓至身后的极限驷马姿势。整个姿势不仅令身体承受极大痛苦，曲线也被绷至最性感的状态，完全无法动弹。\n\n用法与交互细节：\n1. 项圈重力魔法启动后，受虐者的脖颈被向下拖拽，迫使挺胸、沉腰、撅臀，整个躯干成为一张拉满的弓。\n2. 剑鞘两端弹出的锁链连接高跟鞋与手部，将双腿向上吊起，双手也被固定在背后失去活动能力，任何挣扎都会让项圈更紧地勒住喉咙。\n3. 采用乳房触地姿势时，双乳承受整个上身的压迫，乳头与地面反复摩擦，在痛苦中引发持续的快感，同时呼吸困难加剧，意识逐渐模糊。\n4. 即使惩罚结束姿势部分解除，受虐者的身体也会因长时间紧绷而酸软，进一步丧失反抗能力，只能屈辱地等待下一次惩罚。", "uid": 646}, "魔乳榨取之宴": {"content": "{魔乳榨取之宴}\n简介：\n【场景/道具描述】\n一座位于地下，用于大规模生产乳汁的秘密工厂。走廊两侧排列着无数小隔间，每个隔间内都囚禁着一名被强制榨乳的奴隶。她们被金属项圈与锁链固定，无法起身，只能跪坐在自己的腿上。乳房被连接着输送管的半球形透明吮吸器紧密封锁。下体则被迫穿着插入小穴与后庭双棒的邪恶皮革内裤。双手被单手套反绑在背后并固定在下方锁链上，一根输送食物与饮用水的管子强制插入口中。\n\n用法与交互细节：\n1. 受虐者被喂食具有“玉露延髓”功效的特殊食物，能强制将摄入的营养全部转化为乳汁，无视其个人意愿进行催乳。\n2. 高强度的吮吸器不分昼夜地刺激乳头，带来持续不断的高潮快感。受虐者即使身体极度疲惫，也无法抵抗这种生理刺激，只能在束缚中不停扭动呻吟。\n3. 全身的固定拘束使其无法挣扎逃脱，口中管道剥夺了绝食的权利，形成了一套完整的、活生生的、将女性彻底工具化为“乳汁生产机器”的香艳流水线。", "uid": 647}, "品质至上乳汁改造与涨乳折磨系统": {"content": "{品质至上乳汁改造与涨乳折磨系统}\n简介：\n【场景/道具描述】\n通过服下“玉露延髓”进行乳房改造，使受虐者的乳腺能将额外摄入的养分全部转化为乳汁。两只乳鸽被金属花苞型乳头塞封堵以防泄漏，乳头塞内部伸出细长毛刷，会定时旋转搔刮乳孔内壁。乳房四周被弹力绳特殊束紧塑形为最标准的水滴状。受虐者每日需注射催乳剂维持产量，并因持续涨奶而痛苦又渴求释放。\n\n用法与交互细节：\n1. 每天受虐者完成工作时，乳头塞内毛刷便会启动，以匀速旋转刺激乳头管，引发又痒又胀的难忍快感，迫使她不时夹紧胸部娇喘。\n2. 主人用餐时，受虐者需主动献上乳房，由主人解开一侧乳头塞，用手指捏住蓓蕾对准饮料杯；松手后乳汁呈细线流出，强烈的排空释放感令受虐者几乎软倒。\n3. 挤完一侧后，主人常以“两边不一样满会难受”为由逼迫她也挤出另一侧，受虐者借着羞耻得以短暂享受释放愉悦，结束后须自行补注更多催乳剂。\n4. 乳汁品质受饮食、精神状态及受虐者自身冰属性影响，呈现清凉香醇口感，配茶后更有层次，成为市场中传说的极品饮品。受虐者自身也会偷偷饮用，却因饮下后需补更多而陷入矛盾。", "uid": 648}, "三穴绝顶净化仪式": {"content": "{三穴绝顶净化仪式}\n简介：\n【场景/道具描述】\n一个固定的调教程序，要求在短时间内，同时对受虐者的下体三穴——阴道、后庭、尿道——进行彻底的灌入与清洁。阴道被分泌媚药的粘稠史莱姆占据并持续刺激；后庭被大量冰凉的灌肠液强行填满；尿道被带有刷毛的清洁棒侵入并喷射清洁剂。三者同时进行，造成毁灭性的饱胀感与刺激。\n\n用法与交互细节：\n1. 受虐者被彻底拘束在调教台上，四肢锁死。三个腔穴同时被侵入、填满、刺激。不同的刺激（媚药催情、冰水胀痛、薄荷灼烧）混杂在一起，形成难以忍受的感官风暴。\n2. 当肠道被液体极度扩张时，会压迫敏感的阴道壁，形成双重压迫快感。受虐者会在无法高潮的绝望中剧烈挣扎，发出被深喉口塞过滤后的、含糊不清的淫荡呻吟。\n3. 仪式结束后，即便解除了所有拘束，受虐者也会因体力与精神被彻底榨干而瘫软如泥，维持着张开的嘴唇和任由唾液流出的狼狈姿态，标志着一次完整的人格粉碎。", "uid": 649}, "项圈牵引系统公开调教": {"content": "{项圈牵引系统公开调教}\n简介：\n【场景/道具描述】\n受虐者佩戴着精致的金属项圈，项圈前部连接着一条优雅的锁链，锁链握把被交到施虐者手中。与其他拘束具（反绑的单手、连接双脚的脚链）配合，受虐者只能以极小的碎步、紧紧依偎在施虐者身侧后方行走。这不仅仅是一种拘束，更是一种公开场合下的所有权宣告。\n\n用法与交互细节：\n1. **买菜散步**：在繁华的市集，受虐者身穿最华美的洋装，却像宠物一样被牵着走。她试图维持高傲的形象，但牵引锁链、反绑的单手和清脆的镣铐声让她的一切伪装都变得可笑。她只能羞红着脸躲在施虐者身后，接受路人的赞美与议论。\n2. **反差塑造**：在安全区，她是高冷强大的魔导师；在施虐者牵起锁链的那一刻，她瞬间变为软糯可人的贴身女仆/宠物。这种瞬间的身份切换是对其精神调教成果的最好展示。\n3. **绝对支配**：行走的速度、方向、停留，全都不由她自己决定。锁链的每一次轻微拉扯，不仅是物理上的引导，更是精神上的鞭挞，时刻提醒着她的从属地位。", "uid": 651}, "魔法少女的拍卖与媚毒释放": {"content": "{魔法少女的拍卖与媚毒释放}\n简介：\n【场景/道具描述】\n拍卖会上，一位被俘的人类魔法少女（大魔导师）作为商品展出：被皮革眼罩剥夺视力、红色多孔口球封嘴、乳夹扣住乳头（连接乳链可拉扯致痛）、皮质内裤内置跳蛋（持续低频震动）、手脚镣铐、束腰与臂部皮带拘束。拍卖后，她被装入大手提箱运输至地下工厂。体内被下媚毒，身体敏感度增强，需通过药物与高潮释放。\n\n用法与交互细节：\n1. 少女在台上被展示时，跳蛋持续刺激，爱液流满大腿；口球导致唾液直流，眼罩脱落后面对贪婪目光，心理防线崩溃。\n2. 拍卖后，施虐者用镇静剂压制媚毒，再喂普通媚药，通过多次高潮排出毒素。少女被锁在手术台上，乳夹松开后血液回流引发麻痒疼痛。\n3. 强调“魔法少女”身份与淫堕反差：曾毁天灭地的强者，现沦为任人摆布的性奴，身体因媚毒与拘束而完全背叛意志。\\n\\n【包含类似变体】：乳夹与乳链的疼痛控制", "uid": 652}, "指触纠缠与无效挣扎系统": {"content": "{指触纠缠与无效挣扎系统}\n简介：\n【场景/道具描述】\n在拘束状态下，施虐者用纤细触手对受虐者每一根手指、脚趾进行单独缠绕。这些触须具有逆反逻辑——受虐者越想活动手指挣脱，触须就缠绕得更紧或恶意拨弄指缝。\n\n用法与交互细节：\n1. 将双手手指和脚趾逐一用触须卷住，受虐者本能挣扎时，触须反而加大纠缠力度或开始搔刮指缝、指腹，产生酥痒与束缚感叠加的刺激。\n2. 配合乳环、阴蒂环及拘束衣的联动，手指的每一次徒劳活动都会经皮带传导，拉扯所有金属环刺激敏感点。\n3. 最终使受虐者认识到任何挣扎都只会增加刺激，在绝望中放弃反抗，仅能以可笑的扭动寻求心理安慰，强化驯服效果。", "uid": 653}, "感官剥夺下的羞耻荡妇游行": {"content": "{感官剥夺下的羞耻荡妇游行}\n简介：\n【场景/道具描述】\n受虐者被施以彻头彻尾的狩猎装扮：厚实皮革眼罩蒙蔽双眼，金属开口环撑开嘴巴，反剪的双臂被短铐锁住，上身被复杂麻绳如巨蟒般绞紧，无法维持平衡。脖颈上的项圈牵引链握在施虐者手中。下体则塞着跳蛋，半褪的湿透裤袜勒在大腿根部。\n\n用法与交互细节：\n1. 施虐者牵引着蒙眼堵嘴的受虐者，命令其在场地中行走。视觉和语言的剥夺放大了身体的敏感度与对未知的恐惧。每一步都必须小心翼翼，却又被体内的震 物身份，内心从抗拒逐渐转向顺从，接受被支配的命运。", "uid": 665}, "梦境支配与奴隶项圈": {"content": "{梦境支配与奴隶项圈}\n简介：\n【场景/道具描述】\n在昏暗的梦境房间中，墙上挂满古代刑具，地面铺着柔软地毯，中央摆着一张四柱床。调教者拿出一个黑色锦盒，里面放着一枚精致的银色金属项圈。\n\n用法与交互细节：\n1. 调教者以温柔而专横的声音命令受体跪下并低下头，将冰冷的项圈扣在受体细嫩的脖颈上，金属触感依次掠过肌肤后锁紧。\n2. 项圈成为“奖赏与束缚”的象征，调教者用粗糙手指摩挲受体颈侧血管，受体在恐惧与兴奋的联结中血管突突直跳，潜意识里种下“奴隶与玩具”的归属认知。", "uid": 666}, "肉体改造与成瘾依赖循环": {"content": "{肉体改造与成瘾依赖循环}\n简介：\n【场景/道具描述】\n魔域教室/拍摄区通过一系列任务清单与道具（浣肠器、扩张玩具、电击装置、特殊膏药等）对受体进行肉体改造，将受体调教为嗜精成瘾、渴求粗暴侵犯的性奴隶。\n\n用法与交互细节：\n1. 日常任务包括用精液作为洗漱、餐食甚至浣肠液，将排泄孔洞和味觉快感与精液强绑定。\n2. 菊穴被反复涂抹催情膏药、进行电击刺激和公开展览，导致瘙痒感愈演愈烈，自身手指的抚慰彻底失效，陷入“越搔越痒、非粗大肉棒不能解”的绝望渴求状态。\n3. 在深夜因无法达到高潮而备受煎熬，最终对施虐者的侵犯产生斯德哥尔摩依赖，将“被无数男人侵犯的场景”想象为唯一的解脱。", "uid": 667}, "项圈下的斯德哥尔摩式归属梦": {"content": "{项圈下的斯德哥尔摩式归属梦}\n简介：\n【场景/道具描述】\n承接“梦境支配与奴隶项圈”的后续心理。受体从梦中惊醒，发现项圈消失，但梦中的焦虑和兴奋感萦绕心头，让她心跳失速。\n\n用法与交互细节：\n1. 尽管梦中的调教者令受体恐惧，但受体内心深处却产生“一丝难以言说的期待”，主动回味那种“被完全控制的可怕又刺激的感觉”。\n2. 清醒后，受体用被子捂住绯红的脸颊，为自己的这种羞赧与期待感到糟糕和难为情，标志着其对调教者的纯爱依赖已从潜意识层面浮出，在无限屈辱中产生了扭曲的幸福感。", "uid": 668}, "魔性大楼的学员守则陷阱": {"content": "{魔性大楼的学员守则陷阱}\n简介：\n【场景/道具描述】\n一本由老学员总结的《学员守则》小册子，包含11条生存规则，实则是魔域诱导学员缓慢堕落的精密陷阱。\n\n用法与交互细节：\n1. 规则要求时刻保持扮演状态，忘记真实身份，而一旦抗拒扮演，异化会加速。这强迫受体在虚假的角色中放逐自我，最终混淆现实与幻想。\n2. 规则明令禁止“不要同意老师的性关系要求”，但同时要求“不要拒绝老师的任何拍摄或造型修改”，利用暴露、乳夹、跳蛋等道具不断加码羞辱，将受体在保持理智与被迫淫乱表演之间反复拉扯，直至意志崩溃。", "uid": 669}, "二创角色强制同化与羞耻烙印": {"content": "{二创角色强制同化与羞耻烙印}\n简介：\n【场景/道具描述】\n受体被强迫扮演物语系列角色的二创本子《淫物语》中的版本，而不是原作角色。这意味着角色设定被强制添加了“强烈的露出癖”和“自慰中毒”属性，身体也永久处于发情状态。其下体植入跳蛋并由粉色导线延伸而出，穴口因长期含物而微张，形成了一种将情色道具与角色神经系统、排泄系统融为一体的“穿戴式”改造。\n\n用法与交互细节：\n1. 调教者并不需要复杂的催眠，只需要通过调整受体扮演的角色版本（如从正常向转为二创色情版），就能直接通过规则之力强行写入新的性癖与生理需求。\n2. 受体的身体时刻处于被窥视与折磨的状态，即便是普通的交谈场景，受体也必须自然地撩起裙子向新人展示下体的改造状态，混淆了日常社交与性展示的界限，使其在社会层面上彻底沦为“淫语者”。", "uid": 670}, "摄像头的凝视之刑与虚像魔的同化污染": {"content": "{摄像头的凝视之刑与虚像魔的同化污染}\n简介：\n【场景/道具描述】\n虚像魔的存在形式是由无数缓慢转动的摄像头组合而成的怪异生物。这些摄像头代表着无处不在的凝视。当它凝视受体时，会产生一种让人无法动弹的禁锢力，其力量本质是将“长期扮演的角色”与“真实的自我”强制融合，导致受害者在精神遭到污染后凭空消失。\n\n用法与交互细节：\n1. 它不直接杀人，而是强迫受体彻底成为扮演的角色。当摄像机全部对准目标时，受体长期压抑的扮演记忆与性欲在体内爆发，使其心智逻辑完全被“角色设定”置换。\n2. 唯一的幸存者因为未曾参赛而避免了彻底同化，但身体被留下了后遗症：身体会被无法控制的欲望支配，虽然意识感到混乱和恐惧，但扮演能力却变得行云流水，这标志着机体正在逐渐接受“被支配”的本能。", "uid": 671}, "肛塞扩张与春药叠加的渐进调教": {"content": "{肛塞扩张与春药叠加的渐进调教}\n简介：\n【场景/道具描述】\n地下大厅中，受体被强制保持M字形双腿大开的姿势，接受一系列肛塞的渐进式扩张。调教者使用从细长到粗大、表面带凸起或肉刺的仿真阳具，并配合粉色春药液体，涂满手指或玩具后插入后穴。春药与项圈效果叠加，使受体后穴在痛楚中迅速产生强烈快感，并分泌大量肠液。\n\n用法与交互细节：\n1. 调教者先以细长肛塞缓慢插入，让受体适应异物感，随后更换更粗大的玩具，利用凸起摩擦肠壁，制造痛与快感的交织。\n2. 春药涂在玩具上，加速受体身体的敏感化，使其后穴在抽插中自动蠕动、收缩，并发出淫靡水声。\n3. 调教者通过言语羞辱（如“屁眼奴隶”）和围观者的评论，强化受体的屈辱感，同时迫使她主动抬高臀部、扭动腰肢，以换取更温和的对待或“自由”的承诺。", "uid": 672}, "肛勾传送带与金属框架的公开羞辱": {"content": "{肛勾传送带与金属框架的公开羞辱}\n简介：\n【场景/道具描述】\n第4层隐藏房间内设有金属轨道和传送带系统，轨道上悬挂着带金属球体的肛勾，用于将赤裸的受体吊起并牵引移动。传送带尽头设有“目”字形金属框架，包含颈部、手腕、小腿的固定环，以及一个带四根L形金属螺栓的肛门扩张装置。受体被强制固定在框架上，肛门被螺栓扩张至极限，无法闭合。\n\n用法与交互细节：\n1. 受体被剥光衣物后，塞入口球并插入肛勾，肛勾通过锁链提升，迫使受体踮起脚尖，以肛穴承重，在传送带上缓慢移动，接受沿途男人们的目光审视。\n2. 在传送带末端，受体被从肛勾上卸下，强制固定在金属框架上：头部和手腕被锁住，双腿被分开固定，小腿被固定，肛门被插入四根螺栓并旋开，使肛肉完全暴露。\n3. 整个过程强调受体的“商品化”和“物化”，通过公开展示和机械强制，摧毁受体的自尊，使其在痛苦与快感中逐渐接受被支配的身份。\\n\\n【包含类似变体】：强制肛穴扩张调教框架", "uid": 673}, "泄欲洞采集室与墙穴轮番口交便器": {"content": "{泄欲洞采集室与墙穴轮番口交便器}\n简介：\n【场景/道具描述】\n采集室内墙壁上开有多个圆形孔洞，适配人体嘴巴高度。孔洞上方设有红绿指示灯，用于控制使用状态。受体被锁在墙壁后方，双手拘束，只能将嘴唇与舌头伸出洞外，充当‘嘴穴’。采集室成为男性工作人员发泄欲望的公共厕所，孔洞被称作‘泄欲洞’。\n\n用法与交互细节：\n1. 受体以跪姿将唇舌送出孔洞，主动晃动香舌吸引男性。绿灯亮起时，任一男性可将肉棒插入受体口中任意抽插，红灯亮起则强制拔离换人。\n2. 受体必须运用深喉技巧承受每一次冲刺，并在男性射精时吞咽全部精液。每当被口内射精，受体便要假装同步高潮，发出愉悦呻吟，以取悦使用者和满足调教要求。\n3. 连续数小时，受体将接待数十名男性的轮番使用，品尝大量不同质感的精液，从而逐渐将口穴视为承接欲望的容器，将性交与羞辱内化为本能快感。", "uid": 674}, "镜面反光防护服与接近禁忌的装备": {"content": "{镜面反光防护服与接近禁忌的装备}\n简介：\n【场景/道具描述】\n一套由全反光材料制成的全身防护服，外观如镜面般光滑，能够反射虚像魔的凝视，避免与其视线接触。该防护服是唯一能让人靠近并触碰虚像魔的道具，但若受体主动违反规则（如摘下手套直接触碰）则会失效。\n\n用法与交互细节：\n1. 受体穿戴防护服接近虚像魔，利用其镜面特性将视线隔绝在外，得以观察并最终触碰目标。\n2. 防护服无法防护规则性惩罚，一旦受体摘下部分以皮肤直接接触虚像魔，将立即被拉入逼真的堕落梦境，遭受无尽调教。\n3. 这种装备同时暗喻着虚伪的保护——外观反射一切，内部却毫无抵抗，穿着者终将主动褪下防线，在自我暴露中踏入深渊。", "uid": 675}, "格式化惩戒协议·附属物化项圈": {"content": "{格式化惩戒协议·附属物化项圈}\n简介：\n【场景/道具描述】\n用于将受体完全“物化”的惩戒道具。当受体表现出强烈的反抗意志时，调教者会为其佩戴上一个带有发光锁扣的黑色金属项圈。一旦佩戴，项圈会禁用受体的感知或特殊能力，并随着洗脑魔力的灌注，皮肤上会浮现出发光的、宣示所有权的纹路。此时受体大脑一片空白，身份被彻底剥离，被格式化为纯粹隶属于调教者的“附属物”。\n\n用法与交互细节：\n1. 调教者在佩戴项圈时冷峻地宣布：“这是你最后的身份证明，格式化协议启动后，你将不再是你自己。”\n2. 在“附属物”状态下，受体完全丧失主动行为能力和羞耻心，跪姿标准、眼神空洞，对任何指令都会以机械音回应“是”。\n3. 这种极致的物化屈辱反而会激发受体灵魂深处被扭曲的保护欲或斯德哥尔摩情结。在恢复神智的间隙，受体会在痛恨中夹杂着对这种“被彻底拥有”状态的依恋，产生一种仅属于调教者的归属感。", "uid": 676}, "虚像镜头幻觉道具": {"content": "{虚像镜头幻觉道具}\n简介：\n【场景/道具描述】\n受体拥有的战斗用道具，外形为圆形镜头。使用后可令目标陷入逼真的幻觉，例如仿佛身陷沼泽并逐步被吞没，目标在现实中会僵硬失神，无法行动。但能量有限，只能使用数次。\n\n用法与交互细节：\n1. 在逆兔女郎状态下，受体口不能言、体力衰弱，无法物理反击，只能依靠虚像镜头使逼近的调戏者陷入幻觉，争取脱身时间。\n2. 道具耗尽能量后失效，受体再次沦为毫无反抗的暴露状态，将被迫面对被捕获与凌辱的极端羞耻，进一步强化恶堕情境。", "uid": 677}, "猫娘扮演与所属化项圈疗法": {"content": "{猫娘扮演与所属化项圈疗法}\n简介：\n【场景/道具描述】\n调教者以心理治疗为名，让受体扮演“淫乱的女仆猫娘”，佩戴猫耳、乳环、阴蒂坠球等。完成口舌服务后，受体被奖励一条刻有专属图案的皮质项圈，项圈中间坠有小球，象征所有权。\n\n用法与交互细节：\n1. 受体趴地扮演母猫，用舌头清理地面和调教者裤腿上的模拟精液，强化“宠物化”的羞耻与服从。\n2. 调教者抚摸猫耳并夸奖“已经是合格的小母猫了”，受体因夸奖而兴奋，主动蹭手心讨要更多宠爱。\n3. 授圈时，调教者亲手为受体戴上项圈，冰凉的皮革贴上脖颈，束缚感让受体从心中生起更深的臣服，认为被拥有是幸福。", "uid": 679}, "自我合理化与堕落幸福催眠": {"content": "{自我合理化与堕落幸福催眠}\n简介：\n【场景/道具描述】\n无需外部道具，而是通过反复的调教与言语引导，让受体内心形成一套自我说服的逻辑，将沦为肉欲玩具解释为“特殊体质的正确治疗”、“内心真正的渴望得到满足”，从而获得扭曲的幸福感和灵魂的安宁。\n\n用法与交互细节：\n1. 受体在感到迷茫时，会自行列出理由：“我本来就是淫荡的体质，需要特殊疗法”，“成为医生的肉欲玩具是在实现内心渴望”，“他所做一切都是为我好”。\n2. 每次羞耻与不自控时，受体一想起调教者的话就会迅速镇定，欲望褪去，换来全心全意信任和服从的满足感。\n3. 最终，受体将“被玩坏，被彻底占有”视为最盛大的渴望和幸福，如同被蛛网缠住的飞蛾，在堕落的宿命中尝到甜蜜，对调教者生出无条件的纯粹爱意。", "uid": 680}, "道具常态化与日常发情依赖": {"content": "{道具常态化与日常发情依赖}\n简介：\n【场景/道具描述】\n让受体长期佩戴乳环、阴蒂坠球、项圈等配件，即使在日常校园生活中也不取下。这些道具随着身体动作不断摩擦敏感点，使受体无时无刻不处于轻微发情状态，只有回到调教者身边才能获得满足，从而切断与外界的正常连接。\n\n用法与交互细节：\n1. 受体清晨醒来，乳尖摩擦被单就带来耻感快感，阴蒂被小球拉扯，内裤稍碰就兴奋，没出门已湿透。她感到身体“糟糕”，更渴望治疗。\n2. 在学校，受体不得不夹紧双腿忍耐，无法听课，只能躲在角落自慰。失去正常生活能力后，她更依赖调教者，认为唯有在调教者身边暴露这副淫态才是正确的。\n3. 调教者发来短信“我会一直守护你的”，使受体产生唯独此人能接纳自己的甜蜜感，日常的煎熬变成对夜晚治疗的期待，全程处于持续不断的恋爱与欲望交织的沉醉中。", "uid": 681}, "物化扮演训练：从病人到肉欲玩具": {"content": "{物化扮演训练：从病人到肉欲玩具}\n简介：\n【场景/道具描述】\n一场系统性的人格抹除与角色扮演调教。场景通常发生在调教者的私人空间，使用教鞭、短鞭作为权威象征。调教者会正式宣布废除原有的“医生与病人”等社会身份，将受体重新定义为“一个没有灵魂的肉欲玩具”或“小母牛”，并赋予其带有侮辱性、物品化的新名字（如以臀部形状命名的“馒头”）。\n\n用法与交互细节：\n1. 调教者命令受体学习并执行非人的行为规范，如像母狗一样摇尾乞怜、主动掰开臀瓣展示私处、并自行选择淫乱的“使用姿势”。受体在执行过程中，将羞耻感内化为对“主人”的取悦，一句“做得很好”就能令其体验到被认可的扭曲喜悦。\n2. 通过灌输“玩具不需思考，只需取悦”和“你的身体与灵魂皆属主人”的认知，使受体将对自主意志的放弃体验为一种“久违的慰藉和归宿”。她的全部自豪感与快乐来源，被重构为满足调教者的肉欲幻想，例如吞食其体液时由衷感叹美味与幸福。\n3. 此设定与“纯爱”的畸变点在于，受体接受了“为他而存在即为幸福”的底层逻辑。她在被当作物品粗暴使用、甚至被鞭打时，内心涌动的不是仇恨，而是对“主人”愿意使用她这个“玩具”的深切感激与依恋。", "uid": 682}, "欲望与矜持的双重束缚": {"content": "{欲望与矜持的双重束缚}\n简介：\n【场景/道具描述】\n一套白色拘束装，包含向后高高吊起的单手套、吸附在乳头上不断旋转摩擦的电动玩具、塞满随机震动跳蛋的小穴、以及一根连接着尿液灌肠装置的充气肛塞。\n\n用法与交互细节：\n1. 受体在长达一小时的强制高潮中，被要求“不许失态，保持微笑”。一旦因乳头、阴道或阴蒂的快感而发出呻吟，作为惩罚，调教者便会将尿液泵入受体的菊穴进行灌肠。\n2. 这创造了一种扭曲的纯爱互动：受体必须用最下流的生理反应承受折磨，但为了取悦调教者，必须拼命压抑快感，维持表面上的高贵与矜持，在矛盾与羞耻中抵达更深层的服从和依恋。", "uid": 683}, "公开调教游行套件": {"content": "{公开调教游行套件}\n简介：一套用于街头公开展示和羞辱受体的可携带性玩具组合，集内部震动、外部吸附、电击与控制于一体，将受体的身体变成行走的淫秽装置，同时配合牵引绳、镣铐等道具，制造被围观的绝望快感。\n【场景/道具描述】\n套件包括：“雌杀1000”自动吸附旋转震动棒，插入小穴后可在小腹顶出凸起；数个无线跳蛋，用胶布贴在阴蒂与两侧乳头上；一只电击肛塞，可遥控释放脉冲电流；一条金属项圈连接牵引绳；手腕脚踝的金属手铐与脚镣；以及细跟黑色高跟鞋和超短裙，用于凸显身体曲线。整组道具被混混们作为“惩罚母狗”的工具，在街道、十字路口等公开场合使用。\n\n用法与交互细节：\n1. 受体被戴上项圈牵引行走，震动棒和跳蛋由混混轮流遥控，每经过人群密集处便调高档位，让受体在众目睽睽下腰肢扭动、淫水顺腿流淌。\n2. 肛塞的电击功能用于惩罚受体试图夹紧双腿或抵抗排泄的举动，通过突然电击使其瘫软跪地，引发围观者哄笑，将隐私的排泄欲望变为公开的表演。\n3. 周围路人被煽动参与，有人直接上手揉捏乳房、拨弄阴唇，受体在无法视物（若搭配头套）的情况下，快感与恐惧混杂，对主人的指令依赖感增强——只有主人能“导演”这场游行的结局。", "uid": 684}, "体内跳蛋的公开羞耻与高潮否定": {"content": "{体内跳蛋的公开羞耻与高潮否定}\n简介：\n【场景/道具描述】\n调教者命令受体将一个带遥控器的椭圆形跳蛋放入自己的私处，然后通过操控跳蛋的震动档位，在公开或半公开场合观察并玩弄她的身体反应。这是一种从对她身体内部掌控到外部观察的全方位支配。通过在她即将高潮时故意停止刺激，进行高潮否定，击溃其生理防线的同时，迫使她从清高假面下显现出渴求快感的“淫荡真身”。\n\n用法与交互细节：\n1. 调教者先以“让下面也湿润起来”为由，命令受体自己将跳蛋推入体内，这第一步便是让她亲手实施对自己的亵渎。\n2. 调教者不断调整遥控器档位，随心所欲地控制她体内快感的强度，同时命令她分开双腿，不许夹紧，好让他像欣赏一件艺术品一样，观察她在不同强度刺激下的颤抖、扭动和挣扎。\n3. 调教者直白地挑明其人格的真相：“你越是想要隐藏，就越是让人想要探索你的真实”，其目的就是用快感击碎她清高冷艳的表层伪装，逼迫她展露内里那个贪恋快感的淫荡真身。\n4. 在她快要高潮时，调教者会突然抽出跳蛋，按压在其阴蒂上疯狂震动，进行更直接的刺激。然而，每当她即将攀上巅峰时，又会恰到好处地移开，使其在快感与痛苦的边缘徘徊，最终让她双眼上翻、舌头外吐，露出如同发情母狗般崩坏的痴态，以此彻底摧毁其意志。", "uid": 685}, "牵丝傀儡铃铛拘束衣": {"content": "{牵丝傀儡铃铛拘束衣}\n简介：\n【场景/道具描述】\n一套由银色项圈、臂环、腕环、腿环、脚环、乳环、阴蒂环及无数纤细银链组成的全身拘束网络。所有环体都缀有细小铃铛，银链按照龟甲缚与四肢牵引线的方式编织，将受体塑造成一具精致的“牵丝傀儡”。乳环与阴蒂环被银链牵连，任何细微动作都会牵动敏感点，发出清脆铃声。\n\n用法与交互细节：\n1. 调教者在调教之夜为受体逐一穿上这套装束。穿戴过程本身就是一种仪式化的支配：冰冷的金属穿透敏感的乳尖与阴蒂，受体被要求像人偶一样毫无反应。每一声穿透时的“咔嗒”，都在铭刻“你已经是物品”的烙印。\n2. 穿戴完毕后，受体被要求保持跪坐或站立。只要呼吸稍重或肌肉微颤，铃铛便会作响。铃声成为惩罚的信号，调教者借此反复强化“无心、无感、无意”的人偶信条——一旦铃响，就要承受肉体惩罚；若想避免，就必须彻底抑制本能。\n3. 日常行走时，银链的张力迫使受体只能小步慢行。乳链随手臂抬起而牵拉乳尖，阴蒂链随步伐扯动最私密的部位。这种持续的微弱刺激让身体始终处于敏感状态，时刻提醒受体其躯体的归属权。", "uid": 686}, "精液灌注的舒适出行皮鞋": {"content": "{精液灌注的舒适出行皮鞋}\n简介：\n【场景/道具描述】\n一双看似普通的轻便小皮鞋或日常鞋履，实则内部盛满了不会干涸的黏稠温热精液。此鞋具利用感官屏障，让受体无法察觉到液体的存在，只会觉得这双鞋“出奇的舒适”、“完美贴合足部”，仿佛走在温暖的水洼中。\n\n用法与交互细节：\n1. **行走中的足穴调教**：受体每走一步，足趾都会在鞋内蜷缩，被温热的精液来回包裹、流动按摩，发出淫靡的“咕啾”声。这种时刻进行的湿润包裹感，会持续挑逗受体的神经，将日常的行走转化为持续的隐秘泄欲。\n2. **无形的体液采集与社交扩散**：鞋子在行走时会沿路溢出精液，留下无形的足迹。同时，这些“精液酒”可以被倾倒出来，并被结界内的其他人视为“美酒”饮下。饮下后，众人会产生极致的梦幻陶醉感，在无形中成为欲望传播的媒介，将整个聚会场域化为淫乱的温床。", "uid": 687}, "项圈与狗链——从属身份的肉体铭刻与驯化仪式": {"content": "{项圈与狗链——从属身份的肉体铭刻与驯化仪式}\n简介：\n【场景/道具描述】\n一个皮质项圈，色泽艳红却质地粗糙，部分表皮斑驳脱落，显露被长期使用的痕迹。搭配一条银亮狗链，通过清脆的锁合机制与项圈相连。在强制戴上项圈后，受体被剥除原有身份，降为“雌犬”或“母狗”，必须用四肢爬行、承受鞭打与指令。\n\n用法与交互细节：\n1. 调教者将项圈粗暴地扣在受体脖颈，收紧至能感受脉搏跳动但稍有不适的程度，宣告“你自此不再是人类，只是一条供我驱使的母狗”。受体在项圈扣合的瞬间，心理防线崩塌，首次体验身份剥夺带来的屈辱与异样快感。\n2. 通过狗链牵引，受体被迫以爬行姿态跟随调教者。鞭打与爬行同步进行：每落一鞭，受体因疼痛而加速爬行，又因快感涌起而全身颤抖，在“服从＝愉悦”的循环中逐渐放弃矜持。\n3. 在完成爬行后，调教者令受体“舔脚”，并像舔舐肉棒一般含住脚趾。受体首次品尝咸涩与汗味，口腔主动分泌津液，在屈辱侍奉中领悟“取悦支配者”能获得被允许高潮的奖赏。\\n\\n【包含类似变体】：宠物化项圈与狗链组合", "uid": 688}, "雌奴隶驯化项圈与强制发情系统": {"content": "{雌奴隶驯化项圈与强制发情系统}\n简介：\n【场景/道具描述】\n一条红色皮质项圈，内侧嵌有微型感应芯片，可实时监测受体的心率与激素水平。项圈悬挂金色铃铛，行走时会发出淫靡脆响。配套的无线遥控式震动肛塞与仿真犬尾，可通过调教者的手机APP进行远程操控。项圈内置扬声器，可循环播放调教者的指令录音或催眠暗示音频。\n\n用法与交互细节：\n1. 受体被戴上项圈后，被迫以四肢爬行姿态进行“校园遛狗”式公开羞辱，项圈收集的生理数据会实时反馈给调教者。\n2. 当受体产生反抗念头或心率异常时，肛塞的震动档位会自动提升作为惩罚；当受体表现出顺从或性兴奋时，调教者可通过APP手动给予“奖励式”震动。\n3. 铃铛声响成为受体心理暗示的触发器——铃声响起即意味着进入“母狗”角色，长期佩戴后即便没有项圈，听到类似铃声也会产生生理性的屈从反应和性兴奋。", "uid": 689}, "鼻钩牵引式母猪脸强制整形器": {"content": "{鼻钩牵引式母猪脸强制整形器}\n简介：\n【场景/道具描述】\n由多个（1-3个）金属鼻勾组成的面部牵引装置，可将受体的鼻孔向外扩张至疼痛的程度，勾连牵引绳后迫使受体仰脸呈现出“母猪脸”的羞辱姿态。配套软质纸棒用于对鼻孔进行“开苞”式扩张训练，以及用于鼻灌肠的精液注射器。\n\n用法与交互细节：\n1. 调教者先用纸棒轻柔地扩张受体从未被开发的鼻孔，让其习惯异物侵入的感觉——这一过程本身并不带来肉体快感，但“无法抗拒的凌虐感”会通过大脑的恐惧-快感转化机制引发心理性高潮。\n2. 佩戴鼻勾后受体被迫仰头爬行（犬行），视线始终上抬无法低头，强化“被展示、被观赏”的羞耻感。\n3. 鼻灌肠环节：将温热的精液通过鼻孔注入，令其从鼻腔逆流至咽喉——这极度不适的体验却因“被使用、被玷污”的象征意义而触发受体强烈的高潮。\n4. 鼻勾与项圈、口塞同时使用，形成“三重束缚”，面部所有孔洞均被占据或扩张，使受体完全丧失面部自主权，沉浸在“被彻底支配”的扭曲幸福感中。", "uid": 690}, "奇迹之力与堕落意志驱动的全自动肉体改造": {"content": "{奇迹之力与堕落意志驱动的全自动肉体改造}\n简介：\n【场景/道具描述】\n一团名为“堕落意志”的银紫色液态恶意集合体，由调教者从受体被抹去的堕落记忆与深渊淤泥中抽取凝聚而成。它如同一个拥有奇异规则的全息3D打印机 。\\n2. 当着其他弟子的面，仙子必须强忍着体内的快感讲解道法，而主角则在暗处通过灵力遥控收紧她的束胸，欣赏她因为快感和羞耻而逐渐崩溃的神情。\\n\\n【包含类似变体】：湿身透明羞辱道袍", "uid": 698}, "堕落诱导快递系统": {"content": "{堕落诱导快递系统}\n简介：\n【场景/道具描述】\n一个仅受虐者能听见的魅惑声音，以解除当前折磨为诱饵，不断送来新的拘束快递。每个快递都包含一件情色束缚道具，只有戴上它才能暂时解除上一件道具带来的惩罚，但自身又会添上更深的束缚，形成无法逃脱的堕落链条。\n\n用法与交互细节：\n1. 受虐者在被贞操带折磨到崩溃时，声音诱导她领取快递，拆开后是口球，并暗示“戴上它就能停止贞操带的折磨”。\n2. 一旦戴上，折磨暂时停止，但口球已牢牢锁死，无法自行取下；同时声音会继续施加心理暗示，逐步削弱受虐者的抵抗意志。\n3. 每次受虐者想摆脱某样道具时，声音便会送来新快递——脚链、项圈、单手套、开口器等等，每一次都实现“以束缚换自由”的恶性循环。\n4. 快递的出现毫无时空逻辑，直接出现在门口、厕所隔间外、社团现场，打破现实感，强化受虐者被更高存在操控的无力感。", "uid": 699}, "开口器与流食奴化": {"content": "{开口器与流食奴化}\n简介：\n【场景/道具描述】\n一套仿牙科开口器的装置，金属圈卡住牙齿迫使嘴巴无法闭合，外部再加硅胶罩封闭，外观像是嘴部被整体覆盖。受虐者只能通过牙齿缝隙吸入流质，丧失咀嚼和正常进食能力。\n\n用法与交互细节：\n1. 控制者当着受虐者的面解开旧口球，趁其放松瞬间直接塞入开口器并扣上外罩，让受虐者刚从拘束解脱便陷入更彻底的口腔支配。\n2. 进食时外罩被取下，但牙齿仍被撑开，只能饮汤或用舌头勉强抿碎极软食物，类似宠物进食，每次用餐都在强化其奴化感。\n3. 控制者会在聚会中展示受虐者戴着开口器的模样，周围人一致称赞“好看”，使受虐者逐渐怀疑对“正常”的定义。\n4. 开口器长期佩戴会导致下颌酸软和口齿永久变化，为后续更进一步的宠物化口塞改造做生理准备。\\n\\n【包含类似变体】：牙齿固定开口器与强制进食的羞辱调教", "uid": 700}, "日常口塞与异物填充": {"content": "{日常口塞与异物填充}\n简介：\n【场景/道具描述】\n受虐者嘴巴被持续塞入各种异物，包括但不限于口球、丝袜、小毛巾、内裤、柠檬等，形成强制口塞的日常化。口球有白色或红色，撑大嘴巴，双颊因口球而拉长，外观上形成“被玩坏”的人偶感。\n\n用法与交互细节：\n1. 施虐者根据场景切换塞入物，如丝袜增加羞辱感，柠檬带来酸涩刺激，让受虐者无法预测，持续处于被迫接受状态。\n2. 受虐者长期无法说话，只能发出“呜呜”声，骨传导下的模糊发音反而被施虐者利用，用于公开演讲等场合，制造恶堕反差。\n3. 口球被设计为可锁死或可调节松紧，施虐者通过调整拉紧程度控制受虐者说话能力，甚至让口球无法顶出，形成持续强制佩戴。", "uid": 701}, "人形行李的舞台开幕": {"content": "{人形行李的舞台开幕}\n简介：\n【场景/道具描述】\n一个超大号行李箱，内部空间狭小。受虐者在戴上口塞、束腰、项圈和短脚镣后，被强迫蹲下，并将项圈上的细链与脚链扣在一起，形成一个只能蜷缩的“人球”。随后她被抱起，直接塞进行李箱，拉上拉链，如同货物般被拖走。行李箱被直接放置在学院舞台中央的桌子上，在数百名学生的注视下打开。\n\n用法与交互细节：\n1. 运输阶段，施虐者将受虐者完全物化为一件可托运的行李。箱内黑暗、拥挤、空气混浊，受虐者因束缚和缺氧感到胸闷，濒临晕厥。箱外的颠簸和震动时刻提醒她正在被随意搬运，彻底剥夺了人的身份属性。\n2. 降临时刻，在受虐者精神恍惚、以为即将窒息之际，行李箱突然在强光和喧嚣的舞台中央被打开。她从黑暗的禁锢瞬间切换到被数百双眼睛围观，视觉和心理上的冲击被最大化。\n3. 羞辱逆转，当众被抱出来后，她反而觉得密闭的行李箱带给她安全感，甚至“宁愿在里面钻着，也不想出去”，展现了在极度羞辱下，受虐者对更早的、相对私密的虐待形式产生了病态的依赖。\\n\\n【包含类似变体】：行李箱拘束与公开展示, 行李箱活体运输与公共展示", "uid": 702}, "S-3号拘束椅与强制流食灌注": {"content": "{S-3号拘束椅与强制流食灌注}\n简介：\n【场景/道具描述】\nS-3号拘束椅是一把全金属结构的高脚椅，没有椅背，坐垫由两块分开的金属板构成，中间留有巨大空隙。坐垫中央竖起一根金属柱，扶手位置配有皮质袖套。椅子下方带有脚镣，用于固定脚踝。配套的强制喂食器是一个带有长软管的透明袋子，内装白色粘稠流食，软管末端连接透明硬质塑料接口，可卡入受虐者佩戴的开口器中。\n\n用法与交互细节：\n1. 受虐者被强制按坐在金属椅上，双腿被中央金属柱强行分开呈“M”字形。那根金属柱死死抵住耻骨，迫使贞操带内的震动器更紧密地贴合身体，加剧刺激。\n2. 施虐者将受虐者双手反剪，塞入皮质袖套并锁死，脚踝也被固定在椅子腿横杠上，使其彻底失去挣扎能力，如同被架起来的标本。\n3. 喂食器接口精准卡入开口器的卡槽，管身深入口腔，压在舌面中后段直抵咽喉，令受虐者连吞咽唾液都无法自主完成。\n4. 施虐者打开流速阀门，白色粘稠流食在重力作用下直接灌向喉咙深处。受虐者被迫一刻不停地“咕嘟”吞咽，无法拒绝。若因外界刺激（如见到熟人的羞耻）导致吞咽节奏错乱，流食会瞬间呛入气管，但在口塞堵死和束缚状态下，甚至连咳嗽都无法顺畅进行，只能发出窒息般的“荷荷”声，泪水、鼻涕与流食混合糊满脸庞。\n5. 剧烈咳嗽带来腹压骤增，会直接挤压本就失控的膀胱，导致尿液在公众场合从贞操带边缘“噗滋”喷出，完成排泄失控的公开羞辱。\\n\\n【包含类似变体】：S-3号拘束椅上的强制喂食与公开失禁, 公开遛街与“人形犬”迎宾, S-3号拘束椅与公共餐厅喂食羞辱, 公开身份崩溃：人形宠物餐厅用餐, 餐厅人形犬迎宾与用餐拘束", "uid": 703}, "淑女拘束外出套装：极细步幅与失控边缘": {"content": "{淑女拘束外出套装：极细步幅与失控边缘}\n简介：\n【场景/道具描述】\n一套用于外出公开展示的极端拘束穿搭。包含紧身裙（裙摆极窄，迈开的步伐不能超过半步）、小一码且鞋跟极高的高跟鞋（迫使足弓夸张弯曲，脚趾被死命挤压）、连接在腰带上的短链手铐（将双手限制在腰前，无法使用）、以及项圈和牵引链。面戴遮住半张脸的面具和填充口腔的口塞。\n\n用法与交互细节：\n1. 施虐者将受虐者打扮好后，用链子牵着出门，如同遛狗。过小的鞋码和超高跟让受虐者的每一步都像走在刀尖上，必须全身心维持平衡，跟腱时刻处于紧绷的酸胀感中。\n2. 在乘坐电梯等重心变化的环境下，由于双手被铐在身前完全无法扶墙，受虐者必须用力夹紧双腿来维持站立。这一动作会让两腿间的金属贞操带冷酷地硌入大腿根部。\n3. 施虐者通过突然轻扯链子来破坏受虐者本就脆弱的平衡，迫使她在即将摔倒的惊恐中，依靠本能向前跌撞挪动，展现出踉跄却无法反抗的狼狈姿态。\n4. 当贞操带内的震动器在夹紧双腿、身体紧绷时突然加强震动，强烈的快感会瞬间击溃受虐者的腿部肌肉，令其双腿猛地一软、膝盖磕碰在一起，若非被项圈链子提着，将直接跪倒在地。", "uid": 704}, "睡姿矫正捆绑：感官剥夺与无助挑逗": {"content": "{睡姿矫正捆绑：感官剥夺与无助挑逗}\n简介：\n【场景/道具描述】\n一套用于夜间睡眠的固定束缚与感官剥夺装置。受害者的四肢被分别固定在床的四角，形成大字型或类似的无法动弹姿态。身体上强制佩戴极紧的束腰、束颈和面具，面具眼部带有白色皮革眼罩以剥夺视觉，口腔被口塞填满以剥夺言语并强制张嘴。\n\n用法与交互细节：\n1. 施虐者以“培养淑女睡姿”为名，每晚将受虐者锁成此姿态。在四肢固定、视觉被剥夺的绝对黑暗中，受虐者只能承受束腰对肋骨的紧箍感、束颈对喉咙的限制感以及面具的闷热感。\n2. 口腔被塞满导致唾液无法吞咽，只能顺着嘴角流下，积聚在面具下巴的空隙里，形成湿腻粘稠的感觉，增添触觉上的折磨。\n3. 在完全无助的捆绑状态下，两腿间的贞操带被设定为时断时续地震动。受虐者在昏昏欲睡时被强制唤醒，在清醒时又被持续骚扰，整个夜晚都在疲惫、快感和失眠的循环中度过，醒来时唯一能活动的只有晃动的头发，尽显无助。\\n\\n【包含类似变体】：强制固定睡姿与夜间贞操带调教, 睡眠固定系统（四肢固定+束腰+面具+口塞+持续震动）, 日常拘束与“淑女”睡姿培养", "uid": 705}, "认知篡改与驯化完成纪念照": {"content": "{认知篡改与驯化完成纪念照}\n简介：\n【场景/道具描述】\n在一个世界观被逐渐篡改的环境中，拘束道具（如口球、项圈、手铐）被社会大众重新定义为“时尚穿搭”、“日常服饰”或“淑女配饰”。受虐者在长期驯化与周遭理所当然的眼光中，自我认知逐渐解离。\n\n用法与交互细节：\n1. 受虐者将被拘束外出用餐的照片发到朋友圈进行“测试”，结果收获大量来自朋友、家人、老师的赞美评论，如“口球好漂亮，好配你”、“项圈像宠物一样被牵着，爱了爱了”。母亲甚至评论要寄来新的口塞让她更好看。\n2. 受虐者原本期待反对声音，但周围环境将她的被拘束状态完全正常化、美化、甚至时尚化。她开始对着镜子打量佩戴口球的自己，脑海中浮现出“似乎有口球也挺好看”的念头，认知防线从内部开始瓦解。\n3. 她翻看自己被不同方式拘束的照片，看着“鸭子坐在地上、双手被绑、眼神无神、微红的双颊和嘟起的嘴”，内心浮现出“怎么有种被玩坏了的感觉”和“像是一个脆弱的娃娃、随便谁都可以来欺负”的客观描述，标志着其自我物化意识的觉醒和驯化的最终完成。", "uid": 706}, "隐蔽多层拘束衣的优雅出行": {"content": "{隐蔽多层拘束衣的优雅出行}\n简介：在日常外出时穿戴极端限制身体活动的多层拘束衣裙，通过优雅长裙完美隐藏内部的束缚装置，在公众场合体验被拘束却又不得不维持优雅姿态的羞耻快感。\n【场景/道具描述】\n连体肉色紧身丝衣：从脚底包裹至锁骨，手掌部分经过特殊处理，降低手指灵敏度，使所有动作显得缓慢而优雅。双层连裤袜进一步收紧双腿，令大腿不自觉摩挲。\n金属龙骨束腰：内衬金属板和龙骨的束腰，限制腰部大幅度动作，无法弯腰或快速转身，迫使上身保持笔挺，并将酥胸托挤得更为挺翘。\n倒L型肩套：内侧金属环固定，将肩膀从锁骨到大臂完全拘束，大臂与身体几乎贴合，手臂只能小幅度张开，手掌举不过头顶。\n多层束腿衬裙/霍布紧身裙：受虐者可选择四条韧性极强的束腿衬裙将双腿束缚至只能分开不足一指的距离，或穿着从臀部包裹至膝盖的霍布紧身裙，彻底剥夺奔跑能力。外部罩上直筒长裙或修身裙，完美隐藏内部所有拘束。\n浅口系带高跟鞋：配合拘束步伐，强制走出小碎步，并增加脚踝的不稳定性。\n\n用法与交互细节：\n1. 两人相互协助穿戴全部拘束衣物，每一层收紧时都伴随着对方克制不住的喘息与身体微颤，剥夺行动能力的过程本身就是一种心理前戏。\n2. 挽手漫步于公园和街道，在路人眼中她们只是两名举止优雅、贴面私语的亲密少女，实际上每一步都需小心维持平衡，任何台阶或转弯都可能因束缚而踉跄，不得不相互紧紧搀扶。\n3. 施虐者可通过在公众场合轻声提醒“呼吸乱了”“脚步注意”，在他人无法察觉的情况下用言语进行羞耻调控，让受虐者因差点暴露而心跳加速、脸色泛红。\n4. 长时间穿戴后，束腰压迫导致呼吸浅促，受虐者会因轻度缺氧而眼神迷离、依赖性地靠在施虐者肩上，形成一种公开却又私密的服从姿态。\\n\\n【包含类似变体】：多层拘束衬裙与紧身霍布裙的优雅禁锢, 多层束腿衬裙与霍布裙双重腿部束缚, 隐秘拘束日常化——优雅背后的紧缚地狱", "uid": 707}, "全身连锁拘束与五感剥夺寻宝游戏": {"content": "{全身连锁拘束与五感剥夺寻宝游戏}\n简介：用链条、镣铐、项圈、球形拘束手套、口塞和眼罩将受虐者包装成“受难的圣女”，再以寻宝游戏为名义诱导其被锁到床上，进行强制爱抚和高潮。\n【场景/道具描述】\n球形拘束手套：丝绸缝制，将手掌蜷缩成拳状完全包裹，系带收紧后可上锁，使手指无法张开，彻底失去抓握能力。\n皮革手铐+脚镣+高跟鞋锁链：将双手反铐背后，高跟鞋用锁链连在一起，脚镣间用短链相连，再用长链从脚链向上连接手铐，形成链式限制。\n蕾丝项圈+连接链：巴掌宽的项圈锁在脖颈，通过细链连接到背后手铐，使头部活动范围极小，并将脚、腕、颈连成一体。\n丝绸口塞+蕾丝眼罩：口中花塞堵住嘴，只许含糊呜呜声；白色蕾丝眼罩剥夺全部视觉。\n\n用法与交互细节：\n1. 施虐者在穿戴过程中每锁一处就用语言调戏：“这样你就没法脱下衣服了吧”，受虐者感受着行动能力被一步步剥夺的无助，身体因兴奋而微微颤抖。\n2. 一切穿戴整齐后，施虐者谎称要玩“寻宝游戏”——钥匙藏在各个房间，受虐者需自行找到并打开锁。实际上受虐者双手被拘束成拳状、口塞眼罩，根本不可能完成，这是一种精神上的捉弄。\n3. 施虐者用项圈上的牵引链拉扯受虐者跌撞行走到卧室床边，猛地推倒在床上。受虐者因坠落感和突如其来的床垫触感而慌乱，随即施虐者扑上紧紧搂住她，双手分别侵入酥胸和双腿间，开始强行爱抚。\n4. 在完全被束缚、不可视不可言的状态下，受虐者无法反抗，只能蜷缩在施虐者怀中颤抖，被持续玩弄直至高潮；事后两人额头相抵，施虐者用炙热的呼吸吐露爱语，将强制高潮升华为情感依赖的高潮。\\n\\n【包含类似变体】：全感剥夺与强制溺爱——宠物化的无助陷阱, 五感剥夺的寻宝游戏与无助侵扰", "uid": 708}, "口球下的电话通话与家庭式的强制规训": {"content": "{口球下的电话通话与家庭式的强制规训}\n简介：\n【场景/道具描述】\n受虐者在佩戴口球的状态下与母亲进行视频通话。母亲不仅不反对，反而要求其“淑女就要时刻戴着口塞”，并主动提出要寄送乳胶衣、单手套等更多拘束道具。\n\n用法与交互细节：\n1. 母亲通过视频通话，将“戴口塞”正常化为一种淑女礼仪，强制要求受虐者在通话时佩戴，进一步强化了其日常化的拘束状态。\n2. 母亲能通过受虐者的“呜呜”声“理解”其意思，但实际上完全曲解或无视其反抗 "content": "{贞操管教束具：强制禁欲与排泄管控}\n简介：\n【场景/道具描述】\n受虐者被强制佩戴一套金属贞操带。该束具设计精密，包含完美贴合私处的内部结构（如内置阳具型填充物）和固定于腿环的组件。束具附带一条透明的导尿管，并具备封印机制，只能由施虐者以魔法解除。\n\n用法与交互细节：\n1. 施虐者将贞操带锁在受虐者身上，将专属的填充物顶入小穴，剥夺其自慰和感受外界刺激的可能。受虐者在日常活动（如行走）时，会因摩擦不断产生丝丝爱液，时刻提醒其被管控的状态。\n2. 施虐者打开腿环上的开关，通过透明导管将受虐者体内积存的尿液缓缓吸出，在其面前展露排泄的全过程。这剥夺了受虐者最基本的生理隐私，极大滋生其羞耻感。\n3. 在佩戴数日后，施虐者以魔力解除封印，当着受虐者的面缓缓拔出完全湿透的填充物。满溢的爱液随之滴落，空气重新接触久锁的私处，带来直入骨髓的酥麻与被彻底支配的无助。", "uid": 804}, "微醺魔膳·胭骨蜘蛛蟹": {"content": "{微醺魔膳·胭骨蜘蛛蟹}\n简介：\n【场景/道具描述】\n一种经过人工魔法培育的顶级珍馐。蜘蛛蟹在产卵期经特殊方式影响，使其蟹肉、蟹膏、蟹黄同时达到完美，蟹壳浸润蟹膏呈现胭脂色泽。作为菜肴，它不仅是味觉的极致享受，其蕴含的微弱魔力更能给食客带来精神上的振奋与愉悦，是极少数能通过间接方式让魔力对食材产生良性影响的案例。\n\n用法与交互细节：\n1. 强制发情的“意外”导火索：受虐者体内的惩罚术式或贞操带，可能被设定为感应到“魔力补益”后自动激活。施虐者可诱骗或迫使受虐者以此等珍馐为食，以“品尝美味”的正常理由，触发其下体拘束具的强制惩罚，在公共用餐场合使其突然陷入发情窘境。\n2. 感官混淆与羞耻喂养：细腻鲜甜的蟹肉与蟹钳的粗长外形形成强烈暗示。在高涨的欲火中，受虐者的认知会被扭曲，将食物与“肉棒”等性器产生联想，导致用餐时心神不宁，甚至失手掉落食物，成为施虐者眼中的一道趣味“配菜”。\n3. 身份倒错的奢华铺垫：受虐者（如出身清贫的法师）以金主身份请客，却因食物触发体内机关而沦为席间玩物。施虐者可一边享用美食，一边观赏、玩弄并嘲弄受虐者努力忍耐快感的窘态，将一场高贵的宴请变为私密的调教剧场。", "uid": 805}, "强制真言与肉体支配暗示": {"content": "{强制真言与肉体支配暗示}\n简介：\n【场景/道具描述】\n施虐者手中缠绕的绿色光带可分解出细微粒子，弹射入受虐者头部后能在短时间内控制其言语和行为。受控时受虐者意识清醒但身体不听使唤，会如实说出施虐者提出的问题答案，或执行“转身把乳房压向墙壁”等具体动作指令。受虐者眼睁睁看着自己的身体背叛意志，产生巨大的恐惧与无力感。\n\n用法与交互细节：\n1. 用于暴露受虐者隐藏的真实欲望和羞耻经历：在控制状态下,受虐者不由自主说出自己想吃的甜品店、与友人出行的计划等表面无害的日常信息，演示完效果后施虐者暗示可随时套出更深层的秘密。\n2. 结合肉体支配指令,让受虐者主动做出自慰动作（如用乳房反复按压墙壁），而触手贞操带同步软化配合，身体明明在做淫荡的行为，意识却只能观看无法阻止。受虐者在被强迫的自亵中感受快感，由此被植入“身体已经不完全属于自己”的恐惧。\n3. 施虐者仅在关键节点偶尔使用，多数时间仍依赖心理胁迫和性玩具进行调教，让受虐者始终警惕“下一次是否会被操控”，将这种不确定性转化为长期心理压力。", "uid": 806}, "受虐者抚慰反射": {"content": "{受虐者抚慰反射}\n简介：\n【场景/道具描述】\n施虐者在受虐者情绪彻底崩溃时一反常态地提供温暖的怀抱，用双臂将受虐者紧紧搂入怀中，让其全身埋入柔软的接触里恣意嚎啕大哭。持续的肢体抚慰配合言语安抚“主人会好好对待的，不会始乱终弃”，在极致的羞辱折磨后突然给予温柔。受虐者从小到大从未被亲密之人拥抱过，这种被抱在怀里接纳的感觉与之前被虐的处境形成剧烈对比。\n\n用法与交互细节：\n1. 在受虐者被逻辑辩论击败、宠物身份认知被动摇、泪意上涌之际，先以触手制造乳头疼痛和身体前倾的动荡，再以怀抱接住即将摔倒的受虐者。疼痛与温暖的无缝衔接让受虐者在混乱中下意识抓紧施虐者，事后才后知后觉意识到自己“居然在这个死女人怀里哭”，加剧羞耻。\n2. 短暂施以温情后，施虐者用句式和语气将氛围拉回调教——“好啦，还想在主人的怀抱里哭多久呢，小可爱？”——从保护者瞬间切换回掌控者角色。受虐者慌乱推开对方，却已无法否认自己在最脆弱的时刻曾依附于她。\n3. 长期重复此模式：制造痛苦→放宽空间（如允许哭泣、给予拥抱）→收回温柔→继续调教。让受虐者在不知不觉中将施虐者视为唯一的情绪依附对象，萌生对加害者的扭曲依恋。", "uid": 807}, "强制产乳榨取器与初乳商品化": {"content": "{强制产乳榨取器与初乳商品化}\n简介：一种固定在受虐者双乳上的电动榨乳装置，强制从未经怀孕的乳房中催产出乳汁，并将这一过程录制为视频，挤出的乳汁作为高价消费品出售。\n\n【场景/道具描述】\n一对透明的电动榨乳罩杯，通过软管连接到收集瓶。使用前，受虐者被精神病院款式的厚重白色拘束服紧紧捆缚，手臂被反向包入袖中，使上半身完全无力化。她高耸的双乳被迫向外挺出，榨乳器的吸嘴紧扣住乳头并形成真空。\n\n用法与交互细节：\n1. 机器启动后，罩杯产生规律性的强劲吸力与揉捏动作，模拟婴儿吸吮，强制从未生育的受虐者乳孔中一点点吸出乳白色的初乳。受虐者只能发出无助的呻吟，看着自己的乳汁被抽入收集瓶。\n2. 整个榨取过程被全程录制并公布于网络，乳汁则以“搜查官初乳”的名义以高价（如500毫升/50万日元）出售。这一设定使受虐者最私密的母性生理反应被彻底物化为可购买的淫秽商品，引发了对其抱有扭曲爱意之人疯狂的经济投入与占有欲。", "uid": 808}, "反向电击蛛丝拘束袜与步态控制器": {"content": "{反向电击蛛丝拘束袜与步态控制器}\n简介：\n【场景/道具描述】\n由魔界冥蛛后产出的蛛丝进行雷铸处理后制成的白丝吊带袜及过肘长手套。这套丝织品能直接与受虐者的神经系统交互。搭配16厘米鞋跟的高跟鞋（鞋底暗藏可弹出的惩罚钢珠）以及连接双脚的30厘米水晶脚链。\n\n用法与交互细节：\n1. 神经信号反向操控：当受虐者大脑发出移动指令时，蛛丝材料会接收电信号并发出完全相反的指令，强制其摆出施虐者设定的特定姿势，以优雅而受限的小碎步移动。\n2. 足底折磨与平衡破坏：高跟鞋内的钢珠在无主人陪伴时会弹出，折磨娇嫩的脚趾。极高的鞋跟将全身重量压在脚趾上，配合脚链限制步幅，让行走变得极其艰难且充满痛苦。\n3. 优雅的牢笼：特殊的蛛丝材质与礼服搭配，在视觉上展现腿部若隐若现的美感，但却构成了一个限制行动的电击牢笼，强制受虐者维持淑女仪态。", "uid": 809}, "羞耻堵嘴组合（原味丝袜+玫瑰口球）": {"content": "{羞耻堵嘴组合（原味丝袜+玫瑰口球）}\n简介：\n【场景/道具描述】\n先用施虐者贴身穿着一整天的黑色连裤丝袜团成布团，充分浸润沾满其体味与分泌物的特殊药液后，塞满受虐者的口腔，令舌头被紧紧压制，无法将布团顶出。紧接着在嘴外扣上一朵蓝白玫瑰造型的塑胶口球，绸带在脑后固定扣紧。口球不仅彻底剥夺了言语与呼救能力，还因花朵造型为受虐者增添了一抹娇艳的装饰，使其任何愤怒表情都扭曲成羞耻的“呜呜”媚态。\n\n用法与交互细节：\n1. 施虐者故意告知受虐者堵嘴物是自己穿过的丝袜，利用“原味”的屈辱直接刺激其精神，使其在无法言语的羞愤中不断挣扎。\n2. 药液润湿丝袜可减轻口腔干燥与干呕感，但同时扩散出若隐若现的体味，受虐者被强迫品尝并接受这股味道。\n3. 玫瑰口球上的钥匙通常挂在受虐者项圈前方，摇晃脖颈就会发出锁链声响，时刻提醒她恢复说话的关键触手可及却又无法自取，形成绝望感。", "uid": 811}, "恶趣味的治疗羞辱": {"content": "{恶趣味的治疗羞辱}\n简介：\n【场景/道具描述】\n在拷问环境中，施虐者使用一种充满反差与关爱姿态的调教方式。施虐者首先会对受虐者进行粗暴的折磨（如皮鞭抽打），然后立即以一个“慈爱”的形象出现，用梳子为受虐者梳理凌乱的长发，并喷上让发丝散发沁人香味的特殊液体。\n\n用法与交互细节：\n1. 在一轮残酷的鞭打之后，受虐者身心痛苦且无力反抗。施虐者这时会拿出梳子，温柔地为她梳理头发，动作宛如打扮心爱的玩偶。\n2. 施虐者一边梳头，一边说出“跟美少女做游戏之前当然要把她打扮的漂漂亮亮的啦”，“头发乱了就不好看了”之类的话语，营造出一种扭曲的、被“珍视”的错觉。\n3. 这种在痛苦折磨与虚伪温柔之间的快速切换，极大地扰乱了受虐者的心理防线。敌人突然的关怀比持续的酷刑更具侮辱性，让受虐者感到自己就像一件可以被随意摆弄、伤害和保养的物品，尊严尽失。", "uid": 812}, "隐私剥夺拷问：高潮中的羞耻自供": {"content": "{隐私剥夺拷问：高潮中的羞耻自供}\n简介：\n【场景/道具描述】\n在刑床束缚下，受虐者体内塞着不断震动的跳蛋，血管中流淌着高浓度媚药。施虐者手握跳蛋遥控器与更具威胁的震动棒，以“惩罚骰子”作为威慑，对其进行一系列极度私密的连环提问。\n\n用法与交互细节：\n1. 施虐者的提问由浅入深：从“是否在押运途中偷偷高潮”到“平时是否自慰”、“自慰的方式和时间”、“喜欢抚摸哪里”、“敏感点在何处”乃至“是否喜欢被揉胸”。\n2. 受虐者每试图隐瞒或抗拒
