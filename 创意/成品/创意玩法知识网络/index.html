，增加全身束缚感。", "uid": 2302}, "无法脱下的服装与玩具拘束": {"content": "{无法脱下的服装与玩具拘束}\n简介：\n【场景/玩法描述】受虐者发现身上的情趣服装（乳胶紧身裤、白丝手套等）和插入体内的震动棒无法脱下，服装边缘与皮肤融合，手套找不到开口，震动棒被紧身裤牢牢锁住，任何拉扯只会导致震动棒在体内搅动引发高潮，迫使受虐者接受长期穿戴状态。\n\n用法与交互细节：\n1. 受虐者醒来后试图脱下服装和玩具，但发现乳胶紧身裤边缘消失，与皮肤无缝连接，手套也无脱卸口。\n2. 拉扯震动棒或紧身裤时，因摩擦力不足或服装弹性，震动棒被拉出后又会弹回，反复冲击子宫，造成强制高潮。\n3. 受虐者意识到无法自行解除，必须带着玩具和服装进行日常活动，甚至外出，增加暴露风险和心理羞耻。\n4. 可变体：服装可设定为魔法或科技产物，具有自我修复或收紧功能；可加入调教者通过远程指令让服装变得更紧或启动震动，惩罚逃脱尝试。", "uid": 2303}, "玩具收藏与渐进式堕落自慰": {"content": "{玩具收藏与渐进式堕落自慰}\n简介：\n【场景/玩法描述】受虐者从偶然接触色情内容开始，逐步购买和使用跳蛋、假阳具、震动棒、拉珠等玩具，从手指自慰升级到全身塞满玩具，最终在假期中实现全天候穿戴玩具生活，羞耻心完全瓦解，渴望更强烈的刺激。\n\n用法与交互细节：\n1. 受虐者最初因好奇尝试手指自慰，随后不满足于手指，购入跳蛋等小型玩具。\n2. 快感阈值提高后，受虐者陆续购买更大尺寸、更多功能的玩具（如震动棒、拉珠），并开发阴道、阴蒂、肛门等多个部位。\n3. 在长期独处期间（如假期），受虐者将多个玩具同时塞入身体，用乳胶内裤等固定，实现从早到晚的持续刺激，甚至想带玩具外出。\n4. 可变体：调教者可介入，提供更极端或定制的玩具，引导受虐者挑战极限；或设定玩具具有成瘾性，使受虐者无法停止使用。", "uid": 2304}, "镜前自赏与淫荡自我认知": {"content": "{镜前自赏与淫荡自我认知}\n简介：\n【场景/玩法描述】受虐者穿上情趣服装后，在落地镜前摆出各种诱人姿势，观察自己被服装凸显的性感身体，逐渐从羞耻转为兴奋，主动揉捏乳头和阴蒂自慰，最终沉迷于镜中淫荡的自我形象。\n\n用法与交互细节：\n1. 受虐者初次穿上情趣内衣、丝袜、高跟鞋等，在镜前审视自己，发现身体曲线被服装强化，产生羞耻感。\n2. 服装的摩擦和视觉刺激引发性欲，受虐者开始触摸敏感部位，对着镜子自慰，并因看到自己的痴态而更加兴奋。\n3. 受虐者可能尝试不同姿势（翘腿、提裙、转身），观察服装下若隐若现的乳头、阴部突起，强化自我物化。\n4. 可变体：可加入调教者通过镜子或摄像头观察，进行语言羞辱或指令；或镜子具有催眠效果，加深受虐者的淫荡自我认知。", "uid": 2305}, "睡眠中的持续刺激与晨起高潮": {"content": "{睡眠中的持续刺激与晨起高潮}\n简介：\n【场景/玩法描述】受虐者穿着全套情趣服装并塞入震动棒、跳蛋等玩具入睡，整夜在低档震动或静止状态下保持刺激，早晨醒来后因身体敏感度低而暂时无感，但起身或伸懒腰时玩具被牵动，瞬间引发强烈高潮。\n\n用法与交互细节：\n1. 受虐者睡前不取出体内玩具，仅关闭或调低震动，穿着服装入睡，玩具被乳胶紧身裤等固定。\n2. 睡眠中，翻身等动作可能导致玩具轻微移动，产生无意识快感，但受虐者处于睡眠状态未完全清醒。\n3. 早晨醒来后，受虐者忘记体内有玩具，伸懒腰或坐起时震动棒被拉动，龟头冲击子宫，造成突发高潮，使其瘫软回床。\n4. 可变体：可设定玩具具有定时功能，在清晨自动启动最大震动，作为强制唤醒方式；或调教者远程操控，在受虐者半醒时给予刺激。", "uid": 2306}, "外出前挣扎与玩具无法移除的绝望": {"content": "{外出前挣扎与玩具无法移除的绝望}\n简介：\n【场景/玩法描述】受虐者在有外出约定（如与同伴见面）前，试图脱下情趣服装和取出体内玩具，但因服装融合或玩具卡死而失败，每次尝试都引发高潮，时间紧迫下陷入绝望，最终可能被迫带着隐藏的玩具外出。\n\n用法与交互细节：\n1. 受虐者醒来后意识到有外出计划，必须在一个小时内清理身体并取下玩具。\n2. 尝试脱衣时发现乳胶紧身裤与皮肤融合，手套无法脱下，震动棒被紧身裤锁住，拉扯只会导致震动棒在子宫内搅动，造成高潮。\n3. 受虐者反复尝试，消耗时间并累积快感，理智逐渐崩溃，面临迟到或暴露的恐惧。\n4. 可变体：调教者可设定倒计时，若未能按时出门，服装将自动启动惩罚模式（如公开震动、发出声音）；或同伴突然到访，增加被发现的风险。", "uid": 2307}, "伪装拘束公开上街": {"content": "{伪装拘束公开上街}\n简介：\n【场景/玩法描述】受虐者身穿全覆盖乳胶衣与拘束道具（口塞、贞操带、内置震动棒、拉珠），在调教者陪同下伪装成普通情侣上街。调教者通过遥控器控制体内玩具的震动强度，在人群中制造强制高潮，利用路人目光加剧羞耻感。\n\n用法与交互细节：\n1. 受虐者穿戴完整拘束套装，外部以连衣裙、墨镜、口罩遮掩，口塞使言语变为无意义音节。\n2. 调教者搂扶受虐者行走，随机开启震动，使受虐者在路人注视下抑制高潮反应，失败则引发更大羞耻。\n3. 可设计突发互动：如路人询问、店员帮助，调教者借机暴露部分乳胶装束（如掀起裙角露出乳胶腿），让受虐者在陌生人面前被迫高潮。\n4. 可变体：更换场景为商场、公园或公共交通工具；拘束道具可替换为跳蛋、尿道塞或电击装置；调教者与受虐者关系可设定为上司/下属、师生或陌生人胁迫。", "uid": 2308}, "体液循环强制饮用": {"content": "{体液循环强制饮用}\n简介：\n【场景/玩法描述】受虐者穿戴内置泵吸系统的乳胶贞操带，将阴道分泌物与榨乳机产出的乳汁混合，通过导管泵入口塞，强制受虐者持续吞咽自己的体液。混合液中可加入媚药，形成自我反馈的强制发情循环。\n\n用法与交互细节：\n1. 装备包含：乳胶贞操带（带收集槽）、榨乳机、口塞（带导管接口）、输液袋。\n2. 高潮时分泌的蜜液被贞操带吸收，与乳汁混合后泵入口中，受虐者无法吐出，只能吞咽。\n3. 调教者可控制泵送时机，如在受虐者羞耻或高潮时加大流量，增强精神灾厄。\n4. 可变体：体液可替换为尿液（需排泄控制）；加入媚药剂量可调节；可改为调教者饮用受虐者体液作为奖励或羞辱。", "uid": 2309}, "乳胶玉足赏玩与羞辱": {"content": "{乳胶玉足赏玩与羞辱}\n简介：\n【场景/玩法描述】受虐者穿着乳胶包裹的丝袜和高跟鞋，调教者将自身分泌的蜜液滴入受虐者鞋内，使其行走时产生粘腻感与淫靡水声。调教者当众舔舐或把玩受虐者乳胶玉足，利用足部敏感带制造羞耻高潮。\n\n用法与交互细节：\n1. 调教者先在自己鞋内积存蜜液，然后倒入受虐者高跟鞋中，令其每走一步都感受到滑腻与声响。\n2. 在公共场合，调教者抬起受虐者的脚，隔着乳胶舔舐足弓或吸吮足趾，路人视角下仅为亲密举动。\n3. 可配合足部拘束：高跟鞋用绑带固定，使受虐者无法脱鞋，延长折磨。\n4. 可变体：使用不同材质袜（丝袜、网袜）或赤足；液体可换成润滑液、精液替代品；场景可设在鞋店、公园长椅。", "uid": 2310}, "拉珠突然拔出强制高潮": {"content": "{拉珠突然拔出强制高潮}\n简介：\n【场景/玩法描述】受虐者肠道内塞入长串震动拉珠，调教者在对方毫无防备时猛然将拉珠整串或部分拔出，利用粗糙凸起对肠壁的剧烈摩擦引发瞬间失禁式高潮。\n\n用法与交互细节：\n1. 拉珠需提前润滑并完全塞入，连接线留在体外以便抓握。\n2. 调教者选择受虐者放松或专注于其他任务时突然发力拔出，制造惊吓与快感叠加。\n3. 拔出后可观察受虐者痉挛、潮喷，并语言羞辱其“淫荡反应”。\n4. 可变体：拉珠可替换为震动肛塞或串珠；拔出速度可快可慢；可在公共场合隐蔽操作，增加社死风险。", "uid": 2311}, "咖啡厅包间隐秘调教": {"content": "{咖啡厅包间隐秘调教}\n简介：\n【场景/玩法描述】调教者带受虐者进入咖啡厅包间，利用半公开环境进行调教。店员为同好或知情者，配合制造意外闯入或服务，增加紧张感。调教后给予温柔按摩，形成落差控制。\n\n用法与交互细节：\n1. 提前与店员约定暗号，如特定时间推门送咖啡，装作无意撞见受虐者高潮丑态。\n2. 包间内可关闭玩具进行安抚按摩，让受虐者放松警惕，再突然开启震动。\n3. 利用包间窗帘缝隙让受虐者窥见外面行人，强化“被观看”的错觉。\n4. 可变体：场景改为餐厅包间、KTV包厢；店员角色可设定为调教者的助手或受虐者的熟人，增加背德感。", "uid": 2312}, "强制饮尽储存体液": {"content": "{强制饮尽储存体液}\n简介：\n【场景/玩法描述】受虐者高潮时分泌的体液被收集在透明输液袋中，调教者在受虐者清醒时当面饮用，并详细描述味道，以此羞辱受虐者，强化其“淫荡”认知。\n\n用法与交互细节：\n1. 使用带单向阀的输液袋连接贞操带或导尿管，积累一定量后取下。\n2. 调教者缓慢饮用，故意发出吞咽声，伸出沾满体液的舌头展示，或与受虐者接吻分享。\n3. 可要求受虐者自己饮用，作为“自产自销”的惩罚。\n4. 可变体：体液可混合其他液体（酒、牛奶）；收集容器可挂在受虐者身上作为暴露装饰；饮用后可评价味道，进行语言调教。", "uid": 2313}, "乳胶紧缚下的感官剥夺与过载": {"content": "{乳胶紧缚下的感官剥夺与过载}\n简介：\n【场景/玩法描述】受虐者全身包裹乳胶紧身衣，仅露出口鼻或眼部。内置多个震动玩具同时刺激阴道、子宫、肛门和乳头，配合口塞和眼罩剥夺言语与视觉，使受虐者陷入持续高潮与精神灾厄状态。\n\n用法与交互细节：\n1. 乳胶衣需紧密贴合，内部涂抹润滑液以增强触感，外部可搭配日常服装伪装。\n2. 玩具设置为不同频率，随机变化，使受虐者无法预测快感来源。\n3. 调教者通过触摸、耳语或突然关闭玩具制造反差，强化精神控制。\n4. 可变体：增加电击或温度刺激；剥夺听觉（耳塞）实现全感官剥夺；在公共场合使用，仅靠调教者引导行走。", "uid": 2314}, "高潮后强制按摩与反差调教": {"content": "{高潮后强制按摩与反差调教}\n简介：\n【场景/玩法描述】受虐者经历连续强制高潮后身体痉挛，调教者突然转为温柔态度，为其按摩酸胀部位，但在按摩中故意按压敏感点（如小腹子宫处）引发新的快感，使受虐者陷入“痛苦与舒适”的混乱。\n\n用法与交互细节：\n1. 调教者先关闭所有玩具，用轻柔手法按摩受虐者四肢、小腹，缓解肌肉紧张。\n2. 按摩时穿插挑逗：按压子宫位置使内部震动棒摩擦宫颈，或揉捏大腿根部。\n3. 语言上使用关怀语气，如“主人辛苦了”，但动作保持控制，让受虐者无法拒绝。\n4. 可变体：按摩后重新开启玩具，作为“奖励”；可让受虐者为调教者按摩，反转权力片刻再夺回。", "uid": 2315}, "远程监控下的隐私暴露与羞耻调教": {"content": "{远程监控下的隐私暴露与羞耻调教}\n简介：\n【场景/玩法描述】调教者利用隐藏的监控录像备份，揭露受虐者私密的性行为，以此作为把柄进行羞耻调教。受虐者在不知情下被全程记录，事后被当面揭穿，陷入极度的羞耻与服从。\n\n用法与交互细节：\n1. 调教者事先在受虐者房间安装隐蔽摄像头，或利用已有监控系统获取其自慰、性爱等私密录像。\n2. 在适当时机，调教者以“无意中发现”或“关心”为借口，逐步透露已知信息，观察受虐者反应。\n3. 受虐者从否认、惊慌到最终承认，调教者通过温柔或戏谑的语气施加压力，强调“我不会怪你，但你要听话”。\n4. 可变体：录像可用于后续命令，如“如果你不照做，我就把视频发给某人”；或作为角色扮演的一部分，让受虐者观看自己的录像并复述感受。", "uid": 2316}, "伪装拘束外出：体内玩具与日常活动的融合": {"content": "{伪装拘束外出：体内玩具与日常活动的融合}\n简介：\n【场景/玩法描述】受虐者穿着日常服装，体内塞入震动棒、拉珠、榨乳器等玩具，通过手机APP远程控制，在公共场合（如街道、地铁）进行长时间的高潮行走。拘束衣、锁链等限制行动幅度，增加刺激与风险。\n\n用法与交互细节：\n1. 准备阶段：受虐者自行或由调教者协助插入玩具，穿戴拘束衣、乳胶袜、高跟靴等，确保外观正常。\n2. 外出阶段：调教者通过APP随机或定时启动玩具，强度可渐变。受虐者需维持正常举止，避免被发现。\n3. 高潮管理：玩具可设置循环模式（震动、抽插、射液），受虐者高潮时可能腿软、失禁，需提前准备纸尿裤或储液装置。\n4. 可变体：加入路人互动风险，如被问路时调高震动；或设定任务目标，如“走到指定地点才能关闭”。", "uid": 2317}, "子宫奸与体液循环系统": {"content": "{子宫奸与体液循环系统}\n简介：\n【场景/玩法描述】使用特制震动棒突破子宫口，配合榨乳器收集乳汁，将乳汁与蜜液混合后重新泵入子宫，形成体液循环。子宫被持续填满、搅拌，带来深度快感与腹部隆起效果。\n\n用法与交互细节：\n1. 道具准备：长震动棒（可深入子宫）、榨乳器（带储奶盒和软管）、炮机底座（带泵液功能）。\n2. 插入与连接：震动棒插入阴道并顶开子宫口，榨乳器吸附乳房，软管连接至震动棒底端。\n3. 循环机制：榨乳器收集乳汁，炮机将混合液泵入子宫；震动棒堵住子宫口防止回流，形成内部压力。\n4. 可变体：可加入电击功能，当受虐者试图拔出时触发；或设定循环周期，如“每高潮三次泵液一次”。", "uid": 2318}, "论坛身份揭露与线下调教胁迫": {"content": "{论坛身份揭露与线下调教胁迫}\n简介：\n【场景/玩法描述】受虐者在成人论坛发布伪装拘束内容，被调教者通过细节（背景、发色痕迹）识破真实身份和住址。调教者以此威胁，迫使受虐者线下见面并接受调教。\n\n用法与交互细节：\n1. 调教者浏览论坛，从视频/图片中提取地理特征、身体标记等线索，结合现实记忆锁定目标。\n2. 发送私信揭露身份，语气可伪装成粉丝或恶意威胁，引发受虐者恐慌。\n3. 受虐者因害怕暴露而答应见面，调教者可要求其穿戴特定玩具作为“诚意证明”。\n4. 可变体：调教者不直接威胁，而是以“交流经验”为由接近，逐步建立信任后转为控制；或多人合作，一人揭露一人扮演拯救者。", "uid": 2319}, "楼道偶遇与高潮偷袭": {"content": "{楼道偶遇与高潮偷袭}\n简介：\n【场景/玩法描述】在公寓楼道等半公共空间，调教者（熟人）偶遇受虐者，趁其不备突然操控其体内玩具或直接手动刺激，使其在随时可能被人看见的环境下强制高潮。\n\n用法与交互细节：\n1. 双方均日常穿着，体内预先塞入玩具。调教者以打招呼、聊天为掩护接近。\n2. 调教者通过肢体接触（如拥抱、摸头）或远程遥控，突然加大震动强度或手动抽插玩具。\n3. 受虐者需强忍呻吟，调教者可捂住其嘴或低声调侃，增加羞耻感。\n4. 可变体：设定“谁先被发现就输”的游戏；或调教者假装帮忙整理衣物实则刺激；事后约定下次“报复”。", "uid": 2320}, "乳胶拘束衣下的感官剥夺与强制步行": {"content": "{乳胶拘束衣下的感官剥夺与强制步行}\n简介：\n【场景/玩法描述】受虐者穿着定制乳胶拘束衣，手臂被铁链限制抬起角度，腿部被袜链限制步幅，内裤固定炮机。在视觉、听觉正常但行动严重受限的状态下，进行长时间步行，每走一步都伴随体内玩具的刺激。\n\n用法与交互细节：\n1. 拘束衣设计：乳胶材质，内置锁链连接手臂与躯干，允许小范围活动；袜链连接大腿与脚踝，限制迈步大小。\n2. 玩具固定：炮机底座穿过内裤孔洞，用锁链锁住，防止脱落；口塞可选配。\n3. 步行规则：受虐者只能以小碎步移动，调教者可设定路线或任务，如“绕公园一圈”。\n4. 可变体：加入路人互动，如被问路时无法抬手只能口头回应；或设定“摔倒惩罚”，若跌倒则延长步行时间。", "uid": 2321}, "高潮计数与体液收集挑战": {"content": "{高潮计数与体液收集挑战}\n简介：\n【场景/玩法描述】受虐者在伪装拘束外出期间，通过玩具的传感器或手动记录高潮次数，并收集喷出的蜜液、乳汁等体液。结束后展示收集量，作为调教成果的量化指标。\n\n用法与交互细节：\n1. 道具准备：带计数功能的炮机或手机APP，储液盒刻度清晰。\n2. 外出任务：受虐者需在指定时间内达到一定高潮次数或收集满储液盒。\n3. 验证环节：回家后，调教者检查计数器和储液盒，根据结果给予奖励或惩罚。\n4. 可变体：将体液用于后续调教（如涂抹身体、饮用）；或设定排行榜，与其他受虐者比较。", "uid": 2322}, "职场OL的隐秘玩具日常与后辈模仿": {"content": "{职场OL的隐秘玩具日常与后辈模仿}\n简介：\n【场景/玩法描述】职场中的前辈（OL）日常塞着震动棒、跳蛋上班，只在面试等严肃场合关闭。后辈发现后，前辈主动引导其尝试，甚至手把手教导如何在工作中维持高潮而不被发现。\n\n用法与交互细节：\n1. 前辈设定：选择一位看似正经但私下玩很大的同事或上司，作为引导者。\n2. 发现契机：后辈通过偶然的遥控器掉落、奇怪声响或前辈主动透露得知秘密。\n3. 教学互动：前辈分享经验，如“开会时调低档位”“穿纸尿裤防漏”，并协助后辈首次尝试。\n4. 可变体：前辈可设定“职场挑战”，如“今天谁先被发现就要请客”；或发展为互相遥控的竞争关系。", "uid": 2323}, "行李箱拘束运输Play": {"content": "{行李箱拘束运输Play}\n简介：\n【场景/玩法描述】将受虐者捆绑后塞入特制行李箱中，箱内设有隔音海绵、固定乳胶垫和减震弹簧，确保外部听不到声音。受虐者被眼罩剥夺视觉，耳中播放自己过往高潮时的娇喘录音，口塞为假阳具式并连接媚药供应。下身炮机、拉珠、榨乳机等玩具由外部遥控。行李箱可被拖着在公共场合移动，箱盖有可开闭的百叶窗缝隙，让受虐者感知外界光线和声音，制造随时可能被发现的社死恐惧。\n\n用法与交互细节：\n1. 将受虐者捆绑成蜷缩姿态，确保炮机底座被身体压住，使震动棒深入子宫。\n2. 通过手机APP远程控制所有玩具的开关和强度，利用受虐者在狭小空间中敏感度倍增的特性，间歇性折磨。\n3. 调教者可选择路线，在人少时打开箱缝让受虐者感受外界，或故意在人多处停留，通过耳机与受虐者对话，增加暴露紧张感。\n4. 可变体：行李箱可替换为其他密闭容器（如大型旅行包、货箱）；玩具组合可根据受虐者弱点调整；录音可替换为调教者的实时羞辱语音。", "uid": 2324}, "自我录音羞耻反馈": {"content": "{自我录音羞耻反馈}\n简介：\n【场景/玩法描述】将受虐者过去在不同场合（培训室、街上、家中）被玩弄至高潮时的娇喘声录制下来，在后续调教中通过耳机强制播放给她听。受虐者听到自己的淫叫声会产生强烈的背德感和尴尬，从而加剧身体反应。\n\n用法与交互细节：\n1. 提前收集受虐者高潮时的声音素材，可剪辑成循环音频。\n2. 在受虐者被拘束或敏感度提升的状态下，用入耳式耳机播放，音量可调，让她同时听到外部环境音和自己的录音。\n3. 调教者可配合言语羞辱，如“听听你自己有多淫荡”，或要求受虐者跟着录音同步呻吟。\n4. 可变体：录音可替换为受虐者被调教时的求饶声；可加入变声处理，让受虐者听到自己声音被扭曲；也可在公开场合边缘播放，增加暴露风险。", "uid": 2325}, "远程遥控高潮胁迫": {"content": "{远程遥控高潮胁迫}\n简介：\n【场景/玩法描述】调教者持有受虐者身上所有玩具的遥控权限，以威胁方式迫使受虐者服从指令。例如，威胁若不在规定时间内完成某项任务（如主动被捆绑），就会在公共场合突然开启玩具，使其在人群中高潮失态。\n\n用法与交互细节：\n1. 调教者需提前将玩具与手机APP配对，掌握完全控制权。\n2. 设定明确的服从条件，如“在我回来前自己绑好”，并告知不服从的惩罚（如连续高潮一整天、穿着湿透的乳胶衣爬回家）。\n3. 惩罚可分级，从轻度震动到最大功率炮机中出，配合言语施压。\n4. 可变体：遥控权限可分享给多人，让受虐者不知道何时何地会被谁玩弄；惩罚内容可定制，如强制在特定地点高潮、穿着暴露服装完成羞耻任务。", "uid": 2326}, "乳胶膝枕与睡梦玩弄": {"content": "{乳胶膝枕与睡梦玩弄}\n简介：\n【场景/玩法描述】受虐者穿着乳胶衣，在同伴熟睡时提供膝枕，并趁机轻柔玩弄同伴的身体。同伴穿着乳胶衣、戴着榨乳机等玩具入睡，受虐者通过舔舐、抚摸等轻微刺激，在同伴半梦半醒间引发快感，同时享受对方无意识的反应。\n\n用法与交互细节：\n1. 同伴需穿着全包乳胶衣，并佩戴可维持睡眠状态的玩具（如低功率震动棒、榨乳机）。\n2. 受虐者以膝枕姿势让同伴躺在腿上，可轻轻提起裙子观察或触碰敏感部位（如乳胶玉足、大腿根部）。\n3. 动作需轻柔，避免惊醒同伴，通过舔舐足趾、搅动高跟鞋内蜜液等方式，让同伴在梦中扭动呻吟。\n4. 可变体：同伴可被轻度催眠或服用安眠药物；受虐者角色可互换；场景可移至户外（如公园长椅），增加暴露风险。", "uid": 2327}, "体液收集与强制喂食": {"content": "{体液收集与强制喂食}\n简介：\n【场景/玩法描述】将受虐者高潮时分泌的蜜液、乳汁等体液收集在袋中，通过管子连接到口塞上，强制受虐者饮下。或由调教者收集后亲手喂食，让受虐者品尝自己的味道，混合媚药增强效果。\n\n用法与交互细节：\n1. 使用贞操带、榨乳机等设备收集体液，储存在密封袋或瓶中。\n2. 将收集的体液与媚药混合，通过假阳具口塞的储液盒或直接灌入口腔。\n3. 调教者可命令受虐者自己收集并饮下，或作为奖励/惩罚给予。\n4. 可变体：体液可替换为调教者的体液，进行交换喂食；可加入温度变化（如冰镇或加热）；可在公开场合偷偷喂食，增加羞耻感。", "uid": 2328}, "触手贯通全身Play": {"content": "{触手贯通全身Play}\n简介：\n【场景/玩法描述】使用乳胶触手从下体插入，贯穿肠道、胃、食道，最终从口腔钻出，实现全身贯通。触手在体内横冲直撞，带来远超普通高潮的快感，同时小腹会如怀孕般隆起，脖子变粗，视觉冲击强烈。\n\n用法与交互细节：\n1. 触手需为乳胶材质，可远程控制或自主行动，从蜜穴和菊穴同时插入。\n2. 贯通过程需逐步进行，先填满肠道和胃，再突破食道，最后从嘴中钻出，触手可喷出体液。\n3. 受虐者在此过程中会经历连续绝顶，身体痉挛但无法排出体液（因触手堵塞）。\n4. 可变体：触手可附加震动、放电、温度变化功能；贯通路径可反向（从口入从下体出）；可多人同时被贯通，形成连接。", "uid": 2329}, "公共场合秘密高潮行走": {"content": "{公共场合秘密高潮行走}\n简介：\n【场景/玩法描述】受虐者穿着乳胶衣和玩具（如震动棒、拉珠）在公共场合行走，调教者通过遥控间歇开启玩具，使其在人群中秘密高潮。受虐者需强忍快感保持正常步态，但体液可能从贞操带溢出，滴落在地面形成痕迹，增加被发现的风险。\n\n用法与交互细节：\n1. 受虐者穿着可隐藏玩具的服装（如长裙、风衣），脚穿高跟鞋，鞋内可收集滴落的蜜液。\n2. 调教者跟随或远程监控，选择人多或人少的路段，随机开启玩具，调整强度。\n3. 受虐者高潮时需控制表情和声音，可假装休息（如坐在路边）来掩饰身体的痉挛。\n4. 可变体：可设定目标地点，要求受虐者在规定时间内到达，否则增加惩罚；可让受虐者与路人互动（如问路），增加紧张感；体液痕迹可被调教者拍摄作为羞辱材料。", "uid": 2330}, "胁迫性角色扮演调教": {"content": "{胁迫性角色扮演调教}\n简介：\n【场景/玩法描述】调教者以掌握受虐者把柄（如遥控器、秘密）为由，胁迫其扮演特定角色（如母狗、奴隶）并执行羞耻任务。调教者本身可能并非S属性，但为了迎合受虐者喜好而学习S话语，形成一种“服务型S”的反差。\n\n用法与交互细节：\n1. 调教者需提前准备S台词和剧本，可能感到害羞但仍坚持执行。\n2. 胁迫内容可包括：要求受虐者主动接受捆绑、在指定地点等待、穿着特定服装等。\n3. 调教者可利用受虐者的弱点（如害怕社死）进行威胁，如“不听话就让你在人多的地方高潮”。\n4. 可变体：调教者和受虐者可互换角色，进行“调教者培训”；可引入第三方，让受虐者不知情地被多人调教；胁迫可升级为契约形式，长期执行。", "uid": 2331}, "伪装拘束外出：乳胶衣下的持续高潮挑战": {"content": "{伪装拘束外出：乳胶衣下的持续高潮挑战}\n简介：\n【场景/玩法描述】受虐者穿着外表普通的连衣裙，内部为全包乳胶拘束衣，塞满震动棒、榨乳机、拉珠、尿道塞等。在公共场合如街道、楼道行走时，需保持正常举止，但体内玩具持续运作，带来随时可能高潮的紧张感。同行者可通过手机APP控制玩具强度，增加未知刺激。\n\n用法与交互细节：\n1. 准备阶段：受虐者穿上定制乳胶拘束衣，外部套上日常服装，确保外表无异样。\n2. 外出规则：受虐者不得主动高潮或发出声音，否则面临惩罚（如电击或延长拘束时间）。\n3. 同行者通过APP随机调整震动强度、榨乳速度等，受虐者需在忍耐中完成逛街、购物等日常任务。\n4. 可变体：可加入路人无意触碰或询问，增加羞耻感；或设定安全词，当受虐者无法忍耐时暂停。", "uid": 2332}, "乳胶拘束衣的穿戴与感官剥夺": {"content": "{乳胶拘束衣的穿戴与感官剥夺}\n简介：\n【场景/玩法描述】受虐者在指导下穿戴全包乳胶拘束衣，过程细致描绘乳胶摩擦皮肤的快感、束缚带的收紧、各孔洞被塞满的充实感。穿戴后，受虐者行动受限，感官被放大，任何微小动作都会引发体内玩具的刺激。\n\n用法与交互细节：\n1. 穿戴顺序：先穿乳胶袜和手套，再固定贞操带、尿道塞、拉珠，最后套上连衣裙并连接所有拘束带。\n2. 感官反馈：描述乳胶的顺滑触感、束缚带的压迫、震动棒的填充感，以及尿道塞带来的排尿错觉。\n3. 穿戴后测试：调教者轻推受虐者，观察其踉跄反应，并告知惩罚机制（如擅自脱衣会触发全功率震动）。\n4. 可变体：可改为受虐者自行穿戴，但需在调教者视频监督下完成；或加入时间限制，增加紧迫感。", "uid": 2333}, "互相连接的玩具惩罚与奖励机制": {"content": "{互相连接的玩具惩罚与奖励机制}\n简介：\n【场景/玩法描述】调教者与受虐者的拘束服通过APP互相连接，任何一方擅自行动或触碰开关都会触发对方的惩罚（如电击乳头或子宫）。同时，调教者可设定任务，完成后奖励受虐者一次高潮，否则持续寸止。\n\n用法与交互细节：\n1. 连接设定：双方APP可控制对方所有玩具，并设定“惩罚模式”——当一方试图脱下口塞或关闭震动时，对方特定部位遭受电击。\n2. 任务与奖励：调教者命令受虐者完成公共场合的简单任务（如保持微笑、走直线），成功则允许其高潮一次，失败则延长寸止时间。\n3. 互相试探：双方可故意触发对方惩罚，测试忍耐极限，形成博弈。\n4. 可变体：可改为单向控制，受虐者完全无法反抗；或加入随机惩罚，由APP定时自动触发。", "uid": 2334}, "媚药口塞与强制发情状态": {"content": "{媚药口塞与强制发情状态}\n简介：\n【场景/玩法描述】受虐者佩戴假阳具口塞，内部管道连接储液盒，持续分泌微量媚药。受虐者必须不断吮吸，媚药通过口腔黏膜吸收，逐渐提升全身敏感度，使其长时间处于发情状态，任何轻微刺激都易引发高潮。\n\n用法与交互细节：\n1. 口塞设计：硅胶假阳具形状，马眼处渗出媚药，储液盒可更换，药效持续一整天。\n2. 强制吮吸：受虐者若停止吮吸，口塞会震动提醒；媚药累积导致身体燥热、蜜液分泌增多。\n3. 交互影响：同行者可通过言语挑逗或轻微触碰，轻易让受虐者高潮，凸显控制力。\n4. 可变体：可改为媚药通过其他途径摄入（如饮料、栓剂）；或设定药效随时间增强，后期受虐者完全无法自控。", "uid": 2335}, "公共楼道中的秘密高潮与羞耻忍耐": {"content": "{公共楼道中的秘密高潮与羞耻忍耐}\n简介：\n【场景/玩法描述】在居民楼楼道等半公共空间，调教者突然玩弄受虐者，如捏乳、打开震动棒，使其在可能被邻居发现的风险下强制高潮。受虐者必须捂住嘴抑制声音，同时承受体内快感与外界脚步声的紧张。\n\n用法与交互细节：\n1. 场景选择：选择有回声的楼道，脚步声和说话声清晰可闻，增加被发现风险。\n2. 突发玩弄：调教者毫无预警地捏住受虐者乳头或打开震动开关，观察其惊慌反应。\n3. 声音控制：受虐者需自行捂嘴或依赖口塞，若发出声音则面临更严厉惩罚。\n4. 可变体：可加入真实邻居经过的随机事件；或改为受虐者主动在楼道自慰，调教者远程监控。", "uid": 2336}, "榨乳机与乳汁循环的羞耻玩法": {"content": "{榨乳机与乳汁循环的羞耻玩法}\n简介：\n【场景/玩法描述】受虐者佩戴榨乳机，乳头被毛刷环夹紧，机器定时榨取乳汁并储存在透明储液盒中。储液盒通过管子连接至口塞，受虐者需吮吸自己的乳汁，形成循环。在公共场合，榨乳机的运转声和乳汁流动可能被察觉，增加羞耻。\n\n用法与交互细节：\n1. 设备连接：榨乳机贴合乳房，管子沿乳沟固定，连接至口塞；储液盒可挂在腰间或藏于衣内。\n2. 榨乳节奏：调教者通过APP控制榨乳力度和频率，从轻柔到强力，乳汁被泵入口塞供受虐者饮用。\n3. 羞耻点：受虐者吞咽乳汁的动作、储液盒的晃动、以及可能溢出的乳汁痕迹，均带来暴露风险。\n4. 可变体：可改为乳汁被收集后用于其他用途（如涂抹身体）；或加入路人询问“什么声音”，考验受虐者应变。", "uid": 2337}, "过山车高潮挑战": {"content": "{过山车高潮挑战}\n简介：\n【场景/玩法描述】受虐者穿戴内置震动玩具和乳胶拘束内裤，在过山车运行期间同步开启所有玩具，利用过山车的俯冲和颠簸加剧体内玩具的抽插，在公共场合强忍高潮反应，将尖叫伪装为对游乐设施的恐惧。\n\n用法与交互细节：\n1. 调教者提前为受虐者穿戴好震动棒、拉珠、跳蛋等玩具，并用乳胶紧身内裤固定，确保玩具在运动中不会滑脱。\n2. 受虐者登上过山车，在启动瞬间通过手机APP或遥控器开启所有玩具至最高功率，利用过山车的失重和震动让玩具在体内剧烈冲撞。\n3. 受虐者需在人群中隐藏快感，将无法抑制的娇喘和高潮尖叫融入其他乘客的尖叫声中，避免被发现。\n4. 可变体：可更换为其他刺激性游乐设施（如海盗船、跳楼机），或增加任务如“在设施运行期间必须达到指定高潮次数”，失败则接受惩罚。", "uid": 2338}, "乳胶拘束内裤强制兜液": {"content": "{乳胶拘束内裤强制兜液}\n简介：\n【场景/玩法描述】受虐者穿着密封乳胶内裤，将震动棒等玩具插入后，内裤会锁住所有分泌的蜜液，无法排出。随着活动或高潮，液体在内裤中积聚，形成黏腻湿滑的触感，增强羞耻和快感。\n\n用法与交互细节：\n1. 调教者为受虐者穿上特制乳胶内裤，该内裤无缝贴合，仅留微小缝隙供玩具线缆通过，确保液体不会外漏。\n2. 受虐者在日常活动或调教中持续分泌体液，内裤逐渐被填满，行走或坐下时能感受到液体晃动和挤压。\n3. 当需要释放时，受虐者必须通过特定姿势（如蹲下、挤压腹部）或请求调教者打开内裤，液体才会喷涌而出，造成强烈的羞耻和释放感。\n4. 可变体：可设定“满载”任务，要求受虐者在液体溢出前完成某项挑战；或结合公开场所，让受虐者穿着兜满液体的内裤行走，担心渗漏。", "uid": 2339}, "视觉欺骗暴露play": {"content": "{视觉欺骗暴露play}\n简介：\n【场景/玩法描述】受虐者穿着具有视觉欺骗效果的服装，在他人眼中衣着正常，但实际上身体被情趣内衣、震动玩具和拘束带包裹。只有特定对象（如调教者）能看见真实状态，受虐者在公共场合随时处于被发现的边缘。\n\n用法与交互细节：\n1. 调教者赋予受虐者一套“认知遮蔽”服装，该服装对外人显示为普通衣物，但对调教者或指定同伴显示为真实的情趣装束。\n2. 受虐者在公共场合（如商场、公园）活动，体内插入玩具并持续震动，外人毫无察觉，但受虐者时刻担心秘密被揭穿。\n3. 调教者可突然要求受虐者做出可能暴露的动作（如弯腰、提裙），或故意在他人面前提及敏感词，观察受虐者的羞耻反应。\n4. 可变体：可设定“暴露临界点”，当受虐者高潮次数或体液渗出达到阈值时，视觉欺骗效果暂时减弱，增加真实暴露风险。", "uid": 2340}, "强制高潮昏迷后的温柔拷问": {"content": "{强制高潮昏迷后的温柔拷问}\n简介：\n【场景/玩法描述】受虐者在调教中因连续强制高潮而昏迷，醒来后发现自己被调教者（或同伴）带回家中照顾。调教者利用受虐者虚弱和羞耻的状态，温柔地追问其淫荡行为，迫使受虐者亲口承认自己的欲望和快感，加深精神服从。\n\n用法与交互细节：\n1. 调教者设计一场高强度高潮调教，直至受虐者失去意识。之后将受虐者安置在安全私密的环境，并清理现场。\n2. 受虐者苏醒后，调教者以关怀姿态出现，但通过肢体接触（如拥抱、抚摸）和言语引导，让受虐者回忆高潮时的丑态。\n3. 调教者逐步提问：“你什么时候开始自慰的？”“今天高潮了多少次？”“是不是喜欢被我玩弄？”，受虐者因虚弱和依赖心理，容易吐露真实感受。\n4. 可变体：可加入“证据展示”环节，如播放受虐者高潮时的录音或视频，或让受虐者触摸自己仍湿透的衣物，强化羞耻。", "uid": 2341}, "玩具故障强制高潮地狱": {"content": "{玩具故障强制高潮地狱}\n简介：\n【场景/玩法描述】受虐者体内的遥控玩具突然失控，无法关闭且震动强度不断升级，导致受虐者在无法求助的场合（如公共交通工具、密闭空间）陷入连续高潮，最终在同伴或陌生人面前崩溃失态。\n\n用法与交互细节：\n1. 调教者事先在玩具控制APP中设置“失控模式”，在特定时间或触发条件下激活，使玩具无视开关状态以随机强度震动。\n2. 受虐者发现玩具异常后尝试关闭或取出，但所有努力均失败，震动反而加剧，迫使受虐者在他人面前强忍快感。\n3. 当受虐者无法忍耐时，不得不向身边同伴暴露自己的淫荡状态，请求帮助取出玩具，但过程中可能因高潮而昏迷或失禁。\n4. 可变体：可设定“救援条件”，如同伴必须完成某项羞耻任务（如亲吻受虐者、说出指定台词）才能获得关闭玩具的权限；或玩具失控后自动记录高潮数据并发送给调教者。", "uid": 2342}, "膝枕苏醒后的羞耻揭露": {"content": "{膝枕苏醒后的羞耻揭露}\n简介：\n【场景/玩法描述】受虐者在公开场所因高潮或恐惧昏迷，同伴将其带到僻静处提供膝枕照顾。苏醒后，同伴以调侃和温柔的方式揭露受虐者昏迷期间的淫荡表现（如说梦话、身体痉挛），让受虐者陷入羞耻，同时加深对同伴的依赖。\n\n用法与交互细节：\n1. 同伴在受虐者昏迷期间观察并记录其身体反应（如无意识娇喘、体液渗出），并可能进行轻微玩弄（如按压玩具）。\n2. 受虐者醒来后，同伴用亲昵动作（如捏脸、拥抱）安抚，然后逐步透露：“你刚才一直在叫我的名字呢”“你的内裤都湿透了”。\n3. 同伴可要求受虐者承认自己的淫荡，或以此作为把柄，要求受虐者答应后续的调教请求。\n4. 可变体：可加入“证据展示”，如同伴用手机拍摄了受虐者昏迷时的照片或视频；或让受虐者触摸自己被体液浸湿的衣物，强化羞耻感。", "uid": 2343}, "情趣晚礼服换装引诱": {"content": "{情趣晚礼服换装引诱}\n简介：\n【场景/玩法描述】原本纯洁的同伴在目睹受虐者的淫荡行径后，内心被触动，主动换上自己私藏的情趣服装，向受虐者展示并请求尝试玩具，实现从被动发现到主动参与的转变。\n\n用法与交互细节：\n1. 同伴在得知受虐者的秘密后，私下准备一套性感的情趣服装（如晚礼服、女仆装），并找借口离开现场去更换。\n2. 同伴穿着情趣服装出现在受虐者面前，展示身体并询问：“我这样好看吗？”“我也想试试那些玩具。”\n3. 受虐者从羞耻中被解放，转而成为引导者，为同伴挑选入门玩具并指导使用，双方关系可能发生逆转或加深。\n4. 可变体：可设定“换装比赛”，双方各自挑选最羞耻的服装并互相评分；或同伴在换装后要求受虐者为其穿戴玩具，作为之前被欺骗的惩罚。", "uid": 2344}, "监控偷拍与事后摊牌": {"content": "{监控偷拍与事后摊牌}\n简介：\n【场景/玩法描述】调教者（或同伴）早已通过隐藏监控拍下受虐者私下的自慰行为，在某个时机当面揭露，利用证据让受虐者陷入极度羞耻，从而获得支配权或迫使受虐者承认欲望。\n\n用法与交互细节：\n1. 调教者事先在受虐者常活动的私密空间（如卧室、浴室）安装隐蔽摄像头，记录其自慰过程。\n2. 在受虐者因其他事件暴露淫荡本性后，调教者拿出监控录像作为证据，轻描淡写地说出：“你上次在我家穿着我的衣服自慰，我都看到了。”\n3. 受虐者因隐私被揭穿而惊慌失措，调教者则利用此把柄提出要求，如“以后要听我的话”或“现在就在我面前自慰一次”。\n4. 可变体：可设定“证据销毁条件”，受虐者必须完成一系列调教任务才能删除录像；或调教者将录像作为共享秘密，拉近双方关系。", "uid": 2345}, "智能束缚衣的强制穿戴与脱困挣扎": {"content": "{智能束缚衣的强制穿戴与脱困挣扎}\n简介：\n【场景/玩法描述】受虐者发现身上的乳胶紧身衣、手套、丝袜、高跟鞋等全部无法脱下，边缘与皮肤融合，拉扯会产生痛感，如同长在身上。尝试用刀具等尖锐物品破坏，但衣物毫发无损。衣物具有智能特性，可自动调节松紧，并可能具备感官欺骗功能，让外界看到正常衣着。\n\n用法与交互细节：\n1. 调教者可通过远程控制或预设程序，让束缚衣在特定时间锁死，受虐者无法自行解除。\n2. 衣物可集成内置玩具（如震动棒、拉珠），并具备自清洁和排泄物处理功能，实现长期穿戴。\n3. 挣扎过程可伴随快感惩罚：越用力拉扯，内置玩具越深入刺激。\n4. 可变体：衣物材质可设定为透明或仅对特定人可见，增加暴露风险；或设定为逐渐收紧，作为限时任务失败的惩罚。", "uid": 2346}, "内置玩具的日常隐蔽高潮挑战": {"content": "{内置玩具的日常隐蔽高潮挑战}\n简介：\n【场景/玩法描述】受虐者穿戴隐藏式震动棒、拉珠、跳蛋等玩具外出，在公共场合（如商场、游乐园）进行日常活动。玩具持续或随机启动，受虐者需在人群中保持正常表情和举止，压抑高潮反应。\n\n用法与交互细节：\n1. 调教者可通过手机App远程控制玩具开关和强度，根据受虐者所处环境（如安静场合、与人交谈时）突然加强刺激。\n2. 设定任务：受虐者需完成一系列日常行为（如购物、点餐），期间若高潮失态则接受惩罚。\n3. 可引入“忍耐度”机制：受虐者在家可自由娇喘，在外必须完全压抑，形成反差。\n4. 可变体：玩具可设定为随身体活动（如走路、坐下）自动改变抽插幅度；或与路人互动触发，如被拥抱时玩具深入。", "uid": 2347}, "感官欺骗下的公开调教": {"content": "{感官欺骗下的公开调教}\n简介：\n【场景/玩法描述】受虐者身穿特殊服装，在他人眼中是普通衣着，但实际上身体被束缚衣和内置玩具完全包裹。只有特定对象（如调教者或同伴）能看见真实状态，形成信息不对等的羞耻玩法。\n\n用法与交互细节：\n1. 调教者可设定服装的可见性规则：对大众隐形，对指定人可见；或仅在照片/镜子中显示真实状态。\n2. 利用此机制，受虐者在不知情下被熟人“看穿”，引发惊慌和背德快感。\n3. 可设计“揭露”环节：调教者临时解除欺骗，让周围人瞬间看到受虐者的真实模样，造成社死危机。\n4. 可变体：服装可投影虚假衣着，如显示为职业装、校服，增加反差；或仅对受虐者自己隐形，使其误以为暴露。", "uid": 2348}, "高潮忍耐与失禁边缘的过山车试炼": {"content": "{高潮忍耐与失禁边缘的过山车试炼}\n简介：\n【场景/玩法描述】受虐者体内塞满震动玩具，乘坐过山车等高速刺激的游乐设施。利用设施的下坠、急转等物理冲击，配合玩具最高功率震动，迫使受虐者在公共场合连续高潮，同时需压抑失禁和灾厄表情。\n\n用法与交互细节：\n1. 调教者提前设定玩具在过山车启动时自动开到最大档，并可能远程操控随机变化模式。\n2. 受虐者被安全杠固定，无法夹腿或调整姿势，完全暴露在强制刺激下。\n3. 可加入“忍耐计数”：统计高潮次数，若超过阈值则触发额外惩罚（如延长游玩时间）。\n4. 可变体：更换设施类型，如跳楼机（失重感）、旋转杯（眩晕感），每种设施对应不同刺激模式；或要求受虐者在过程中保持与同伴的正常对话。", "uid": 2349}, "体液浸润与服装吸收的湿身跟踪": {"content": "{体液浸润与服装吸收的湿身跟踪}\n简介：\n【场景/玩法描述】受虐者穿戴的丝袜、内衣等具有超强吸收性，会将高潮分泌的蜜液、乳汁等逐渐吸收并扩散。随着时间推移，衣物被浸湿的面积越来越大，形成肉眼可见的湿痕，但受虐者无法更换或清洗，只能带着湿痕继续活动。\n\n用法与交互细节：\n1. 调教者可设定衣物的吸收速率和扩散路径，如从大腿根部逐渐蔓延至小腿，或从胸前扩散至腹部。\n2. 湿痕可作为“暴露度”指标：当湿痕达到特定位置（如膝盖、袖口），触发下一阶段调教。\n3. 可结合感官欺骗：湿痕仅对特定人可见，或仅在特定光线下显现。\n4. 可变体：衣物可设定为吸收后变色、散发气味，或吸引昆虫等魔物；或要求受虐者在湿痕完全扩散前完成某项任务，否则接受公开羞辱。", "uid": 2350}, "同伴无意中的快感触发与背德共犯": {"content": "{同伴无意中的快感触发与背德共犯}\n简介：\n【场景/玩法描述】受虐者与不知情的同伴（或假装不知情）一起外出，同伴的日常动作（如拥抱、拉扯、拍打）会意外触动受虐者体内的玩具，引发强烈快感。受虐者需在同伴面前掩饰反应，同时可能怀疑同伴是否已知情。\n\n用法与交互细节：\n1. 调教者可暗中指示同伴做出特定动作（如突然拥抱、拍打臀部），但同伴本人并不知晓其调教意义。\n2. 受虐者被要求对同伴保密，若主动暴露则受罚；若同伴自行发现，则可能转为共犯关系。\n3. 可设计“连锁反应”：同伴的触碰不仅触发玩具，还可能改变玩具模式（如从震动转为电击）。\n4. 可变体：同伴实为调教者假扮，全程知情并故意玩弄；或同伴也是受虐者，两人互相触发，形成竞争或互助。", "uid": 2351}, "服装依赖与脱衣恐惧的长期束缚": {"content": "{服装依赖与脱衣恐惧的长期束缚}\n简介：\n【场景/玩法描述】受虐者长期穿戴无法脱下的束缚衣，逐渐习惯内置玩具的持续刺激，甚至产生依赖。当调教者暂时解除束缚或允许脱下时，受虐者反而感到空虚和不安，主动要求重新穿上。\n\n用法与交互细节：\n1. 调教者设定“解放日”：定期允许受虐者脱下衣物一段时间，但期间受虐者会感到焦虑、性欲减退，最终自愿回归束缚。\n2. 可引入“磨损度”：衣物随时间出现破损，受虐者需完成羞耻任务换取修复材料，否则衣物可能永久损坏，导致无法再体验那种快感。\n3. 调教者可通过远程操控让衣物短暂失效（如变透明、停止震动），观察受虐者的恐慌反应。\n4. 可变体：衣物与受虐者神经连接，脱下时会产生戒断症状（如幻肢感、瘙痒）；或衣物具有意识，会因受虐者的抗拒而惩罚，因顺从则奖励。", "uid": 2352}, "多玩具协同的复合高潮管理": {"content": "{多玩具协同的复合高潮管理}\n简介：\n【场景/玩法描述】受虐者同时使用多种内置玩具（如子宫震动棒、肠道拉珠、乳头跳蛋），各玩具可独立控制，形成复杂的刺激组合。调教者通过编排玩具的开关、强度、模式，引导受虐者体验不同层次的高潮，甚至进行高潮 denial 或强制连续高潮。\n\n用法与交互细节：\n1. 调教者制定“高潮日程”：如上午侧重阴道刺激，下午侧重肛门，晚上同时全开；或根据受虐者的生理周期调整。\n2. 可设置“高潮密码”：受虐者需通过特定身体动作（如深蹲、跳跃）触发玩具组合技，解锁更高强度。\n3. 引入“高潮积分”：受虐者每次高潮累积积分，可用于兑换短暂的休息或降低玩具强度，但积分也可被调教者清零作为惩罚。\n4. 可变体：玩具可互相感应，当某一部位达到高潮时，其他玩具自动增强或减弱；或玩具与外部环境联动，如气温升高时震动加强。", "uid": 2353}, "足部乳胶恋物与强制舔舐": {"content": "{足部乳胶恋物与强制舔舐}\n简介：\n【场景/玩法描述】调教者利用受虐者对乳胶包裹的足部的迷恋，在公共或半公共场合（如咖啡厅桌下）用穿着乳胶袜或乳胶高跟鞋的脚挑逗受虐者下体，并诱导其钻入桌下舔舐、吮吸自己的乳胶玉足，使受虐者陷入痴迷状态。\n\n用法与交互细节：\n1. 调教者与受虐者相对而坐，桌下用乳胶包裹的脚摩擦受虐者小腿，逐渐上移至大腿内侧和贞操带，用足趾拨弄插入的震动棒。\n2. 调教者用语言诱惑受虐者抚摸、把玩甚至含入嘴中吮吸自己的乳胶脚，强调保养和气味。\n3. 受虐者钻入桌下，捧起调教者的脚，从轻吻到热吻，再到吮吸每一处乳胶，完全沉浸于乳胶触感和残留体液气味。\n4. 可变体：可加入另一只穿着高跟鞋的脚同时踩踏受虐者下体，形成上下双重刺激；场所可变为电影院、餐厅等有桌布遮挡的公共场所。", "uid": 2354}, "高跟鞋与震动棒联合子宫压迫": {"content": "{高跟鞋与震动棒联合子宫压迫}\n简介：\n【场景/玩法描述】调教者用穿着高跟鞋的脚踩在受虐者小腹，鞋跟精准抵住插入子宫的震动棒末端，通过踩压使震动棒龟头反复撞击子宫内壁，配合鞋底挤压，形成内外夹击的强制高潮。\n\n用法与交互细节：\n1. 受虐者体内插入震动棒，龟头填满子宫。调教者将一只穿高跟鞋的脚伸入受虐者裙下，用鞋跟抵住震动棒底座。\n2. 调教者通过脚部发力，使鞋跟将震动棒更深地顶入子宫，同时鞋底压住小腹，让子宫壁被龟头和鞋底夹击。\n3. 可同步开启震动棒，让龟头在压迫下高速摩擦子宫内壁，受虐者因双重刺激而剧烈高潮。\n4. 可变体：高跟鞋可替换为靴子或其他硬底鞋；踩压部位可改为后腰或会阴；可加入远程遥控震动模式，由调教者随机踩压。", "uid": 2355}, "行李箱打包与移动拘束高潮": {"content": "{行李箱打包与移动拘束高潮}\n简介：\n【场景/玩法描述】受虐者被捆绑后装入大型行李箱，体内留置震动棒或炮机，由同伴拖行通过公共区域。调教者持有遥控器，可随时开启震动，使受虐者在狭窄黑暗的箱内强制高潮，承受被发现的风险。\n\n用法与交互细节：\n1. 受虐者穿着暴露的乳胶衣或制服，体内插入震动棒、拉珠等玩具，被束缚成蜷缩姿态放入行李箱。\n2. 行李箱由另一人（同伴或不知情路人）拖行，经过街道、车站等公共场所，受虐者需极力忍耐不出声。\n3. 调教者远程或近距离随机开启震动，利用受虐者对狭窄空间的敏感度增强快感，使其在箱内痉挛高潮。\n4. 可变体：行李箱可加装透气孔或单向镜；可设定必须完成某段路程才能释放；可加入路人偶然检查行李箱的危机事件。", "uid": 2356}, "乳胶衣体液循环与潮湿暴露": {"content": "{乳胶衣体液循环与潮湿暴露}\n简介：\n【场景/玩法描述】受虐者穿着连体乳胶衣，体内持续溢出蜜液和乳汁，顺着插入的震动棒流下，浸湿小腿和鞋内。在公共场合行走时，每一步都能感受到鞋内温热的体液，且体液可能从衣边滴落，留下痕迹，增加暴露风险。\n\n用法与交互细节：\n1. 受虐者穿戴全包乳胶衣，内置震动棒和榨乳器，持续产生体液。体液无法排出，只能沿震动棒外壁渗出，流入高跟鞋或滴落地板。\n2. 受虐者被迫在商场、街道等场所行走，乳胶摩擦声和鞋内水声成为持续刺激，体液痕迹可能引起路人注意。\n3. 调教者可命令受虐者做出特定动作（如弯腰、抬腿）以加速体液流出，或故意在明亮地面行走，放大羞耻感。\n4. 可变体：乳胶衣可改为半透明材质；体液可染色以增加视觉冲击；可加入清洁任务，要求受虐者自己清理留下的体液痕迹。", "uid": 2357}, "旁观者撞破与强制高潮延续": {"content": "{旁观者撞破与强制高潮延续}\n简介：\n【场景/玩法描述】受虐者在半公共包间内被调教至连续高潮时，突然有不知情的第三者闯入，目睹其淫态。受虐者因惊吓和羞耻导致高潮加剧，甚至失控喷溅到第三者身上，随后被第三者惩罚或加入调教。\n\n用法与交互细节：\n1. 设定一个半私密空间（如咖啡厅包间、试衣间），受虐者正被玩具强制高潮，处于失神状态。\n2. 第三者（店员、朋友、陌生人）因听到声音或误闯而进入，撞见受虐者高潮场景，受虐者因羞耻而无法停止高潮。\n3. 第三者可能表现出震惊、愤怒或兴奋，进而要求补偿（如金钱、服务）或直接参与玩弄，延长受虐者的高潮时间。\n4. 可变体：第三者可为事先安排好的共犯；可设定第三者拍照或威胁公开；可发展为多人调教或轮流控制玩具开关。", "uid": 2358}, "远程遥控与权力移交": {"content": "{远程遥控与权力移交}\n简介：\n【场景/玩法描述】调教者将受虐者身上玩具的遥控器交给第三方（如朋友、店员），由第三方在受虐者不知情或无法反抗时随机开启震动，使受虐者在公共场合或拘束状态下突然高潮，权力转移带来额外的屈辱感。\n\n用法与交互细节：\n1. 调教者与受虐者进行日常活动时，调教者暗中将震动棒、跳蛋等遥控器交给身旁的第三者。\n2. 第三者可在任意时刻（如受虐者点单、走路、交谈时）开启震动，观察受虐者强忍快感的反应。\n3. 受虐者不知道控制权已移交，只能向调教者求饶，而调教者假装无辜，增加心理折磨。\n4. 可变体：遥控器可设定为随机模式；可多人持有遥控器，形成“谁都能控制我”的绝望感；可结合任务，要求受虐者完成指令才能取回控制权。", "uid": 2359}, "高潮昏迷与事后衣物交换": {"content": "{高潮昏迷与事后衣物交换}\n简介：\n【场景/玩法描述】受虐者因连续强制高潮而昏迷，醒来后发现自己的衣物被调教者或同伴更换，穿着对方的制服或暴露服装，而调教者则穿上受虐者的衣物，形成身份对调或伪装，为后续公开移动做准备。\n\n用法与交互细节：\n1. 受虐者在调教中因过度高潮失去意识，调教者与同伴为其清理身体并更换衣物，例如将受虐者的乳胶衣换成店员制服，而调教者穿上受虐者湿透的乳胶衣。\n2. 受虐者醒来后发现自己穿着暴露或不合身的衣服，体内玩具可能仍处于待机状态，必须按调教者要求行动。\n3. 衣物交换可包含内衣、鞋袜，甚至植入新的玩具，受虐者需适应新服装带来的拘束感或暴露度。\n4. 可变体：交换的衣物可带有特殊功能（如内置跳蛋、透明材质）；可加入时间限制，要求受虐者在衣物被发现前到达指定地点；可发展为角色扮演，如店员与顾客。", "uid": 2360}, "拉珠肠道扩张与震动调教": {"content": "{拉珠肠道扩张与震动调教}\n简介：\n【场景/玩法描述】调教者将一串带有软硅胶凸起的拉珠逐颗塞入受虐者的后庭，扩张肠道，并启动内置震动功能，使受虐者在双重刺激下失控高潮。受虐者以69式躺在调教者身上，近距离观察拉珠被塞入的过程，增强羞耻感。\n\n用法与交互细节：\n1. 调教者展示拉珠，让受虐者观察其尺寸和凸起，制造紧张与期待。\n2. 调教者以69式体位躺在受虐者身上，将臀部贴近受虐者面部，使受虐者能清晰看到后庭被扩张的细节。\n3. 调教者逐颗塞入拉珠，每塞入一颗都发出娇喘，并鼓励受虐者帮忙塞入剩余拉珠，增加参与感。\n4. 可变体：拉珠可带有不规则震动、放电或温度变化功能；受虐者可被蒙眼或束缚，仅凭触觉和听觉感受；也可在公共场合（如更衣室）隐蔽进行。", "uid": 2361}, "震动棒与拉珠双重插入高潮控制": {"content": "{震动棒与拉珠双重插入高潮控制}\n简介：\n【场景/玩法描述】受虐者后庭塞入震动拉珠，阴道再插入粗大震动棒，两者同时震动，形成内外夹击的快感。调教者通过控制震动频率和抽插节奏，使受虐者反复高潮，甚至刺激子宫口，达到失控状态。\n\n用法与交互细节：\n1. 先塞入拉珠并启动震动，让受虐者适应后庭的充实感。\n2. 再插入震动棒，缓慢推进至子宫口，利用棒身凸起刺激阴道壁。\n3. 调教者交替或同时改变拉珠和震动棒的震动模式，制造不规则快感，使受虐者无法预测高潮时机。\n4. 可变体：震动棒可带有电击或加热功能；受虐者被束缚，由调教者完全控制节奏；或受虐者自行操作，但需遵循调教者指令。", "uid": 2362}, "新手破处前的玩具渐进调教": {"content": "{新手破处前的玩具渐进调教}\n简介：\n【场景/玩法描述】调教者使用多种玩具（跳蛋、乳夹、毛刷阴蒂罩等）逐步开发受虐者的身体，在破处前仅刺激处女膜前段阴道，让受虐者习惯快感并主动渴求插入。最终在受虐者请求下，一举突破处女膜，完成身心占有。\n\n用法与交互细节：\n1. 调教者先在自己身上使用玩具，展示快感反应，勾起受虐者好奇与性欲。\n2. 将玩具逐一用在受虐者身上，从乳头、阴蒂等外围开始，逐渐过渡到阴道口刺激。\n3. 震动棒仅插入处女膜前段，反复抽插但不突破，让受虐者在高潮边缘徘徊，直至主动开口请求。\n4. 可变体：可加入媚药或催眠暗示，增强受虐者的渴望；破处时可配合束缚或蒙眼，强化仪式感。", "uid": 2363}, "69式体位下的玩具插入教学": {"content": "{69式体位下的玩具插入教学}\n简介：\n【场景/玩法描述】调教者以69式体位躺在受虐者身上，将自己的私处完全暴露在受虐者面前，引导受虐者亲手将玩具（如拉珠、震动棒）插入自己体内。通过近距离观察和亲手操作，降低受虐者的羞耻感，并传授技巧。\n\n用法与交互细节：\n1. 调教者先展示玩具，并解释其功能，消除受虐者恐惧。\n2. 调教者躺下，将臀部靠近受虐者面部，让受虐者清晰看到插入过程。\n3. 调教者握住受虐者的手，引导其将玩具逐颗或逐段插入，并给予语言鼓励。\n4. 可变体：受虐者可被要求用嘴辅助插入；调教者可在过程中使用跳蛋刺激受虐者，增加互动。", "uid": 2364}, "高潮后的反击与权力反转": {"content": "{高潮后的反击与权力反转}\n简介：\n【场景/玩法描述】受虐者在被调教至高潮后，趁调教者不备，突然加大抽插力度或启动更强震动，使调教者陷入失控高潮。这种权力反转带来意外的刺激和羞耻，打破固定攻受关系。\n\n用法与交互细节：\n1. 调教者先主导玩具使用，将受虐者玩弄至高潮。\n2. 受虐者在高潮余韵中假装顺从，实则积蓄力量。\n3. 受虐者突然夺过控制权，用更激烈的方式刺激调教者，如快速抽插震动棒或拉扯拉珠。\n4. 可变体：可加入束缚道具，但受虐者设法挣脱；或双方约定“反击时间”，增加游戏性。", "uid": 2365}, "公交车上隐蔽的远程跳蛋调教": {"content": "{公交车上隐蔽的远程跳蛋调教}\n简介：\n【场景/玩法描述】调教者让受虐者在公交车上佩戴远程控制跳蛋，通过手机或遥控器随机启动震动，使受虐者在人群中忍耐快感，避免出声或失态。调教者观察受虐者的反应，享受支配感。\n\n用法与交互细节：\n1. 出发前，调教者将跳蛋塞入受虐者体内，并固定在敏感点。\n2. 在公交车上，调教者坐在受虐者身旁或远处，随机开启震动，强度由低到高。\n3. 受虐者需保持正常表情，不能发出声音，否则将受到惩罚（如延长震动时间）。\n4. 可变体：可加入其他乘客不知情的互动，如让受虐者与乘客交谈；或使用多个跳蛋同时刺激不同部位。", "uid": 2366}, "公交角落隐蔽遥控玩弄": {"content": "{公交角落隐蔽遥控玩弄}\n简介：\n【场景/玩法描述】在公交车角落，调教者用身体遮挡，遥控受虐者体内外的震动棒、拉珠、阴蒂跳蛋等玩具，在乘客旁进行隐蔽玩弄，利用引擎声掩盖呻吟，迫使受虐者在陌生人注视下高潮。\n\n用法与交互细节：\n1. 受虐者预先塞入震动棒、拉珠串，阴蒂和乳头用金属环固定跳蛋，外穿日常服装。\n2. 调教者站在受虐者身后，用身体挡住他人视线，手伸入裙内操作玩具底座或遥控开关。\n3. 利用公交车引擎声、喇叭声掩盖呻吟和玩具震动声，在乘客询问时假装晕车或不适。\n4. 可变体：可更换场所为地铁、电梯等狭小公共空间；玩具可替 常（如颤抖、娇喘）都可能引来旁人目光，加剧羞耻。\n4. 可变体：可替换为职场（会议中）、公共交通（地铁、公交）、社交聚会等场景；跳蛋可升级为可联网远程控制的智能玩具，增加未知性与失控感。", "uid": 2373}, "事后温存与反向关怀的调教节奏": {"content": "{事后温存与反向关怀的调教节奏}\n简介：\n【场景/玩法描述】在激烈调教或高潮后，调教者切换为温柔模式，通过按摩、拥抱、爱抚等方式安抚受虐者，同时用言语强化支配关系，使受虐者在脆弱状态下产生依赖与更深服从。\n\n用法与交互细节：\n1. 调教者在受虐者经历多次高潮或体力透支后，主动提供身体护理（如按摩子宫、泡澡清洁），用温柔动作缓解不适，但言语上仍保持支配性（如“好好休息，明天还要上课”）。\n2. 在安抚过程中，调教者可以穿插轻微刺激（如揉捏敏感部位）提醒受虐者其从属地位，防止完全脱离情欲状态。\n3. 调教者利用受虐者意识模糊时进行“事后约定”，如让受虐者答应下一次调教内容，或赠送情趣用品作为“礼物”，延长控制。\n4. 可变体：适用于长期调教关系中的恢复期；可加入沐浴、更衣等日常场景，强化生活化支配；受虐者可表现出依依不舍，暗示对调教的渴望。", "uid": 2374}, "乳胶全包拘束与日常伪装外出": {"content": "{乳胶全包拘束与日常伪装外出}\n简介：\n【场景/玩法描述】受虐者穿着全套乳胶紧身衣（包括手套、长袜、内裤等），外面再套上普通衣物进行日常外出。乳胶的紧绷感与封闭性持续刺激皮肤，而外部伪装使受虐者在公共场合维持正常，内心却因隐藏的变态装扮而羞耻兴奋。\n\n用法与交互细节：\n1. 调教者赠送或强制受虐者穿上定制乳胶套装，并可能用绳索在衣物下进行额外拘束，增加束缚感。\n2. 受虐者需自行穿戴整齐，调教者检查并可能远程监控（如通过手机确认状态），受虐者在行走、社交时乳胶摩擦产生持续低强度刺激。\n3. 调教者可要求受虐者穿着乳胶衣进行日常活动（如购物、上课），并随机通过电话或消息进行羞辱指令，强化精神控制。\n4. 可变体：乳胶衣可替换为其他材质（如皮革、PVC）；可加入小型锁具或链子，增加束缚感；外部衣物可设计为易脱款式，便于突然暴露。", "uid": 2375}, "录像胁迫与羞耻记忆操控": {"content": "{录像胁迫与羞耻记忆操控}\n简介：\n【场景/玩法描述】调教者秘密或公开录下受虐者高潮、淫语或同意调教的片段，之后在受虐者试图反抗或羞耻时播放，利用羞耻记忆和社死恐惧迫使受虐者继续服从。\n\n用法与交互细节：\n1. 调教者在受虐者意识模糊或高潮时诱导其说出同意话语并录像，作为“契约”证据。\n2. 在日常中，当受虐者表现出抗拒，调教者拿出手机播放片段，受虐者看到自己淫荡模样后心理防线崩溃，只能屈从。\n3. 调教者可威胁将录像发送给特定人（如朋友、家人）或公开，但实际并不执行，仅作为悬顶之剑。\n4. 可变体：录像可替换为录音、照片；可加入“羞耻日记”，让受虐者自己记录调教细节，日后被调教者朗读；可设计“安全词”，但调教者故意忽略，强化无助感。", "uid": 2376}, "课堂桌下秘密指交与跳蛋联动": {"content": "{课堂桌下秘密指交与跳蛋联动}\n简介：\n【场景/玩法描述】在培训室等公共场合，调教者利用课桌遮挡，将手指插入受虐者阴道，同时遥控内部跳蛋，通过抽插与振动结合，迫使受虐者在人群中强忍高潮，维持表面平静。\n\n用法与交互细节：\n1. 调教者先以腿部或手部爱抚分散注意，然后悄悄将手指探入受虐者内裤，拨弄跳蛋并扩张阴道。\n2. 调教者根据受虐者反应调整指交节奏，时而快速抽插，时而用指甲刮擦内壁，同时开启跳蛋加强刺激。\n3. 受虐者必须趴在桌上假装睡觉或看书，咬紧牙关防止呻吟，任何声音或颤抖都可能暴露。\n4. 可变体：可移至图书馆、电影院等安静场所；手指可替换为小型震动棒；可加入“不许高潮”指令，违反则增加公开暴露惩罚。", "uid": 2377}, "高潮后面部埋入小腹的依赖姿态": {"content": "{高潮后面部埋入小腹的依赖姿态}\n简介：\n【场景/玩法描述】受虐者在高潮脱力后，调教者将脸埋入其小腹或胸部，用呼吸和轻蹭强化亲密与从属关系。此姿态象征调教者的占有与受虐者的交付，同时通过体温与气味加深羁绊。\n\n用法与交互细节：\n1. 调教者在受虐者高潮后立即采取该姿态，用脸颊摩擦小腹，感受其痉挛余韵，并轻声说支配性话语。\n2. 受虐者因脱力无法反抗，只能任由调教者动作，逐渐将这种姿态与安全感、归属感关联。\n3. 调教者可在此姿态下用手指轻划受虐者大腿内侧或腰侧，维持低强度刺激，延长服从状态。\n4. 可变体：可反向进行， 物等动作掩饰对道具的操控，如隔着裙子将拉珠塞回。\n3. 可引入第三方（如店员）无意中的询问，增加受虐者被发现的恐惧。\n4. 可变体：使用远程遥控跳蛋；在多人聚会中偷偷进行。", "uid": 2396}, "高潮失神后的羞耻搀扶与后续玩弄": {"content": "{高潮失神后的羞耻搀扶与后续玩弄}\n简介：\n【场景/玩法描述】受虐者在经历激烈高潮后失神瘫软，调教者以搀扶为名继续施加刺激，如隔着衣物将肛塞塞回、揉捏敏感部位，让受虐者在半清醒状态下持续轻微高潮，无法脱离快感支配，同时被迫在公共场合行走，每一步都加剧羞耻。\n\n用法与交互细节：\n1. 调教者需用身体紧密贴合受虐者，以支撑为借口进行隐蔽触碰。\n2. 利用行走时的颠簸，让体内道具自然移动产生刺激。\n3. 在耳边低语羞辱或安抚，强化心理依赖。\n4. 可变体：搀扶过程中故意走颠簸路段；在受虐者高潮余韵中突然停下，让其主动摩擦求欢。", "uid": 2397}, "乳胶服装摩擦声的羞耻放大": {"content": "{乳胶服装摩擦声的羞耻放大}\n简介：\n【场景/玩法描述】调教者或受虐者穿着乳胶紧身衣，在行走或动作时发出细碎的嘎吱摩擦声。这种声音在安静或公共场合中格外刺耳，成为双方之间心照不宣的淫荡信号，不断提醒受虐者自身的异常状态，加剧羞耻和性兴奋。\n\n用法与交互细节：\n1. 选择贴合皮肤的乳胶材质，确保动作时产生明显声响。\n2. 在需要安静的场合（如图书馆、办公室）故意制造摩擦声，让受虐者紧张。\n3. 可结合其他道具（如体内震动棒）让声音层次更丰富。\n4. 可变体：调教者用乳胶手套抚摸受虐者皮肤，发出黏腻声响；受虐者被捆绑在乳胶床单上挣扎。", "uid": 2398}, "利用日常物品掩盖性玩具声音的紧张玩法": {"content": "{利用日常物品掩盖性玩具声音的紧张玩法}\n简介：\n【场景/玩法描述】受虐者体内震动道具发出嗡嗡声，可能被旁人察觉。调教者巧妙利用环境中的机器噪音（如打印机、空调）或制造意外声响来掩盖，并在声音消失的瞬间暂停震动，制造“差点被发现”的惊险时刻，让受虐者反复体验恐惧与解脱的交替。\n\n用法与交互细节：\n1. 提前侦察环境，找到持续或间歇性噪音源。\n2. 调教者需精准控制震动开关，与噪音同步。\n3. 可让受虐者误以为声音已被发现，再揭示是虚惊一场。\n4. 可变体：在电影院利用影片音效掩盖；在厨房用搅拌机声音掩护。", "uid": 2399}, "高潮喷溅污染拍摄设备的羞辱": {"content": "{高潮喷溅污染拍摄设备的羞辱}\n简介：\n【场景/玩法描述】调教者故意将拍摄设备（手机、相机）贴近受虐者私处，让其在高潮潮喷时直接将爱液喷溅到镜头上，造成画面模糊、设备被污染。受虐者看到自己的体液玷污镜头，羞耻感达到顶峰，而调教者则以此作为进一步羞辱的素材。\n\n用法与交互细节：\n1. 使用防水设备或保护套，确保可清洗。\n2. 在受虐者即将高潮时，将镜头推近并语言刺激：“要弄脏镜头了哦”。\n3. 事后可回放被污染的画面，让受虐者观看自己如何“弄坏”设备。\n4. 可变体：让受虐者事后清洁设备作为惩罚；将污染画面截图作为调教记录。", "uid": 2400}, "多人场合下用身体遮挡进行隐蔽调教": {"content": "{多人场合下用身体遮挡进行隐蔽调教}\n简介：\n【场景/玩法描述】在有多人在场的环境中（如排队、聚会），调教者利用自己的身体或衣物作为屏障，遮挡受虐者被玩弄的下体，同时进行道具操作或刺激。受虐者必须保持面部表情正常，但身体反应可能透过屏障的缝隙暴露给旁人，增加随时社死的紧张感。\n\n用法与交互细节：\n1. 调教者需选择合适站位，如站在受虐者身后或侧面，用裙摆、外套等遮挡。\n2. 操作动作要小而隐蔽，如手指隔着布料按压跳蛋开关。\n3. 可故意露出破绽，让受虐者瞥见旁人的目光，制造心理压力。\n4. 可变体：在拥挤的电梯中进行；让受虐者假装系鞋带，实则被玩弄。", "uid": 2401}, "乳胶衣紧缚与感官剥夺逛街": {"content": "{乳胶衣紧缚与感官剥夺逛街}\n简介：\n【场景/玩法描述】调教者让受虐者穿上全身乳胶紧身衣，表面涂油反射淫光，内部可能预先涂抹润滑液或塞入玩具。乳胶衣紧绷包裹全身，摩擦声（嘎吱声）成为羞耻来源。受虐者被带到公共场合，乳胶衣的触感与声音持续刺激，但路人因某种设定（如魔法、高科技布料）无法察觉异常。\n\n用法与交互细节：\n1. 受虐者全身涂抹润滑液后滑入乳胶衣，调教者协助拉紧拉链或密封，确保完全贴合。\n2. 乳胶衣下可预先放置震动棒、跳蛋等，通过外部遥控或预设程序刺激。\n3. 逛街过程中，乳胶摩擦声、内部润滑液流动感、玩具震动共同构成多重刺激，受虐者需强装镇定。\n4. 可变体：乳胶衣可设计为半透明、带开口或附加拘束带；场合可换为派对、展会；加入“他人无视”设定可降低暴露风险，专注羞耻与触觉体验。", "uid": 2402}, "肛门拉珠渐进式排扯高潮": {"content": "{肛门拉珠渐进式排扯高潮}\n简介：\n【场景/玩法描述】调教者将一串震动拉珠逐颗塞入受虐者肛门，然后通过缓慢或突然扯出拉珠，制造强烈的排泄反转快感与肛门高潮。拉珠的震动与撑开感持续刺激肠道，扯出时连带润滑液与爱液喷溅，羞耻与快感并存。\n\n用法与交互细节：\n1. 受虐者采取跪姿或站立弯腰姿势，调教者将润滑后的拉珠一颗颗旋转塞入，每颗入肛时稍作停留，让受虐者适应撑满感。\n2. 调教者可随机命令受虐者夹紧或放松肛门，控制拉珠排出速度，或突然一次性扯出多颗，制造强制高潮。\n3. 可结合公开场合：拉珠尾巴挂在裙外，调教者从后方突然拉扯，使受虐者在人群中失态。\n4. 可变体：拉珠可换成冰珠、电击珠或不同尺寸；可加入“任务”机制，如受虐者需在指定时间内排出一定数量拉珠才能停止。", "uid": 2403}, "Dirty Talk 羞耻指令触发高潮": {"content": "{Dirty Talk 羞耻指令触发高潮}\n简介：\n【场景/玩法描述】调教者通过特定羞耻词汇（如“小骚蹄子”“母狗”等）或语气，直接触发受虐者的生理反应（如夹紧玩具、潮喷）。经过多次关联训练后，受虐者形成条件反射，仅凭语言即可达到高潮或接近高潮。\n\n用法与交互细节：\n1. 初期训练：在受虐者接近高潮时，调教者反复说出特定羞辱词，建立关联。\n2. 进阶使用：在日常或公开场合，调教者突然在耳边低语羞辱词，受虐者身体自动反应，可能当场腿软或泄身。\n3. 可结合遥控玩具：说出指令同时调高震动，强化反射。\n4. 可变体：羞辱词可定制为受虐者的敏感点（如“母猪”“肉便器”）；可设定“安全词”与“强制高潮词”区分；多人调教时可轮流使用不同指令。", "uid": 2404}, "高潮计数器与忍耐游戏": {"content": "{高潮计数器与忍耐游戏}\n简介：\n【场景/玩法描述】调教者设定一个高潮次数目标或时间限制，受虐者在持续玩具刺激下必须忍耐不达到高潮，或达到指定次数。每次高潮会被记录，未达标或超额将受到惩罚。游戏可在私密或公开场合进行，增加羞耻与压力。\n\n用法与交互细节：\n1. 调教者给受虐者塞入震动玩具，设定初始强度，并宣布规则（如“一小时内高潮不超过3次”）。\n2. 受虐者进行日常活动或特定任务，调教者随机调整震动强度，试图迫使受虐者高潮。\n3. 每次高潮后，调教者记录并可能施加额外刺激（如扯拉珠、加大震动）作为“奖励”或惩罚。\n4. 可变体：可引入“高潮赌约”，失败方接受更羞耻的调教；使用手机App记录高潮次数并共享给其他调教者；公开场合下，高潮时必须保持表情不变，否则加罚。", "uid": 2405}, "裙底玩具拍摄与羞耻记录": {"content": "{裙底玩具拍摄与羞耻记录}\n简介：\n【场景/玩法描述】调教者用手机或隐藏摄像头伸入受虐者裙底，近距离拍摄塞满玩具的私处、拉珠排出、潮喷等画面。拍摄过程本身成为刺激，受虐者因被记录而羞耻感倍增，视频/照片后续可用于胁迫或回味。\n\n用法与交互细节：\n1. 调教者命令受虐者撩起裙子或直接伸手入裙，将镜头对准下体，同时操作玩具刺激，捕捉高潮瞬间。\n2. 可要求受虐者对着镜头说出羞耻台词或做出指定动作（如掰开阴唇）。\n3. 拍摄后，调教者当场回放给受虐者看，或威胁发送给他人（即使不真发），增强心理控制。\n4. 可变体：使用运动相机绑在大腿内侧，让受虐者自行携带拍摄逛街全程；直播给特定观众（如其他调教者）；将视频作为“调教日记”存档。", "uid": 2406}, "多人无视下的秘密调教": {"content": "{多人无视下的秘密调教}\n简介：\n【场景/玩法描述】通过魔法、高科技或设定（如“认知滤网服装”），使周围人无法察觉受虐者的异常（如乳胶衣、玩具声音、淫叫）。调教者与受虐者在人群中公然进行调教行为，享受“随时可能被发现”的紧张感与“实际安全”的背德感。\n\n用法与交互细节：\n1. 设定一个“无视机制”：如特殊服装、催眠APP、结界等，让路人忽略调教行为或将其合理化。\n2. 调教者带领受虐者进入人群密集区，进行各种羞耻调教（接吻、抚摸、扯拉珠、高潮），路人视若无睹。\n3. 可偶尔让机制“失效”几秒，制造惊险时刻，或让个别敏感者（如小孩、灵能力者）隐约察觉，增加变数。\n4. 可变体：机制可设定为“只有调教双方可见彼此真实状态”；受虐者需自己维持“正常”表象，一旦做出过度反应则机制失效；加入“能量限制”，调教越激烈，无视效果越弱。", "uid": 2407}, "高潮同步与连锁反应调教": {"content": "{高潮同步与连锁反应调教}\n简介：\n【场景/玩法描述】两名或以上受虐者（或调教者与受虐者）体内玩具通过无线联动，一方的震动强度或高潮会触发另一方的玩具变化。双方互相观察对方的反应，形成“你高潮我也高潮”的连锁，增加互动与竞争/协作。\n\n用法与交互细节：\n1. 给双方塞入可联动的玩具，设定规则：如A的震动强度提升时，B的玩具也同步提升；或A高潮时，B的玩具自动加到最大档。\n2. 双方进行日常活动或对抗游戏（如下棋、猜拳），输者被强制高潮，赢者获得短暂休息。\n3. 可加入“忍耐竞赛”：谁先忍不住叫出声或腿软，对方获得奖励。\n4. 可变体：多人连锁，形成“高潮链”；玩具联动可加入随机性，如一方高潮时另一方随机切换模式；调教者作为裁判，手动控制联动规则。", "uid": 2408}, "远程操控的羞耻开发": {"content": "{远程操控的羞耻开发}\n简介：\n【场景/玩法描述】调教者通过特殊应用远程操控目标的身体感知或行为，在公共场合（如通勤电车）逐步引导目标觉醒羞耻性癖，将日常空间转化为调教场。\n\n用法与交互细节：\n1. 调教者利用应用发送暗示或直接操控，让目标在人群中产生无法抑制的羞耻反应（如身体发热、爱液分泌）。\n2. 目标起初抗拒但身体逐渐背叛，在理性与欲望间挣扎，最终被迫接受并沉溺。\n3. 可通过应用逐步解锁新功能（如摄像监控、感官增强），增加控制深度。\n4. 可变体：应用可改为魔法道具、植入芯片或催眠指令；场景可换为办公室、教室等日常环境。", "uid": 2409}, "初次自我探索的背德快感": {"content": "{初次自我探索的背德快感}\n简介：\n【场景/玩法描述】受严格规训的角色在经历他人触碰后，首次违背禁忌自我探索身体，在背德感与好奇心驱使下，于镜前观察并玩弄私处，体验初次阴道高潮。\n\n用法与交互细节：\n1. 角色因过往教育对自慰有强烈罪恶感，但被他人开发后欲望觉醒，独处时忍不住尝试。\n2. 强调心理挣扎：一边告诫自己“这是不该做的事”，一边手指无法停止。\n3. 利用镜子增加羞耻与兴奋，角色看到自己淫荡的姿态，背德感加剧快感。\n4. 可变体：角色可为修女、严格家教下的千金、禁欲系战士等；触发事件可改为被敌人触碰、药物影响或意外刺激。", "uid": 2410}, "G点觉醒与自慰沉迷": {"content": "{G点觉醒与自慰沉迷}\n简介：\n【场景/玩法描述】角色在初次阴道自慰中偶然发现G点，体验到远超以往的强烈快感，从此陷入无法自拔的自慰沉迷，理智被肉欲吞噬。\n\n用法与交互细节：\n1. 角色从外部爱抚开始，逐步尝试插入手指，在探索中意外按压到敏感点。\n2. 描述发现G点瞬间的震撼快感，与之前自慰的对比，突出“再也回不去”的转折。\n3. 之后角色无法控制地反复自慰，即使身体疲惫也不停止，日常生活受到影响。\n4. 可变体：G点可替换为其他敏感点（如前列腺、后庭）；沉迷可被调教者利用，作为条件反射训练的基础。", "uid": 2411}, "监控下的调教直播": {"content": "{监控下的调教直播}\n简介：\n【场景/玩法描述】调教者获得技术支持，可在目标不知情下通过隐藏摄像头多角度监控其日常与调教过程，甚至将影像用于分析、记录或分享，增强控制感与羞辱。\n\n用法与交互细节：\n1. 调教者通过合作者获得监控权限，可实时观看目标在电车、房间等场所的一举一动。\n2. 利用监控捕捉目标羞耻瞬间，作为威胁或调教素材；也可回放分析敏感点。\n3. 可引入“观众”概念，将监控画面直播给特定群体，增加社死风险。\n4. 可变体：监控设备可改为魔法水晶球、使魔、微型无人机；目标可逐渐察觉被监视，产生被窥视的兴奋。", "uid": 2412}, "催眠应用的逐步解锁": {"content": "{催眠应用的逐步解锁}\n简介：\n【场景/玩法描述】调教者使用的催眠应用最初只有基础功能，通过与开发者合作或自行破解，逐步解锁新能力（如摄像、感官操控、记忆改写），使调教手段不断升级。\n\n用法与交互细节：\n1. 应用初始仅能发送简单指令或影响情绪，调教者需完成特定任务（如收集数据、达成调教里程碑）来解锁新功能。\n2. 每次解锁带来新的玩法可能，如远程监控、强制发情、梦境植入等。\n3. 开发者可能成为调教者的盟友，提供技术支持或提出变态要求作为交换。\n4. 可变体：应用可替换为魔法书、系统面板、神祇赐予的能力；解锁条件可改为献祭、信仰值或目标堕落度。", "uid": 2413}, "镜前开脚自检的羞耻仪式": {"content": "{镜前开脚自检的羞耻仪式}\n简介：\n【场景/玩法描述】角色在镜子前摆出M字开脚姿势，亲手掰开私处观察内部构造，将自我检视转化为充满背德感的羞耻仪式，既是探索也是调教前的准备。\n\n用法与交互细节：\n1. 角色在独处时，受好奇心或调教者指令驱使，脱去下衣面对镜子张开双腿。\n2. 强调视觉刺激：看到自己私处张开、爱液滴落的画面，产生“自己变得淫荡”的认知冲击。\n3. 可配合语言羞辱（自我贬低或调教者远程语音），强化仪式感。\n4. 可变体：可改为在调教者面前进行，作为服从性测试；或定期进行并拍照记录，对比身体变化。", "uid": 2414}, "通勤电车上的秘密开发": {"content": "{通勤电车上的秘密开发}\n简介：\n【场景/玩法描述】调教者利用催眠或操控能力，在通勤电车等公共场合对目标进行秘密开发，使其在人群中产生性反应却无法声张，将日常通勤变为持续的调教时间。\n\n用法与交互细节：\n1. 调教者通过应用或能力让目标在电车上陷入半催眠状态，身体敏感度提升。\n2. 进行隐蔽的触碰或仅通过暗示就让目标产生快感，甚至达到高潮，但外表需保持正常。\n3. 目标在羞耻与快感中挣扎，逐渐习惯并期待每日的“通勤调教”。\n4. 可变体：场景可换为公交车、图书馆、会议室；能力可改为药物、魔法印记或条件反射触发。", "uid": 2415}, "合作开发者的变态支援": {"content": "{合作开发者的变态支援}\n简介：\n【场景/玩法描述】调教者获得一名技术专家或魔法师作为盟友，对方出于兴趣提供各种变态道具、监控权限或身份伪装，甚至主动提出协助调教，成为幕后共犯。\n\n用法与交互细节：\n1. 盟友主动联系调教者，表达对其调教方式的欣赏，并提供升级版工具（如摄像功能、催眠增强）。\n2. 盟友可能提出要求，如观看调教直播、获取数据或亲自参与某些环节。\n3. 盟友可帮助调教者渗透目标的生活圈（如安排工作、伪造身份），使调教更深入。\n4. 可变体：盟友可改为恶魔、疯狂科学家、系统精灵；其动机可以是学术研究、娱乐或对目标的执念。", "uid": 2416}, "远程监控下的秘密自慰": {"content": "{远程监控下的秘密自慰}\n简介：\n【场景/玩法描述】调教者通过隐藏摄像头和网幕投影设备，远程实时观看受虐者在无人车厢内的秘密自慰行为。受虐者以为独处，实则全程被监控，其羞耻动作、压抑的喘息和失控的性欲被清晰捕捉。\n\n用法与交互细节：\n1. 调教者利用高科技设备（如网幕投影、隐藏摄像头）获得受虐者视角的实时影像，可缩放、多角度观察。\n2. 受虐者因之前的暗示或体质改造，性欲高涨，在自以为安全的独处空间开始自慰，动作从克制到逐渐放纵。\n3. 调教者通过细微操作（如制造声响）在受虐者高潮瞬间施加干扰，增强其羞耻与刺激感。\n4. 可变体：场景可改为更衣室、单人办公室、深夜卧室；监控设备可替换为魔法窥镜、使魔视角等。", "uid": 2417}, "高潮瞬间的惊扰打断": {"content": "{高潮瞬间的惊扰打断}\n简介：\n【场景/玩法描述】在受虐者即将达到高潮的瞬间，调教者故意制造突发声响或动作（如掉落物品），使其在惊恐与快感交织中达到更强烈的绝顶，同时面临被发现的恐惧。\n\n用法与交互细节：\n1. 调教者预先潜伏或通过远程手段观察，等待受虐者自慰至临界点。\n2. 在受虐者即将高潮时，精准制造干扰（如推落物品、发出咳嗽声、突然触碰），打破其沉浸状态。\n3. 受虐者因惊吓而身体紧绷，反而加剧高潮强度，同时产生强烈的羞耻与背德感。\n4. 可变体：干扰方式可改为灯光闪烁、门铃响起、电话震动；场景可扩展至公共场合或半公开空间。", "uid": 2418}, "网幕投影下的假装睡眠窥视": {"content": "{网幕投影下的假装睡眠窥视}\n简介：\n【场景/玩法描述】调教者佩戴网幕投影设备，在受虐者面前假装睡眠，实则通过闭眼后的投影清晰观察对方的一举一动。受虐者误以为调教者熟睡，从而放下戒备做出羞耻行为。\n\n用法与交互细节：\n1. 调教者与受虐者同处一室（如车厢、休息室），调教者假装入睡，身体保持静止。\n2. 通过高科技设备（如网幕投影隐形眼镜）闭眼观看受虐者，同时用隐藏的操控装置调整视角或启动其他功能。\n3. 受虐者因信任或欲望驱使，在“熟睡”的调教者面前逐渐展露本性，进行自慰或暴露行为。\n4. 可变体：调教者可假装醉酒、昏迷或冥想；设备可替换为魔法感知、使魔共享视野等。", "uid": 2419}, "暗示下的着装规则操控": {"content": "{暗示下的着装规则操控}\n简介：\n【场景/玩法描述】调教者通过催眠或暗示，给受虐者植入特定场合的着装规则（如“乘坐此交通工具时必须不穿内衣”），使其在无意识中遵守，并在日常中持续产生羞耻感。\n\n用法与交互细节：\n1. 调教者事先对受虐者施加暗示，设定与特定场景绑定的着装指令。\n2. 受虐者每次进入该场景时自动执行指令，事后可能感到疑惑但无法抗拒。\n3. 调教者可利用此规则进行观察或进一步互动，如通过监控确认其遵守情况。\n4. 可变体：规则可改为“进入某房间必须脱掉上衣”、“见到某物品必须触摸自己”等；触发条件可多样化。", "uid": 2420}, "自慰时的人称呼唤与幻想代入": {"content": "{自慰时的人称呼唤与幻想代入}\n简介：\n【场景/玩法描述】受虐者在自慰过程中无意识地呼唤调教者的称呼（或特定代称），将调教者作为性幻想对象，反映出其心理上的依赖与沉迷，即使调教者不在场也持续被影响。\n\n用法与交互细节：\n1. 受虐者因之前的调教或暗示，在自慰时脑中浮现调教者的形象，并喃喃自语其称呼。\n2. 调教者可通过监控或窃听发现这一行为，了解受虐者的心理状态。\n3. 此行为可被调教者用作把柄或进一步调教的切入点，如突然回应或事后提及。\n4. 可变体：呼唤的可以是职称（如“主人”、“老师”）、代号或特定昵称；场景可发生在任何私密空间。", "uid": 2421}, "体液浸透衣物的视觉羞辱": {"content": "{体液浸透衣物的视觉羞辱}\n简介：\n【场景/玩法描述】受虐者因兴奋过度，爱液大量分泌浸透内裤甚至外裤，形成明显湿痕。调教者通过观察或指出这一痕迹，对受虐者进行视觉和心理上的羞辱。\n\n用法与交互细节：\n1. 受虐者在调教或自慰后，下体分泌过多体液，导致衣物出现湿痕。\n2. 调教者故意凝视或提及该痕迹，让受虐者意识到自己的失控状态被察觉。\n3. 受虐者因羞耻而试图遮掩，但湿痕成为其淫乱本性的公开证据。\n4. 可变体：可要求受虐者穿着浅色衣物以凸显痕迹；或让其在他人面前不经意暴露。", "uid": 2422}, "假装无事发生的日常伪装": {"content": "{假装无事发生的日常伪装}\n简介：\n【场景/玩法描述】受虐者在经历极度羞耻的性行为后，迅速整理仪容，在调教者或他人面前恢复日常的端庄姿态，仿佛无事发生。这种强烈的反差加剧了双方的秘密共犯关系。\n\n用法与交互细节：\n1. 受虐者在自慰或调教结束后，立即擦拭身体、整理衣物，恢复冷静优雅的常态。\n2. 调教者配合演出，装作毫不知情，进行普通对话，但双方心知肚明。\n3. 这种伪装可成为日常互动的一部分，每次见面都暗藏之前的秘密。\n4. 可变体：可加入第三者，让受虐者在他人面前维持形象，而调教者暗中欣赏其紧张。", "uid": 2423}, "高科技辅助的远程调教协作": {"content": "{高科技辅助的远程调教协作}\n简介：\n【场景/玩法描述】调教者获得外部协助者提供的高科技道具（如监控设备、催眠装置、特殊药物）和后勤支持（如工作安排、信息提供），从而更高效地对受虐者实施调教计划。\n\n用法与交互细节：\n1. 协助者出于兴趣或利益，向调教者提供先进设备或关键情报。\n2. 调教者利用这些资源突破限制，如获得受虐者所在场所的出入权限、实时监控能力。\n3. 协助者可能提出交换条件，如要求调教者为其物色其他目标。\n4. 可变体：协助者可以是疯狂科学家、魔法商人、情报贩子；道具可替换为魔法道具、未来科技。", "uid": 2424}, "睡奸旁观与突发惊扰高潮": {"content": "{睡奸旁观与突发惊扰高潮}\n简介：\n【场景/玩法描述】调教者在受虐者面前假装熟睡，受虐者因情欲难耐而进行自慰。在受虐者即将高潮的瞬间，调教者故意制造声响（如掉落物品），使受虐者在极度羞耻和惊吓中达到更强烈的高潮。\n\n用法与交互细节：\n1. 调教者需提前布置“熟睡”假象，如闭眼、平稳呼吸，并暗中观察受虐者状态。\n2. 受虐者因先前被挑起的情欲或长期压抑，在公共/半公共场合（如电车、教室）忍不住自慰，以为调教者未察觉。\n3. 调教者在受虐者即将高潮的临界点，突然制造意外声响（如掉落物品、咳嗽），打破“安全”氛围，使受虐者同时体验高潮与暴露恐惧。\n4. 可变体：调教者可选择在不同阶段惊扰，如刚开始自慰时、中途、或高潮后；也可使用不同惊扰方式，如突然睁眼、说话、触碰。", "uid": 2425}, "高潮后主动暴露展示": {"content": "{高潮后主动暴露展示}\n简介：\n【场景/玩法描述】受虐者在自慰高潮后，趁调教者“熟睡”，主动走到其面前，掀起衣物暴露刚 用法与交互细节：\n1. 操控者访问样本库，选择并组合情感样本，如“人に近づきたくなる”由“人混みを避けたい”反転而成。\n2. 新效果可设定为仅对单一目标生效，避免影响他人。\n3. 操控者可逐步升级效果，如从“亲近”到“发情”，但需时间解析数据。\n4. 可变体：引入“记忆改写”样本，使目标对操控者产生虚假记忆；或“感官链接”，让目标共享操控者的感受。", "uid": 2450}, "伪装绅士的渐进式身体接触：按摩为借口的敏感带开发": {"content": "{伪装绅士的渐进式身体接触：按摩为借口的敏感带开发}\n简介：\n【场景/玩法描述】操控者以“健康管理”或“放松”为名，对目标进行定期按摩，逐步扩大接触范围，从肩颈到胸侧、腰部，利用按摩手法刺激敏感带，使目标在“正当理由”下逐渐适应并渴求更深入的触碰。\n\n用法与交互细节：\n1. 操控者先以解决实际困扰（如肩こり）为由提供按摩，建立信任。\n2. 每次按摩时，手法从纯粹放松逐渐加入挑逗性抚摸，如揉捏胸侧、轻擦大腿。\n3. 目标因羞耻和依赖心理，难以拒绝，甚至主动请求扩大按摩范围。\n4. 可变体：按摩时使用道具（如震动按摩器）增强刺激；或结合催眠暗示，让目标误以为按摩是必要治疗。", "uid": 2451}, "衣物摩擦焦らし：乳首与内衣的被动刺激": {"content": "{衣物摩擦焦らし：乳首与内衣的被动刺激}\n简介：\n【场景/玩法描述】目标在穿着内衣（尤其是ブラジャー）的情况下，因身体活动或外部按摩导致乳首与内衣布料持续摩擦，产生无法自主控制的微弱快感，长期处于“イキそうでイケない”的焦躁状态。\n\n用法与交互细节：\n1. 操控者通过按摩或指令让目标身体移动，使乳首与内衣摩擦。\n2. 目标因羞耻无法直接触碰乳首，只能忍受被动刺激，快感累积。\n3. 可结合服装选择，如蕾丝或粗糙材质内衣，增强摩擦感。\n4. 可变体：在目标不知情下，在内衣内侧涂抹轻微刺激物（如薄荷膏）；或使用远程震动内衣，操控者随机启动。", "uid": 2452}, "公开场所的隐秘自慰：カバン遮掩下的指淫": {"content": "{公开场所的隐秘自慰：カバン遮掩下的指淫}\n简介：\n【场景/玩法描述】目标在公共空间（如电车、教室）中，利用随身物品（如书包、外套）遮掩，偷偷进行自慰，同时需保持表情和姿态正常，避免被旁人发现。操控者可能知情并暗中观察，增加目标的羞耻与兴奋。\n\n用法与交互细节：\n1. 目标将手伸入カバン下，隔着衣物或直接触碰秘部，动作需轻微。\n2. 操控者可坐在目标身旁，通过言语或视线施加压力，使目标更紧张。\n3. 目标需控制呼吸和声音，避免高潮时失态。\n4. 可变体：操控者通过远程震动道具控制刺激强度；或设定“被发现即惩罚”的规则，增加风险。", "uid": 2453}, "催眠电波应用：羞耻心抑制与欲望解放": {"content": "{催眠电波应用：羞耻心抑制与欲望解放}\n简介：\n【场景/玩法描述】通过催眠电波抑制目标的羞耻心或理性，使其在清醒状态下主动暴露性欲或提出淫秽请求，事后可能保留记忆并感到强烈羞耻，但当时无法自控。\n\n用法与交互细节：\n1. 操控者设定电波效果为“羞耻心低下”或“欲望増幅”，目标逐渐变得大胆。\n2. 目标可能主动请求被触碰、展示身体或讲述性幻想。\n3. 操控者可假装惊讶或宽容，进一步诱导目标。\n4. 可变体：效果结束后，目标对自身行为感到困惑和羞耻，操控者可借此进行“安慰”或“调教”；或结合记忆改写，让目标误以为是自己主动。", "uid": 2454}, "排卵期体质利用：生理周期与性欲增幅的调教": {"content": "{排卵期体质利用：生理周期与性欲增幅的调教}\n简介：\n【场景/玩法描述】操控者了解目标的生理周期，在排卵期等性欲高涨时期进行调教或接触，利用目标身体自然增加的敏感度和欲望，使其更容易陷入快感依赖。\n\n用法与交互细节：\n1. 操控者通过观察或询问掌握目标周期，在排卵期安排密集的“按摩”或“训练”。\n2. 目标在此期间更易发情，对刺激反应强烈，自慰频率增加。\n3. 操控者可结合焦らし玩法，让目标在高峰期得不到满足，累积欲望。\n4. 可变体：使用药物或催眠暗示人为制造“假性排卵期”；或让目标记录身体变化日记，增加羞耻。", "uid": 2455}, "渐进式敏感带开发按摩": {"content": "{渐进式敏感带开发按摩}\n简介：\n【场景/玩法描述】以按摩为名，对受虐者进行渐进式的敏感带开发。施虐者从非敏感区域开始，逐步向敏感核心推进，通过控制节奏和回避关键点来累积快感，使受虐者陷入焦躁与渴望。\n\n用法与交互细节：\n1. 施虐者 破处女防线": {"content": "{利用“仅此一次”的承诺突破处女防线}\n简介：\n【场景/玩法描述】受虐者坚守最后一道防线（如处女膜、禁止插入），调教者通过理性劝说和持续快感，使其说出“仅此一次”的承诺。这个承诺成为心理突破口，之后调教者可逐步扩大侵入范围，而受虐者因已破例而难以回头。\n\n用法与交互细节：\n1. 先建立“学习”或“治疗”等正当理由，降低受虐者的道德抗拒。\n2. 在受虐者发情极限时，提出“只此一次”的约定，并让其亲口说出。\n3. 侵入动作要缓慢，让受虐者清晰感受每一步（如手指进入阴道），强化记忆。\n4. 可变体：承诺可改为“只在外面”“只用手”“只到某个深度”等，后续再逐步打破；可让受虐者写下保证书或录音。", "uid": 2514}, "发情状态下的自我暴露与事后羞耻": {"content": "{发情状态下的自我暴露与事后羞耻}\n简介：\n【场景/玩法描述】受虐者在发情功能影响下，曾在公共场合（如电车）进行自慰等羞耻行为，并被调教者目击。事后调教者以此作为把柄，在正常对话中暗示或提及，让受虐者陷入极度羞耻，从而更易被操控。\n\n用法与交互细节：\n1. 设定受虐者曾因发情而做出违背日常形象的行为（如自慰、说淫语）。\n2. 调教者掌握此秘密，在适当时机用隐晦语言提及，观察受虐者的慌乱反应。\n3. 可威胁公开秘密，或以此为条件要求受虐者服从其他指令。\n4. 可变体：目击者可以是调教者本人或第三方；可让受虐者误以为被更多人看到；可要求受虐者复述当时场景作为惩罚。", "uid": 2515}, "暴雨封闭环境下的渐进式性开发": {"content": "{暴雨封闭环境下的渐进式性开发}\n简介：\n【场景/玩法描述】利用暴雨、台风等自然因素造成的交通中断，将调教者与受虐者困在无人空间。调教者以“帮助缓解身体不适”为由，从按摩开始，逐步升级到性器爱抚，利用受虐者无法离开的处境，完成平时不可能的开发。\n\n用法与交互细节：\n1. 环境需确保长时间无人打扰，且受虐者无法自行回家。\n2. 调教者先以关心姿态提供按摩，从肩颈、背部等安全区域开始。\n3. 随着受虐者放松警惕，逐渐移向胸部、大腿，最后侵入私处，每一步都观察反应并适时停止，让受虐者主动要求继续。\n4. 可变体：封闭环境可换成雪山小屋、故障电梯、深夜办公室；可加入电力中断、通讯不良等要素增加无助感。", "uid": 2516}, "着装状态下的胸部爱抚与渐进式脱衣指令": {"content": "{着装状态下的胸部爱抚与渐进式脱衣指令}\n简介：\n【场景/玩法描述】在电车等半公开场所，调教者通过语言指令引导受虐者自行解开上衣、露出内衣乃至胸部，过程中持续进行隔着衣物的胸部爱抚，利用羞耻与快感的冲突逐步瓦解理性。\n\n用法与交互细节：\n1. 调教者以“按摩”或“检查身体”为借口，要求受虐者保持特定姿势（如双手上举拉伸），趁机隔着衣物抚摸胸部，观察其羞耻反应。\n2. 当受虐者陷入快感但仍有抗拒时，调教者提出“自己脱掉上衣”的指令，强调“由你自己来做”，加重其背德感。\n3. 若受虐者犹豫，可展示其过往的羞耻影像或照片作为施压手段，迫使其服从。\n4. 可变体：可替换为其他半公开场所（如教室、办公室），衣物类型可变为衬衫、制服等，脱衣程度可从解开纽扣到完全裸露胸部逐步升级。", "uid": 2517}, "乳首临界挑逗与主动献胸诱导": {"content": "{乳首临界挑逗与主动献胸诱导}\n简介：\n【场景/玩法描述】调教者故意避开乳首直接刺激，转而搔刮乳首周围区域，制造焦躁感，迫使受虐者主动挺胸或开口请求被触碰乳首，从而打破其羞耻底线。\n\n用法与交互细节：\n1. 调教者用手指在乳首周围画圈或轻轻搔刮，避免直接接触乳首，观察受虐者腰部扭动、呼吸急促等反应。\n2. 受虐者因快感不上不下而难耐时，调教者暂停动作，询问“想要我碰哪里？”，引导其用语言或动作表达需求。\n3. 只有当受虐者明确说出“请摸我的乳首”或主动将胸部凑近时，才给予直接刺激作为奖励。\n4. 可变体：可用于其他敏感带（如阴蒂周围），道具可换用羽毛、笔尖等，场所可设为私密房间以降低羞耻门槛，或保持公开以增强背德。", "uid": 2518}, "镜像羞辱：利用过往自慰影像打破羞耻心": {"content": "{镜像羞辱：利用过往自慰影像打破羞耻心}\n简介：\n【场景/玩法描述】调教者持有受虐者过去在类似情境下自慰或发情的影像记录，在受虐者抗拒当前指令时突然展示，利用其对自己“淫乱姿态”的羞耻与冲击，击溃心理防线。\n\n用法与交互细节：\n1. 调教者预先准备好受虐者过往的羞耻照片或视频（如偷拍其自慰、过往调教记录）。\n2 583}, "教師と生徒の立場を利用したサプライズ関係変化": {"content": "{教師と生徒の立場を利用したサプライズ関係変化}\n简介：\n【场景/玩法描述】调教者与被调教者原本是秘密的亲密关系（如电车上认识的陌生人），某天调教者突然以教师或上司等权威身份出现在被调教者的日常环境中，造成震惊与混乱，同时利用新身份强化支配。\n\n用法与交互细节：\n1. 调教者事先不透露身份变化，维持原有关系模式，直到在公开场合（如教室、职场）正式亮相。\n2. 被调教者瞬间陷入混乱，必须配合演出“初次见面”，同时内心担忧秘密暴露。\n3. 调教者利用新职位的权威，在公共场合保持专业距离，私下则继续亲密行为，制造双重关系张力。\n4. 可变体：身份变化可以是“友人の親”、“取引先の担当者”、“医者”等，根据世界观调整。", "uid": 2584}, "幼馴染みの一目惚れによる三角関係と嫉妬の芽生え": {"content": "{幼馴染みの一目惚れによる三角関係と嫉妬の芽生え}\n简介：\n【场景/玩法描述】被调教者的亲密友人（幼馴染み）对调教者一见钟情，并向被调教者坦白。被调教者内心产生不明原因的モヤモヤ（嫉妒或羡慕），同时友人甚至提出“可以一起交往”的大胆提议，加剧心理动摇。\n\n用法与交互细节：\n1. 友人角色需具备“难攻不落”或“理想主义”特质，使其一见钟情更具冲击性。\n2. 被调教者被迫隐藏自己与调教者的真实关系，只能附和朋友，内心却开始审视自己的感情。\n3. 友人可主动提出竞争或共享，打破常规恋爱观，迫使被调教者面对自己的欲望。\n4. 可变体：友人角色可替换为“姉妹”、“先輩”、“ライバル”；调教者可主动撩拨友人加剧矛盾。", "uid": 2585}, "焦らしプレイとしての長時間低刺激マッサージ": {"content": "{焦らしプレイとしての長時間低刺激マッサージ}\n简介：\n【场景/玩法描述】调教者对被调教者进行长达一小时的轻度性感按摩（如腋下、腹部），刺激强度控制在无法高潮但持续产生快感的水平，使被调教者一直处于微汗、呼吸紊乱、腰がヒクヒク震える状态，精神与肉体双重消耗。\n\n用法与交互细节：\n1. 调教者以“リラックス”或“準備運動”为名开始按摩，逐渐加入性感带刺激。\n2. 保持刺激单调且有节奏，避免强度波动导致高潮，让被调教者在“快要去了但去不了”的边缘徘徊。\n3. 过程中可加入杂谈分散注意力，但身体反应（如フェロモン、汗、震え）会暴露快感。\n4. 可变体：按摩部位可改为大腿内侧、后颈、耳后；时间可延长至数小时，或结合束缚防止被调教者自慰。", "uid": 2586}, "コンドーム越しの射精と生挿入への憧れ": {"content": "{コンドーム越しの射精と生挿入への憧れ}\n简介：\n【场景/玩法描述】性行为中始终使用避孕套，但通过强调避孕套的膨胀、精液的热度等细节，让被调教者强烈意识到“隔着一层膜”的不完全感，从而萌生对直接插入和射精的渴望。\n\n用法与交互细节：\n1. 调教者在射精后，故意让被调教者看到或触摸装满精液的避孕套，形容其“水風船のように膨れ”。\n2. 在事后对话中，调教者可暗示“如果直接射在里面会更热、更舒服”，种下渴望的种子。\n3. 被调教者独处时，会反复幻想直接射精的场景，但又被道德感束缚，形成内心矛盾。\n4. 可变体：可逐步升级，从厚避孕套到薄避孕套，再到“外出し”或“膣外射精”，最终突破到生挿入。", "uid": 2587}, "秘密の関係を維持したままの日常演技": {"content": "{秘密の関係を維持したままの日常演技}\n简介：\n【场景/玩法描述】调教者与被调教者在公共场合必须装作普通关系（如师生、同事），但私下有亲密行为。双方在他人面前进行自然对话，却暗中通过眼神、暗语或微小接触传递秘密，享受随时可能暴露的紧张感。\n\n用法与交互细节：\n1. 设定一个必须隐瞒关系的环境（如学校、职场、家庭），并确立“初次见面”或“只是熟人”的公开设定。\n2. 在公共场合，双方使用敬语、保持距离，但调教者可趁人不备进行短暂触碰或耳语。\n3. 被调教者需努力维持平静，但可能因害羞或紧张出现脸红、口误等破绽。\n4. 可变体：可加入第三者的怀疑或试探，增加暴露风险；或利用通信设备在公开场合进行远程调教。", "uid": 2588}, "被发现风险下的强制口交与高潮忍耐": {"content": "{被发现风险下的强制口交与高潮忍耐}\n简介：\n【场景/玩法描述】在随时可能被他人发现的半公开场所（如体育仓库、更衣室、教室角落），调教者对受虐者进行强制口交或爱抚。受虐者必须拼命压抑声音和身体反应，以免被近在咫尺的第三人察觉。调教者故意在危险时刻加大刺激，享受受虐者因紧张和快感而颤抖、压抑呻吟的状态。\n\n用法与交互细节：\n1. 选择有合理理由可能有人经过的场所，如放学后的部室、储物间、僻静走廊。\n2. 调教者先制造轻微刺激，待第三人接近时突然加强攻势（如深喉、加速舔吸、揉捏敏感点）。\n3. 受虐者需用衣物、手或咬唇等方式压抑声音，同时身体无法控制地产生反应（颤抖、爱液增多）。\n4. 可变体：第三人可以是同伴、后辈、教师等不同身份，增加不同张力；也可加入道具如口球、遥控跳蛋，让忍耐更困难。", "uid": 2589}, "唾液浸透内裤的持续羞耻": {"content": "{唾液浸透内裤的持续羞耻}\n简介：\n【场景/玩法描述】调教者在爱抚过程中故意将自己的唾液大量沾染在受虐者的内衣（尤其是内裤）上，然后让受虐者穿着湿透的内衣继续日常活动（如练习、工作、上课）。受虐者因私处持续感受到湿滑和调教者的气味，无法集中精神，不断回想被爱抚的场景，身体持续发情。\n\n用法与交互细节：\n1. 在口交或指交后，调教者不擦去唾液，直接帮受虐者穿好下着。\n2. 受虐者需在公共场合（如社团活动、职场）保持正常，但内心被羞耻和欲望折磨。\n3. 调教者可后续通过短信或眼神暗示，强化心理刺激。\n4. 可变体：使用其他体液（如爱液、精液）代替唾液；或让受虐者穿着被污染的内衣去见重要的人，增加社死风险。", "uid": 2590}, "约定时间地点的期待式调教": {"content": "{约定时间地点的期待式调教}\n简介：\n【场景/玩法描述】调教者提前告知受虐者一个具体的时间和地点（如“18点在部室”），但不说明具体内容。受虐者明知会发生性事，却以“只是恰好有空”“无法拒绝”等理由说服自己赴约。在等待期间，受虐者因期待和想象而身体发热、湿润，陷入自我纠结与欲望的拉扯。\n\n用法与交互细节：\n1. 调教者用模糊的指令（“我会去那里”）制造悬念，让受虐者自行脑补。\n2. 受虐者需在约定时间前完成日常任务（如练习、工作），但心神不宁。\n3. 调教者可故意迟到或提前到达，观察受虐者的反应。\n4. 可变体：地点可更换为更危险或更私密的地方；约定可通过匿名信、暗号等方式传递，增加神秘感。", "uid": 2591}, "运动后汗湿制服的乳首开发与射乳调教": {"content": "{运动后汗湿制服的乳首开发与射乳调教}\n简介：\n【场景/玩法描述】受虐者刚结束运动，穿着汗湿的制服或运动服，调教者以“按摩放松”为借口进行胸部爱抚。重点开发乳腺和乳首，通过揉捏、挤压、吸吮等方式刺激乳汁分泌，最终达到射乳高潮。汗味、制服触感和运动后的疲惫身体混合，增强羞耻与快感。\n\n用法与交互细节：\n1. 调教者先进行正常的肌肉拉伸，逐渐转为胸部按摩。\n2. 隔着制服揉捏乳房，用指尖刺激乳首，待其勃起后卷起上衣直接接触。\n3. 通过有节奏的挤压和吸吮，引导受虐者射出乳汁，并持续刺激使其连续高潮。\n4. 可变体：制服类型可换为泳装、体操服、OL套装；乳汁可被收集饮用或涂抹身体；可加入乳夹、吸乳器等道具。", "uid": 2592}, "初吻作为服从的最终门槛": {"content": "{初吻作为服从的最终门槛}\n简介：\n【场景/玩法描述】调教者将接吻（尤其是初吻）设定为调教进程中的特殊里程碑，此前只进行身体开发但避免嘴唇接触。受虐者一直保留接吻作为“喜欢的人才能做”的底线。当调教者提出“练习接吻”时，受虐者若同意，则意味着心理上彻底屈服和承认感情。接吻本身成为比性交更沉重的服从象征。\n\n用法与交互细节：\n1. 调教者在长期身体调教后，突然提出“来练习接吻吧”，观察受虐者的动摇。\n2. 受虐者需经历内心挣扎，最终以“练习”为借口说服自己。\n3. 接吻时可配合爱抚，但重点在于嘴唇接触的象征意义。\n4. 可变体：初吻可发生在公开场合边缘，增加被发现风险；或调教者故意在接吻后冷淡，制造情感落差。", "uid": 2593}, "站立后入式与子宫颈高潮开发": {"content": "{站立后入式与子宫颈高潮开发}\n简介：\n【场景/玩法描述】在更衣室、墙边等有限空间，调教者让受虐者站立并双手扶墙，从后方插入。通过调整角度和深度，重点撞击子宫颈口，开发子宫颈高潮。受虐者因站立姿势无法完全放松，腿部颤抖，同时可能面对镜子看到自己被侵犯的模样，羞耻与快感倍增。\n\n用法与交互细节：\n1. 调教者命令受虐者双手撑墙、腰部下沉，形成站立后入姿势。\n2. 缓慢但深入地抽插，用龟头研磨子宫口，直到受虐者出现不同于阴蒂高潮的深部快感。\n3. 可配合语言羞辱（“看着镜子里的自己”）或抓住头发/马尾控制身体。\n4. 可变体：加入制服半脱状态；使用假阳具或工具辅助；在可能被发现的场所进行。", "uid": 2594}, "事后清理口交与精液吞咽": {"content": "{事后清理口交与精液吞咽}\n简介：\n【场景/玩法描述】性交结束后，调教者要求受虐者用口舌清理沾满体液（精液、爱液）的性器。受虐者需跪着或蹲着，仔细舔舐干净，并将精液吞咽。这一行为作为调教的收尾仪式，强化受虐者的从属感和“用完即清洁”的物化认知。\n\n用法与交互细节：\n1. 调教者在射精后不立即拔出，而是命令受虐者“清理干净”。\n2. 受虐者需从根部到顶端仔细舔舐，包括睾丸和会阴，最后将精液吞下。\n3. 调教者可抚摸受虐者头发表示嘉奖，或进行言语羞辱。\n4. 可变体：清理对象可换成假阳具或手指；若为多人场景，可要求清理多个性器；可加入拍照或录像作为服从证明。", "uid": 2595}, "事后清理奉仕": {"content": "{事后清理奉仕}\n简介：\n【场景/玩法描述】性交结束后，调教者要求受虐者用口舌清理沾满精液和体液的性器。受虐者以近乎虔诚的态度舔舐干净，并吞咽残留物，过程中调教者可能再次勃起并射精，受虐者继续吞咽。\n\n用法与交互细节：\n1. 调教者在射精后保持勃起，展示沾满白浊的性器，以半开玩笑或命令口吻要求受虐者“舔干净”。\n2. 受虐者从羞耻转为顺从，用生疏但认真的舌技清理每一处，包括冠状沟和尿道口，同时吞咽溢出的精液与先走汁。\n3. 清理过程中调教者因视觉与触觉刺激再次兴奋，受虐者察觉后可能主动含入，接受第二次口内射精并全部饮下。\n4. 可变体：可加入事后爱抚与称赞，强化权力差与亲密感；或让受虐者主动请求清理，体现驯化程度。", "uid": 2596}, "公共场合隐蔽猥亵训练": {"content": "{公共场合隐蔽猥亵训练}\n简介：\n【场景/玩法描述】在公共交通工具等场所，调教者以“适应都市痴汉”为借口，对受虐者进行隐蔽的触摸训练。利用座位死角或人群掩护，抚摸大腿、腰际等部位，同时教导受虐者如何冷静应对。\n\n用法与交互细节：\n1. 调教者先以“预防痴汉”为名，提出模拟训练，选择有旁观者但存在视觉死角的位置。\n2. 从轻微触碰开始，如手放在绝对领域，逐渐升级到揉捏、搂腰，同时用语言引导受虐者保持镇定并练习拒绝台词。\n3. 受虐者因羞耻和紧张而身体僵硬，但被迫配合，调教者观察其反应并给予“合格”或“再练习”的评价。\n4. 可变体：可加入催眠暗示让周围乘客无视；或逐步升级到更过激的触摸，如臀部或胸部，测试服从极限。", "uid": 2597}, "事后精液球展示与气味刺激": {"content": "{事后精液球展示与气味刺激}\n简介：\n【场景/玩法描述】射精后，调教者将装满精液的避孕套在受虐者面前打结展示，形成“精液球”，并让浓烈的雄性气味扩散，刺激受虐者的嗅觉与本能，引发其羞耻与兴奋。\n\n用法与交互细节：\n1. 调教者拔出性器后，故意缓慢取下避孕套，在受虐者眼前打结，使其注视沉甸甸的精液球。\n2. 将精液球靠近受虐者面部，让气味直接冲击，同时用语言强调“这是你的成果”或“这么多都是为你射的”。\n3. 受虐者可能因气味而恍惚、脸红或呼吸急促，调教者可观察其反应并决定是否进行下一步清理或再次插入。\n4. 可变体：可让受虐者手持或舔舐精液球；或作为支配象征，要求其保存或携带。", "uid": 2598}, "初次口交与精饮驯化": {"content": "{初次口交与精饮驯化}\n简介：\n【场景/玩法描述】受虐者首次为调教者口交，从生疏的舔舐到含入龟头，最终接受口内射精并吞咽全部精液。整个过程强调受虐者的献身与调教者的引导，成为关系进阶的标志。\n\n用法与交互细节：\n1. 调教者以“清理”或“回报”为由，诱导受虐者靠近性器，受虐者犹豫后开始用舌头试探。\n2. 受虐者从茎身舔到龟头，动作笨拙但认真，调教者用喘息和称赞给予反馈，并分泌先走汁作为“奖励”。\n3. 在调教者要求下，受虐者含入龟头，随即被口内射精，受虐者虽惊但努力吞咽，调教者事后表达满意。\n4. 可变体：可加入事后接吻分享精液；或让受虐者主动要求“品尝”，体现堕落进度。", "uid": 2599}, "催眠下的公共无反应环境": {"content": "{催眠下的公共无反应环境}\n简介：\n【场景/玩法描述】调教者通过长期催眠暗示，使特定公共空间（如电车）内的所有乘客无视自己与受虐者的任何行为，从而创造一个可进行公开猥亵或性行为的“安全”环境。\n\n用法与交互细节：\n1. 调教者预先设置催眠装置，持续数周播放“无视特定人物一切行为”的暗示，覆盖整个车厢或路线。\n2. 在催眠生效期间，调教者与受虐者进入该空间，即使进行露骨 暗示}\n简介：\n【场景/玩法描述】调教者在插入后，特意用龟头顶压子宫口，并言语描述该位置和“如果无套内射就会怀孕”的事实，利用受虐者对怀孕的恐惧和潜在渴望，引发强烈的身体反应（阴道收缩）和心理屈服。\n\n用法与交互细节：\n1. 调教者完全插入后，明确告知龟头正抵在子宫口，并询问受虐者是否知道该位置。\n2. 调教者描述无套内射和怀孕的可能性，观察受虐者的羞耻反应和阴道收缩。\n3. 即使受虐者口头拒绝，调教者通过阴道反应指出其“身体想要”，并追问“真的不感兴趣吗”，迫使受虐者承认或沉默。\n4. 可变体：可结合安全期/危险期设定；可实际进行内射或模拟；可用于调教“最终本番”前的心理准备；可加入旁观者不知情的刺激。", "uid": 2619}, "旁观者苏醒前的极限暴露": {"content": "{旁观者苏醒前的极限暴露}\n简介：\n【场景/玩法描述】在公共场合，调教者利用催眠或药物确保旁观者暂时沉睡，但在旁观者即将苏醒前，故意保持受虐者的暴露或结合状态，制造“即将被发现”的极限紧张感，并在最后一刻才允许整理。\n\n用法与交互细节：\n1. 调教者预先使旁观者沉睡（如催眠、药物），设定苏醒时间或条件（如到站）。\n2. 在苏醒前，调教者要求受虐者保持暴露或插入状态，并拒绝其提前整理的请求。\n3. 旁观者开始苏醒（伸懒腰、发出声音），受虐者极度恐慌，调教者则用拥抱或衣物暂时遮掩，但实际仍保持结合。\n4. 可变体：旁观者可部分苏醒（如半梦半醒）；可设定多人旁观；可让受虐者误以为已被发现；最终可转为公开暴露或安全撤离。", "uid": 2620}, "睡奸旁观与偷拍胁迫": {"content": "{睡奸旁观与偷拍胁迫}\n简介：\n【场景/玩法描述】在公共交通工具上，调教者假装熟睡，被调教者误以为对方已入睡，在旁进行自慰行为。调教者暗中用手机偷拍全程，事后以此作为胁迫或调教素材。被调教者因羞耻和害怕暴露而陷入更深的服从。\n\n用法与交互细节：\n1. 调教者选择半封闭的公共空间（如电车、会议室），假装闭眼休息，实则观察被调教者的反应。\n2. 被调教者因长期规训或发情状态，难以自控，在“无人知晓”的错觉下开始自慰，可能只针对特定部位（如乳头）。\n3. 调教者全程偷拍，记录被调教者的高潮次数、压抑的喘息和羞耻表情。\n4. 事后调教者展示录像，用“公开视频”或“告诉他人”作为威胁，迫使被调教者接受更过分的命令。\n5. 可变体：偷拍设备可换成远程监控、直播；场景可换成办公室、图书馆；被调教者可以是多人，形成竞争或互相揭发。", "uid": 2621}, "乳头自慰与定点偷窥": {"content": "{乳头自慰与定点偷窥}\n简介：\n【场景/玩法描述】被调教者被要求或自发在公共场合只刺激乳头达到高潮，调教者通过隐藏摄像头或假装不知情进行观察。重点在于被调教者压抑声音、维持表面端庄，而身体却因乳头快感不断高潮。\n\n用法与交互细节：\n1. 调教者事先通过催眠、药物或长期调教使被调教者的乳头成为敏感带，甚至比性器更容易高潮。\n2. 设定一个“不能被发现”的情境，如旁边有人睡觉、在教室上课、在办公室工作。\n3. 被调教者只能隔着衣物或直接揉捏乳头，不能触碰下体，用最小的动作达到高潮。\n4. 调教者通过隐藏设备观察，记录高潮次数和表情，事后进行点评或惩罚。\n5. 可变体：可加入“高潮计数器”装置，每高潮一次就记录一次，累积到一定次数后给予奖励或更严厉的调教。", "uid": 2622}, "假装情侣练习的调教契约": {"content": "{假装情侣练习的调教契约}\n简介：\n【场景/玩法描述】被调教者以“为未来婚姻做准备”或“学习如何交往”为借口，请求调教者进行“情侣练习”。实际上，这是被调教者掩盖自己欲望的借口，调教者则利用这一契约逐步进行性开发，将练习范围不断扩大。\n\n用法与交互细节：\n1. 被调教者提出“练习”请求，设定初始边界（如只接吻、只抚摸），但内心渴望更多。\n2. 调教者以“教学”为名，逐步突破界限：从亲吻到爱抚，再到插入，每次都以“这是正常的交往练习”为理由。\n3. 被调教者用“练习”作为自我欺骗的借口，即使感到羞耻也会配合，调教者可利用这一点提出更过分的要求。\n4. 可加入“练习日志”或“评分系统”，调教者对被调教者的表现打分，不合格则需“补课”。\n5. 可变体：契约可以是书面或口头；背景可换成上司与下属、前辈与后辈、医生与患者等。", "uid": 2623}, "生插入与安全日谎言": {"content": "{生插入与安全日谎言}\n简介：\n【场景/玩法描述】被调教者以“今天是安全日”或“会外射”为借口，允许调教者无套插入。调教者利用这一信任 如早班电车）进入强制发情状态。\n2. 被调教者因羞耻而犹豫，但发情效果逐渐增强，最终主动脱去下着，露出下半身。\n3. 被调教者坐在调教者常坐的座位上，进行自慰，并留下体液痕迹作为“置き土産”。\n4. 可变体：可改为其他公共空间（如空教室、深夜办公室），或加入观众风险（如其他乘客突然出现）。", "uid": 2629}, "体液痕迹的心理羞辱": {"content": "{体液痕迹的心理羞辱}\n简介：\n【场景/玩法描述】被调教者在自慰后，其体液（爱液）遗留在座位上。调教者故意坐在该位置，并当面指出或暗示痕迹，观察被调教者的羞耻反应。\n\n用法与交互细节：\n1. 被调教者在调教者常坐的位置自慰，留下明显体液湿痕。\n2. 调教者随后到来，假装不经意发现痕迹，但故作不知，直接坐在上面。\n3. 调教者通过言语或动作（如询问“这里怎么湿了？”）施加心理压力，被调教者陷入极度羞耻。\n4. 可变体：痕迹可以是其他体液（如乳汁、汗水），或调教者故意将痕迹展示给被调教者看。", "uid": 2630}, "偽医療マッサージによる性感開発": {"content": "{偽医療マッサージによる性感開発}\n简介：\n【场景/玩法描述】调教者以缓解身体不适（如“朝勃ち”类似症状）为由，提出进行“医疗按摩”。实际按摩部位接近性敏感带（如腋下、侧乳），在善意伪装下进行性感开发。\n\n用法与交互细节：\n1. 调教者先通过专业知识或权威身份（如医学生、上司）建立信任，提出按摩建议。\n2. 被调教者因持续发情而身体火照，难以忍耐，最终主动请求按摩。\n3. 按摩时，调教者以“放松肌肉”为名，揉捏乳房根部、大腿内侧等部位，逐步升级刺激。\n4. 可变体：可加入“治疗”需要脱衣的环节，或使用道具（如按摩棒）伪装成医疗器具。", "uid": 2631}, "背面密着マッサージの体位拘束": {"content": "{背面密着マッサージの体位拘束}\n简介：\n【场景/玩法描述】被调教者主动要求从背后进行按摩，从而形成紧密的身体接触体位。调教者坐在座位上，被调教者坐在其股间，背靠调教者，形成半拘束状态。\n\n用法与交互细节：\n1. 调教者提议按摩，被调教者因羞耻而选择“从后面”进行，避免面对面。\n2. 被调教者坐在调教者张开的两腿之间，背部紧贴调教者胸膛，形成密着体位。\n3. 调教者从背后伸手至被调教者腋下或胸部进行按摩，实际进行乳房揉捏和身体爱抚。\n4. 可变体：可改为站立背后位，或利用墙壁、椅子等增加拘束感。", "uid": 2632}, "発情状態の持続と寸止め管理": {"content": "{発情状態の持続と寸止め管理}\n简介：\n【场景/玩法描述】调教者远程维持被调教者的发情状态，但在其达到高潮前中断（如时间限制、环境变化），使其处于不完全燃烧的饥渴状态，延长屈辱与欲望。\n\n用法与交互细节：\n1. 调教者使用装置或能力让被调教者持续发情，但设定时间限制（如电车到站）。\n2. 被调教者自慰至接近高潮时，因外部因素（如广播、他人出现）被迫停止。\n3. 调教者随后出现，观察被调教者因欲求不满而表现出的焦躁、脸红、气息紊乱等反应。\n4. 可变体：调教者可故意在关键时刻打断，或设定“必须忍耐到指定地点才能高潮”的规则。", "uid": 2633}, "下着脱ぎの儀式化と羞恥プレイ": {"content": "{下着脱ぎの儀式化と羞恥プレイ}\n简介：\n【场景/玩法描述】被调教者在公共空间（如电车）中，被要求或自发进行脱去下着的仪式化行为。动作缓慢、羞耻，强调脱衣过程中的背德感和展示感。\n\n用法与交互细节：\n1. 被调教者站立，双手伸入裙内，缓慢将内裤褪下，过程中保持紧张和羞耻表情。\n2. 脱下的内裤可能被故意展示（如挂在手上），或被调教者收藏作为战利品。\n3. 脱衣后，被调教者保持“ノーパン”状态进行其他行为，强化解放感与羞耻。\n4. 可变体：可要求被调教者将内裤交给调教者，或当众脱下并放置于特定位置。", "uid": 2634}, "指定席でのマーキングと所有感": {"content": "{指定席でのマーキングと所有感}\n简介：\n【场景/玩法描述】被调教者被诱导在调教者的固定座位（指定席）上进行自慰，用体液“标记”该位置，从而产生被占有感和归属感。调教者事后坐在该位置，强化支配关系。\n\n用法与交互细节：\n1. 调教者事先指定某个座位为自己的“指定席”，并暗示被调教者。\n2. 被调教者在发情时，主动坐到该座位上自慰，将爱液等分泌物留在座位上。\n3. 调教者到来后，直接坐在留有痕迹的座位上，被调教者目睹后产生强烈的羞耻和被占有的感觉。\n4. 可变体：可扩展至其他个人物品（如椅子、床铺），或要求被调教者事后清洁。", "uid": 2635}, "生理現象の誤認誘導と性的接触": {"content": "{生理現象の誤認誘導と性的接触}\n简介：\n【场景/玩法描述】调教者将被调教者的发情症状（火照り、胸の高鳴り）解释为常见的生理现象（如女性版“朝勃ち”），并以此为借口进行身体接触或“治疗”，逐步升级为性行为。\n\n用法与交互细节：\n1. 调教者观察到被调教者的发情反应，主动询问并给出虚假的医学解释。\n2. 被调教者因信任或无知而接受解释，并同意调教者提出的“缓解方法”（如按摩）。\n3. 调教者在“治疗”过程中，逐步加入性刺激，被调教者因羞耻和快感而难以拒绝。\n4. 可变体：可结合催眠或暗示，让被调教者深信不疑，或使用道具（如“体温计”）进行变相性骚扰。", "uid": 2636}, "校内隐秘角落的羞耻暴露训练": {"content": "{校内隐秘角落的羞耻暴露训练}\n简介：\n【场景/玩法描述】调教者以“克服羞耻心”为借口，命令受虐者在校园隐蔽角落（如体育馆后方）逐步脱去衣物，进行暴露训练。受虐者身着社团制服，在可能被发现的紧张感中，被迫展示身体，并承受调教者的言语羞辱和轻度身体接触。\n\n用法与交互细节：\n1. 调教者利用受虐者的弱点（如比赛紧张）提出“羞耻训练”，将暴露行为合理化。\n2. 受虐者从卷起上衣开始，逐步露出内衣、胸部，甚至脱去下装，仅留内裤。\n3. 调教者保持距离观察，强调“只是看”，让受虐者独自体验暴露的羞耻与快感。\n4. 可变体：可加入附近有人声或脚步声的元素，增强紧张感；或让受虐者对着小窗、通风口等暴露，增加被窥视的想象。", "uid": 2637}, "隔墙有耳：被迫聆听他人意淫": {"content": "{隔墙有耳：被迫聆听他人意淫}\n简介：\n【场景/玩法描述】受虐者在暴露状态下，被迫聆听附近不知情的同伴或路人对自己身体的意淫和猥亵言论。调教者利用环境（如小窗、薄墙）让受虐者清晰听到对话，加剧羞耻感和兴奋度。\n\n用法与交互细节：\n1. 调教者事先选择地点，确保受虐者能听到他人对话但不会被直接看到。\n2. 受虐者保持暴露姿势，调教者低声转述或强调对话中的淫秽内容。\n3. 受虐者因羞耻而身体颤抖、面色潮红，但无法出声或逃离。\n4. 可变体：对话内容可定制，如讨论受虐者的身体部位、幻想与其发生关系等；也可让受虐者听到自己的名字被提及，增加社死风险。", "uid": 2638}, "壁咚下的秘密爱抚与口交": {"content": "{壁咚下的秘密爱抚与口交}\n简介：\n【场景/玩法描述】在随时可能被发现的校园角落，调教者将受虐者抵在墙上，一边注意周围动静，一边进行爱抚和口交。受虐者衣衫不整，必须强忍声音，在紧张与快感中挣扎。\n\n用法与交互细节：\n1. 调教者以“躲避他人”为由贴近受虐者，形成壁咚姿势，身体紧贴。\n2. 调教者用手在受虐者腹部、腰间游走，然后探入内裤，直接刺激私处。\n3. 调教者蹲下，隔着内裤舔舐受虐者私处，用唾液和爱液浸湿布料，增加淫靡感。\n4. 可变体：可加入路人接近的危机，迫使双方暂停动作；或让受虐者主动捂住自己的嘴，增强忍耐表现。", "uid": 2639}, "社团制服下的反差暴露": {"content": "{社团制服下的反差暴露}\n简介：\n【场景/玩法描述】利用社团制服（如排球服、篮球服）的稀缺性和运动感，让受虐者在穿着制服时进行暴露。制服本身紧身、露肤度高，卷起或脱下部分后形成强烈反差，放大羞耻与诱惑。\n\n用法与交互细节：\n1. 受虐者穿着社团制服，调教者命令其卷起上衣、拉下内衣，露出胸部。\n2. 调教者强调制服的“特权”属性，以及日常与此刻的反差，增加背德感。\n3. 可保留部分制服元素（如短裤挂在膝上、运动内衣推高），营造半裸运动少女的视觉效果。\n4. 可变体：可结合运动后的汗湿状态，强调气味和触感；或让受虐者穿着不同社团的制服，改变角色背景。", "uid": 2640}, "渐进式脱衣与放置Play": {"content": "{渐进式脱衣与放置Play}\n简介：\n【场景/玩法描述】调教者命令受虐者逐步脱去衣物，然后离开一段距离，让受虐者独自保持暴露状态一段时间。期间调教者仅观察，不进行直接接触，让受虐者自行体会暴露的羞耻与不安。\n\n用法与交互细节：\n1. 调教者以“训练”为名，让受虐者从卷起上衣到露出胸部，甚至脱去下装。\n2. 调教者退后至一定距离，背靠墙壁或坐下，静静观看受虐者。\n3. 受虐者因孤独感和可能被发现的恐惧而颤抖，但必须维持姿势。\n4. 可变体：可设定时间限制（如“直到休息时间结束”）；或加入环境声音（如远处 id": 2671}, "哺乳/吸乳与乳首责罚": {"content": "{哺乳/吸乳与乳首责罚}\n简介：\n【场景/玩法描述】受虐者因体质改造或催眠暗示而泌乳，调教者通过吸吮、揉捏乳房刺激乳汁分泌，并将吸乳行为与性快感绑定。受虐者在被吸乳时会产生强烈羞耻，但身体却无法抑制地产生快感甚至高潮。\n\n用法与交互细节：\n1. 调教者先通过揉捏、舔舐乳晕和乳首进行前戏，待受虐者乳首勃起后突然含住吸吮。\n2. 吸乳过程中，受虐者会因乳汁流出而感到羞耻，调教者可用言语羞辱（如“明明很舒服，奶水都止不住”）。\n3. 可结合乳首责罚，如轻咬、拉扯乳首，或要求受虐者自己捧着乳房喂食。\n4. 可变体：乳汁可具有特殊效果（如催情、成瘾），或设定为只有在高潮时才会大量分泌。", "uid": 2672}, "运动后汗湿体味与制服恋物": {"content": "{运动后汗湿体味与制服恋物}\n简介：\n【场景/玩法描述】调教者特别迷恋受虐者运动后汗湿的制服和身体气味，在比赛或训练刚结束时将其带至私密处，保留部分汗湿衣物进行性行为。受虐者因身体仍处于兴奋状态而更加敏感，同时因汗味和污渍感到羞耻。\n\n用法与交互细节：\n1. 受虐者穿着被汗浸湿的运动服（如紧身衣、短裤），调教者故意不让她完全脱掉，而是撩起或褪下一部分。\n2. 调教者用语言强调汗味、体温和湿透的布料，并舔舐受虐者汗湿的脖颈、腋下或乳沟。\n3. 性行为中，制服可能被进一步弄脏（如沾上体液），事后受虐者需穿着污损制服返回公共场合。\n4. 可变体：制服可替换为其他职业服装（如护士服、军服），强调“刚下班/下勤务”的状态。", "uid": 2673}, "插入即绝顶与敏感体质开发": {"content": "{插入即绝顶与敏感体质开发}\n简介：\n【场景/玩法描述】受虐者经过长期调教或禁欲后，身体变得极度敏感，仅插入动作本身就能引发高潮。调教者利用这一点，在插入后故意静止不动，让受虐者在羞耻中体验持续的高潮痉挛，从而强化其“只要被插入就会去”的条件反射。\n\n用法与交互细节：\n1. 调教者先通过前戏或言语让受虐者处于高度兴奋状态，然后缓慢插入。\n2. 插入后立即停止动作，观察并描述受虐者因绝顶而产生的痉挛、收缩和呻吟。\n3. 可反复进行“插入-静止-高潮”的循环，每次插入都让受虐者更难以自控。\n4. 可变体：可设定为受虐者只有在特定体位或特定对象插入时才会触发此反应，增加专属感。", "uid": 2674}, "公共场合边缘性行为与暴露风险": {"content": "{公共场合边缘性行为与暴露风险}\n简介：\n【场景/玩法描述】调教者与受虐者在可能被他人发现的半公共场合（如厕所、楼梯间、空教室）进行性行为。受虐者必须压抑声音，同时承受随时被撞破的恐惧，这种紧张感会加剧身体敏感度。调教者可能故意制造声响或拖延时间以增加风险。\n\n用法与交互细节：\n1. 选择隔音差、人流量不定但暂时无人的场所，如体育馆厕所、图书馆角落。\n2. 调教者要求受虐者保持安静，若发出声音则给予惩罚（如暂停刺激或留下印记）。\n3. 可加入外部干扰元素，如门外脚步声、他人谈话声，让受虐者高度紧张。\n4. 可变体：可设定“被发现就公开关系”的赌约，或故意留下痕迹（如体液、气味）让他人察觉。", "uid": 2675}, "禁欲后解禁的爆发式性交": {"content": "{禁欲后解禁的爆发式性交}\n简介：\n【场景/玩法描述】双方因约定或外部原因（如比赛、考试、任务）而禁欲一段时间，解禁后立即进行激烈性交。受虐者因长期压抑而变得极度渴望，调教者则利用其欲求不满的状态进行支配，让性行为充满“终于可以做了”的解放感与失控感。\n\n用法与交互细节：\n1. 设定明确的禁欲期限和原因，期间双方不得有任何性接触或自慰。\n2. 解禁时刻到来时，调教者故意延迟满足，先让受虐者用语言或行动表达渴望。\n3. 性行为中强调“积攒了多久”的概念，如“这是十天的量”，并可能以连续高潮或多次射精作为释放。\n4. 可变体：禁欲可单方面施加于受虐者，调教者则不受限，形成权力差；或解禁时加入“如果禁欲失败就惩罚”的追加规则。", "uid": 2676}, "镜前交合与腹部轮廓观察": {"content": "{镜前交合与腹部轮廓观察}\n简介：\n【场景/玩法描述】在镜前进行背后位交合，利用体型差和仰反姿势，使调教者性器的轮廓在受虐者腹部隐约浮现。通过镜面反射，双方可清晰观察交合深度与子宫口被顶压的视觉反馈，强化羞耻与快感。\n\n用法与交互细节：\n1. 受虐者上半身仰反，调教者从背后抱腰，在镜前缓慢抽送，观察腹部随插入浮现的隆起。\n2. 调教者引导受虐者注视镜中自己腹部，指 以增强若隐若现的羞耻感。\n3. 要求被调教者用身份证明（如学生证、工作证）遮住眼睛，既提供心理保护又强化身份暴露的背德张力。\n4. 可变体：可改为视频拍摄、定时自拍，或要求被调教者事后查看照片并描述感受，深化羞耻记忆。", "uid": 2708}, "身份标识物遮挡下的羞耻暴露": {"content": "{身份标识物遮挡下的羞耻暴露}\n简介：\n【场景/玩法描述】被调教者用学生证、工作证等带有个人信息的物品遮住眼睛，同时进行身体暴露。遮挡物既提供“不被认出”的虚假安全感，又因身份信息清晰可见而加剧羞耻和背德感。常用于拍照或公共场合露出。\n\n用法与交互细节：\n1. 调教者命令被调教者取出身份证明，并指定遮挡方式（如遮眼、遮脸）。\n2. 强调遮挡物上的姓名、照片等信息，让被调教者意识到“身份被标记”。\n3. 在遮挡状态下进行暴露、抚摸或拍摄，利用半匿名状态放大羞耻快感。\n4. 可变体：可更换遮挡物为内衣、领带等私人物品，或要求被调教者自己手持遮挡物，增加肢体颤抖等细节。", "uid": 2709}, "公共厕所隔间内的强制开腿与暴露": {"content": "{公共厕所隔间内的强制开腿与暴露}\n简介：\n【场景/玩法描述】在公共厕所隔间内，调教者将被调教者置于腿上，强制分开双腿，掀起裙子露出下体，并打开隔间门增加被发现的危险。被调教者必须压抑声音，同时接受乳房和阴部刺激，在暴露恐惧中达到高潮。\n\n用法与交互细节：\n1. 调教者先以按摩或缓解不适为由将对方带入隔间，逐步升级为性刺激。\n2. 在刺激过程中突然打开隔间门，制造“随时可能被人看到”的紧张感。\n3. 要求被调教者保持开腿姿势，并用手捂住嘴抑制声音，否则威胁引来他人。\n4. 可变体：可设定为有人在外走动或敲门，增加即时危机感；或要求被调教者自己开门。", "uid": 2710}, "射乳高潮与母乳哺喂调教": {"content": "{射乳高潮与母乳哺喂调教}\n简介：\n【场景/玩法描述】被调教者因体质改造或强制发情而分泌乳汁，调教者通过吮吸、抚摸乳头引发射乳高潮。射乳过程伴随持续不断的乳头快感，形成“越吸越出、越出越爽”的循环，使被调教者陷入长时间无法停止的高潮状态。\n\n用法与交互细节：\n1. 调教者先通过揉捏、舔舐乳头刺激乳汁渗出，观察被调教者的羞耻反应。\n2. 在接近高潮时突然吮吸乳头，引发喷射状射乳，同时被调教者全身痉挛。\n3. 持续吮吸使射乳不断，被调教者因乳头快感而反复高潮，无法自主停止。\n4. 可变体：可加入挤奶器、乳夹等道具；或要求被调教者自己挤奶给调教者饮用，增强服从性。", "uid": 2711}, "服从性深喉口交与精液吞咽": {"content": "{服从性深喉口交与精液吞咽}\n简介：\n【场景/玩法描述】被调教者以“回报”或“负责”为由，主动为调教者进行深喉口交，并吞咽精液。过程中强调被调教者的学习态度，通过观察调教者反应来调整技巧，最终以吞下精液作为服从的证明。\n\n用法与交互细节：\n1. 被调教者先以手抚慰，表达对调教者忍耐的歉意，建立服务心态。\n2. 从舔舐龟头、清理前液开始，逐步深入，试探调教者的敏感点。\n3. 调教者通过呻吟或身体反应给予反馈，被调教者据此调整口交方式，直至深喉。\n4. 可变体：可要求被调教者口交后展示口中精液再吞咽，或进行颜射后舔净，强化羞辱与服从。", "uid": 2712}, "半公开场合的视线羞耻与身体反应调教": {"content": "{半公开场合的视线羞耻与身体反应调教}\n简介：\n【场景/玩法描述】在购物中心等半公开场合，调教者指出被调教者因受到他人视线而身体发热、乳头勃起等反应，并以此为据进行羞耻质问和身体触摸。被调教者虽口头否认，但身体反应证实了其从“被观看”中获得快感。\n\n用法与交互细节：\n1. 调教者观察被调教者在人群中的细微变化（脸红、呼吸急促、胸部起伏等），并低声指出。\n2. 将对方带入隐蔽处（如厕所隔间）后，以“检查”为名触摸敏感部位，验证其兴奋状态。\n3. 用言语羞辱强化关联：“你是因为被那些男人看才湿的吧？”迫使对方在羞耻中承认快感。\n4. 可变体：可安排在玻璃窗前、阳台等更开放处进行，或让被调教者自己报告身体变化。", "uid": 2713}, "身份标识物在羞耻摄影中的双重作用": {"content": "{身份标识物在羞耻摄影中的双重作用}\n简介：\n【场景/玩法描述】拍摄羞耻照片时，要求被调教者手持或佩戴身份标识物（如学生证、工作证），使其姓名、照片等与裸露身体同框。这既增加了“身份暴露”的恐惧，又为照片赋予更强的背德感和控制力，成为调教者手中的潜在威胁。\n\n用法与交互细节：\n1. 调教者命令被调教者取出身份证明，并指定放置位置（如遮眼、贴胸、夹在腿间）。\n2. 拍摄时确保身份信息清晰可见，同时身体部位充分暴露。\n3. 事后让被调教者观看照片，强调“你的名字和裸体在一起”，加深羞耻记忆。\n4. 可变体：可要求被调教者自己拍摄并发送给调教者，或威胁将照片发送给其熟人（仅作为心理压迫，不实际执行）。", "uid": 2714}, "高潮时的强制声音压抑与暴露风险": {"content": "{高潮时的强制声音压抑与暴露风险}\n简介：\n【场景/玩法描述】在可能被发现的半公开场所，调教者通过刺激使被调教者达到高潮，但强制其压抑声音，否则会引来他人。被调教者在快感与恐惧中挣扎，高潮时身体失控但努力捂嘴，这种矛盾加剧了羞耻和兴奋。\n\n用法与交互细节：\n1. 调教者选择隔音差或有人员流动风险的地点（如公共厕所、试衣间、车内）。\n2. 在刺激前警告：“出声的话会被听到哦”，并设定后果（如开门、引来他人）。\n3. 在高潮临界点加大刺激，同时观察被调教者压抑声音的狼狈姿态。\n4. 可变体：可要求被调教者自己捂住嘴，或使用口塞、胶带等道具辅助；若声音泄露，可进行额外惩罚。", "uid": 2715}, "睡眠中の無防備身体検査": {"content": "{睡眠中の無防備身体検査}\n简介：\n【场景/玩法描述】催眠或薬物で深く眠らせた相手の衣服をめくり、性的反応を観察・記録する。相手は起きず、無意識のうちに身体が反応する様子を楽しむ。\n\n用法与交互细节：\n1. 対象を完全に無抵抗な睡眠状態に導く。\n2. 衣服を少しずつめくり、下着や肌を露出させ、その状態を写真や動画で記録する。\n3. 胸や太ももなどに軽く触れ、無意識の吐息や身体の震えを観察する。\n4. 可变体：睡眠の深さを調整し、触れる部位や露出度を段階的にエスカレートさせる。", "uid": 2716}, "公共空間での秘密露出撮影": {"content": "{公共空間での秘密露出撮影}\n简介：\n【场景/玩法描述】電車や観客席など公共の場で、催眠暗示により周囲の注意をそらし、対象のスカートをめくったり下着を露出させて撮影する。\n\n用法与交互细节：\n1. 催眠装置や暗示で周囲の人間に「見て見ぬふり」をさせる。\n2. 対象が無防備な瞬間を狙い、衣服をずらして下着や肌を露出させる。\n3. スマートフォンなどで証拠写真を撮影し、後で対象に見せて羞恥を与える。\n4. 可变体：露出の程度をブラジャー越しの透けから完全な下着露出まで調整する。", "uid": 2717}, "運動後の発汗媚香フェティシズム": {"content": "{運動後の発汗媚香フェティシズム}\n简介：\n【场景/玩法描述】運動や部活直後の相手の身体から漂う汗とフェロモンの混ざった匂いに興奮し、その状態を堪能する。\n\n用法与交互细节：\n1. 対象が運動で汗をかき、体温が上昇した状態で密着する。\n2. 首筋や脇、太ももなど汗の匂いが強い部位に顔を近づけ、深呼吸する。\n3. 汗で濡れた衣服の張り付きや下着の透けを視覚的にも楽しむ。\n4. 可变体：運動の種類や強度を変え、発汗量や匂いの質を変化させる。", "uid": 2718}, "試合後の秘密呼び出しと発情確認": {"content": "{試合後の秘密呼び出しと発情確認}\n简介：\n【场景/玩法描述】公的な場（試合後など）で対象を人目につかない場所に呼び出し、興奮や発情の兆候を確認しながら優位に立つ。\n\n用法与交互细节：\n1. 対象が大勢の前で活躍した直後、メッセージで誰もいない通路や控え室に呼び出す。\n2. 駆けつけた対象の上気した表情や汗ばんだ肌、震える声から性的興奮を読み取る。\n3. 周囲に人がいないことを確認しつつ、身体に軽く触れて反応を試す。\n4. 可变体：呼び出す場所を更衣室や用具庫などリスクの高い場所に変更する。", "uid": 2719}, "透け撮影のための画像強調共有": {"content": "{透け撮影のための画像強調共有}\n简介：\n【场景/玩法描述】スポーツウェア越しに透ける下着や身体のラインを撮影し、画像処理で強調したものを協力者と共有する。\n\n用法与交互细节：\n1. 対象が薄手のユニフォームを着ている場面を高倍率カメラで撮影する。\n2. 撮影した画像をアプリでコントラストや陰影を調整し、乳房や乳首の形が浮き出るように加工する。\n3. 加工画像を催眠暗示で味方にした第三者と共有し、感想を言い合う。\n4. 可变体：対象の同意なくネット上の課金サイトに投稿するよう暗示をかける。", "uid": 2720}, "官 感を強調する；長時間（十数分以上）維持し、受虐者の精神的限界を試す。", "uid": 2770}, "騎乗位強制淫語トレーニング": {"content": "{騎乗位強制淫語トレーニング}\n简介：\n【场景/玩法描述】調教者が騎乗位の姿勢で受虐者に腰を振らせながら、「おちんぽ気持ちいい」などの淫語を繰り返し言わせる。最初は羞恥で声が小さいが、調教者が「もっと大きな声で」と要求し、徐々に大声で淫語を叫ばせることで、快楽と羞恥が混ざり合った状態で調教が進む。\n\n用法与交互细节：\n1. 受虐者を騎乗位にさせ、自発的に腰を振らせる。\n2. 調教者が「気持ちいい？」と問いかけ、淫語を言うよう指示する。\n3. 声が小さい場合は「もっと」と繰り返し要求し、最終的に叫ばせる。\n4. 可变体：特定の淫語フレーズを復唱させる；言葉と腰の動きを同期させるトレーニング；失敗時に罰を与えるルールを追加する。", "uid": 2771}, "乳首アクメミルク滲み責め": {"content": "{乳首アクメミルク滲み責め}\n简介：\n【场景/玩法描述】水着越しに勃起した乳首を刺激し、ミルク（母乳や疑似体液）を滲ませながら乳首アクメに導く。調教者は水着の上から乳首をカリカリと引っ掻いたり、摘まんだりして、受虐者に「ミルクを出す気持ちよさ」を自覚させ、胸からの快楽を刷り込む。\n\n用法与交互细节：\n1. 受虐者に水着や薄手のトップスを着用させ、乳首のシルエットが浮き出る状態にする。\n2. 指や爪で乳首を軽く引っ掻き、ミルクが滲み出るまで刺激を続ける。\n3. 「ミルク出すの気持ちいい？」と問いかけ、快楽を言語化させる。\n4. 可变体：ミルクの代わりにローションを使用；乳首に振動アイテムを装着；滲みた染みを広げて羞恥を煽る。", "uid": 2772}, "子宫口密着种付压迫": {"content": "{子宫口密着种付压迫}\n简介：\n【场景/玩法描述】调教者将受虐者完全拘束在身下，阴茎深深插入并紧贴子宫口，以体重压迫腰胯，使龟头嵌入宫颈小窝，在持续密着状态下进行长时间射精。受虐者被固定无法动弹，只能承受子宫口被顶撞和精液直接灌注的快感，双方身体紧密贴合，形成强制一体感。\n\n用法与交互细节：\n1. 采用种付压迫体位，调教者从上方覆盖受虐者，双臂环抱固定其身体，双腿与受虐者交缠，使其无法挣扎。\n2. 阴茎插入至最深处，用龟头寻找并顶住子宫口，然后调教者将全身重量压在腰上，保持龟头与子宫口的密封接触。\n3. 在密着状态下开始射精，精液直接注入子宫口，受虐者会感受到子宫被灼热液体冲击的强烈快感，同时因无法动弹而被迫持续高潮。\n4. 可变体：可结合服装Play（如巫女服、制服），增加背德感；也可在射精后保持插入状态进行舌吻，延长一体感时间。", "uid": 2773}, "强制连续高潮与精液榨取循环": {"content": "{强制连续高潮与精液榨取循环}\n简介：\n【场景/玩法描述】调教者通过持续抽插或压迫子宫口，使受虐者陷入连续高潮状态，同时受虐者的阴道痉挛会不断榨取阴茎，导致调教者射精无法停止，形成双方相互刺激、无法从绝顶中降下的循环。\n\n用法与交互细节：\n1. 调教者先通过激烈抽插或子宫口刺激将受虐者送上高潮，然后保持插入状态不动，感受阴道高潮时的蠕动。\n2. 受虐者高潮时阴道会强烈收缩，主动吸吮阴茎，调教者借此快感开始射精，而射精的脉动又会刺激受虐者再次高潮。\n3. 双方陷入“高潮→榨取→射精→再高潮”的循环，时间可长达数分钟，期间两人意识模糊，身体紧密贴合。\n4. 可变体：可加入语言羞辱，如调教者命令受虐者“用子宫喝下精液”，增强心理支配感；也可在循环结束后进行事后清扫Play。", "uid": 2774}, "事后开穴展示与拍摄": {"content": "{事后开穴展示与拍摄}\n简介：\n【场景/玩法描述】交合结束后，调教者命令受虐者摆出暴露性器的姿势（如M字开腿或抱膝开穴），用手扒开阴道口，展示内部残留的精液和充血状态，并用手机或相机进行拍摄记录。受虐者在羞耻与兴奋中完成展示，精液从阴道流出成为视觉焦点。\n\n用法与交互细节：\n1. 调教者拔出阴茎后，立即要求受虐者采取指定姿势，如仰躺抱膝、M字开腿等，使结合部完全暴露。\n2. 受虐者用手指分开阴唇，尽量撑开阴道口，让内部精液和红肿的阴道壁清晰可见。\n3. 调教者用设备近距离拍摄，可要求受虐者说出羞耻台词，如“请看我被灌满精液的淫穴”。\n4. 可变体：可结合服装半脱（如只撩起裙子、解开上衣），增加凌乱感；也可在拍摄后立即进行清扫口交，形成对比。", "uid": 2775}, "尿道残余精液吸吮清扫": {"content": "{尿道残余精液吸吮清扫}\n简介：\n【场景/玩法描述】射精后，受虐者为调教者进行口交清扫，重点是用嘴唇包裹龟头，用力吸吮尿道，将残留在尿道中的精液吸出并吞咽。此行为强调彻底的清洁与奉仕，受虐者需表现出虔诚和满足。\n\n用法与交互细节：\n1. 调教者射精后阴茎仍半勃起，受虐者跪坐或蹲伏，用双手轻握阴茎根部。\n2. 受虐者先用舌头舔净阴茎表面，然后含住龟头，嘴唇收紧形成真空，用力吸吮尿道口，发出“啾噜”声。\n3. 吸出精液后，受虐者需展示口中精液，然后吞咽，并说“清理干净了”之类的话。\n4. 可变体：可要求受虐者用手指轻挤阴茎根部辅助排精；也可在吸吮后继续深喉，延长支配感。", "uid": 2776}, "公共密室胁迫与共犯关系确立": {"content": "{公共密室胁迫与共犯关系确立}\n简介：\n【场景/玩法描述】在无法逃离的公共密室（如电车、空教室）中，调教者揭露受虐者之前的隐秘性行为（如自慰、暴露），并出示偷拍证据，以此胁迫受虐者接受“共犯关系”——即受虐者需继续提供性服务，而调教者承诺保密。受虐者在羞耻与恐惧中被迫同意，形成扭曲的依赖。\n\n用法与交互细节：\n1. 调教者选择封闭且无法逃脱的环境，先以日常对话降低受虐者戒心。\n2. 突然抛出证据（如照片、录音），指出受虐者的淫乱行为，使其陷入恐慌。\n3. 调教者提出“共犯”提议：只要受虐者配合，就不会泄露秘密，并暗示可提供快感。\n4. 可变体：可加入催眠或暗示元素，使受虐者原本就因暗示而行为失控；也可在胁迫后立即进行轻度调教，巩固支配。", "uid": 2777}, "服装半脱与羞耻乳首露出": {"content": "{服装半脱与羞耻乳首露出}\n简介：\n【场景/玩法描述】受虐者穿着整齐的制服或特定服装，但故意不穿内衣，使乳头在衣物下明显凸起。在公共场合（如电车、教室），调教者通过言语或视线指出其暴露状态，受虐者因羞耻而兴奋，却无法遮掩，形成隐秘的暴露Play。\n\n用法与交互细节：\n1. 受虐者按要求不穿内衣，穿着薄质制服，乳头因紧张或兴奋而勃起，透过衣物清晰可见。\n2. 调教者在公共场合靠近受虐者，低声指出其乳头凸起，或假装不经意触碰，观察其反应。\n3. 受虐者无法公然遮掩，只能忍受羞耻，身体可能因兴奋而颤抖或分泌乳汁。\n4. 可变体：可结合远程遥控跳蛋，增加刺激；也可在无人角落命令受虐者解开上衣确认。", "uid": 2778}, "自慰偷窥与事后质问": {"content": "{自慰偷窥与事后质问}\n简介：\n【场景/玩法描述】调教者假装熟睡，实则偷窥受虐者在同一空间内进行自慰（如乳首自慰、手指自慰），并暗中记录。事后，调教者突然质问受虐者，揭露其行为，使其陷入极度羞耻，从而建立心理优势。\n\n用法与交互细节：\n1. 调教者与受虐者共处一室（如卧室、合宿房间），调教者假装入睡，发出平稳呼吸声。\n2. 受虐者以为调教者已熟睡，开始自慰，可能伴随压抑的喘息或淫语。\n3. 调教者偷窥并可能录音或录像，次日或稍后突然提起，观察受虐者惊慌失措的反应。\n4. 可变体：可加入催眠暗示，使受虐者自慰行为是受调教者暗示触发；质问后可要求受虐者当面再表演一次。", "uid": 2779}, "连续膣内射精与精液溢出记录": {"content": "{连续膣内射精与精液溢出记录}\n简介：\n【场景/玩法描述】调教者对受虐者进行多次连续膣内射精，不拔出阴茎，使精液在阴道内积聚。之后拔出时，大量浓稠精液从阴道口溢出，调教者用设备拍摄这一过程，并配以受孕相关言语，强化支配与生殖本能。\n\n用法与交互细节：\n1. 调教者与受虐者保持插入状态，进行多次射精，期间不拔出，让精液堵在阴道深处。\n2. 射精结束后，调教者缓慢拔出阴茎，同时拍摄阴道口，捕捉精液涌出的瞬间。\n3. 调教者可用手指沾取精液，涂抹在受虐者腹部或嘴边，并说“如果没避孕，你已经怀上了”等台词。\n4. 可变体：可结合子宫口密着，使精液直接注入子宫；也可在溢出后命令受虐者将精液塞回阴道。", "uid": 2780}, "半裸パーカー露出散策": {"content": "{半裸パーカー露出散策}\n简介：\n【场景/玩法描述】受虐者仅穿一件拉链可调节的宽松外套（如パーカー），内部无内衣或仅着极小块泳装，在公共或半公共区域（如海滩、商店、街道）行走、购物或进行日常活动。通过调节拉链高低控制暴露程度，利用外套的遮掩与若隐若现制造羞耻感。周围人的视线、窃窃私语成为刺激源，受虐者因害怕被发现又期待被视奸而陷入兴奋。\n\n用法与交互细节：\n1. 调教者指定路线和任务（如买饮料、问路），受虐者必须完成，期间可远程监视或尾随。\n2. 拉链高度由 860}, "偷窥者视角下的秘密调教暴露": {"content": "{偷窥者视角下的秘密调教暴露}\n简介：\n【场景/玩法描述】从旁观者（同学/同事）的视角，无意中窥见或听闻被调教者的淫乱行为，但不知其真实身份。调教者知晓旁观者的存在，却故意不点破，享受秘密可能被发现的刺激。旁观者对被调教者抱有纯洁幻想，而实际上其早已成为调教者的专属玩物，形成强烈反差。\n\n用法与交互细节：\n1. 设定旁观者角色，如暗恋被调教者的同学，偶然听到其高潮声音或看到可疑痕迹，但无法确认。\n2. 调教者掌握全局，可能故意留下线索（如母乳香气、衣物不整）让旁观者起疑，但始终不揭晓真相。\n3. 通过旁观者的内心独白，对比其幻想中的清纯形象与实际的堕落状态，增强背德感。\n4. 可变体：旁观者最终发现真相，被迫加入或成为新的调教对象；或调教者安排被调教者在旁观者附近进行隐秘调教，如隔墙自慰。", "uid": 2861}, "恋慕对象被他人调教的现场偷听": {"content": "{恋慕对象被他人调教的现场偷听}\n简介：\n【场景/玩法描述】角色A暗恋角色B，却在一次偶然中（如祭典、郊游）听到B与调教者在隐蔽处进行激烈性行为的声音。A无法看到现场，只能通过声音想象B的淫态，内心充满嫉妒与兴奋。调教者可能知晓A的存在，故意让B发出更大声音，以此炫耀占有。\n\n用法与交互细节：\n1. 设置一个半公开的野外场景（如神社树林、公园深处），让偷听者因黑暗或障碍无法靠近，只能依靠听觉。\n2. 被调教者发出压抑但无法克制的娇喘，内容涉及平时清纯形象的反差（如“子宫被顶到了”）。\n3. 偷听者陷入矛盾心理：既想阻止又忍不住自慰，事后对被调教者的幻想彻底改变。\n4. 可变体：偷听者录下声音，事后用于威胁或自慰；或调教者事后故意在偷听者面前提及，观察其反应。", "uid": 2862}, "日常接触中的隐秘身体变化察觉": {"content": "{日常接触中的隐秘身体变化察觉}\n简介：\n【场景/玩法描述】被调教者因长期调教出现身体变化（如胸部增大、体香改变、举止色气），在日常互动中被同学/同事隐约察觉，但无人能证实。调教者暗中观察这些议论，享受自己的“作品”被他人注意的优越感。被调教者可能不自知或被迫掩饰。\n\n用法与交互细节：\n1. 设计日常场景，如弯腰捡东西时，旁观者注意到被调教者的胸部似乎更丰满，或闻到若有若无的甜香。\n2. 旁观者之间私下议论，猜测是否有了男友或进行了身体改造，但不敢当面询问。\n3. 被调教者因调教者的命令，在公开场合保持端庄，但细微的举止（如无意识夹腿）出卖了其身体习惯。\n4. 可变体：调教者故意安排被调教者穿着更显身材的服装，加剧他人怀疑；或让被调教者在他人面前进行“无意识”的性感动作，如伸懒腰时凸显胸部。", "uid": 2863}, "学园祭摄影口实下的秘密拍摄计划": {"content": "{学园祭摄影口实下的秘密拍摄计划}\n简介：\n【场景/玩法描述】角色利用学园祭或类似活动的摄影任务作为正当理由，计划偷拍心仪对象的走光或性感瞬间。通过合法身份掩盖偷窥欲望，同时与同好分享幻想，但实际执行时可能面临道德挣扎或被发现的风险。\n\n用法与交互细节：\n1. 角色获得摄影许可，如成为活动记录员，可以自由拍摄，内心却盘算着捕捉特定对象的裙底、胸部等。\n2. 与朋友讨论时，详细描述幻想中的偷拍角度和可能收获，如“从下往上拍绝对能看到内裤”。\n3. 实际拍摄时，可能因紧张或意外未能得手，但事后通过脑补满足；或成功拍到，成为秘密收藏。\n4. 可变体：被拍摄对象无意中配合，摆出更诱人的姿势；或拍摄者被发现，遭到威胁或被迫参与调教。", "uid": 2864}, "肩部按摩引发的亲密接触与试探": {"content": "{肩部按摩引发的亲密接触与试探}\n简介：\n【场景/玩法描述】一方以缓解疲劳为由，为另一方进行肩部按摩，借此机会进行身体接触和试探。被按摩者因紧张和初次体验而身体僵硬，按摩者则通过手法和言语逐步放松其戒备，为后续更深入的调教铺垫。\n\n用法与交互细节：\n1. 按摩者从背后接近，先以指尖轻触确认肌肉僵硬点，同时观察被按摩者的反应（如颤抖、小声呻吟）。\n2. 通过闲聊分散注意力，逐渐加大力度，并询问“舒服吗？”以建立信任。\n3. 被按摩者逐渐放松，可能无意识发出舒服的叹息，按摩者可顺势将手滑向更敏感区域（如颈部、锁骨）。\n4. 可变体：按摩中加入精油，使接触更滑腻；或按摩者突然施力，让被按摩者发出娇声，然后调侃其反应。", "uid": 2865}, "隔衣子宫按摩高潮": {"content": "{隔衣子宫按摩高潮}\n简介：\n【场景/玩法描述】调教者通过衣物 者快速命令目标做出特定姿势，强调“挺胸”“看镜头”等，拍摄多角度照片。\n2. 照片内容可包括面部表情（如催眠中无神的眼睛与红晕）和身体局部（如被揉过的胸部痕迹）。\n3. 事后可匿名发送给目标，制造恐惧，或用于强迫目标服从新指令（如“不想照片泄露就照做”）。\n4. 可变体：可录像记录侵犯过程，或要求目标在催眠中说出“我是主人的母狗”等台词并录音。", "uid": 2884}, "裹胸束缚下的胸部玩弄": {"content": "{裹胸束缚下的胸部玩弄}\n简介：\n【场景/玩法描述】目标因运动或工作习惯使用裹胸（缠胸布）而非胸罩，调教者在催眠或非催眠状态下，隔着衣物或直接揉捏被裹胸压制的乳房，感受不同于胸罩的独特柔软与束缚感，同时享受破坏其日常防护的背德感。\n\n用法与交互细节：\n1. 目标穿着裹胸时，调教者以按摩、检查等借口接触其背部或肩部，逐步移至胸部。\n2. 揉捏时强调裹胸的粗糙质感与乳房柔软的反差，可故意询问“今天又是裹胸吗？”进行言语羞辱。\n3. 可结合催眠指令，要求目标下次改穿胸罩或直接不穿内衣前来，逐步解除其防护习惯。\n4. 可变体：可让目标在催眠中自己解开裹胸，或使用道具（如夹子）隔着布刺激乳头。", "uid": 2885}, "利用好感与催眠的渐进式侵犯": {"content": "{利用好感与催眠的渐进式侵犯}\n简介：\n【场景/玩法描述】目标对调教者抱有好感，调教者利用这一点降低其戒心，结合催眠装置进行渐进式身体侵犯，从按摩、触摸到揉胸、拍照，每次只突破一点界限，同时以“不想破坏你与朋友的友情”为借口自我辩解，增加背德张力。\n\n用法与交互细节：\n1. 调教者先通过日常互动确认目标的好感，然后以关心（如按摩）为由进行初次身体接触。\n2. 在接触中逐步升级，如从肩部按摩到胸部触摸，若目标未明显抗拒，则下次使用催眠装置进行更深入的侵犯。\n3. 调教者内心挣扎于“不想破坏友情”与“欲望”之间，这种矛盾可转化为言语调情或事后自责，增加角色深度。\n4. 可变体：可设定目标有恋人，调教者以“帮你放松”为名行侵犯之实，强化背德感。", "uid": 2886}, "催眠解除后的羞耻反应玩弄": {"content": "{催眠解除后的羞耻反应玩弄}\n简介：\n【场景/玩法描述】催眠解除后，目标对期间发生的事毫无记忆，但因身体残留感觉或环境异常而陷入羞耻和困惑（如发现自己脸红、衣衫微乱），调教者故意用言语戏弄（如“你刚才睡着了，还说了梦话哦”），观察其慌乱反应，享受精神上的支配感。\n\n用法与交互细节：\n1. 催眠结束后，目标通常会疑惑自己是否睡着，调教者以轻松语气调侃，如“你睡得好香，都打呼了”，加剧其羞耻。\n2. 可故意留下微小破绽（如扣错纽扣），让目标隐约感到不对劲但无法确认，陷入自我怀疑。\n3. 若目标追问细节，调教者可用暧昧回答（如“你刚才的样子很可爱，我差点忍不住”），模糊其记忆边界。\n4. 可变体：可结合事后任务，如“既然你睡着了，作为惩罚下次请我吃饭”，将羞耻转化为服从契机。", "uid": 2887}, "和服下的真空暴露指令": {"content": "{和服下的真空暴露指令}\n简介：\n【场景/玩法描述】在祭典等公共场合，调教者命令受虐者穿着传统和服但不穿内衣，利用和服不易察觉的特点进行隐蔽的暴露Play。受虐者因羞耻和可能被发现的紧张感而持续兴奋，调教者则通过言语和偶尔的触碰确认其状态，强化支配感。\n\n用法与交互细节：\n1. 调教者提前设定规则：受虐者在特定场合（如祭典、神社参拜）必须和服下全裸或仅穿极小块内衣（如T型裤）。\n2. 在人群中，调教者用只有两人懂的暗语或眼神提醒受虐者当前状态，例如“今天很凉快吧？”或“走路时小心别露出来”。\n3. 调教者可借机进行隐蔽的身体检查，如假装整理衣物时触碰胸部或臀部，确认无内衣并观察受虐者反应。\n4. 可变体：可升级为在更危险的场合（如家庭聚会、职场活动）执行，或增加“若被发现则接受惩罚”的规则，惩罚内容可包括公开羞辱或更严厉的调教。", "uid": 2888}, "乳汁分泌与乳首高潮调教": {"content": "{乳汁分泌与乳首高潮调教}\n简介：\n【场景/玩法描述】通过长期调教使受虐者体质改变，出现非妊娠期的乳汁分泌，并将乳首开发为极易高潮的敏感带。调教者通过揉捏、吸吮或仅凭言语刺激即可让受虐者乳首高潮并喷乳，将其作为控制手段和羞辱工具。\n\n用法与交互细节：\n1. 调教者先通过药物、催眠或持续刺激诱导受虐者产生母乳，并建立“乳首=高潮开关”的条件反射。\n2. 在日常中，调教者可随时突然袭击乳首，导致受虐者当众失态，以此强调其身体已非自己掌控。\n3. 受虐者需定期向调教者         const volItems = Object.values(subcats).flat();
        const volDiv = document.createElement('div');
        volDiv.className = 'vol-node';
        volDiv.dataset.vol = vol;
        volDiv.innerHTML = `
            <div class="vol-toggle" onclick="toggleVol(this, '${vol}')">
                <span class="arrow">&#9654;</span>
                <span>${vol}</span>
                <span class="count">${volItems.length}</span>
            </div>
            <div class="subcat-node" id="subcats_${vol}"></div>
        `;
        treeEl.appendChild(volDiv);

        const subcatNode = volDiv.querySelector('.subcat-node');
        for (const [subcat, items] of Object.entries(subcats)) {
            const scDiv = document.createElement('div');
            scDiv.className = 'subcat-group';
            scDiv.dataset.subcat = subcat;
            scDiv.dataset.vol = vol;
            scDiv.innerHTML = `
                <div class="subcat-toggle" onclick="toggleSubcat(this, '${vol}', '${subcat}')">
                    <span class="arrow">&#9654;</span>
                    <span>${subcat}</span>
                    <span class="count">${items.length}</span>
                </div>
                <div class="items-node" id="items_${vol}_${subcat}">
                    ${items.map((item, i) => `<div class="item-link" data-vol="${vol}" data-subcat="${subcat}" data-item="${item.replace(/"/g, '&quot;')}" onclick="showContent(this, '${item.replace(/'/g, "\'")}')">${item}</div>`).join('')}
                </div>
            `;
            subcatNode.appendChild(scDiv);
        }
    }
}

function toggleVol(toggle, vol) {
    const subcatNode = document.getElementById('subcats_' + vol);
    const arrow = toggle.querySelector('.arrow');
    const isOpen = subcatNode.classList.contains('open');
    if (isOpen) {
        subcatNode.classList.remove('open');
        arrow.classList.remove('open');
    } else {
        subcatNode.classList.add('open');
        arrow.classList.add('open');
    }
}

function toggleSubcat(toggle, vol, subcat) {
    const itemsNode = document.getElementById('items_' + vol + '_' + subcat);
    const arrow = toggle.querySelector('.arrow');
    const isOpen = itemsNode.classList.contains('open');
    if (isOpen) {
        itemsNode.classList.remove('open');
        arrow.classList.remove('open');
    } else {
        itemsNode.classList.add('open');
        arrow.classList.add('open');
    }
}

function showContent(el, itemName) {
    document.querySelectorAll('.item-link.active').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    activeItem = itemName;

    const contentDiv = document.getElementById('content');
    const entry = CONTENT[itemName];
    if (!entry) {
        contentDiv.innerHTML = `<div class="content-empty"><div class="icon">&#9888;</div><div>未找到内容: ${itemName}</div></div>`;
        return;
    }
    const vol = el.dataset.vol;
    const subcat = el.dataset.subcat;
    contentDiv.innerHTML = `
        <div class="content-header">
            <h2>${itemName}</h2>
            <div class="meta">${vol} &raquo; ${subcat} &middot; UID ${entry.uid}</div>
        </div>
        <div class="content-body">${formatContent(entry.content)}</div>
    `;
    contentDiv.scrollTop = 0;
}

function formatContent(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>')
        .replace(/(【[^】]+】)/g, '<span class="section">$1</span>')
        .replace(/^(\d+)\.\s/gm, '<br><strong>$1.</strong> ');
}

function doSearch(query) {
    const q = query.trim().toLowerCase();
    const allItems = document.querySelectorAll('.item-link');
    const allVols = document.querySelectorAll('.vol-node');
    const allSubcats = document.querySelectorAll('.subcat-group');

    if (!q) {
        // Reset visibility
        allItems.forEach(el => el.style.display = '');
        allItems.forEach(el => el.classList.remove('search-hit'));
        allVols.forEach(el => el.style.display = '');
        allSubcats.forEach(el => el.style.display = '');
        return;
    }

    // Show/hide items based on search
    let anyVisible = false;
    const matchedVols = new Set();
    const matchedSubcats = new Set();

    allItems.forEach(el => {
        const itemName = (el.dataset.item || '').toLowerCase();
        if (itemName.includes(q)) {
            el.style.display = '';
            el.classList.add('search-hit');
            matchedVols.add(el.dataset.vol);
            matchedSubcats.add(el.dataset.vol + '|||' + el.dataset.subcat);
            // Auto-expand the tree for matched items
            const itemsNode = document.getElementById('items_' + el.dataset.vol + '_' + el.dataset.subcat);
            if (itemsNode) itemsNode.classList.add('open');
            const subcatNode = itemsNode ? itemsNode.parentElement : null;
            if (subcatNode) {
                subcatNode.querySelector('.subcat-toggle .arrow')?.classList.add('open');
            }
            const subcatsParent = document.getElementById('subcats_' + el.dataset.vol);
            if (subcatsParent) {
                subcatsParent.classList.add('open');
                const volNode = subcatsParent.parentElement;
                if (volNode) volNode.querySelector('.vol-toggle .arrow')?.classList.add('open');
            }
        } else {
            el.style.display = 'none';
        }
    });

    // Hide empty subcategories
    allSubcats.forEach(el => {
        const key = el.dataset.vol + '|||' + el.dataset.subcat;
        el.style.display = matchedSubcats.has(key) ? '' : 'none';
    });

    // Hide empty volumes
    allVols.forEach(el => {
        el.style.display = matchedVols.has(el.dataset.vol) ? '' : 'none';
    });
}

buildTree();
</script>
