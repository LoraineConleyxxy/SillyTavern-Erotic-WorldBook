化妆品叠加使用时，受体会产生“身体内有两股力量在交战”的错觉——药效催情、意志克制，而调教者持续的侵犯恰好成为打破平衡的砝码，使得受体在崩溃边缘渐渐将调教者视为唯一的“支点”，诞生扭曲依存。", "uid": 824}, "阶梯式感官剥夺与肉体调教预告": {"content": "{阶梯式感官剥夺与肉体调教预告}\n简介：\n【场景/道具描述】\n调教者对受体进行的一种系统性精神施压手段，通过投影照片与语言详细描述未来数日的调教流程。包括：第一天封闭听觉视觉并戴上口枷头套，将受体变成只会口交和呻吟的肉偶；第二天拘束在带电动阳具的木马上，连续十二小时强制高潮，晚上再反绑在幽闭小屋中，以口塞连接的排泄管饲食。全部预告以清晰、冷静的口吻陈述，并辅以对应照片佐证。\n\n用法与交互细节：\n1. 调教者并不立即实施全部调教，而是先将“彻底兽化、变成母狗与肉便器”的未来图景赤裸裸地摆在受体面前，使其精神长期处于恐惧与焦虑中，此时调教者偶尔给予的“温柔瞬间”（如抚摸脖颈时的轻柔语调）会被无限放大，产生扭曲的安全感。\n2. 预告中不断强调“这是你不听话的后果”，将受虐的责任转嫁给受体自身，使受体在为了规避更残酷刑罚而选择顺从的过程中，逐渐形成“只要听这个人的话，就能获得相对舒适”的依恋逻辑。\n3. 当部分预告内容开始实施，调教者会在施刑中穿插安抚，比如在抽打后拥抱，在拘束中喂水等，使受体将调教者视为痛苦与解脱的唯一来源，最终从“害怕未来”转变为“害怕失去这个人的关注”，完成从恐惧到依附的纯爱畸变。", "uid": 826}, "监禁箱中的黑暗窒息转运": {"content": "{监禁箱中的黑暗窒息转运}\n简介：\n【场景/道具描述】\n调教者在完成初步凌辱与拍摄后，将受体强行塞入一个铺满泡沫塑料的巨大行李箱中，用胶带缠绕固定身体并封口，使受体在完全黑暗、空气稀薄、身体无法动弹的状态下被转运至秘密的监禁车间。箱内震动、闷热与窒息感会引发受体极大的恐惧与无助，最终导致昏迷。\n\n用法与交互细节：\n1. 箱中经历是“旧身份彻底剥离”的仪式——受体在被塞入箱子的前一刻仍保留着对调教者（混混）的蔑视与恨意，而从箱子中被释放、在陌生车间苏醒后，调教者的脸反而成为熟悉的参照物，在极端陌生的环境中，受体潜意识里会将施暴者视为唯一已知的存在，萌生畸形的依赖感。\n2. 从箱子中被捞出、被冷水泼醒的瞬间，调教者（或新出现的调教者）的出现与声音成为受体黑暗记忆结束的信号，这种“恐怖终结者”的角色错位，使受体在生理上对施暴者的靠近产生病态的安心感。\n3. 转运箱与后续出现的拘束、水刑等配合，构建出“只有服从才能避免再被关进箱子”的条件反射，当调教者以“只要听话就可以留在外面”为诱饵时，受体内心的防线开始松动，为了获得“不被关押”的恩赐而主动讨好，迈出扭曲献身的第一步。", "uid": 827}, "电椅与烧伤性器的惩罚与奖赏循环": {"content": "{电椅与烧伤性器的惩罚与奖赏循环}\n简介：\n【场景/道具描述】\n特制电椅，电极被精准放置在受体的乳头、阴蒂、小穴和肛门。电流可调节强度，能造成灼烧般的剧痛。疗程为3分钟电击与3分钟休息的循环，持续数十轮，直至受体皮肤烧伤。\n\n用法与交互细节：\n1. 受体被绑在电椅上，电极紧贴敏感部位。电击时，剧痛与灼烧感摧毁其意志，使其哭喊求饶。\n2. 在受体承诺“变成乖巧的母狗”后，调教者暂停电击，但要求受体跪地、自己玩弄烧伤的乳头和小穴，同时为调教者口交。\n3. 受体被迫吞咽多根肉棒的精液后，调教者会将肉棒插入其伤痕累累的小穴和肛门，用精液“浇灌”烧伤的嫩肉。这种痛楚与快感的混合，使受体在极端痛苦中体验到被占有的“满足”，从而扭曲地“原谅”施虐者。", "uid": 828}, "检测棒谬误：破处仪式的情色合理化": {"content": "{检测棒谬误：破处仪式的情色合理化}\n简介：\n【场景/道具描述】\n调教者脱去裤子后露出的粗壮肉棒，被催眠暗示扭曲为“深入检查的检测棒”，顶端凸起被描述为精密探头。整个破处过程被包装成“为成为优秀医生而必须接受的处女检查”。\n\n用法与交互细节：\n1. 当受体因害怕和疼痛而产生一丝拒绝时，调教者会以“不能因个人羞耻而放弃患者”的道德绑架加持催眠指令，令受体愧疚并主动分开双腿，恳请“检测棒”进入。\n2. 处女膜撕裂的剧痛被解释为“彻底放松与信任的训练”，后续逐渐涌起的快感则被扭曲为“身体通过学习接受了治疗”，破处后流淌的鲜血与精液混合物被视作师生间神圣的教学契约，受体在占有与疼痛中萌生“终于完全属于老师”的甜蜜归属感。", "uid": 830}, "丰胸催乳与挤奶献上疗法": {"content": "{丰胸催乳与挤奶献上疗法}\n简介：\n【场景/道具描述】\n调教者为受体注射特制催乳剂，使乳房急速胀大变敏感，并开始分泌奶水。之后每日定时进行挤奶，禁止受体自己擅自挤出，将哺乳行为扭曲成对“主人”的奉献仪式。\n\n用法与交互细节：\n1. 受体跪立挺胸，调教者拎起乳环拉扯乳房，将针头刺入乳晕注入药剂。注射过程中受体感到乳房灼热胀大，调教者边注射边揉捏，让痛苦与快感混合。\n2. 12小时后奶水分泌，调教者命令“每日定时来找我挤奶，不许自己擅自挤出”。受体在挤奶时被调教者把玩丰满的乳房，仅仅是想到奶水会被调教者饮下，就精神高潮眼冒金星。\n3. 受体对自己沉重的泌乳乳房既羞耻又自豪，认为这是治疗成果，挤出乳汁给调教者就像奉献爱意，产生扭曲的母性依恋。", "uid": 831}, "肛塞勋章与人格抹杀仪式": {"content": "{肛塞勋章与人格抹杀仪式}\n简介：\n【场景/道具描述】\n一枚精致的肛塞，被赋予了“高贵的勋章”这一扭曲含义。每当受体戴上它时，都需进行一段自我羞辱的言语确认仪式。\n\n用法与交互细节：\n1. 调教者在黑暗中抚摸受体的背脊，命令受体说出“肛塞是受虐者高贵的勋章，没有它，受虐者将一文不值”的屈辱台词。这一过程将一件纯粹的肛交道具，升华为受体唯一的价值来源与身份标识。\n2. 受体在说出台词时，内心虽被羞耻淹没，身体却因长期的条件反射而顺从地接受调教者的狎昵玩弄。这种由身体臣服引发的精神矛盾，被调教者视为“永不堕落的堕落之身”的核心要素。", "uid": 832}, "高级性爱人偶商品化与NTR剧本定制服务": {"content": "{高级性爱人偶商品化与NTR剧本定制服务}\n简介：\n将已堕落的受体作为搭载多段模拟人格的“高级人偶”明码标价出售，并为其量身定制恶堕剧本以满足买家的特殊癖好。在NTR向剧本中，受体被安排扮演买家曾经暗恋的女神，在仿造的男友面前一步步被调教成淫乱母狗，同时保持基础人格中对原主人的畸恋，形成多层撕裂的屈辱感。\n\n【场景/道具描述】\n场景通常为豪华会客室，调教者会向买家出示“使用手册”，并让受体当场展示舞蹈或服从性来促成交易。合同包含为期一个月的试用期和专属剧本定制服务，买家可以选择凌辱系、调教系、痴女系或NTR系，并提供暗恋对象过往的照片与资料。在NTR剧本中，会另找人员扮演受体的“男友”，安排多次接近真相却终究徒劳的桥段。受体全程被要求对买家保持冷淡抗拒的姿态，但身体必须百分百服从命令（如主动张开嘴接纳舌吻、用嘴唇为买家润滑菊穴等），以制造“心不属于你，身体却诚实被玩弄”的倒错快感。\n\n用法与交互细节：\n1. 买家可像点菜般指定剧本走向，调教者会实时记录偏好并调整剧情节奏，例如“让她初次在男友面前暴露身体”“在男友藏身的衣柜前强行高潮”等特化场景。\n2. 受体在服务买家时，会因基础人格中对原主人的爱恋而流露真切的厌恶与泪光，但这种不情愿反而被解释为“高级AI的真实感”，极大满足买家的征服欲。\n3. 剧本进行中，受体的身体被训练出对抗意志的反射——只要买家触碰或灌入命令，即使精神抗拒也会迅速流水、乳首挺立，最终在精神崩溃边缘体验到屈服带来的解脱感。\n4. 长期商品化服务可逐步解锁受体的更多人格切换权限，让同一具肉体在不同客人面前扮演痴女、冷艳女神、清纯学妹等截然不同的角色，彻底崩解原自我。", "uid": 833}, "牵丝傀儡人格覆写": {"content": "{牵丝傀儡人格覆写}\n简介：\n【场景/道具描述】\n一个预先构造好的虚构人生剧本，被称为一场“偶戏”。通过某种神秘波动或结界（如一所被改造的校园），使已经变为【堕落人偶】的受体在踏入特定“舞台”的瞬间，强制加载一段全新的、被精心设计的虚假记忆与纯爱人格。此刻的她不再是一个下贱的奴隶，而是化身为一个拥有青涩初恋、笨拙爱情故事的纯真少女“何晓雨”。这是一场调教者为满足自身扭曲美学而上演的爱情剧。\n\n用法与交互细节：\n1. 调教者先搭建好“舞台”与“布景”，创造一个与外部隔绝的戏剧化环境。\n2. 处于奴役状态的受体（此时满身淫液，意识淫荡），在踏入舞台的瞬间，作为奴隶的淫秽记忆会被迅速“淡去”，被云层遮掩。\n3. 她的思绪会变得混沌，随即一段虚假但动人的纯爱历史强行植入。这段记忆包含了与指定男主（可能是另一具人偶）从陌生到暗恋、告白、甜蜜交往的完整恋爱日记，充满了牵手、对视、制作“友谊相册”等纯爱细节。\n4. 受体的人格会随之切换，从下贱的性奴隶无缝转变为清纯、害羞的少女恋人，进入这场“青春、爱情与背叛”的偶戏，而她本人对此的违和感为零，以一种扭曲的形式实现了调教者所设定的“纯爱”。", "uid": 834}, "镜中自窥的堕落认知重构": {"content": "{镜中自窥的堕落认知重构}\n简介：\n【场景/道具描述】\n在受体以最下流、最耻辱的姿态被激烈性交时，通过附近的一面全身镜，强迫她亲眼目睹自己被支配的全貌。镜中的景象与她脑海中残留的自我认知形成剧烈冲突，这种冲突带来的快感会进一步将她推向高潮，迫使她在认知层面彻底接受自己“下贱雌畜”的新身份。\n\n用法与交互细节：\n1. 场景发生在一面全身镜前，受体正如同发情的雌畜，高高翘起臀部，承受着身后的疯狂冲击。\n2. 在快感中，她扭过头，视线不自觉地被镜中景色吸引。镜中映出的，不是一个清高优雅的女性，而是一个摆出最下流姿势、一脸淫荡地承受蹂躏的堕落形象。\n3. 她被迫在镜中审视自己媚态百出的扭曲面孔。本应端庄的嘴唇正吐露着“好舒服”、“再用力”等淫语，这种视觉上的强烈反差会与肉体的快感叠加，形成立体的自我羞辱。\n4. 最终，在这种自我审视的极度羞耻中被送上高潮，她会双眼失焦、舌头外露、面露痴傻，完成从“看到自己堕落”到“认知自己堕落”的精神重构，从而在事后能更平静地接受自己的处境。", "uid": 835}, "被迫纯爱之吻·双重关系的扭曲沉溺": {"content": "{被迫纯爱之吻·双重关系的扭曲沉溺}\n简介：\n【场景/道具描述】\n在眼罩考核或类似场合中，调教者会创造让受体与恋人亲密接触并同时被侵犯的环境。比如在眼罩考核中，命令恋人“像对待珍宝一样温柔”地抚摸受体脸颊，当恋人手指碰上滚烫肌肤时，调教者在受体身后用肉棒缓慢研磨小穴深处，迫使受体在恋人触摸下压抑呻吟。\n\n用法与交互细节：\n1. 调教者以“不照做我就揭穿你”相威胁，让受体在即将暴露的恐慌中主动献吻。恋人被甜蜜冲昏头脑，深情吮吸时，受体一边承受体内凶器搅动，一边用舌尖回应恋人，久而久之竟将“被侵犯的快感”与“恋人的温柔”在神经回路中绑定。\n2. 随着调教次数增加，受体开始期待这种“双重快感”：只有在被调教者抽插时，与恋人的亲吻才更加炙热，高潮也更猛烈。一次，在与恋人约会时，受体竟主动将手伸到桌下，默默想象身体被身后的“无形存在”侵入，迎来与恋人对话时的隐秘绝顶。\n3. 终局，受体在结婚前夜主动找到调教者，穿上婚纱请求在洞房前“最后一次训练”，哭泣着说：“我已经分不清自己是因为爱他才离不开你，还是因为离不开你，才能继续爱他。”调教者轻笑着掀起头纱，将她重新摆弄成牵丝傀儡姿势，完成三人扭曲共生的最终奠仪。\\n\\n【包含类似变体】：眼罩下的背德考核·恋人共犯的恶堕仪式, 定制囚衣·假面舞会的公开调教游戏", "uid": 836}, "活体人偶的伪装性交与身份遮蔽": {"content": "{活体人偶的伪装性交与身份遮蔽}\n简介：\n【场景/道具描述】\n教室储物间内，藏着数具与受体面容、身材几乎一模一样的逼真性爱娃娃。当调教者正在与受体交合时，男友突然闯入。那一瞬间，受体被迫停止所有主动动作，眼神放空、肢体僵硬，仿佛变成了一具没有生命的玩偶，任由交合继续。男友误以为那只是一具娃娃，调教者事后以“脸模兼职”的借口搪塞过去。\n\n用法与交互细节：\n1. 调教者利用事先准备的娃娃作为掩护，训练受体在交合中随时“切换”为无机质的娃娃状态——包括控制呼吸、不眨眼睛、肌肉松弛但不瘫软。这是对受体身体掌控力的极致控制。\n2. 当男友站在眼前，受体一边承受着调教者持续的抽插，一边必须保持面部毫无波澜。任何一丝呻吟、颤抖都会暴露自己是真人。这种在爱人视线下扮演物品的体验，将受体的自尊彻底碾碎，却也催生出“被看见又未被认出”的背德快感。\n3. 事后调教者轻描淡写地用“艺术与兼职”向男友解释，而受体也配合演出，整理衣物后若无其事地出现。这种共犯式的欺瞒，让受体与调教者之间建立起一种扭曲的、只有彼此知晓的秘密纽带。", "uid": 837}, "群体认知剥夺与白浊丝线的寄生传播": {"content": "{群体认知剥夺与白浊丝线的寄生传播}\n简介：\n【场景/道具描述】\n一种从“母体受体”子宫内生成的浊白色丝线状寄生物。这些丝线极细且难以察觉，它们能够从受体的阴道钻出，悄无声息地通过肢体接触或空气传播，侵入其他女性目标的体内，并潜伏在其感官深处。\n\n用法与交互细节：\n1. **群体快感的同调共鸣**：被丝线寄生后的女性们共处一室时，所有成员的感官会被链接。只要其中一人（通常是母体）被侵犯或产生快感，其他人也会同步地感到大腿间传来的莫名瘙痒、脸颊发烫、乳尖挺立等“发情前兆”。大家互相以为对方是喝醉了或生病，实则所有人都被拖入了群体发情的深渊。\n2. **扭曲的纯爱分享与姐妹情谊**：母体在潜意识中将这种“分享快感”视作是对闺蜜们的爱。众人围坐闲谈，双腿却必须用力并拢忍耐快感；举杯共饮时，饮下的其实是母体足下产出的白浊精饮。这种在表面纯洁的友谊下，共享肉体欢愉与绝望的隐秘羁绊，形成了畸形的“共犯者同盟”。", "uid": 838}, "毕业作品：感官剥夺下的终幕3P与体液印记仪式": {"content": "{毕业作品：感官剥夺下的终幕3P与体液印记仪式}\n简介：\n【场景/道具描述】\n作为一部AV影片的最终幕，受体被剥夺双重感官——口戴鲜红色口球（剥夺言语能力）、眼遮黑色布条（剥夺视觉），赤裸站立于软垫之上，被多名男优进行激烈的3P贴身肉搏。影片的落幕镜头是精液灌入口腔后吞咽的特写，以及黄尿淋洒在仰躺躯体上作为“雄性印记”的最终画面。\n\n用法与交互细节：\n1. 感官剥夺使受体无法预判下一次进入来自哪个方向、哪个孔洞，完全处于被动承受的状态——视觉被遮断后，触觉与听觉被急剧放大，每一次肉棒的撞击都变得更加剧烈而不可预期。\n2. 口球使受体只能发出含混不清的呜咽，无法用语言表达快感或痛苦，这种表达能力的丧失反而让受体更深地沉浸于内部感受，每一次快感冲击都更加纯粹。\n3. 影片以精液吞咽与尿液淋洒作为谢幕仪式：精液代表“被占有”，尿液代表“被标记”——受体的身体被雄性体液从内到外彻底浸透，象征着其女性身份被完全覆盖在雄性印记之下。\n4. 拍摄结束后，受体拒绝清洗身上的精液，说出“我想就这样回去”的糟糕心声，这种将体液作为勋章保留的冲动，标志着其对被支配身份的彻底接纳与扭曲的骄傲感。", "uid": 839}, "子宫受孕特化的伪纯爱重逢与空虚轮回": {"content": "{子宫受孕特化的伪纯爱重逢与空虚轮回}\n简介：\n【场景/道具描述】\n基于调教者与受体之间扭曲的亲子/宿敌关系（调教者从受体子宫中重生），调教者对受体的生殖系统进行了专门改造，营造一种带着背德感的“纯爱重逢”假象。\n\n用法与交互细节：\n1. 调教者将人格凝胶制成安全套的形状，佩戴在自己的肉棒上。当再次插入受体无意识的肉体，并顶破新生的处女膜时，受体的灵魂会被这股冲击拉回肉体，短暂地恢复意识，恢复的五感让她误以为自己从地狱般的虚无中获救了。\n2. 在这个宝贵的、短暂的清醒时刻，受体能观测到调教者的脸、闻到他身上的味道、感受到被火热的肉棒填满的鲜活感。此时，与黑暗虚无相比，这种“被使用”的感觉显得无比幸福，她会短暂地产生一种“只有他配做我的主人”的斯德哥尔摩式甜蜜错觉。\n3. 但身体的规则不会改变，当抽插开始或试图追寻高潮时，灵魂会再次被强制剥离，重新坠入无尽黑暗与潜意识噩梦。这场“重逢”只是一次短暂的怜悯，紧随其后的是更深刻的失去感。在无数次轮回中，受体彻底明白自己只是一个供调教者玩弄的甜点，并在彻底绝望中异化出以等待这短暂的相逢为精神支柱的扭曲依恋。", "uid": 840}, "极限服从状态下的自白测试——强制袒露隐秘性癖的羞耻问答": {"content": "{极限服从状态下的自白测试——强制袒露隐秘性癖的羞耻问答}\n简介：在极度接近高潮、理智崩溃且无法撒谎的特殊精神状态下，对受体进行的强制性问答环节。这不仅是从意志上剥夺反抗，更是让她亲自在众人面前解构自己最后残存的羞耻心，并将扭曲的性幻想确认为真实自我的过程。\n\n【场景/道具描述】\n在摄影棚或调教室的公开场合，受体沐浴在聚光灯和众人舔舐般的视线中。她刚刚经历了身体数据的公开测量，乳头、阴蒂上甚至用马克笔写着尺寸数据。此刻处于发情状态，敏感度极高，调教者利用道具或命令让她始终维持着无法高潮的绝望边缘。\n\n用法与交互细节：\n1. 在受体因为欲望无法宣泄而痛苦不堪时，调教者开始提问，内容涉及她内心最隐秘、最难以启齿的性癖。受体结结巴巴，必须强迫自己当着陌生人详细陈述，例如：渴望被弱者凌虐、幻想子宫被填满、极度迷恋排泄失控的感觉。每答出一点，都是在用自我厌恶的刀刃切割残留的自尊，但随之而来的生理快感却又无可救药地放大了。\n2. 问答结束后，接着是“公开自慰检查”，要求受体验证自己的供述。她必须在众人眼皮下，用最极端、最羞耻的方式自慰，并依次让喉咙、乳头、阴蒂、小穴、尿道、菊穴和子宫等七个部位单独达到高潮。这种将誓言彻底肉身化的过程，让她从灵魂深处被迫接受了自己就是那个“肮脏下流的变态”，并在内心深处开始把这种被支配的绝望安全感，错认为是主人给予的畸形“接纳”。", "uid": 841}, "奇迹公司的高塔与全球支配仪式": {"content": "{奇迹公司的高塔与全球支配仪式}\n简介：\n【场景/道具描述】\n奇迹公司高塔顶层的穹顶巨型屏幕，播放“奇迹”景象（瘫痪者站起、枯树开花、荒漠涌泉）。塔内水晶矩阵与银紫色光芒倾泻而下，淹没城市街道。佩戴奇迹徽章的人群聚集，或狂热高呼“奇迹即现实”，或眼神空洞机械重复口号。第三街区反抗者被银紫色光丝缠绕后，肉体转化为无力的雌奴，穿上紫色制服，齐声低语“奇迹…… t": "{灵魂重塑与强制女体化}\n简介：\n【场景/道具描述】\n支配者通过高位魔族魔法直接干涉受体的灵魂，并将其肉体彻底重组成与之匹配的女性形态。这个过程不仅改变性征，还会使肌肉力量、骨架乃至声音完全女性化，彻底抹除原本男性的一切痕迹。受体在镜中看到的自己已是一个盛装少女，毫无破绽。\n\n用法与交互细节：\n1. 支配者以“只是稍微玩弄一下灵魂”的轻描淡写口吻实施改造，受体在极短时间内失去握剑的力量，身高缩减，发丝延长，沦为柔弱的雌性躯体。\n2. 改造后的身体天生就具备高度的性感带，原本身为男性的意识被禁锢在极度敏感的女体内，为后续的调教和恶堕打下生理基础。\n3. 受体被迫穿上华丽的女装，在镜前被支配者从背后抱紧、抚摸全身，通过镜像的认知冲击逐步击溃性别认同，令其潜意识中开始接受“自己已是女人”的事实。", "uid": 856}, "斯德哥尔摩式定期发情契约": {"content": "{斯德哥尔摩式定期发情契约}\n简介：\n【场景/道具描述】\n调教者通过催眠与淫纹下达长期命令：受体必须每周固定时间寻找调教者报到，否则将陷入强制发情，无法自控地在公共场所疯狂自慰。该命令将保护与惩罚、依赖与恐惧融合，创造强制性的定期亲密接触。\n\n用法与交互细节：\n1. 调教者以“一定要来喔，不然就会发情不断自慰”的温柔口吻下达残酷指令，并暗示“你搞不好也喜欢这样”。\n2. 受体表面拒绝，但淫纹在命令时闪烁表示刻印完成，将逃离的威胁（公开自慰）与唯一的解决方案（回到调教者身边）捆绑。\n3. 这一契约迫使受体在一次次定期报到中不断接受调教，逐步将被迫的性行为内化为“被爱”与“被需要”的扭曲幸福感。", "uid": 857}, "员工福利式公开调教打赏规则": {"content": "{员工福利式公开调教打赏规则}\n简介：\n【场景/道具描述】\n在名为“欲望酒馆”的教团控制设施内，存在着一种扭曲的“小费打赏”规则。顾客若觉得服务生服务周到，便可以赠送“特殊玩具”作为小费。这些玩具包括：吸盘式乳头按摩器、无线遥控跳蛋以及由小至大的拉珠串。服务员必须无条件接受这些塞入体内的“礼物”，并继续面带微笑地完成服务工作。\n\n用法与交互细节：\n1. 调教者打着“打赏”的名义，将按摩器吸附在受体被迫掀起的胸部乳头之上，将数颗大号跳蛋一颗接一颗强行塞入受体毫无遮蔽的小穴，最后将一串拉珠逐颗推进受体的后庭，直至只留一个拉环在外晃动。受体虽被塞满到双腿发软，但催眠指令迫使她不能取出，必须夹紧双腿，在体内充满异物碰撞与震动的情况下继续点餐、传菜。\n2. 整个过程被伪装成正常的商业互动，周围的被催眠服务生对此熟视无睹，而受体必须独自承受在公共场合体内被填满、随时可能因震动而崩溃的屈辱。当受体因快感在客人面前失态喷溅、甚至掉出跳蛋时，仅存的羞耻心会彻底被击碎，而调教者则将其视为极为愉悦的观赏景观。\n3. 这种制度将“服务好评”与“性屈辱”深度绑定，让受体在被迫的劳作与持续高潮的间隙中，体验到自我控制感被逐步剥夺的无助，同时身体在持续的刺激下逐渐习惯并产生生理反应，加剧了内心的羞耻与矛盾。", "uid": 858}, "全感官同步魔装双头龙对决": {"content": "{全感官同步魔装双头龙对决}\n简介：\n【场景/道具描述】\n一种极具侵略性的魔法假阳具——“魔装双头龙”。调教者将其插入自己身体后，道具会像真实器官一样与使用者紧密贴合，并将其前端的高速旋转与内部的快感增益完整传导给使用者。同时，当另一端侵入受体的身体时，它又会将受体小穴内的紧致、湿润、抽搐等所有细微触感，毫无保留地实时同步反馈给调教者，实现双向全感官链接。\n\n用法与交互细节：\n1. 在调教过程中，调教者将这个尺寸远超寻常的魔导器粗暴地贯穿受体的阴道，甚至直接突破子宫口深入子宫，将内部撑成完全贴合的形状。受体在意识模糊中被彻底贯通，物理上完全变成了套在对方下体上的一个“人形飞机杯”。\n2. 调教者开始大力抽插，利用反馈感官精准地攻击受体体内的每一个敏感点。当双方都迎来高潮时，爱液从结合处喷涌而出，被收集在杯子中成为后续戏弄的饮品。由于调教者也能同步感受到极乐，这种侵犯被扭曲成了一种“双向奔赴的绝顶”，调教者会在事后感叹受体带来的极致快感，并表达出想要一直拥有受体的占有欲。\n3. 这种道具模糊了单方面侵犯与性爱合意的边界。受体的身体彻底变成对方的形状，而在意识崩溃之际，由于感官同步，她会感受到对方同样因为她的身体而高潮，这为后续扭曲的“纯爱依赖”埋下伏笔——即“只有我的身体能给对方带来如此快乐，我是被需要的”。", "uid": 859}, "扭曲的宿敌求偶宣言与命中注定的性改造": {"content": "{扭曲的宿敌求偶宣言与命中注定的性改造}\n简介：\n【场景/道具描述】\n调教者（怪人/宿敌）在与受体进行性爱战斗时，会不断输出各种直白且理直气壮的迷恋话语，例如“遇到喜欢的人就要得到手”、“你就是我命中注定的一对”、“只有我能让你爽到升天”。这并非单纯的嘲讽，而是一种强调生理契合度与宿命感的扭曲爱意表达。\n\n用法与交互细节：\n1. 在侵犯过程中，调教者不断通过言语洗脑，将强迫性的性行为解释为一种由于受体太过“可爱”与“色情”而无法抑制的爱慕行为。她一边用双头龙贯穿子宫，一边宣称这是为了让受体变成“我的女人”或“我的队友”。\n2. 当受体因为生理刺激而达到绝顶，露出无法反抗的无力姿态时，调教者会将此解读为“我们果然很合得来”，并在结束时留下充满占有欲的纸条（写明“爱你的芭法”），将单方面的凌辱美化为一场甜蜜的约会。\n3. 这种设定是恶堕转向畸恋的关键。受体在被玩弄中失去了作为男性的自尊，而调教者不断灌输的“命中注定”与“因为你性感我才上你”这种兽性单纯的爱意逻辑，会让大脑混乱的受控者在精疲力尽之后，潜意识里将极度的快感与强烈的被占有感，错误地认知为一种被珍视的扭曲幸福感，从而开始对留在调教者身边产生迷茫与依赖。", "uid": 860}, "社交圈正常化直播调教": {"content": "{社交圈正常化直播调教}\n简介：\n【场景/道具描述】\n受虐者发现自己戴上口球、项圈，被束缚着生活的照片和视频，在施虐者的朋友圈和社交媒体上被正常分享。从日常外出吃饭被喂食，到被牵引链栓着，所有原本属于私密的调教场景，都被包装成一种 “好看的”、“亭亭玉立的” 日常生活进行展示。施虐者甚至鼓励她将其作为朋友圈动态发布。\n\n用法与交互细节：\n1. 认知溶解，受虐者在翻阅自己的社交账号时，对照片中自己戴着口球、项圈的“好看”形象产生了一丝认同感，甚至产生了主动发布到朋友圈去“验证一下别人是否觉得奇怪”的冲动。这标志着她内心的抗拒已被慢慢磨平，开始从虐恋视角审视和接纳自己。\n2. 调教直播化，快递开箱、上新装备（如单手套、更高跟的鞋）的过程都带有一种日常vlog的感觉。受虐者明明害怕新的调教道具，但在某种无形的威逼利诱下，依然会打开包裹，进行试穿和展示，将恐惧化和为一种取悦施虐者的表演内容。\n3. 现实扭曲力场，整个世界的社会规范似乎发生了微妙的扭曲，周围所有人对发生在她身上的拘束、口塞和公开调教都习以为常，甚至觉得这“很拉风”、“值得炫耀”，将她推向一个叫天天不应、叫地地不灵，只能被动适应并最终沉沦的孤立境地。\\n\\n【包含类似变体】：日常拘束下的朋友圈展示与社会认同陷阱, 朋友圈社交实验与恶堕认同, 社会性恶堕与朋友圈公开, 认知扭曲的拘束日常, 朋友圈照片调教（社交认可与自我物化）, 朋友圈公开与自我认知扭曲, 口球与项圈外出调教（社交性拘束）", "uid": 861}, "上锁的高跟鞋与机关束腰的羞耻识破": {"content": "{上锁的高跟鞋与机关束腰的羞耻识破}\n简介：\n【场景/道具描述】\n受虐者日常穿着经过伪装的拘束衣物，这双高跟鞋在脚踝系带内嵌入了金属片与可收紧的锁扣，使其一旦穿上就无法轻易脱下。不仅如此，她的外衣下还紧缚着一件机关束腰，强行将腰肢塑造成挺拔的姿态。这些隐藏的“枷锁”让她在不经意间摔倒后，被施虐者敏锐地通过触感与观察识破了秘密。\n\n用法与交互细节：\n1. 受虐者在公共场合因鞋跟断裂摔倒，施虐者借机检查时，触及其小腹发现了束腰的坚硬触感，并拿起断裂的高跟鞋，捏压系带内的金属片与锁扣，当场揭穿其渴望被束缚的本性。\n2. 受虐者从极度慌张、试图掩饰到最终被识破的过程，产生了强烈的羞耻感与精神释放，这种在仰慕对象面前暴露“变态”爱好的反差，激发了双方更深层次的链接。", "uid": 862}, "活体锁定式口塞循环": {"content": "{活体锁定式口塞循环}\n简介：一套拥有强制锁定机制的口腔拘束系列，包含口球、开口器与封口罩，一旦戴上便如同长在身体上无法取下，需等待“快递”送来下一件物品才能替换，形成无法挣脱的循环。\n【场景/道具描述】\n红色或白色的硅胶口球通过扣带固定在脑后，平时可以勉强顶出说话；但在关键时刻，它会突然收紧到无法活动，即使用手也拔不出。后继的开口器像牙医工具一样卡住牙齿，彻底撑开嘴巴，并被一个封口罩盖住。所有道具的锁扣都难以发现，仿佛与血肉融合。\n\n用法与交互细节：\n1. 受虐者试图在演讲前取下口球，舌头和手均无法撼动，最终口罩意外脱落，口球暴露在数百人面前。\n2. 在旧道具被“解禁”的瞬间，新的开口器会立刻塞入替换，维持口腔永远被撑开的羞耻状态。\n3. 封口罩只允许饮用流体，连豆腐都无法咀嚼，受虐者被迫用舌头搅拌汤水喝下，时刻感受牙齿被固定的不自由。\n4. 在10分钟内裸体抵达调教者家中接受治疗。违反了这一规则，调教者的神情会产生令人胆寒的变化。\n2. 连续多日注视红光后，受体即使没有直视红光，也会在深夜莫名心慌、做被血红色眸子窥视的噩梦。最终，只要红光闪烁，受体的身体便会先于意识产生期待，下体微微湿润，主动走向调教者的住所，完成一种心理上的自缚。\\n\\n【包含类似变体】：窗口红光的催眠召唤仪式", "uid": 980}, "伪·医疗道具开发术——阴蒂金属震动环与乳尖调理乳环": {"content": "{伪·医疗道具开发术——阴蒂金属震动环与乳尖调理乳环}\n简介：\n【场景/道具描述】\n一套伪装成医疗仪器的调教道具，包括一枚可调节松紧的阴蒂金属环（环下坠有震动小球）与一对带细小金属圆珠的穿刺乳环。金属环通过遥控器控制多档震动频率，乳环则可通过开关启动微震。它们被宣称为“阴蒂刺激疗法”和“乳尖调理疗法”的必需仪器，由调教者在受体清醒或浅催眠状态下亲手佩戴，作为女性身体被物化、标记化与日常化操控的象征。\n\n用法与交互细节：\n1. 佩戴阴蒂环时，调教者剥开受体敏感的阴蒂包皮，让冰冷的金属环箍住勃起的阴蒂。初次扣合的瞬间，肿胀、冰凉与羞耻感交织，受体在“这只是疗法的轻微痛感”催眠暗示下强制放松。随后打开遥控器，小球以低档持续震动，迫使受体在公开场合（如睡眠、独自在家时）时刻处于发情状态，自主揉弄小穴却归咎于“阳光太热烈”。\n2. 乳环穿刺时，调教者用镊子捏住硬挺的乳头，将尖细的银环穿透乳尖，血珠渗出之际，受体因疼痛而出声惨叫，但调教者以“忍一忍，这是为了让身体更健康”安抚。环上的细小圆珠在震动中持续刺激乳头，受体很快从刺痛中感受到快感，陷入“痛苦都为了治疗，快感是康复的征兆”的认知扭曲。\n3. 道具全程不离体，成为身体的一部分。受体在早晨被震动环唤醒后，下意识摩挲双腿；当调教者上门治疗时，阴蒂环在开门的瞬间因步态而摇摆，引发蜜穴泛滥，受体主动引领调教者求欢，声称“需要治疗来释放积累的欲望”。道具标记下的日常，彻底模糊了痛苦与依赖、医疗与调教的边界。\\n\\n【包含类似变体】：强制催眠指令：渐进式服从阶梯, 强制服从催眠——身体被夺的屈辱, 催眠医患契约与声音诱导, 触摸快感疗法——用高潮摧毁羞耻与理智, 绝对服从与渐进式抵抗剥离, 奴隶学生角色扮演——项圈与口舌侍奉中的纯爱错乱, TS魔法少女的败北净化与受孕级子宫快乐调教, 扮演型人格覆写：“奴隶学生”的服从与侍奉, 体液规训：爱液与唾液的精神污染, 战斗认知扭曲与催眠宿敌恋爱, 催眠唾液与本能唤醒, 粉色眼眸催眠支配术, 催眠之眼与渐进式指令, 使命驱动的高潮幻觉与幸福净化, 强制姿势催眠支配, 治疗伪装下的身体支配与敏感度开发, 催眠触摸导入与信任植入仪式, 心理治疗的伪装与认知修改陷阱, 被篡改的使命催眠, 催眠战斗妄想, 魅药唾液与强制发情, 医患调教的终极扭曲——以治疗之名行占有之实, 心理医生伪装与催眠治疗——医患信任的恶意构建, 催眠认知扭曲治疗法——医疗外衣下的恶堕调教仪式", "uid": 981}, "被改写意识的精神挣扎与理性肉芽": {"content": "{被改写意识的精神挣扎与理性肉芽}\n简介：\n【场景/道具描述】\n受体在深度催眠后，其意识被分裂为“绝对信任调教者的感性”与“保留一丝警醒的理性”。当受体通过穿越前留下的定时短信、录像等证据，发现自己被催眠的事实时，其内心上演了一场激烈的认知战争。\n\n用法与交互细节：\n1. 抗拒证据：感性思维激烈抵触一切不利于调教者的证据，将其解释为恶作剧或误解，甚至在查看证据后感到懊恼与自责：“如果她当初没有打开这些物品……她就还可以继续相信医生”。\n2. 绝望的思考：理性用“知道狗粮有问题却忍不住吃的小狗”比喻来形容精神被控制的无力感。身体和情感强烈渴望着被调教者虐待与操控，理性却清楚地知道这是有害的。\n3. 妥协与沦陷：最终，理性只能与“想要继续接受治疗”的感性达成脆弱协议，通过闹铃、字条等外部工具进行自救，但内心深处已承认自己无法抵御被支配的诱惑，开始借用“这是为了治疗，为了获取情报”等理由，为再次回归的恶堕行为合理化。\\n\\n【包含类似变体】：理性囚笼：分裂意识中的恶堕观测者", "uid": 982}, "完美爱情的奴役誓言——隐秘爱人催眠程序": {"content": "{完美爱情的奴役誓言——隐秘爱人催眠程序}\n简介：\n【场景/道具描述】\n一种结合了语言引导、眼神对视、肉体触碰和特制场域的催眠程序。调教者通过引导受体想象走下心灵阶梯，使其意识进入毫无防备的潜意识深处，随后将“完美爱情”的理想概念与完全奉献的服从行为进行强制绑定，最终让受体宣誓成为永不背叛、全心取悦调教者的“隐秘爱人”。\n\n用法与交互细节：\n1. 调教者用温柔的声线引导受体闭眼放松，想象自己一步步走入潜意识深处，使其呼吸心跳都追随声音的节奏，理智脱离，只剩本能。\n2. 在催眠状态下，调教者将“忠诚、信任、尊重、奉献”等爱情要素逐一询问，引导受体自愿承诺献出自己的唇舌、手足、乳房、小穴、肛门乃至所有快乐、痛苦和隐秘欲望。每一句承诺都像灵魂烙印般刻入心灵深处。\n3. 宣誓完成后，受体眼中的调教者自动化为“主人”与“爱人”的形象投射。之后在侍奉中，受体始终处于矛盾的命令撕扯之下——身体极度兴奋却必须保持庄重，渴望高潮却必须自我克制。受体将此视为爱情的考验，从这种对主人指令的绝对服从和虚假的高潮表演中，体验到灵魂融化的强烈精神满足。\\n\\n【包含类似变体】：催眠烙印·隐秘爱人（强制爱恋与记忆滤网）", "uid": 983}, "欲望之源·被驯服的堕落意志": {"content": "{欲望之源·被驯服的堕落意志}\n简介：\n【场景/道具描述】\n这是一种通过自身体悟觉醒的“专属规则”级能力，本质上是将曾被洗脑人格操控的、失控的堕落欲望，用强大的意志力“驯服”并收为己用。在濒临彻底崩溃的边缘，真实人格耗尽力量，在系统的辅助下激活此项规则。激活的瞬间，所有狂乱的欲望仿佛被无数锁链束缚，虽然依然存在于体内，但再也无法挣脱理性的控制。这不仅是一次意志的胜利，更让受体拥有了在极致的淫欲中保持一丝清醒的能力。\n\n用法与交互细节：\n1. 在洗脑人格操控受体用马桶刷疯狂抽插、高声庆祝胜利的时刻，真实人格捕捉到一瞬间的松懈，向系统喊出“我选择欲望之源！”。\n2. 激活后，身体内抽送的异物感骤然“停滞”，如山的意志压下欲望洪流。受体可以冷静地看着自己狼藉下体上的鲜血，内心只有劫后余生的清晰和坚决。\n3. 这种能力构成了“扭曲纯爱”的悖论基础：受体依然保留着高度敏感、善于享乐的肉体和被调教过的嗜好，却可以清醒地说“不”。这使得与调教者之间的互动变成了清醒的沉沦，受体每一次选择留下、每一次选择服从都出自“自由意志”，让调教者获得了比单纯催眠更高层次的征服感——“我知道你随时可以走，但你选择了我。”\\n\\n【包含类似变体】：畸爱项圈佩戴仪式与爱奴的献身誓言, 欲望之源——扭曲的纯爱克制天赋, 催眠暗语「我的隐秘爱人」与虚拟爱奴人格, 深层意识的祝福与诅咒之种, 虚拟人格记忆融合与自我伪装的终极技巧, 轮回池·洗脑记忆强制重现与人格撕裂系统, 淫纹种子与永恒边缘快感", "uid": 984}, "强制洗脑与人格覆写装置": {"content": "{强制洗脑与人格覆写装置}\n简介：\n【场景/道具描述】\n在一个充满幽蓝溶液的实验室中，受体被束缚在特制的座椅上，头部佩戴着一顶臃肿的头盔。无数细小的导线从头盔伸出，连接到受体的头皮感应点上。泛着幽幽蓝光的溶液浸泡着身体，四肢和躯干被特殊拘束器紧紧固定。控制台上，一个代表着记忆覆写程度的淡紫色进度条缓慢跳动。\n\n用法与交互细节：\n1. 洗脑仪通过高精度脑电图扫描器和生物分子操作器，对大脑神经网络进行重新编程。它直接向大脑输入大量淫邪的记忆和指令，强制覆盖受体原本的意识。\n2. 植入的记忆包括：从懵懂少女时期就被调教者引导、渴望被支配、最终成为绝对服从命令、崇尚排泄与渴求饮精的性奴的全套人生经历。\n3. 覆写过程伴随着剧烈的头痛，受体不得不在痛苦中主动追求机械带来的快感以寻求缓解。进度条从淡紫色变为深紫，当达到100%时，受体的人格被彻底重塑，瞳色会永久变为魅惑的紫色，并会在下腹形成紫色的“情欲之痕”淫纹。", "uid": 985}, "集体精油按摩——人形娃娃的高潮洗礼": {"content": "{集体精油按摩——人形娃娃的高潮洗礼}\n简介：\n【场景/道具描述】\n旅馆提供“特殊按摩服务”，多名女服务员在催眠暗示下将其当作普通按摩，实际是将受体赤裸放置床上，用特制精油涂抹全身并以手指、毛笔等仔细爱抚所有敏感点。服务中还包括将精油灌入小穴和菊穴，最后在同时刺激所有弱点后迫使受体在众人注视下激烈高潮。\n\n用法与交互细节：\n1. 受体醒来发现自己被女服务员包围，赤裸身体被多双手同时揉捏乳房、大腿内侧、臀瓣，冰凉的精油被倾倒在乳头上，再由手掌抹开，催情火热感逐渐扩散。\n2. 两名服务员分别将手指伸入小穴和菊穴，配合毛笔精准攻击阴蒂，肉体被完全开发。调教者更直接按压G点，让受体羞耻的娇吟无法抑制。\n3. 多人协作迫使受体登上顶峰后，将剩余溢出的精油用手指推回穴内，并用催眠命令“好好夹紧”锁住子宫，让受体载着满满一腹媚药瘫软床上，并植入“每天都要来”的暗示，使其沦为满足支配者恶趣味的活玩具。\\n\\n【包含类似变体】：媚药精油与子宫灌封——永久敏感化改造, 心灵抚慰精油：肉体开发的催眠烟雾, 990}, "苗床化与神智清除": {"content": "{苗床化与神智清除}\n简介：\n【场景/道具描述】\n一排躺椅，固定着十几名挺着大肚子的孕妇，神色茫然，靠营养液维生。她们已被媚药和魔法烧坏神智，仅剩苗床价值。\n\n用法与交互：\n1. 通过长期使用媚药和魔法，逐步清除奴隶的神智，使其进入持续恍惚状态，仅保留基本生理功能。\n2. 固定于躺椅，持续输入营养液维持生命，同时定期人工授精或植入胚胎，使其成为永久性苗床。\n3. 奴隶不再需要指令或交互，完全成为被动工具，其存在意义仅为孕育和产出。", "uid": 991}, "强制兽交与精液魔力转化": {"content": "{强制兽交与精液魔力转化}\n简介：\n【场景/道具描述】\n受虐者被魔犬等兽类强制交配，精液被子宫吸收并转化为魔力，同时犬类阴茎的倒刺延长交配时间，强化刺激。\n\n用法与交互：\n1. 施虐者利用受虐者无法反抗的状态，引入兽类进行交配，强迫其吸收精液以补充魔力或营养。\n2. 受虐者在长时间的高潮中学习接受非人伴侣，降低对交配对象的挑剔。\n3. 可作为惩罚或训练环节，使受虐者将精液视为必需资源，形成依赖。", "uid": 992}, "触手领域与救援调教": {"content": "{触手领域与救援调教}\n简介：\n【场景/道具描述】\n受虐者的同伴（或施虐者）被触手怪物的领域困住（如车站被触手覆盖），受虐者需克服恐惧，使用自身力量（如变身、剑刃）闯入救援。\n\n用法与交互：\n1. 施虐者设定救援时间限制，受虐者必须在规定时间内突破触手防线，否则同伴将遭受惩罚（如被触手侵犯）。\n2. 受虐者需在战斗中保持冷静，触手攻击会触发身体敏感反应（如快感干扰），施虐者可通过触手力度与频率控制受虐者的表现。\n3. 成功救援后，施虐者给予奖励（如解除敏感化、给予掌控感），强化受虐者对力量的正面联想。\\n\\n【包含类似变体】：敌对种族的救援与权力反转", "uid": 993}, "战败回想·触手怪物格式化交合终端": {"content": "{战败回想·触手怪物格式化交合终端}\n简介：\n【场景/道具描述】\n一个特殊的虚拟记忆回想系统，允许受虐者反复身临其境地体验被异种怪物（如巨型八爪鱼）战败侵犯的全过程。但异种只是按固定程序运作，不具备互动性，通过完全重复的机械性交合让受虐者从最初的极度依赖逐渐陷入厌倦，激发其对更高层次定制化异种性交的渴望。\n\n用法与交互细节：\n1. **完全的肢体束缚与被动交合**：场景开始时，触手会强制缠绕腰部、拉开双腿，用吸盘吸附改造后的敏感乳房进行撕扯，同时插入口腔进行深喉限制，模拟对女骑士的完全压制侵犯。\n2. **定型化的冷漠流程**：触手的动作高度重复——扯胸、插入、缠腿、抽插，不会有任何超出设定的反馈。受虐者首次体验时极度满足，但多次使用后由于缺乏互动变化，会产生“比真人差远了”的厌倦感，身体被改造得渴求更鲜活或可控制的触手生物。\n3. **堕落心理的温床**：从“被怪物强暴的羞耻”逐渐演变为主观选择“主动找触手做爱”，让受虐者在事后对自己进行深刻的道德审判，彻底接受自己身体已离不开异种交配的事实。\\n\\n【包含类似变体】：强制妊娠与怪物孕育, 梦境魅魔与触手怪物的异种孕育", "uid": 994}, "种付姿势：通过特定体位强化受孕威胁与子宫快感": {"content": "{种付姿势：通过特定体位强化受孕威胁与子宫快感}\n简介：\n【场景/道具描述】\n仰卧位，受虐者双腿高举过头并被压制，使下体完全暴露，便于深插至子宫。施虐者从上至下侵入，龟头可触及宫颈。\n\n用法与交互：\n1. 受虐者双腿被折叠至头部两侧，双手被压在腿下无法动弹，完全暴露小穴。\n2. 施虐者以垂直角度插入，深入子宫口，每一下都冲击宫颈，引发强烈快感。\n3. 受虐者在受孕威胁下（如无避孕措施）产生恐惧与兴奋交织的情绪，子宫因渴望受精而主动收缩，加速高潮。", "uid": 995}, "淫液滴入与子宫调教": {"content": "{淫液滴入与子宫调教}\n简介：\n【场景/道具描述】\n施虐者将含有高浓度媚药的淫液一滴一滴地滴入受虐者的阴道，使其积累并渗入子宫。受虐者的小穴被强制打开，保持暴露状态。\n\n用法与交互：\n1. 施虐者用手指或工具扒开受虐者的阴唇，用胶带固定，使阴道口保持张开。\n2. 淫液滴入后，受虐者逐渐感到小穴被填满，产生持续的快感，最终导致潮吹。\n3. 施虐者言语暗示（如“小穴变成我的形状”、“子宫被改造”）强化受虐者的服从性，使其认为自己的身体已被永久改变。", "uid": 996}, "触手地下巢穴（封闭调教环境）": {"content": "{触手 功能。其运作时能产生强烈的酸痛与快感，即使微小移动也能触发剧烈高潮，且持续不衰减。道具与身体束缚联动，使受虐者在任何姿势下都无法摆脱其折磨。\n\n用法与交互：\n1. 受虐者静止时，触手进行低频按摩，维持持续刺激；移动时，触手因身体扭动加剧摩擦，引发不可控高潮。\n2. 高潮后刺激不减，形成“高潮-痛苦”循环，消耗受虐者体力与意志。\n3. 结合膀胱充盈或乳房疼痛，制造多重生理折磨叠加效应。", "uid": 1013}, "异种触手侵犯沉浸体验（游戏同调模式）": {"content": "{异种触手侵犯沉浸体验（游戏同调模式）}\n简介：\n【场景/道具描述】\n一款迷宫探索类色情游戏，但具备高度的感觉同调反馈机制。当玩家操控的游戏角色被游戏内怪物(如巨型八爪鱼)击败并触发战败CG时，游戏将把该场景的束缚与侵犯完全实时还原到玩家身体上，包括无形的触手塞口、缠身、吸乳、暴力破处等。\n\n用法与交互细节：\n1. 受虐者在游玩时，因选择冒险路线（游泳过河）触发隐藏强敌，导致游戏角色被八爪鱼的触手缠绕吊起、嘴巴被触手深喉堵塞从而无法语音施放魔法。此体感同步映射，受虐者现实中亦感到口腔被黏滑粗物塞满、呼吸受限、四肢被无形力量吊扯。\n2. 八爪鱼触手以粗大吸盘紧紧包裹并粗暴拉扯乳房，直至乳头被扯离时带出喷溢的乳汁，痛楚与释放的快感交织；同一时间下体在没有前戏下被触手暴力插入，先撕裂剧痛再转为抽插，并喷射大量粘液入子宫，强制受虐者感受被异种体内射精的全程。\n3. 战斗失败场景会自动触发“路人与八爪鱼共同围观与加油”的羞耻环境语音，受虐者在沉浸式触手奸中持续高潮，并因围观羞辱无法挣脱，最终沉溺于被异种侵犯的异常快感中，主动放弃挣扎。\\n\\n【包含类似变体】：认知篡改的游戏化调教幻境, 同调游戏（现实同步调教系统）, 认知错乱的淫辱游戏——现实性交与虚拟游戏体验的诡计嫁接, VR同步凌辱游戏·感观一体调教", "uid": 1014}, "黑暗中的多重剥夺——精神防守与触手联动调教": {"content": "{黑暗中的多重剥夺——精神防守与触手联动调教}\n简介：\n将受虐者囚禁于完全黑暗、全身无法动弹的粘腻拘束中，内部寄生体与外部触手、药物形成绝境，逼迫其在快感地狱里维持清醒的意志对抗。\n\n【场景/道具描述】\n受虐者被一件湿黏的拘束服彻底包裹，手臂被扭曲固定在内侧，手指连一寸都挪动不了。厚重的带子将身体死锁在冷硬的床板上，翻身只是奢望。口中、后庭、淫穴分别被三根滑腻的活体触手肉棒填满，那东西没有意识却会因任何微小的挣扎而剧烈蠕动，反抗越烈，刺激越深。乳房被尖锐的针头刺入，持续注入滚热的药液——一边是让浑身肌肉烂成棉花的无力剂，一边是让血液燃烧、皮肤哭喊着求爱抚的媚药。灯光被抽走，黑暗浓稠如实质，只有子宫里噬心虫触须伸展的沙沙声，和自己愈发失控的心跳。在这绝对的孤绝中，受虐者必须绷紧每一丝精神力，去击退虫子一波波袭来的信号，同时忍受触手突然给予的致命快感——它们会在高潮边缘停住，在受虐者懊恼分神时，虫子便乘虚而入。\n\n用法与交互：\n1. 施虐者将受虐者以此状态放置，可离开或通过单向镜观察。放置期间可随时远程改变触手蠕动频率、药液成分，或突然在黑暗中耳语一句，粉碎其刚筑起的心理防线。\n2. 若受虐者成功抵御噬心虫，可视为阶段结束，但解除束缚时需面对更羞耻的“奖励”；若同化完成，则受虐者将在清醒中沦为表演用的活偶，执行施虐者的任何命令。", "uid": 1015}, "子宫侵犯仿生振动杵": {"content": "{子宫侵犯仿生振动杵}\n简介：\n【直捣花心的淫虐凶器】极度粗长的仿生巨根，前端膨胀为青筋暴起的蘑菇头，死死卡住子宫颈形成锁钥。中空管道可灌注黏稠拟精液，宫腔内另有三颗撞击珠，随震动疯狂敲击子宫壁，将受虐者的最深处化作翻涌的熔炉。\n\n用法与交互：\n1. 强制着床：插入至极限后启动，蘑菇头抵住宫口缓缓张开，将温热黏稠的液体直接射入子宫，球珠在内部翻滚撞击，制造出满涨到反胃的恐惧快感。\n2. 绝顶掌控：持续振动与随机中出模式交替，即使受虐者瘫软如泥也无法停止，每一次强制高潮都让绳索勒得更深，眼神渐失焦距。\n3. 耻辱滞留：灌入的黏液被卡死的宫口封住无法流出，成为体内随时提醒的屈辱印记，每一下蠕动都仿佛被无形精液反复冲刷。", "uid": 1016}, "产卵与强制排出的振动棒": {"content": "{产卵与强制排出的振动棒}\n简介：\n一种兼具产卵与吮吸功能的刑具式振动棒。前端可将多颗跳蛋伴随黏稠爱液射入子宫，末端则内置强力吮吸腔，能将跳蛋一颗颗从宫腔里吸扯出来。每一次卵体撑开宫颈的出入，都带来贯通脊髓的酥麻与失控的体液喷溅。\n\n用法与交互：\n1. 施虐者将振动棒缓缓推入受虐者早已湿泞的小穴，启动产卵模式。棒身膨胀并高频振动，粘稠润滑液与数颗跳蛋被依次推入子宫，填满每一寸空虚的媚肉。\n2. 当子宫被撑满后，调转至吮吸模式。吸口紧紧咬住宫颈，强吸力将跳蛋逐颗回吸。每颗小球碾过极度敏感的宫颈口时，受虐者都会像被电流击中般弓起身体，失禁般的爱液混着润滑液溅满双腿。\n3. 施虐者可反复循环产卵与排出，将受虐者抛入填满与掏空的极端刺激中，直到其精神崩坏，彻底沦为快感奴隶。\\n\\n【包含类似变体】：模拟产卵与子宫注入振动棒", "uid": 1017}, "绝望的平衡吊缚惩罚系统": {"content": "{绝望的平衡吊缚惩罚系统}\n简介：\n一套将单腿吊缚、电击绳衣、触手紧身服与惩罚振动棒精密联动的极端拘束场景。受虐者被迫以单腿踮在16厘米的细高跟上维持平衡，另一腿被高高吊起；稍一支撑不住，便会触发小穴内的巨物振动，引发全身电击与触手服的反噬。项圈上残留的契约魔法更会剥夺一切未经允许的高潮，让受虐者永远在绝顶前夕哀嚎。\n\n用法与交互：\n1. 受虐者被套进插满触手与多枚跳蛋的漆皮紧身衣，乳尖用穿刺式跳蛋夹紧并持续注入催乳剂，口鼻被阳具口塞封闭，只能吸入媚药雾气。\n2. 用附魔金绳捆出繁复的绳衣，股绳勒入下体积压住一根连接锁链的振动棒。将一条腿吊起固定，另一腿的脚镣用极短铁链与振动棒搭扣相连，强迫膝盖时刻保持弯曲。\n3. 只要受虐者支撑不住伸直腿，铁链就会扯动振动棒开关，立即激活小穴内所有触手与跳蛋。挣扎带来的绳衣电击又会让触手服蠕动加剧，引发连锁刺激。在无法高潮的绝望惩罚下，身体永远困在极限平衡与无尽挑逗的炼狱中，直至精神彻底崩溃。", "uid": 1018}, "子宫植入产卵触手装置": {"content": "{子宫植入产卵触手装置}\n简介：\n由柔软肉芽凝聚而成的触手管道，顶端布满细密触须，内部灌满粘稠的改造液或寄生卵。管身泛着淡金光芒，能够精确探入子宫颈，将滚烫的异物强行注入最私密的殿堂。注入完成后自动撤出，留下小腹上闪烁的淫纹烙印，并被配套的金属贞操带永久封锁。\n\n用法与交互：\n1. 在目标四肢被反折束缚、视觉与语言被剥夺的绝望状态下，触手管道趁其高潮余韵缓缓探入蜜穴，前端触须反复摩挲子宫颈，耐心软化抵抗。\n2. 趁受虐者痉挛失神时，管道猛然撑开宫颈口，在撕裂般的苦楚中将粘稠液体或寄生卵一涌而入，小腹被顶出骇人的凸起，随后炽热感与异物充盈的恐惧同时炸开。\n3. 产卵管抽离后，大量粘液随之涌出，紧接着冰冷的金属腰链与胯下铁扣带被咔嚓锁死，将植入的秘密彻底封缄，只余淫纹忽明忽暗地昭示着内部发生的改造。", "uid": 1019}, "触手摇篮与全感官支配场景": {"content": "{触手摇篮与全感官支配场景}\n简介：\n在这片由蠕动肉壁构成的空间中，无数触手自地面孵化，如温柔的摇篮般裹住猎物。眼罩遮断视线，口腔被侵入的肉棒填满并固定脑后，阴蒂被细密触须缠住并注射催淫毒液，双乳被绒毛肉壁包裹反复揉搓。封印淫纹将受虐者的一切挣扎化为徒劳，将其变为单向快感的接收器，连呼吸的节奏都交由触手掌控。\n\n用法与交互：\n1. 眼罩剥夺视觉后，触手编织成全身固定具，连眼皮都无法眨动。受虐者沉浸在黑暗中，只能感受从各处涌来的爱抚、刺痛与插入，理智被一次次强制高潮融毁。\n2. 口腔阳具接管了喘息与呻吟的出口，它随触手的兴致抽送搅动，唾液与淫液混在一起从嘴角漏出。脑后的固定让受虐者即使恢复力气也无法吐出，只能默默承受反胃与屈辱。\n3. 纤细的触须找到勃起的阴蒂，缠绕成巢，顶端化作注毒之针。每一次刺入都引发毁灭性的绝顶，同时注入催情物质，使肉体渴求更多的侵犯。待受虐者彻底瘫软，触手又会温柔地推其起身、帮忙戴上镣铐，用低语般的靡音引诱她主动交出所有尊严，承认沉溺于快乐才是唯一出路。", "uid": 1020}, "生命魔法触手调教术": {"content": "{生命魔法触手调教术}\n简介：\n【由施虐者以生命魔法凝聚出的活体触手，可随意变化形态。它们如同舌头般温热湿软，既能分裂成细束钻进蜜穴与口腔，也可绞合变粗化为碾压花心的凶器。触手还能进一步衍化出绒毛、转化出皮革绑带，或撕碎衣物制成蒙眼的布条。一旦将受虐者四肢反绑、眼睛蒙住，再以触手控制跳蛋遥控器、灌入媚药，便构成一组彻底剥夺视觉与自由的绝境。受虐者被自己的魔力所召唤之物侵犯，连抗拒的立场都随之瓦解，只能在一片黑暗中被随机刺探的触须与体内振动反复推上绝顶。】\n\n用法与交互：\n1. 施虐者催动生命魔法阵，凝出数条光滑触手。触手先攀上受虐者双腿，如绳索般卷紧大腿根部，另一条则钻入秘处，以与阴道内壁完全相同的材质贴合刮擦，带来无法分辨是自我还是外物的错乱快感。\n2. 撕下受虐者贴身衣物制成眼罩蒙住双眼， 肉体与意志被摧至濒死极限后，由施虐者抛入触手子宫中“治疗”。触手肉壁紧贴每一寸肌肤，肉芽蠕动，将身体固定成屈辱的跪缚姿态，任何微小的挣扎都会引发剧痛。\n2. 施虐者站在肉壁前，以长辈训诫的姿态抽打耳光，反复质问“还想死吗？”，用痛苦的羞耻与劫后余生的松驰同时冲刷受虐者的心智。\n3. 在受虐者精神崩溃之际，施虐者突然衣襟裂开，露出饱满乳房，将乳头猛然塞入对方被迫张开的嘴中，一边抚摸额头一边强行哺育。甘甜的乳汁与触手带来的温度交织，生存本能驱使受虐者拼命吮吸。\n4. 灌满乳汁的同时，施虐者柔声追问“这不就是你想要的吗？”，直至受虐者泣不成声、吮着乳头亲口喊出“主人”，彻底摧毁所有反抗意志，完成从求死到求爱的残酷转化。", "uid": 1026}, "夜幕降临的触手眼罩装置": {"content": "{夜幕降临的触手眼罩装置}\n简介：\n【当预定时刻降临，衣物内侧蛰伏的触手突然活了过来，冰冷的触肢卷拢着漆黑眼罩，轻柔却不容置疑地覆上双眼。美瞳与灯光同时熄灭，最后一丝外界微光被彻底绞杀，漫长的淫虐之夜就此拉开序幕。】\n\n用法与交互：\n1. 施虐者预设时间或远程触发，藏在项圈、束腰或贴身衣物内的仿生触手会自动伸出，抓起眼罩为奴隶佩戴。\n2. 眼罩内衬施加均匀压力，杜绝任何偷窥可能，奴隶陷入绝对黑暗，平衡感与时间感逐渐崩溃。\n3. 剥夺视觉后，触手可继续执行后续羞辱指令，如涂抹饰物、佩戴其他感官折磨道具，让未知的恐惧无限放大，将每一秒钟都熬成绝望。", "uid": 1027}, "绒毛震动乳环与催淫花蜜的强制发情仪式": {"content": "{绒毛震动乳环与催淫花蜜的强制发情仪式}\n简介：\n一组内侧密布微粒绒毛的金属乳环，配合涂抹在乳尖及其周围的催淫媚药，以低频持续震动制造出诱人瘙痒与烧灼般的空虚感，将乳房转变为离不开玩弄的淫悦器官。\n\n【场景/道具描述】\n乳环主体为坚硬的玫瑰金材质，箍紧乳头根部后，内壁一层类似动物舌苔的细密绒毛完整包覆住乳晕与乳头侧面。使用前，施虐者用触手毛刷蘸取淡粉色半透明催淫花蜜，均匀涂满整颗蓓蕾及乳晕。花蜜被吸收后，乳房内部升腾起扩散性的温热感，敏感度成倍增长。\n\n用法与交互细节：\n1. 乳环启动后，绒毛伴随震动以螺旋方式轻扫乳孔和乳晕皱褶，模拟无数蚂蚁爬行啃咬的麻痒，却无法给予直接按压或吮吸的满足感，迫使受虐者挺胸寻求更粗暴的对待。\n2. 催淫花蜜可持续生效数小时，此期间即使脱下乳环，轻微的气流或衣物摩擦也足以令受虐者呻吟不止；施虐者可结合触手衣物进行撤离-重现的间歇玩弄，让受虐者自行扭动乳肉碰撞任何可接触的物体解痒，却只会越蹭越难受。\n3. 在淫纹高潮封印的加持下，绒毛乳环的调教可无限延长，把乳房调教成随时发情却又永不满足的敏感开关，一句催淫指令或轻触即可让受虐者下体泛滥、瘫软求饶。\\n\\n【包含类似变体】：敏感度增强绒毛乳环", "uid": 1028}, "催淫花蜜与触手毛刷": {"content": "{催淫花蜜与触手毛刷}\n简介：\n【高浓度催情涂液，以触手毛刷蘸取，涂抹于敏感部位即可极速催动情欲】\n\n粉红色粘稠液体被盛装在精致小瓶中，触手状毛刷像活物般将药液均匀铺展。液体触及肌肤时一抹凉意刺骨，旋即化作绵软剧痒与灼热，让被涂抹的蕾苞在短短两分钟便达到平时需半小时玩弄才可企及的充血挺立状态。受虐者越是抗拒，药效渗透得越快，乳房内部那团散不去的燥热如蚁群噬咬，最终连乳尖的轻微形变都能引爆一连串失控的呻吟。\n\n用法与交互：\n1. 施虐者执起触手毛刷，刻意放慢动作在受虐者眼前展示那滴落的不祥液体，强化屈辱预期。\n2. 刷头贴上受虐者的乳头或阴蒂，以画圈涂抹，药液会迅速渗入神经末梢，受虐者将在羞耻与快感夹击下丧失对身体的控制力。\n3. 多次叠加涂抹可不断累积情欲无法释放，令受虐者一步步滑入“求饶却更想要”的绝望循环。", "uid": 1029}, "触手乳链": {"content": "{触手乳链}\n简介：\n一副将项圈与乳头触手相连的锁链，当受虐者与施虐者的距离超过设定长度时，锁链绷直，包裹在乳肉上的触手会猛然收紧、拉扯娇嫩的蓓蕾，带来尖锐的刺痛与无法抗拒的服从信号。\n\n用法与交互：\n1. 施虐者手持链端或将其系于自己身上，设定半径；受虐者一旦步伐迟疑或试图远离，锁链拉直的瞬间，乳头触手便像活物般卷住乳尖狠狠撕扯，迫使其跌跌撞撞地贴回施虐者脚边。\n2. 施虐者可以故意轻抖锁链，制造伪拉扯恐吓，让受虐者在绝望与庆幸间反复崩溃，彻底瓦解其距离感与反抗意志。", "uid": 1030}, "触手服饰拘束套装": {"content": "{触手服饰拘束套装}\n简介：\n【一组由活体触手构成的华美服饰，包括长手套、高跟长靴、缎带与晚礼服。每一件内层都布满蠕动着的粉红肉芽，穿戴后便与肌肤紧密贴合，沦为触手随意玩弄的淫具。】\n\n用法与交互：\n1. 穿戴手套或长靴后，内层触手会沿着指尖、脚掌缓缓蠕动，持续给予湿润粘滑的侵犯感；任何试图脱下衣物的挣扎，都会触发触手绞紧，将手臂或双腿锁死在半屈的羞耻姿态。\n2. 金色缎带系在受害者尾巴或肢体末端，打成蝴蝶结后便会自行收紧，瞬间抽干反抗者的力气，令其瘫软在地，如同被捏住命脉的玩偶。\n3. 晚礼服内部布满数不清的触手材料，从罩杯到裙摆，每一寸布料都会根据穿着者反抗的剧烈程度调整刺激——轻勒乳尖、缠磨腰窝、探入股间，将最私密处的痉挛变为触手戏谑的节拍。", "uid": 1031}, "触手培训室与浊液池": {"content": "{触手培训室与浊液池}\n简介：\n【由蠕动肉壁构成的粉红色密室，狭窄通道尽头是一池泛着奶香的白色浊液。触手无处不在，专挑受训者刚获得的新弱点——如被改造出的兽尾——反复折磨，用窒息与饱饮将驯服刻进骨髓。】\n\n用法与交互：\n1. 猎物被拖入触手通道，肉壁会不断渗出粘腻液体，滑过肌肤的每一寸都像无数舌头在舔舐，压倒性的粘滑触感先于疼痛击溃理智。\n2. 浊液池深不见底，受训者被反复扯入池中呛饮浊液。每当他挣扎着浮出水面换气，潜藏的触手便猛地拽紧尾巴或脚踝，将他重新拖回粘稠得令人绝望的白色深渊——生死的界限只在一根触手的闲趣。\n3. 完成整套流程前，厚重大门永不开启。想逃离就必须承受触手与浊液的多次轮奸式洗礼，直到肉体彻底记住被玩弄的节拍，才被允许以浸透精臭的模样爬出培训室。", "uid": 1032}, "触手服调教装置": {"content": "{触手服调教装置}\n简介：\n一件由不知名生物组织构成的紧身拘束衣，表面布满蠕动的肉芽与吸盘，内层延伸出可伸缩的触手状刺激体。配合固定拘束带、深喉口塞与全覆式眼罩，能将受虐者完全剥夺行动、言语与视觉，沦为纯粹的实验体。衣内内置多条仿生触手，可按预设程序或施虐者遥控深入所有腔道，同步进行震动、吮吸与电击刺激，并实时记录身体反应数据。\n\n用法与交互：\n1. 将受虐者四肢以拘束带大字型固定于床架或刑架，确保无法动弹。\n2. 强行佩戴深喉口塞，撑开口腔并锁死下颌，连接外置唾液收集器；覆上多层密封眼罩，阻断全部光线。\n3. 拉上背后生物拉链，触手服即自行收紧，肉芽自动探寻乳头、阴蒂等敏感点并吸附，内部主触手缓慢侵入阴道与后庭，开始低强度预热蠕动。\n4. 进入研究模式后，系统会记录每一次高潮的生理数值，包括阴道收缩频率、体温变化与体液分泌量，施虐者可根据数据调整刺激强度，直至受虐者在连续强制高潮中意识崩坏。\\n\\n【包含类似变体】：触手服下的强制高潮数据采集", "uid": 1033}, "按摩床上的强制临摹刑具": {"content": "{按摩床上的强制临摹刑具}\n简介：\n将强制工作与强制放松融为一体的残酷装置，让受虐者在享受舒适按摩的同时被触手控制手臂临摹画作，身体在矛盾中崩溃。\n\n【场景/道具描述】\n受虐者被转移到一台符合人体工程学的按摩床上，项圈被宽金属铐固定，头部只能极小幅转动，视野局限于头顶显示的精美插画和面前数位板。双手被长手套内的触手紧紧裹住，饮下无力药液后全身瘫软，触手便强行操控其手臂一笔一画临摹示范图。与此同时，触手从暗处钻出，将大团清凉凝胶涂抹在肩颈、后背、乳房等裸露肌肤，细密肉芽化作舌状触须钻进礼服来回舔舐凝胶，带来难以抗拒的酥麻快感。脚腕、大腿、手腕均被铐死在床上，受虐者既无法抗拒被操纵作画的屈辱，也无法逃离凝胶按摩带来的愉悦。触手服下体衬里同步收集爱液，一旦液量超标便直接刺激阴蒂与小穴触发高潮，形成“沉浸舒适-被迫工作-被玩弄至高潮”的三重压迫。\n\n用法与交互：\n1. 当受虐者因连续作画疲劳而无法继续时，施虐者可使用此床，强制其继续临摹练习。\n2. 受虐者被迫在身体极度放松、意识模糊的状态下完成高精度绘画，身体交由触手摆布，心智在羞耻与快感间撕裂。\n3. 凝胶按摩可替换为催情药膏，增强敏感度，使每次触须掠过都如同轻度高潮。\n4. 可配合计时，若临摹合格则停止，否则延长折磨时间甚至增加正字计数。\\n\\n【包含类似变体】：凝胶触手按摩·乳房高潮唤醒", "uid": 1034}, "绒毛触手拘束服": {"content": "{绒毛触手拘束服}\n简介：\n【一件乳白色的特制拘束服，内部密布着无数细小的绒毛状触手，能通过遥控调节频率与幅度。当受虐者被完全束缚在床上时，触手便轻柔地扫过每一寸肌肤，带来舒适感的同时强化无力反抗的绝望。】\n\n用法与交互：\n1. 受虐者赤裸或仅着内衣被塞入拘束服，双臂折叠进宽大衣袖，用黑色皮扣收紧固定于小腹，双腿并拢以皮带 乳孔不时被刺入释液。所有敏感点都处于被包裹与刺激的失重感中。\n4. 精神调教核心——反复寸止：当受虐者被持续刺激至高潮阈值时，所有刺激骤然停止，并短暂切断供氧，制造窒息恐慌；随后再次给予刺激，如此循环，直至其放弃逃避，完全接受被动给予的快感与食水。每次寸止后会通过口腔触手注入一口特质花蜜作为“安慰奖赏”，并抚摸额头，诱发心理退行。\n5. 长时间拘禁使受虐者陷入类似婴儿的完全依赖状态：动弹不得，五感尽失，只能被动呼吸、吞咽与承受欢愉折磨。最终摧毁其意志壁垒，重塑其为彻底顺从的母体附庸。\\n\\n【包含类似变体】：触手花禁闭, 触手休息舱与水牢惩戒系统, 触手花休息舱——感官剥夺与屈服调教密室, 阶梯式惩罚与快感控制体系", "uid": 1044}, "子宫灌注膨胀拘束": {"content": "{子宫灌注膨胀拘束}\n简介：\n一种专门用于摧毁高傲雌性尊严的拘束调教具。通过向子宫内注入大量高浓度媚液，使其腹部如临产孕妇般隆起，搭配贯穿乳首的金属环和后庭肛塞，以纤细却不可摧毁的锁链相连，令受虐者每一次微小动作都会牵动全身敏感点，陷入无尽的强制快感与屈辱之中。\n\n【场景/道具描述】\n这组套件包括：一个深入子宫颈的灌注导管，连接着储满粘稠媚液的容器；一对贯穿乳首的金属细环，环上附有微型震动与电击符文；一枚膨胀式肛塞，内嵌神经刺激单元；以及数根看似细弱却可承受神力拉扯的诅咒锁链，将所有部件连接在一起。一旦启动，子宫被强行撑开，腹部迅速隆起，如孕育孽种，乳环与肛塞同步释放电流与震动，任何挣扎或施法都会加剧刺激，使受虐者沦为只会娇喘流汁的母畜。\n\n用法与交互：\n1. 先将受虐者四肢拉开固定，将灌注导管强行塞入子宫口，打开阀门，粘稠媚液缓慢注入，直至腹部隆起至极限。\n2. 然后为受虐者穿上乳环和肛塞，二者会自动锁死，并激活内部的刺激符文。\n3. 最后用诅咒锁链将乳环、肛塞和子宫灌注器相连，链长可调，确保受虐者无论挺直、弯腰或翻滚，都会拉扯至少一处敏感点。\n4. 随着时间推移，媚液会不断被子宫壁吸收，引发伪孕反应，乳房开始分泌奶汁，腹部压迫会变为持续高潮，使受虐者彻底丧失反抗意志。", "uid": 1045}, "狂化强化活体刑具": {"content": "{狂化强化活体刑具}\n简介：\n一种通过魔阵强行激发肉体潜能、剥夺理智的邪恶法术产物。将普通男性或低等魔族囚犯变成肌肉膨胀、性器巨大化的发狂怪物，专门用于凌辱无法反抗的受虐者。\n\n【场景/道具描述】\n魔阵闪烁间，原本平庸的身躯迅速膨胀，撑破囚服，肌肉如岩石般隆起，双目充血，尖牙外凸，发出野兽般的低吼。最骇人的是其胯下那根黑黝粗大的阳具，青筋盘虬，雄赳赳弹跳不休，仿佛随时会撕裂一切。实验体已完全丧失人性和理智，沦为只知道交配的凶兽，疯狂撞击着束缚它的结界，只为将那股暴戾的性欲倾泻在近在咫尺的柔软肉体上。\n\n用法与交互：\n1. 施虐者当受虐者的面施加魔阵，将一名普通男性活生生转化为狂化性兽，展示其巨大阳具并加以口舌戏弄，制造极致的心理压迫。\n2. 随后撤去束缚，任由失去控制的怪物扑向早已被拘束成羞耻姿势、身体持续发情却无法动弹的受虐者，进行残酷的强制交配。\n3. 因强化效果，怪物射精量极大，可持续侵犯直至受虐者身心崩溃；事后还可回收精液作为淫术材料。", "uid": 1046}, "触手法阵与语言陷阱": {"content": "{触手法阵与语言陷阱}\n简介：\n黑红色的魔法阵从受虐者身下显现，瞬间召唤出数根粗壮的触手。触手精准而残暴，能在施虐者的诡笑中同时攻陷口腔、小穴与后庭。而最致命的是施虐者布下的语言陷阱——当奴隶在绝望中屈辱地哀求“请用小穴”时，换来的却是“只求插进去，可没求拔出来”的玩弄，导致后穴的蹂躏丝毫不停，同时触手又填满所有空洞，将受虐者推入三穴同灌的疯狂绝顶。\n\n用法与交互：\n1. 施虐者先用后穴或其它部位的持续侵犯将受虐者逼至崩溃边缘，迫使其亲口说出屈辱的请求。\n2. 在受虐者喊出“求求插进小穴”等话语后，施虐者大笑并发动法阵，召出触手刺入受虐者主动扒开的小穴和口腔，并戏谑地指出“你没求我拔出去”。\n3. 触手与原有的肉棒形成三穴同时抽插，专攻子宫口与喉咙深处，最后同步在体内最深处喷发浓稠精液，让受虐者在“两边要一起去了”的惨叫声中彻底失神。", "uid": 1047}, "精神支配与触手组合场景": {"content": "{精神支配与触手组合场景}\n简介：\n【场景/道具描述】\n这是一套残忍的心理碾压与肉体支配系统，由具有再生能力的魔物释放的阳具状触手与刻印在核心处的催眠符文构成。该组合的精妙之处在于先以受害者最依恋之人（通常为施虐者）的幻象发动精神打击，利用被抛弃的绝望撕裂心智防线，再以触手从 理。", "uid": 1101}, "利用背德感与公共场合强化羞耻": {"content": "{利用背德感与公共场合强化羞耻}\n简介：\n【场景/道具描述】\n在公共场合（如孤儿院、儿童游戏区附近）进行隐秘的性刺激，利用环境中的他人存在（如修女、孩童）制造强烈的倒错感和背德感，使受虐者因羞耻而更加敏感。\n\n用法与交互：\n1. 施虐者在公共场合（如庭院角落、墙后）继续调教，受虐者因担心被发现而拼命忍耐，但快感因羞耻而增强。\n2. 施虐者故意选择靠近儿童活动区的位置，受虐者听到孩童声音时羞耻心达到顶峰，反而助长情欲。\n3. 通过控制刺激强度，让受虐者在忍耐与释放之间反复，培养对施虐者指令的条件反射。", "uid": 1102}, "失禁羞辱与强制清洗": {"content": "{失禁羞辱与强制清洗}\n简介：\n【场景/道具描述】\n受虐者因高潮和疼痛失禁，尿液喷溅。施虐者使用水管冲洗，并直接插入蜜穴进行内部清洗。\n\n用法与交互：\n1. 受虐者在木马调教后失禁，尿液形成水洼，施虐者用水管冲去污物。\n2. 施虐者将水管插入蜜穴，用冰凉水流冲洗子宫口，唤醒受虐者。\n3. 随后用手指抠挖蜜穴，去除精液凝块，同时刺激敏感点，但不让受虐者达到高潮，制造焦躁感。\n4. 清洗过程剥夺了受虐者的尊严，并使其身体对刺激更加敏感。", "uid": 1103}, "束缚与高潮控制的调教设定": {"content": "{束缚与高潮控制的调教设定}\n简介：\n【场景/道具描述】\n不透气杂物间内，受虐者仰躺，双手后缚，双脚腕被铁管固定于头顶，身上仅戴宠物项圈和裤袜（半褪至膝）。胸部和股间用胶带绑着运作中的跳蛋，小穴插入婴儿小臂粗的震动棒。\n\n用法与交互：\n1. 调教师设定条件：受虐者坚持一小时不高潮即可释放。通过持续刺激（跳蛋、震动棒）和手指技巧（拨弄阴蒂、按压乳头）不断引发高潮，打破条件。\n2. 受虐者需报告高潮，否则刺激持续；报告后可休息15分钟，但调教师常故意先调高刺激再停止，延长快感。\n3. 随着调教深入，受虐者身体更敏感，耐受时间缩短，逐渐丧失抵抗意志，仅机械地重复高潮。\n4. 调教师通过观察反应（如失禁、痉挛）评估调教进度，逐步增加刺激强度，直至受虐者完全服从。", "uid": 1104}, "阴蒂链牵引与户外暴露调教": {"content": "{阴蒂链牵引与户外暴露调教}\n简介：\n【场景/道具描述】\n受虐者阴蒂夹有带夹子的细链，由调教师牵引；下身仅穿裤袜（黑丝/白丝），小穴仍插有震动棒，双手背缚腰后。场景为学校走廊或庭院等户外开放空间。\n\n用法与交互：\n1. 调教师通过牵拉阴蒂链控制受虐者行动，迫使其跟随步伐。受虐者因高潮后虚弱，行走艰难，需夹紧双腿保持平衡，震动棒因裤袜弹性持续滑动刺激。\n2. 在户外暴露环境中，调教师可随时扯动链条引发高潮，或命令受虐者当众小便（放尿），进一步摧毁羞耻心。\n3. 受虐者需在可能被他人看到的恐惧中保持服从，调教师利用环境（如空旷庭院、回音走廊）增加心理压力，强化主奴反馈。\n4. 裤袜的透明性既提供微弱遮掩，又因紧贴肌肤放大触感，使受虐者持续处于性兴奋状态。", "uid": 1105}, "性数据面板与羞辱调教": {"content": "{性数据面板与羞辱调教}\n简介：\n【场景/道具描述】\n一种魔法能力生成的虚拟面板，实时显示受虐者的身体数据，包括力量、敏捷、魅力等，以及性相关数据如自慰次数、高潮次数、性器状态（如“处女”、“名器”）。部分数据可隐藏或显示，由施虐者（或系统）控制。\n\n用法与交互：\n1. 施虐者通过面板公开受虐者的隐私数据（如自慰次数），制造羞耻感，迫使受虐者面对自己的性行为。\n2. 面板可随时间更新，记录每次调教的效果，用于评估服从度。\n3. 可通过隐藏部分数据制造悬念，或突然显示隐藏数据（如“名器”）来增强心理冲击，培养受虐者对数据监控的依赖。", "uid": 1106}, "通过高潮和失禁排空媚毒": {"content": "{通过高潮和失禁排空媚毒}\n简介：\n【场景/道具描述】\n受虐者因高潮和失禁排空体内媚毒，身体恢复自在，魔力涌现。\n\n用法与交互：\n1. 施虐者通过刺激受虐者达到高潮和失禁，强制排出体内毒素或负面状态。\n2. 该过程同时作为受虐者身体净化与能量恢复的仪式，增强其依赖性和服从性。", "uid": 1107}, "利用身体缺陷进行羞辱训练": {"content": "{利用身体缺陷进行羞辱训练}\n简介：\n【场景/道具描述】\n受虐者因身体缺陷（漏尿体质）在展示下体时无法控制排尿，尿液当众流出。\n\n用法与交互：\n1. 受虐者在暴露状态下自然失禁 . 受虐者因害怕被发现而压抑呻吟，快感与恐惧交织，施虐者通过缓慢或加速抽插控制其反应。\n3. 门外对话内容（如学妹的崇拜）与门内淫秽场景形成对比，增强受虐者的羞耻感和心理屈服。", "uid": 1115}, "强制金属开口环": {"content": "{强制金属开口环}\n简介：\n冰冷坚固的金属圆环，配有环绕脑后的皮带扣。结构极其简单粗暴，专门用于强行撑开受虐者的嘴巴并剥夺其咬合能力。\n\n用法与交互：\n1. 剥夺话语权：一旦推入口腔并卡在上下颚之间，受虐者便再也无法合拢嘴巴，所有的抗议和叫骂都会变成丢人的呜咽，香津也会不受控制地淌下，显得极其狼狈。\n2. 畅通无阻：保持口腔绝对敞开，方便施虐者随时灌入媚药、塞入耻物（如爱液蛋糕）或进行侵犯，受虐者连用牙齿进行抵抗的奢望都会被彻底粉碎。", "uid": 1116}, "复方利尿催情合剂": {"content": "{复方利尿催情合剂}\n简介：\n一种无色或带有特定甜香的药液，将强效催情成分与烈性利尿剂完美混合。旨在同时摧残受虐者的理智与生理防线。\n\n用法与交互：\n1. 欲火焚身：药液在血液中迅速挥发，极大地放大受虐者的感官敏锐度，使其身体变得异常敏感发烫，陷入半梦半醒的情欲深渊。\n2. 绝顶失禁：利尿成分会在最不该出现的时候引发强烈的尿意。配合震动玩具的高强度刺激，受虐者在达到高潮绝顶的瞬间，括约肌的防守会彻底崩溃，导致当众失禁潮吹。伴随着水柱的宣泄，给受虐者带来毁灭性的心理羞耻。", "uid": 1117}, "盲眼牵引公开失禁": {"content": "{盲眼牵引公开失禁}\n简介：\n【场景组合】结合了视觉剥夺、羞耻牵引与生理极限挑战的极度摧残场景，最终以受虐者的当众失禁为高潮。\n\n组合与交互：\n1. 牵引游街：受虐者被戴上眼罩和【强制金属开口环】，脖颈套上项圈，由施虐者用牵引链像遛狗一样牵着在未知的环境或公开场合踉跄行走。\n2. 崩溃边缘：在行走前，受虐者会被灌下【复方利尿催情合剂】，下体塞入大功率震动道具。未知的恐惧、高跟鞋带来的不稳、以及下体不断累积的快感与强烈尿意，最终会迫使受虐者在行走途中防线崩溃，在一阵痉挛中当众失禁与绝顶。", "uid": 1118}, "强制高潮椅": {"content": "{强制高潮椅}\n简介：\n【场景/道具描述】\n一把经过改造的金属椅子，坐垫和靠背布满可调节的振动模块、旋转按摩头和微电流触点。椅面中央有可伸缩的硅胶或金属装置，精准对准受虐者的敏感点。扶手和腿部设有束缚带，将受虐者牢牢固定在椅子上，无法逃脱。椅子内置程序可预设多种折磨模式，从持续低频震动到突然的高频冲击，甚至随机切换，让受虐者无法预测下一次高潮何时被强制触发。\n\n用法与交互：\n1. 施虐者将受虐者绑在椅子上，启动程序，受虐者将在数小时甚至数天内被迫经历连续高潮，直至身体极度敏感、颤抖、甚至痉挛，任何触碰都变成痛苦。\n2. 椅子可连接心率或皮肤电传感器，当受虐者即将达到极限时自动降低强度，维持一种“永远接近崩溃却无法解脱”的临界状态。\n3. 施虐者可通过遥控器随时切换模式，或在受虐者耳边低语，描述下一次折磨的细节，强化心理预期与恐惧。\n4. 椅子底部可安装集液容器，记录受虐者的体液分泌量，作为羞辱和控制的量化证据。", "uid": 1119}, "遥控膨胀灌肠肛塞": {"content": "{遥控膨胀灌肠肛塞}\n简介：\n【遥控膨胀灌肠肛塞】一种带有微型泵和储液仓的硅胶肛塞。插入后，施虐者可通过遥控器控制其缓慢膨胀，同时向直肠内灌注温热的液体（如盐水或润滑剂）。塞体表面有螺纹和凸点，膨胀时持续摩擦肠壁。\n\n用法与交互：\n1. 初始为纤细状态，轻松插入后，施虐者远程启动膨胀程序，塞体直径逐渐增加，直至受虐者感到极限撑胀。\n2. 可设定定时灌注，液体缓缓流入，产生无法控制的便意和充盈感。\n3. 膨胀到最大时，塞体锁定，受虐者无法自行排出，必须哀求施虐者解除。\n4. 结合震动功能，在膨胀状态下高频震动，制造内外夹击的折磨。", "uid": 1120}, "脊柱刺座": {"content": "{脊柱刺座}\n简介：\n【脊柱刺座】一种将受虐者脊椎彻底锁死的精密金属骨架。骨架内侧布满细密的倒刺，每一根刺都精确对应脊椎骨节之间的缝隙。当受虐者被强制穿戴时，倒刺会随着呼吸的起伏缓缓刺入皮肉，直到尖端抵住骨膜。任何试图挺直或扭动躯干的动作，都会让倒刺更深地嵌入骨髓缝隙，引发从尾椎直冲天灵盖的剧痛。\n\n用法与交互：\n1. 穿戴时需从颈椎到尾骨逐节扣合，每扣合一节，倒刺便深入一分，受虐者只能通过颤抖的呼吸来适应持续的钝痛。\n2. 施虐者可通过调节骨架外侧的旋钮，控制倒刺的刺入深度，从仅仅刺破表 次无法阻止的自我侵犯。\n\n用法与交互：\n1. 受虐者被束缚至完全无法直立行走，随后被下达前行指令。若试图反抗，将引发争夺战导致全身肌肉失控抽搐，最终不得不屈服于虫式爬行。\n2. 爬行节奏被精确设计：每撅起臀部，体内的触手肉棒便深深顶入，躯干前伸时肉棒滑出，形成持续的低速活塞运动。由于寄生端无感官反馈，受虐者的痛苦与羞耻对操控方毫无影响，反而会加快频率直至其当场高潮。\n3. 当受虐者因连续高潮瘫软时，操控方会暂停片刻，待其稍稍恢复便再度启动，如此循环，逼使其在清醒状态下反复体验被自己的动作送上巅峰的屈辱。", "uid": 1132}, "人体礼炮 - 性虐与机械融合的终极展示装置": {"content": "{人体礼炮 - 性虐与机械融合的终极展示装置}\n简介：\n将受虐者永久性改造为一门活的礼炮，融合极端身体改造、机械植入、酒精灌肠与神经控制，用于大型庆典的淫虐表演。\n\n【场景/道具描述】\n受虐者的骨骼被手术改造成拱形四足支撑的炮架，双臂截断，双腿反折固定，背部皮肤移植粘扣带供施虐者穿脱固定。阴道被植入金属砲膛，内壁注射强效春药保持润滑，阴蒂穿刺连接拉环作为击发开关。尿道插入酒精回流管，肛门塞入砲弹推杆。通过脊椎注射点持续输送红酒/烈酒，受虐者内部循环酒精并经由尿道循环回流，保持膀胱充盈。整个装置最终组装时，受虐者被锁死在炮架上，口球结合，阴道插入礼炮炮管，通过外部遥控或拉环触发肌肉痉挛发射内置的“砲弹”（如冰冻液体炮弹、性玩具等）。表演中伴随“FRB”口令，受虐者必须做出反应，否则遭受电击或神经阻断惩罚。全过程受虐者处于持续催情、醉酒与膀胱极限胀痛中，意识清醒但身体完全受控。\n\n用法与交互：\n1. 身体改造准备：手术重塑四肢结构，植入金属接口，连接神经阻断器与输液管，使受虐者成为活体炮架。\n2. 酒精灌注：通过脊椎输液口持续注入酒精，受虐者体内酒精循环后经尿道排出，再回流，形成内部酒液循环系统，制造持续的醉酒、憋尿欲望与羞耻。\n3. 组装启动：施虐者将礼炮管插入阴道，推杆深入肛门，锁定外部支架，念出口令“FRB”（意为“For Royal Boom”），受虐者需以呻吟回应“请开炮…”，否则触发脊椎电击。\n4. 发射表演：在宾客注视下，拉动阴蒂拉环或遥控神经脉冲，迫使阴道剧烈痉挛，将炮管内的砲弹（冰块/跳蛋/粘稠液体）喷射而出。表演后持续灌酒，受虐者羞耻与快感混合，全程呻吟哭泣，直至昏迷。", "uid": 1133}, "肾上腺检测强制流泪装置": {"content": "{肾上腺检测强制流泪装置}\n简介：\n一种隐蔽的身体改造刑具，通过微型电子元件植入肾上腺周围，实时监测肾上腺素水平。当受虐者紧张、恐惧或疼痛导致肾上腺素超过阈值，泪腺即被强制激活，无法控制地流泪，但自我意识完全清醒，无法否认。这种设计摧毁受虐者的心理防线，令其表现得软弱无助。\n\n用法与交互：\n1. 该装置通常于受虐者不知情时预先手术植入，无任何体外开关。\n2. 当受虐者处于被凌辱状态，哪怕内心强行反抗，一旦情绪波动到临界点，眼泪自动滑落。\n3. 施虐者可借此嘲讽受虐者“明明怕得要命却嘴硬”，并用手指抹去泪水羞辱，加深其精神崩溃。\n4. 无法通过意志控制，越否认流泪越会引发更密集的欺负，形成恶性循环。", "uid": 1134}, "圣罚扇骨指夹与被动强制握持": {"content": "{圣罚扇骨指夹与被动强制握持}\n简介：一对看似优雅的机关扇，将受虐者的手指穿透固定于扇骨之间。一旦手指稍微泄力，扇骨立刻夹紧施以剧痛，使其必须主动维持羞耻的握持姿态，在高潮中亦不得放松。\n【场景/道具描述】\n两把特制金属扇，扇骨设有指孔与凹槽。受虐者五指穿过孔洞后，指腹需精准按压在凹槽内才能阻止扇骨并拢。扇柄通过手铐链连接至项圈，项圈又一端锁在墙壁上，强迫双手固定在颈侧，姿势如祈祷或求饶。腋下和乳头同时被跳蛋刺激。\n\n用法与交互细节：\n1. 受虐者必须持续用力握紧扇骨，任何一瞬间的松懈——尤其在高潮抽搐时——都会触发扇骨猛夹十指，剧痛瞬间驱散快感，迫使她从绝顶中强行清醒。\n2. 手臂抬起引发的项圈拉扯会联动插入阴道的「圣女之陨」扩张器反复膨胀收缩，进一步消耗体力。\n3. 哪怕在跳蛋刺激下侥幸迎来高潮，困于指夹的疼痛也会令高潮变得短促而残缺，形成“未能沉浸的伪高潮”，精神与身体皆无法真正满足，越陷越饥渴。\\n\\n【包含类似变体】：夹指扇与联动惩罚放置, 惩罚扇（自罚寸止工具）", "uid": 1135}, "触手花·逆流式成瘾性乳汁玩弄器": {"content": "{触手花·逆流式成瘾性乳汁玩弄器}\n简介：\n【场景/道具描述】\n由施虐者袖子中延伸出的活体触手分化而来的道具。前端呈喇叭花状包裹 153}, "强行身体支配指令": {"content": "{强行身体支配指令}\n简介：\n【施虐者通过某种精神干涉手段，强行夺取受虐者对身体的控制权，迫使其违背自身意志做出各种羞耻动作。更残忍的是，施虐者往往在受虐者即将喊出屈辱称谓时突然中止控制，让其亲口完成最后的羞辱，进一步摧毁其精神防线。】\n\n用法与交互：\n1. 施虐者释放不可见的精神粒子或绿色光带侵入受虐者意识，下达强制性指令。\n2. 受虐者意识清醒，但身体完全听从施虐者命令，例如转身用乳房摩擦墙壁、趴地像狗一样摇臀、学狗叫等。\n3. 施虐者刻意在受虐者拼命抵抗时暂停控制，让其用自己的意志说出“主人”等称呼，将最后的心理防壁撕成碎片，让受虐者亲历自我崩溃的全过程。", "uid": 1154}, "多功能淫刑木牛": {"content": "{多功能淫刑木牛}\n简介：\n由冷硬黑铁与厚实皮革铸成的重型刑架，外形仿若一匹低头刨蹄的公牛，脊背上竖立着数根布满狰狞颗粒与弯曲突起的粗大假阳具。马腹暗藏蒸汽发生装置，可将特制催情媚药加热成淫靡白雾，通过马背细孔与阴道扩张器直喷受虐者最为敏感的黏膜。腰腹固定皮带内嵌多组电极，与抽插节奏联动释放精准电击；口部衔铁延伸出细管，强制灌入浓缩催情剂。整座刑具宛如一头不知疲倦的钢铁淫兽，专为彻底摧毁意志而设计。\n\n用法与交互：\n1. 受虐者被剥去衣物，双腿大张跨坐于马背，阴道与后庭被强迫吞入狰狞假阳具，腰部、手腕、脚踝随即被多层皮带死死锁紧，身体呈彻底敞开的屈辱姿势。\n2. 启动动力机关，假阳具开始以不可预测的节奏猛烈顶撞、旋转、膨胀，同时马腹涌出滚烫媚药蒸汽，强制阴道与宫颈在药物作用下充血发情，快感与灼痛混杂成无法抵抗的生理反应。\n3. 腹部皮带内置电极根据抽插频率释放脉冲，强制子宫剧烈收缩，将高潮一次次从体内深处绞榨而出；口中导管同步注入催情液，迫使受虐者在窒息与迷乱中持续尖叫。\n4. 整套工序被设定为无解脱循环——受虐者将在持续数小时的强制高潮与电击间反复崩溃失禁，意识混乱，直至彻底虚脱，甚至留下永久性的应激反射。施虐者仅需冷眼旁观，偶尔调整节奏或温度，便可欣赏一具肉体如何在精密机械下被碾磨成只会抽搐求饶的淫液容器。", "uid": 1155}, "远程监控电击排泄管理贞操锁": {"content": "{远程监控电击排泄管理贞操锁}\n简介：\n一套植入体内的全封闭式电子贞操系统，由施虐者通过手持终端远程操控。金属牢笼死死锁住受虐者的下体，内置神经感应电击模块与排泄管理程序。当排泄模式开启，受虐者的括约肌将完全失去控制，在绝望的羞耻中当众失禁。每一次电击的强度、时长、间隔均可精确设定，甚至能与受虐者的心率、肌肉紧张度联动，形成“越羞耻越惩罚”的恶性循环。\n\n用法与交互：\n1. 排泄管理：施虐者一键激活“排泄模式”，受虐者瞬间丧失对膀胱和肠道的全部控制，热流或更污秽的浊物毫无尊严地沿着金属导管淌出，无法停止也无法隐藏。\n2. 电击惩罚：内置电击模块紧贴最敏感的神经末梢，施虐者可随时释放从酥麻刺痛到灼烧痉挛的不同级别电流，迫使受虐者屈服。\n3. 联动示众：若受虐者企图抑制失禁或表现出反抗痕迹，生理传感器将触发加倍电击，并向外围同步播放失控的湿漉声响，最大化摧毁羞耻心。", "uid": 1156}, "敏感药水": {"content": "{敏感药水}\n简介：\n一瓶散发甜腻香气的红色药水，灌入后能使皮肤敏感度急剧放大，连空气流动都化作绵密的爱抚。\n\n用法与交互：\n1. 强制灌服后，受虐者浑身燥热，肌肤变得极度敏感，任何轻微的触碰、呼吸甚至视线都会引发难以忍受的快感涟漪。\n2. 这种状态可作为后续调教的前置，让最温柔的折磨也变成酷刑，令受虐者无法逃避。", "uid": 1157}, "敏感针": {"content": "{敏感针}\n简介：\n一根细长的银针，刺入特定的穴位后，能将快感放大十倍，却将高潮死死锁在临界点之上，除非得到允许。\n\n用法与交互：\n1. 施虐者将银针刺入受虐者后颈（或其他秘穴），受虐者瞬间感到电流般的颤栗传遍全身，每一寸肌肤都沦为欲望的活火山。\n2. 此后任何刺激都会累积成磅礴的快感风暴，但顶峰永远悬而未决，形成一种足以碾碎神志的边缘煎熬。只有施虐者拔出银针或给予许可，那被囚禁的高潮才会轰然降临。", "uid": 1158}, "精液狗粮自动喂食系统": {"content": "{精液狗粮自动喂食系统}\n简介：\n一套由定时器、搅拌槽和食盆组成的全自动喂食装置，可将新鲜精液与廉价狗粮充分混合，定时投放给被囚禁的奴隶。食盆旁固定着一个低矮的狗砂盆，构成完整的屈辱进食与排泄循环。整个系统被锁死在无法触及的角落，没有任何停止或拒绝的余地，将受虐者的 以最低档位持续刺激，同时项圈每隔30秒发出短促的警告电击，直到受虐者迎来首次高潮。屏幕数字跳动至“1”，但计时器仍在无情流逝。\n2. 每当计数增加，下一次高潮所需的刺激阈值会被程序智能提高，振动频率反而降低，迫使受虐者必须在逐渐麻木的身体中寻找更强烈的快感，而每一次延迟都可能让电击等级累积上升。\n3. 若在时限内未完成规定次数，项圈瞬间释放足以让全身痉挛的电流，同时屏幕数字残忍地归零，振动停止5秒作为“冷却惩罚”，随后响起新的提示音：“失败。目标次数追加2次，计时重置。”\n4. 最终阶段，程序要求受虐者必须在5分钟内连续高潮2次，方能解除所有束缚。否则，电击将转为持续不断，直到施虐者手动终止——而这往往意味着更屈辱的交换条件。", "uid": 1171}, "体香由内渗透灌肠调教装置": {"content": "{体香由内渗透灌肠调教装置}\n简介：\n【场景/道具描述】\n一个专为受虐者设计的灌肠拘束台，呈“凹”字形，能将她用M字开腿、撅起臀部的羞耻姿势固定。台内伸出管道分别连接尿道锁和拉珠改造的灌肠管。整套流程分为清洁灌肠与香味渗透灌肠两阶段，使用含魔法香味因子的特制灌肠液。\n\n用法与交互细节：\n1. 主人出门前，受虐者需主动进入灌肠室，咬开选定香味（如香草）的灌肠液注入吊瓶，并摆好姿势进行自我拘束。\n2. 尿道锁对接抽空膀胱，后庭拉珠内部释放凝胶堵住肠道，随后转化成管道注入清洁液进行第一阶段清洗。\n3. 第二阶段注入含香因子的灌肠液，需静置三十分钟，让香味因子通过肠壁渗透进体内，使全身肌肤汗液及口腔、爱液等所有体液都散发出该香气，效果远胜任何外用香水。\n4. 过程中受虐者被深喉口塞封口，四肢腰腿全部锁死无法动弹，只能在漫长的等待中承受肠道内凉意与尿道刷洗的双重羞耻刺激，作为“粉饰自己为主人赢得赞誉”的代价。\\n\\n【包含类似变体】：灌肠清洁拘束套, 双重灌肠清洁与风味羞辱, 强制灌肠憋尿控制器, 灌肠清洁与尿道锁控制, 极寒薄荷尿道清洁与温度调教", "uid": 1172}, "淫纹高潮阻断与强制注射系统": {"content": "{淫纹高潮阻断与强制注射系统}\n简介：\n【场景/道具描述】\n在小腹铭刻的淫纹魔咒，能大幅提升身体的敏感度，却又从生理上彻底阻断高潮，让受虐者永远停留在即将绝顶却无法释放的煎熬中。配合两根粉色输液管固定于束腰两侧，细针刺入乳头持续注入媚药和利尿剂，同时皮革拘束衣的尿道锁夺走了排泄权。随着膀胱逐渐充盈，体内的振动棒仍在低频持续刺激，受虐者被快感与排泄欲双重绞杀，整个人在无尽的渴求中一步步崩溃。\n\n用法与交互：\n1. 在受虐者小腹或子宫处施加淫纹，激活后敏感度翻倍，高潮阈值不断被推高却永远无法到达。\n2. 穿刺乳头并连接输液管，缓缓注入媚药与利尿剂。媚药让身体持续发热瘙痒，利尿剂迫使膀胱充满苦闷感。\n3. 封锁尿道，使受虐者无法自行排尿。随着时间推移，下腹的胀痛与性欲焦灼共同构成难以忍受的酷刑。\n4. 结合振动棒或后庭塞等内部刺激，使受虐者在无止境的“差一步”中精神恍惚，最终崩溃求饶。", "uid": 1173}, "强制高潮演示场景": {"content": "{强制高潮演示场景}\n简介：\n将受虐者拘束在固定位置，与另一名正在被粗暴侵犯的雌性面对面，视线、姿势完全对称，通过视觉、听觉与强迫共情摧毁心理防线的调教场景。\n\n用法与交互：\n1. 受虐者被镣铐或支架固定成双腿大张的姿势，无法移开视线，与同样被侵犯的对象相隔极近，几乎能看到对方小穴颤抖的每一丝细节。\n2. 施虐者命令被侵犯的雌性在绝顶边缘对受虐者进行言语羞辱或“教学”，例如详细描述高潮的感受、逼问她是否羡慕、是否想要被如此插入。\n3. 当被侵犯者高潮时，受虐者会同步感受到体液飞溅到身上、浪叫直穿耳膜，自身因淫纹或药物作用下被迫承受无法缓解的酥痒，最终只能崩溃求饶或屈服于欲望。", "uid": 1175}, "淫态记录与器官扫描水晶": {"content": "{淫态记录与器官扫描水晶}\n简介：\n一枚由魔法晶石制成的记录水晶，能够拍摄下受虐者绝顶时的痴态，还能通过魔力扫描阴道与后庭的内部形状，保存为永久数据。施虐者借此彻底剥夺受虐者的羞耻，并可依据数据制作完美贴合其身体的定制刑具。\n\n用法与交互：\n1. 在受虐者被迫高潮后，施虐者将水晶贴近其股间，启动魔力扫描——仅此轻微刺激就会让敏感的身体再次痉挛失禁。\n2. 水晶可随时回放受虐者失神吐舌、乳汁与爱液齐喷的影像，作为胁迫其服从的筹码。\n3. 扫描获取的腔道模型可用于制造与内部形状完全吻合的肛塞、假阳具或内壁电击器，达到正常道具无法企及的神经刺激与精神羞辱。", "uid": 1176}, "重力自进振动榨乳悬吊装置": {"content": "{重力自进振动榨乳悬吊装置}\n简介：\n将受虐者以双手缚后、双腿M字捆缚的倒悬青蛙姿势全裸吊起，利用重力使塞入下身双穴的小臂粗振动棒持续向深处进犯。垂挂的乳房上固定榨乳器，每次因高潮而颤抖即喷涌乳汁，尽数收集于罐中。\n\n用法与交互：\n1. 受虐者被完全剥夺自主行动力，身体随重力自然下坠，导致体内假阳具模拟永不间断的更深顶入。\n2. 榨乳器与高潮痉挛联动，形成“越绝顶越被抽吸”的绝望循环，乳汁被持续榨取直至枯竭。\n3. 放置于公共区域，任由旁观，其不停歇的呜咽与乳汁喷溅声构成淫靡的背景音，时刻强化被物化的屈辱。", "uid": 1177}, "名器之穴的诅咒": {"content": "{名器之穴的诅咒}\n简介：\n【被施以诅咒或手术改造的腔道，外观如少女般紧致粉嫩，内部却布满活物般的皱褶与颗粒，能主动蠕动、吸吮。任何雄性一旦进入，便会体验到极致的快感，但此后再也无法从其他伴侣身上获得满足，射精与高潮被彻底绑死于此穴。】\n\n用法与交互：\n1. 当受虐者被插入后，腔道会自动根据阳具形状进行完美贴合与摩擦，给予双方无上欢愉。\n2. 使用者在射精后会形成生理与心理的强烈依赖，离开此穴后，阳具会变得麻木无感，唯有再次进入才能勃起与高潮，最终沦为只认此穴的行尸走肉。\n3. 施虐者常以此作为对不忠者或仇敌的终极惩罚，令其在极乐中失去作为雄性的尊严，直至被榨干或自我了断。", "uid": 1180}, "流浪汉围观的公开高潮与追猎": {"content": "{流浪汉围观的公开高潮与追猎}\n简介：\n一种极具压迫感的公开羞耻玩法。施虐者将受虐者带到阴暗的城市角落，故意吸引大批流浪汉、底层贱民围观。受虐者被摆成把尿般的姿势分开大腿，裸身展示淫态，被迫向这群如狼似虎的雄性发表淫语宣言，并在他们的视奸下当场绝顶潮吹，将地面浇出水洼。高潮后，受虐者因脱力无法逃跑，后方暴民被煽动得群起追捕，施虐者再在半羞辱半救援的节奏中，让受虐者持续承受后庭刺激，在濒临沦陷的恐惧与快感中反复崩溃。\n\n用法与交互：\n1. 施虐者提前为受虐者佩戴好只余项圈与丝袜的裸露装束，后庭塞入刺激物。\n2. 将其抱至流浪汉聚集地，以婴儿把尿姿势分开大腿，公开所有私密部位。\n3. 教唆受虐者向围观人群发表高傲却破碎的讲话，直至话被高潮打断，在无数视线的戳刺下绝顶失禁。\n4. 趁受虐者高潮脱力、人群暴动时，施虐者以敏捷身手带其翻墙逃离，过程中故意延迟抽出后庭道具，让受虐者在逃跑中持续高潮，体会被追上的绝望边缘。", "uid": 1181}, "圣雷责罚": {"content": "{圣雷责罚}\n简介：\n蕴含神圣净化之力的雷电，既是至高的惩戒，又是极致的羞辱。施虐者将这股圣雷凝于掌心，劈落在受虐者最隐秘的所在，令其理智与羞耻一同崩毁。\n\n用法与交互：\n1. 施虐者驱动圣雷，手掌爆耀紫色或金色雷芒，于大庭广众之下重击受虐者的臀部或私处，每一次落下都带着破风尖啸与神圣威压，皮肉炸响之际电流侵入体内，灼烧着淫水与子宫，令受虐者瞬间被推上强制高潮，同时感受到灵魂被“净化”的绝望。\n2. 圣雷可精准刺激屁穴、阴蒂、子宫口等最敏感处，施虐者将电流通过手掌缓缓揉捏注入，受虐者会感到内脏被雷电贯穿、淫水沸腾，小穴如同被烧烂一般，却又在崩坏的边缘无法自拔地渴求更多，直到双眼翻白、漏尿不止，满口含糊的忏悔与求饶。", "uid": 1182}, "足心弱点强制高潮": {"content": "{足心弱点强制高潮}\n简介：\n受虐者的足心天生藏有一处命门般的敏感带，一旦被施虐者攥紧或持续碾压，便会触发无法自已的连锁快感，理智瞬间熔毁，身不由己地化作只会浪叫求饶、从花穴喷出圣洁潮水的“足便器”。\n\n用法与交互：\n1. 施虐者褪去受虐者的鞋袜，攥紧其雪嫩美足，拇指狠狠扣入足心凹陷。受虐者会当即仰头失声，双腿绷直，下身如银瀑般失禁潮吹。\n2. 即便受虐者身居高位，魔力滔天，一旦足心命门被制，也会立刻露出最下贱的雌性表情，翻着爱心眼吐出不成句的娇吟，连真实身份都可能脱口而出。\n3. 施虐者可一边拖拽其足踝，一边持续揉按足心，将高高在上的存在从王座硬生生拽落，令其在众目睽睽之下一边高潮一边求饶，尊严与威仪尽数碾作春水。", "uid": 1183}, "排泄与高潮的定时封锁与屈服性交易": {"content": "{排泄与高潮的定时封锁与屈服性交易}\n简介：\n【场景/道具描述】\n一套集成在受虐者体内的系统性封锁装置：尿道塞、填充整个后庭的拉珠、紧贴下体的触手层与外部的贞操带共同构成不可摧毁的排泄防线，任何体液都无法自主排出，长期憋闷。同时，子宫内的跳蛋和体表淫纹构成了高潮控制体系，持续不断的刺激将性 次潮吹的瞬间，受体必须一边喷出淫液一边向镜头保证“没有高潮”，声音甜美但眼底绝望。粉丝通过弹幕和投票实时参与调教指令，受体宣读粉丝评论作为台词，将羞耻公开化为表演的一部分。\n3. 纯爱扭曲的入口：当受体终于撑不住失败时，面临的不是谩骂而是调教者“宽容”的追加条款。一次次的失败被包装成“受虐者还需要更多训练”，惩罚被美化成延长主人陪伴的时间。“合同再加10天”——这句宣判在受体耳中，竟隐隐变成了一种扭曲的承诺：她不会被抛弃，她会一直被调教，被占有。\\n\\n【包含类似变体】：强制角色扮演合同与魔性规则, 反高潮潮吹挑战规则, 胁迫性演艺合同与肖像控制, 催眠合同-期限延长的绝望牢笼, 催眠合同, 催眠合同：植入认知屏障的七日契约", "uid": 1219}, "高潮定格与永恒娼妓化": {"content": "{高潮定格与永恒娼妓化}\n简介：\n【场景/道具描述】\n魔域最终污染机制，在受体灵魂熟睡时发动。灵魂被剥离至一个光怪陆离、景象如魔方旋转的空间，周围充斥着此起彼伏的呻吟。\n\n用法与交互细节：\n1. 无数根肉棒同时操弄受体的所有穴口，无数双手挑逗全身敏感带，将受体推上无尽的高潮顶峰。\n2. 身体状态被永恒记录在高潮前后的瞬间，成为一则循环的动图。受体在得到无尽满足的同时感到无尽空虚，最终失去理智，加入这场永不结束的高潮合唱，在彻底的快感中迎来灵魂的堕落与永恒的囚禁。", "uid": 1220}, "露出调教课堂：仪态维持与强制排泄控制": {"content": "{露出调教课堂：仪态维持与强制排泄控制}\n简介：\n【场景/道具描述】\n一间只有一张椅子的表演教室。调教者名为“老师”，其通过“修身齐家，处变不惊”的荒谬借口进行残酷的调教。道具包括了跳蛋和带有软刺的灌肠肛塞。课程的核心命令是：无论身体受到多大的刺激或者面临排泄的生理极限，受体都必须维持端庄优雅的坐姿或站姿，不得显露出丝毫媚态。\n\n用法与交互细节：\n1. 受体被迫穿上衣物掩盖剧烈运作的情趣道具。在肛塞灌满液体并高频振动时，受体需要保持立正姿势，控制面部表情不失控的同时，死命紧缩后穴防止失禁。这种高强度的意志训练，实则是在凌辱中剥夺最后一丝作为人的羞耻忍耐权。\n2. 老师利用“时间重置”机制，只要受体发出声音或露出难堪的表情，计时就归零重来。在这种绝望的循环中，受体的精神支柱被一点点敲碎，最终为了获得解脱而只能选择服从，甚至对施加惩罚的老师产生了精神依赖。", "uid": 1221}, "热风强制绝顶地狱": {"content": "{热风强制绝顶地狱}\n简介：\n在利用清洗液将受体身体变得极度敏感后，立即使用强劲热风对其进行风干。热风不仅吹走液体，更转化为摧毁理智的连续高潮风暴，让受体在无尽的快感中失禁、崩溃、失去意识。\n\n【场景/道具描述】\n一个布满巨大扇叶风洞的房间，吹出强劲的热风。是承接“清洗液”步骤后的一个流水线式调教环节。\n\n用法与交互细节：\n1. 调教者将全身湿透且极度敏感的受体送入风洞房间。强劲的热风直接吹拂其敏感的花核、乳尖和被撑开的肛穴，带来毁灭性的多重高潮。\n2. 在猛烈热风的持续刺激下，受体在连续高潮中失禁、潮吹，理智被快感彻底冲垮，最终晕厥。这一过程高效地将受体还原为只为快感而生的“实验素材”，剥夺其所有反抗的意志。", "uid": 1222}, "高潮禁止与极限服从测试": {"content": "{高潮禁止与极限服从测试}\n简介：\n【场景/道具描述】\n在完成基础洗脑调教后，在实验室或调教室中，由调教者和可能的旁观者在一起进行的服从度极限测试。\n\n用法与交互细节：\n1. 调教者对受体下达“绝对不可以高潮”的命令。\n2. 然后，调教者开始极具技巧地玩弄受体的身体，包括但不限于揉捏酥胸上的红樱、按压摩擦下腹的淫纹、用指尖探入花径触碰娇嫩穴壁。\n3. 受体在强烈的快感冲击下，牙关紧咬，理智崩溃，全身颤抖，眼泛泪光。她如同溺水者望向浮木般，用乞求的眼神注视着调教者，恳求他赐予高潮的许可，以此证明她已将自身的性快感控制权完全上交。", "uid": 1223}, "投影式羞耻沉沦——高潮记忆的强制循环与自我淫戏": {"content": "{投影式羞耻沉沦——高潮记忆的强制循环与自我淫戏}\n简介：\n【场景/道具描述】\n在催眠深度下，调教者通过言语引导受体的意识进入一个“黑暗的投影幕布空间”，反复回放受体从被侵犯到高潮的屈辱记忆，并以暖流般的酥麻感应强行关联身体。当受体的肉体与画面中的自己共鸣时，理性彻底离崩，转化为不由自主的自慰冲动。这是一种内化的恶堕机制，让受体在无外力操控的情况下，主动追逐被凌辱的记忆带来的快感。\n\n用法与交互细节：\n1. 调教者在受体达到第一次被迫高潮后，趁其意识空白，低语道：“回想刚刚高潮的状态，一遍、两遍，慢慢痴迷在其中。”受体眼前浮现虚拟景象——粗大的检测棒重新撕裂小穴，处女血与淫水飞溅，痛苦转瞬间化为甘美的酥麻。受体虽喃喃反驳“不，这不是我”，但身体却跟随投影画面一同颤抖、痉挛，快感的真实感淹没了所有否定。\n2. 投影中的细节被刻意强调：花心被一次次粗暴冲撞，肉穴沦为水泽，淫乱水声响彻耳畔。受体在看到画面中自己变得如同母兽般凌乱痴态时，羞耻与快感同时飙升到临界点，最终理性崩溃，双手不受控制地摸索小穴，疯狂抠挖自慰，追求“投影中的极乐”。\n3. 当受体在清醒后羞耻到无地自容，调教者加以赞美：“你瞧，这就是你的本性，很美。”这句赞许如同一道惊雷，将受体的自我厌恶转化为被欣赏的幸福。此后，哪怕没有投影引导，只要回忆起治疗细节，受体便能自发高潮，甚至会幻想医生在场，以更淫荡的姿态反复自慰。", "uid": 1224}, "宫颈开发与花心高潮调教": {"content": "{宫颈开发与花心高潮调教}\n简介：\n【场景/道具描述】\n使用一个布满震动凸点的金属扩张器，专门用于刺激宫颈。结合调教者手指在受体腹部（子宫上方）的按压画圈，迫使子宫口反复开放，达到“花心高潮”。\n\n用法与交互细节：\n1. 受体躺卧张开双腿，调教者将冰冷的金属棒缓缓插入阴道深处顶住宫口，开启震动，由弱到强。受体感到体内过电感，从不适变为沉溺。\n2. 调教者另一只手在受体小腹用力揉按子宫位置，让腹内外快感叠加。受体仰头弹起腰肢，失控浪叫，体验无法自控的强制高潮。\n3. 调教者温柔安抚“你的身体慢慢能体验到花心高潮了”，受体羞耻中产生开心，渴望下一次更深入的开发。", "uid": 1225}, "多重敏感带同步摧垮疗法": {"content": "{多重敏感带同步摧垮疗法}\n简介：\n【场景/道具描述】\n同时启动阴蒂坠球、乳环的震动，并用宫颈扩张棒顶住宫口震动，同时调教者以手指刺激受体的尿道口。多方位敏感带被同步攻击，迫使受体在短时间内因为过载快感而彻底失神、潮吹甚至排尿。\n\n用法与交互细节：\n1. 在高潮余韵中，调教者突然开启所有震动装置，并将食指放在受体尿道口画圈按压，尿道口的酸胀快感让受体惊叫。\n2. 受体扭动如发情母猫，理智完全融化，只能追逐快感。调教者用力按压小腹子宫，引发多处同时爆发，受体哭叫着喷射大量淫液与尿液。\n3. 事后受体瘫软，感到羞耻却像毒品般上瘾，认为只有如此激烈的治疗才能满足自己，渴求下一次被彻底玩坏。", "uid": 1226}, "禁欲命令与边缘封锁调教": {"content": "{禁欲命令与边缘封锁调教}\n简介：\n【场景/道具描述】\n在日常场景（如教室）中，受体因随身佩戴的乳环、阴蒂环等道具而时时发情，无法专注。调教者通过手机发送霸道的“忍耐命令”，要求受体在自慰临近高潮时必须停手，以此制造强烈的渴求感，强化精神控制。\n\n用法与交互细节：\n1. 受体在教室偷偷自慰，即将高潮时脑中响起调教者的命令“每次临近高潮，你必须要停手忍耐”，她强忍快感停手，空虚得几乎落泪。\n2. 由于没有得到释放，欲望累积愈发强烈，受体一整天都会处于煎熬之中，但一想到晚上调教者的“治疗”，便觉得一切忍耐都是值得的。\n3. 这种延迟满足让受体对调教者产生更深的依赖，主动认为自己需要被管理，每一次遵守禁令都像是在交付忠诚。", "uid": 1227}, "腿环上的秘密藏馆——被动式公开羞辱装置的叠穿美学": {"content": "{腿环上的秘密藏馆——被动式公开羞辱装置的叠穿美学}\n简介：将多种遥控情趣玩具、排泄管制装置与电击刑具，以“半遮半掩”的方式佩戴在受体裙下的腿环上。这不仅是身体控制，更是一种精心设计的心理施压，通过让受体意识到这些装置可能被外界窥见，从而制造持续的羞耻感与觉醒的矛盾快感。\n\n【场景/道具描述】\n场景为公开的摄影棚。受体穿着短裙，大腿内侧的专用腿环上依次固定着：三枚不同颜色与功能的跳蛋遥控器（分常规、双频、强震）、一个连接着细长导管的透明软胶尿袋、以及一个带有闪电标志的微电流电击装置。这些设备紧贴肌肤，藏于裙摆的阴影与蕾丝交界处。同时，受体尿道内置入了一种由柔性合金制成的尿道锁，其单向阀设计彻底封闭了尿路，使其长期处于无法自行排泄的憋尿状态。\n\n用法与交互细节：\n1. 受体被告知必须在镜头前展示“纯情”姿态，但每一次转身、裙摆飘动，设备都会若隐若现。这种“无意”的暴露是刻意的演出，受体在恐惧被窥见与渴望被发现的挣扎中，腰肢发软，羞耻心被充分焚灼。\n2. 受体可通过假装整理袜带的小动作，自行激活电击或打开尿道阀。在憋尿感长久的折磨下，当温热的尿液顺着大腿内侧蜿蜒而下时，伴随脉冲电流的灌入，极致的生理释放与公开失禁的耻辱感重叠，让她在未受直接触碰的情况下便几近高潮。这种秘密的排泄与电击带来的快感，被视为对支配者“主人”虔诚的自我献祭。\n3. 支配者通过单边耳机夸赞她“很努力”，简短的话语在受体体内引发比物理刺激更剧烈的反应，瞬间烧穿她的克制，证明其精神与肉体已被完全训练为以支配者的评价为最终快感开关的“人偶”。", "uid": 1229}, "感官倍增与银紫瞳印——生物层面的灵魂臣服标记": {"content": "{感官倍增与银紫瞳印——生物层面的灵魂臣服标记}\n简介：通过药物或超自然手段，将受体变为完全的“敏感体”，并生成一种名为“银紫色瞳印”的生理特征，作为她精神力与情感堕落到达特定阶段的视觉证明。\n\n【场景/道具描述】\n受体原本拥有正常的感官，经过改造后身体发生了质变。全身性感带化，敏感度被增幅至常人的100倍，即便是空气的轻微流动、衣物的细微摩擦，都可能引发连锁的快感反应甚至高潮预兆。最显著的特征是她的眼瞳颜色，在未动情时呈现妖异的紫色，一旦动情或受支配者影响，瞳孔中便流转出银色的光纹，交织成所谓的“银紫色瞳印”，是支配者打下烙印的表现。\n\n用法与交互细节：\n1. 受体被迫在这种毫无缓冲余地的感官轰炸下生活，必须时刻对抗随时会因外界刺激而崩坏的意志，却又逐渐适应并主动记忆这种颤栗的路径。这种维持表面体面的“忍耐”，本身就是一种需要巨大心力的变态调教。\n2. 在拍写真或与喜欢的人（如男配）对视时，随着呼吸或对方视线的游走，她的眼瞳颜色不受控制地忽明忽暗。瞳色的加深不仅暴露了她正处在极度动情的状态，更像是一种无声的、无法掩饰的向支配者进行的生理性示爱。对方也许在欣赏她的美貌，但这对眼睛无时无刻不在告诉在场的人，这具身体的所有生理反馈都写满了另一个“主人”的名字。", "uid": 1230}, "四肢剥夺与三千倍神经反馈——被折叠的感官地狱与爱抚": {"content": "{四肢剥夺与三千倍神经反馈——被折叠的感官地狱与爱抚}\n简介：受体因“雌竞任务”失败而遭受的终极惩罚。利用超现实手段（折叠空间）将她的四肢按入虚无，使其彻底丧失行动能力，并将切口处的神经敏感度提升至极限，令其沦为一个纯粹依靠施舍获得反馈的肉块。\n\n【场景/道具描述】\n受体被悬挂在家中客厅的木制悬架上。她的四肢从根部断裂，断面被光洁的金色金属环片覆盖。这些环片连接着细链，被收纳在背后的把手上。从外界看来，她只剩下能出汗、产乳、颤动与分泌各种体液的躯干。如果调教者需要，可以不断拔出那些金属片，将四肢暂时从虚空中拽出，此时的四肢每平方毫米的触觉都如雷电般敏感。\n\n用法与交互细节：\n1. 这种惩罚被包装成对“力量不足”的后果，而非施虐。受体虽然感到无尽的恐惧，但内心却不断反省是自己太弱才会变成这个样子。她逐渐接受“失败者没有拥有身体的资格”，甚至因为自己这种滑稽可悲的样子还被主人收藏在家里最显眼的地方，并作为“待客收藏”展出，而滋生出诡异的自豪。\n2. 在来访者触碰她时，她会因为哪怕最轻微的触碰（如捏弄只有躯体的乳肉）便剧烈高潮痉挛。在这种丧失四肢、尊严塌陷的绝症中，如果调教者或男配紧紧抱住她、抚摸她的头发，她会在灵魂散落的边缘彻底爱上对方。因为在绝对无感与剧烈敏感的双重极刑下，任何带有意图性的接触，都会被大脑强行解读为唯一的救赎。她会对持有她、给她喂食、为她处理排泄物的人，产生一种婴儿对母亲般的极致纯爱依恋。", "uid": 1231}, "绝对绝望催眠调教：30日高潮禁止与感官凌迟": {"content": "{绝对绝望催眠调教：30日高潮禁止与感官凌迟}\n简介：\n【场景/道具描述】\n为期30天、每天18小时的高强度调教企划。受体需接受“绝对禁止高潮”的催眠暗示，身体却被持续刺激：鼻孔被鼻勾扩张至疼痛，纸棒开苞鼻腔；鼻腔被精液倒灌；乳尖和阴蒂用真空吸盘吸至红肿；肠道内塞入高纯度媚药缓释胶囊，吸收速率堪比静脉注射；小穴塞入超过10颗跳蛋，遥控线垂落如尾巴。全身用马克笔写着“肉便器”“免费中出”等羞辱文字，在摄影棚直播，被命令全程保持甜美笑容解说。\n\n用法与交互细节：\n1. 催眠暗示与生理反应的悖论：受体被暗示禁止高潮，但媚药、跳蛋、吸盘等刺激让快感不断堆积，每次临近高潮都会被催眠强制压下，导致更强烈的反弹。她在镜头前强撑笑容，腿部肌肉痉挛，最终在无法忍耐时崩溃漏尿，迎来被禁止的绝顶，瞬间的解放感与催眠失败的屈辱交织，形成自虐般的绝叫。\n2. 拍摄间隙，受体用日志记录：“他们想出用卫生纸搓成纸棒给我的鼻孔开苞……这种无法抗拒只能被凌虐的想法，就足以让大脑产生快感了。”她在极度痛苦的鼻灌肠中高潮，渐渐认同“影片中被玷污的雌奴隶才是真实的自己”，将调教视为追逐真实自我的纯爱献祭。", "uid": 1232}, "项圈电击矫正与双重人格表演": {"content": "{项圈电击矫正与双重人格表演}\n简介：\n【场景/道具描述】\n受体脖颈佩戴可远程控制的电击项圈，内侧线圈能释放细密电流窜过皮肤与舌根。配合催眠规则，每当受体流露出真实反抗意志时，电流瞬间击碎清醒，强制切换为谄媚人格发言。\n\n用法与交互细节：\n1. 受体在镜头前不自主吐露恐惧（“呜…不要…求求主人不要上传”），支配者按下按钮，电流令其猛仰头翻白眼并失禁漏尿，随后意识被强制覆盖为甜腻表白（“受虐者最喜欢主人，请把高潮特写放视频封面”）。\n2. 受体清醒时用指甲刺入掌心试图挽回神智，电流再度袭来将其打回淫态，形成“反抗-电击-人格切换-崩溃”的循环，最终被羞辱为“被项圈勒着就高潮漏尿的废物”。", "uid": 1233}, "封床与睡袋：感官剥夺的培欲摇篮": {"content": "{封床与睡袋：感官剥夺的培欲摇篮}\n简介：\n【场景/道具描述】\n一块巨大的椭圆形莹白温玉，可从中间打开。受体被穿上紧身丝质睡袋，包裹成无助的“美人鱼”姿态，然后被放置于温玉软垫中。封床合拢后，会膨胀挤压受体全身，同时启动体内所有道具进行循环刺激，但永远在高潮前一刻停止。整个过程剥夺视觉与听觉，将睡眠转化为一场持续整夜的求而不得的情欲折磨。\n\n用法与交互细节：\n1. 睡袋束缚：薄薄的丝质睡袋紧贴全身，让受体连抬腿都极其困难，从入睡前便开始灌输“你是一个优雅、无助的淑女”的心理暗示，无力感浸润整个意识。\n2. 强制灌媚药与培欲：在进入封床前，体内被灌注大量粉红色媚药液体，让子宫、肠道、膀胱都处于饱胀与渴望状态。随后是整夜的“刺激-接近高潮-强行中断”循环，让受体在无法动弹、无法呼喊的绝对黑暗中，精神崩溃，反复乞求高潮而不得，直至昏厥。次日被解放时，饱胀的尿意和奶水成为新一天的起点，周而复始，将身心的渴望逐步调教成肉体的本能。", "uid": 1234}, "屠龙者的强制审问与初次征服": {"content": "{屠龙者的强制审问与初次征服}\n简介：\n【场景/道具描述】\n在遇袭后的杂木林深处，调教者将受体捆缚在损毁马车的残骸上，周围是折断的树干和战斗余迹。调教者以救命恩人的姿态索取“报酬”，用撕破的白丝裤袜、被褪到膝弯的蕾丝内裤和受体失却的一只高跟鞋，营造出无处可逃的野外凌辱舞台。破损的白丝勒在大腿上，露出破洞的肌肤，强调着受体的无力与破碎感。\n\n用法与交互细节：\n1. 调教者以“审问时间”为名，将手指强行探入受体未经人事的小穴，一边搅弄膣肉一边逼问其自慰频率和性幻想对象。每句谎言或迟疑都会换来更猛烈的指奸，迫使受体在屈辱中亲口承认自己的秘密，将私密的自我抚慰化为被掌控的证据。\n2. 调教者熟练地把玩受体的白丝玉足，从脚踝按摩到脚趾，迫使受体在厌恶中腰肢发软，随后趁其分神，将肉棒插入已被手指充分调教的蜜穴，并刻意让受体在破瓜的剧痛来临前直接绝顶，用初次的高潮冲刷掉被强暴的悲伤与悔恨。\n3. 调教者在抽插中继续追问“最想结婚的对象”，将性占有与婚姻支配直接绑定。受体的任何抗拒都会引发更激烈的冲刺，最终在被迫紧拥调教者的痉挛中，子宫口被龟头不断撞击，完成从身到心的初次强制烙印。\\n\\n【包含类似变体】：战场审问·强制高潮的初次雌堕烙印", "uid": 1235}, "羞耻哺乳式揉胸高潮": {"content": "{羞耻哺乳式揉胸高潮}\n简介：\n【场景/道具描述】\n在受体被迫托起并展示双乳的状态下，调教者采用由轻到重、由外圈到乳尖的熟练手法揉捏胸部。通过画圈、轻刮、捏转乳头等动作刺激乳腺与皮下神经，直接导致受体在没有下身接触的情况下，仅靠胸部玩弄就达到失禁般的高潮喷溅。\n\n用法与交互细节：\n1. 调教者先是温柔爱抚让受体放松，随即突然捏住乳头扭转，利用痛觉与快感的混合冲击突破忍耐极限。\n2. 调教者在高潮时对受体下达“不要忍了，高潮吧”的催眠命令，将受体自身的意志完成转写为被迫，并诱导其将高潮归因于调教者的技巧。\n3. 事后调教者以夸奖“连高潮都这么可爱”和提出“每天都可以跟我一起色色”的扭曲爱意邀请，营造亲密关系假象。", "uid": 1236}, "活体模特羞辱T台高潮秀": {"content": "{活体模特羞辱T台高潮秀}\n简介：\n【场景/道具描述】\n大学社团的公开走秀舞台，T台下方是手持手机拍摄的狂热观众，上方的大屏幕对受虐者进行全方位的特写。受虐者身着白色小礼服，但裸露的肩臂和裙摆下，显露出极度淫荡的黑色全包乳胶衣和口塞。她被一项圈和牵引链拴着，脚踩20厘米的恨天高，被迫像宠物一样绕场行走，而下体内的振动器被开到最大。\n\n用法与交互细节：\n1. 行走的痛苦与失控，极高的鞋跟加上双手被  {"content": "{乳环-阴蒂链-穴内假阳具三位一体枷锁}\n简介：\n【场景/道具描述】\n一套精密的肉体改造与连接装置。两颗红肿挺立的乳头上各穿有一枚乳环，用一根银链横在胸口中央连接。银链向下延伸，最终扣在一个深深嵌入敏感阴蒂中的小巧环扣上。在阴蒂下方，一根巨大的假阳具深深插入蜜穴，其底座如封印般紧贴穴口。\n\n用法与交互细节：\n1. 将受虐者身上最敏感的三个点（双乳乳头、阴蒂、阴道）冷酷地禁锢并连接在一起，任何一点的动作都会牵动整个系统。\n2. 假阳具以固定频率进行凶猛的抽插，每次顶入都让小腹微微凸起一个淫荡的形状，每次抽出都带出大股粘稠淫水。\n3. 受虐者被永远残忍地停留在高潮爆发前最磨人的一瞬，永远无法得到真正解脱，只能在无尽的空虚和压抑快感中，主动乞求施虐者许可高潮。", "uid": 1251}, "乳泉刑架——被动高潮的永恒轮回": {"content": "{乳泉刑架——被动高潮的永恒轮回}\n简介：\n【场景/道具描述】\n一座伪装成厨房的华丽刑室，核心道具是一张特殊刑架与配套的玉碗收集系统。受虐者被强制呈站立踮脚姿态，其胯下正对着一根深深嵌入阴部的金属三棱柱，棱线精准地楔入阴蒂根部和阴唇软肉；同时，一对吸杯紧紧锁扣在乳头上，连接着乳汁收集管道，末端放置一只玉碗。整个系统构成一个残忍的循环：乳汁滴落声成为计时器，每次玉碗被填满就会触发下一轮刺激。\n\n用法与交互细节：\n1. 受虐者因体力不支脚跟落地时，全身重量瞬间压在三棱柱上，尖锐的棱线撕开高潮后敏感至极的阴部组织，将阴蒂根部与阴唇软肉强行楔开，造成“贯穿式的压迫与撕裂感”。剧痛如同高压电击般贯穿脊椎，将受虐者从虚脱中粗暴唤醒。\n2. 受虐者在求生本能下踮脚逃离剧痛，但乳根处的吸杯仍在持续榨取乳汁，空虚的乳房内部迅速重新积聚乳汁，酸胀感与下体火辣辣的痛楚同步滋生，形成“疼痛-快感”的双重刺激叠加。\n3. 踮脚状态下，三棱柱每一次微不可查的摩擦都如倒刺刷过红肿伤口，引发钻心刺痛与酥麻电流的交织。乳汁持续滴入玉碗，当玉碗再次被填满时，新一轮强制高潮被触发，随后受虐者力竭脚跟落地，再次坠入剧痛——系统完成从“极致快感导向极致痛苦”的闭环，轮回永不停歇。\\n\\n【包含类似变体】：活体家具永久拘束架——棱柱酷刑榨乳机", "uid": 1252}, "魔剑血棠的G点阴蒂双重灼烧与高潮掌控": {"content": "{魔剑血棠的G点阴蒂双重灼烧与高潮掌控}\n简介：\n【场景/道具描述】\n一柄名为“血棠”的魔剑，剑身赭红如凝固的血，散发灼热凶戾之气，剑身略带微妙的弧度，剑锷处镶嵌着一枚搏动的赤色晶石。施虐者将此剑从受虐者的阴道口缓慢插入，直至剑身完全没入，剑锷晶石紧紧压在阴阜与阴蒂上。魔剑成为一件活体的、持续作用的内置刑具和快感发生器。\n\n用法与交互细节：\n1. 灼热的剑身撑满阴道，其弧度精妙地抵压G点，凶戾热气如无数细小火焰触须灼烫内壁，持久而稳定地输送快感，让受虐者始终处在高潮边缘却无法登顶。\n2. 剑锷上的赤色晶石死死碾压阴蒂，将阴蒂环灼得发亮，与体内灼烧里应外合，形成内外夹攻的双重刺激，大量淫水被高温蒸发，发出淫靡的“呲”声。\n3. 施虐者仅需轻轻旋转露在体外的剑柄一指宽度，剑身凸起棱角便会猛然刮过G点，晶石也随之碾压阴蒂，瞬间触发强制高潮。高潮由施虐者一手赐予，之后魔剑又回到折磨角度，让受虐者明白自己的解放完全由主人掌控，从而在永无止境的快感地狱中彻底崩溃。", "uid": 1254}, "锁凤台金属棒自动媚药注射与强制高潮循环": {"content": "{锁凤台金属棒自动媚药注射与强制高潮循环}\n简介：\n【场景/道具描述】\n在“锁凤台”装置中，两根金属棒的基座连接着复杂的机簧与活塞泵，其内储存着粉色的高效媚药。每当受虐者力竭、身体被重新猛烈贯穿时，活塞被触发，一股微凉的媚药液便会“噗嗤”一声喷射进阴道和直肠深处。\n\n用法与交互细节：\n1. 初次插入时，媚药便已被注入，迅速将痛楚转化为灼热的快感，让全身变得异常敏感。受虐者在高潮余韵中仍能感到药效持续发散，体内每一道皱襞都开始饥渴地分泌爱液。\n2. 每一次受虐者挣扎脱出再落回，都会触发新一轮的媚药注射。剂量累积使敏感度呈指数级增长，从勉强坚持六十息到仅仅几息就会溃败，反抗的持续时间急剧缩短。\n3. 反复的“挣扎→力竭→猛烈插入→喷药→强制高潮”构成了一套无法打破的循环。受虐者的意志在肉体不断攀升的快感中逐渐磨灭，最终从抗拒变为无意识的迎合，身体彻底沉沦为快感的奴隶。", "uid": 1255}, "星辰敏感电击指——高潮控制术": {"content": "{星辰敏感电击指——高潮控制术}\n简介：施虐者将能量转化为细密电流凝聚于指尖，精准 "content": "{强制变身与衣物解离调教}\n简介：\n【场景/道具描述】\n受虐者因魔力紊乱，变身过程被错误启动，导致原有衣物（内衣、制服）逐步解离，最终全裸或仅剩丝袜，处于公共场合的暴露状态。变身过程缓慢，需在数分钟内保持裸体，且可能多次失败。\n\n用法与交互：\n1. 施虐者可通过外部刺激（如痴汉触摸）或情感诱导（如抗拒情绪）触发受虐者的魔力紊乱，导致衣物解离。\n2. 受虐者需在公共场合（车站、街道、楼梯等）寻找隐蔽处，同时忍受暴露风险与身体敏感度提升（如草叶摩擦、风吹肌肤）。\n3. 施虐者可利用受虐者的羞耻心和恐惧，逐步强化其服从：例如要求受虐者保持特定姿势（如蹲伏、猫爬）以避免暴露，或命令其向施虐者报告位置。\\n\\n【包含类似变体】：变身过程中的服装解离与暴露羞辱", "uid": 1268}, "禁魔绳束缚与展示": {"content": "{禁魔绳束缚与展示}\n简介：\n【场景/道具描述】\n使用禁魔绳将受虐者以特定绳艺悬挂或束缚，绳结牢固且具有美感，限制行动同时暴露敏感部位。绳索材质可能具有抑制魔力或增强触感的效果。\n\n用法与交互：\n1. 绳索穿过腋下、股间等部位，摩擦敏感点，强化刺激。\n2. 束缚姿势使受虐者无法动弹，完全暴露于施虐者视线和触手之下。\n3. 禁魔效果防止受虐者使用魔力反抗或逃脱。\n4. 绳艺作为展示工具，用于拍摄或公共场合的服从性展示。", "uid": 1270}, "强制妊娠与孕肚展示": {"content": "{强制妊娠与孕肚展示}\n简介：\n【场景/道具描述】\n通过注入精液或受精卵，使受虐者反复怀孕，并在短时间内加速胎儿成长，导致孕肚快速膨胀。孕肚成为受虐者身体的一部分，并用于展示和刺激。\n\n用法与交互：\n1. 受虐者被强制排卵和受精，怀孕周期被缩短至数分钟。\n2. 孕肚的鼓胀压迫内脏，带来痛苦和快感，强化受虐者的无助。\n3. 孕肚上的原有印记（如圣纹）被用于定位淫纹刻印的位置。\n4. 生产后立即再次受孕，使身体持续处于妊娠状态，训练为永久苗床。", "uid": 1271}, "公共展示与羞辱性着装": {"content": "{公共展示与羞辱性着装}\n简介：\n【场景/道具描述】\n在公共场合（如凯旋会）让受虐者穿着暴露且带有羞辱性的服装（如孕肚婚纱），暴露其身体状态（孕肚、淫液、红晕），接受群众注视。\n\n用法与交互：\n1. 受虐者被要求穿着迷你礼服，仅遮住敏感点，孕肚和内衣清晰可见。\n2. 在舞台上挥手、讲话，进行正常活动，但身体反应（如乳汁分泌、高潮）无法控制。\n3. 群众的欢呼和注视成为驯化的一部分，强化受虐者的羞耻感和服从。\n4. 视频录制并传播，扩大驯化效果，建立受虐者作为公共性对象的认知。", "uid": 1272}, "关节压迫强制展开姿势": {"content": "{关节压迫强制展开姿势}\n简介：\n【场景/道具描述】\n施虐者将受虐者小腿压至身体两侧，髋关节受压发出响声，强制打开双腿暴露私处。\n\n用法与交互：\n1. 压迫关节制造轻微疼痛，与快感混合，增强刺激。\n2. 强制展开姿势使受虐者完全暴露，无法防御，强化羞耻与服从。\n3. 受虐者在疼痛与快感中挣扎，但越挣扎越陷入支配。", "uid": 1273}, "公开舞蹈表演：从艺术到性展示的规训": {"content": "{公开舞蹈表演：从艺术到性展示的规训}\n简介：\n【场景/道具描述】\n受虐者穿着紧身白色舞蹈服（无内衣），在酒馆舞台上表演钢管舞。服装半透明，暴露身体曲线，布料轻薄如第二层皮肤。舞台下方为醉汉和流浪汉，观众起哄要求更露骨的动作。\n\n用法与交互：\n1. 受虐者最初尝试展示舞蹈技巧，但反应冷淡；改为摇屁股等性感动作后获得欢呼，从而被引导至以身体展示为主的表演。\n2. 受虐者被指示用私处摩擦钢管，被迫进行半公开自慰，快感与羞耻交织，逐渐习惯被观看和物化。\n3. 表演结束后，受虐者接受老板的“摸一下”条件，最终被强行插入，完成从艺术到性服务的转化。", "uid": 1274}, "认知妨碍与强制暴露的裸体围裙制服": {"content": "{认知妨碍与强制暴露的裸体围裙制服}\n简介：\n【场景/道具描述】\n一件施加了特殊催眠魔法的酒馆女服务生制服，外观为仅能勉强遮盖下体的短小围裙和一件极不合身的蕾丝内裤。该制服内置“认知妨碍”魔法，能让未受教团控制的普通人将其看作正常的服务生制服，只有教团成员或已被催眠者才能看穿其真正的、极度暴露的裸体围裙状态。内裤尺寸极小，会深深勒入臀瓣并清晰勾勒出私处轮廓，阴蒂会在布料上顶出突起，轻微走动就会因摩擦导致身体湿润。\n\n用法与交互细节：\n1. 受体被强  蜡壳冷却后，施虐者可用工具敲碎或撕扯蜡壳，每次剥离都会连带拉扯皮肤，带来二次痛楚。\n3. 受虐者因束缚无法移动，只能被动承受蜡液流淌的灼热与凝固后的紧绷感，心理上完全被压制。\\n\\n【包含类似变体】：蜡壳剥离术", "uid": 1279}, "淫纹刻印笔（灵魂共鸣型）": {"content": "{淫纹刻印笔（灵魂共鸣型）}\n简介：\n【道具描述】\n一支结合了注射器与画笔结构的精密仪器，连接着一瓶特殊的液态媒介。笔尖释放的不是普通墨水，而是一种带有灵魂共鸣属性的“刻印液”。当施虐者用它在小腹上绘制淫纹时，受虐者会感受到灼热的虚拟痛感，但皮肤并无实际损伤。绘制过程中可反复擦除重画，直到图案完美。最终成型的淫纹会从淡色变为晶莹剔透的紫水晶质感，成为受虐者身上最敏感的区域。\n\n用法与交互：\n1. 施虐者将笔尖接触受虐者皮肤，缓慢绘制图案；受虐者会感受到强烈的灼烧感（非真实），但无法挣扎，因为四肢被能量锁链固定。\n2. 绘制完成后，淫纹会自动吸收体内散逸的“能量”，使颜色加深并激活共鸣。\n3. 只有施虐者（或指定者）触碰淫纹时，受虐者才会产生极强烈的快感与全身酥麻；受虐者自己触碰则会触发冰冷刺痛与快感驱散，形成“所有权”的心理烙印。", "uid": 1280}, "乳房搓澡仪式": {"content": "{乳房搓澡仪式}\n简介：\n【乳房搓澡仪式】\n一种极具羞辱性和压迫感的沐浴方式。施虐者将大量沐浴露倒在受虐者的乳房上，然后用自己的背部或臀部压住乳房，像使用毛巾一样上下或左右摩擦，将受虐者的身体当作活体搓澡工具。整个过程伴随着对淫纹的间歇性摩擦，使受虐者持续处于快感与无力状态。\n\n用法与交互：\n1. 施虐者先让受虐者保持坐姿或躺姿，将沐浴露涂满其乳房，然后背过身去，用背部压住乳房开始摩擦，享受乳房的柔软弹性。\n2. 摩擦过程中，施虐者可以故意用臀部或身体其他部位蹭触受虐者腹部的淫纹，打断其任何反抗意图，使其陷入持续的高潮边缘。\n3. 该仪式可以延伸到全身清洗，例如用乳房清洁胸部、背部等，让受虐者完全沦为一件活体清洁工具，彻底剥夺其尊严。", "uid": 1281}, "羞耻洞惩罚": {"content": "{羞耻洞惩罚}\n简介：\n一间专为精神凌辱设计的狭小囚室，内部是一个肮脏至极的蹲坑，积满排泄物与精液的恶臭，连墙壁都浸透了腐朽的气息。\n\n用法与交互：\n1. 受虐者被强行塞入这个仅容蜷缩的空间，坑口挤满腐烂的污物，每一次呼吸都像吞下腐烂的毒药，尊严在恶臭中被碾成粉末。\n2. 施虐者可以突然掀开盖子，像打捞垃圾一样揪住头发将其拖出，让满是污秽的躯体暴露在灯光下，展示其毫无价值的肮脏本质。\n3. 反复关入与拽出，循环践踏，直到受虐者心理防线彻底崩溃，自我认知坍塌为最低贱的排泄物容器。", "uid": 1282}, "公厕犬缚羞辱装置": {"content": "{公厕犬缚羞辱装置}\n简介：\n将受虐者囚禁于公共厕所隔间，以精密绳缚固定成四肢悬空的犬趴姿势，并强制佩戴窥镜，通过敲击金属墙壁作为指令信号，实现公共场所下的极度心理摧残。\n\n【场景/道具描述】\n狭窄肮脏的公共厕所隔间被改造为刑架。受虐者手腕、脚踝被高强度束带分别固定于隔板四角的金属锚点，身体悬空，被迫维持四脚朝地的屈辱犬姿。膝盖与肘关节被厚实的皮革垫保护，只为防止过度淤青，却让悬吊的酸痛如影随形。最为致命的是侵入下体的金属窥镜——冰冷、无温度，在持续撑开内壁的同时，将最隐秘的嫩肉暴露于镜面反射之中，让受虐者每一次抽搐都能看见自己羞耻的蠕动。墙面特意保留了金属层，任何敲击都会发出刺耳回响，成为无法预测的指令钟。\n\n用法与交互：\n1. 施虐者只需用警棍或指节轻叩隔间金属壁，不同的节奏代表不同指令：一声长音要求受虐者收缩窥镜周围的肌肉；连续急叩命令其抬高臀部并保持静止；寂静则是最残酷的折磨——受虐者在黑暗中独自面对镜中景象，等待下一个未知的敲击，心理防线在回声中层层剥落。\n2. 门外过往的脚步声与冲水声成为天然的羞耻放大器。受虐者无法判断敲击何时到来，更恐惧自己的喘息或镜中映像被陌生人透过门缝察觉，这种随时可能暴露的公共危机感，将羞耻推至巅峰。", "uid": 1283}, "安魂椅——无助分娩姿势的拘束拷问台": {"content": "{安魂椅——无助分娩姿势的拘束拷问台}\n简介：\n【这是一具由厚重金属与黑色皮革构成的拘束椅，椅面倾斜，腿托高翘，将受虐者强制摆成双腿大张、下体毫无遮掩的屈辱分娩姿势。四肢被多层皮带锁死在扶手与腿托上，腰胯被宽幅腹带勒紧，连脊椎都被椅背上的束带固定，整个人如同展品般被陈列在椅面上，每一寸私密部位都暴露在施虐者的目光与指尖之下。】\n\n用法与交互：\n1. 受虐者被剥光后固定于安魂椅中，膝窝架在腿托上，脚踝高悬，双腿无法并拢，产生强烈的羞耻与无助感。\n2. 椅背角度可调，能将受虐者仰面放倒或俯身压弯；椅面下方可升起不同形状的按摩棒或扩张器，直接抵住暴露的下体进行长时间强制刺激。\n3. 皮革束带内藏细密铜钉，挣扎时钉尖刺入皮肤却不流血，只会带来持续的刺痛。施虐者常将受虐者置于此椅中数小时，任凭其哭泣、求饶，甚至失禁，所有体液都顺着椅面的导流槽滴入下方的收集皿中。", "uid": 1284}, "羞耻视觉反馈环": {"content": "{羞耻视觉反馈环}\n简介：\n【场景】受虐者被锁在墙边，头部被束缚，视野被强制接管，双眼只能注视眼前屏幕上自己正被跳蛋与震动棒不断攻击的淫乱模样。\n\n用法与交互：\n1. 施虐者将受虐者固定成无法回避视线的姿势，利用头戴显示器或单向镜将其自身实时影像投映在眼前。\n2. 同时用跳蛋、震动棒等持续刺激受虐者。任何身体反应——脸红、扭动、泪水与唾液——都会被立即传回自己眼中，形成“越害羞越看到自己害羞→更加羞耻”的恶性心理循环，逐步瓦解意志。", "uid": 1285}, "阴道造影羞辱检查": {"content": "{阴道造影羞辱检查}\n简介：\n冰冷的暗房里，受虐者被捆绑在中间分开双腿的检查凳上，双脚高高架起。头顶悬着昏红的暗房灯，周围全是沉默的白大褂观察者。一台老式X光机正对敞开的私处，金属造影导管已深深插入甬道，吊瓶中的造影剂正一滴一滴注入最深处。\n\n用法与交互：\n1. 施虐者扮演医生，将沾染碘伏的扩阴器缓慢旋入受虐者体内，撑开后用金属导管连接造影剂吊瓶，让冰凉刺骨的液体注满宫腔。\n2. 拍摄X光片的瞬间，强迫受虐者在高强度辐射恐惧和暴露羞耻中保持绝对静止，任何颤抖都会导致重新注射、重新拍片。\n3. 湿漉漉的X光片被夹在看片灯上，施虐者用教鞭指着片子上子宫腔的轮廓，向所有围观者详细讲解受虐者最私密的构造、可能的“缺陷”以及未来如何更彻底地开发这里。", "uid": 1286}, "定制颗粒抽取式振动棒": {"content": "{定制颗粒抽取式振动棒}\n简介：\n【粗壮的定制插入式刑具，胶质棒身遍布凸起颗粒，能够以活塞运动反复抽插小穴。内置振动马达与分泌物收集腔，每一次抽送都用颗粒碾磨肉壁，将分泌的淫水逐渐收纳进棒内，作为羞耻晚餐的原料。是同时给予快感与屈辱的极致淫具。】\n\n用法与交互：\n1. 插入后自动执行低速抽插与振动，颗粒刮蹭敏感点，引发连绵不绝的欲潮。\n2. 棒内收集的爱液可在事后抽出，强迫受虐者或其伴侣舔食，造成强烈的心理羞辱。", "uid": 1287}, "母马展示与直播调教台": {"content": "{母马展示与直播调教台}\n简介：\n一套金属打造的骇人马具，将受虐者彻底物化为一匹供人观赏的母马。沉重的衔铁口枷撑开口腔，口水无法抑制地滴落；四肢被高强度的皮带与铐锁固定在冰冷的金属框架上，双腿被极度分开，最私密的部位完全被迫暴露在无影灯下。面前是一整面墙的直播投影屏，同步播放着隐秘摄像头里被机械手指反复拨弄翻开的阴蒂特写。受虐者不仅身体被残酷剥夺，更在无数目光的假想中坠入被彻底围观、毫无尊严的深渊。\n\n用法与交互：\n1. 为受虐者佩戴衔铁口枷与全身马具拘束，将其锁死在展示架预设的固定点上，调节双腿撑开的角度。\n2. 启动隐藏式微型机械指，缓慢、不间断地剥开并揉捻阴蒂，摄像头自动对焦，将画面投射到受虐者正对的巨幅屏幕上。\n3. 施虐者可通过遥控调整机械指的速度与力度，或开启直播推流，将受虐者的羞耻与绝望放大至极致。", "uid": 1288}, "随机惩罚扭蛋直播系统": {"content": "{随机惩罚扭蛋直播系统}\n简介：\n一台粉色半透明的扭蛋机，内部装满写着各种羞辱惩罚任务的纸条，每颗扭蛋都是一次未知的折磨。受虐者需在直播镜头前亲手拧动旋钮，随机掉出的纸条将决定接下来的命运，一切过程都暴露在无数观众的注视之下。\n\n用法与交互：\n1. 施虐者预先将写满任务的纸条塞入扭蛋，任务从轻度的身体写字、塞入小玩具，到更屈辱的体液交换、公开自渎不等。\n2. 受虐者跪在扭蛋机前，伸手转动旋钮，等待随机的扭蛋落下，打开念出内容后必须立即执行。\n3. 直播间的弹幕与礼物压力会迫使受虐者无法逃避，任何迟疑都会换来更严厉的追加惩罚，直至完全摧毁其羞耻心。", "uid": 1289}, "展示拍卖椅（斜躺束缚椅）": {"content": "{展示拍卖椅（斜躺束缚椅）}\n简介：\n一种专为公开展览与羞辱设计的斜躺束缚椅，能将奴隶固定成极度羞耻的M字开腿姿势，使其私处毫无遮挡地暴露在观众眼前，常用于拍卖会或调教展示。\n\n【场景/道具描述】\n椅子与地面呈45度 在他愣神时轻笑一声跑开，留下一个“你抓不到我”的调皮眼神，但晚上会被他“报复”得更彻底。\n3. 吻的间隙，被爱者可以稍稍退开，用拇指摩挲深爱者被吻红的唇瓣，低声说：“你的嘴唇比看起来更软。”然后在她脸红时再次吻上去，这一次更温柔、更缠绵。", "uid": 1439}, "被爱者的体温与魔法疗愈：荒野避难所的悉心照料": {"content": "{被爱者的体温与魔法疗愈：荒野避难所的悉心照料}\n简介：\n【场景/情感描述】\n秋日午后，一座荒废的宅邸庭院中，深爱者重伤昏迷，倚靠外墙，鲜血蔓延。被爱者独自前来，发现他后，内心从最初的幸灾乐祸转为焦急与担忧。她小心翼翼地靠近，确认他尚有呼吸，身体还有温度，便决心救他。她鼓起勇气，用魔法处理了潜伏的敌人，然后将他带入屋内，用从橱柜和书桌下翻找出的绷带、药品和医疗用具，为他处理侧腹部几乎可见内脏的创口。她克服了对鲜血的恐惧，用活化的钢针缝合伤口，又倒上整瓶治疗药剂，最后用温暖术烘烤他冰冷的身体，希望他能尽快醒来。\n\n纯爱用法与交互细节：\n1. 被爱者在发现深爱者重伤时，内心涌起复杂情绪，但本能地选择救助，而非报复。她小心翼翼地确认他的呼吸和体温，手指轻轻触碰他冰冷的皮肤，感受到他微弱的生命迹象，心中燃起希望。\n2. 被爱者用魔法处理敌人后，用浮空术将深爱者抬起，动作轻柔地将他安置在床上。她拉紧窗帘，为他营造一个安静、私密的空间，然后翻找医疗物资，手指因紧张而微微颤抖，但眼神坚定。\n3. 在缝合伤口时，被爱者强忍头晕，指尖打出火苗消毒钢针，然后按着他的伤口，感受钢针穿透皮肤的触感。她轻声安慰自己，也安慰昏迷中的他，完事后用温暖术烘烤他的身体，手掌轻轻抚过他的额头，传递自己的体温与关怀。\n\n【包含类似变体】：被爱者的主动探索与依赖：荒宅中的勇气与信任", "uid": 1440}, "锁在怀中的羞耻姿势——被掌控的依赖与交出的信任": {"content": "{锁在怀中的羞耻姿势——被掌控的依赖与交出的信任}\n简介：\n【场景/情感描述】\n被爱者近乎蛮横地将深爱者的双腿抬高，手臂穿过她大腿下方，握着她的手腕在后脑勺处锁死，将她以一个极其羞耻的姿势束缚在怀中。深爱者受迫性地伸直双腿，股关节被挤压得作响，但最初的反抗很快变成投降——她不再想挣脱，因为束缚带来的轻微痛感成了快感的辅料，而肌肤相触的温暖让她只想沉溺。\n\n纯爱用法与交互细节：\n1. 被爱者可以这样从背后抱着深爱者，让她完全靠在自己胸膛上，然后低头在她耳边低语：“别怕，交给我就好。”同时用下巴蹭她的头顶，给她最大的安全感。\n2. 深爱者可以主动将双手交到被爱者手中，让他扣住自己的手腕，然后微微侧头，用脸颊蹭他的手臂，像一只完全信赖主人的猫。她可以轻声说：“你这样……让我觉得自己被保护得很好。”\n3. 在姿势中，被爱者可以故意放慢动作，每一下都深入而克制，同时用嘴唇亲吻深爱者的肩膀、后颈、耳后，用细碎的吻告诉她：“你每一寸都属于我，我也每一寸都属于你。”", "uid": 1441}, "被爱者的日常衣着": {"content": "{被爱者的日常衣着}\n简介：\n她工作时总是衣着规整，妆容也是素雅为主，轻柔飘逸的绸缎服饰下是比绸缎还要细嫩的肌肤。", "uid": 1442}, "白丝裤袜": {"content": "{白丝裤袜}\n简介：\n纤细玲珑的白丝玉腿翘起在男人身侧，真空的白丝裤袜，其下饱满耻丘被玲珑玉手按住。", "uid": 1443}, "白色丝质手套裤袜与高跟凉鞋": {"content": "{白色丝质手套裤袜与高跟凉鞋}\n简介：\n被脱到只剩开白丝手套裤袜和高跟凉鞋的娇躯，高跟凉鞋系带微微勒入她的白丝嫩足之中，本是饱满可爱型的肉足穿上白丝后格外纯洁可人，而高跟凉鞋就是在这可爱之外，再添几分画龙点睛般的色气。稍稍岔开的双腿让深爱者可以看到她的玉足内侧，高跟凉鞋平底那逐渐上翘的线条之上，是她足底那更为诱人的曲线，从踮起的足尖到白丝之中透着粉嫩肉色的足弓，再到因发力而微微发白的脚跟。透过白丝，那凉鞋所无法遮蔽的、仿佛十颗葡萄般饱满圆润的足趾上，能看到被爱者涂了很漂亮的粉色指甲油。白丝裤袜勒住的纤腰上不见一丝赘肉，微微绷紧，白丝之下的细嫩腰肢呈现出的玲珑曲线。", "uid": 1445}, "细腰蕾丝内裤": {"content": "{细腰蕾丝内裤}\n简介：\n细腰蕾丝内裤，从正前方看去在被爱者那娇小而微微肉感的臀胯上情趣性感之中又不失可爱，后半只有两根用作链接的细绳。柔软细嫩的面料抱住饱满的白虎肉穴，肉缝之中溢出的点点淫汁立刻在其上透出一丝水痕，而菊穴没有任何遮挡。", "uid": 1447}, "透肉白丝吊带袜": {"content": "{透肉白丝吊带袜}\n简介：\n纤薄透亮的白丝吊带袜，完全看不见肉色的奶白款式被替换为透肉款式，腿上的曲线和肉色一览无余，油亮的吊带袜看起来淫乱。", "uid": 1448}, "华丽繁杂的裙摆": {"content": "{华丽繁杂的裙摆}\n简介：\n被爱者华丽繁杂的裙摆，被手轻轻拂开一处空隙，恰好对着深爱者的方向，露出双腿间的春光。", "uid": 1450}, "淫乱制服与开裆裤袜": {"content": "{淫乱制服与开裆裤袜}\n简介：\n被爱者穿着神官署的制服裙，裙子下面穿着开裆裤袜，菊穴中塞有拉珠，上身仅有一条白丝长手套，内里再无布料，风衣下几乎全裸，白丝高跟凉鞋，丝袜破损且有精斑和肠液。", "uid": 1451}, "白丝长手套": {"content": "{白丝长手套}\n简介：\n白色丝质，覆盖双臂至手部，穿着时双臂背到脑后，玉指夹住裙摆。", "uid": 1460}, "男士风衣": {"content": "{男士风衣}\n简介：\n深爱者留下的长风衣，用于遮盖被爱者几乎全裸的身体，风衣内情欲气味浓郁，有淫水、精斑和肠液。", "uid": 1453}, "白丝高跟凉鞋": {"content": "{白丝高跟凉鞋}\n简介：\n白色丝袜搭配高跟凉鞋，丝袜湿透，脚踝处有肠液和精液流淌，走动时发出咕啾踩水声。", "uid": 1454}, "白丝丝袜高跟凉鞋": {"content": "{白丝丝袜高跟凉鞋}\n简介：\n被爱者的玉足套着白丝，丝袜因淫液变得湿滑透明，她穿上一双极细高跟凉鞋，鞋跟细高，系带款式，足底为乳胶质感，能容纳肉棒在足穴中抽插。", "uid": 1455}, "情趣内裤（比基尼系带式）": {"content": "{情趣内裤（比基尼系带式）}\n简介：\n内裤是情趣款，类似比基尼系带泳衣，仅在驼趾上有一块三角形布料，其他部位裸露。", "uid": 1456}, "宝石肛塞": {"content": "{宝石肛塞}\n简介：\n肛塞带闪亮宝石，表面有黑色丝带，浸满肠液，在白嫩股间反射光泽，长度几乎与被爱者上身相等。", "uid": 1457}, "旗袍": {"content": "{旗袍}\n简介：\n淡紫色绸缎制成，透着些许光亮，贴身勾勒出身体曲线，裙摆原本看似厚实，但透光可见股间风景，斋庄中正的款式在咬住裙角、抬起藕臂后变作情趣衣装观感。", "uid": 1459}, "比基尼内裤": {"content": "{比基尼内裤}\n简介：\n极其窄小，仅遮挡耻丘下的小穴，完全湿透后几乎透明，可见驼趾形状和充血硬挺的阴蒂，系绳位于股胯处。", "uid": 1461}, "半透明星空婚纱": {"content": "{半透明星空婚纱}\n简介：\n洁白无瑕的婚纱，上半是紧贴身躯半裸酥胸的大胆款式，洁白的头纱流苏垂落在赤裸的香肩之上，一对鸽乳被胸衣托得格外挺翘，手臂穿戴着白色蕾丝边长手套，裁剪精致得体的长手套在优雅的小臂弧线之上散发着缎面的诱人莹光。双手交叠在小腹之前，身前的纱裙不过半尺，华丽的流苏配饰从那双细嫩的双腿两侧垂落，其间蓬松层叠的薄纱之间，能看到一滴晶莹的黏液悬垂在耻丘之上。礼裙搭配吊带白丝袜包裹着玉腿，纤薄的白丝之间透着淡淡的少女肉光，靠近大腿内侧的位置有湿润的痕迹。脚下踏着晶莹的透明水晶高跟，珠圆玉润的足趾稍稍撑开丝袜，粉润的颜色透过白丝在透明高跟中清晰可见。后庭中有一枚带有宝石肛塞的菊穴，肛塞内里有天然玫瑰纹路。", "uid": 1463}, "白色开档蕾丝内裤": {"content": "{白色开档蕾丝内裤}\n简介：\n白色开档蕾丝内裤，被淫水完全打湿，泥泞不堪。", "uid": 1464}, "纱裙": {"content": "{纱裙}\n简介：\n纱裙，穿着在被爱者身上。", "uid": 1465}, "水晶高跟鞋": {"content": "{水晶高跟鞋}\n简介：\n水晶高跟鞋，在娇躯摇曳间半脱，挂在足趾上。", "uid": 1467}, "囚禁式拘束婚纱": {"content": "{囚禁式拘束婚纱}\n简介：\n【场景/道具描述】\n一袭洁白繁复的拘束婚纱，外观是任何人都会惊叹的高定礼裙，内里却是一套精密的禁锢系统。紧身胸衣由特制鲸骨与皮革缝制，将腰肢勒至盈盈一握，乳房被托高挤拢成诱人的形状，胸口蕾丝下藏着两枚持续震动的乳夹。蓬大的裙摆华美如云，却在内侧缝有暗扣，将双腿固定成微微分开的姿势；裙下真空，一根贯穿前后的股绳随步伐摩擦三穴。及肘白缎长手套内置软质腕缚，使双手只能优雅地交叠于小腹，无法做出任何反抗动作。头纱垂落遮住视线，颈后的珍珠项链实为一圈带锁的项圈。\n\n用法与交互细节：\n1. 着装即拘束：施虐者为受虐者层层穿戴，每一件单品落定都伴随一次锁扣的轻响，最终完成时受虐者已被这身\"礼服\"彻底束缚——能站、能以小步挪动，却无法奔跑、无法张腿、无法用手。\n2. 优雅与淫靡的反差：受虐者必须维持新娘般端庄的仪态，头纱下却是因乳夹与股绳持续刺激而泛红的脸与渗出的淫液。任何幅度过大的动作都会让裙内暗扣勒紧、股绳深陷，将羞耻与快感同时推高。\n3. 公开展示：这身婚纱常用于仪式或宴会场合，宾客只见一位美艳绝伦、含羞带怯的新娘，无人知晓她华服之下正承受着怎样的禁锢与折磨，这种\"众目睽睽下的隐秘失守\"是其精髓。\n4. 解除的恩赐：唯有施虐者持有全套锁钥，受虐者若想从这份甜蜜的禁锢中得到片刻喘息，只能以更彻底的顺从去交换。", "uid": 1468}, "奶茶投喂的仪式感与爱意传递": {"content": "简介：\n【场景/情感描述】\n深爱者与被爱者在月光下，通过一杯奶茶完成了一场无声的默契与告白。被爱者双手奉上“三倍糖版星芋啵啵”，深爱者接过时眉眼间卸下威严，流露出少女般的幸福笑意。啜吸奶茶的樱唇如软弹果冻，被爱者的目光被牢牢吸引，心跳因对方的每一丝细微表情而加速。这一刻，奶茶不再是饮品，而是爱意的信物，是两人之间专属的甜蜜密码。\n\n纯爱用法与交互细节：\n1. 深爱者可以亲手为被爱者调制或购买对方最爱的饮品，在递出的瞬间，用指尖轻触对方的手背，传递无声的温柔。被爱者接过时，可以低头轻嗅香气，再抬眸与深爱者对视，眼神中流露期待与满足。\n2. 深爱者可以看着被爱者小口啜饮，用指腹轻轻拭去对方唇角残留的奶茶渍，然后自然地含住指尖，品尝那混合了对方体温的甜味。这个动作要缓慢而充满仪式感，让被爱者感到自己是被珍视的珍宝。\n3. 被爱者可以在深爱者喝完后，故意留下一点奶茶在唇边，然后凑近深爱者，用鼻尖轻蹭对方的鼻尖，再轻轻吻去那一点甜。这一吻要轻如羽毛，却足以让两人心跳共鸣。", "uid": 1471}, "妆容与气质的温柔蜕变：只为你的少女模样": {"content": "简介：\n【场景/情感描述】\n平日威严的深爱者，在被爱者面前悄然卸下所有防备。眉梢眼角少了凌厉，多了柔和的少女气；唇上胭脂不再是彰显威仪的工具，而是点染成软弹果冻般诱人的存在。衣着未改，配饰不变，但气质因妆容的细微变化而截然不同——从高高在上的神官之首，变成了热恋中满心欢喜的少女。被爱者察觉到这一变化时，心中涌起难以言喻的悸动，知道对方是为自己而改变。\n\n纯爱用法与交互细节：\n1. 深爱者可以在独处时，特意为被爱者换上淡雅的妆容，用指腹蘸取一点胭脂，轻轻点在唇上，然后转头对被爱者露出一个羞涩而期待的笑容。被爱者可以伸出手，用拇指轻轻揉开那一点胭脂，动作要极尽温柔，仿佛在描绘对方的心意。\n2. 被爱者可以凑近深爱者的脸庞，用鼻尖轻蹭对方柔和的眉眼，低声说“你今天的眉眼好软”，然后轻吻对方的眼皮。这个动作要慢，让深爱者感受到被爱者对自己每一处变化的珍视与欣赏。\n3. 深爱者可以故意在被爱者面前轻抚自己的嘴唇，然后牵起被爱者的手，将对方的手指轻轻按在自己的唇上，让被爱者感受胭脂的质地与自己的体温。两人可以因此相视而笑，无需言语，心意已通。", "uid": 1472}, "唇舌交缠中的无声告白与融为一体的温柔": {"content": "简介：\n【场景/情感描述】\n在被爱者因欲火而难以自持时，深爱者没有选择挣扎或抗拒，而是悄然将自己的香软小舌滑入对方口中。这一吻不是索取，而是给予——她用自己的主动，告诉被爱者“我愿意”。唇舌交织间，深爱者紧皱的眉头渐渐舒展，所有痛楚与不安都化作了轻柔的呜咽和温热的鼻息。被爱者在这一刻明白，身体的结合不过是形式，灵魂的相融才是本质。\n\n纯爱用法与交互细节：\n1. 深爱者可以在对方犹豫或痛苦时，主动用舌尖轻舔对方的唇缝，然后一点一点滑入，动作要慢到能感受到对方每一次呼吸的颤抖。同时用手轻轻抚摸对方的头发，从发根到发梢，传递安抚的信号。\n2. 被爱者要回应这一吻时，可以先用舌尖轻轻触碰对方的舌尖，然后缓缓缠住，力道要轻到仿佛在触碰花瓣。吻的间隙，可以稍稍退开，用鼻尖蹭对方的鼻尖，再重新吻上，如此反复，让深爱者感受到被珍视的节奏。\n3. 两人可以在长吻中逐渐忘记周遭的一切，直到唇分时，深爱者用额头抵着被爱者的额头，轻声说“这下我们分不开了”。被爱者则用拇指轻轻摩挲深爱者被吻得微肿的嘴唇，低声回应“那就永远不要分开”。", "uid": 1473}, "拭泪与轻咬：痛楚中的依赖与占有": {"content": "简介：\n【场景/情感描述】\n在激烈的亲密中，深爱者因快感与羞耻交织而流下两行清泪。被爱者见状，立刻停下所有动作，用指腹轻轻拭去那晶莹的泪珠。当被爱者想要收回手时，深爱者却突然张口咬住他的手掌，力道不重，带着轻微的痛感和浓浓的依赖。她咬着他的手，含混不清地咕哝着“坏蛋”，却不肯松口。这看似惩罚的动作，实则是她表达“你是我的”的专属方式。\n\n纯爱用法与交互细节：\n1. 深爱者可以在被爱者触碰自己最脆弱处时，突然抓住对方的手，轻轻咬住对方的虎口。咬的时候要看着对方的眼睛，眼神里带着一丝委屈和满满的占有欲。被爱者不要抽回手，反而要放松肌肉，让深爱者咬得更舒服，同时用另一只手抚摸深爱者的脸颊。\n2. 被爱者可以在深爱者咬住自己时，故意说“好痛”，然后看着深爱者惊慌松口时，再反手握住对方的手，在手背上印下一个轻吻，说“骗你的”。这种小玩笑能让紧绷的气氛瞬间变得柔软，让深爱者感到被爱包围。\n3. 深爱者可以在咬完之后，用舌头轻轻舔舐刚才咬过的地方，然后抬头对被爱者露出一个带着泪痕的笑容。被爱者则可以用拇指擦去深爱者脸上的泪痕，顺势将手指插入对方发间，将深爱者拉近，再次吻住。", "uid": 1474}, "对视中的灵魂探索与无声的欲火升腾": {"content": "简介：\n【场景/情感描述】\n深爱者与被爱者在沙发上静静对视，没有言语，只有目光的交缠。深爱者习惯地用“审视”的目光看着被爱者，但这一次，她在那双温柔的眼眸中看到了自己倒映的影子。被爱者也不再像从前那样躲闪，而是坦然接受这份注视。时间一分一秒过去，呼吸逐渐变得不再平稳，下身也悄然起了反应，但两人都没有说话，只是继续看着对方。这种对视不是焦躁的等待，而是一种灵魂的探索——在对方的瞳孔里，看见自己的未来。\n\n纯爱用法与交互细节：\n1. 深爱者可以坐在被爱者对面，双手握住对方的手，然后开始对视。开始时可以设定一个计时器（比如3分钟），期间不能说话，不能移开视线，只能看着对方的眼睛。如果谁先笑或移开视线，就要接受一个小惩罚（比如让对方吻一下）。\n2. 在对视过程中，深爱者可以故意放慢呼吸，让被爱者不自觉地跟随自己的节奏。当两人的呼吸频率完全同步时，深爱者可以轻轻捏一下被爱者的手指，传递“我在这里”的信号。被爱者则可以用拇指轻轻摩挲深爱者的手背作为回应。\n3. 对视结束后，深爱者可以缓缓靠近，用额头抵住被爱者的额头，闭上眼睛，感受彼此的呼吸。被爱者可以轻声问“你在想什么”，深爱者可以回答“在想你”。这个简单的问答，比任何情话都更能触动心弦。", "uid": 1475}, "日常接吻的仪式感与每日的期待": {"content": "简介：\n【场景/情感描述】\n深爱者与被爱者定下了一个甜蜜的约定：每天都要充满爱意地接吻。这个约定不是任务，而是一种期待——每天下班后，两人会先放下所有事情，认真地、温柔地吻住对方。从最初的生涩试探，到后来的熟练配合，每一次接吻都是一次新的探索。深爱者会故意在接吻时轻轻吮吸被爱者的下唇，然后退开，看着对方微肿的嘴唇露出满足的笑容。被爱者则会在接吻后，用指尖轻点深爱者的鼻尖，说“今天的吻合格了”。\n\n纯爱用法与交互细节：\n1. 深爱者可以在每天早晨出门前，主动踮起脚尖，在被爱者唇上印下一个轻吻，然后说“这是今天的预定”。被爱者则可以在晚上回家后，回赠一个更长的吻，说“这是今天的追加”。这种“预定”与“追加”的仪式，能让每一天都充满期待。\n2. 被爱者可以在接吻时，一只手扶着深爱者的后颈，另一只手轻轻抚摸对方的耳垂。这个动作能让深爱者感到被全然掌控的安全感，从而更放松地投入吻中。深爱者则可以在这个过程中，用双手环住被爱者的腰，指尖轻轻在对方后腰画圈。\n3. 两人可以在接吻后，额头相抵，交换一个微笑。深爱者可以说“今天的吻有奶茶味”，被爱者可以回答“因为想着你，所以是甜的”。这种简单的情话，能让日常的接吻充满诗意。", "uid": 1476}, "日常归家吻的温柔仪式": {"content": "简介：\n【场景/情感描述】\n被爱者每日回家时，深爱者会以满含爱意的例行接吻迎接，即使被爱者因羞涩而试图拒绝，深爱者仍以撒娇般的语气请求品尝新的唇彩，让被爱者在甜蜜的强迫中融化。\n\n纯爱用法与交互细节：\n1. 深爱者以可怜巴巴的眼神和语气请求，强调“还未品尝够”新唇彩的味道，让被爱者无法抗拒。\n2. 被爱者虽然嘴上轻斥“只可以接吻哦”，但身体却诚实地回应，在拥抱中逐渐放松，接受温柔的吻。\n3. 接吻时，深爱者的手掌轻轻攀附在被爱者的臀瓣上，以轻柔的抓捏传递爱意，被爱者因羞涩而微微湿润，却半推半就地沉浸其中。", "uid": 1477}, "白丝玉足与高跟凉鞋的视觉诱惑": {"content": "简介：\n【场景/情感描述】\n深爱者凝视被爱者穿着白丝裤袜和高跟凉鞋的玉足，从足趾到足弓的每一处曲线都散发着纯洁与色气并存的魅力，成为情感互动中的独特焦点。\n\n纯爱用法与交互细节：\n1. 深爱者细致观察被爱者足部的每一个细节：饱满的足趾、透肉的丝袜、粉色指甲油，以及高跟凉鞋的系带勒入嫩足的诱人画面，心中充满欣赏与把玩的欲望。\n2. 在亲密时刻，深爱者会轻轻握住被爱者的足踝，或抚摸足底曲线，甚至在交合中抓住鞋跟，感受冰凉鞋跟与火热体温的对比，以此传递爱意。\n3. 被爱者因深爱者的注视而羞涩，却暗自期待这种被珍视的感觉，足部的轻微蜷曲或绷直成为她情感波动的无声表达。", "uid": 1478}, "肛珠预热的温柔铺垫": {"content": "简介：\n【场景/情感描述】\n深爱者为被爱者准备肛珠，作为日常中的亲密预热，通过缓慢而细致的涂抹和塞入，让被爱者感受到被呵护的舒适与期待。\n\n纯爱用法与交互细节：\n1. 深爱者先以精油和润滑液细致涂抹肛珠和被爱者的菊门，用手指轻轻按摩，确保每一寸都柔滑舒适，避免任何不适。\n2. 塞入肛珠时，深爱者以温柔的手法和节奏，让被爱者自己掰开臀瓣，展示菊穴，珠子一颗颗顺滑进入，被爱者因肠道对快感的贪恋而主动吸吮珠子。\n3. 被爱者穿上特制内裤（后部只有细绳），深爱者欣赏她展示的效果，被爱者因菊穴无遮挡而微微蠕动，悬垂的拉环摇曳，充满期待与羞赧。", "uid": 1479}, "日常工作中的隐秘依赖": {"content": "简介：\n【场景/情感描述】\n深爱者提议在白天工作时让被爱者带着肛珠，以缓解她的饥渴，被爱者虽羞赧却因无法抗拒而接受，两人在共谋中增强亲密羁绊。\n\n纯爱用法与交互细节：\n1. 深爱者以“工作时分心”为由，温柔劝说被爱者尝试带肛珠上班，强调这能让她更专注，被爱者虽面红耳赤却因信任而依从。\n2. 被爱者在深爱者帮助下穿戴，心中充满紧张与期待，深爱者则通过轻拍她臀瓣或给予安抚的眼神，传递“一切有我”的安心感。\n3. 被爱者带着肛珠行走时，肠道内的触感让她时刻感受到深爱者的存在，这种隐秘的依赖成为两人独有的情感纽带。", "uid": 1480}, "被打断后的宠溺：奶茶与三倍糖的温柔": {"content": "简介：\n【场景/情感描述】\n当深爱者与被爱者的亲密时刻被意外撞破时，深爱者没有慌乱或恼怒，而是镇定地打发走旁人，并特意嘱咐“买两杯奶茶，放凉了带过来，其中一杯要三倍糖”。这个细节充满了日常的宠溺——他知道她爱喝甜，也知道她此刻需要一些甜蜜来安抚被惊扰的羞耻。被爱者虽然晕厥过去，但听到这句话时，即使意识模糊，心里也会涌起一阵暖意。\n\n纯爱用法与交互细节：\n1. 在亲密时刻被意外打扰后，深爱者可以先将被爱者轻轻抱到更私密的位置，用毯子裹住她裸露的肩头，然后在她耳边说：“没事，有我在。”——这句话比任何解释都更能让她安心。\n2. 深爱者可以一边整理现场，一边顺手将被爱者散乱的发丝别到耳后，同时用她最喜欢的称呼（如“宝宝”“乖宝”）低声哄慰，让她从紧张中慢慢放松下来。\n3. 当奶茶买来后，深爱者会先亲手插好吸管，递到她嘴边，看着她咕咚咕咚喝下几口后，才自己喝另一杯。这个动作传递着“你永远优先”的信号，让被爱者感到自己是被捧在手心里呵护的。", "uid": 1481}, "足间温存的精液之礼": {"content": "简介：\n【场景/情感描述】\n被爱者穿着白丝和高跟凉鞋，用足弓和足底形成一处“肉洞”，让深爱者的肉棒在足趾与高跟之间缓缓插入。她摇晃着细嫩的白丝小腿，让肉棒在足穴中抽插，另一只足挑起睾丸，带来危险而刺激的触感。射精时，浓精灌满足底，她侧身用另一只足接住流淌的精液，白浊沿着玉足曲线流入丝足与高跟的交合处，发出淫靡的水声。\n\n纯爱用法与交互细节：\n1. 被爱者主动用足部为深爱者提供快感，展现了极致的信任与亲密，足底的精液成为二人爱意的黏腻见证。\n2. 深爱者注视被爱者足底的精浆，感受丝袜与高跟的摩擦，被爱者娇嗔“射在脚底是不是很爽”，言语间充满依赖和挑逗。\n3. 高潮后，被爱者抬起玉足，让精液在足底拉丝，深爱者托住她的纤腰，轻抚她的背脊，二人共享高潮余韵的温柔。", "uid": 1482}, "肛塞拔出的灵魂抽离": {"content": "简介：\n【场景/情感描述】\n被爱者穿着情趣内裤，菊穴中塞着宝石肛塞，深爱者握住塞头，缓慢而坚定地拔出。随着肛塞被完全抽出，被爱者身体弓起，双腿大张，淫水泛滥，仿佛被抽走了筋骨和灵魂，口中发出无法抑制的娇吟，数秒后摔回桌上，身体哆嗦不止。\n\n纯爱用法与交互细节：\n1. 深爱者用缓慢而坚定的动作拔出肛塞，被爱者因快感而身体弓起，显现出极致的依赖和脆弱。\n2. 深爱者手指钻入被爱者菊穴，抠挖敏感肠肉，引发被爱者求饶“认输了”，深爱者停下动作，温柔托住她的小臀，将她放回桌上。\n3. 被爱者在高潮后颤抖着依偎在深爱者怀中，深爱者轻抚她的背脊，感受她因快感而紧绷的肌肉逐渐放松。", "uid": 1483}, "精液灌注与肛塞的守护": {"content": "简介：\n【场景/情感描述】\n深爱者将被爱者按在桌上，肉棒猛捣菊穴，龟头顶住敏感肉团，浓稠精液冲刷而出。被爱者身体抽搐，尿液和淫水喷溅，高潮余韵中，她趴在深爱者肩头，没了气力。深爱者缓缓拔出肉棒，被爱者递上肛塞，央求他塞入菊穴，不让精液流出浪费。\n\n纯爱用法与交互细节：\n1. 深爱者用温柔而坚定的动作抽出肉棒，被爱者身体因高潮而痉挛，深爱者轻抚她的背脊，等待她平静。\n2. 被爱者请求深爱者帮她塞入肛塞，深爱者小心地将其塞入，她因敏感而轻颤，却仍依偎在深爱者怀中。\n3. 深爱者亲吻被爱者的脸颊，她低声呢喃“不想让你的精液流出来浪费”，言语间充满占有欲和爱意。", "uid": 1484}, "婚礼誓言与契约：灵魂与身体的完全交付": {"content": "简介：\n【场景/情感描述】\n在只有二人独处的梦境教堂中，被爱者身着婚纱，在布道台前宣读一份特殊的誓言。这份誓言并非简单的婚姻承诺，而是将爱意、忠诚、身体与灵魂的每一寸都毫无保留地献予深爱者。每一个身体部位——从嘴唇、乳房、腿足、菊穴到蜜穴——都被赋予了神圣的献祭意义，成为爱侣间专属的亲密仪式。空气中弥漫着羞臊与兴奋交织的甜蜜，每一个字句都带着颤抖的真诚与渴望，仿佛在向宇宙宣告：我愿成为你的，完全属于你。\n\n纯爱用法与交互细节：\n1. 被爱者站在深爱者面前，用柔婉却坚定的声音逐条宣读誓言，如“新娘被爱者，从今往后自愿成为深爱者的性奴，我将对深爱者献上我的爱意、我的身体、我的忠贞”。这份宣誓不是屈辱，而是最深层的信任与归属感，深爱者只需轻抚她的头顶，便能让她如得到奖励的小狗般喘息颤抖，蜜汁滴落丝足。\n2. 誓言中嵌入亲吻仪式：被爱者依次亲吻深爱者的左侧睾丸、右侧睾丸、棒身、马眼，每个部位都留下清晰的唇印。这些吻不是机械的步骤，而是带着虔诚的温软触碰，每一次都让她感到自己正在用唇舌为爱人绘制爱的地图，唇印如印章般烙印在肌肤上，永久见证她的归属。\n3. 契约以魔法形式呈现：被爱者的处子血迹和深爱者的精浆在纸张上凝聚为红色字迹，成为二人誓言的最终印记。之后，被爱者用涂了口红的菊门在契约上研磨盖印，深爱者则用马眼处的胭脂色亲吻留下印记，两个带着独特水渍的淫靡印记成为彼此珍藏的信物，象征着二人的不可分割。", "uid": 1485}, "梦境教堂的独处婚礼：私密与永恒的见证": {"content": "简介：\n【场景/情感描述】\n婚礼在二人独处的梦境教堂中举行，没有观众，没有掌声，只有微风中彼此的呼吸声。布道台前，深爱者和被爱者并肩站立，调整着吐息，仿佛整个世界都只剩下他们。四周是深爱者精心布置的一切，从大理石演讲台到漂浮的相机，每一处细节都充满爱意。这场婚礼是二人最为私密的纪念，连化妆都未曾假以他人，被爱者亲手勾勒唇角和眉眼，将最美的一面献给爱人。\n\n纯爱用法与交互细节：\n1. 婚礼由被爱者自己担任司仪——她将“另一个自己”（淫堕未来的幻象）输入梦境，让那个已经失去存在可能的“她”为二人主持仪式。当“自己”的声音在大堂中回荡时，被爱者感到一阵奇异的亲近与释然，仿佛过去的恐惧与未来的可能都在这声音中消融，只剩下此刻的甜蜜。深爱者则握住她的手，无声地传递着支持与爱意。\n2. 在宣读誓言和亲吻仪式中，漂浮的相机自动记录下每一个瞬间。被爱者身着婚纱，大开双腿，呈顺从的绑缚体态，蹲在深爱者的肉棒之后。这画面被永久保存，成为二人共同的秘密。被爱者想到这些，兴奋到难以自持，蜜汁不断滴落。她可以请求深爱者在日后一起翻看这些照片，让每一次回忆都成为新的亲密体验。\n3. 婚礼结束后，深爱者可以抱着被爱者，让她蜷缩在演讲台上。二人可以在这独处的空间中再次缠绵，深爱者轻抚她的头发，感受她因高潮而颤抖的身体。被爱者则会在深爱者的怀抱中低语：“这是只属于我们的婚礼，只有你和我。”这私密的空间让二人可以毫无顾忌地表达爱意，每一次亲吻、每一次触碰都成为永恒的记忆。", "uid": 1486}, "肛塞与菊穴的温柔调教：从不适到依恋": {"content": "简介：\n【场景/情感描述】\n被爱者后庭中佩戴着一枚特意挑选的宝石肛塞，内里有天然玫瑰纹路。在婚礼的步履踢踏之间，肛塞的触感逐渐增强，但不再是初时的不适。她发现，轻微的鼓胀和磨蹭已经不会带来想要排泄的感觉，反而在和菊门以及肠肉的摩擦中，滋长了她的欲求。这枚肛塞成为她身体的一部分，承载着深爱者的印记，让她在羞臊中感受到满满的被占有感。\n\n纯爱用法与交互细节：\n1. 在婚礼行进中，被爱者每走一步，肛塞都会轻轻蹭过肠壁，带来酥麻的快感。她可以感受到那玫瑰纹路在体内转动，像是深爱者在无形中抚摸她最私密的地方。她羞红着脸，将俏脸埋进捧花中，但身体却诚实地回应着这刺激，蜜汁不断涌出。深爱者可以适时地扶住她的腰，在她耳边低语：“你夹得真紧，是不是很舒服？”这轻声的调侃会让被爱者更加兴奋，几乎站不稳脚步。\n2. 在欢爱中，深爱者会拔下肛塞，用口红细致地涂在她的菊门之上。那粉嫩的肉褶逐渐变作骚媚妖艳的颜色，然后被爱者会主动用菊穴在契约上研磨盖印。这过程充满仪式感，被爱者会因为深爱者的细致涂抹而颤抖，每一次笔触都像在亲吻她的肌肤。完成后，深爱者可以再次插入，感受那涂了口红的菊穴的湿润与紧致，被爱者则会因这双重的刺激而高潮连连。\n3. 日常中，被爱者可以主动佩戴肛塞，作为对深爱者思念的寄托。当她独处时，那轻微的鼓胀感会让她想起深爱者的温度和气息。她可以发信息给深爱者：“我戴着呢，等你回来。”深爱者回复一个温柔的表情，让她感到即使相隔千里，二人的羁绊也从未断开。", "uid": 1487}, "被爱者的主动探索与依赖：荒宅中的勇气与信任": {"content": "简介：\n【场景/情感描述】\n深爱者失去消息后，被爱者一度幸灾乐祸，但很快意识到约定尚未履行，心中焦躁不安。她鼓起勇气，独自前往深爱者在帝都的宅邸。大门未锁，庭院荒草丛生，她提着裙摆，小心地穿过杂草，小腿隔着白丝被硬质草叶刮得发痒。尽管心中害怕，但她仍坚持走到屋前，直到发现倚墙昏迷的深爱者。她压下恐惧，用魔法处理了潜伏的敌人，将他带入屋内，开始为他疗伤。这一刻，她意识到自己早已在不知不觉中信任并依赖着他。\n\n纯爱用法与交互细节：\n1. 被爱者推开大门时，心跳加速，但想到可能再也见不到他，便鼓起勇气迈步。她每一步都小心翼翼，但眼神坚定，心中默念：“你不能就这样消失。”\n2. 当发现深爱者时，她先是松了一口气，随即又因他的伤势而紧张。她伸手试探他的呼吸，指尖触碰他冰冷的皮肤，心中涌起一股强烈的保护欲，轻声说：“我不会让你死的。”\n3. 在为他疗伤时，她的手因紧张而微微颤抖，但动作却异常轻柔。她一边缝合伤口，一边低声安慰他：“很快就好了，坚持住。” 她的声音温柔而坚定，仿佛在给他力量。", "uid": 1488}, "指尖相扣的入眠仪式：黑暗中确认彼此存在": {"content": "简介：\n【场景/情感描述】\n夜深人静，被爱者总会在睡前悄悄将手探向身侧，直到指尖触到深爱者的手，才安心地十指相扣。黑暗中看不见对方的脸，但相扣的指节传来的温度与脉搏，是她确认对方仍在身边的唯一方式。深爱者也会回握，拇指在她手背上轻轻摩挲，像在无声地说着安睡的承诺。\n\n纯爱用法与交互细节：\n1. 深爱者可以先躺下，故意把手摊在两人中间，等被爱者自己摸索过来——当那双小手怯生生地覆上来时，再猛地握紧，逗得她轻呼一声。\n2. 被爱者在半梦半醒间会无意识地收紧手指，深爱者便配合着不抽离，任由自己的手被她当作整夜的依靠。\n3. 若深爱者夜里需起身，会先用另一只手轻拍她的手背，待她迷糊松开后才离开，回来时重新扣紧，确保她醒来时握着的依然是那只手。", "uid": 1489}, "耳后的轻啄：藏在发丝间的隐秘宠溺": {"content": "简介：\n【场景/情感描述】\n深爱者偏爱在被爱者耳后那片柔软的肌肤落下轻吻，那里藏在发丝之下，是只属于二人的隐秘角落。每当被爱者低头做事时，深爱者便从背后俯身，拨开她的碎发，用唇瓣极轻地啄一下，惹得她耳尖瞬间染红，肩膀微微一缩，却又舍不得躲开。\n\n纯爱用法与交互细节：\n1. 深爱者可以一边从背后环住被爱者，一边用鼻尖蹭过她的耳后，再印上一个温柔的吻，低声夸她乖巧。\n2. 被爱者起初会因酥麻而下意识躲闪，但渐渐习惯后，反而会自己撩起头发，把那片肌肤露出来，无声地索要这份独属的宠爱。\n3. 这个吻不带任何情欲的急切，纯粹是确认与珍视——深爱者用它告诉对方，她的每一寸都想被温柔以待。", "uid": 1490}, "交换体温的拥抱：把冰凉的脚塞进对方怀里": {"content": "简介：\n【场景/情感描述】\n被爱者总是手脚冰凉，于是养成了一个习惯：钻进被窝后，把冰凉的双脚毫不客气地塞进深爱者的腿间或怀里取暖。深爱者每次都被冻得倒吸一口气，却从不推开，反而用体温一点点焐热那双小脚，嘴上嫌弃像两块冰，手上却揉捏得格外认真。\n\n纯爱用法与交互细节：\n1. 被爱者可以撒娇似的把脚往深爱者怀里拱，得寸进尺地讨要更多温暖，深爱者佯怒着用大手把那双脚整个包住。\n2. 深爱者可以一边焐脚一边数落她不穿袜子，却在她假装委屈时立刻心软，把人连脚带身一起搂进怀里。\n3. 当那双脚终于暖和起来，被爱者会满足地喟叹一声，把脸埋进深爱者颈窝——这份理所当然的索取，正是全然信任的证明。", "uid": 1491}, "写在手心的告白：羞于出口的三个字": {"content": "简介：\n【场景/情感描述】\n被爱者始终说不出口那三个字，于是深爱者想了个法子：握住她的手，让她用指尖一笔一画地在自己掌心写下心里话。她低着头，耳根通红，指尖颤抖着划过他的掌纹，写下喜欢你三个字。深爱者合拢手掌将那几个字握住，仿佛攥住了她藏了许久的心意。\n\n纯爱用法与交互细节：\n1. 深爱者可以摊开手掌耐心等待，被爱者写错或写到一半害羞停笔时，便用另一只手覆上去鼓励她慢慢写。\n2. 被爱者写完后会立刻想抽手逃开，深爱者却紧紧扣住，低头在她发顶印一吻，回写同样的心意在她掌心。\n3. 这个仪式可以反复进行，每一次书写都比上一次更流畅，直到某天她终于能直视他的眼睛把话说出口。", "uid": 1492}, "肛塞作为定情信物：被填满时的归属安宁": {"content": "简介：\n【场景/情感描述】\n深爱者为被爱者准备了一枚镶着两人生辰宝石的肛塞，作为日常佩戴的定情信物。它静静嵌在被爱者体内，不为情欲，只为让她无论身在何处都能感受到深爱者的存在。被填满的微胀感成了一种安心的锚点，每当她紧张或思念，便会下意识地收紧后庭，确认那份归属仍在。\n\n纯爱用法与交互细节：\n1. 深爱者可以在每日清晨亲手为被爱者戴上，动作轻柔得像在为她系上项链，低声叮嘱她带着自己的牵挂。\n2. 被爱者独处时若感到不安，会轻轻夹紧后庭感受那枚信物的存在，仿佛深爱者的手就按在她腰后。\n3. 夜晚归家后，深爱者会亲手取下，检视宝石是否温热，再用唇轻吻那处微红的菊穴，作为一天圆满的句点。", "uid": 1493}, "后庭交融时的额头相抵：呼吸交换的灵魂私语": {"content": "简介：\n【场景/情感描述】\n在缓慢而深情的后庭交融中，二人并不急于攀向顶峰，而是额头相抵，鼻尖轻触，交换着彼此滚烫的呼吸。深爱者每一次温柔的挺动都伴随着被爱者睫毛的颤动，她睁着湿润的眼眸凝视对方，喉间溢出的不是放浪的呻吟，而是断续的、近乎呢喃的喜欢。\n\n纯爱用法与交互细节：\n1. 深爱者可以放慢一切动作，用额头抵住被爱者的额头，让两人的视线在极近的距离交缠，把每一次结合都变成无声的告白。\n2. 被爱者可以主动抬起脸寻找对方的唇，在交融的间隙落下细碎的吻，把身体的快感与心灵的依恋融为一体。\n3. 高潮来临时，二人依旧额头相抵，深爱者将精液缓缓送入她体内，被爱者在被填满的瞬间露出近乎流泪的安心笑容。", "uid": 1494}, "清晨的第一句早安：睁眼便看见你的脸": {"content": "简介：\n【场景/情感描述】\n被爱者最珍视的，是每个清晨睁开眼时，第一眼便能看见深爱者近在咫尺的睡颜。深爱者往往醒得更早，却舍不得起身，只是静静侧躺着凝视她，待她睫毛轻颤、迷蒙睁眼的刹那，便温柔地道一声早安，再印上一个带着晨间慵懒的吻。\n\n纯爱用法与交互细节：\n1. 深爱者可以在被爱者将醒未醒时，用指腹轻抚她的脸颊和眉骨，让她在最舒服的触感中自然苏醒。\n2. 被爱者刚睁眼会有片刻的怔忪，待看清眼前的脸便绽出满足的微笑，主动凑过去把脸埋进对方胸口蹭一蹭，含糊地回一句早安。\n3. 这个仪式日复一日，却从不腻味——因为对二人而言，睁眼能看见彼此本身，就是最奢侈的幸福。", "uid": 1495}, "鱼尾礼服与隐形禁锢": {"content": "{鱼尾礼服与隐形禁锢}\n简介：\n【场景/道具描述】\n一袭墨色或酒红的鱼尾晚礼服，从胸口到膝盖紧紧包裹身躯，到小腿处才如鱼尾般绽开。礼服的剪裁本身就是拘束：极紧的鱼尾下摆使双膝无法分开、步幅被限制在十厘米以内，受虐者只能扭动腰胯、以妩媚到近乎屈辱的小碎步前行。礼服内层缝有硅胶吸盘式乳贴与一片包裹下体的开口绸缎，绸缎正中留有可供贯穿的孔洞，平时由一枚装饰性宝石封堵。背部深V裸露至腰窝，看似性感，实为方便随时解开内层束缚。\n\n用法与交互细节：\n1. 行走训练：施虐者命令受虐者端着酒杯穿过长廊，鱼尾下摆的禁锢迫使她每一步都重心不稳、臀部夸张摆动，稍快便会踉跄，只能更加专注地维持优雅，将注意力从下体的空虚与摩擦上强行剥离。\n2. 隐形开口：宴会进行中，施虐者可不动声色地拔下封堵的宝石，从礼服侧面或背后探入，而正面看礼服依旧完好无损——受虐者必须在被贯穿的同时维持谈笑自若的表情。\n3. 心理反差：墨色鱼尾礼服塑造出冷艳高贵的成熟女性形象，与她裙下被玩弄到失神、却不敢发出半点异样声响的窘迫形成强烈反差，是公开场合驯化的高阶道具。", "uid": 1496}, "圣女法衣下的淫纹枷锁": {"content": "{圣女法衣下的淫纹枷锁}\n简介：\n【场景/道具描述】\n一袭象征至高神职的纯白圣女法衣，繁复的金线刺绣、垂坠的宽大袖摆、及地的圣洁长裙，是信徒眼中不可亵渎 弈}\n简介：\n【场景/玩法描述】调教者刻意保留受调教者的处女膜，只进行后庭或外部调教，直到受调教者主动放弃纯洁象征，请求阴道插入。此过程强调心理沦陷。\n\n用法与交互细节：\n1. 调教者长期只进行后庭或外部调教，故意不触碰阴道。\n2. 受调教者因后庭快感逐渐渴望阴道插入，最终主动请求破处。\n3. 破处时，调教者可强调“你放弃了最后的纯洁”，增强心理冲击。\n4. 可变体：可改为保留其他象征（如初吻、第一次口交等）；可设置条件或奖励。", "uid": 1547}, "白丝足部舔舐与足趾含吮": {"content": "{白丝足部舔舐与足趾含吮}\n简介：\n【场景/玩法描述】调教者舔舐受调教者穿着白丝的双足，含吮足趾，通过丝袜的触感和足部的敏感度带来快感。\n\n用法与交互细节：\n1. 受调教者穿着白丝或黑丝，调教者从足底开始舔舐，逐渐含住足趾。\n2. 丝袜的材质和湿润感增加刺激，足趾的蜷缩和伸展提供互动。\n3. 调教者可同时按摩足部或进行言语挑逗。\n4. 可变体：可改为裸足或不同材质丝袜；可加入足交或足部束缚。", "uid": 1548}, "连续高潮与失禁控制": {"content": "{连续高潮与失禁控制}\n简介：\n【场景/玩法描述】通过持续刺激使受调教者达到多次高潮，最终导致失禁（潮吹或尿液喷出）。调教者可利用此状态进行羞辱或进一步调教。\n\n用法与交互细节：\n1. 调教者通过快速抽插、拍击、指奸等方式使受调教者连续高潮。\n2. 当受调教者体力耗尽或敏感度达到极限时，可能出现失禁。\n3. 调教者可言语羞辱，如“居然尿出来了，真是个不检点的女仆”。\n4. 可变体：可控制失禁时机（如憋尿后释放）；可结合排泄调教。", "uid": 1549}, "精力剂辅助的长时间性交": {"content": "{精力剂辅助的长时间性交}\n简介：\n【场景/玩法描述】调教者使用精力剂等药物辅助，维持长时间性交（数小时），使受调教者经历多次高潮直至体力耗尽。\n\n用法与交互细节：\n1. 调教者提前服用精力剂，确保性交过程中保持勃起和耐力。\n2. 性交持续数小时，受调教者被反复插入，经历无数次高潮。\n3. 结束后，受调教者可能虚脱，后穴或阴道无法闭合，精液流出。\n4. 可变体：可改为受调教者服用催情剂；可结合捆绑或固定姿势。", "uid": 1550}, "泳装束缚与感官剥夺": {"content": "{泳装束缚与感官剥夺}\n简介：\n【场景/玩法描述】受缚者身穿紧身泳装或连体衣，同时被蒙眼、戴口球、双手反绑，剥夺视觉和发声能力，仅靠触觉和听觉感受调教者的动作。调教者通过抚摸、舔舐、玩具刺激等方式逐步提升其敏感度，受缚者因无法预知下一步而更加紧张兴奋。\n\n用法与交互细节：\n1. 调教者缓慢触碰受缚者身体各部位（如足底、大腿、乳尖），观察其颤抖和呼吸变化。\n2. 可配合震动棒或按摩棒在泳装外或内刺激，受缚者因束缚无法躲避。\n3. 口球导致唾液分泌，可增加羞辱感；蒙眼布可在高潮时摘下，制造视觉冲击。\n4. 可变体：将泳装换成紧身皮衣、乳胶衣或拘束衣；捆绑方式可改为绳缚或金属拘束具。", "uid": 1551}, "白丝足交与颜面骑乘": {"content": "{白丝足交与颜面骑乘}\n简介：\n【场景/玩法描述】受缚者穿着白丝或肉丝连裤袜，用双足踩踏或夹住调教者的面部，让调教者舔舐足底、脚趾和丝袜缝隙；同时调教者可用舌头或手指刺激受缚者的蜜穴或肛穴，形成双向刺激。受缚者因足部敏感和下身快感而难以保持平衡，需扶墙或依靠调教者。\n\n用法与交互细节：\n1. 调教者躺卧，受缚者站立或蹲踞，将足部置于调教者面部，主动用足趾抓捏或摩擦。\n2. 调教者可用手指或玩具同时刺激受缚者下体，使其因双重快感而痉挛。\n3. 丝袜浸湿后透明度增加，视觉上更诱人；可撕破裆部露出蜜穴直接刺激。\n4. 可变体：调教者与受缚者互换角色；使用不同颜色或材质的丝袜（如渔网、蕾丝）。", "uid": 1552}, "肛穴骑乘与子宫按压": {"content": "{肛穴骑乘与子宫按压}\n简介：\n【场景/玩法描述】受缚者以骑乘位主动套弄调教者的阴茎，但插入的是肛穴而非阴道；调教者同时用手按压受缚者下腹子宫位置，使阴茎透过直肠壁更强烈地压迫子宫，带来酸胀和饱胀感。受缚者需主动扭腰控制节奏，调教者则通过按压和言语引导。\n\n用法与交互细节：\n1. 受缚者背对或面对调教者骑乘，双手扶其肩膀或沙发靠背。\n2. 调教者一手固定受缚者腰部，另一手在其小腹施加压力，配合抽插节奏。\n3. 受缚者因直肠和子宫双重刺激易达到强烈高潮，可能潮吹或失禁。\n4. 可变体：使用假阳具同时插入阴道，形成三穴夹击；或改用后入式由调教者主动。", "uid": 1553}, "潮吹喷射与寸止交换": {"content": "{潮吹喷射与寸止交换}\n简介：\n【场景/玩法描述】调教者通过指技或玩具刺激受缚者G点或阴蒂，使其达到潮吹临界点，然后突然停止刺激，让受缚者体验欲射未射的焦灼感；作为交换，调教者允许受缚者以口交或手淫方式帮助自己射精，或允许受缚者自行高潮。潮吹时液体喷射距离和量可作比赛或观赏。\n\n用法与交互细节：\n1. 调教者用手指快速抠挖阴道前壁或摩擦阴蒂，观察受缚者反应，在即将喷射时停手。\n2. 受缚者需用言语或动作请求继续，调教者可设定条件（如说出羞耻台词）。\n3. 潮吹时可用毛巾或防水布铺垫，也可在浴缸或淋浴间进行。\n4. 可变体：使用震动棒或吮吸玩具代替手指；调教者用嘴接住潮吹液体。", "uid": 1554}, "旗袍情趣与真空诱惑": {"content": "{旗袍情趣与真空诱惑}\n简介：\n【场景/玩法描述】受缚者穿着改良旗袍，胸部和腰部有镂空设计，下摆极短，且不穿内裤（真空）。调教者可通过镂空处直接抚摸肌肤，或掀起裙摆暴露蜜穴。旗袍紧身剪裁凸显曲线，行走或坐姿时易走光，增加羞耻感和暴露风险。\n\n用法与交互细节：\n1. 受缚者日常活动（如做家务、行走）时，调教者从旁观察并随时进行挑逗。\n2. 调教者可命令受缚者做出弯腰、抬腿等动作，故意让私处暴露。\n3. 旗袍材质（如丝绸、蕾丝）与肌肤摩擦产生快感，可配合按摩棒遥控使用。\n4. 可变体：搭配丝袜、吊带袜或腿环；旗袍颜色和花纹可定制（如中国风、哥特风）。", "uid": 1555}, "玩具自慰、计数惩罚与戒断依赖": {"content": "{玩具自慰、计数惩罚与戒断依赖}\n简介：\n【场景/玩法描述】调教者用玩具、监控、计数目标和戒断规则建立身体依赖。受控者被要求按次数、时间或评分完成自慰任务，随后又因为普通刺激无法满足而更依赖调教者提供的道具、录像或许可。\n\n用法与交互细节：\n1. 设置明确任务，如限定时间、高潮次数、报告格式或失败惩罚。\n2. 用监控、回放或记录表强化“每次快感都被管理”的事实。\n3. 让受控者在无玩具、无许可或无录像时产生焦躁和戒断，主动请求下一轮训练。\n4. 变体：玩具自慰计数、监控观看依赖、高级玩具戒断、失败加罚与超额惩罚。", "uid": 1556}, "OL办公室调教与感官剥夺": {"content": "{OL办公室调教与感官剥夺}\n简介：\n【场景/玩法描述】受缚者穿着OL套装（白衬衫、包臀裙、黑丝、高跟鞋），双手被红绳反绑，蒙眼并戴口球，坐在办公桌或椅子上。调教者以老板或同事身份进行调教，通过抚摸、舔舐丝袜足部、用阴茎摩擦面部等方式，在办公室环境中制造权力不对等和羞耻感。\n\n用法与交互细节：\n1. 调教者先脱下受缚者高跟鞋，把玩并舔舐黑丝足部，再逐步向上抚摸大腿和臀部。\n2. 受缚者因蒙眼和口球无法预知和回应，只能通过身体颤抖和呻吟表达感受。\n3. 调教者可命令受缚者用足部或腿部夹住阴茎进行摩擦，或让其跪在办公桌下口交。\n4. 可变体：场景可改为教室、审讯室等；制服可换成女仆装、护士装等。", "uid": 1557}, "后入肛交与足部固定": {"content": "{后入肛交与足部固定}\n简介：\n【场景/玩法描述】受缚者以四肢着地或站立弯腰姿势，调教者从后方插入肛穴。同时，调教者用双手固定受缚者的脚踝或高跟鞋，使其无法移动，或抬起一条腿以改变插入角度。受缚者因重心不稳而需扶墙或家具，调教者则能更深入地抽插。\n\n用法与交互细节：\n1. 受缚者穿高跟鞋或丝袜，调教者握住其脚踝或鞋跟，控制其姿势。\n2. 调教者另一手可拍打臀部或揉捏乳房，增加刺激。\n3. 插入时可配合言语羞辱，如“你这只发情的母狗”。\n4. 可变体：使用肛塞或震动棒预先扩张；调教者同时用假阳具插入阴道。", "uid": 1558}, "精液高跟鞋": {"content": "{精液高跟鞋}\n简介：\n将精液注入高跟鞋内，再给受缚者穿上，使其足部浸泡在黏腻温热的精液中，行走时产生持续刺激和羞辱感。\n\n用法与交互细节：\n1. 调教者将精液射入高跟鞋内，涂抹均匀后强制为受缚者穿上。\n2. 受缚者足部敏感度较高，精液的温热和黏腻感会带来强烈不适与快感。\n3. 可配合眼罩、口球等感官剥夺道具，增强受缚者对足部刺激的专注。\n4. 可变体：使用其他体液（如润滑液、尿液）或不同材质鞋具（如过膝靴、凉鞋）。", "uid": 1559}, "肛塞固定与双穴贯穿": {"content": "{肛塞固定与双穴贯穿}\n简介：\n使用大型螺纹肛塞固定受缚者体位，同时进行阴道或 ", "uid": 1677}, "双穴同时高潮与失禁羞辱": {"content": "{双穴同时高潮与失禁羞辱}\n简介：\n【场景/玩法描述】受虐者被同时刺激前后穴，达到高潮后，调教者将尿液射入受虐者阴道，造成失禁与羞辱感。受虐者在羞耻中再次高潮。\n\n用法与交互细节：\n1. 调教者先通过后穴抽插使受虐者高潮，然后拔出肉棒，将尿液射入受虐者小穴。\n2. 受虐者在被灌尿时因快感与羞耻双重刺激达到高潮，尿液从交合处溢出。\n3. 调教者可观察受虐者失禁的狼狈姿态，强化羞辱效果。\n4. 可变体：可改用其他液体（如精液、润滑液）代替尿液，或让受虐者自行排尿。", "uid": 1678}, "婚纱婚礼奴隶契约": {"content": "{婚纱婚礼奴隶契约}\n简介：\n【场景/玩法描述】受虐者身穿婚纱，在教堂或类似神圣场所进行婚礼仪式，但宣誓内容为成为调教者的性奴隶妻子，并签署淫秽的结婚证书。\n\n用法与交互细节：\n1. 受虐者身穿婚纱，佩戴情趣内衣和隐藏玩具（如跳蛋、按摩棒），在调教者面前跪下宣誓。\n2. 宣誓内容包括自愿成为调教者的性奴隶、便器，并承诺永远服从。\n3. 签署结婚证书时，受虐者用唇印、小穴印和菊穴印作为印记。\n4. 可变体：可加入其他仪式元素，如交换项圈、戒指，或由调教者宣读契约。", "uid": 1679}, "后入式后穴抽插与臀肉拍打": {"content": "{后入式后穴抽插与臀肉拍打}\n简介：\n【场景/玩法描述】受虐者以后入姿势接受后穴抽插，调教者同时拍打其臀部，制造痛感与快感的混合。特别适用于强势角色，利用其反差感增强刺激。\n\n用法与交互细节：\n1. 受虐者趴伏，臀部抬高，调教者从后方插入后穴。\n2. 抽插过程中，调教者用手掌拍打受虐者臀部，留下红痕。\n3. 受虐者因被虐快感而兴奋，发出淫叫。\n4. 可变体：可改用工具（如拍板、鞭子）拍打，或让受虐者自己拍打。", "uid": 1681}, "龟甲缚悬吊与衣物撕扯": {"content": "{龟甲缚悬吊与衣物撕扯}\n简介：\n【场景/玩法描述】受虐者被以龟甲缚方式捆绑并悬吊，调教者撕扯其衣物，暴露身体。束缚使身体曲线更突出，增加视觉刺激。\n\n用法与交互细节：\n1. 用绳索将受虐者双手反绑，以龟甲缚方式缠绕身体，然后吊起。\n2. 调教者撕扯受虐者的丝袜、内裤等衣物，露出私处。\n3. 受虐者因束缚而无法反抗，只能接受调教者的摆布。\n4. 可变体：可改用其他捆绑方式（如后手缚、股绳缚），或加入口塞。", "uid": 1682}, "肛穴润滑与扩张羞辱": {"content": "{肛穴润滑与扩张羞辱}\n简介：\n【场景/玩法描述】调教者用手指将润滑液送入受虐者肛门，进行扩张，同时用语言羞辱。受虐者因羞耻和刺激而发出惊呼。\n\n用法与交互细节：\n1. 调教者掰开受虐者臀肉，将润滑液倒入肛门，用手指搅动。\n2. 受虐者因冰凉刺激和羞耻感而扭动身体，发出声音。\n3. 调教者用语言羞辱受虐者，如“你的屁眼在吸我的手指”。\n4. 可变体：可改用其他工具（如灌肠器、按摩棒）进行扩张，或让受虐者自己扩张。", "uid": 1683}, "精液高跟鞋与足部羞辱": {"content": "{精液高跟鞋与足部羞辱}\n简介：\n【场景/玩法描述】受虐者穿着透明高跟鞋，鞋内装满精液，行走时精液溢出，污染足部。调教者欣赏受虐者足部被精液浸润的淫靡景象。\n\n用法与交互细节：\n1. 将精液倒入透明高跟鞋中，让受虐者穿上。\n2. 受虐者行走时，精液从鞋口溢出，沿着脚趾和脚背流淌。\n3. 调教者可命令受虐者展示足部，或舔舐脚上的精液。\n4. 可变体：可改用其他液体（如尿液、润滑液），或让受虐者自己将精液倒入鞋中。", "uid": 1684}, "能力封印与强制凌辱": {"content": "{能力封印与强制凌辱}\n简介：\n【场景/玩法描述】通过特殊空间或道具封印受虐者的特殊能力，使其无法反抗，然后进行强制凌辱。适用于原本强大的角色，利用其无力感增强羞辱效果。\n\n用法与交互细节：\n1. 调教者使用某种手段（如空间结界、药物）封印受虐者的能力。\n2. 受虐者发现自己无法使用能力，陷入恐慌。\n3. 调教者趁机进行捆绑、撕衣、插入等凌辱行为。\n4. 可变体：可让受虐者逐渐恢复能力但被再次压制，或让受虐者主动放弃能力换取片刻喘息。", "uid": 1685}, "人格凝胶析出与玷污": {"content": "{人格凝胶析出与玷污}\n简介：\n通过特殊软件或装置，将受虐者的人格以凝胶形式从体内析出（通常通过后庭），然后施虐者用生殖器插入，将人格凝胶捣碎并与精液混合，从而彻底改写受虐者的人格，使其成为专属性奴。\n\n用法与交互细节：\n1. 受虐者被固定，后庭插入肛条或按摩棒，刺激人格凝胶的析出，伴随强烈的排泄感和快感。\n2. 人格凝胶通常有两种颜色/质地，代表不同人格层面（如温柔与暴烈），析出时各有触感。\n3. 施虐者看准时机插入，将凝胶捣碎混合，精液作为粘合剂，完成人格重塑。\n4. 可变体：凝胶可通过其他孔窍析出；人格改写后受虐者主动宣誓效忠。", "uid": 1686}, "足穴夹击与丝足侍奉": {"content": "{足穴夹击与丝足侍奉}\n简介：\n两位女性用各自的一只脚（穿丝袜）合拢形成足穴，夹住施虐者的肉棒进行搓揉、套弄，脚趾灵活刺激龟头和包皮，另一人揉弄睾丸，形成双重刺激。\n\n用法与交互细节：\n1. 两位女性后仰靠在施虐者身上，双腿交叠，脚趾互相扣紧形成足穴。\n2. 一人用脚趾夹住包皮套弄，另一人揉弄睾丸袋，节奏可变化。\n3. 丝袜的丝滑触感与足穴的温热感叠加，可配合脚趾张开、蜷缩等动作。\n4. 可变体：可加入脚趾间夹物（如跳蛋）；或由一人同时用双脚侍奉。", "uid": 1687}, "乳交专用服装设计": {"content": "{乳交专用服装设计}\n简介：\n服装（如旗袍）在胸部位置预先开洞，方便直接露出乳房进行乳交，同时保持其他部位着装，形成反差。\n\n用法与交互细节：\n1. 服装胸部开洞，洞口大小恰好露出乳头和乳沟，便于肉棒插入。\n2. 受虐者用乳肉包裹棒身，同时可用丝质手套的手辅助刺激龟头。\n3. 舌尖分泌香津滴在龟头上作为润滑，配合乳交动作。\n4. 可变体：开洞位置可设计在臀部或裆部；服装材质可选用蕾丝、皮革等。", "uid": 1688}, "肛条维持与上班调教": {"content": "{肛条维持与上班调教}\n简介：\n受虐者在日常工作或公共场合体内塞入肛条或按摩棒，保持正常举止，施虐者通过遥控或定时刺激，使其在他人面前维持镇定，私下则释放快感。\n\n用法与交互细节：\n1. 肛条尺寸较大，带有震动功能，上班前塞入，通过遥控器控制强度。\n2. 受虐者需保持严肃表情和正常动作，但体内持续受刺激，积累快感。\n3. 下班后抽出肛条，受虐者往往立即高潮。\n4. 可变体：可替换为跳蛋或遥控前列腺按摩器；场合可扩展至社交聚会、会议等。", "uid": 1689}, "精液收集与饮用仪式": {"content": "{精液收集与饮用仪式}\n简介：\n受虐者将施虐者射出的精液用容器（如高跟鞋、手碗）收集，然后像品尝美酒或圣水一样仔细饮用，甚至舔舐容器内壁，表现出痴迷和感恩。\n\n用法与交互细节：\n1. 射精后，受虐者立即用指定容器（如高跟鞋、酒杯）收集精液，避免浪费。\n2. 受虐者将容器凑近鼻尖嗅闻，表现出兴奋，然后小口品尝，用舌头搅拌，拉出丝。\n3. 饮用后展示口腔，证明已吞咽干净，并露出满足表情。\n4. 可变体：可加入精液涂抹身体或混合食物；容器可定制为圣杯、项圈等。", "uid": 1691}, "双穴交替连续高潮": {"content": "{双穴交替连续高潮}\n简介：\n施虐者在短时间内先后插入受虐者的阴道和后庭，不拔出即切换，使受虐者在一次交合中经历多次高潮，且后庭高潮往往更强烈。\n\n用法与交互细节：\n1. 先插入阴道抽插至高潮，拔出后直接滑入后庭，利用阴道分泌物作为润滑。\n2. 后庭插入时，受虐者因高潮后敏感而迅速再次高潮，甚至潮吹。\n3. 施虐者可同时用手刺激阴蒂或乳房，增强快感。\n4. 可变体：可先插入后庭再转阴道；或使用双头龙同时刺激双穴。", "uid": 1692}, "土下座宣誓与脚踩羞辱": {"content": "{土下座宣誓与脚踩羞辱}\n简介：\n受虐者全裸行土下座礼（额头贴地，双手交叉前伸，膝盖跪地，臀部压小腿），宣誓放弃一切尊严成为施虐者的性奴，然后施虐者用脚踩其头部，强化屈辱感。\n\n用法与交互细节：\n1. 受虐者以标准土下座姿势伏地，背诵效忠誓言，内容包含放弃身份、自愿为奴。\n2. 施虐者将脚踩在受虐者头上，施加压力，使其脸贴地变形。\n3. 受虐者因屈辱和自毁快感而兴奋，私处泛滥。\n4. 可变体：可加入项圈、锁链；宣誓内容可定制；脚踩后可命令舔脚。", "uid": 1693}, "熟睡入侵与制服半褪": {"content": "{熟睡入侵与制服半褪}\n简介：\n【场景/玩法描述】调教者趁受虐者熟睡时潜入其私密空间，受虐者身着半褪的OL制服，处于疲惫与无防备状态。调教者利用其身体虚弱与睡眠朦胧，逐步实施侵犯，从抚摸大腿到舔舐，最终唤醒受虐者。\n\n用法与交互细节：\n1. 调教者需提前获取受虐者住所的钥匙或密码，制造“合法入侵”的
