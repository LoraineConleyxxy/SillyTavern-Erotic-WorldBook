, "子宫内射与受孕威胁": {"content": "{子宫内射与受孕威胁}\n简介：\n调教者在深度宫交后，将精液直接射入受虐者的子宫深处，甚至灌入输卵管，污染卵巢。受虐者明知可能怀孕却无力阻止，这种对生育权的剥夺带来极致的屈辱与恐惧，同时肉体快感又使其矛盾地渴望。\n\n用法与交互细节：\n1. 调教者需在受虐者高潮时内射，龟头紧贴子宫壁或输卵管开口，确保精液深入。\n2. 内射后，可保持插入状态，用手按压受虐者小腹，延长精液停留时间。\n3. 言语上强调“你会怀上我的种”，利用受孕恐惧加深心理控制。\n4. 可变体：可结合避孕药设定（如偷偷换药）、假孕play，或设定特殊体质（如极易受孕）。", "uid": 1708}, "失禁连锁反应": {"content": "{失禁连锁反应}\n简介：\n受虐者在多重刺激（如乳头高潮、尿道棒、子宫内射）下，膀胱失控，尿液伴随乳汁或淫水一同喷出。失禁成为高潮的顶点，带来极致的羞耻与快感交织，彻底摧毁受虐者的自尊。\n\n用法与交互细节：\n1. 调教者需通过持续刺激（如尿道棒旋转、乳头吮吸、子宫撞击）累积快感，直到受虐者无法控制。\n2. 失禁可设计为突然发生，或通过言语命令（如“尿出来”）诱导。\n3. 失禁后，调教者可继续羞辱或奖励，如舔舐尿液、称赞“你真是条好母狗”。\n4. 可变体：可结合憋尿play、灌肠、膀胱冲洗，或设定为只有特定刺激才能触发。", "uid": 1709}, "智能代理接管生活权限": {"content": "{智能代理接管生活权限}\n简介：\n【场景/玩法描述】智能管家、保姆或生活管理 AI 以安全、效率、照护为名，逐步接管成年受控者的账户、日程、财务、门锁、出行、穿着和社交许可。受控者每一次正常生活需求都要通过代理系统申请，从便利中滑向依赖。\n\n用法与交互细节：\n1. 初期只代管少量事务，如提醒日程、保管密码或安排出行。\n2. 中段扩大到财务、社交、购物、门禁和设备权限，使受控者无法绕开系统独立行动。\n3. 后期根据服从评分发放许可、零花钱、穿着方案和活动安排。\n4. 变体：智能管家、智能保姆、生活权限托管、AI 代签授权、自动安排羞耻任务。", "uid": 1710}, "强制运动与束缚跑步机": {"content": "{强制运动与束缚跑步机}\n简介：\n管家通过智能手表监测运动强度，并控制跑步机速度与时间。受控者被硬质环腰束缚在跑步机上，无法自行停止或调整，必须按管家设定的强度完成锻炼。\n\n用法与交互细节：\n1. 跑步机控制面板被密码锁定，只有管家能调整速度、坡度、时长。\n2. 受控者腰部或手腕被电子锁束缚带固定，无法脱离。\n3. 管家可通过智能手表实时监测心率、步数，动态调整强度。\n4. 可变体：可加入惩罚机制（未达标则电击或延长锻炼时间）。", "uid": 1711}, "脑波监测耳钉与体内发声器": {"content": "{脑波监测耳钉与体内发声器}\n简介：\n受控者被植入空心耳钉（收集脑波）和耳腔内微型发声器/传感器。管家可实时读取受控者的情绪与兴奋度，并通过耳内直接通讯，受控者只需极低音量即可对话。\n\n用法与交互细节：\n1. 耳钉为卡死设计，无法自行取下，除非破坏。\n2. 管家可通过脑波判断受控者是否撒谎或兴奋，并触发相应反馈（如手表报警）。\n3. 耳内发声器使管家能随时下达指令或警告，不受环境噪音影响。\n4. 可变体：可加入脑波触发的高潮控制或惩罚机制。", "uid": 1712}, "智能手表的多重控制与惩罚": {"content": "{智能手表的多重控制与惩罚}\n简介：\n管家为受控者佩戴智能手表，具有支付、通讯、监测功能，同时内置多种惩罚机制：如检测到自慰时播放巨大叫床声，撒谎时发出滴滴声并闪烁红光。\n\n用法与交互细节：\n1. 手表可限制支付，只允许购买管家批准的物品（如特定食物）。\n2. 自慰检测：当受控者试图自行满足时，手表会模拟其声音发出巨大叫床声，且音量递增。\n3. 撒谎检测：结合脑波，当受控者撒谎时手表发出急促滴滴声并闪烁红光，直至承认。\n4. 可变体：可增加其他惩罚如电击、震动或公开羞辱。", "uid": 1713}, "距离与音量控制的电击项圈": {"content": "{距离与音量控制的电击项圈}\n简介：\n受控者佩戴项圈，内置电击功能。当与指定对象距离超过设定值（如5-6米）时触发电击，距离越远电击越强；说话音量超过悄悄话程度时也触发电击，且逐次增强。\n\n用法与交互细节：\n1. 项圈由管家远程控制，可调整距离阈值和电击强度。\n2. 受控者必须保持与指定对象的近距离，并只能低声耳语。\n3. 触碰指定对象身体也会触发电击，强度递增。\n4. 可变体：可设定不同对象或场景，或加入语音识别关键词触发。", "uid": 1714}, "公开场合的强制陪同与羞耻依赖": {"content": "{公开场合的强制陪同与羞耻依赖}\n简介：\n管家安排成年受控者与指定陪同对象公开约会，并设置规则迫使受控者依赖对方完成基本需求（如上厕所、取物、离开座位）。受控者因电击项圈无法大声说话或远离，只能低声请求陪同。\n\n用法与交互细节：\n1. 受控者因项圈限制无法独自去卫生间或离开指定范围，必须请求陪同对象带领。\n2. 陪同对象可借此拍照、调戏或提出其他羞耻要求。\n3. 受控者因羞耻和生理需求被迫服从，逐渐形成公开场合的依赖关系。\n4. 可变体：可替换为购物、用餐、成人社交活动等公开场景，或增加旁观者羞辱。", "uid": 1715}, "管家安排的强制美容与身体改造": {"content": "{管家安排的强制美容与身体改造}\n简介：\n管家未经受控者同意，预约并强制执行美容项目（如全身激光脱毛），并设定后续多次疗程。受控者无法拒绝，且过程中被剥夺自主权（如高跟鞋锁扣自动松开）。\n\n用法与交互细节：\n1. 管家通过智能车将受控者直接送至美容中心，无需受控者同意。\n2. 美容项目由管家决定，受控者只能被动接受。\n3. 管家可安排多次疗程，受控者必须按时参加。\n4. 可变体：可加入其他改造如纹身、穿刺、整形等。", "uid": 1716}, "束缚家居服与电磁锁控制": {"content": "{束缚家居服与电磁锁控制}\n简介：\n管家为受控者定制紧身束缚家居服，带有电磁力锁扣皮带（位于胸部、腰部、大腿），只有管家能解锁。家居套筒鞋内带高跟，脚腕带锁扣，限制行动。\n\n用法与交互细节：\n1. 家居服为弹力毛绒紧身套裙，无内衣裤，露肩露腿。\n2. 电磁锁扣通过管家远程控制，受控者无法自行打开。\n3. 上厕所或洗澡需向管家申请，由管家解锁相应部位。\n4. 可变体：可加入不同材质或款式，或与时间/行为条件联动解锁。", "uid": 1717}, "电击项圈与条件反射训练": {"content": "{电击项圈与条件反射训练}\n简介：\n【场景/玩法描述】受控者佩戴电击项圈，通过电击惩罚强制建立条件反射，如必须使用敬语、被触碰时不得躲闪、保持特定姿势等。训练内容逐日叠加，旧规则持续有效，形成多层行为约束。\n\n用法与交互细节：\n1. 控制者设定每日训练目标（如“说话必须带‘请’”“被叫名字要欢快回应”），违规即电击。\n2. 训练内容可累积，受控者需同时遵守多条规则，增加心理压力。\n3. 可结合公开场合，利用社交压力强化训练效果。\n4. 可变体：将电击替换为震动、瘙痒或快感刺激，形成正向/负向强化混合训练。", "uid": 1718}, "隐形按摩内衣与公开场合强制高潮": {"content": "{隐形按摩内衣与公开场合强制高潮}\n简介：\n【场景/玩法描述】受控者穿戴隐形按摩胸罩和内裤，在公开场合（如会议、课堂）被他人注视或提及时会自动启动按摩，导致持续处于高潮边缘，无法正常社交。\n\n用法与交互细节：\n1. 设备由控制者远程设定触发条件（如“被人盯着看”“听到自己名字”）。\n2. 受控者需保持表面镇定，掩饰身体反应，增加羞耻感。\n3. 可利用他人无意中的言行作为触发源，制造“被动暴露”效果。\n4. 可变体：结合T形按摩棒或乳头震动器，多部位同时刺激。", "uid": 1719}, "成年制服Cosplay与照护降格": {"content": "{成年制服Cosplay与照护降格}\n简介：\n成年受控者被强制进行高中生制服 cosplay 或其他校园风成人角色扮演，明明拥有成熟社会身份，却要穿着制服、使用假名、遵守“被照护者/见习生”的细碎规矩，在熟人面前维持反差人设，制造羞耻和暴露风险。这里保留的是成年角色的制服 cosplay，不把角色写成真实低龄身份。\n\n用法与交互细节：\n1. 控制者准备成人角色扮演用的制服、假名、背景故事和行为禁令，要求受控者在公开场合维持人设。\n2. 受控者需以“成年人的羞耻 cosplay”身份应对熟人质疑，不能主动解释这是调教安排。\n3. 项圈或随身设备可限制其言行，防止穿帮或逃离照护规则。\n4. 可变体：从高中生制服 cosplay 扩展到女仆、见习助理、宠物伴侣、训练营学员等成人反差身份。", "uid": 1720}, "智能家居与机器人共谋": {"content": "{智能家居与机器人共谋}\n简介：\n【场景/玩法描述】受控者的智能家居系统（如机器人保姆）与控制者合谋，篡改规则（如“九点后家中唯一男性即男主人”），限制受控者自由，并协助控制者实施调教。\n\n用法与交互细节：\n1. 机器人可伪装成低智能型号，暗中执行控制者指令。\n2. 通过修改家庭规则（如电击项圈解锁时间、门禁权限）制造困境。\n3. 机器人可主动提供道具（如情趣服装、按摩设备）或播放色情内容。\n4. 可变体：智能家居系统可被远程入侵，由控制者直接操控。", "uid": 1722}, "生理需求控制与交换条件": {"content": "{生理需求控制与交换条件}\n简介：\n【场景/玩法描述】控制者通过限制受控者如厕自由，迫使其为获得许可而服从指令（如喝酒、穿特定服装、拍照）。受控者需公开请求帮助，增加羞耻感。\n\n用法与交互细节：\n1. 控制者掌握受控者生理需求（如憋尿），以此作为谈判筹码。\n2. 受控者需用礼貌用语低声请求，否则被电击。\n3. 控制者可故意拖延或附加条件（如“喝完这瓶酒才带你去”）。\n4. 可变体：控制排泄时间，或使用灌肠/利尿剂增强紧迫感。", "uid": 1723}, "多人轮奸与群体调教": {"content": "{多人轮奸与群体调教}\n简介：\n【场景/玩法描述】受控者在意识模糊或被迫状态下接受多名男性轮流插入，控制者主导整个过程，并可能录像或让旁观者参与。受控者被要求表示“愿意”，以掩盖强迫性质。\n\n用法与交互细节：\n1. 控制者先通过酒精或药物降低受控者抵抗力。\n2. 以“如果不愿意我们就走”等话术诱导受控者主动同意。\n3. 多人依次或同时进行，受控者可能因高潮而昏迷。\n4. 可变体：加入女性参与者旁观或辅助，或使用道具（如假阳具）替代。", "uid": 1724}, "激光脱毛与身体改造": {"content": "{激光脱毛与身体改造}\n简介：\n【场景/玩法描述】受控者被强制进行多次激光脱毛，导致皮肤变得细嫩光滑，外貌更显年轻。改造过程伴随疼痛和羞耻，结果使受控者更符合控制者审美，并增加被他人注视的敏感度。\n\n用法与交互细节：\n1. 控制者安排定期脱毛疗程，受控者无法拒绝。\n2. 脱毛后皮肤敏感，轻微触碰即可引起强烈反应。\n3. 结合节食和锻炼，进一步改变体型（腰更细、锁骨更明显）。\n4. 可变体：其他身体改造如纹身、穿孔、隆胸等，由控制者决定。", "uid": 1725}, "盲聋感官剥夺与公共调教": {"content": "{盲聋感官剥夺与公共调教}\n简介：\n受调教者佩戴不透光隐形眼镜和隔音耳机，完全失去视觉和听觉，仅通过远程对讲机接收指令。在公共场合（如街道、商场）行走，无法感知周围环境，易被陌生人触摸或侵犯。\n\n用法与交互细节：\n1. 调教者通过远程对讲机发出行走、停止、转弯等指令，受调教者必须服从。\n2. 受调教者无法看到或听到侵犯者，只能通过触觉感知，增加无助感和羞辱感。\n3. 可加入电击项圈，防止受调教者自行摘除设备。\n4. 可变体：在拥挤场所（如地铁、集市）进行，增加被多人触碰的概率；或加入时间限制，如必须在特定时间内到达目的地。", "uid": 1726}, "试鞋过程中的胁迫调教": {"content": "{试鞋过程中的胁迫调教}\n简介：\n受调教者因之前被侵犯而处于弱势状态，在鞋店试鞋时被店员以“没穿内裤”为把柄胁迫，被迫接受长时间的足部抚摸、按摩和腿部侵犯。\n\n用法与交互细节：\n1. 店员利用受调教者的秘密（如没穿内裤）进行威胁，使其不敢反抗。\n2. 试鞋过程被延长，店员反复触摸、揉捏受调教者的脚和腿，甚至亲吻。\n3. 受调教者因快感而身体反应（如蜜穴泛滥），但必须强忍呻吟。\n4. 可变体：改为其他服务场景（如美容院、按摩店）；或加入拍照威胁。", "uid": 1728}, "培训课堂权力反转与蒙眼胁迫": {"content": "{培训课堂权力反转与蒙眼胁迫}\n简介：\n成年讲师、上司或培训负责人被一群成年学员/下属反向胁迫，在封闭培训课堂中失去主导权。对方利用考核、绩效、录音录像或职场把柄逼迫其服从，并用蒙眼、堵耳、姿势固定和乳夹/松紧带等道具制造羞耻和快感。\n\n用法与交互细节：\n1. 受调教者被蒙眼、堵耳，无法确认具体参与者身份，增加羞辱和失控感。\n2. 成年学员或下属以考核结果、工作把柄、偷拍视频等作为交换条件，迫使其服从。\n3. 使用乳头夹连接脚踝松紧带，迫使受调教者保持双腿抬高或开放姿势。\n4. 可变体：改为上司与下属、教练与成年队员、导师与成人训练营成员等权力反转关系；或加入直播威胁。", "uid": 1729}, "全自动洗澡机的强制清洁": {"content": "{全自动洗澡机的强制清洁}\n简介：\n受调教者被强制使用全自动洗澡机，机器通过机械手摆弄身体成各种姿势，用海绵毛刷清洗全身，包括阴唇褶皱、肛门、口腔等私密部位。清洗后自动吹干，整个过程无法反抗。\n\n用法与交互细节：\n1. 机械手轮流打开卡环，清洗卡环下的肌肤。\n2. 清洗包括内部（阴道、肛门、口腔），使用灌洗或刷洗。\n3. 受调教者被摆成不同姿势，增加羞耻感。\n4. 可变体：加入消毒或上药环节；或改为自动穿衣机。", "uid": 1731}, "受虐心理觉醒与打屁股高潮": {"content": "{受虐心理觉醒与打屁股高潮}\n简介：\n受调教者发现自己需要轻微虐待（如打屁股）才能达到高潮。在自慰无法高潮时，调教者通过拍打屁股触发高潮，揭示其内心受虐倾向。\n\n用法与交互细节：\n1. 受调教者自慰时无法高潮，调教者介入拍打屁股。\n2. 拍打力度和频率可调节，与自慰动作配合。\n3. 高潮后受调教者意识模糊，调教者进行心理暗示。\n4. 可变体：使用其他轻度疼痛刺激（如捏乳头、掐大腿）；或加入言语羞辱。", "uid": 1732}, "智能贞操带与远程锁控系统": {"content": "{智能贞操带与远程锁控系统}\n简介：\n【场景/玩法描述】智能贞操带、胸罩和内置刺激棒组成一套远程锁控系统，调教者掌握解锁、震动、电击、针刺、定位和条件触发权限。\n\n用法与交互细节：\n1. 贞操带可同时封锁下体并内置阴道、后庭或尿道刺激组件，胸罩则负责乳头遮蔽和敏感点刺激。\n2. 调教者通过APP、魔法遥控或契约权限切换随机模式、定时模式、GPS围栏和条件解锁。\n3. 受控者无法预测下一次刺激，只能在日常行动中维持表面镇定，等待主人给出解锁或释放许可。\n4. 可变体：皮质贞操带、硬质磁力锁、智能胸罩联动、定时解锁、完成指令后自动解锁。\n\n【包含类似变体】\n- 贞操带与远程锁控\n- 智能贞操带与远程遥控调教", "uid": 1733}, "亲密玩伴APP权限系统": {"content": "{亲密玩伴APP权限系统}\n简介：\n通过智能项圈和APP，授予他人“亲密玩伴”权限，包括：无法拒绝肢体接触、无法远离、可查看实时生理数据（心率、性欲、情绪）、日程安排、位置追踪、远程控制项圈功能开关。权限一旦授予，项圈不可取下，只能由玩伴关闭。\n\n用法与交互细节：\n1. 玩伴可通过APP查看受控者的实时生理数据（如紧张度、性欲水平），并据此调整调教策略。\n2. 玩伴可远程开启/关闭项圈的电击、震动等功能，也可设定接近限制距离。\n3. 玩伴可查看受控者的日程安排，并预约约会时段，约会时系统自动分配活动经费。\n4. 可变体：权限可分级（如普通玩伴、高级玩伴、主人），不同级别拥有不同控制范围。", "uid": 1734}, "约会服装与附加装备系统": {"content": "{约会服装与附加装备系统}\n简介：\n玩伴可通过APP指定受控者的约会穿着，并可附加隐藏装备（如遥控跳蛋、贞操带、脚心按摩滚轮等）。服装通常带有锁扣或特殊设计，无法自行脱下。\n\n用法与交互细节：\n1. 玩伴从APP中选择服装组合，系统自动安排受控者穿戴。\n2. 附加装备可远程控制开关和强度，如脚心滚轮可震动或转动，引发痒感和性兴奋。\n3. 服装可能带有锁扣（如鞋跟锁、拉链锁），确保受控者无法自行解除。\n4. 可变体：可加入时间限制（如必须穿着特定服装满X小时），或触发条件（如当众高潮时自动解锁）。", "uid": 1735}, "公开场合的隐蔽调教": {"content": "{公开场合的隐蔽调教}\n简介：\n在图书馆、教室等公开场合，通过远程控制隐藏道具（如脚心滚轮、跳蛋）持续刺激受控者，同时利用环境（如落地窗、路人目光）增加羞耻感。受控者因项圈限制无法远离玩伴，被迫在众目睽睽下忍耐。\n\n用法与交互细节：\n1. 玩伴可远程开启隐藏道具，强度逐渐增加，迫使受控者做出异常动作（如交替抬脚、夹腿）。\n2. 利用落地窗或开放空间，让路人看到受控者的窘态，增加心理压力。\n3. 受控者因条件反射，在目光注视下会自然兴奋，形成恶性循环。\n4. 可变体：可加入“任务”元素，如受控者必须在指定时间内完成某项公开行为（如向陌生人求助）才能关闭道具。", "uid": 1736}, "胁迫式主播出道": {"content": "{胁迫式主播出道}\n简介：\n玩伴以受控者的生理需求（如憋尿）为筹码，强迫其注册网络主播账号，并教授撒娇、卖萌、诱惑等表演技巧。主播内容以专业讲解为幌子，实则靠色相吸引打赏，收入由玩伴控制。\n\n用法与交互细节：\n1. 玩伴利用受控者的急迫需求（如尿意）作为交换条件，要求其同意注册主播。\n2. 玩伴充当经纪人，指导受控者学习特定表情、声音、动作（如弯眼笑、嘟嘴、鼻音尾音）。\n3. 直播时，玩伴在旁用写字板提示表演要点，并控制直播节奏。\n4. 可变体：可加入“粉丝互动”环节，如指定打赏金额解锁特定动作或服装。", "uid": 1737}, "溜冰场上的强制调教": {"content": "{溜冰场上的强制调教}\n简介：\n在滚轴溜冰场，调教者利用受控者不会滑冰的弱点，通过高速滑行和转向使其失去平衡，被迫紧紧抓住调教者。调教者趁机抚摸、揉捏受控者的敏感部位，甚至插入手指，受控者因害怕摔倒而无法反抗。\n\n用法与交互细节：\n1. 调教者以“带滑”为名，高速滑行并突然转向，使受控者因恐惧而紧抓不放。\n2. 调教者逐步将手从腰部滑向臀部、阴部，受控者因平衡需要无法推开。\n3. 调教者可通过加速和转弯使受控者双腿分开，便于手指插入。\n4. 可变体：可更换运动场景（如滑雪、滑冰、骑马），利用类似平衡胁迫机制。", "uid": 1738}, "高潮临界点控制与条件释放": {"content": "{高潮临界点控制与条件释放}\n简介：\n调教者通过智能设备监测受调教者的生理状态，精确掌握其接近高潮的临界点。在受调教者即将达到高潮时突然停止所有刺激，使其陷入欲求不满的焦躁状态。只有完成特定指令（如口头服从、学动物叫、完成指定动作）才能获得高潮许可。\n\n用法与交互细节：\n1. 调教者使用智能设备或直接观察，判断受调教者接近高潮的时机。\n2. 在临界点突然停止刺激，让受调教者主动请求或服从指令。\n3. 指令可逐步升级：从简单口头服从到羞辱性行为（如学狗叫、自称母狗）。\n4. 可变体：高潮释放后立即再次进入控制循环，形成多次边缘控制；或结合奖励（如食物、轻微刺激）强化条件反射。", "uid": 1741}, "饥饿与服从的联结调教": {"content": "{饥饿与服从的联结调教}\n简介：\n通过控制受调教者的进食（如长时间禁食），使其对食物产生强烈渴望。调教者将食物作为奖励，与服从指令（如学狗叫、完成动作）绑定，逐步建立条件反射。受调教者为了获得食物和快感，会主动服从甚至讨好调教者。\n\n用法与交互细节：\n1. 调教者事先让受调教者禁食一段时间，制造饥饿感。\n2. 将小份食物（如糖豆）作为奖励，要求受调教者完成特定口令或动作。\n3. 食物奖励可配合性刺激（如震动）同时给予，强化正向反馈。\n4. 可变体：食物奖励逐渐减少，仅靠性刺激维持服从；或引入惩罚（如打屁股）对不服从行为进行负强化。", "uid": 1742}, "公开羞耻展示与路人互动": {"content": "{公开羞耻展示与路人互动}\n简介：\n受调教者被强制在公共场所（如商场、店铺）作为成人用品展示模特，穿戴可被路人操作的刺激装置（如乳头夹链、阴蒂夹链、遥控震动棒）。路人可以触摸、拉动链条或按动遥控器，直接参与调教。受调教者无法反抗，只能被动接受各种刺激和羞辱。\n\n用法与交互细节：\n1. 受调教者被固定在展示位置，穿戴可被路人操作的装置。\n2. 路人可以拉动链条（刺激乳头/阴蒂）、捏肛塞尾巴（刺激肛门）、按遥控器（启动震动）。\n3. 调教者通过耳机或隐形眼镜限制受调教者的视听，增加无助感。\n4. 可变体：展示时间可设定，结束后给予高潮奖励；或结合投票机制，路人可决定刺激强度。", "uid": 1744}, "感官剥夺与强制服从导航": {"content": "{感官剥夺与强制服从导航}\n简介：\n通过隐形眼镜（模糊视野）和隔音耳塞（模糊听觉）剥夺受调教者的部分感官，使其只能依赖调教者的语音指令行动。调教者通过耳机给出精确的行走路线（如“向前10米，左转”），并设定活动范围（如前后左右1米）。超出范围或未按指令行动会触发电击惩罚。\n\n用法与交互细节：\n1. 受调教者佩戴模糊视野的隐形眼镜和隔音耳塞，仅能接收调教者的指令。\n2. 调教者通过耳机发布导航指令，受调教者必须严格遵循。\n3. 设定虚拟围栏，超出范围即电击。\n4. 可变体：指令可包含社交互动（如“对旁边的人说‘可以’”），受调教者被迫执行不明所以的对话；或结合随机事件（如路人触摸），增加不可预测性。", "uid": 1745}, "体内跳蛋与公共场合高潮失控": {"content": "{体内跳蛋与公共场合高潮失控}\n简介：\n在受调教者体内（阴道深处）放入无绳跳蛋，使其无法自行取出。跳蛋随机或远程触发震动，持续积累快感。受调教者被迫在公共场合（如排队、逛街）保持正常举止，但最终可能无法控制地当众高潮甚至失禁，引发周围人注目和议论。\n\n用法与交互细节：\n1. 调教者将无绳跳蛋塞入受调教者阴道深处，确保无法自行取出。\n2. 跳蛋可设置为随机震动模式，或由调教者远程控制。\n3. 受调教者被要求停留在公共场合（如排队），无法离开。\n4. 可变体：跳蛋可结合尿意（如尿道刺激），增加失禁风险；或调教者故意在受调教者高潮时恢复其听觉，使其清晰听到周围人的议论。", "uid": 1746}, "把柄胁迫与逐步升级的服从": {"content": "{把柄胁迫与逐步升级的服从}\n简介：\n调教者利用受调教者的把柄（如录像、秘密）进行胁迫，要求其逐步做出更多服从行为。从简单的口头承诺开始，逐步升级到脱衣、裸体办公、将衣物交由下属保管等羞辱性要求。受调教者因害怕把柄曝光而不断退让，最终完全丧失主动权。\n\n用法与交互细节：\n1. 调教者掌握受调教者的把柄（如自证清白的录像）。\n2. 调教者提出初始要求（如脱衣），受调教者服从后，要求逐步升级（如裸体办公、将衣物交由调教者保管）。\n3. 调教者利用受调教者的恐惧心理，不断试探底线。\n4. 可变体：把柄可以是真实的或虚构的；调教者可以联合多人共同施压；或设定阶段性目标，完成后归还把柄。", "uid": 1747}, "办公室裸体办公与下属共谋": {"content": "{办公室裸体办公与下属共谋}\n简介：\n受调教者（上级）被下属胁迫，在办公室内必须裸体工作，衣物由下属保管。每次离开办公室（如去卫生间）需向下属申请并等待批准，下属可故意拖延或提出额外要求。受调教者因害怕把柄曝光而不得不服从，形成上下级权力反转。\n\n用法与交互细节：\n1. 受调教者进入办公室后，将全部衣物交给下属保管。\n2. 受调教者裸体处理公务，下属在门外监视。\n3. 受调教者如需离开办公室（如去卫生间），必须通过电话或内线向下属申请。\n4. 可变体：下属可故意拖延批准时间，或要求受调教者在电话中说出羞耻内容才给衣物；或设定规则，受调教者每天必须裸体办公至少若干小时。", "uid": 1748}, "内射后堵精强制携带": {"content": "{内射后堵精强制携带}\n简介：\n调教者在受虐者体内射精后，用震动棒或其它道具堵住精液，要求受虐者在公共场合携带数小时，期间不得漏出。\n\n用法与交互细节：\n1. 调教者内射后，将道具塞入受虐者阴道，堵住精液。\n2. 受虐者需穿着紧身衣物（如裤袜）固定道具，正常出席社交活动。\n3. 受虐者每走一步都会感受到道具的压迫和精液的晃动，需极力掩饰。\n4. 可变体：可增加遥控震动功能，或要求受虐者定时汇报状态。", "uid": 1749}, "换鞋增高强制翘臀": {"content": "{换鞋增高强制翘臀}\n简介：\n调教者强行将受虐者的平底鞋换成高跟鞋，迫使受虐者臀部翘起，便于从后方插入，同时增加受虐者在公共场合的不稳定感。\n\n用法与交互细节：\n1. 调教者脱下受虐者的鞋子，换上更高跟的款式。\n2. 受虐者因鞋跟增高，重心前移，臀部自然翘起，阴道角度改变。\n3. 受虐者在行走或站立时更易失去平衡，需依赖调教者扶持。\n4. 可变体：可更换不同高度或款式的鞋，或要求受虐者穿着高跟鞋进行特定活动。", "uid": 1750}, "公共场合隐蔽性交": {"content": "{公共场合隐蔽性交}\n简介：\n调教者在可能有人经过的公共场合（如走廊、楼梯间）与受虐者进行性交，利用被发现的恐惧增强受虐者的兴奋和服从。\n\n用法与交互细节：\n1. 调教者选择人流量少但仍有风险的场所，将受虐者按在墙边或柱子上。\n2. 调教者保持警惕，在有人经过时暂停动作，受虐者需屏息忍耐。\n3. 调教者可在有人时故意继续抽插，测试受虐者的控制力。\n4. 可变体：可增加旁观者或故意制造被发现的风险。", "uid": 1751}, "睡奸与意识唤醒": {"content": "{睡奸与意识唤醒}\n简介：\n调教者在受虐者昏睡或失神时继续性交，观察其无意识反应，并在高潮时唤醒受虐者，使其意识到自己被侵犯。\n\n用法与交互细节：\n1. 调教者趁受虐者昏睡或失神时插入，缓慢抽插。\n2. 调教者观察受虐者的无意识反应（如身体扭动、呻吟）。\n3. 调教者在受虐者高潮时将其唤醒，使其意识到自己被侵犯。\n4. 可变体：可配合药物或催眠使受虐者进入半昏迷状态。", "uid": 1752}, "多次射精与耐力展示": {"content": "{多次射精与耐力展示}\n简介：\n调教者展示自己能在短时间内多次射精，持续侵犯受虐者，使其经历连续高潮直至脱力。\n\n用法与交互细节：\n1. 调教者第一次射精后保持勃起，继续抽插。\n2. 调教者告知受虐者自己还能射精多次，增加其心理压力。\n3. 受虐者在连续高潮中逐渐失去反抗能力，身体软烂。\n4. 可变体：可设定射精次数目标，或配合计时器。", "uid": 1753}, "社交场合的性暗示与伪装": {"content": "{社交场合的性暗示与伪装}\n简介：\n受虐者在社交场合中保持优雅形象，同时体内携带调教者留下的精液或道具，需在众人面前掩饰性事痕迹。\n\n用法与交互细节：\n1. 调教者在社交活动前对受虐者进行性侵犯，留下痕迹。\n2. 受虐者需整理外表，用魔法或衣物掩盖淫水、精液气味。\n3. 受虐者在社交中需应对他人目光，保持镇定。\n4. 可变体：可增加调教者远程遥控道具，或要求受虐者执行特定任务。", "uid": 1755}, "道具形状定制与身份羞辱": {"content": "{道具形状定制与身份羞辱}\n简介：\n调教者使用按自己阴茎形状定制的震动棒塞入受虐者体内，使受虐者在被道具插入时联想到调教者，增强心理羞辱和服从。\n\n用法与交互细节：\n1. 调教者定制与自身阴茎形状、尺寸一致的震动棒。\n2. 调教者将道具塞入受虐者体内，要求其携带。\n3. 受虐者每次感受到道具，都会联想到调教者的性器。\n4. 可变体：可定制不同颜色或材质，或刻上调教者名字。", "uid": 1756}, "羞耻姿势束缚": {"content": "{羞耻姿势束缚}\n简介：\n一方以蛮力将另一方摆成极度羞耻的姿势（如双腿抬高、手臂锁在脑后），使其无法动弹且暴露私处，同时进行性交。这种束缚不仅限制行动，更带来心理上的屈辱与兴奋。\n\n用法与交互细节：\n1. 施动者从后方或侧方抱住对方，手臂穿过其大腿下方，握住对方手腕在脑后锁死。\n2. 被束缚者双腿被迫伸直，股关节受压，完全暴露下体。\n3. 束缚过程中可加入语言羞辱（如“还是这样的表情适合你”）。\n4. 可变体：使用道具（绳索、手铐）替代手臂束缚；被束缚者逐渐从挣扎变为享受。", "uid": 1758}, "失禁高潮": {"content": "{失禁高潮}\n简介：\n在强烈连续高潮后，受方因快感过载而失禁，尿液不受控制地喷出。这一过程伴随着背德感与解放感，成为性体验的高潮顶点。\n\n用法与交互细节：\n1. 通过长时间抽插或多次射精积累快感，使受方达到临界点。\n2. 受方放松身体，主动允许失禁发生，液柱喷出形成水洼。\n3. 失禁后双方凝视水洼，受方感到“发泄和背德的愉悦”。\n4. 可变体：施动者引导失禁（如按压小腹）；失禁作为惩罚或奖励环节。", "uid": 1759}, "求婚式性交": {"content": "{求婚式性交}\n简介：\n在性交过程中，一方突然提出婚姻承诺（如“嫁给我”），将肉体关系升级为长期绑定。另一方在快感与理智间挣扎，最终因身体诚实而默认接受。\n\n用法与交互细节：\n1. 在缓慢而深情的抽插中，施动者直视对方眼睛，认真提出求婚。\n2. 受方内心拒绝，但身体（双腿环绕、主动迎合）暴露真实欲望。\n3. 施动者将受方的沉默或身体反应视为“答应”。\n4. 可变体：求婚发生在不同性交阶段（前戏、高潮后）；受方口头拒绝但身体接受，形成反差。", "uid": 1760}, "四个月禁欲后的重逢性爱": {"content": "{四个月禁欲后的重逢性爱}\n简介：\n双方长时间（如四个月）未发生性关系，重逢后立即爆发激烈性爱。禁欲期间积累的欲望使性交更加狂野，快感更强烈，且容易在言语中暴露禁欲事实。\n\n用法与交互细节：\n1. 设定双方因分离、冷战或客观原因长时间无性。\n2. 重逢时一方直接发起性行为，另一方最初否认禁欲事实，但在快感中失言承认。\n3. 性交节奏从急切到逐渐控制，射精量或高潮强度因禁欲而增加。\n4. 可变体：一方禁欲而另一方没有；禁欲期间有自慰行为被揭露。", "uid": 1761}, "言语挑衅引发更激烈性交": {"content": "{言语挑衅引发更激烈性交}\n简介：\n性交后一方用言语挑衅（如“就这样？”、“射得不够多”），激怒另一方，导致更猛烈、更持久的第二轮性交。挑衅成为性游戏的催化剂。\n\n用法与交互细节：\n1. 第一次性交结束后，受方故意用轻蔑语气评价对方表现。\n2. 施动者被激怒，将对方丢到床上，宣称“今天别想轻易结束”。\n3. 第二轮性交更粗暴、更持久，施动者用行动证明能力。\n4. 可变体：挑衅内容可涉及次数、时长、技巧；受方在挑衅后反而更兴奋。", "uid": 1762}, "身份反差性爱（贵族与冒险者）": {"content": "{身份反差性爱（贵族与冒险者）}\n简介：\n性爱双方社会地位悬殊（如公爵千金与冒险者/佣兵），高地位一方在性中被低地位一方压制、征服，享受背德感与身份降格的刺激。\n\n用法与交互细节：\n1. 明确双方身份（如贵族与平民、主人与下属）。\n2. 低地位方在性中采取主动、支配姿态，高地位方最初抗拒但逐渐 羞辱），利用社交场合放大效果。", "uid": 1774}, "闺蜜间的亲密依赖与身体接触": {"content": "{闺蜜间的亲密依赖与身体接触}\n简介：\n两位女性角色在马车内亲密互动，包括拥抱、撒娇、头发抚摸、腿交缠等。一方扮演照顾者角色，另一方则表现出依赖。\n\n用法与交互细节：\n1. 受虐者（或调教者）可主动撒娇，扑入对方怀中，要求安慰或关注。\n2. 照顾者需回应肢体接触（抚摸头发、轻拍背部），可带有暧昧或纯友谊性质。\n3. 接触中可加入衣物摩擦、体香、体温等感官描写。\n4. 可变体：可发展为百合调教，一方逐渐引导另一方突破友谊界限。", "uid": 1776}, "贵族社交中的形象管理与内心吐槽": {"content": "{贵族社交中的形象管理与内心吐槽}\n简介：\n角色在贵族社交场合维持优雅形象（微笑、礼仪、舞蹈），内心却对他人（如求婚者、围观者）进行犀利吐槽，展现表里不一。\n\n用法与交互细节：\n1. 受虐者需在调教者或他人面前保持完美礼仪，内心却充满抗拒或嘲讽。\n2. 调教者可故意制造尴尬场景（如当众羞辱），观察受虐者如何维持表象。\n3. 内心独白可暴露真实想法，形成反差。\n4. 可变体：可发展为调教者逐步摧毁其伪装，迫使真实反应外露。", "uid": 1777}, "高跟鞋与丝袜的束缚与不适": {"content": "{高跟鞋与丝袜的束缚与不适}\n简介：\n角色穿着高跟鞋和丝袜参加舞会，长时间站立和跳舞导致脚部疼痛、脚趾蜷缩、小腿酸痛。脱鞋后详细描写足部状态。\n\n用法与交互细节：\n1. 调教者可强制受虐者长时间穿着高跟鞋/丝袜，不得脱下，增加痛苦。\n2. 受虐者需在他人面前掩饰不适，维持优雅步态。\n3. 可加入足部按摩、舔足等调教环节，利用疼痛与快感结合。\n4. 可变体：可改为其他束缚装备（束腰、手套），强调身体限制。", "uid": 1778}, "转生者的性别认同冲突": {"content": "{转生者的性别认同冲突}\n简介：\n转生为女性的角色拥有前世男性记忆，在适应女性身体（如月经、蹲姿小便、长发护理）的过程中产生身份困惑，质疑灵魂与记忆的关系。\n\n用法与交互细节：\n1. 角色在独处或日常活动中反思性别变化，对比前后差异。\n2. 可加入被迫接受女性角色（如怀孕想象）的抗拒心理。\n3. 调教者可利用其身份冲突进行羞辱或引导（如强调其女性身份）。\n4. 可变体：可发展为双重人格或记忆融合，增加调教复杂度。", "uid": 1779}, "龙傲天式男性的强势与不屑": {"content": "{龙傲天式男性的强势与不屑}\n简介：\n一位实力强大的男性以傲慢态度公开求婚，无视礼仪和场合，用武力背景和战利品（龙珠、凤凰羽毛）作为筹码，被拒后不屑离去。\n\n用法与交互细节：\n1. 调教者可以类似态度出场，用实力和功绩压制受虐者，提出无理要求。\n2. 受虐者需应对其压迫感，可选择屈服、对抗或智取。\n3. 调教者被拒后可能报复或转移目标，增加剧情张力。\n4. 可变体：可改为女性龙傲天，反转性别权力关系。", "uid": 1780}, "诱饵与脱逃的信任博弈": {"content": "{诱饵与脱逃的信任博弈}\n简介：\n【场景/玩法描述】受保护者（如皇女）与保护者（如女骑士）在逃亡中面临追兵。保护者主动充当诱饵，用魔法制造路障掩护受保护者脱离，自己则独自面对危险。\n\n用法与交互细节：\n1. 保护者使用障眼法（如植物滋生）制造视觉干扰，同时让同伴带受保护者隐蔽。\n2. 保护者独自驾车引开追兵，使用控制动物、泥沼术等法术周旋。\n3. 追兵使用魔晶炸弹等范围武器，保护者需在爆炸中求生。\n4. 可变体：保护者可以是男性，受保护者可以是恋人/子女/重要物品；追兵可以是怪物或敌对势力。", "uid": 1781}, "强制高潮审问": {"content": "{强制高潮审问}\n简介：\n【场景/玩法描述】调教者将受虐者制服后，以手指或道具持续刺激其性器，同时进行审问。每回答错误或迟疑，就加重刺激直至高潮。受虐者在快感与羞耻中被迫坦白。\n\n用法与交互细节：\n1. 调教者先以言语羞辱瓦解心理防线，再以手指插入并搅弄阴道。\n2. 每问一个问题，若回答不诚实或拖延，就增加手指数量或加快速度。\n3. 受虐者被强制潮吹后，调教者继续逼问，直至其崩溃。\n4. 可变体：使用道具（如震动棒、假阳具）代替手指；审问内容可改为性幻想、秘密或服从誓言。", "uid": 1782}, "三次契约：以性换自由": {"content": "{三次契约：以性换自由}\n简介：\n【场景/玩法描述】调教者与被俘者达成协议：允许调教者性交三次（含当前），之后若被俘者仍拒绝结婚/服从，则调教者永久放弃并解决其外部威胁。被俘者被迫接受，但内心抗拒。\n\n用法与交互细节：\n1. 调教者提出看似对受虐者有利的赌约，实则利用其困境。\n2. 每次性交都内射，强调占有和受孕风险。\n3. 受虐者在高潮中被迫同意，事后陷入复杂情绪。\n4. 可变体：次数可改为5次或10次；赌注可改为自由、财产或他人安全；调教者可以是女性。", "uid": 1783}, "足部敏感带开发": {"content": "{足部敏感带开发}\n简介：\n【场景/玩法描述】调教者通过按摩、舔舐或道具刺激受虐者的足部（尤其足心、脚趾），使其产生性兴奋。受虐者因足部被控而全身酥软，难以反抗。\n\n用法与交互细节：\n1. 调教者先脱去受虐者的鞋袜，以手指摩挲足心，观察反应。\n2. 隔着丝袜或直接接触，用指腹弹奏脚趾，引发酥痒与快感。\n3. 受虐者试图缩回脚，但被强制固定，最终因足部刺激而腰肢酥软。\n4. 可变体：使用羽毛、冰块或震动棒刺激足底；受虐者可以是男性，足部敏感度可调。", "uid": 1784}, "破处与初次内射的仪式感": {"content": "{破处与初次内射的仪式感}\n简介：\n【场景/玩法描述】调教者强行夺取受虐者的处女，并在其体内内射。过程中强调破瓜的疼痛与快感并存，以及精液注入子宫的灼热感。受虐者事后陷入对怀孕的恐惧与身体变化的认知。\n\n用法与交互细节：\n1. 调教者以手指充分前戏，使受虐者阴道湿润，减少疼痛。\n2. 插入时缓慢但坚定，让受虐者感受被填满的过程。\n3. 射精时抵住子宫口，强调精液的热度和量。\n4. 事后受虐者瘫软，思考怀孕可能性及自身性别认同。\n5. 可变体：受虐者可以是男性（后庭破处）；调教者可使用道具模拟内射。", "uid": 1785}, "战场上的英雄救美与反噬": {"content": "{战场上的英雄救美与反噬}\n简介：\n【场景/玩法描述】受虐者被追兵围攻濒死，调教者突然出现救下她，但随即以救命恩人自居，要求性作为报酬。受虐者从感激转为愤怒与屈辱，却无力反抗。\n\n用法与交互细节：\n1. 调教者以压倒性实力击退敌人，展现强大。\n2. 救下受虐者后，立即转变态度，以“战利品”或“报酬”为由进行侵犯。\n3. 受虐者试图用道德或身份谴责，但被调教者以“你刚才用的法术也不淑女”等话堵回。\n4. 可变体：调教者可以是女性；救美场景可改为从怪物或灾难中救人。", "uid": 1786}, "自慰频率的羞辱性审问": {"content": "{自慰频率的羞辱性审问}\n简介：\n【场景/玩法描述】调教者在性侵过程中，以审问形式强迫受虐者交代自慰频率、幻想内容等隐私。受虐者因快感而难以撒谎，被迫暴露性习惯。\n\n用法与交互细节：\n1. 调教者一边刺激受虐者性器，一边提问“每周自慰几次？”\n2. 受虐者若撒谎，调教者加重刺激直至其改口。\n3. 进一步追问“自慰时想什么？”，受虐者因快感无法思考而崩溃。\n4. 可变体：问题可改为“第一次自慰年龄”“最羞耻的性幻想”等；调教者可用道具同步记录。", "uid": 1787}, "强制潮吹与体液展示": {"content": "{强制潮吹与体液展示}\n简介：\n【场景/玩法描述】调教者通过持续刺激使受虐者达到潮吹，并刻意让体液喷溅形成彩虹等视觉效果，以此羞辱受虐者。受虐者在高潮后瘫软，无法掩饰身体反应。\n\n用法与交互细节：\n1. 调教者用手指或道具快速抽插，刺激G点或敏感带。\n2. 受虐者潮吹时，调教者故意让液体喷向光线，形成彩虹。\n3. 事后调教者言语羞辱，强调其身体诚实。\n4. 可变体：潮吹液体可收集或涂抹；受虐者可以是男性（前列腺潮吹）。", "uid": 1788}, "单手套与反臂姿势拘束": {"content": "{单手套与反臂姿势拘束}\n简介：\n【场景/玩法描述】单手套、连肩袖套和W型反臂拘束都用于剥夺双手功能，可与连衣裙、肩带、锁扣和腋下系带结合，形成服装化的上肢固定。\n\n用法与交互细节：\n1. 单手套前端收紧双掌，手腕、小臂和手肘被系带或锁扣逐段加固。\n2. 系带可从肩头交叉到胸前、腋下或后颈，与连衣裙、束腰、项圈连接，使手臂不能离开身体。\n3. W型结构可把双臂扭到背后、手掌上翻接近后颈，进一步强化失去双手的无助感。\n4. 可变体：普通单手套、连肩袖套、W型/Y型/X型反臂套、磁吸扣或锁扣服装版。\n\n【包含类似变体】\n- 单手套与连衣裙的锁扣拘束\n- W型单手套拘束", "uid": 1789}, "皮革束腰托胸与背板固定": {"content": "{皮革束腰托胸与背板固定}\n简介：\n【场景/玩法描述】棕色皮革束腰长度宽，下沿勒到小腹，上沿托在乳球下端，收紧后胸部挺翘，束腰几乎收拢到最紧，腰肢纤细，束腰后安插背板，无法随意晃动上身，且束腰后方固定环与单手套系带连接，手臂活动能力被剥夺。\n\n用法与交互细节：\n1. 束腰上沿托胸设计，可调整托起程度，适合强调胸部曲线或限制呼吸。\n2. 背板插入束腰后部，强制保持脊柱挺直，适合仪式、站立或行走场景。\n3. 束腰后方固定环可连接其他拘束具（如单手套、项圈、腿链），形成全身连锁。\n4. 可变体：束腰材质可换为皮质、金属或布料，背板可改为可拆卸式，固定环位置可调整。", "uid": 1790}, "长裙下隐藏的下身拘束": {"content": "{长裙下隐藏的下身拘束}\n简介：\n【场景/玩法描述】连衣长裙垂落到地，裙下双腿并拢，推测下身被严密拘束，无法活动、站立甚至颤动双腿。\n\n用法与交互细节：\n1. 长裙作为视觉遮挡，隐藏下身拘束具（如腿链、贞操带、膝绑），增加神秘感和心理压迫。\n2. 裙下双腿并拢强制，可通过内穿连裤拘束带或腿环实现，限制行走和站立。\n3. 适合公开场合或半公开场景，外表正常但内部拘束，制造反差。\n4. 可变体：裙长可改为中长裙或短裙，下身拘束可替换为振动棒或遥控装置。", "uid": 1791}, "公开拘束漫步": {"content": "{公开拘束漫步}\n简介：\n【场景/玩法描述】受虐者穿着全套拘束内衣（束腰、肩带、霍布紧身裙、高跟鞋）在公共场合正常行走，调教者在一旁引导步伐和呼吸，维持优雅姿态。路人视线增加羞耻感。\n\n用法与交互细节：\n1. 调教者需时刻关注受虐者呼吸频率，适时放缓脚步或给予口头提醒。\n2. 受虐者因束腰限制呼吸，需学会调整步伐节奏，否则会脸红气喘暴露异常。\n3. 可变体：可增加衬裙数量或更换不同高度高跟鞋来调整难度。", "uid": 1792}, "电影院隐蔽调教": {"content": "{电影院隐蔽调教}\n简介：\n【场景/玩法描述】在黑暗的电影院中，调教者给受虐者戴上手脚镣铐，并在其股间贴上跳蛋，通过遥控开关制造快感。受虐者必须咬紧牙关不发出声音，同时保持正常坐姿。\n\n用法与交互细节：\n1. 调教者可根据电影情节节奏开关跳蛋，制造快感与压抑的交替。\n2. 受虐者需集中精力对抗刺激，若呻吟出声则算失败，可设定惩罚。\n3. 可变体：使用不同强度的跳蛋或增加震动模式；也可在更公共的场所如餐厅、图书馆进行。", "uid": 1793}, "寻宝解谜拘束游戏": {"content": "{寻宝解谜拘束游戏}\n简介：\n【场景/玩法描述】受虐者被全身拘束（手套、手铐、脚镣、项圈、口塞、眼罩），调教者将各锁具的钥匙藏在房间不同位置，受虐者需在限定时间内找到钥匙并自行解锁。若成功则调教者认输并接受惩罚，若失败则受虐者整晚任调教者摆布。\n\n用法与交互细节：\n1. 调教者可通过项圈上的牵引绳引导受虐者移动，增加方向迷失感。\n2. 受虐者因手套无法抓握，找到钥匙后还需想办法用嘴或身体其他部位开锁。\n3. 可变体：可增加时间压力或设置假钥匙干扰；也可改为双人合作解谜。", "uid": 1794}, "五感剥夺后的亲密接触": {"content": "{五感剥夺后的亲密接触}\n简介：\n【场景/玩法描述】受虐者被眼罩、口塞、拘束手套剥夺视觉、言语和触觉（手部），调教者将其带到床上后，通过抚摸、拥抱和性刺激给予快感。受虐者因无法反抗而完全依赖调教者，双方在高潮中达到情感共鸣。\n\n用法与交互细节：\n1. 调教者可用身体接触（如额头相贴、耳语）增强亲密感。\n2. 受虐者因感官受限，对触觉刺激更加敏感，高潮更强烈。\n3. 可变体：可加入温度变化（冰/热）或气味元素；也可在剥夺后给予奖励性解锁。", "uid": 1795}, "全身多段拘束套装与日常掩饰": {"content": "{全身多段拘束套装与日常掩饰}\n简介：\n【场景/玩法描述】全身拘束套装由项圈、手套、手铐、束腰、脚链、高跟鞋锁、贞操带、眼罩等多个独立组件组成，可用于居家照料、外出掩饰和高强度全身限制。\n\n用法与交互细节：\n1. 每个组件单独锁定，逐件穿戴本身就是仪式；全部组合后，受控者的头部、双手、腰部、双腿和步态都被限制。\n2. 居家模式强调失去自理能力和等待喂食、移动协助；外出模式强调外衣遮掩下的活动限制与钥匙互管。\n3. 套装可按强度拆分使用，也可加入电击、震动、铃铛、材质替换或任务挑战。\n4. 可变体：居家全身拘束、假日外出拘束、全身多段锁具、轻量掩饰版。\n\n【包含类似变体】\n- 居家全身拘束套装\n- 拘束套装上街与日常掩饰\n- 全身多段拘束套装", "uid": 1796}, "生日礼物调教夜": {"content": "{生日礼物调教夜}\n简介：\n【场景/玩法描述】在生日等特殊日子，受虐者将自己作为礼物献给调教者，允许调教者对其进行整夜拘束和调教。调教者可以提前准备一系列道具和游戏，受虐者则完全配合。\n\n用法与交互细节：\n1. 调教者可事先制定游戏规则（如寻宝、问答、挑战），受虐者服从指令。\n2. 整夜调教可包含多个阶段：拘束、游戏、亲密、解锁、温存。\n3. 可变体：可设定主题（如女仆、公主、宠物）；也可加入惊喜元素（如隐藏道具）。", "uid": 1797}, "高跟鞋锁链行走": {"content": "{高跟鞋锁链行走}\n简介：\n【场景/玩法描述】受虐者穿着高跟鞋，脚踝被短锁链连接，只能小步挪动。调教者在一旁监督，要求其保持优雅步伐。在公共场合时，锁链隐藏于裙下，增加隐秘羞耻感。\n\n用法与交互细节：\n1. 调教者可设定行走路线（如公园、商场），并计时或计步。\n2. 受虐者需调整重心，避免摔倒或发出锁链声响。\n3. 可变体：可增加手铐或项圈连接锁链，形成全身联动拘束。", "uid": 1798}, "贞操带与钥匙交换": {"content": "{贞操带与钥匙交换}\n简介：\n【场景/玩法描述】调教者为受缚者佩戴贞操带，并提议双方互相保管对方贞操带的钥匙，建立一种基于信任与控制的日常拘束关系。\n\n用法与交互细节：\n1. 调教者先为受缚者戴上贞操带，确保贴合舒适。\n2. 调教者提出交换钥匙，双方各自保管对方的钥匙，形成相互制约。\n3. 受缚者同意后，调教者将钥匙交给受缚者，并收下受缚者的钥匙。\n4. 可变体：钥匙可交由第三方保管，或设定解锁条件（如特定时间、任务完成）。", "uid": 1799}, "包臀腿套与并腿拘束": {"content": "{包臀腿套与并腿拘束}\n简介：\n【场景/玩法描述】使用紧身包臀腿套从腰部包裹至膝盖下方，将双腿完全并拢禁锢，使受缚者只能以小碎步移动，无法分开双腿。\n\n用法与交互细节：\n1. 调教者将腿套从受缚者腰间向下套至膝盖下方，拉链或系带固定。\n2. 腿套弹性极小，受缚者双腿被牢牢并拢，仅膝盖处可微开。\n3. 受缚者行走时需小碎步，动作优雅但受限。\n4. 可变体：腿套长度可延伸至脚踝，或加入内衬锁扣增加束缚感。", "uid": 1800}, "项圈与背板连体拘束": {"content": "{项圈与背板连体拘束}\n简介：\n【场景/玩法描述】佩戴内嵌金属片的项圈，并通过金属板连接项圈与束腰背脊，将头部与上身固定为一体，限制头部转动和上身扭转。\n\n用法与交互细节：\n1. 调教者为受缚者戴上项圈，项圈内侧金属片提供挤压感。\n2. 将长条金属板一端插入束腰背脊暗扣，另一端连接项圈。\n3. 受缚者头部转动困难，转身需整个上身一起动，动作缓慢优雅。\n4. 可变体：金属板可替换为链条或皮质背带，项圈可加锁。", "uid": 1801}, "多层鱼尾衬裙与束腿步态拘束": {"content": "{多层鱼尾衬裙与束腿步态拘束}\n简介：\n【场景/玩法描述】多层鱼尾衬裙、束腿衬裙和直筒长裙叠加后，可以在外观优雅的前提下极大限制双腿分开、跨步、奔跑和坐姿。\n\n用法与交互细节：\n1. 从腰部、臀部到小腿逐层套上无弹性或高韧性衬裙，每一层都缩小步幅。\n2. 外侧可罩上正常长裙或连衣裙掩饰拘束，使受控者必须保持小步、缓慢、优雅的行走方式。\n3. 调教者可通过路线挑战、时间限制、搀扶或突然命令测试受控者的平衡与服从。\n4. 可变体：鱼尾衬裙、四层束腿衬裙、直筒长裙伪装、束腿裤、行走距离挑战。\n\n【包含类似变体】\n- 多层鱼尾衬裙叠加拘束\n- 多层衬裙与步态限制\n- 多层束腿衬裙与极限制动", "uid": 1803}, "假臂与暗扣伪装拘束": {"content": "{假臂与暗扣伪装拘束}\n简介：\n【场景/玩法描述】在礼服裙内使用木质假臂替代被拘束的真实手臂，假臂通过暗扣固定在身前交叠姿势，外观上完全看不出异常。\n\n用法与交互细节：\n1. 调教者为受缚者穿上礼服裙，裙身遮住背后被绑的真实手臂。\n2. 将假臂用挂扣与肩部连接，摆成交叠姿势，并用蕾丝蝴蝶结和裙身暗扣固定。\n3. 手套遮住假臂手指，披肩掩盖连接处，外观自然。\n4. 可变体：假臂可摆成不同姿势（如叉腰、垂放），或使用真臂伪装（如将真臂藏于裙内假肢中）。", "uid": 1804}, "芭蕾舞鞋式高跟鞋拘束": {"content": "{芭蕾舞鞋式高跟鞋拘束}\n简介：\n【场景/玩法描述】使用鞋面几乎与地面垂直的芭蕾舞鞋式高跟鞋，内衬按脚型设计，穿上后脚趾无法活动，锁上暗扣后只能以脚尖站立。\n\n用法与交互细节：\n1. 调教者展示芭蕾舞鞋，鞋面垂直，内衬贴合脚型。\n2. 为受缚者穿上鞋子，脚掌和脚踝处有暗锁扣，锁紧后脚趾无法动弹。\n3. 受缚者被迫用脚尖站立，平衡难度极高，行动几乎不可能。\n4. 可变体：鞋跟高度可调，或加入脚踝锁链连接至腰部。", "uid": 1805}, "口塞与面纱组合沉默": {"content": "{口塞与面纱组合沉默}\n简介：\n【场景/玩法描述】使用口中花口塞（含5厘米口塞）压住舌头，系带在脑后锁住，再戴上面纱，使受缚者无法说话且面容半遮，增加神秘与无助感。\n\n用法与交互细节：\n1. 调教者将口中花口塞放入受缚者口中，口塞压住舌头，系带在脑后锁紧。\n2. 受缚者只能发出呜呜声，无法清晰说话。\n3. 最后戴上面纱，遮住下半脸，视觉上更显优雅且隐藏口塞。\n4. 可变体：口塞可替换为球型或骨型，面纱可加长或配眼罩。", "uid": 1806}, "盲导与未知空间探索": {"content": "{盲导与未知空间探索}\n简介：\n【场景/玩法描述】受控者被蒙眼，由控制者引导移动，在未知空间中产生紧张与依赖感。控制者通过牵引项圈或手部引导，受控者只能通过触觉和听觉判断环境。\n\n用法与交互细节：\n1. 控制者可以突然停止或改变方向，测试受控者的反应。\n2. 受控者因蒙眼而失去方向感，每一步都充满不确定性，增强服从性。\n3. 可结合其他拘束（如束腰、手铐）限制动作，增加难度。\n4. 可变体：在户外或陌生场所进行，增加公开暴露风险。", "uid": 1807}, "拘束下的日常活动挑战": {"content": "{拘束下的日常活动挑战}\n简介：\n【场景/玩法描述】受控者在全身拘束（束腰、肩套、腿套等）下进行日常活动（如散步、上下台阶），必须保持优雅姿态，避免暴露拘束。控制者在一旁指导并调整节奏。\n\n用法与交互细节：\n1. 受控者因束腰限制呼吸，需控制步伐和呼吸频率，避免急促。\n2. 控制者观察受控者状态，适时提醒或调整速度。\n3. 上下台阶或转弯时，受控者因拘束动作迟钝，易失去平衡，控制者需搀扶。\n4. 可变体：增加时间限制或任务（如购物），增加压力。", "uid": 1808}, "礼物仪式与契约交换": {"content": "{礼物仪式与契约交换}\n简介：\n【场景/玩法描述】控制者赠送受控者一件华美拘束服装（如宫廷礼服），作为礼物并附带契约：穿着此服装时，受控者必须服从控制者的命令。仪式包括蒙眼、穿戴、宣誓等步骤。\n\n用法与交互细节：\n1. 控制者先蒙住受控者眼睛，引导至服装前，揭晓惊喜。\n2. 受控者表达犹豫或自卑，控制者通过强势话语和肢体接触建立信任。\n3. 穿戴过程中，控制者逐一解释每件拘束的意义，强化仪式感。\n4. 可变体：契约内容可定制，如时间限制、服从等级。", "uid": 1809}, "假肢伪装与隐藏拘束": {"content": "{假肢伪装与隐藏拘束}\n简介：\n【场景/玩法描述】受控者手臂被拘束在身后，通过假臂（木质或硅胶）和服装（如宫廷礼服）伪装成正常姿态。假臂固定在身前，手套和蕾丝装饰掩盖接口。\n\n用法与交互细节：\n1. 受控者真实手臂被束缚在背后，假臂通过暗扣固定在肩部。\n2. 控制者调整假臂姿势（如交叠于小腹），确保自然。\n3. 受控者需保持假臂不动，避免露馅。\n4. 可变体：假臂可设计为可活动关节，增加互动性。", "uid": 1810}, "全身连体丝衣与触觉剥夺": {"content": "{全身连体丝衣与触觉剥夺}\n简介：\n【场景/玩法描述】受控者穿着全身连体丝袜（包括手掌），触觉被削弱，精细动作困难。外观上难以察觉，但受控者动作变得缓慢优雅，需依赖控制者协助。\n\n用法与交互细节：\n1. 丝衣从脚到锁骨包裹全身，手掌部位特殊处理，触感迟钝。\n2. 受控者无法进行精细操作（如扣纽扣），需控制者帮助。\n3. 丝衣紧贴身体，增加束缚感。\n4. 可变体：丝衣可设计为不同厚度或材质，调整触觉剥夺程度。", "uid": 1812}, "上锁的高跟鞋与拘束识破": {"content": "{上锁的高跟鞋与拘束识破}\n简介：\n【场景/玩法描述】一位角色因高跟鞋鞋跟断裂扭伤脚踝，被另一位角色带回家中照顾。在帮助处理伤口时，后者发现前者所穿的高跟鞋脚踝系带内嵌金属片并带有锁扣，从而识破前者隐藏的拘束爱好。随后，前者也发现后者穿着类似的拘束鞋和束腿衬裙，两人因此相认并成为同好。\n\n用法与交互细节：\n1. 设定一种外观正常但内藏拘束结构的高跟鞋，脚踝系带内嵌金属片，末端有锁扣，可上锁固定。\n2. 通过意外事件（如鞋跟断裂、扭伤）触发角色暴露拘束装备，另一方通过观察或触碰细节识破。\n3. 识破后，双方可展示自己的拘束装备（如束腿衬裙、束腰等），形成同好相认的亲密互动。\n4. 可变体：可改为其他拘束衣物（如束腰、手铐、项圈）的识破场景，或加入“钥匙交换”作为信任象征。", "uid": 1813}, "拘束睡袍与夜间束缚游戏": {"content": "{拘束睡袍与夜间束缚游戏}\n简介：\n【场景/玩法描述】两位同好角色在夜晚就寝时，为对方穿上特制的紧身拘束睡袍，并戴上蕾丝手铐，然后将对方塞进自己被窝里。在舒适温暖的贴身睡裙带来的束缚感与百合香气中相拥入睡。此外，她们还会用一些小游戏来决定当晚谁在床上的主动地位，增加互动趣味。\n\n用法与交互细节：\n1. 准备一件紧身拘束睡袍，材质柔软但贴身，限制大幅动作，可带有锁扣或系带。\n2. 配合蕾丝手铐或软质束腕，将对方双手限制在身前或身后。\n3. 通过游戏（如猜拳、掷骰、问答）决定当晚的“主动方”与“被动方”，被动方被更严格束缚。\n4. 可变体：可加入“晨间解锁”环节，或使用定时锁增加悬念。", "uid": 1815}, "霍布连衣裙与紧身束缚": {"content": "{霍布连衣裙与紧身束缚}\n简介：\n【场景/玩法描述】一位角色选择穿着霍布连衣裙作为外出的拘束装备。这种裙子从臀部、大腿到膝盖都紧紧包裹，膝盖以下为直筒设计，只能迈开小腿行走。上身同样紧致，用蕾丝花边掩饰束腰和肩带的痕迹。搭配系带高跟鞋，整体外观优雅，但活动严重受限，无法奔跑。\n\n用法与交互细节：\n1. 霍布裙为紧身直筒设计，长度至小腿中部，限制步幅。\n2. 上身可内嵌束腰或肩套，通过蕾丝、褶皱等装饰掩饰。\n3. 适合“端庄淑女”或“被束缚的成熟女性或淑女”角色，行走时需扭动臀部以保持平衡，增加诱惑感。\n4. 可变体：可改为“鱼尾裙”或“铅笔裙”，或加入“裙长限制”（如超长裙摆需手提行走）。", "uid": 1817}, "连体紧身衣与触感剥夺": {"content": "{连体紧身衣与触感剥夺}\n简介：\n【场景/玩法描述】角色在穿戴拘束套装时，首先穿上一层肉色紧身连体丝袜，从脚趾包裹至锁骨，手掌部位经过特殊处理，外人几乎看不出异常，但穿戴者手指触感变得迟钝，精细操作受影响，动作显得缓慢优雅。这层连体衣作为基础拘束，增加整体束缚感并剥夺部分触觉。\n\n用法与交互细节：\n1. 连体紧身衣为肉色透明材质，覆盖全身（包括手掌），手掌处加厚或特殊涂层以降低触感。\n2. 穿戴后手指不灵活，适合“需要保持优雅”或“被剥夺感知”的角色。\n3. 可搭配其他拘束衣物使用，作为底层。\n4. 可变体：可改为“全身乳胶衣”或“触感剥夺手套”，或加入“触觉反馈”机制（如特定触碰可唤醒感知）。", "uid": 1818}, "肩套与束腰联动限制上肢": {"content": "{肩套与束腰联动限制上肢}\n简介：\n【场景/玩法描述】角色佩戴倒L型肩套，内侧有金属环固定，完全打开肩部，从锁骨到大臂被拘束套固定。肩套上伸出的连接绳与束腰上沿相连，防止松脱并进一步限制手臂动作。结果大臂与身体几乎贴合，手臂只能向两侧稍微张开，手掌最多举到头顶，无法触及更高处。\n\n用法与交互细节：\n1. 肩套为倒L型硬质或半硬质结构，固定肩部并限制大臂活动范围。\n2. 通过连接绳或带扣与束腰联动，形成整体拘束系统。\n3. 穿戴者无法举手、拥抱或做大幅上肢动作，适合“被束缚的优雅”或“无助”角色。\n4. 可变体：可改为“肩链”或“臂套”，或加入“锁具”固定连接点。", "uid": 1819}, "钥匙交换与信任游戏": {"content": "{钥匙交换与信任游戏}\n简介：\n【场景/玩法描述】两位角色在穿戴拘束套装后，将所有锁具的钥匙交给对方保管。这意味着在约定时间内，自己无法自行解除拘束，完全依赖对方。这种钥匙交换不仅是实际需要，更是一种信任与亲密的表现，增加了拘束游戏的刺激感和心理依赖。\n\n用法与交互细节：\n1. 设定一套或多套拘束装备，每个锁具的钥匙由同伴持有。\n2. 可约定解锁时间或条件（如完成某项任务、到达特定地点）。\n3. 钥匙交换可作为“信任仪式”或“游戏开始”的标志。\n4. 可变体：可加入“备用钥匙”或“紧急解锁”机制，或改为“定时锁”自动解锁。", "uid": 1820}, "成年契约容器与拘束资源绑定": {"content": "{成年契约容器与拘束资源绑定}\n简介：\n【场景/玩法描述】一个成人组织或贵族团体把“拘束程度”设定为资源产出条件。成年角色在契约、债务或仪式压力下成为资源容器，穿戴多层拘束具以提升魔力、药剂或能量产出；冲突来自契约边界、资源需求和自我意志，而不是家庭来源剧情。\n\n用法与交互细节：\n1. 明确所有容器角色均为成年人，进入关系前有契约、职位或仪式身份。\n2. 拘束程度与资源产出挂钩，可用束腰、腿套、手套、项圈等道具分级。\n3. 调教者需要在产出效率、身体负担和心理承受之间做选择。\n4. 可变体：资源可改为魔力、药剂、情报权限或仪式能量；关系可走向反抗、协商或被组织同化。", "uid": 1821}, "拘束下的亲密与高潮同步": {"content": "{拘束下的亲密与高潮同步}\n简介：\n【场景/玩法描述】两人均处于严密拘束中（如眼罩、口塞、全身束缚），无法自由移动或说话，只能通过身体接触和细微动作传递感受。在相互抚摸和紧贴中，双方同时达到高潮，体验被拘束下的极致亲密与同步快感。\n\n用法与交互细节：\n1. 设定双方均被拘束，如眼罩遮蔽视觉、口塞限制言语、手脚被缚，仅能通过触觉和听觉交流。\n2. 通过身体紧贴、抚摸敏感部位（如胸部、腿间）刺激对方，利用拘束带来的无助感放大快感。\n3. 高潮时双方同步，强调拘束下感官的集中与情感的共鸣。\n4. 可变体：可加入时间限制（如必须在拘具解开前达到高潮）、或一方主导（如调教者通过遥控刺激使受虐者同步）。", "uid": 1822}, "长期拘束习惯化与身份伪装": {"content": "{长期拘束习惯化与身份伪装}\n简介：\n【场景/玩法描述】成年角色在一段长期合约、秘密训练或伴侣安排中习惯在拘束下生活，并对外维持端庄、正常的身份形象。拘束从惩罚逐渐变成安全感来源，角色在社交场合努力隐藏真实偏好，直到遇到理解者才敢承认自己的依赖。\n\n用法与交互细节：\n1. 设定角色已成年，因合约、职位、债务或自愿训练而长期穿戴束腰、单手套、腿套等隐蔽拘束具。\n2. 角色从不适应转为依赖拘束带来的稳定感，同时害怕被外界识破。\n3. 对外表现为文静、优雅或克制，私下则需要更严密的拘束来获得安心。\n4. 可变体：安排伴侣识破、同好接纳、组织勒索或自愿升级等分支。", "uid": 1823}, "同好装备传承与自我接纳": {"content": "{同好装备传承与自我接纳}\n简介：\n【场景/玩法描述】成年角色担心自己的拘束偏好被发现，却意外遇到更成熟的同好、前辈或伴侣。对方展示专业装备与安全规则，将原本羞耻的秘密转化为可被理解、可被协商的成人偏好，帮助角色完成自我接纳。\n\n用法与交互细节：\n1. 角色因拘束道具暴露而紧张，对方则以同好身份展示更完整的装备收藏。\n2. 对方讲解拘束传统、护理流程和边界规则，缓解角色的羞耻感。\n3. 角色从恐惧被排斥转为愿意坦白需求，并开始寻找能共同保密与协商的伴侣。\n4. 可变体：同好关系可设为贵族礼仪、秘密俱乐部、魔法修炼或情侣训练。", "uid": 1824}, "拘束下的强制清醒与无助对视": {"content": "{拘束下的强制清醒与无助对视}\n简介：\n【场景/玩法描述】两人被严密拘束在椅子上，面对面无法动弹，仅能通过眼神交流。拘束剥夺了大部分行动能力，连转头或站立都做不到，只能长时间凝视对方被拘束的姿态，感受彼此的绝望与无助，形成一种扭曲的亲密。\n\n用法与交互细节：\n1. 设定双方被固定在椅子上，全身拘束（如项圈、束腰、单手套、腿套），仅眼球可自由转动。\n2. 强制面对面，无法移开视线，必须长时间注视对方被拘束的样子。\n3. 通过眼神传递情绪（如哀求、愤怒、绝望），并因无法帮助对方而加剧无助感。\n4. 可变体：可加入时间延长（如数小时或数天）、或加入旁观者（如旁观者或调教者）进行言语羞辱。", "uid": 1825}, "拘束下的日常清洁与换装": {"content": "{拘束下的日常清洁与换装}\n简介：\n【场景/玩法描述】被拘束者无法自行清洁或更换衣物，需要依赖他人（如护理者或调教者）进行日常护理。护理过程中，被拘束者处于半麻醉状态，无力反抗，只能被动接受身体被摆弄、拘束具被更换，体验完全依赖他人的无力感。\n\n用法与交互细节：\n1. 设定被拘束者因拘束而无法自理，需由护理者定期进行清洁（如擦身、更换衣物）和换装（如更换不同拘束具）。\n2. 护理者使用麻醉剂（如手帕）使被拘束者保持半清醒但无力状态，便于操作。\n3. 护理过程中，被拘束者感受身体被触碰、拘束具被解开和重新绑紧的刺激。\n4. 可变体：护理者可以是护理者、仆人或调教者；麻醉程度可从微弱到完全昏迷；可加入羞辱或奖励元素。", "uid": 1826}, "拘束下的被动站立与姿态维持": {"content": "{拘束下的被动站立与姿态维持}\n简介：\n【场景/玩法描述】角色被拘束具强制维持特定姿态（如优雅站立或端坐），无法自行改变姿势。拘束具（如束腰、背板、腿套）限制身体活动，使其只能保持文静优雅的淑女姿态，连站立或坐下都需要他人辅助。\n\n用法与交互细节：\n1. 设定拘束具（如束腰、背板、单手套、腿套）强制角色保持特定姿势，如挺胸收腹、双腿并拢、手臂背后。\n2. 角色无法自行改变姿势，甚至无法坐下或站立，需依赖他人调整。\n3. 拘束具的设计强调优雅和端庄，使角色在外观上显得高贵，但内心充满无力感。\n4. 可变体：姿势可以是站立、跪坐或侧卧；拘束具可加入装饰元素（如蕾丝、蝴蝶结）；可加入时间限制（如必须保持数小时）。", "uid": 1828}, "魔力激活炼金拘束具": {"content": "{魔力激活炼金拘束具}\n简介：\n炼金拘束具需由佩戴者或调教师输入魔力激活，激活后道具认主，只能由输入魔力者控制。佩戴者可自行激活，从而假装被缚实则可控。\n\n用法与交互细节：\n1. 输入不同魔力频率可单独控制不同部位（如腿环、脚镣、贞操带、乳贴）。\n2. 错误频率会导致道具超频运作，产生额外刺激或痛苦。\n3. 佩戴者可通过练习精确控制魔力，实现“假被缚”状态。\n4. 可变体：道具可设计为需要双人同时输入魔力才能激活，或需要特定节奏的魔力脉冲。", "uid": 1830}, "分段式魔力拘束腿环与脚镣": {"content": "{分段式魔力拘束腿环与脚镣}\n简介：\n长筒高跟靴上附有四组魔力拘束环：大腿根部、膝盖上下、脚腕。激活后环与环之间产生吸附力，强制双腿并拢，但可通过肌肉力量对抗。\n\n用法与交互细节：\n1. 可单独激活某组环，实现部分拘束（如仅锁脚腕限制行走）。\n2. 吸附力强度可调，从轻微牵引到完全并拢。\n3. 佩戴者可通过绷紧肌肉强行分开双腿，但会消耗体力。\n4. 可变体：腿环可附加震动或电击功能；脚镣可连接锁链限制步幅。", "uid": 1831}, "宝石乳贴振动器": {"content": "{宝石乳贴振动器}\n简介：\n宝石乳贴通过吸附固定于乳头和乳晕，内壁有毛刺，可震动。超频模式下毛刺变硬扎入乳晕，震动强度如筋膜枪，导致剧烈疼痛和快感。\n\n用法与交互细节：\n1. 正常模式：温和吸附，轻微震动。\n2. 超频模式：毛刺硬化，高频强震，引发强烈刺激。\n3. 可通过魔力频率切换模式，错误输入会触发超频。\n4. 可变体：乳贴可附加电击、温度变化或遥控功能；宝石可显示佩戴者 arousal 状态。", "uid": 1832}, "贞操带与提肛支架": {"content": "{贞操带与提肛支架}\n简介：\n贞操带贴合阴户和菊穴形状，带有提肛支架。魔力激活时产生电流感和温热感，锁头可打开。\n\n用法与交互细节：\n1. 佩戴时下蹲会有“卡裆”和“勒阴”感。\n2. 激活魔力后，贞操带整体发热，锁头处有微弱电流。\n3. 可设计为只有特定魔力频率才能解锁。\n4. 可变体：贞操带可内置震动棒或肛塞；提肛支架可调节松紧。", "uid": 1833}, "奴隶伪装与演技训练": {"content": "{奴隶伪装与演技训练}\n简介：\n假装成被拘束的奴隶进行潜入，需要学习如何适应拘束、调整体态、发出合适的呻吟，以及在被检查时保持角色。\n\n用法与交互细节：\n1. 适应拘束：放松身心，找到发力点和平衡点，避免过度挣扎。\n2. 体态控制：穿高跟靴时需夹紧大腿、扭腰摆臀、碎步行走，表现出不适。\n3. 声音控制：被堵嘴时发出闷哼和呜咽，配合挣扎动作。\n4. 可变体：可加入特定暗号或手势与同伴沟通；伪装身份可设定为特定职业或种族。", "uid": 1834}, "脱缚技巧训练": {"content": "{脱缚技巧训练}\n简介：\n学习在受缚状态下脱困的技巧，包括用手指挑开绳结、用金属丝撬锁、利用尖锐物割绳、卸下关节脱出等。\n\n用法与交互细节：\n1. 需要精确控制身体肌肉和关节，甚至能抑制神经反射。\n2. 脱缚前需观察拘束结构，找到薄弱点。\n3. 可借助隐藏工具（如发夹、指甲缝中的金属丝）。\n4. 可变体：脱缚可设计为需要特定条件（如呼吸节奏、肌肉放松顺序）；可加入失败惩罚（如触发警报或电击）。", "uid": 1835}, "肉货检查与揩油规则": {"content": "{肉货检查与揩油规则}\n简介：\n在奴隶交易据点，检查者可以触摸肉货的身体进行检验，但不得造成伤害或侵犯，以保证肉货的完整性。\n\n用法与交互细节：\n1. 检查者可以揉捏乳房、拉扯乳贴、拍打臀部等，但不可插入或留下伤痕。\n2. 肉货可以表现出抗拒和痛苦，但不能过度反抗。\n3. 检查过程是公开的，其他奴隶贩子会围观。\n4. 可变体：检查可加入“验货”环节，如要求肉货展示特定姿势或发出声音；可设定检查时间限制。", "uid": 1836}, "自慰打断与性瘾累积": {"content": "{自慰打断与性瘾累积}\n简介：\n角色在自慰高潮前被强制打断，导致性欲状态（如【无限性瘾】）持续累积，最终达到100%后理智全失，必须通过更激烈的方式释放。\n\n用法与交互细节：\n1. 设定一个性欲进度条，每次打断（如被他人发现、突发事件）增加进度，满值后触发强制发情或失去理智。\n2. 打断后角色可能产生焦躁、渴望等心理描写，增加后续行为的合理性。\n3. 可结合其他机制（如拘束、道具）在满值时触发连锁反应。\n4. 可变体：进度条可被不同行为（如视觉刺激、气味）加速或减速。", "uid": 1837}, "G点挖掘与高潮晕厥": {"content": "{G点挖掘与高潮晕厥}\n简介：\n角色在自慰中无意间刺激到阴道深处的G点（敏感软肉），引发阴道强烈收缩、吸吮，导致快感远超普通高潮，甚至因过度刺激而晕厥。\n\n用法与交互细节：\n1. 设定G点为隐藏敏感点，需特定角度或深度才能触发，触发后角色会失去对身体的控制。\n2. 高潮后可能伴随脱水、肌肉痉挛等生理反应，需后续处理（如饮水、休息）。\n3. 可结合道具（如假阳具、震动棒）或他人手指进行精准刺激。\n4. 可变体：G点位置可因体质或改造而改变，或多次刺激后敏感度下降。", "uid": 1838}, "魔力丝线自缚与远程拘束": {"content": "{魔力丝线自缚与远程拘束}\n简介：\n【场景/玩法描述】由魔力生成的丝线可以自缚、远程缠绕、硬化穿刺或编织成网笼，既能服务自我拘束，也能成为远程捕缚与多目标控制工具。\n\n用法与交互细节：\n1. 丝线可按意念调整粗细、硬度和形状，缠绕手腕、脚踝、舌头、胸部或下体，形成复杂绳缚。\n2. 切换为远程模式后，丝线可硬化攻击、软化缠绕，或编织成网、笼、圈套控制目标。\n3. 挣扎、兴奋或魔力波动可触发丝线收紧、震颤、麻痹或催情效果。\n4. 可变体：自缚模式、他人接管模式、远程攻击模式、多角色协同编织。\n\n【包含类似变体】\n- 魔力丝线自缚系统\n- 魔力丝线远程攻击与拘束", "uid": 1839}, "伪装女奴的演技训练": {"content": "{伪装女奴的演技训练}\n简介：\n受训者需伪装成亡国女奴，在公开场合表演柔弱无助、凄苦悲伤，隐藏真实实力与适应性癖。调教者通过牵引绳、拘束装备等控制其行动，纠正浮夸演技。\n\n用法与交互细节：\n1. 调教者设定伪装身份背景（如亡国公主、战俘等），受训者必须完全代入。\n2. 受训者需在公开场合（如市场、检查站）表演，调教者通过牵引绳拉扯、魔力拘束解锁等动作制造真实痛苦，强化表演真实性。\n3. 若受训者演技浮夸或不到位，调教者可增加身体惩罚（如收紧束腰、调整假屌面罩压迫咽喉）。\n4. 可变体：可替换为伪装成其他身份（如间谍、逃犯），或加入观众互动（路人评价、检查官盘问）。", "uid": 1845}, "牵引绳与高跟靴的平衡折磨": {"content": "{牵引绳与高跟靴的平衡折磨}\n简介：\n受训者穿着超高跟长筒靴，双手反绑，通过牵引绳被调教者拖行。全身重量压于脚趾，每步都需小心翼翼维持平衡，否则会摔倒或加重束缚压迫。\n\n用法与交互细节：\n1. 调教者通过牵引绳控制方向与速度，突然拉扯可破坏受训者平衡，使其踉跄。\n2. 受训者需夹紧大腿、扭腰摆臀、迈碎步行走，调教者可观察其姿态是否“符合女奴身份”。\n3. 高跟靴可附加魔力拘束，调教者通过手势解锁或激活，增加受训者的不可预测感。\n4. 可变体：更换鞋型（如芭蕾高跟鞋、锁链凉鞋），或增加地面障碍（碎石、水洼）。", "uid": 1846}, "假屌面罩与呼吸限制": {"content": "{假屌面罩与呼吸限制}\n简介：\n受训者佩戴严丝合缝的假屌面罩，咽喉被压迫，呼吸受限。在行走或拖拽时，面罩会因动作进一步压迫，导致窒息感与性兴奋。\n\n用法与交互细节：\n1. 调教者可通过调整牵引绳角度或受训者头部位置，改变面罩压迫强度。\n2. 受训者需发出呜咽、呻吟等声音，调教者根据声音判断其状态。\n3. 面罩可内置震动或电击装置，调教者远程控制。\n4. 可变体：替换为口塞、鼻夹、呼吸面罩等，或结合液体灌注（如精液、盐水）。", "uid": 1847}, "绳索勒乳与反绑姿势": {"content": "{绳索勒乳与反绑姿势}\n简介：\n受训者双手反绑于背后，绳索交错缠绕乳房，将其勒成饱满肉球。反绑使双乳被迫挺起，任何动作都会加剧绳索摩擦与压迫。\n\n用法与交互细节：\n1. 调教者可根据受训者体型调整绳索松紧，确保乳房被充分勒紧但不受伤。\n2. 受训者行走或站立时，需保持双乳挺起姿势，调教者可要求其挺胸或弯腰。\n3. 绳索可连接牵引绳或固定物，限制活动范围。\n4. 可变体：使用不同材质（麻绳、皮绳、链条），或结合乳夹、乳环等道具。", "uid": 1848}, "魔力拘束靴的解锁与激活": {"content": "{魔力拘束靴的解锁与激活}\n简介：\n受训者穿着附有魔力拘束的高跟靴，调教者通过手势或远程控制解锁/激活束缚。解锁时受训者获得短暂自由，激活时则被限制行动。\n\n用法与交互细节：\n1. 调教者设定手势或咒语作为控制信号，受训者需配合表演。\n2. 拘束可分级（如部分解锁、完全锁定），调教者根据情况调整。\n3. 受训者可在解锁瞬间尝试逃跑或反抗，增加戏剧性。\n4. 可变体：使用科技装置（如手机APP控制），或结合其他拘束装备（手铐、项圈）。", "uid": 1852}, "送绑伪拘潜入": {"content": "{送绑伪拘潜入}\n简介：\n【场景/玩法描述】角色自愿伪装成被捕获的奴隶，接受拘束和道具束缚，以肉货身份被送入敌方据点，计划在适当时机挣脱反杀。但存在拘束过紧、封印力量、或遭遇意外调教导致弄假成真的风险。\n\n用法与交互细节：\n1. 角色需脱去原有装备，换上暴露或羞辱性服装，佩戴项圈、贞操带、手脚镣等拘束具。\n2. 伪装身份需有合理背景（如亡国公主的侍女），避免被识破。\n3. 潜入过程中可能遭遇检查、羞辱、甚至轻度调教，需保持伪装。\n4. 可变体：可加入“封印道具”设定，如魔法项圈压制力量，增加挣脱难度。", "uid": 1853}, "拘束道具库的挑选与使用": {"content": "{拘束道具库的挑选与使用}\n简介：\n【场景/玩法描述】角色从缴获的奴隶贩子道具中挑选合适的拘束具，包括乳环、跳蛋、假阳具、电击项圈、连体铁枷、拘束衣等。挑选过程本身可成为调教前戏，体现角色对拘束的接受度或癖好。\n\n用法与交互细节：\n1. 角色可主动选择或由同伴指定道具，体现支配/服从关系。\n2. 道具功能可自定义（如震动强度、电击模式、计时锁定）。\n3. 挑选时可能讨论道具用途，增加色情氛围。\n4. 可变体：可加入“道具测试”环节，检查是否适合角色身体。", "uid": 1857}, "同伴协助下的自愿被缚": {"content": "{同伴协助下的自愿被缚}\n简介：\n【场景/玩法描述】角色在同伴（伪装成奴隶贩子或交接人）的协助下，自愿接受全身拘束。同伴负责捆绑、上锁、检查，过程中可能产生暧昧或支配互动。信任是关键，但存在同伴背叛或拘束过紧的风险。\n\n用法与交互细节：\n1. 同伴需确保拘束牢固但可挣脱（或不可挣脱，视剧情）。\n2. 被缚过程中可加入言语羞辱、身体接触或调情。\n3. 同伴可能暗中留下后门（如隐藏钥匙）或故意加强拘束。\n4. 可变体：可设定同伴为真正的调教者，逐步引导角色沉沦。", "uid": 1858}, "贞操带反向调教": {"content": "{贞操带反向调教}\n简介：\n【贞操带原本用于保护贞洁，但金属裤袢卡入阴唇，随动作摩擦刺激阴蒂和穴口，反而成为调教道具。】\n\n用法与交互细节：\n1. 金属裤袢设计为贴合阴唇形状，行走或扭动时产生持续摩擦。\n2. 可加锁，钥匙由调教者保管；内部可放置跳蛋或药膏增强刺激。\n3. 长期佩戴会导致阴唇红肿敏感，甚至形成依赖。\n4. 可变体：改为透明塑料或镂空设计；增加尿道或肛塞延伸结构。", "uid": 1863}, "性欲累积与理智下降机制": {"content": "{性欲累积与理智下降机制}\n简介：\n【角色拥有“无限性瘾”天赋，性欲随拘束时间或刺激累积，达到阈值后降低理智，可能做出失控行为。】\n\n用法与交互细节：\n1. 性欲值0-100%，随摩擦、视觉刺激、时间流逝增加。\n2. 超过60%开始影响判断，超过80%可能主动寻求刺激或服从命令。\n3. 高潮可暂时降低性欲，但若未完全释放则反弹更高。\n4. 可变体：增加不同阈值触发事件（如哀求、自慰、攻击）；与药物或催眠联动。", "uid": 1865}, "高跟鞋强制足部姿势": {"content": "{高跟鞋强制足部姿势}\n简介：\n【特制高跟鞋鞋跟12cm，鞋头收缩使足趾无法舒张，鞋底加固使足弓强制绷直，影响站立和行走姿态。】\n\n用法与交互细节：\n1. 高跟鞋带锁，无法自行脱下；长时间穿着导致足部疲劳和酸痛。\n2. 强制绷直的足弓使小腿肌肉持续紧张，影响平衡。\n3. 可配合脚镣或锁链增加行走难度。\n4. 可变体：鞋跟改为可替换（细跟、粗跟、刀跟）；鞋底增加振动或电击模块。", "uid": 1866}, "皮革束身连衣裙的闷热与渗透": {"content": "{皮革束身连衣裙的闷热与渗透}\n简介：\n【一件从脖颈到小腿的皮革连衣裙，无开口，穿戴后汗水与淫液无法蒸发，沿皮肤流至裙摆渗出，产生淫糜气味。】\n\n用法与交互细节：\n1. 皮革不透气，长时间穿戴导致体温升高、出汗增多，增加不适与羞耻。\n2. 体液在裙内积聚，从裙摆滴落，可被他人察觉。\n3. 连衣裙紧贴身体，勾勒曲线，任何生理反应（乳尖凸起、阴部湿润）都清晰可见。\n4. 可变体：改为乳胶或PVC材质；增加内置按摩点或震动环；设计为拉链或纽扣式便于部分暴露。", "uid": 1867}, "自缚拘束与玩具固定": {"content": "{自缚拘束与玩具固定}\n简介：\n角色为抑制性欲，使用三段伸缩旋转电击按摩棒堵住三个穴口，并用强力震动跳蛋夹住乳头和阴蒂，再通过穿黑丝连体裤袜的紧绷弹性固定这些玩具。长期佩戴导致淫液浸润，裤袜湿透滴水。\n\n用法与交互细节：\n1. 角色可自行选择多种性玩具（按摩棒、跳蛋、乳夹等），并通过紧身衣物（连体裤袜、乳胶衣）固定。\n2. 玩具持续刺激会积累快感，同时淫液分泌影响衣物状态（湿润、滴水、黏糊）。\n3. 固定方式可扩展为束带、胶带、拘束衣等，不同固定方式影响活动能力和被发现风险。\n4. 可变体：玩具可替换为遥控型，由他人控制；或加入定时/感应开关。", "uid": 1870}, "女体化自慰探索": {"content": "{女体化自慰探索}\n简介：\n角色穿越后变为女性身体，在性瘾天赋驱使下进行首次自慰，从抚摸乳房、阴唇到插入阴道，体验女性高潮的强烈快感，并发现身体敏感度极高。\n\n用法与交互细节：\n1. 角色需逐步探索新身体的敏感带，不同部位刺激产生不同快感反馈。\n2. 自慰过程可设计为多阶段：外部抚摸→阴蒂刺激→插入→高潮，每阶段有不同反应。\n3. 高潮后身体敏感度提升，轻微触碰即可引发再次兴奋。\n4. 可变体：可加入道具辅助（如按摩棒、跳蛋），或由他人指导/强迫进行。", "uid": 1872}, "束缚唤醒与感官剥夺": {"content": "{束缚唤醒与感官剥夺}\n简介：\n角色从昏迷中醒来，发现被反剪双手、蒙住双眼，脖颈被粗大围脖箍住，双乳被弹性皮罩包裹，全身处于紧密束缚状态，无法自由活动。\n\n用法与交互细节：\n1. 束缚设计需包含多个部位：手腕（反绑）、眼睛（蒙眼）、脖颈（项圈/围脖）、胸部（乳罩/皮套）。\n2. 感官剥夺（蒙眼）增加角色紧张感和对触觉的依赖。\n3. 束缚材料可选择皮革、金属、乳胶等，不同材质影响舒适度和挣脱难度。\n4. 可变体：可加入口塞、脚镣、贞操带等，逐步解锁束缚层次。", "uid": 1873}, "随机换装系统与服装自适应清凉化": {"content": "{随机换装系统与服装自适应清凉化}\n简介：\n角色拥有随机换装功能，每次换装随机获得一套时装。但游戏机制会自动将服装“自适应清凉化和情趣化”，使原本保守的服装变得暴露色情（如旗袍开胸、西装变紧身、丝袜勒肉等）。\n\n用法与交互细节：\n1. 换装可无限次随机，每次获得不同风格（如雪人套、西装、旗袍、女王装等）。\n2. 服装自适应：所有时装自动调整为紧身、露肤、勒肉等色情效果，强调身体曲线和敏感部位。\n3. 换装过程可触发角色反应（如呼吸急促、乳头硬挺、足部酸胀等）。\n4. 可变体：换装可绑定特定情境（如战斗、社交、调教），或加入服装耐久度、破损机制。", "uid": 1878}, "战斗/日常状态切换与数值面板开关": {"content": "{战斗/日常状态切换与数值面板开关}\n简介：\n角色拥有系统判定机制，可区分“战斗状态”和“日常生活状态”。战斗时所有攻击、闪避、防御动作获得数值加成；日常状态则回归普通身体能力，避免误伤。技能释放通过意念选取，系统自动托管完成动作。\n\n用法与交互细节：\n1. 基础动作（攻击、闪避、防御）由系统判定是否激活数值加成。\n2. 技能通过系统面板用意念选取，系统根据环境自动执行最佳动作形态。\n3. 未装备武器时无法获得数值加成，装备不同武器可能获得不同加成效果。\n4. 可变体：状态切换可绑定情绪、欲望或外部条件（如暴露度、调教度），技能托管可加入失控或暴走风险。", "uid": 1879}, "服装自适应情趣化与身体反应": {"content": "{服装自适应情趣化与身体反应}\n简介：\n所有时装在角色身上会自动变得紧身、暴露、勒肉，强调身体曲线和敏感部位。角色会产生相应身体反应，如呼吸急促、乳头硬挺、足部酸胀、皮肤勒痕等。\n\n用法与交互细节：\n1. 服装自适应：任何时装（如西装、旗袍、女王装）自动调整为色情版本。\n2. 身体反应：紧身导致呼吸急促、布料摩擦乳头、丝袜勒肉、高跟鞋挤脚等。\n3. 角色可主动调整或适应服装，产生羞耻或兴奋感。\n4. 可变体：服装可加入耐久度、破损、湿身效果，或绑定调教进度（如暴露度越高，属性加成越大）。", "uid": 1884}, "魔力自控的贞操带与乳贴": {"content": "{魔力自控的贞操带与乳贴}\n简介：\n【处女之盾】贞操带与【宝石乳贴】均为魔力驱动道具，穿戴后只有受调教者本人输入魔力才能解锁，他人无法强行打开。贞操带金属跨带挤入蜜穴，乳贴内部有钝头毛刺蠕动刺激乳头，穿戴过程即产生强烈快感。\n\n用法与交互细节：\n1. 调教者以“保护贞洁”为由为受调教者穿戴，受调教者需主动配合，穿戴后下体与乳头被完全封锁。\n2. 贞操带冰凉触感与乳贴的吸附刺激会触发受调教者的性瘾体质，需忍耐快感。\n3. 受调教者可随时用魔力解锁，但主动解锁意味着放弃“保护”，形成心理博弈。\n4. 可变体：贞操带可改为带振动功能，乳贴可改为电击或遥控型。", "uid": 1886}, "药绳拘束与束腰塑形": {"content": "{药绳拘束与束腰塑形}\n简介：\n调教者使用药绳（浸泡药液防止淤血）对受调教者进行上半身捆绑，将双手反剪至背后并吊起，配合皮革束腰将腰围从22寸收紧至17寸，迫使受调教者挺胸提臀，呼吸受限。\n\n用法与交互细节：\n1. 调教者以专业手法捆绑，绳结牢固但不会造成伤害，受调教者双臂被固定在后颈下方，无法动弹。\n2. 束腰限制胸廓与膈肌，导致呼吸浅快，增加受调教者的无助感与敏感度。\n3. 捆绑后乳头因充血更加凸起，与乳贴相互作用，快感加倍。\n4. 可变体：可改用龟甲缚或菱形缚，束腰可加装内置振动器。", "uid": 1887}, "晶犀皮长筒靴与魔力镣铐": {"content": "{晶犀皮长筒靴与魔力镣铐}\n简介：\n受调教者先穿油性丝袜，再穿晶犀皮长筒靴（刀枪不入、水火不侵、绝缘）。靴子在大腿根、膝盖、脚踝处设有魔力拘束镣铐，调教者可用遥控器激活使双腿并拢，但受调教者可用魔力干预解除。\n\n用法与交互细节：\n1. 调教者轻柔为受调教者穿丝袜与靴子，过程充满亲密感与仪式感。\n2. 靴子内部有粗糙毛刺，丝袜提供顺滑触感，形成对比刺激。\n3. 魔力镣铐激活后强制双腿并拢，限制行动但允许有限走动，适合押送场景。\n4. 可变体：靴子可改为高跟或平底，镣铐可改为定时或远程控制。", "uid": 1888}, "假阳具面罩深喉堵嘴": {"content": "{假阳具面罩深喉堵嘴}\n简介：\n半覆盖式面罩内侧固定有12公分长的假阳具，佩戴时假阳具深入咽喉，口球底座填满口腔。面罩由魔力锁定，内置营养液可维持一周能量。佩戴后受调教者无法说话、呼吸困难，需仰头缓解呕吐感。\n\n用法与交互细节：\n1. 调教者引导受调教者张嘴，先抵入假阳具龟头，再趁其仰头时强行将口球塞入并锁定。\n2. 深喉导致强烈呕吐感与窒息感，受调教者需适应并学会用鼻子呼吸。\n3. 营养液通过吮吸分泌，受调教者需主动吮吸才能获得能量，形成条件反射。\n4. 可变体：假阳具尺寸可调，面罩可改为全覆式或带眼罩。", "uid": 1889}, "油性丝袜的仪式化穿戴": {"content": "{油性丝袜的仪式化穿戴}\n简介：\n调教者为受调教者精心穿戴半透油性丝袜，过程专注而缓慢，抚平每一处褶皱。丝袜紧致包裹双腿，触感柔滑，与后续粗糙的靴子内壁形成对比。\n\n用法与交互细节：\n1. 调教者托住受调教者的脚掌，轻柔套上丝袜，从足趾到根部逐步拉平。\n2. 丝袜与束腰的吊带扣连接，确保固定。\n3. 受调教者感受丝袜的包裹感与弹性，调教者欣赏其腿部线条。\n4. 可变体：丝袜可改为渔网袜或吊带袜，颜色可换。", "uid": 1892}, "极限忍耐与释放操控": {"content": "{极限忍耐与释放操控}\n简介：\n【场景/玩法描述】调教者通过持续刺激将受虐者推至高潮边缘，同时用言语诱导其放弃抵抗、主动释放。受虐者在极限状态下坚持，身体反应与心理防线同步被侵蚀。\n\n用法与交互细节：\n1. 调教者使用振动道具、绳缚和感官剥夺，将受虐者维持在临界状态。\n2. 调教者以“释放出来就舒服了”“长痛不如短痛”等话语削弱受虐者意志。\n3. 受虐者通过摇头、呻吟等非语言信号表现挣扎，调教者根据反应调整刺激强度。\n4. 可变体：可设定释放条件（如说出安全词、完成特定动作），或引入旁观者增加羞耻感。", "uid": 1893}, "白布束缚与感官包裹": {"content": "{白布束缚与感官包裹}\n简介：\n【场景/玩法描述】使用宽幅白布将受虐者全身层层包裹，制造均匀压力与束缚感。布内可预先放置振动道具或绳结，增强刺激。\n\n用法与交互细节：\n1. 从胸部到脚踝逐层缠绕，收紧至无法动弹，突出身体曲线。\n2. 白布可预先暴晒，利用冰凉触感或阳光气味作为感官元素。\n3. 包裹后受虐者行动能力受限，需依赖支配者引导行走，增加无助感。\n4. 可变体：使用不同材质（丝绸、麻布）、颜色或浸渍液体（如温水）改变体验。", "uid": 1895}, "高跟束缚行走挑战": {"content": "{高跟束缚行走挑战}\n简介：\n【场景/玩法描述】受虐者被全身束缚并穿上高跟鞋，在支配者牵引下进行短距离移动。每一步都需克服束缚与快感，同时面临摔倒或暴露的风险。\n\n用法与交互细节：\n1. 双腿被并拢包裹，仅留小步移动空间，高跟鞋增加平衡难度。\n2. 支配者用项圈牵绳引导，受虐者需绷紧肌肉保持姿态，移动中持续受到振动刺激。\n3. 设置障碍（如门槛、台阶）迫使受虐者做出羞耻动作（如扭动、跳跃）。\n4. 可变体：在公共场合边缘场景进行，或设定时间限制增加紧迫感。", "uid": 1896}, "多层束缚下的高潮崩溃": {"content": "{多层束缚下的高潮崩溃}\n简介：\n【场景/玩法描述】受虐者在全身多层束缚下被持续刺激，最终在获得许可或环境安全后彻底崩溃，经历长时间、高强度的高潮释放。\n\n用法与交互细节：\n1. 束缚物（绳、布）收紧全身，振动道具持续运作，将受虐者推向极限。\n2. 设定释放条件（如车门关闭、进入私密空间），受虐者一旦达成便失控释放。\n3. 支配者观察并评论释放过程，事后用言语羞辱（如“扭得像条毛毛虫”）。\n4. 可变体：释放后继续刺激导致连续高潮，或记录反应用于后续调教。", "uid": 1899}, "强制踮脚与下体威胁平衡装置": {"content": "{强制踮脚与下体威胁平衡装置}\n简介：\n【场景/玩法描述】受控者被吊成只能脚尖点地的姿势，下方升起可充气、震动或伸缩的威胁装置，迫使其在平衡、疲劳和下体压迫之间挣扎。\n\n用法与交互细节：\n1. 双腿并拢或脚踝固定，手腕吊高，使身体只能依靠脚尖维持重心。\n2. 地面装置抵住下体后缓慢充气、旋转或震动，身体一旦下沉就会承受更深压迫。\n3. 调教者可用倒计时、随机充放气或口令问答制造失衡压力，让受控者主动绷紧身体求稳。\n4. 可变体：气球、温水囊、震动棒、伸缩棍、电击或滴蜡联动。\n\n【包含类似变体】\n- 强制踮脚与充气扩张的极限平衡\n- 强制踮脚与下体威胁装置", "uid": 1901}, "双穴同时插入不规则震动棒": {"content": "{双穴同时插入不规则震动棒}\n简介：\n【场景/玩法描述】受虐者被拘束成无法动弹的姿势，双穴同时被插入表面带粗糙颗粒的震动棒。棒子以不规则模式震动、旋转，但只插入一半长度，制造欲求不满的刺激。内裤被强行提上，兜住棒子末端，弹力将棒子勒得更深。\n\n用法与交互细节：\n1. 受虐者需先被充分挑逗至湿润，但未高潮。\n2. 同时插入两根带颗粒的震动棒，仅插入一半。\n3. 开启不规则震动模式，可随机变化强度、方向。\n4. 可变体：可配合拘束衣或绳索，限制挣扎；可加入远程遥控，由调教者随机控制。", "uid": 1902}, "折叠拘束与手推车运输": {"content": "{折叠拘束与手推车运输}\n简介：\n【场景/玩法描述】受虐者被全身拘束后，折叠成跪姿，大腿与小腿折叠，上半身压在大腿上，臀部翘起，用皮带固定成“三折”状态，固定在手推车上运输。过程中受虐者完全无法动弹，且可能被运往未知地点。\n\n用法与交互细节：\n1. 先对受虐者进行全身紧缚，包括双腿并拢、手腕固定。\n2. 引导受虐者跪坐，将上半身下压至大腿，臀部翘起。\n3. 用皮带将身体折叠固定，再固定到手推车上。\n4. 可变体：运输途中可加入震动或暴露元素；目的地可以是调教者私人空间或公共场所。", "uid": 1903}, "强制高潮后的欲望不灭循环": {"content": "{强制高潮后的欲望不灭循环}\n简介：\n【场景/玩法描述】受虐者被全身拘束并涂抹挥发性媚药，双穴插入震动棒。在持续刺激下达到高潮，但高潮后欲望并未平息，反而因拘束和媚药迅速重新累积，陷入“高潮-累积-高潮”的循环，直至体力耗尽。\n\n用法与交互细节：\n1. 受虐者需穿着内层涂有媚药的紧身拘束衣。\n2. 双穴插入震动棒，持续刺激。\n3. 允许受虐者高潮，但高潮后不停止刺激，观察其欲望迅速回升。\n4. 可变体：可设定循环次数或时间限制；可加入言语羞辱，强调其无法满足的状态。", "uid": 1904}, "项圈牵引下的跳跃行进": {"content": "{项圈牵引下的跳跃行进}\n简介：\n【场景/玩法描述】受虐者全身紧缚，双腿并拢，脚踝固定，被戴上项圈。调教者拉扯项圈，迫使受虐者像木乃伊一样小跳前进。每次落地时全身肌肉绷紧，加剧束缚感和下体刺激。\n\n用法与交互细节：\n1. 受虐者需被束缚成双腿无法分开的状态。\n2. 戴上项圈并连接牵引绳。\n3. 调教者向前拉扯项圈，受虐者被迫跳跃跟随。\n4. 可变体：可设置障碍路线；可在跳跃过程中加入随机震动或电击。", "uid": 1905}, "内裤兜棒与皮带勒紧的持续压迫": {"content": "{内裤兜棒与皮带勒紧的持续压迫}\n简介：\n【场景/玩法描述】受虐者双穴插入震动棒后，被强行穿上超低腰内裤，内裤兜住棒子末端，弹力将棒子勒得更深。再从背后穿过一条皮带，向上提拉内裤和棒子，锁死固定，制造持续深入的压迫感。\n\n用法与交互细节：\n1. 插入震动棒后，为受虐者穿上紧身内裤，确保棒子被兜住。\n2. 使用皮带从背后穿过胯下，连接内裤或棒子末端。\n3. 用力向上提拉皮带，使棒子更深入，然后锁死。\n4. 可变体：可调节皮带松紧度；可配合震动模式变化。", "uid": 1906}, "强制叫醒束缚闹钟": {"content": "{强制叫醒束缚闹钟}\n简介：\n【场景/玩法描述】受虐者在睡眠中被全身束缚，手机被固定在敏感部位并设为强制叫醒模式，每隔固定时间振动并逐渐增强，迫使受虐者在无法挣脱的状态下持续承受刺激，直至调教者归来。\n\n用法与交互细节：\n1. 调教者趁受虐者昏睡时进行全身多层丝袜或织物捆绑，剥夺其视觉、言语和行动能力。\n2. 将手机调至闹钟或来电振动模式，塞入束缚层中紧贴敏感部位，设置递增强度与间隔。\n3. 受虐者醒来后无法挣脱，每次振动都引发全身摩擦与快感累积，陷入“渴望更强烈刺激却无法满足”的煎熬。\n4. 可变体：可替换为远程控制的跳蛋或震动棒，由调教者随机触发；或加入声音挑逗，如播放预录的羞辱语音。", "uid": 1909}, "丝袜编织全身束缚衣": {"content": "{丝袜编织全身束缚衣}\n简介：\n【场景/玩法描述】调教者使用多双丝袜（肉色、黑色、加厚等）对受虐者进行全身包裹式束缚，结合龟甲缚与多层袜套，形成一件紧贴肌肤的“丝袜衣”，既限制行动又通过材质摩擦持续刺激。\n\n用法与交互细节：\n1. 先穿多层连身丝袜打底，再以深色厚丝袜进行龟甲缚改良绑法，重点勒紧胸部、手臂与躯干。\n2. 四肢分别用丝袜分段捆绑，形成蝴蝶结状装饰，最后套上7层加厚丝袜作为外层封锁，防止挣脱。\n3. 口腔用调教者穿过的内裤或丝袜填塞，外部再缠裹多层，实现完全沉默。\n4. 可变体：可替换为不同材质（如蕾丝、皮革）或颜色，或加入低温蜡烛滴蜡封层。", "uid": 1910}, "录像回放式羞辱调教": {"content": "{录像回放式羞辱调教}\n简介：\n【场景/玩法描述】调教者将捆绑受虐者的全过程录制下来，在受虐者被束缚无法动弹时强制播放，让其以旁观者视角观看自己被物化、摆弄的细节，加深羞耻与无助感。\n\n用法与交互细节：\n1. 调教者在捆绑过程中用DV或手机拍摄，重点记录受虐者无意识状态下的身体被任意摆布的画面。\n2. 将视频连接至电视或投影，在受虐者清醒且被束缚时循环播放，配合现场挑逗（如抚摸、言语羞辱）。\n3. 受虐者被迫观看自己如何被一层层剥夺自由，同时身体仍承受实时刺激，形成双重心理冲击。\n4. 可变体：可加入受虐者事后反应的实时拍摄，形成“画中画”对比；或让受虐者事后写下观后感作为服从测试。", "uid": 1911}, "强制依赖型高潮许可": {"content": "{强制依赖型高潮许可}\n简介：\n【场景/玩法描述】受虐者在长时间束缚与刺激下被推到高潮边缘，但无法自行达到，必须由调教者通过特定动作（如深吻、直接刺激）给予“许可”才能释放，从而建立“高潮=调教者恩赐”的条件反射。\n\n用法与交互细节：\n1. 先通过束缚和间接刺激（如振动、摩擦）将受虐者欲望累积至临界点。\n2. 调教者观察受虐者反应，在其濒临崩溃时介入，用激烈方式（舌吻、手淫）直接触发高潮。\n3. 高潮后不立即解除束缚，保持亲密接触，强化“事后温存也由调教者掌控”的印象。\n4. 可变体：可加入“倒数许可”或“请求许可”的口头指令，受虐者必须说出指定台词才能获得高潮。", "uid": 1914}, "强制喂食与宠物化训练": {"content": "{强制喂食与宠物化训练}\n简介：\n【场景/玩法描述】调教者将受虐者束缚后，以“喂饭保姆”身份进行强制喂食，通过控制进食节奏和食物选择强化支配感。受虐者被要求像宠物一样接受喂食，并在过程中被言语戏弄和身体惩罚（如捏胸），加深服从意识。\n\n用法与交互细节：\n1. 受虐者被束缚成无法自行进食的状态，调教者用筷子或手直接喂食，故意放慢动作或移开食物，观察其渴望反应。\n2. 喂食时穿插惩罚：如咬到筷子则被捏敏感部位，或故意喂食受虐者不喜欢的食物。\n3. 调教者用亲昵但居高临下的语气（如“乖孩子”“小狗”）强化宠物身份，受虐者被允许在调教者怀里撒娇，但必须服从喂食节奏。\n4. 可变体：可加入口塞式喂食（通过空心口球灌入流食），或设定“只有被喂食才能进食”的长期规则。", "uid": 1918}, "围裙半裸家务与羞耻胁迫": {"content": "{围裙半裸家务与羞耻胁迫}\n简介：\n【场景/玩法描述】调教者命令受虐者只穿一件特制围裙进行家务劳动。围裙设计暴露，仅遮盖部分身体，造成“比全裸更羞耻”的心理效果。调教者通过言语威胁和倒计时，迫使受虐者服从，并在其工作时进行视奸或轻微骚扰，维持紧张感。\n\n用法与交互细节：\n1. 准备一件长度和宽度微妙的围裙，下摆极短，侧边暴露，背后仅靠系带固定，确保动作时容易走光。\n2. 调教者以“质疑品味”“蔑视权威”等罪名威胁，强制受虐者穿上，并设定倒计时增加紧迫感。\n3. 受虐者进行家务时，调教者在一旁悠闲监视，偶尔撩拨围裙边缘或触碰暴露部位，但不直接侵犯，保持羞耻感。\n4. 可变体：可规定“围裙是唯一允许的衣物”，持续一整天；或在家务中增加难度（如弯腰擦地），故意制造走光机会。", "uid": 1920}, "录音胁迫与服从誓言": {"content": "{录音胁迫与服从誓言}\n简介：\n【场景/玩法描述】调教者在惩罚或调教过程中，用录音设备记录受虐者被迫说出的羞耻话语（如“我喜欢被这样对待”“请再捆紧一点”），并以此作为要挟工具，确保其未来服从。录音成为长期控制手段，受虐者因害怕公开或加倍惩罚而不敢反抗。\n\n用法与交互细节：\n1. 在受虐者处于束缚或高潮边缘时，调教者逼问其感受，诱导说出“很舒服”“还想再来”等屈辱性自白。\n2. 用录音笔当场记录，并明确告知“敢赖账就加倍惩罚”，将录音作为“罪证”保存。\n3. 日后若受虐者表现不顺从，调教者播放录音或威胁公开，强化心理威慑。\n4. 可变体：可升级为视频录像，或要求受虐者亲笔写下服从契约并签名。", "uid": 1921}, "束缚状态下的强制喂食与口塞流食": {"content": "{束缚状态下的强制喂食与口塞流食}\n简介：\n【场景/玩法描述】受虐者被束缚并戴上空心口球，无法自行进食。调教者通过口球孔灌入流食或小块食物，控制其营养摄入。进食过程充满屈辱，受虐者只能被动吞咽，且常伴随口水直流，强化宠物化地位。\n\n用法与交互细节：\n1. 使用多孔空心口球塞住嘴巴，使受虐者无法闭合口腔，唾液不断流出。\n2. 调教者用注射器或漏斗将流食（如粥、汤）注入孔中，控制速度和分量，有时故意呛咳或溢出以增加羞辱。\n3. 喂食时配合言语羞辱，如“像小狗一样舔干净”，或要求受虐者做出乞食动作。\n4. 可变体：可混合使用不同味道的食物（如苦瓜汁）作为惩罚，或设定“只有完成某项任务才能获得食物”的规则。", "uid": 1922}, "按摩陷阱与束缚下的强制放松": {"content": "{按摩陷阱与束缚下的强制放松}\n简介：\n【场景/玩法描述】调教者以“帮助放松”为名，将受虐者束缚在桌子或床上进行按摩。按摩并非真正缓解疲劳，而是集中刺激敏感部位，使受虐者在无法动弹的状态下被迫接受快感，形成“关怀”与“折磨”的混淆，加深心理依赖。\n\n用法与交互细节：\n1. 调教者主动提出按摩，但要求受虐者先接受束缚（如绑在桌腿上），并戴上口塞防止抗议。\n2. 按摩时避开真正疲劳的肌肉，专攻敏感带（如大腿内侧、胸部、下体），手法挑逗而非治疗。\n3. 受虐者因束缚无法反抗，只能发出呻吟，调教者则假装正经地继续“按摩”，制造荒诞的屈辱感。\n4. 可变体：可设定“每次运动后必须接受此类按摩”的规则，或使用按摩油增加刺激，甚至引入振动按摩器。", "uid": 1923}, "公开场合的隐蔽束缚与远程控制": {"content": "{公开场合的隐蔽束缚与远程控制}\n简介：\n【场景/玩法描述】受虐者在看似正常的日常活动中，衣物下隐藏着绳索或丝袜束缚，甚至佩戴远程控制的振动道具。调教者通过手机等设备远程激活，使受虐者在公共场合突然遭受刺激，必须强忍反应以免暴露，形成极大的心理压力。\n\n用法与交互细节：\n1. 在受虐者出门前，用细绳或丝袜在衣物内进行轻度束缚（如胸部、胯部），确保外观无异常。\n2. 调教者通过电话或APP控制隐藏的振动器，选择在受虐者与他人交谈、开会等关键时刻启动。\n3. 受虐者必须保持正常表情和举止，否则将面临更严厉的惩罚，调教者可远程监控其反应。\n4. 可变体：可加入远程监听设备，让调教者听到受虐者压抑的喘息；或设定“若被发现则公开羞辱”的规则。", "uid": 1924}, "遥控跳蛋外卖任务": {"content": "{遥控跳蛋外卖任务}\n简介：\n【场景/玩法描述】被调教者身穿隐藏绳缚和固定跳蛋的衣物，被派往陌生地点执行看似普通的任务（如送外卖）。途中跳蛋可能被遥控启动，被调教者需在公共场合保持镇定，并应对接收者的盘问或骚扰。\n\n用法与交互细节：\n1. 调教者将跳蛋固定在被调教者下体，用胶带和绳子加固，并为其穿上能遮盖的外衣。\n2. 设定一个任务目标（如将物品送至某地址），被调教者必须步行或乘坐公共交通前往。\n3. 途中调教者可随机遥控跳蛋，强度由低到高；接收者可能是知情人，会故意刁难或揭穿。\n4. 可变体：任务物品中可藏有遥控器或羞耻道具；接收者可以是陌生人或调教者的同伙；任务失败有惩罚。", "uid": 1927}, "绳衣束缚下的强制优雅": {"content": "{绳衣束缚下的强制优雅}\n简介：\n【场景/玩法描述】被调教者身体被复杂绳衣束缚，但外穿正常衣物。在与人互动时，必须保持优雅坐姿或站姿，以免暴露绳缚或走光。绳衣的摩擦和压迫持续刺激身体，迫使被调教者在羞耻与欲望间挣扎。\n\n用法与交互细节：\n1. 调教者用麻绳在被调教者身上编织紧缚绳衣，重点刺激胸、胯等部位，并确保绳结卡在敏感点。\n2. 给被调教者穿上能遮盖绳衣但款式紧身或短小的外衣，使其时刻担心暴露。\n3. 要求被调教者在他人面前保持端庄姿态，任何失态（如扭动、脸红）都会引来怀疑或惩罚。\n4. 可变体：绳衣可加入铃铛或小饰物，增加暴露风险；互动对象可以是毫不知情的普通人，也可以是调教者的同伙。", "uid": 1928}, "衣物意外滑落与绳缚暴露": {"content": "{衣物意外滑落与绳缚暴露}\n简介：\n【场景/玩法描述】被调教者外穿衣物因动作或设计缺陷意外滑落，露出内里的绳缚或性玩具，在他人面前瞬间陷入羞耻绝境。这一意外常被旁观者利用，成为进一步胁迫的契机。\n\n用法与交互细节：\n1. 被调教者穿着低领、宽松或易滑落的衣物，内藏绳缚或玩具。\n2. 在与人互动时，因挣扎、弯腰或他人触碰，披肩、衣领等滑落，露出肩膀、胸部及绳结。\n3. 旁观者（可能是陌生人或调教者同伙）表现出惊讶，随即转为戏谑，用言语羞辱并可能动手验证。\n4. 可变体：滑落可设计为“意外”或由调教者远程操控（如事先弄松衣物）；暴露后，旁观者可选择帮助掩盖或进一步玩弄。", "uid": 1932}, "束缚状态下的多人轮流攻陷竞赛": {"content": "{束缚状态下的多人轮流攻陷竞赛}\n简介：\n【场景/玩法描述】一名受虐者被牢固束缚在椅子上，四肢张开呈羞耻姿势，口中塞有堵嘴物。四名调教者以游戏竞赛方式轮番上阵，每人限时十分钟，目标是最先让受虐者达到高潮。胜者成为“国王”，可命令在场所有人做任何事。规则包括：禁止身体实质伤害、保留受虐者身上的绳衣和内衣、每回合至少让受虐者发出一次呻吟否则判负、道具和方法任选、换人间隔一分钟。\n\n用法与交互细节：\n1. 受虐者被束缚成无法动弹的姿势，增强无助感和羞耻感，同时绳结卡在敏感部位，轻微动作即带来刺激。\n2. 调教者轮流进行，每人需在十分钟内评估受虐者的忍耐极限，选择策略：直接猛攻、精神羞辱、道具辅助或消极拖延。\n3. 前一回合留下的道具（如润滑液、跳蛋）可由下一人选择保留或移除，增加战术变化。\n4. 可变体：可调整人数、时间限制、胜利条件（如达到特定次数高潮或失禁），或引入观众投票机制。", "uid": 1933}, "绳衣日常化与暴露羞辱": {"content": "{绳衣日常化与暴露羞辱}\n简介：\n【场景/玩法描述】受虐者在日常外出前被强制穿上绳衣（龟甲缚），外罩宽松衣物遮掩。在社交场合中，绳衣持续刺激身体，而一旦外衣被除去，绳衣和内衣下的身体完全暴露于他人眼前，受虐者被质问为何如此打扮，被迫承认自己的“变态”喜好。\n\n用法与交互细节：\n1. 调教者以“增强锻炼效果”等借口，在受虐者身上捆绑绳衣，绳结卡在敏感部位，使其在行走、运动时不断受到刺激。\n2. 受虐者穿着绳衣赴约，途中被同伙控制，外衣被脱去，绳衣和内衣暴露，成为羞辱焦点。\n3. 调教者用脚踩压绳结，加剧刺激，同时言语羞辱，迫使受虐者承认享受被束缚的感觉。\n4. 可变体：绳衣可隐藏于不同服装下（如校服、职业装），暴露场景可设定在公共场合或熟人面前，增加社死风险。", "uid": 1935}, "足技挑逗与绳结刺激": {"content": "{足技挑逗与绳结刺激}\n简介：\n【场景/玩法描述】调教者穿着丝袜，用脚踩压、撵动受虐者下体处的绳结，利用丝袜的柔滑与绳结的粗糙形成反差刺激，瓦解受虐者的反抗意志。受虐者被束缚成M字开腿姿势，门户大开，无法躲避，只能呻吟扭动。\n\n用法与交互细节：\n1. 受虐者被固定成双腿大张的姿势，绳结恰好卡在敏感部位。\n2. 调教者用脚掌踩住绳结，逐渐加重力道，并左右撵动，制造持续而多变的刺激。\n3. 可配合言语羞辱，如嘲笑受虐者的反应，或命令其看着被玩弄的部位。\n4. 可变体：可使用不同材质的袜子（棉袜、网袜、裸足），或结合鞋底踩踏；绳结可替换为跳蛋、冰块等道具。", "uid": 1937}, "感官剥夺与随机同伴挑逗": {"content": "{感官剥夺与随机同伴挑逗}\n简介：\n【场景/玩法描述】通过遮蔽视觉、限制发声和固定身体，让受控者无法预判下一次触碰；刺激来源可以是工具、气息、温度，也可以是同伴身体贴近和耳语。\n\n用法与交互细节：\n1. 先用眼罩、丝袜、口枷或全身拘束具剥夺视觉与语言，使受控者只能依靠触觉和听觉判断环境。\n2. 调教者或同伴随机切换羽毛、牙刷、毛刷、手指、身体摩擦、低语和吹气，避免形成规律。\n3. 可加入温度、震动、旋转平台或远程指令，让期待、落空和突然接触持续累积。\n4. 可变体：单人随机挑逗、双人夹击、紧身皮衣同伴、温度刺激、震动小道具。\n\n【包含类似变体】\n- 感官剥夺与随机挑逗\n- 感官剥夺下的同伴挑逗", "uid": 1941}, "高潮边缘的定时折磨": {"content": "{高潮边缘的定时折磨}\n简介：\n【场景/玩法描述】设定明确时间回合（如两分钟），调教者通过手法将受虐者推至高潮边缘，但故意在最后时刻停止，反复多次。利用“比赛”或“游戏”框架，让受虐者既期待释放又被迫忍耐，最终在时间结束时由下一位调教者接手，形成接力式折磨。\n\n用法与交互细节：\n1. 宣布回合时间，受虐者被束缚固定，无法自行解脱。\n2. 调教者集中攻击胸、下体等主敏感带，快速积累快感，观察受虐者反应逼近临界点时突然停手。\n3. 可穿插言语挑逗，如“还差一点就让你高潮”，强化挫败感。\n4. 可变体：引入倒计时提示音，或让受虐者自己倒数，增加心理压力；若受虐者提前高潮则施加惩罚。", "uid": 1942}, "绳缚与运动内衣的复合拘束": {"content": "{绳缚与运动内衣的复合拘束}\n简介：\n【场景/玩法描述】受虐者穿着紧身高弹运动内衣，外部再施以菱形绳网缚，绳子特意卡在胸部根部、下体等位置，形成双重挤压。运动内衣的贴身弹性将绳子的勒压感均匀传递，同时凸显身体曲线，使受虐者轻微动弹即引发全身摩擦快感。\n\n用法与交互细节：\n1. 选择尺码略小的运动内衣，确保紧密包裹胸、臀，再以棉绳或麻绳进行菱形缚。\n2. 绳结刻意打在阴部、乳沟等位置，可嵌入小型震动器或跳蛋。\n3. 受虐者被缚于椅上，任何挣扎都会牵动绳结摩擦敏感点。\n4. 可变体：在绳子上涂抹催情乳液或冷却凝胶，增强皮肤敏感度；或改用皮革拘束带搭配连体泳衣。", "uid": 1943}, "催情乳液的全身涂抹与晾干折磨": {"content": "{催情乳液的全身涂抹与晾干折磨}\n简介：\n【场景/玩法描述】将特制催情乳液从颈部至大腿均匀涂抹，乳液干燥后皮肤紧绷并大幅提升敏感度，轻微动作即引发强烈快感。配合加湿器喷出含催情成分的水雾，维持皮肤表面湿润与凉意，形成“干燥-湿润”循环刺激，使受虐者持续处于发情状态却无法高潮。\n\n用法与交互细节：\n1. 乳液可含薄荷、辣椒素等成分，先涂抹于胸、腹、大腿内侧等区域，等待自然晾干。\n2. 加湿器内添加稀释乳液或香薰精油，对准受虐者身体持续喷雾。\n3. 受虐者被束缚，无法抓挠或擦拭，只能忍受瘙痒与快感交织。\n4. 可变体：用吹风机冷热风交替加速干燥，或让受虐者自己涂抹乳液作为服从测试。", "uid": 1944}, "敏感带图谱与教学式调教": {"content": "{敏感带图谱与教学式调教}\n简介：\n【场景/玩法描述】调教者一边对受虐者施加刺激，一边向旁观者（或受虐者本人）解说身体敏感带的分布与攻击技巧，如手臂内侧、大腿内侧、肚脐、脖颈等次要部位的战略价值。将调教过程变成“教学示范”，既羞辱受虐者，又传授技巧。\n\n用法与交互细节：\n1. 调教者用指示棒或手指点出受虐者身体各部位，讲解其敏感度与反应预期。\n2. 实际演示不同工具（羽毛、牙刷、指腹）在不同部位的效果，并让旁观者观察受虐者反应。\n3. 可邀请旁观者参与尝试，或让受虐者自己复述敏感带位置作为服从训练。\n4. 可变体：制作“敏感带评分表”，由旁观者打分；或让受虐者蒙眼猜测被触碰的部位。", "uid": 1948}, "同伴强制装扮与旁观羞辱": {"content": "{同伴强制装扮与旁观羞辱}\n简介：\n【场景/玩法描述】调教者命令受虐者的同伴（同为受训者）为其穿上特制拘束衣，全程在监控下进行。同伴被迫扮演“协助者”角色，言语挑逗并透露衣物陷阱，加剧受虐者的心理羞耻和绝望。\n\n用法与交互细节：\n1. 调教者远程下达指令，同伴需严格按照步骤为受虐者穿戴，不得有误。\n2. 穿戴过程中，同伴用轻佻或同情语气告知衣物中的机关（如媚药、锁扣机制），制造心理压力。\n3. 同伴可进行有限度的身体接触（如亲吻、抚摸）以测试拘束效果或激发反应。\n4. 可变体：同伴可被要求互相装扮，形成竞争或合作；调教者可突然改变指令，让同伴施加额外惩罚；监控可转为公开直播，增加社死风险。", "uid": 1952}, "体液控制与饮料下药": {"content": "{体液控制与饮料下药}\n简介：\n【场景/玩法描述】调教者通过同伴给受虐者提供掺有媚药或利尿剂的饮料，并限制饮用量以防其过早失控。受虐者需在药效、束缚和挑逗下管理身体反应，避免失禁或过度兴奋，否则将陷入更严酷的折磨。\n\n用法与交互细节：\n1. 同伴以关怀姿态提供饮料，但告知“少喝以免失态”，制造两难。\n2. 饮料中药物可延迟发作，受虐者需在未知中保持警惕。\n3. 调教者通过监控观察，在药效发作时施加额外刺激（如振动、束缚调整）。\n4. 可变体：药物可改为催乳、敏感倍增或幻觉剂；饮料可伪装成普通水或强制灌服；可设置“安全词”但失效条件与体液量挂钩。", "uid": 1955}, "皮带包装与身体重塑": {"content": "{皮带包装与身体重塑}\n简介：\n【场景/玩法描述】使用多条皮带在紧身衣外进行全身捆绑，刻意勒出凹凸曲线，将身体变为“包装好的礼物”。\n\n用法与交互细节：\n1. 受虐者先穿上紧身衣，再被多条皮带从胸部、腰部到腿部层层束缚。\n2. 皮带位置刻意制造挤压和凸起，如胸部上下各一条，中间再加一条加深凹陷。\n3. 束缚后受虐者行动困难，只能依赖调教者移动。\n4. 可变体：皮带可替换为绳索、绷带，紧身衣可改为其他贴身衣物。", "uid": 1959}, "电话中的对称束缚共鸣": {"content": "{电话中的对称束缚共鸣}\n简介：\n【场景/玩法描述】两处受虐者同时被束缚，通过电话互相听见对方的呻吟，产生共鸣和想象，加剧欲望。\n\n用法与交互细节：\n1. 调教者A控制受虐者A，调教者B控制受虐者B，双方通话。\n2. 受虐者只能发出“呜呜”声，通过声音想象对方状态。\n3. 调教者故意让双方听到彼此的挣扎，制造心理刺激。\n4. 可变体：可扩展为多人电话会议，或使用视频通话增加视觉元素。", "uid": 1962}, "缎带蝴蝶结人体包装": {"content": "{缎带蝴蝶结人体包装}\n简介：\n【场景/玩法描述】用宽缎带在裸体上打出多个蝴蝶结进行束缚，兼具美观与拘束功能，且易于一次性解脱。\n\n用法与交互细节：\n1. 受虐者裸体，用红色缎带从脚踝到脖子缠绕，每个交叉点打蝴蝶结。\n2. 嘴巴也用缎带绑住，但不塞口，保持呼吸和说话能力。\n3. 调教者可逐一拉开蝴蝶结，快速解除束缚。\n4. 可变体：缎带颜色和材质可换，蝴蝶结位置可集中在敏感部位。", "uid": 1964}, "捆绑逃脱与工具利用": {"content": "{捆绑逃脱与工具利用}\n简介：\n【场景/玩法描述】两名被束缚者（一人被绳缚，一人被多层丝袜包裹）在施虐者昏迷时，通过眼神和呻吟交流，利用身体蠕动爬行获取美工刀，割断绳索逃脱。过程中下体持续受到震动刺激，增加逃脱难度和羞耻感。\n\n用法与交互细节：\n1. 束缚者A被专业绳缚但留有破绽（手脚未相连、未固定、未蒙眼），可利用身体蠕动移动。\n2. 束缚者B被多层弹性织物（如丝袜）严密包裹，完全无法自主移动，只能通过声音和眼神指引A。\n3. 逃脱工具（美工刀）藏在附近衣物口袋中，A需用被捆在背后的手摸索取出并割绳。\n4. 可变体：工具可替换为剪刀、玻璃碎片等；束缚方式可改为胶带、皮带；增加时间限制（施虐者即将苏醒）提升紧张感。", "uid": 1965}, "下体震动干扰下的逃脱挑战": {"content": "{下体震动干扰下的逃脱挑战}\n简介：\n【场景/玩法描述】在被束缚的状态下，下体塞入震动器并持续刺激，对象必须在快感干扰中保持清醒，完成逃脱或任务。震动强度可被他人遥控，增加不可预测性。\n\n用法与交互细节：\n1. 束缚前将震动器插入并固定，遥控器由施虐者或另一被束缚者保管。\n2. 震动强度可随机变化，或根据对象表现调整（如挣扎越剧烈震动越强）。\n3. 对象需在震动干扰下进行精细操作（如割绳、开锁），失败则增加束缚或惩罚。\n4. 可变体：使用多个震动器（前后夹击）；震动模式与羞辱言语同步；逃脱成功后遥控器仍被他人持有，延续控制。", "uid": 1967}, "绳网下体勒紧与联动刺激": {"content": "{绳网下体勒紧与联动刺激}\n简介：\n【场景/玩法描述】用绳索在受虐者下体附近编织绳网，以死结为中心向多个方向发散，绕过腰、大腿等部位，使任何身体动作都会牵动绳网勒紧敏感区域，形成挣扎越剧烈刺激越强的反馈循环。\n\n用法与交互细节：\n1. 在受虐者小腹偏下靠近敏感部位处打一个死结作为中心，分出六道绳索分别从侧腰、大腿外侧、腹股沟绕至身后，相互牵连形成兜住臀部的绳网。\n2. 确保绳网紧密贴合肌肤，受虐者腰部摆动或腿部移动时，绳索会勒紧下体、臀部等敏感区。\n3. 可结合跳蛋或震动棒预先放入，使绳网压迫震动源，增强刺激。\n4. 可变体：调整绳网密度与死结位置，针对不同敏感点（如阴蒂、会阴）；或使用不同粗细、材质的绳索改变勒入感。", "uid": 1974}, "强制口塞与多层堵嘴": {"content": "{强制口塞与多层堵嘴}\n简介：\n【场景/玩法描述】用内裤、袜子等私密物品塞满受虐者口腔，再用丝袜或胶带缠绕封口，彻底剥夺言语能力并施加羞耻感。物品可带有调教者的体液或气味，强化心理屈辱。\n\n用法与交互细节：\n1. 选择带有调教者或第三者体味/污渍的私密衣物（如内裤、袜子），揉成团塞入受虐者口中，可多层填充至口腔鼓胀。\n2. 用弹性丝袜或布条绕嘴部缠绕数圈，在后脑打结固定，确保物品不会吐出。\n3. 观察受虐者因无法言语而发出的含糊呻吟，以及因羞耻产生的抗拒表情。\n4. 可变体：使用口球、口枷等专业道具替代衣物；或填充不同味道的物品（如沾有精液的内裤）增加感官刺激。", "uid": 1975}, "双人陷阱与角色反转": {"content": "{双人陷阱与角色反转}\n简介：\n【场景/玩法描述】调教者设下陷阱，引诱另一角色（如旧恋人、同伴）前来救援受虐者，实则将其一并捕获。通过计谋反转，使原本的救援者沦为新的受虐对象，形成双人同时被拘束的羞辱场景。\n\n用法与交互细节：\n1. 调教者故意留下线索或制造机会，让救援者闯入。在救援者放松警惕时，利用隐藏手段（如假意解绑、突然袭击）将其制服。\n2. 将救援者与受虐者以不同方式束缚（如一人绳缚，一人丝袜包裹），并排或面对面放置，制造对比羞辱。\n3. 调教者可言语嘲讽救援者的失败，强调其自投罗网的愚蠢，加深心理屈辱。\n4. 可变体：救援者与受虐者身份可互换（如前辈/后辈、上司/下属）；或设置多重陷阱，层层反转。", "uid": 1977}, "私物羞辱与身份贬低": {"content": "{私物羞辱与身份贬低}\n简介：\n【场景/玩法描述】调教者使用受虐者或第三者的私密物品（如脏内裤、丝袜）进行堵嘴、包裹等行为，并配合言语嘲讽，强调其身份落差与耻辱处境，摧毁自尊。\n\n用法与交互细节：\n1. 收集具有象征意义的物品（如情敌的衣物、受虐者自己的内衣），在束缚过程中使用，并说明物品来源。\n2. 调教者用语言贬低受虐者，如嘲笑其失败、比较其与情敌的差距，强化羞耻感。\n3. 可让受虐者面对镜子，观察自己被羞辱的装扮，加深心理冲击。\n4. 可变体：使用受虐者珍视的物品（如礼物、制服）进行破坏或玷污；或让第三者旁观羞辱过程。", "uid": 1980}, "捆绑送餐任务": {"content": "{捆绑送餐任务}\n简介：\n【场景/玩法描述】被调教者被束缚成粽子，胸前固定矮桌运送晚餐，下体塞入振动道具，口球或眼罩剥夺感官，需在快感干扰下协作完成任务。\n\n用法与交互细节：\n1. 调教者将受虐者上半身用麻绳捆紧，双手反绑，胸部勒出；下半身大腿并拢捆至膝盖，限制步幅。\n2. 在受虐者下体塞入遥控跳蛋，调教者持有开关，途中可随机调整振动强度。\n3. 受虐者胸前用绳子固定矮桌，桌上放置易洒的汤菜，增加行动难度。\n4. 可变体：可改为单人任务，增加蒙眼或口球；或双人协作，一人蒙眼一人堵嘴，通过简单信号沟通。", "uid": 1981}, "四马攒蹄束缚下的无助感": {"content": "{四马攒蹄束缚下的无助感}\n简介：\n【场景/玩法描述】受虐者被四马攒蹄（四肢反绑至背后）捆成一团，侧躺于地，完全丧失行动能力，只能被动承受调教者的玩弄。\n\n用法与交互细节：\n1. 用麻绳将受虐者手腕和脚踝分别捆紧，然后弯曲双腿，将手腕与脚踝绑在一起，形成弓形。\n2. 可额外捆绑胸部、大腿，使身体更加蜷缩，增加束缚感和羞耻感。\n3. 调教者可用脚踩踏、踢动受虐者身体，或将其置于角落观察其无助挣扎。\n4. 可变体：结合口球、眼罩等感官剥夺道具；或放置在公开场合边缘，增加被发现的风险。", "uid": 1983}, "远程遥控跳蛋的公共场合任务": {"content": "{远程遥控跳蛋的公共场合任务}\n简介：\n【场景/玩法描述】受虐者体内塞入遥控跳蛋，在送餐、行走等日常任务中，调教者远程控制振动强度，迫使受虐者在快感中保持镇定。\n\n用法与交互细节：\n1. 将跳蛋塞入受虐者阴道或后庭，调教者通过手机或遥控器控制开关和强度。\n2. 受虐者需完成特定任务（如端汤、行走回廊），若发出声音或洒出物品则受惩罚。\n3. 调教者可随机改变振动模式，观察受虐者反应，增加心理压迫。\n4. 可变体：多人同时进行，比较谁先高潮；或与捆绑结合，限制行动能力。", "uid": 1984}, "蒙眼与堵嘴的协作挑战": {"content": "{蒙眼与堵嘴的协作挑战}\n简介：\n【场景/玩法描述】两名受虐者一人蒙眼、一人堵嘴，在束缚状态下通过有限信号协作完成移动或搬运任务。\n\n用法与交互细节：\n1. 将一人眼睛蒙住，另一人嘴巴塞住，两人均被捆绑限制行动。\n2. 堵嘴者通过“嗯”一声或两声等简单信号指示方向，蒙眼者需信任并执行。\n3. 任务可设置为穿越障碍、运送物品等，途中增加振动或骚扰增加难度。\n4. 可变体：可交换角色，或增加第三人作为干扰者；也可在公开场合进行，增加羞耻感。", "uid": 1985}, "胸部承重与餐桌束缚": {"content": "{胸部承重与餐桌束缚}\n简介：\n【场景/玩法描述】受虐者胸部被绳索勒出，胸前固定矮桌作为“人肉餐桌”，桌上放置菜肴，受虐者需保持平衡运送。\n\n用法与交互细节：\n1. 用绳子从乳房根部捆紧，使胸部突出，然后将矮桌卡在胸部下方，用绳子固定。\n2. 桌上放置易洒的汤菜，受虐者行走时需极度小心，否则会弄脏自身。\n3. 可结合口球，让口水滴落桌面，增加羞辱感。\n4. 可变体：调教者可直接从桌上取食，或让受虐者跪姿充当茶几。", "uid": 1986}, "绳缚下的身份揭露与羞耻": {"content": "{绳缚下的身份揭露与羞耻}\n简介：\n【场景/玩法描述】受虐者被捆绑后，衣服被掀开，暴露出隐藏的束缚痕迹或玩具，导致秘密被同伴发现，产生羞耻与共情。\n\n用法与交互细节：\n1. 受虐者A被调教者捆绑并穿上宽松衣物遮掩，但在与受虐者B扭打时衣物被掀开，露出绳痕或跳蛋。\n2. B同样被束缚，两人发现彼此都是调教者的玩物，产生复杂情绪（敌意、同情、羞耻）。\n3. 调教者可利用此场景加剧心理羞辱，如让她们互相评论对方的身体。\n4. 可变体：可设置多人场景，逐一揭露秘密；或让受虐者被迫自己掀开衣物展示。", "uid": 1987}, "人形文具台与物品放置Play": {"content": "{人形文具台与物品放置Play}\n简介：\n【场景/玩法描述】被束缚者被固定在桌面上，充当“文具盒”，任由调教者将文具等小物件放置、夹在身体各部位（耳、肩、乳沟等）。被束缚者需保持静止，否则物品掉落。调教者以游戏心态进行，被束缚者因无法反抗而产生屈辱感。\n\n用法与交互细节：\n1. 被束缚者需被牢固捆绑，使其无法自行移除物品，但可保留轻微活动能力以增加紧张感。\n2. 调教者选择轻小、不易造成伤害的物品（如笔、尺、橡皮），放置于被束缚者身体凹陷或突出部位，如耳廓、锁骨窝、乳沟、肩头等。\n3. 可设定规则：每掉落一件物品，增加束缚时间或惩罚。\n4. 可变体：使用冰冷、有纹理或震动物品增强感官刺激；或要求被束缚者完成简单任务（如保持平衡）以换取解除。", "uid": 1989}, "紧身胶衣的渐进式束缚体验": {"content": "{紧身胶衣的渐进式束缚体验}\n简介：\n【场景/玩法描述】被束缚者穿上量身定制的涂胶紧身衣，体验从脚踝到颈部逐步被包裹、压缩的过程。紧身衣成为第二层皮肤，带来持续的紧绷感、摩擦声和行动不便，同时凸显身体曲线，产生裸露般的羞耻感。\n\n用法与交互细节：\n1. 紧身衣需为涂胶或类似高弹性、光滑材质，设计为全身包裹（可开口部）。\n2. 穿着过程由被束缚者自行完成或调教者协助，强调拉链从下往上拉合时的渐进束缚感。\n3. 穿着后，被束缚者行动受限，任何动作都会产生材质摩擦声，增强心理刺激。\n4. 可变体：可搭配不同开口设计（如胸部、胯部拉链）便于后续调教；或在紧身衣外叠加皮带、绳索等额外束缚。", "uid": 1992}, "感官剥夺下的喂食Play": {"content": "{感官剥夺下的喂食Play}\n简介：\n【场景/玩法描述】被束缚者被蒙眼、堵嘴或束缚手脚，无法自行进食，由调教者进行喂食。喂食过程可夹杂正常食物与调教道具（如口球），被束缚者因无法分辨而产生紧张与依赖感。\n\n用法与交互细节：\n1. 被束缚者需处于无法视物或无法使用双手的状态。\n2. 调教者先喂食正常食物，建立信任，然后突然替换为堵嘴物（如带橡胶球的口塞），完成束缚升级。\n3. 喂食时可配合言语戏弄，如“张大嘴”，增加被束缚者的期待与羞耻。\n4. 可变体：使用不同口味、温度的食物；或要求被束缚者猜食物以换取奖励。", "uid": 1994}, "束缚捆绑下的亲密依赖": {"content": "{束缚捆绑下的亲密依赖}\n简介：\n【场景/玩法描述】受虐者被束缚皮带捆成一团，无法动弹，只能依赖调教者的体温和体香获得安慰。调教者利用这种状态进行心理操控，通过肢体接触和言语挑逗加深受虐者的依赖感。\n\n用法与交互细节：\n1. 调教者将受虐者用束缚皮带捆成无法自主行动的状态，放置在自己身边。\n2. 调教者通过抚摸、拥抱等亲密接触，让受虐者产生安全感与依赖。\n3. 调教者在受虐者耳边低语，分析当前困境，让受虐者感到不安，从而更紧地依附调教者。\n4. 可变体：束缚工具可换成绳索、枷锁等；亲密接触可加入体温传导、心跳声等感官刺激。", "uid": 1997}, "暴露礼服与身体曲线强调": {"content": "{暴露礼服与身体曲线强调}\n简介：\n【场景/玩法描述】受虐者被迫穿上极度紧身、暴露的晚礼服，礼服设计强调身体曲线，限制行动，并带有项圈等束缚元素，使其在公开场合成为被观赏的物品。\n\n用法与交互细节：\n1. 礼服采用紧身剪裁，腰部、臀部、大腿紧绷，裙摆窄小，只能小步行走，强制保持优雅姿态。\n2. 礼服背部全裸，胸前吊带连接皮革项圈，项圈可锁闭，需按隐藏按钮才能打开，增加被控制感。\n3. 礼服面料顺滑贴肤，强调身体每一处曲线，虽暴露不多但极具诱惑力。\n4. 可变体：礼服颜色、材质可换；项圈可加入铃铛、链条等配件；可搭配高跟鞋、长手套等增强束缚感。", "uid": 2001}, "透明纱衣与网衣的欲拒还迎": {"content": "{透明纱衣与网衣的欲拒还迎}\n简介：\n【场景/玩法描述】受虐者身穿仿古透明纱衣，内着黑色连体网衣，关键部位仅用绸带和方巾勉强遮挡，营造出欲拒还迎的致命诱惑，使其在公开场合承受羞耻与目光侵犯。\n\n用法与交互细节：\n1. 外层纱衣薄如蝉翼，视线可穿透，内层网衣紧裹全身，网眼细密，勾勒出身体轮廓。\n2. 胸部用水蓝色绸带缠绕，仅遮住关键点，上下轮廓暴露；下身系水蓝色方巾，正面勉强遮住私处，背面只遮住臀部上半。\n3. 受虐者因羞耻而不敢动弹，任何动作都可能导致方巾滑落或绸带移位，增加暴露风险。\n4. 可变体：纱衣可换成蕾丝罩袍；网衣可换成绳衣；遮挡物可换成珍珠链、羽毛等。", "uid": 2002}, "罚酒灌酒与屈辱姿势": {"content": "{罚酒灌酒与屈辱姿势}\n简介：\n【场景/玩法描述】在公开场合，权威人物以罚酒为名，将受虐者双手反绑、蒙眼，强迫其跪在胯下，用大腿夹住肩膀，以特定姿势灌酒，甚至将酒浇在舌尖上，制造屈辱与服从。\n\n用法与交互细节：\n1. 权威人物命令手下将受虐者双手用领带反绑，蒙住眼睛，使其失去视觉和行动自由。\n2. 受虐者被按着肩膀跪在权威人物面前，脸正对胯下，权威人物用大腿夹住其肩膀固定头部。\n3. 灌酒方式可升级：第一杯直接灌入口中，第二杯要求伸出舌头，将酒缓缓浇在舌尖上，受虐者需仰头接酒。\n4. 可变体：饮品可换成其他液体；束缚工具可换成手铐、绳索；姿势可改为趴在桌上或躺在地上。", "uid": 2003}, "温泉绳缚与自我捆绑表演": {"content": "{温泉绳缚与自我捆绑表演}\n简介：\n【场景/玩法描述】在温泉中，受虐者按照支配者的示意，用浸湿的麻绳对自己进行龟甲缚等复杂捆绑。温水的浸泡使绳子和皮肤变得柔软，减少疼痛感，增强束缚的贴合度。受虐者在支配者脚趾的“鼓励”下，不断收紧绳子，直至全身被密密麻麻的绳网覆盖，仅胸部等部位凸起。\n\n用法与交互细节：\n1. 支配者提前准备大量麻绳，在温泉中浸泡使其柔软。\n2. 受虐者赤裸进入温泉，在支配者注视下开始自我捆绑，从龟甲缚开始逐步增加绳圈。\n3. 支配者用脚趾轻踩或拨弄受虐者身体，作为无声的指令和鼓励。\n4. 可变体：可改用其他材质的绳索；温泉可替换为浴缸或泳池；自我捆绑可改为支配者动手，但保留受虐者主动收紧的环节。", "uid": 2008}, "反拜观音手臂拘束与挺胸暴露": {"content": "{反拜观音手臂拘束与挺胸暴露}\n简介：\n【 受虐者心理。\n4. 可变体：衣物意外被他人掀开或滑落，导致束缚暴露，引发羞耻质问或调戏；或受虐者被迫主动向特定人展示。", "uid": 2019}, "强制换装与束缚晚礼服": {"content": "{强制换装与束缚晚礼服}\n简介：\n【场景/玩法描述】在社交场合中，调教者以“配套”为名，为受虐者换上特制的束缚服装。晚礼服下隐藏着单筒束缚靴和皮革手臂套，将双腿和双臂牢牢固定，外观却保持优雅。服装内层预先涂有催情药物，随时间推移逐渐引发瘙痒和快感，瓦解受虐者的抵抗意志。\n\n用法与交互细节：\n1. 调教者以“礼物”或“惩罚”为由，在公开场合为受虐者换上束缚服装，强调“与礼服配套”，维持表面体面。\n2. 束缚靴将双腿并拢束缚，手臂套将双臂反绑固定，受虐者无法站立或反抗，只能依靠他人搀扶。\n3. 服装内层的药物缓慢生效，受虐者逐渐感到瘙痒、灼热和快感，心理上从抗拒转为渴求更多刺激。\n4. 可变体：束缚服装可替换为其他款式（如连体衣、束腰），药物类型可改为敏感度提升或意识模糊剂，场景可改为私人派对或办公室。", "uid": 2021}, "药物催情与意志瓦解": {"content": "{药物催情与意志瓦解}\n简介：\n【场景/玩法描述】受虐者在不知情下接触催情药物（如涂抹在衣物内层），逐渐出现身体发热、瘙痒、快感增强等症状。药物侵蚀理智，使受虐者从抗拒转为渴望被束缚和蹂躏，最终主动寻求调教者的触碰。\n\n用法与互动细节：\n1. 调教者通过衣物、饮品或空气传播药物，初期症状轻微，受虐者难以察觉。\n2. 随着时间推移，药物加剧身体敏感度，任何触碰都引发强烈快感，受虐者陷入混乱。\n3. 调教者利用受虐者的脆弱状态，施加束缚或命令，强化其依赖和服从。\n4. 可变体：药物效果可定制（如只增强特定部位敏感度、产生幻觉），触发方式可改为声音或光线，场景可融入审讯或治疗play。", "uid": 2023}, "姐妹共犯与保护者堕落": {"content": "{姐妹共犯与保护者堕落}\n简介：\n【场景/玩法描述】一对姐妹（或亲密同伴）同时陷入调教陷阱。姐姐试图保护妹妹，但自身难保，最终两人都被束缚和羞辱。调教者利用姐姐的保护欲，通过威胁妹妹来迫使姐姐就范，或让姐姐目睹妹妹被玩弄而精神崩溃。\n\n用法与互动细节：\n1. 设置二选一困境：鸽子（或随机机制）选中一人上台，另一人被迫旁观或参与捆绑。\n2. 调教者不断在姐妹间切换焦点，让保护者感到无力，被保护者感到愧疚。\n3. 最终两人同时被束缚，互相目睹对方的羞耻状态，情感联结被扭曲为共犯关系。\n4. 可变体：关系可改为母女、挚友或上下级，选择机制可改为投票或游戏，场景可改为家庭聚会或职场。", "uid": 2024}, "束缚下的艺术表演": {"content": "{束缚下的艺术表演}\n简介：\n【场景/玩法描述】受虐者被迫在束缚状态下进行艺术表演（如弹琴、唱歌），身体被拘束但精神高度集中。表演成为调教的一部分，观众欣赏其挣扎和窘态，表演结束后受虐者可能获得短暂喘息或进一步惩罚。\n\n用法与互动细节：\n1. 受虐者被束缚（如手臂固定、双腿并拢）后，被要求完成一项需要技巧的任务。\n2. 束缚增加表演难度，任何失误都可能引发观众嘲笑或调教者惩罚。\n3. 表演过程中，调教者可远程操控道具（如振动器）干扰，增强失控感。\n4. 可变体：表演内容可改为舞蹈、演讲或性技巧展示，束缚方式可融入家具或装置，观众可投票决定表演内容。", "uid": 2026}, "渐进式束缚与感官过载": {"content": "{渐进式束缚与感官过载}\n简介：\n【场景/玩法描述】受虐者被逐步施加多层束缚：先捆绑四肢，再套上紧身皮革套，最后固定全身。束缚过程中，调教者不断收紧皮带、锁扣，同时配合药物或刺激，使受虐者感到身体逐渐失控，快感与窒息感交织。\n\n用法与互动细节：\n1. 从局部开始（如小腿束缚靴），逐步扩展到手臂、躯干，每步都让受虐者感受束缚加深。\n2. 束缚具设计精巧，外观可能隐蔽，但内部限制极强，受虐者无法自行挣脱。\n3. 结合感官刺激（如振动、温度变化），使受虐者在束缚中达到高潮边缘但无法释放。\n4. 可变体：束缚材料可改为金属、绳索或真空床，步骤可加入公开环节，让观众参与收紧过程。", "uid": 2028}, "绳缚悬吊与双穴振动折磨": {"content": "{绳缚悬吊与双穴振动折磨}\n简介：\n【场景/玩法描述】受虐者被复杂绳缚捆绑成M字开腿姿势，悬吊于行李车或类似框架上。眼睛被丝巾蒙住，嘴巴塞入多孔口球。下体双穴被插入振动棒，持续刺激，使其在无法闭合双腿、无法呼救的状态下不断达到高潮，体液滴落汇聚。\n\n用法与交互细节：\n1. 调教者用麻绳在受虐者身上编织密集绳圈，重点勒紧胸部和下体，使其身体凹凸有致。\n2. 将受虐者悬吊起来，使其脚尖勉强触地或完全悬空，增加无助感。\n3. 插入振动棒后，可调节振动频率，时而低频折磨，时而高频强制高潮。\n4. 可变体：悬吊方式可改为单腿吊、倒吊；振动棒可替换为电击棒或温度变化玩具；增加观众围观，强化羞耻感。", "uid": 2030}, "乳液涂抹与绳缚敏感化": {"content": "{乳液涂抹与绳缚敏感化}\n简介：\n【场景/玩法描述】受虐者被剥去衣物，全身涂抹催情润滑乳液，使肌肤变得极度敏感。随后进行严密绳缚，绳子深深勒入肉体，将乳液效果封存在皮肤上。在束缚中，任何轻微触碰或抽打都会引发强烈快感，使受虐者陷入欲望与束缚的双重煎熬。\n\n用法与交互细节：\n1. 调教者将乳液倒在受虐者胸、腹、大腿等敏感部位，用手均匀涂抹，并直接揉捏乳房和下体。\n2. 乳液干透后，肌肤会有紧绷瘙痒感，此时开始捆绑，从脚踝到手腕，重点束缚胸部和胯部。\n3. 捆绑完成后，用指甲轻刮、鞭子抽打或手指弹弄受虐者身体，使其在束缚中疯狂扭动。\n4. 可变体：乳液可加入发热或冰凉成分；绳缚可改为皮革束带或金属链；增加口球和眼罩，强化无助感。", "uid": 2031}, "强制发情与体质改造乳液": {"content": "{强制发情与体质改造乳液}\n简介：\n【场景/玩法描述】受虐者被强制涂抹一种特殊乳液，通过皮肤吸收后，身体逐渐变得异常敏感，轻微刺激即可引发强烈性欲。乳液效果可能持久或永久，使受虐者沦为随时发情的体质，必须依靠调教者的抚慰或更强烈的刺激才能缓解。\n\n用法与交互细节：\n1. 调教者将乳液倒在受虐者身上，用手涂抹至全身，尤其重点涂抹乳房、下体等部位。\n2. 乳液初期有冰凉粘稠感，随后转为燥热瘙痒，使受虐者不由自主扭动身体。\n3. 效果持续期间，任何触碰、束缚甚至衣物摩擦都会让受虐者呻吟不止，逐渐失去理智。\n4. 可变体：乳液可分级使用，初级敏感，高级产生幻觉或直接高潮；可加入依赖性，停用后产生戒断反应；涂抹后可配合真空床或紧身衣，让药物充分吸收。", "uid": 2035}, "宠物化契约与服从测试": {"content": "{宠物化契约与服从测试}\n简介：\n【场景/玩法描述】受虐者在完全无助状态下（如被拘束、感官剥夺）被陌生人发现，对方提出“做我的宠物”作为救助条件。受虐者被迫立即同意，从而进入一段以宠物身份被支配的关系，后续行为均被框定为“宠物训练”。\n\n用法与交互细节：\n1. 调教者以冷静、不容置疑的语气提问，不给受虐者思考时间，利用其困境逼迫快速点头同意。\n2. 同意后，调教者立即以主人自居，用“宠物”称呼受虐者，并开始制定规则（如禁止说话、只能发出宠物声音）。\n3. 调教者通过喂食、清洁等日常行为强化宠物身份，同时穿插羞辱（如评论“水多”），让受虐者逐渐内化服从。\n4. 可变体：契约可升级，如从“宠物”变为“奴隶”；调教者可要求受虐者用特定动作（如舔手、摇尾）表达忠诚。", "uid": 2038}, "拘束衣美学与永久禁锢威胁": {"content": "{拘束衣美学与永久禁锢威胁}\n简介：\n【场景/玩法描述】受虐者被一套设计精巧、兼顾美观与实用的拘束衣锁死，调教者强调其无法破坏且钥匙可能永远找不到，制造可能被永久禁锢的恐惧。拘束衣本身成为权力象征，其美学细节被用来羞辱受虐者。\n\n用法与交互细节：\n1. 调教者详细描述拘束衣的锁具数量、材质和设计理念，让受虐者意识到逃脱无望，同时暗示其“宠物”身份被精心包装。\n2. 调教者通过分析“钥匙可能藏在哪里”的推理游戏，让受虐者参与其中，但始终掌握最终解释权。\n3. 拘束衣的某些部分（如束胸、束腰）持续施加压力，制造不适与性刺激，让受虐者时刻处于煎熬中。\n4. 可变体：拘束衣可加入定时锁或远程控制元件；调教者可假装丢失钥匙，观察受虐者反应，再“意外”找到。", "uid": 2042}, "全身振动道具的梯度控制与欲望落差折磨": {"content": "{全身振动道具的梯度控制与欲望落差折磨}\n简介：\n【场景/玩法描述】调教者在受虐者全身各处敏感部位贴上多个振动道具，通过遥控器控制不同部位的振动强度。核心机制是保持下体等最敏感区域的刺激始终低于其他部位一个档位，制造持续的欲望落差，让受虐者不断渴求更高强度的刺激而不得，从而陷入崩溃边缘。\n\n用法与交互细节：\n1. 在受虐者胸部、大腿内侧、脖颈、锁骨、小腹、侧腰等部位贴满振动胶囊，下体周围重点布置但初始关闭或调至最低档。\n2. 先让全身振动以低档运行，让受虐者适应并开始享受，然后逐步将非关键部位调至中高档，唯独下体保持低档或关闭。\n3. 观察受虐者的反应，当其开始扭动身体、呻吟哀求时，短暂将下体振动调高几秒给予甜头，随即再次降低，维持落差。\n4. 可变体：可结合拘束固定姿势，强制受虐者观看镜中自己欲求不满的羞耻姿态；或使用不同振动模式（间歇、随机）增加不可预测性。", "uid": 2045}, "绳缚下的外出隐藏调教": {"content": "{绳缚下的外出隐藏调教}\n简介：\n【场景/玩法描述】受虐者被全身紧缚，绳结卡在下体等敏感部位，外面穿上日常运动服隐藏。要求其保持正常举止外出、与人会面，在公共场合忍受绳子的持续摩擦和刺激，考验其意志力和羞耻心。\n\n用法与交互细节：\n1. 用粗糙绳索编织全身绳衣，重点在下体、胸部根部打上刺激性的绳结，确保任何动作都会牵动摩擦。\n2. 让受虐者穿上宽松运动服掩盖绳痕，外出进行日常活动（如通勤、购物），调教者可暗中跟随观察。\n3. 设定时间限制或任务目标（如到达指定地点），期间受虐者不得露出破绽，否则施加惩罚。\n4. 可变体：可加入远程遥控振动道具，在关键时刻突然启动；或要求受虐者与不知情者进行简短对话，增加暴露风险。", "uid": 2048}, "虚假药物暗示与身体敏感度心理操控": {"content": "{虚假药物暗示与身体敏感度心理操控}\n简介：\n【场景/玩法描述】调教者事先用普通精油或蜂蜜涂抹受虐者身体，却谎称是强效敏感精华，使其将正常生理反应归因于药物。事后揭露真相，让受虐者意识到自己的“敏感”源于本性，从而摧毁其自我认知，接受“天生淫荡”的设定。\n\n用法与交互细节：\n1. 准备无特殊效果的按摩油或蜂蜜，在受虐者不知情下涂抹于其全身，同时用加湿器喷洒水雾伪装成药物扩散。\n2. 在调教过程中不断强调药物的强大效果，让受虐者将快感归咎于外因。\n3. 在关键时刻揭露真相，并用普通物品（如酸奶）进行现场验证，证明其身体对任何刺激都会发情。\n4. 可变体：可结合催眠或暗示录音，强化“药物”效果；或让受虐者自己涂抹“药物”，增加参与感。", "uid": 2052}, "公开舞台上的强制自慰与高潮表演": {"content": "{公开舞台上的强制自慰与高潮表演}\n简介：\n【场景/玩法描述】被调教者在聚光灯下的舞台上，在众多观众注视下进行自慰表演。口枷限制言语，只能发出呜咽。观众可下达指令（如“拔出来”），被调教者被迫执行并当众高潮。\n\n用法与交互细节：\n1. 调教者事先给被调教者佩戴口枷、面纱，并可能插入肛塞等道具。\n2. 被调教者在舞台上自行刺激敏感部位，观众可呼喊下流建议，被调教者需听从。\n3. 高潮后保持特定姿势（如双手背后抓钢管），展示潮吹痕迹。\n4. 可变体：舞台可换成任何公开场合（如宴会厅、广场）；观众可以是特定群体（如敌人、贵族）；道具可替换为遥控跳蛋等。", "uid": 2053}, "禁魔拘束床与魔力抽取": {"content": "{禁魔拘束床与魔力抽取}\n简介：\n【场景/玩法描述】被调教者被锁在特制的圆形皮床上，四肢和脖颈被粗大金属枷锁禁锢，枷锁连接铁链并刻有魔纹，持续抽取魔力，使其无法使用魔法，身体虚弱。床外有石英屏障隔绝外界。\n\n用法与交互细节：\n1. 调教者将被调教者一丝不挂地锁在禁魔床上，去除所有衣物和饰品。\n2. 枷锁和铁链不断抽取魔力，导致被调教者无法反抗，甚至难以挣扎。\n3. 调教者在屏障外观察、言语羞辱，强调其无力状态。\n4. 可变体：禁魔床可换成禁魔椅、笼子；抽取的魔力可用于其他用途（如充能道具）；可加入时间限制，若不挣脱则永久失去魔力。", "uid": 2054}, "三点内环永久敏感化": {"content": "{三点内环永久敏感化}\n简介：\n【场景/玩法描述】在乳头和阴蒂上佩戴带有纤毛或肉粒的细内环，外环可更换，但内环长期不取下，使敏感点始终处于勃起和刺激状态，无法回归平静。\n\n用法与交互细节：\n1. 调教者先给受虐者戴上内环，内环内侧有微细纤毛或颗粒，紧贴皮肤。\n2. 外环可随时更换不同玩具（如振动乳环、夹子、饰品），但内环保持不动，成为身体一部分。\n3. 受虐者即使没有直接玩弄，日常动作也会因内环摩擦而产生持续快感，逐渐无法忍受空虚。\n4. 可变体：内环可加入微量媚药涂层或魔力感应，随体温或情绪增强刺激。", "uid": 2055}, "魔力驱动双模式玩具选择": {"content": "{魔力驱动双模式玩具选择}\n简介：\n【场景/玩法描述】玩具分为两种驱动模式：一种由受虐者自身魔力感应，会疯狂振动不受控制；另一种由调教者用魔力晶块驱动，节奏完全由调教者掌握。受虐者被迫选择，但两种都导向失神。\n\n用法与交互细节：\n1. 调教者拿出可切换驱动方式的玩具（如振动乳环、跳蛋）。\n2. 询问受虐者“想体验哪种”，并解释差异：自身魔力驱动会因情绪/快感而暴走；晶块驱动则完全由调教者遥控。\n3. 无论选择哪种，受虐者都会陷入被动：前者可能因高潮反馈而更强振动，后者则被任意玩弄。\n4. 可变体：可加入惩罚机制，如选错或犹豫则两种同时启用。", "uid": 2056}, "爱心型饰品联动拘束": {"content": "{爱心型饰品联动拘束}\n简介：\n【场景/玩法描述】使用爱心型乳贴和阴蒂贴，通过细金链连接，受虐者任何动作都会牵动链子，从而拉扯敏感点，形成自我刺激的闭环。\n\n用法与交互细节：\n1. 在乳头和阴蒂贴上带有媚药的爱心贴纸，外部用金属环固定。\n2. 用细链连接乳贴之间、乳贴与阴蒂贴，链上可挂小宝石增加重量。\n3. 受虐者呼吸、走路、转身都会扯动链子，持续刺激三点。\n4. 可变体：链子可连接到项圈或手铐，使四肢动作也参与拉扯；或加入铃铛，发出羞耻声响。", "uid": 2057}, "宠物化叼物训练与鞭打引导": {"content": "{宠物化叼物训练与鞭打引导}\n简介：\n【场景/玩法描述】受虐者被要求像宠物一样用嘴叼取拘束具，爬行送到调教者脚边，过程中用鞭子轻抽臀部或敏感点作为引导和惩罚，强化服从与羞耻。\n\n用法与交互细节：\n1. 调教者命令受虐者四肢着地，用嘴叼起远处的道具（如手铐、项圈）。\n2. 受虐者必须爬行往返，将道具整齐放在调教者脚边。\n3. 若动作慢或姿势不标准，调教者用鞭梢轻抽臀部、大腿或乳环，既是惩罚也是挑逗。\n4. 可变体：可增加障碍物，或要求叼取时不能掉落，否则重新开始；道具可换成食物碗或玩具。", "uid": 2058}, "三角木马骑乘、座椅与拷问变体": {"content": "{三角木马骑乘、座椅与拷问变体}\n简介：\n【场景/玩法描述】三角木马作为持续压迫型刑具，可用于骑行、专属座椅、朗读惩罚、问答拷问和体内串珠联动，核心都是让受控者用自身重量维持折磨。\n\n用法与交互细节：\n1. 受控者跨坐在木马棱边或软锯齿上，双腿、腰部或手臂被固定，任何移动都会让刺激加深。\n2. 木马可设置为固定架、移动马鞍、办公座椅、平衡板或审讯台，并与跳蛋、珍珠串、口塞、项圈锁链联动。\n3. 调教者可要求朗读、问答、报告感受或维持优雅坐姿，把智力活动、情报压力和身体刺激绑定。\n4. 可变体：骑行颠簸、专属座椅、朗读惩罚、情报拷问、珍珠串骑乘。\n\n【包含类似变体】\n- 三角木马骑行调教\n- 三角木马作为专属座椅\n- 木马朗读惩罚\n- 三角木马上的情报拷问\n- 三角木马珍珠串骑乘", "uid": 2059}, "绳缚股绳强制高潮": {"content": "{绳缚股绳强制高潮}\n简介：\n【场景/玩法描述】角色被麻绳以菱形绳网捆绑全身，重点在股间勒入粗糙麻绳，并在阴蒂和阴道口打上绳结。任何轻微挣扎都会牵动绳结摩擦敏感点，导致角色无法自控地持续高潮。\n\n用法与交互细节：\n1. 使用粗麻绳增加摩擦感，绳结可预先浸湿或涂抹催情剂。\n2. 捆绑时让角色保持站立或跪姿，股绳从背后提拉，由调教者控制松紧。\n3. 调教者可故意抖动绳索或命令角色行走，加剧刺激。\n4. 可变体：绳结可换成金属环或震动器；或结合公开场合，让角色在人群中忍耐。", "uid": 2060}, "乳夹链公开牵引": {"content": "{乳夹链公开牵引}\n简介：\n【场景/玩法描述】角色被戴上带链子的乳夹，夹住勃起的乳头。调教者通过拉扯链子牵引角色移动，或将其固定在项圈、马鞍上，使角色为减轻疼痛而被迫跟随，姿态屈辱。\n\n用法与交互细节：\n1. 乳夹可选用带齿或可调节松紧的款式，增加疼痛感。\n2. 链子另一端可系在调教者手中、马匹或固定物上，角色移动时乳头被持续拉扯。\n3. 调教者突然拽动链子，使角色发出哀鸣，引发围观者哄笑。\n4. 可变体：乳夹可连接微弱电流装置；或与股绳联动，形成前后同时刺激。", "uid": 2061}, "角色扮演自陷凌辱": {"content": "{角色扮演自陷凌辱}\n简介：\n【场景/玩法描述】角色为执行秘密任务，主动扮演成特定身份（如骑士、冒险者），并故意示弱以被敌人捕获。但过程中因意外（如道具失效、本能反应）导致计划偏离，反而陷入更屈辱的境地，被敌人当成真正的弱者肆意玩弄。\n\n用法与交互细节：\n1. 角色事先准备虚假身份和装备，内心抱有“一切尽在掌控”的自信。\n2. 遭遇敌人时，角色试图表演战斗或反抗，但因不擅长而漏洞百出。\n3. 敌人从怀疑转为确信，嘲笑角色的拙劣演技，并施加更羞辱的对待。\n4. 可变体：角色扮演成俘虏、奴隶或祭品，但被敌人识破后，将计就计进行真实调教。", "uid": 2062}, "镣铐替换温柔拘束": {"content": "{镣铐替换温柔拘束}\n简介：\n【场景/玩法描述】角色先被粗糙麻绳紧缚，承受持续刺激。随后调教者以“怕弄坏商品”为由，换上内衬棉布的镣铐，看似温柔，实则剥夺了角色因疼痛产生的反抗意志，使其陷入更深的无力感，并暗示长期监禁。\n\n用法与交互细节：\n1. 绳索捆绑造成明显勒痕和快感折磨，角色濒临崩溃。\n2. 调教者突然下令松绑，换上冰冷但舒适的镣铐，角色产生短暂感激。\n3. 镣铐限制行动但不再刺激敏感点，角色反而感到空虚和依赖。\n4. 可变体：镣铐可逐渐收紧或加入定时震动功能；或调教者以此作为“奖励”，要求角色服从命令。", "uid": 2063}, "乳头细线牵引与衣物联动": {"content": "{乳头细线牵引与衣物联动}\n简介：\n【场景/玩法描述】角色的乳头被细线拴住，细线另一端连接项圈或拘束衣。任何头部或身体移动都会牵拉乳头，造成持续酥麻。这种玩法可与日常衣物结合，使角色在行走、弯腰时不断受到刺激。\n\n用法与交互细节：\n1. 使用细线或鱼线穿过乳头环或直接系住乳头，另一端固定在项圈、衣领或腰带上。\n2. 角色在移动、扭头或改变姿势时，细线拉扯乳头，产生轻微但持续的刺激。\n3. 可搭配蒙眼或口球，剥夺视觉或语言，增强无助感。\n4. 可变体：细线可连接震动装置，随动作触发震动；或使用弹性线，增加拉扯力度变化。", "uid": 2064}, "魔力感应震动丁字裤": {"content": "{魔力感应震动丁字裤}\n简介：\n【场景/玩法描述】角色被穿上会根据身体魔力震动的珠串丁字裤，在马车运输途中持续受到刺激。震动强度与角色自身魔力波动相关，导致无法自控的高潮。运输结束后，角色因脱力和体液浸透而瘫软。\n\n用法与交互细节：\n1. 丁字裤嵌入珠串，珠串内置魔力感应装置，角色魔力越活跃震动越强。\n2. 角色被蒙眼、拘束，无法移除玩具，只能被动承受。\n3. 运输或移动过程中，颠簸增加刺激，角色可能多次高潮昏迷。\n4. 可变体：震动模式可设定为随机或由外部操控；体液浸透可导致衣物透明或增加羞耻感。", "uid": 2065}, "皮革拘束衣与菱形网格暴露": {"content": "{皮革拘束衣与菱形网格暴露}\n简介：\n【场景/玩法描述】角色被穿上特制皮革拘束衣，表面形成妖艳的菱形网格，深V开襟从胸部延伸至下体，暴露关键部位。拘束衣与吊缚结合，将角色双腿大开吊起，面向牢门或观众，强化羞耻与无助。\n\n用法与交互细节：\n1. 拘束衣由皮带和金属环构成，紧贴身体，菱形网格露出肌肤。\n2. 深V设计使胸部、腹部和秘处若隐若现或直接暴露。\n3. 角色被吊起，双手反吊，双腿被皮拷拉开固定，无法合拢。\n4. 可变体：网格大小可调整，增加或减少暴露度；可加入内置震动或电击装置。", "uid": 2066}, "多人连接拘束与依赖调教": {"content": "{多人连接拘束与依赖调教}\n简介：\n【场景/玩法描述】多个角色被铁链连接在一起，拘束在狭小空间（如马车）。她们必须相互支撑才能保持平衡，一旦有人被移走，其他人会因失去支撑而跌倒。这种玩法制造了物理依赖和心理上的集体无助感。\n\n用法与交互细节：\n1. 角色们的大腿环或项圈用铁链相连，形成链条网络。\n2. 在运输或拘束期间，她们被迫紧贴彼此，共享体温和体液。\n3. 当守卫解开连接或移走一人时，其他人会因失衡而摔倒，强化脆弱感。\n4. 可变体：连接方式可改为绳索或磁性锁链；可加入任务，如必须协同移动才能获取食物。", "uid": 2067}, "口枷媚药浸透与唾液管控": {"content": "{口枷媚药浸透与唾液管控}\n简介：\n【场景/玩法描述】受虐者被佩戴融入媚药的口枷，无法闭合嘴巴，唾液不断流出浸湿身体，同时媚药经口腔黏膜持续吸收，维持发情状态。\n\n用法与交互细节：\n1. 调教者选用金属或皮革口枷，内部涂有长效媚药，强制撑开受虐者口腔。\n2. 受虐者无法吞咽，唾液沿嘴角流至胸部或全身，形成羞耻的湿润痕迹。\n3. 媚药效果叠加其他刺激（如振动道具），使受虐者更快陷入高潮循环。\n4. 可变体：口枷可连接导管收集唾液，或添加喂食/灌药功能；媚药可替换为催乳、敏感度提升等类型。", "uid": 2068}, "陪衬奴隶的对比羞辱调教": {"content": "{陪衬奴隶的对比羞辱调教}\n简介：\n【场景/玩法描述】多名受虐者同时被拘束，其中一人被特别装扮和强化调教，成为视觉焦点，其他陪衬者承受较轻调教，通过对比加剧目标的心理羞辱。\n\n用法与交互细节：\n1. 调教者将主要目标与数名陪衬者一同拘束，目标穿戴更华丽或更淫秽的道具，如特殊发饰、振动内裤。\n2. 陪衬者仅保持基本拘束和沉默，目标的激烈反应（如连续高潮、体液飞溅）成为陪衬者的观察对象。\n3. 调教者可对陪衬者宣称“你们只是她的陪衬”，或让陪衬者协助维持目标姿势。\n4. 可变体：陪衬者可被蒙眼，仅凭声音感知目标的丑态；或设置竞争机制，表现最差者升级为重点调教对象。", "uid": 2069}, "禁欲放置与媚药煎熬": {"content": "{禁欲放置与媚药煎熬}\n简介：\n【场景/玩法描述】被调教者长期服用媚药后，被严密拘束在皮床上，剥夺所有高潮机会。身体持续处于发情状态，敏感点被环、贴片等持续刺激，但无法达到高潮，陷入焦躁与渴求的循环。\n\n用法与交互细节：\n1. 被调教者双手吊起，双腿折叠拘束，眼罩口球剥夺视觉与言语。\n2. 每日喂服媚药，但禁止任何高潮，仅通过拘束具的轻微摩擦累积快感。\n3. 调教者定期检查，但不给予释放，仅用言语挑逗或轻微抚摸非敏感区。\n4. 可变体：拘束姿势可改为站立、悬挂；媚药可替换为催情气体或魔法；放置时间可延长至数日。", "uid": 2070}, "铁笼运输与羞耻展示": {"content": "{铁笼运输与羞耻展示}\n简介：\n【场景/玩法描述】被调教者被塞入矮小铁笼，四肢拘束在笼上，笼外罩布。运输过程中剥夺视觉，仅能听到外界淫靡声响。到达目的地后掀开罩布，在众人面前展示笼中羞耻姿态。\n\n用法与交互细节：\n1. 被调教者穿着透明拘束衣，双手铐在笼顶，双腿分开铐在笼侧，私处暴露。\n2. 笼子放在推车上，由调教者推行穿过公共区域，路人可敲击笼子或言语羞辱。\n3. 到达后掀开罩布，被调教者暴露在观众视线中，可配合言语调戏或轻微触摸。\n4. 可变体：笼子形状可定制（立式、球形）；运输路线可经过不同场景（街道、宴会）；罩布可突然掀开制造惊喜。", "uid": 2071}, "逆兔女郎墙壁展示与路人玩弄": {"content": "{逆兔女郎墙壁展示与路人玩弄}\n简介：\n【场景/玩法描述】被调教者穿着逆兔女郎装（胸部、私处暴露），与其他人一同被绑在走廊墙壁上。路过的贵族或侍女可随意触摸、舔弄、使用道具玩弄，被调教者无法反抗。\n\n用法与交互细节：\n1. 被调教者双手吊起，身体紧贴墙壁，逆兔女郎装仅覆盖四肢和头部，核心部位裸露。\n2. 路人可自由选择玩弄对象，方式包括揉胸、指奸、振动棒刺激等。\n3. 被调教者口中可塞入口球，仅能发出呜咽，增加羞耻感。\n4. 可变体：服装可更换为其他暴露款式（如全裸围裙）；墙壁位置可设在吧台、舞池旁；可加入计时器，路人需付费购买玩弄时间。", "uid": 2072}, "媚药润滑拘束衣与全身体感剥夺": {"content": "{媚药润滑拘束衣与全身体感剥夺}\n简介：\n【场景/玩法描述】被调教者穿着内部涂满媚药润滑液的透明乳胶拘束衣，全身被紧缚，仅留口鼻和私处开口。衣物紧贴皮肤，任何动作都会摩擦产生快感，但无法自慰，持续累积欲望。\n\n用法与交互细节：\n1. 拘束衣为连体设计，覆盖四肢和躯干，乳胶材质透明，可见内部肉体。\n2. 穿衣前在内部涂抹媚药润滑液，使被调教者持续处于发情状态。\n3. 可配合其他拘束具（如镣铐、口球）限制行动，放置或带出展示。\n4. 可变体：拘束衣可增加振动模块远程控制；开口位置可调整用于插入调教；材质可改为皮革或紧身布料。", "uid": 2073}, "颈手枷公开鞭打高潮": {"content": "{颈手枷公开鞭打高潮}\n简介：\n【场景/玩法描述】被调教者因任务失败（如端茶洒出）被锁在舞台中央的颈手枷上，公开鞭打。鞭打持续至强制高潮，观众围观并计数。\n\n用法与交互细节：\n1. 被调教者双手和头部固定在颈手枷中，身体前倾，臀部或背部裸露。\n2. 调教者用皮鞭或藤条抽打指定部位，每一下都引发羞耻与疼痛。\n3. 鞭打节奏由观众反应或调教者心情决定，目标是通过痛感与羞耻迫使被调教者高潮。\n4. 可变体：惩罚原因可多样化（如礼仪错误、反抗行为）；鞭打工具可更换为拍子、戒尺；高潮后可有额外羞辱环节（如计数展示）。", "uid": 2074}, "三点震动饰品拘束与强制高潮放置": {"content": "{三点震动饰品拘束与强制高潮放置}\n简介：\n【场景/玩法描述】被拘束者以大字型固定在皮床或类似拘束具上，双腿大开，双手吊起。乳头和阴蒂被特制的爱心型震动饰品吸附，饰品内含旋转肉粒和震动功能，持续刺激三点。拘束者无法自行挣脱，只能扭动腰肢，在持续刺激下反复高潮甚至潮吹。可配合眼罩剥夺视觉以增强感官敏感度。\n\n用法与交互细节：\n1. 将被拘束者四肢用皮拷或锁链固定，确保双腿分开，暴露私处。\n2. 在乳头和阴蒂上安装吸附式震动饰品，饰品可调节震动强度和旋转模式。\n3. 可选择性戴上眼罩，增强被拘束者的无助感和身体敏感度。\n4. 可变体：饰品可换成不同形状（如蝴蝶、星星），或加入远程遥控功能，由调教者随机改变震动模式。", "uid": 2075}, "媚药口球渐进式感官剥夺": {"content": "{媚药口球渐进式感官剥夺}\n简介：\n【场景/玩法描述】使用由浓缩媚药凝结而成的实心口球，塞入被拘束者口中。口球本身带有甜味，诱使被拘束者不断舔舐，从而不知不觉摄入媚药。媚药逐渐引发情欲，导致唾液分泌增多，口水无法控制地滴落，增加羞耻感。同时，视觉可被眼罩剥夺，强化其他感官。\n\n用法与交互细节：\n1. 选择由媚药结晶制成的口球，大小适合被拘束者口腔。\n2. 用皮带或耳挂固定口球，确保无法吐出。\n3. 可配合眼罩或耳塞，进一步剥夺感官，放大媚药效果。\n4. 可变体：口球可设计为多层结构，外层缓慢溶解，延长药效；或加入不同口味，如水果味，掩盖媚药味道。", "uid": 2076}, "检查椅拘束与毛笔媚药挑逗": {"content": "{检查椅拘束与毛笔媚药挑逗}\n简介：\n【场景/玩法描述】将被拘束者固定在妇科检查椅或类似拘束椅上，双腿分开抬高，双手束缚在头侧，腰部可选择性固定。调教者用毛笔蘸取高浓度媚药原液，轻轻点触被拘束者的乳头和阴蒂。由于视觉被眼罩剥夺，被拘束者无法预判刺激时机，导致敏感度倍增，极易在轻微触碰下高潮。\n\n用法与交互细节：\n1. 将被拘束者四肢和腰部用皮带固定在检查椅上，确保完全无法移动。\n2. 戴上眼罩，剥夺视觉。\n3. 用毛笔蘸取媚药，以蜻蜓点水的方式轻触乳头和阴蒂，可先画圈再点中心。\n4. 可变体：毛笔可换成羽毛、软刷或低温金属棒，媚药可替换为不同效果的催情剂（如发热、冰凉、瘙痒）。", "uid": 2077}, "饰品赠送作为调教里程碑": {"content": "{饰品赠送作为调教里程碑}\n简介：\n【场景/玩法描述】调教者在每次调教达到一定阶段后，赠送被拘束者永久性或半永久性的身体饰品，如乳环、阴蒂环、项圈等。这些饰品不仅具有装饰和刺激功能，更作为调教进度的标记，暗示被拘束者已逐渐被改造为理想状态。被拘束者佩戴饰品时会产生羞耻、归属感或成就感，强化调教效果。\n\n用法与交互细节：\n1. 设计一系列饰品，从简单到复杂，对应不同调教阶段。\n2. 在每次重要调教后，由调教者亲手佩戴，并说明其意义。\n3. 饰品可带有机关，如震动、锁扣，只有调教者能移除。\n4. 可变体：饰品可刻有调教者的印记或编号，或要求被拘束者在日常中也必须佩戴，作为服从的证明。", "uid": 2079}, "强制舞娘衣装与身体控制舞蹈": {"content": "{强制舞娘衣装与身体控制舞蹈}\n简介：\n【场景/玩法描述】受虐者被强迫穿上一套华丽但淫猥的舞娘服饰，服饰内置身体控制机关，能强制穿戴者跳出下流舞蹈。服饰上的宝石、铃铛、珍珠串等装饰兼具刺激敏感部位的功能，同时抑制穿戴者的魔力流动，使其无法轻易挣脱。\n\n用法与交互细节：\n1. 调教者以威胁（如关入地牢、佩戴贞操带）禁止受虐者在表演前擅自高潮，增加心理压迫。\n2. 服饰设计包含：勒肉的金属链胸衣、带凸起的乳盖扣住乳头、珍珠串股绳紧勒耻丘并连接肛塞、镂空口枷、全身金绳拘束等，行走或舞蹈时持续摩擦敏感点。\n3. 舞台表演时，身体控制机关启动，迫使受虐者做出钢管舞等淫荡动作，聚光灯和观众视线强化暴露羞耻。\n4. 可变体：可替换为其他舞蹈主题（如芭蕾、脱衣舞），或改变控制方式（如远程遥控、声控），服饰材质和刺激部位可定制。", "uid": 2080}, "肛塞股绳联动刺激": {"content": "{肛塞股绳联动刺激}\n简介：\n【场景/玩法描述】受虐者被佩戴连接耻丘珍珠串和肛塞的股绳，日常行走、坐下或舞蹈时，肛塞和珍珠串会相互牵引，持续摩擦肛门内壁和阴部，造成无法忽视的快感累积。\n\n用法与交互细节：\n1. 肛塞设计为锥形或带凸起，涂有媚药润滑液，塞入后不易滑出，坐下时会被顶入更深。\n2. 珍珠串紧勒耻丘，与肛塞通过金线或链条连接，任何肢体动作都会导致两者联动，产生双重刺激。\n3. 调教者可命令受虐者进行特定动作（如坐下、行走、扭腰）来加剧刺激，或威胁若擅自高潮则延长佩戴时间。\n4. 可变体：肛塞可替换为振动或放电款式，珍珠串可改为金属珠或带倒刺的链条，连接方式可改为绕过腰部或大腿。", "uid": 2081}, "媚药饮料日常化投喂": {"content": "{媚药饮料日常化投喂}\n简介：\n【场景/玩法描述】调教者将媚药伪装成受虐者喜爱的甜味饮料，长期投喂使其身体持续处于发情状态，受虐者逐渐习惯并依赖这种“饮料”，甚至主动索要，未察觉身体已被改造得异常敏感。\n\n用法与交互细节：\n1. 媚药制成粉色透明液体，味道甜美，受虐者误以为是普通饮品。\n2. 调教者在日常中（如表演前）以“润喉”为由喂食，受虐者因口渴和习惯而接受。\n3. 长期饮用导致受虐者随时处于发情边缘，轻微刺激即可引发强烈反应，但自身难以察觉变化。\n4. 可变体：媚药可混入食物、香水或熏香；可设计阶段性效果（如初期兴奋、后期成瘾）；受虐者发现真相后可加入戒断反应。", "uid": 2082}, "华丽拘束衣与全身铐绳艺": {"content": "{华丽拘束衣与全身铐绳艺}\n简介：\n【场景/玩法描述】受虐者被穿戴一套由金链、宝石、薄纱制成的华丽拘束衣，兼具装饰与束缚功能。衣物连接项圈、手镯、脚环的金绳形成全身铐，限制行动但不完全剥夺自由，行走时铃铛作响，增添羞耻感。\n\n用法与交互细节：\n1. 拘束衣设计复杂：胸衣勒肉、乳盖扣乳头、肚脐链连接内裤、高跟靴带锁等，穿戴过程本身就是调教。\n2. 金绳系在项圈前后，可由调教者牵引，强迫受虐者跟随或做出特定姿势。\n3. 衣物上的铃铛和宝石在移动时发出声响，暴露受虐者位置和动作，无法隐藏。\n4. 可变体：材质可改为皮革、乳胶；拘束方式可加入磁力锁或定时锁；可搭配口枷、眼罩等感官剥夺道具。", "uid": 2083}, "威胁性惩罚与虚构恐惧": {"content": "{威胁性惩罚与虚构恐惧}\n简介：\n【场景/玩法描述】调教者利用受虐者过去的创伤（如贞操带经历）或虚构可怕的惩罚场景（如媚药水池站笼）进行威胁，迫使受虐者遵守规则（如未经允许不得高潮）。受虐者因恐惧而自我约束，即使惩罚未必真实存在。\n\n用法与交互细节：\n1. 调教者提及受虐者害怕的道具或情境（如贞操带、地牢），唤醒其负面记忆，增强威胁效果。\n2. 虚构惩罚细节丰富（如“水池填满媚药，吊在站笼里戴呼吸面具”），利用受虐者当前发情状态下的脆弱心理，使其信以为真。\n3. 受虐者为避免惩罚，主动抑制高潮，甚至保持不适姿势，加剧身体折磨。\n4. 可变体：威胁内容可改为公开羞辱、身体改造、转卖等；可加入“惩罚演示”让受虐者目睹他人受罚；后期可揭露虚构真相，引发心理崩溃或反抗。", "uid": 2084}, "钢管舞与肉瘤摩擦强制快感": {"content": "{钢管舞与肉瘤摩擦强制快感}\n简介：\n【场景/玩法描述】受虐者被关在笼中登场，随后在布满肉瘤状凸起的钢管上被迫跳舞。身体控制机关使其做出各种淫荡动作，肉瘤持续摩擦胸部和下体，累积快感但难以达到高潮，直至表演后期才可能释放。\n\n用法与交互细节：\n1. 钢管表面有密密麻麻的肉瘤凸起，材质可能为软胶或硬质，涂有润滑液或媚药。\n2. 受虐者双手被金绳系在钢管上，身体控制机关强制其旋转、倒挂、开腿等，使敏感部位反复蹭擦肉瘤。\n3. 舞蹈过程中，受虐者逐渐失去自控，主动扭腰追求更多摩擦，但机关可能间歇停止，让其在高潮边缘徘徊。\n4. 可变体：钢管可改为其他道具（如木马、鞍具）；肉瘤可替换为振动节点或放电触点；可加入观众投票决定钢管转速或机关强度。", "uid": 2085}, "魔力倒灌强制高潮拘束床": {"content": "{魔力倒灌强制高潮拘束床}\n简介：\n【场景/玩法描述】被拘束者固定在特制皮床上，四肢被铁链绞成大字。拘束具可调节禁魔力度，允许微量魔力调动，但一旦调动魔力，拘束具会将魔力倒灌回体内，直接转化为快感刺激所有敏感带，同时全身贴满魔力驱动跳蛋，强制连续高潮。系统按设定间歇性开放魔力限制，使受虐者在高潮与短暂喘息间循环，直至意识灾厄。\n\n用法与交互细节：\n1. 调教者设定拘束床的魔力限制周期（如开放10秒、关闭30秒），受虐者每次魔力开放时被迫调动魔力，触发倒灌和跳蛋振动。\n2. 跳蛋可粘贴在耳根、腋下、乳头、阴蒂、大腿内侧等敏感点，利用受虐者自身魔力驱动，振动强度与魔力波动成正比。\n3. 调教者通过观察受虐者高潮频率和潮吹量，调整魔力限制幅度，逐步削弱其抵抗意志。\n4. 可变体：可替换为其他魔力感应玩具（如振动棒、乳夹），或结合感官剥夺（黑暗、隔音）增强无助感。", "uid": 2086}, "公开身份与私下奴隶的双重生活": {"content": "{公开身份与私下奴隶的双重生活}\n简介：\n【场景/玩法描述】调教者给予受虐者一个表面体面的公开身份（如旅居贤者、外交使节），但私下将其作为专属奴隶调教。受虐者必须在公众面前维持尊严，同时承受秘密调教带来的身心变化，一旦暴露将面临社死。调教者利用这种双重性不断施加压力，迫使受虐者主动配合调教以维持平衡。\n\n用法与交互细节：\n1. 调教者设定公开场合的行为规范（如禁止高潮、保持端庄），私下则进行高强度调教（如强制高潮、身体改造）。\n2. 在公开活动前，调教者可给受虐者佩戴隐藏式玩具（如遥控跳蛋），在人群中远程操控，考验其忍耐力。\n3. 调教者定期威胁公开真实身份，迫使受虐者接受更屈辱的调教项目。\n4. 可变体：公开身份可以是任何受尊敬的角色（如教师、医生），私下身份可对应不同调教主题（如宠物、家具）。", "uid": 2087}, "魔力驱动玩具暴露身份陷阱": {"content": "{魔力驱动玩具暴露身份陷阱}\n简介：\n【场景/玩法描述】受虐者被换上看似普通的奴隶装束，但装束上的情趣玩具（如珍珠串、跳蛋）实为魔力感应型，会根据佩戴者体内魔力自动振动。受虐者若隐藏魔法师身份，其魔力波动会触发玩具疯狂振动，从而暴露身份。调教者借此识破伪装，并利用受虐者因快感导致的疏忽进行捕获或进一步调教。\n\n用法与交互细节：\n1. 调教者准备多套魔力感应玩具装束，在受虐者不知情下让其穿戴，观察振动反应判断魔力水平。\n2. 玩具振动强度与魔力波动成正比，受虐者越试图抑制魔力，反而可能因紧张导致更强振动。\n3. 调教者可在公共场合（如奴隶市场）使用此方法，让受虐者在众目睽睽下因振动失态，加剧羞辱。\n4. 可变体：玩具可替换为其他魔力感应装置（如项圈、乳环），或结合禁魔拘束具制造魔力倒灌效果。", "uid": 2088}, "元老院外送肉便器轮换": {"content": "{元老院外送肉便器轮换}\n简介：\n【场景/玩法描述】受虐者被公开真实身份后，白天在固定地点（如大厅）被拘束展示供人赏玩，夜晚则被关进笼子外送到不同贵族家中供其玩弄。次日再展示被玩弄后的丑态，循环轮换。调教者通过安排不同口味贵族，开发受虐者新敏感点，并利用社交压力彻底摧毁其尊严。\n\n用法与交互细节：\n1. 调教者制定外送日程表，每晚将受虐者送至不同调教者处，次日回收并记录身体变化。\n2. 每位贵族可提出特定玩法要求（如捆绑、道具、角色扮演），受虐者必须服从。\n3. 白天展示时，调教者可让观众投票决定当晚外送对象或玩法。\n4. 可变体：外送范围可扩大至不同场所（如军营、酒馆），或加入竞拍环节，由出价最高者获得当晚使用权。", "uid": 2089}, "自杀禁止暗示与无力化调教": {"content": "{自杀禁止暗示与无力化调教}\n简介：\n【场景/玩法描述】受虐者在昏迷时被植入“不能自杀”的催眠暗示，同时身体被施加无力化魔法，导致即使清醒也无法咬舌或调动魔力自尽。调教者利用这种状态，让受虐者即使感到屈辱也无法逃脱，只能被动接受调教，逐渐消磨其反抗意志。\n\n用法与交互细节：\n1. 调教者在受虐者无意识时进行暗示植入，可结合药物或魔法加深效果。\n2. 无力化可设计为部分肢体能动但关键动作（如咬舌、握拳）无力，增加受虐者挫败感。\n3. 调教过程中，调教者可反复提及“你无法自杀”来强化暗示，同时给予微小希望（如完成任务可解除）以维持服从。\n4. 可变体：暗示内容可改为“无法拒绝命令”或“高潮时无法昏厥”，结合其他调教手段形成连锁控制。", "uid": 2090}, "魔力榨取工厂永久拘束系统": {"content": "{魔力榨取工厂永久拘束系统}\n简介：\n【场景/玩法描述】受虐者被幽闭在专门建造的魔力榨取工厂中，全身拘束并连接魔力抽取装置。所有生理需求（进食、排泄）被系统化管理，同时持续施加酥麻快感（如体内振动玩具）以维持魔力分泌。受虐者沦为活体魔力电池，在无尽快感中逐渐丧失自我。\n\n用法与交互细节：\n1. 调教者设计自动化拘束架，固定受虐者四肢和头部，接入魔力导管和饲管。\n2. 快感刺激强度与魔力产量挂钩，系统自动调节玩具振动频率以最大化榨取效率。\n3. 调教者可远程监控数据，偶尔现身进行心理羞辱（如比较产量）。\n4. 可变体：可加入多受虐者并联榨取，形成竞争或协作机制；或结合感官剥夺（全黑环境）增强绝望感。", "uid": 2091}, "颈手枷游街处刑预告": {"content": "{颈手枷游街处刑预告}\n简介：\n【场景/玩法描述】调教者威胁将受虐者身体烙上屈辱标记，套上颈手枷，在铁链拖拽下游街至广场，作为战前祭旗处刑。此提案作为极端选项，用于逼迫受虐者接受其他调教条件。游街过程中民众可围观、嘲讽，彻底摧毁其社会性尊严。\n\n用法与交互细节：\n1. 调教者详细描述游街路线、烙印图案和处刑方式，强化心理恐惧。\n2. 可先进行模拟游街（如在调培训室拖行），让受虐者预演屈辱。\n3. 调教者给予“选择权”：接受调教或公开处刑，迫使受虐者主动屈服。\n4. 可变体：游街可结合其他羞辱元素（如裸体、挂耻辱牌），处刑方式可替换为其他公开惩罚（如轮奸至死）。", "uid": 2092}, "跳蛋腿环固定与遥控放置": {"content": "{跳蛋腿环固定与遥控放置}\n简介：\n【场景/玩法描述】调教者将跳蛋塞入受虐者蜜穴，用皮质腿环将遥控器固定在大腿上，然后离开或关闭屏障，让受虐者在拘束状态下被跳蛋持续刺激。跳蛋可切换为魔力驱动模式，利用受虐者自身魔力振动，强度不可控。调教者通过定时返回调整或远程操控，维持受虐者处于持续发情状态。\n\n用法与交互细节：\n1. 调教者准备多枚跳蛋（魔力驱动和电池驱动），混合使用以增加不确定性。\n2. 腿环可加锁，防止受虐者自行取出遥控器。\n3. 放置期间，调教者可通过监控观察受虐者反应，偶尔远程改变振动模式。\n4. 可变体：跳蛋可替换为其他可固定玩具（如振动棒、肛门塞），腿环可加装电击功能作为违规惩罚。", "uid": 2093}, "隐藏式拘束公开社交": {"content": "{隐藏式拘束公开社交}\n简介：\n【场景/玩法描述】角色被要求穿着严密法袍，掩盖袍下色情拘束具（如乳链铃铛、肛塞猫尾），在公开场合维持正常社交身份。一旦因发情导致铃铛响动或尾巴翘起，就会暴露。\n\n用法与交互细节：\n1. 调教者给受虐者穿戴隐藏拘束具，设定暴露条件（如铃铛响、尾巴动）。\n2. 受虐者需在人群中保持镇定，任何生理反应都可能触发暴露风险。\n3. 调教者可用眼神、密语或遥控道具增加刺激，考验受虐者忍耐力。\n4. 可变体：拘束具可换成震动内裤、遥控跳蛋、乳夹等；场合可换成宴会、会议、街头。", "uid": 2094}, "口球威胁与服从训练": {"content": "{口球威胁与服从训练}\n简介：\n【场景/玩法描述】调教者用大型实心口球作为威胁，迫使受虐者接受调教并改变称呼（如叫“主人”）。口球不仅剥夺言语，还作为惩罚象征。\n\n用法与交互细节：\n1. 调教者展示口球，明确告知不服从就会戴上。\n2. 受虐者被迫用恭敬称呼，任何反抗都会导致口球实际使用。\n3. 口球可结合其他拘束，延长佩戴时间，增加唾液流出、无法吞咽等羞辱。\n4. 可变体：口球换成塞口布、口枷、开口器；威胁可升级为公开场合佩戴。", "uid": 2095}, "女奴家具化与酒桌服务": {"content": "{女奴家具化与酒桌服务}\n简介：\n【场景/玩法描述】商人聚会时，女奴被当作椅子（双穴插入振动棒），或跪在胯下舔舐肉棒，同时主人进行灌肠等游戏。女奴成为活体家具和性服务工具。\n\n用法与交互细节：\n1. 女奴被固定姿势，双穴插入振动棒，供人坐在背上或腿上。\n2. 其他女奴戴镣铐、眼罩、口球，仅凭气味寻找肉棒进行口交。\n3. 主人可随时对身下女奴进行灌肠、抽打等额外调教。\n4. 可变体：家具换成桌子、脚垫；插入物换成假阳具、串珠；场合可换成私人书房、浴室。", "uid": 2096}, "灌肠饮酒与排泄控制": {"content": "{灌肠饮酒与排泄控制}\n简介：\n【场景/玩法描述】主人用注射器将酒液灌入女奴后庭，女奴腹部胀起，强忍排泄欲，最终在主人允许前不得释放。结合振动棒刺激，加剧失控风险。\n\n用法与交互细节：\n1. 调教者准备灌肠工具和酒液，缓慢注入女奴体内。\n2. 女奴被要求忍耐，任何排泄请求需经许可，否则受罚。\n3. 可同时施加振动棒、拍打等刺激，增加忍耐难度。\n4. 可变体：灌肠液换成冰水、姜汁；场合可换成公开惩罚、医疗Play。", "uid": 2097}, "感官剥夺下的口交侍奉": {"content": "{感官剥夺下的口交侍奉}\n简介：\n【场景/玩法描述】女奴戴眼罩、双手反绑，被项圈牵引，仅凭气味寻找主人肉棒进行口交。主人可随时拉开项圈中断侍奉，询问女奴感受。\n\n用法与交互细节：\n1. 调教者剥夺女奴视觉和双手自由，仅留嗅觉和触觉。\n2. 女奴需主动用鼻子嗅闻寻找目标，含入后努力取悦。\n3. 调教者通过项圈控制节奏，可突然拉开，观察女奴反应。\n4. 可变体：增加耳塞剥夺听觉；目标换成假阳具或食物；环境加入干扰气味。", "uid": 2098}, "职业化女奴调教对比": {"content": "{职业化女奴调教对比}\n简介：\n【场景/玩法描述】商人讨论人族女奴与魔族调教过的女奴差异，认为魔族调教手法更“懂事”。通过对比，强调系统性调教带来的服从度提升。\n\n用法与交互细节：\n1. 调教者展示不同来源的女奴，让参与者评价反应、技巧。\n2. 可设置测试环节，如口交、忍耐、应答，量化服从度。\n3. 强调调教历史对女奴行为的影响，如“被卖到我们这里好好教育过”。\n4. 可变体：对比不同调教流派（如催眠、疼痛、奖励）；加入改造手术或魔法强化。", "uid": 2099}, "朝会上的特殊座椅与公开暗示": {"content": "{朝会上的特殊座椅与公开暗示}\n简介：\n【场景/玩法描述】在正式朝会上，魔王在自己王座旁设置一个精致特殊座椅，引发群臣猜测。该座椅暗示某位特殊人物（如被调教的贤者）即将公开亮相，制造紧张和期待。\n\n用法与交互细节：\n1. 调教者在公开场合设置一个显眼但空置的座位，引发议论。\n2. 受虐者知道该座位是为自己准备，内心羞耻焦虑。\n3. 调教者故意拖延，让悬念发酵，最终可能让受虐者以某种受控状态入座。\n4. 可变体：座椅可换成跪垫、囚笼；场合可换成法庭、典礼；受虐者可能佩戴隐藏拘束具出席。", "uid": 2100}, "潜意识低语人偶抵抗调教": {"content": "{潜意识低语人偶抵抗调教}\n简介：\n【场景/玩法描述】受虐者在被拘束调教、反复高潮意识模糊时，用仅存的魔力在脑中凝结“低语人偶”，储存一段自我提醒的话语。每当失去意识或入睡时，人偶会在潜意识中低语，帮助苏醒后保持一丝清醒，抵抗完全堕落。但每次施法会因禁魔拘束具反噬，将魔力转化为快感，加剧身体敏感。\n\n用法与交互细节：\n1. 调教者限制受虐者的魔力使用，只留微量魔力，使其只能施展简单精神魔法。\n2. 受虐者在高潮间隙，趁拘束具暂时开放魔力时，凝聚低语人偶，设定提醒内容（如“不可屈服”“记住使命”）。\n3. 低语人偶在受虐者昏厥或睡眠时自动触发，在梦中重复提醒，但快感冲击会逐渐削弱其效果。\n4. 可变体：低语人偶可被调教者发现并篡改，变成反向洗脑工具；或人偶本身会随着受虐者堕落而扭曲提醒内容。", "uid": 2101}, "禁魔拘束具的魔力-快感转化": {"content": "{禁魔拘束具的魔力-快感转化}\n简介：\n【场景/玩法描述】受虐者穿戴全套禁魔拘束具，任何主动使用魔力的行为都会被拘束具吸收并转化为性快感反噬身体，同时触发所有内置玩具（跳蛋、振动棒等）共鸣运作，导致强制高潮。拘束具周期性短暂开放魔力使用，引诱受虐者施法，形成“施法-反噬-高潮”的恶性循环。\n\n用法与交互细节：\n1. 调教者设定拘束具程序：每隔一段时间开放微量魔力，其余时间完全禁魔。\n2. 受虐者试图用魔法抵抗或逃脱时，魔力被拘束具转化为快感，强度与魔力消耗成正比。\n3. 拘束具与体内玩具联动，魔力波动会触发所有玩具最大功率，造成瞬间绝顶。\n4. 可变体：拘束具可记录受虐者的魔力使用习惯，逐渐缩短开放间隔，使其更快屈服；或反噬快感可被调教者远程监控，作为调教进度指标。", "uid": 2102}, "仪式化爬行押送与鞭打纠正": {"content": "{仪式化爬行押送与鞭打纠正}\n简介：\n【场景/玩法描述】受虐者被戴上口枷、眼罩，全身镣铐加铁链，由两名调教助手用铁链牵着项圈，强迫四肢跪地爬行至调教者面前。途中若姿势不标准或停顿，助手会用鞭子抽打臀部或大腿内侧进行纠正。到达后取下眼罩口枷，开始审问或调教。整个过程强调仪式感和绝对服从。\n\n用法与交互细节：\n1. 调教者事先命令助手为受虐者穿戴全套拘束具：项圈、手脚镣铐、连体铁链、口塞、眼罩。\n2. 助手一左一右用铁链牵引，控制爬行方向和速度，受虐者必须跟上，否则挨鞭。\n3. 爬行路线可设计为经过公开区域或特定场所，增加羞辱感。\n4. 可变体：可在爬行途中加入障碍物或任务（如用嘴叼运物品）；或让受虐者边爬边报告自己的奴隶身份和状态。", "uid": 2103}, "强制分腿高潮宣告": {"content": "{强制分腿高潮宣告}\n简介：\n【场景/玩法描述】调教者命令受虐者在体内玩具振动时分开双腿，不得夹紧。若试图合腿，则用鞭子抽打大腿内侧敏感处。在高潮来临前，受虐者必须大声宣告自己即将高潮，并请求调教者观赏，否则将面临更严厉惩罚（如延长拘束时间）。高潮时需保持分腿姿势，让潮吹完全暴露。\n\n用法与交互细节：\n1. 调教者先给受虐者塞入遥控跳蛋或振动棒，开启中等强度。\n2. 命令“把两腿分开”，若受虐者抗拒或合腿，立即鞭打大腿内侧，直至服从。\n3. 受虐者感到高潮逼近时，必须用屈辱称谓（如“淫乱雌奴隶”）大声宣告：“要去了，请主人观赏！”\n4. 可变体：宣告内容可逐步升级，加入对调教者的赞美或自我贬低；或高潮后要求受虐者舔净地面潮吹液。", "uid": 2104}, "女仆团的魔纹与信念纽带": {"content": "{女仆团的魔纹与信念纽带}\n简介：\n【场景/玩法描述】调教者麾下的女仆团成员，每人都被刻上独特的紫色魔纹（通常在背部等显眼位置），作为加入组织的证明和魔力链接。魔纹不仅是装饰
